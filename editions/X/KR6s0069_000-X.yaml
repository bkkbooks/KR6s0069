front:
  text: 御製總序如來正法眼藏教外別傳實有透三關之理是真語者是實語者不妄語者不誑語者有志於道之人則須勤參力究由一而三步步皆有著落非可顢頇函胡自欺欺人朕既深明此事不惜話墮逐一指明夫學人初登解脫之門乍釋業繫之苦覺山河大地十方虗空並皆消殞不為從上古錐舌頭之所瞞識得現在七尺之軀不過地水火風自然徹底清淨不挂一絲是則名為初步破參前後際斷者破本參後乃知山者山河者河大地者大地十方虗空者十方虗空地水火風者地水火屬乃至無明者無明煩惱者煩惱色聲香味觸法者色聲香味觸法盡是本分皆是菩提無一物非我身無一物是我己境智融通色空無礙獲大自在常住不動是則名為透重關名為大死大活者透重關後家舍即在途中途中不離家舍明頭也合暗頭也合寂即是照照即是寂行斯住斯體斯用斯空斯有斯古斯今斯無生故長生無滅故不滅如斯惺惺行履無明執著自然消落方能踏末後一關雖云透三關而實無透者不過如來如是我亦如是從茲方修無修證無證妙覺普明圓照法界一為無量無量為一大中現小小中現大坐微塵裏轉大法輪於一毫端現寶王剎救拔眾生利用無盡佛佛祖祖皆為此一大事因緣出現於世達摩西來歷代授受古德傳燈無盡光中大圓鏡裏日往月來以至於今雖然廣大法門聖凡並托華嚴香海細鉅同歸得骨得髓者固多如麻如粟者何限去聖遙遠魔外益繁不達佛心妄參祖席金山泥封慧日雲蔽約其訛謬亦有三端其上者纔見根塵互引法界相生意識紛飛無非幻妄頓生歡喜謂是真常休去歇去以空為空不知性海無邊化城無住果能見性當下無心心既見空即未見性於是形同槁木心等死灰萬有到前一空不敵縱能立亡坐脫仍是業識精魂況乃固執斷見必至變作狂華謂因果之皆空恣猖狂而不返豈非一妄在心恒沙生滅能不造生死業斷菩提根又其下者見得箇昭昭靈靈便謂是無位真人面門出入揚眉瞬目豎指擎拳作識神之活計張日下之孤燈寶魚目為明珠覓栴檀於糞土噙著鐵丸口稱玉液到得臘盡機除時方知依舊是箇茫茫無據又其下者從經教語錄中挂取葛藤從諸方舉揚處拾人涕唾發狂亂之知見翳於自心立幻化之色聲作為實法向真如境上鼓動心機於無脫法中自生繫縛魔形難揜遁歸圓相之中解路莫通躲向藤條之下情塵積滯識浪奔催瞞己瞞人欺心欺佛全是為名為利卻來說妙說元盲驢牽盲驢沿磨盤而遶轉癡夢證癡夢拈漆桶為瓣香是則循覺路而撲火輪能不由善因而招惡果如是三者實繁有徒宗旨不明沈淪浩劫矣朕膺元后父母之任並非開堂秉拂之人欲期民物之安惟循周孔之轍所以御極以來十年未談禪宗但念人天慧命佛祖別傳𢬵雙眉拖地以悟眾生留無上金丹以起枯朽豈得任彼邪魔瞎其正眼鼓諸塗毒滅盡妙心朕實有不得不言不忍不言者近於幾暇辨味淄澠隨意所如閱從上古錐語錄中擇提持向上直指真宗者並擷其至言手為刪輯曰僧肇曰永嘉曰寒山曰拾得曰溈山曰仰山曰趙州曰永明曰雲門曰雪竇曰圓悟曰玉林十二禪師藏外之書曰紫陽真人乃不數月之功編次成集者其他披覽未周即採掇未及非曰此外無可取也是數大善知識實皆窮微洞本究旨通宗深契摩詰不二之門曹溪一味之旨能使未見者得無見之妙見未聞者入不聞之妙聞未知者徹無知之正知未解者成無解之大解此是人天眼目無上宗乘至於淨土法門雖與禪宗似無交涉但念佛何礙參禪果其深達性海之禪人淨業正可以兼修於焉隨喜真如圓證妙果雲棲蓮池大師梵行清淨乃曾參悟有得者閱其雲棲法彚一書見論雖未及數善知識之洞徹然非不具正知正見如著相執有者之可比擬亦採其要語別為一卷以附於後兼此淨土一門使未了證者建菩提道場已了證者為妙覺果海途路之助爰為總序弁於篇端刊示來今嘉惠後學庶幾因指見月得魚忘筌破外道之昏蒙奪小乘之戔弇朕有厚望焉雍正癸丑四月朔日御選語錄總目第一冊卷一大智圓正聖僧肇法師卍𠬧肇論與寶藏論卷二洞明妙智永嘉覺禪師卍𠬧永嘉集與證道歌卷三妙覺普度和聖寒山大士卍𠬧詩集圓覺慈度合聖拾得大士卍𠬧詩集第二冊卷四靈覺大圓溈山祐禪師卍𠬧語要真證通智仰山寂禪師卍𠬧語要卷五圓證直指真際趙州諗禪師卍𠬧語要卷六慈雲匡真弘明雲門偃禪師卍𠬧語要第三冊卷七妙圓正修智覺永明壽禪師卍𠬧唯心訣宗鏡錄序萬善同歸集與心賦第四冊卷八大慈圓通禪仙紫陽真人卍𠬧真悟篇外集卷九正智明覺雪竇顯禪師卍𠬧語要第五冊卷十明宗真覺圓悟勤禪師卍𠬧語要第六冊卷十一大覺普濟能仁玉琳琇國師卍𠬧語要明道正覺䒢溪森禪師卍𠬧語要第七冊卷十二和碩雍親王圓明居士卍𠬧語錄上諭二道附刻圓明百問第八冊卷十三外集雲棲蓮池大師第九冊卷十四前集上歷代禪師第十冊卷十五前集下歷代禪師第十一冊卷十六後集上歷代禪師第十二冊卷十七後集中歷代禪師第十三冊卷十八後集下歷代禪師第十四冊卷十九當今法會附刻

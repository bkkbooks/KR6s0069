參參參眼聽聲乃名真聽耳觀色乃名正觀非是六根互用却乃法爾如然所以慈悲大士號觀世音若不如是何得與佛佛同一慈力與生生同一悲仰雖然此猶是化門度生聲色見聞邊事設有箇漢道捨此向上道句看圓明只得撫其背云亦不必話作兩橛多少住山者却在山外住多少江湖客却在水面行不知朝堂城市中人人却在山水裏不明斯旨者大似誑惑閭閻說話孰不知真語實語的語確語何則試看住山者阿誰不在山外住江湖客阿誰不在水面行朝堂城市人阿誰不在山間水裏良久大笑云恁麼說話可謂真實的確誑惑閭閻也有不甘者出來大家同發一大笑情生智隔念起神昏是非迷正性好惡障真心心生種種法生心滅種種法滅貪瞋癡念起見怪不怪其怪自壞戒定慧情生門前生瑞草好事不如無不見道損法財滅功德莫不由斯心意識是以禪門了却心頓入無生知見力且道此知見力心也意也識也非心也非意也非識也磚石瓦礫大的大小的小稱他分兩作麼東西南北近的近遠的遠量他丈尺作麼只可言了心不可言無心所以云莫道無心却是道無心又隔萬重山有法即有心無心即無法不是無法無心只要心法一貫傍有一從者云供養百千萬億佛不如齋一無心道人王云待汝會得無心再向汝道十三弟朝陽居士丁酉年春打破漆桶以能問於不能虗懷請示難辭一番漏逗援筆以應此昨有深契不生不滅相應之說夫見到不生不滅者不足論也今賢弟乃坐在不生不滅甲裏也夫坐在色身內不生不滅者固不足數也今賢弟乃坐在法身中不生不滅者也能此者三十年後覓箇人也難得若於如來法門坐一微塵裏轉大法輪於一毫端現寶王剎尚未夢見在今將色身法界不妨蛇足一上一切眾生認色為己偶爾警省識得本來主人不生不滅者次也一切聖賢以大千為己一念真實入妙圓覺海不生不滅者上也即如人之夭壽物之短長雖有差別仍屬夢幻又何足貴色身不過百年世界不過一劫故認色身者不可說短促認法界者不可說延長如言色身法界終歸於盡將謂別有安身立命底所在却話成兩橛如言色身法界皆無盡藏乃外道空言蓋色身小者近者不必言即法界大者遠者亦有成住壞空之理今日所契不生不滅相應處猶是眼前功夫邊之展轉如更踏一步向前自然不假絲毫便見三身四智人我眾生三千世界八萬塵勞豎窮三際橫亘十方不生不滅不滅不生不生生不滅滅不生生滅不滅生滅不生生生不滅滅滅饒他如來一按指海印發光也只得向他道者老漢不識好惡莫道此山多險峻前途猶有最高峯同行者勉之問重關工夫如何大事已明雖忌疑而他求恐脚跟不穩然多強作主宰有悞向上如未踏重關最忌不疑得少為足不肯努力行者一步破參後要疑而進重關後要不疑而入真實如無明者件事原無無明亦無無明盡既無明本無又何用斷若以靜止動以真除妄饒伊一念萬劫終是空亡外道成得箇甚麼邊事佛云迷頭認影祇為眾生一向忘頭認影熟了錯認顛倒既識得頭了管他影作麼然此事不可作一不可作二影是日月燈火光芒邊事有頭必有影有影必有頭眾生住影觀頭聖賢住頭觀影說不得自觀自說不得他視他日月燈火四光息後那有頭視頭底事四光不能長息頭影何得長無因熟處難忘所以有無量劫熏習種子之說只者一句若錯解了賺煞多少人譬如日光頭影隨日滅月光頭影隨月生時還喚他是先前底影子得麼原是當處受生當處受滅經云金已出鑛不復為鑛總工夫渾些乃又來認影認鑛並非我頭金來作鑛作影也勉之問回途工夫如何一切眾生本具如來智慧德相但因妄想執著不能證得破本參後妄想已除透重關後執著全消智慧德相那裏有證不得底事只是此時且莫管回途不回途及前後等事但就者裏靜以俟之隨遇而安說箇三千大千世界視如宅舍不免猶有小大遠近比量在我只是見得一切處皆可坐臥起居有什麼堂寢庭陛之分所謂無入而不自得切不可作是非覺不可作真妄覺不可作捨就覺不可作去住覺如是覺者是名正覺者還是燈影邊事譬如燈體雖無用其用在光然其光却在燈體破參如燈近光透重關如燈遠光不能即至於燈體者是燈光暗弱無力也故行履到周年半載若仍不見動靜還是重關工夫未曾通徹果能一念信心當下用力不妨重起疑情古云功不浪施又云佛法不怕爛却即便錯用了心也只當書作幾篇文字辦理幾件事情總是認得明了一切不妨底光畢竟能見體體畢竟不離光然是體不在內實在內不在外實在外千萬不可預為計較徒自障礙更不可錯認錯解那句經那句文著一境界便是魔境雖然從緣入者不是家珍即愚兄從上所說也只作公案看去不可被葛藤絆住必待一一從胸襟中流出方是向上一路因賢弟問有反面回途如何用力不知何前何後隨援筆寫及然此乃是目下工夫道理用力所在若更進一步處預言無益候一步踏到時自然慶快平生不消言得王云佛法度人無量佛法悞人無量一切眾生熱火寒冰內九橫八苦千生千死六道輪迴無有休息茫茫業海痛莫可喻善男信女能生一念淨信猛省回光即登彼岸超離苦海是佛法度人無量處彼岸已登萬業冰消逍遙極樂之鄉遊戲清涼之界回觀三界猶如火宅譬如傷弓之鳥遐舉高飛又如漏網之魚深藏遠遁往往令人執指為月畫餅充飢這是佛法悞人無量處那裏知得鑊湯爐炭內即是法王全身法華經中化城之喻甚切眾生於一切痛苦孰不生厭厭故易棄一切樂利孰不生戀戀故難捨乃至生必定愛死必定惡故離死從生易捨生就死難所以說者件事非將相之所能若論生中之生將相能也死中之死將相能也生中之死死中之生將相不能也不見道天下可均白刃可蹈中庸不可能何故不可能因有能所以不能也這百尺竿頭懸崖撒手一步必須大丈夫漢纔能了辦非希圖小利畫地自止輩所可擬料也古人云但莫憎愛洞然明白纔有是非紛然失心又云取捨之心成巧偽若欲了明此事待汝脫却汗衫斷了命根方許汝會常住真心也要會常住真心麼晝行須把火夜坐莫張燈且道是度人無量是悞人無量喝一喝云向下文長來日再說一日王云者件事因在內所以不在外因在外所以不在內因不在內外所以在內外因在內外所以不在內外不見臨濟道有時奪境不奪人有時奪人不奪境有時人境俱奪有時人境俱不奪後人不解其旨把作接人邊會去未免辜負他前人此等說話譬如天之春夏秋冬地之東西南北人之生老病死日之子午卯酉月之晦朔弦望也且道孰有孰無孰真孰妄本是以有顯無以無顯有二既不無有四何得有無有無尚且不立真妄從何而分所以說無明識性即佛性幻化空身即法身既是無明即佛性空身即法身則佛性法身何可貴無明空身何可賤只者一貴一賤即生取捨一生取捨即生真妄真妄一生有無繼起生死隨之萬業雲集皆從此一識一覺而生也所以佛云我若按指海印發光汝纔動念塵勞先起者箇關頭第一要緊一絲不透一毫不脫如一指之障須彌是誰之過歟古人云塵垢盡除光始現心法雙忘性即真若欲塵垢盡除必須心法雙忘若欲心法雙忘必須心法合一但有彼此相何能忘此心此心如鏡萬有來臨盡皆塵垢若不能渾物我但云我自無心於萬物妄為鏡已打破皆屬誑語自欺自悞此事須實踏不二心地非知識可解者參王示一禪者云學者已入道而不能踏破重關者有三病一者惺惺的有箇大圓光相似或放或收以為操縱由己是一二者呆呆的無聲無臭或隨或奪以為物來則應事過不留是一三者見紅是紅見黑是黑胸中隱隱底似有箇物在是一是皆識漏未除淨相裏作活計樂境裏覓生涯若如此去直饒千百劫也只作得箇種佛種底伶俐眾生何時得了期必須跳出化城尋覓真境還如未破參時一般更加一番苦心尚恐不能何況優游自在貪圖小利畫地自限豈能進步也待汝內外一如今古不隔百尺竿頭者一步踏來再向汝道真實不虗之說從上佛佛祖祖千說萬說總為者箇能見者箇切莫管者箇若一管者箇即成假者箇若認假者箇還不如不見者箇何故妄想易捨執著難銷後學者不可認賊為子得少為足得少為足事小一認賊為子則障汝前程萬里不見佛言是人行邪道不能見如來未了者當踊往直前莫貽自悞凡人欲了此一大事只得將者箇覓那箇覓得那箇那箇却成者箇者箇却成那箇到此時須要離却那箇要離那箇須要就那箇那箇成了者箇者箇就是那箇那箇就是者箇到此時方可商量真者箇若見了真者箇實實無者箇那箇一任者箇也是那箇那箇也是者箇既然道實實無者箇那箇為何又道那箇者箇却不知此時者箇那箇不是從前那箇者箇若也不會且下四句註脚八萬塵消頃刻間石含玉兮地擎山清風皓月無人識惟證方知非可傳參參須真參悟須實悟何謂假參為博得箇明眼宗師作家居士之虗名也何謂真參為了死生也若實為生死致心一處窮究趙州道七日不悟摘取老僧頭去永嘉道若將妄語誑眾生自招拔舌塵沙劫試看前聖婆心之緊懇自可信此事之的真所以石霜云休去歇去一念萬年去寒灰枯木去古廟香爐去一條白練去冷湫湫地去也若是假參者到此便謂可以成名便不肯驀直而前捫心自問果了死生乎非欺人也非欺天也乃自欺也不但墮落空亡外道奈大誑語成之罪業何若為生死真參者斷不肯畫止此也不見雪峰道不休不歇去業識芒芒去七顛八倒去十字街頭閙浩浩的坐臥去荊棘裏遊戲去刀山劍樹鑊湯爐炭去驢胎馬腹去也若道二老別資一路作此見解者實辜負前人眉毛拖地之深恩然若不到不休不歇斷不能真到休去歇去若不到業識茫茫斷不能真到一念萬年去若不到七顛八倒斷不能真到枯木寒灰去若不到十字街頭閙浩浩的斷不能真到古廟香爐去若不能到荊棘林裏遊戲去斷不能真到一條白練去若不能到刀山劍樹以至驢胎馬腹去斷不能真到冷湫湫地去到此雖未能了死脫生實見明脫生了死之路此正文殊言其力未充之候然猶功勳邊事不見涌泉欣禪師云相續也大難要會相續的面目麼求聞見而不可得作善惡而亦不會湛湛碧天秋月皎大千沙界露全身咄切忌耳聞眼看意會生死一事如大海中之浮漚本屬空幻眾生妄執為有正我佛言一切眾生從無始來生死相續皆由晦昧為空空晦暗中結暗為色色雜妄想想相為身此想不真故有輪轉譬如澄清大海棄之唯認一浮漚體目為全潮之謂經云凡事因譬喻而得明曉佛言眾生執有之因如譬言浮漚之起乃因物觸風攪而成聚則浮漚散則海水也我之妙明覺性譬之海水眾生塵剎譬之浮漚海水無暫竭之日浮漚無常滅之時雖是當處受生當處受滅即此生滅亦隨海水以無窮眾生以漚泡為己而觀海水如來以海水為己而視浮漚眾生非離海也如來非離漚也須知生滅相即常住相所以佛言是法住法位世間相常住也愚昧眾生不但不知海之為己且亦不知其漚之為水也若彼投胎奪舍者即如捨此漚而就彼漚也勤求長生者即如以諸權巧護惜此漚也神通變化者即如以幻術舞弄此漚也所以道饒經八萬劫終究落空亡乃顯而易會者善男子大丈夫勤求此事務研至與海同體而後已方為了事不可坐浮漚中目為全潮為了事也一知半解之人較凡愚稍差者知漚之為水也是以不得大死者未捨此漚也得大活者通身入海也一切賢聖皆以無為法而有差別者如浮漚非只海有江河湖海各有漚也然漚體水性其理本一聖賢修證之等列如江河湖海雖有大小深淺之不同不得仍名為浮漚也佛與眾生其性無二亦然眾生不可言有生死聖賢不可言無生死若欲了生死不必離生死覓但即浮漚中識得漚是水諺云但入深山去何怕沒柴燒切不可得少為足以能推的心識得大海之理便妄為已證休去歇去不但畫地自限且大誑語成翻落無限苦趣也古人道見解人多行解人萬中無一箇以上乃性覺妙明之說更有本覺明妙之理實有口道不出若是鐵漢子到此自然領會亦不煩圓明重下註脚也擲筆慚惶處三十年後自有無面目人證明天下叢林拈椎豎拂堂頭動輒言放行也恁麼恁麼把住也恁麼恁麼拈起也恁麼恁麼放下也恁麼恁麼實令人發一大笑愚何至此尚敢大言將此謂我為法王於法自在實不解此輩具何面皮肚腸也此事本不動搖阿誰放行把住本自具足阿誰拈起放下從上超佛越祖闡揚宗旨震雷音作獅吼底大善知識亦間有恁麼舉者乃黃葉止兒啼底婆心使子遣孫底說話何嘗似今日盲眼禪徒將此以為究竟極則也並此化城境界亦未親覩實踏尚屬拾人涕唾為珍饈所謂可憐愍中更可憐憫者也此乃執識神生死本外道斷常邪見認賊為子豈止中止化城而已自悞不了有悞他人於心何忍能不畏佛誑語之戒乎未了禪和見圓明此說當各各自省自問知愧知勉發勇猛心務踏向上一關討箇大休大歇續佛慧命亦不枉出家參學父母之生身大丈夫三字也況南泉分明道破歸家盡是兒孫事祖父從來不出門但者一句不可錯會若言此皮袋中有一祖父不出此皮袋之門如此見解何異坐井窺天蒙眼拽磨此言山川草木祖父不出山川草木之門龍鳳鯤鵬祖父不出龍鳳鯤鵬之門亭臺屋宇祖父不出亭臺屋宇之門鳥獸昆蟲祖父不出鳥獸昆蟲之門虗空祖父不出虗空之門塵剎祖父不出塵剎之門也若然則有情無情物物俱有祖父各不出其門則此皮袋亦萬有中之一物亦自然有不出門之祖父也如是參如是悟始得不見臨濟道有一人在途中不離家舍有一人在家舍不離途中會得此二人方得會不出門底祖父且道作麼生會折合歸來炭裏坐再道作麼生歸只是不歸歸便得故鄉風月有誰爭喝一喝云刀斧斫不開經教語句人人皆知為指月標渡河筏既見道已皆知標筏而捨之孰不知此乃外標筏也如我此一見乃自身之內標筏而人不知捨也何則經云知見無見方是無漏真性又云見見之時見非是見所以道迷時師渡悟時自渡學者不可草草凡學世間事非用心之至學不能成學既得成必到得信手拈來無事於心無心於事方名精純悟出世間法非無心之至悟不能徹悟既得徹必到得隨緣應物有法皆心有心皆法方名究竟圓明此說未具眼者觀之大似妄談般若孰不知古人云莫謂無心便是道無心翻隔萬重山不妨重為註破凡夫以幻心為幻事至極則無心地位迷之而不收入覺道人泯幻心究真如至極則真心地位覺之而不放入迷正所謂常惺惺常歷歷此境界乃佛說如是住如是持如是信解如是奉行者從上提唱三印多言上士聞道如印印空中士聞道如印印水下士聞道如印印泥者圓明以為不然接初機下士如印印空接進步中士如印印水接回途上士如印印泥何則若言下士執有滯句為印泥何可言聞道也自在諸方作者檢點在學人初聞道空境易空心難究竟則空心易空境難空境而不空心到處為礙空心而不空境觸途成滯不見道心空及第應知心外復有何物而可空物外復有何心而可空所以云我自無心於萬物何妨萬物常圍繞少有分別心則非第一義若不如是必不能守妙明心地要會不難但辦信心即在目前夫生滅心乃生死本凡所對待因緣善惡是非人我彼此憎愛取捨皆是無明生滅識性本地妙明真心中實無這些葛藤學道之人但能識得本心看破生滅幻心即明生死之理若能了辦生滅幻心即超生死之道看破謂見了辦謂成其途路中無修守之修守若非踏破重關物我一如亦不可輕言易也其強作主宰輩與下士聞道大笑者何殊凡入道者諦自省可也此一件事若與語默邊會總沒交涉初學欲了明此事務將聰明知解語言文字盡情拋開的確一字用他不著淨名經云依於義不依語能如是直心而入必得了明將此為入道之基但既入矣又不可以默為究竟云此一事不在語句上便務靜觀心又所謂逃坑落塹也所以經云雖復不以言語道亦復不著無言說何則語言乃色相之名若不能徹其名焉能徹其體果能徹其體自能徹其名語默二見不除皆為障道之因聊述前後堦級次第上根大器者自能領會直踏華藏焉凡夫種田從地上耕種道人種田從地下耕種凡田賴時雨滋長禾苗聖田需法雨收獲籽粒務心田者諦審思之設有增上慢人道求心了不可得更有何田可耕可種則未免辜負圓明此數句說話也自有真實修行明眼人辨取在學者參悟見道頃刻之間便可明生死幻妄之因識得即生死而離生死之理然明雖在一時而了不可限期真心若不修無修幻身何得證無證所以道祖言外其身而身存寒山大士言易者易其形夫外易之道有二有從內而外身易形之道有從外而外身易形之道若執內之外易則似滯殻迷封若執外之外易則似癡狂外走若不明二種外易之道但囫圇排撥復不力行行業則饒伊經千生百劫亦不過空言明知生不是生死不是死為何被生死之所流轉委之其力未充而已擬欲脚踏實地了明生死不能也且將二種內外外身易形之理試體會看若也體會得出許汝明佛仙一貫之道若也不能體會不可執狂空以欺己欺人也即圓明亦不敢自言了證但所見實有確據願與同見者期共勉同行云爾十月初五日祖師誕辰王云達摩大士乃我震旦大恩初祖西歸時復慈留隻履我東土百千萬億眾生而祖履亦化為百千萬億隻履人人惠之現今各各在目前為何諸人負恩辜德一一棄之不顧況當年祖師九載所面之壁亦日日在各各面前何不體究若也不會圓明今日與諸人露箇消息參透會穿王云學道之人識心不了不著有便著無不著此二種便於有無之間博量卜度及自覺得此病又在非有非無處著倒所以古人諄諄垂訓令離四句之說四句者乃有無非有非無亦有亦無是也若透得此四句如何保任遇一切諸法有我亦隨順與之有却不被此有所礙遇一切諸法無我亦隨順與之無亦非世俗虗豁之無遇一切諸法亦有亦無我亦隨順與之亦有亦無不作凡情戲論遇一切諸法非有非無我亦隨順與之非有非無且非互相背違此淨名所云外道六師所墮汝亦隨墮是也若不如是不得輕言離四句也珍重一日偶云十方薄伽梵一路涅槃門從來拈提此旨乾峰拄杖一畫為最但未免太隱圓明今日重開一面年牙相似體烏鳥不同心且道與乾峰同耶異耶若檢點得出許汝解涅槃門一路天無心覆而普葢地無心載而普擎三光無心明而普照聖人無心用而普應聖凡之殊絲毫之隔只在有心無心之別耳所以道人能常清淨天地悉皆歸何況其他萬有諸法與吾為礙為滯也既為人矣何不則天象地法三光作一真人不亦快歟有一從者進云恁麼則王爺自能超凡入聖也王云惡是何言哉曰聖一字則余豈敢修而不倦誨人不厭或可謂云爾已矣有問如何是無位真人王云貪復云此一字已繪出無位真人行樂了也若也不識只得蛇足一上言無位真人者本非無位強名之曰無位耳若言有位却是無位說他無位却是有位要識無位真人須從有位中會譬如一人不住東南西北四位立在者裏若東望此人則謂之西西望此人則謂之東南北亦然此乃逃一位而墮四位也上下亦然乃至塵塵剎剎亦然然則塵塵剎剎盡是有位真人舉一言是有位真人則百千萬億為無位真人也從此一一推而廣之將何為有位真人也既不可名有位真人豈非無位真人而何所以無位真人之名如此而立乃從有位真人而得此名也所以有因無有無因有無無即是有有即是無若於有無之外另覓無位真人保汝覓到驢年亦不得夢見在若也不會參有僧問無位真人如何保護王默然良久僧云懇乞指示王云護真但化妄妄化自皈真緜緜化導去妄盡即全真真名因妄立妄盡何名真一真不自立是名為護真云王爺還是演教還是酬機王云先演教後酬機云衲子分疏不下王云觀音千手千眼大師會得也無云會不得王云若也不會圓明八萬四千張口理應分疏不下僧禮謝王笑云何不道今日纔見多口親王僧問不與萬法為侶者是什麼人王云者句也須吞却僧云不解王云閉眼鑽入恒沙裏僧云恁麼則馬祖云一口吸盡西江水悞矣王云中人以下果不可以語上也僧問不是心不是佛不是物畢竟是什麼王云是六僧云如是如是去也王云還添減些子纔得圓中秋僧問清淨本然云何忽生山河大地王云只此十二字也少他不得僧云作麼生行履王云客來我便出何怕不相親僧云向上還有事也無王云切忌賞中秋僧拍手王云我醉欲眠君且去除夕有一僧問如何是父母未生前本來面目王云歲月蹉跎何暇戲論云小僧是至心真實請問王云來年此月此日此時向汝道僧禮謝王取筆簽一押云立此存照歲底王至柏林書春福散眾一僧至云一大藏經盡被王爺布施了也王隨手執筆自向額上一點僧云王為何自己點額王云自己點了免被他人點僧云作家王爺今日大有人我在王指額點云者點的是我是人僧慚惶作禮王急取烏帕拭淨墨點又一僧出云金不博金王爺為何將烏帕拭墨王云仁者到諸方切不可舉圓明分黑疏白僧云衲子不敢王云水洗水也有一老僧在傍云王爺真正仙機王云仙機與否無據情知你不解佛話又一僧云請王爺道佛話看王云且書壽字僧云王書底是福字何得言壽字王云不見道人間五福壽為先老僧復拍手笑云有趣王云八十公公嚼秫稭老僧云貧衲實不解此語王云老老大大何曾嘗著些滋味眾笑無語王云今日無端頻遭點額一日較射眾皆空發惟一善射護衛矢矢中的射畢論賞罰王罰善射者而賞眾者云僕矢皆中的何翻受罰耶王云余所論者中地汝所論者中的何得不罰汝也者云若如是論則易事也王云原係易事誰教汝自己為難眾皆大笑乃厚賞善射者一日王賞花飲酒晚歸寢室呼從者點燈來從者擎燈入室王將燈吹滅云點燈來者重燃燈方至王復吹滅云點燈來者云王醉也王喝云速點燈來者急復燃燈入室擎立王云燈下仔細觀看余醉也乃汝醉也一日網魚從者將所網之魚呈獻王云網得之水何不一併呈來者云網何可網水王云水不可網魚如何可網得者笑云此魚即是網網得王云網呢者云在池邊王云可惜許令從者將魚擔去放生從者一人問參禪悟道惟覓一真我如何是真我請王指示王云水重水銀輕者云豈有水重似水銀之理王云若如汝說大海裏盡是水銀那者云總算自然水多水銀少王云癡人誰不教你總算一日晚有侍從一人求請開示明心見性之法王云大海裏張燈捕魚蝦去即得從者云水裏何可張燈王云水裏既不可張燈心如何可明性如何可見者云若如是明心見性之理無耶王云不是無是理只是無有是理者云某甲更糊塗不解矣王問云月上也未答云月尚未上王云待月上時再向汝道有僧請示問云踏破虗空向後作麼生行履王云合大體去僧云設如有箇直入千峰萬峰的還有事也無王云牛過窗櫺僧云莫是安身立命處麼王云身亦非身命亦非命僧云被貧衲勘破王爺伎倆了也王云大士今日如何喚余僧
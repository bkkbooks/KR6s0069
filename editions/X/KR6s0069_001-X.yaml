戴笠子執錫遶師三帀曰道得即下笠子如是三問師皆無對尼便去師曰日勢稍晚何不且住尼曰道得即住師又無對尼去後師歎曰我雖處丈夫之形而無丈夫之氣不如棄庵往諸方參尋知識去其夜山神告曰不須離此將有肉身菩薩來後天龍和尚到庵師乃迎禮龍豎一指示之師當下大悟自此凡有學者參問師惟舉一指無別提唱有一供過童子每見人問事亦豎指祗對人謂師曰和尚童子亦會佛法凡有問皆如和尚豎指師一日潛袖刀子問童曰聞你會佛法是否童曰是師曰如何是佛童豎起指頭師以刀斷其指童叫喚走出師召童子童回首師曰如何是佛童舉手不見指頭豁然大悟師將順世謂眾曰吾得天龍一指頭禪一生用不盡仰山慧寂通智禪師師坐次有僧翹一足云西天二十八祖亦如是唐土六祖亦如是天下老和尚亦如是某甲亦如是師下禪牀打四籐條師謂第一座曰不思善不思惡正恁麼時作麼生座曰正恁麼時是某甲放身命處師曰何不問老僧座曰正恁麼時不見有和尚師曰扶我教不起香嚴智閑禪師師參溈山山問我聞汝在百丈先師處問一答十問十答百此是汝聰明靈利意解識想生死根本父母未生時試道一句看師被一問直得茫然歸寮將平日看過文字從頭尋一句酬對竟不能得乃自歎曰畫餅不可充飢屢乞溈山說破山曰我若說似汝汝已後罵我去我說底是我底終不干汝事師遂將平昔所看文字燒却曰此生不學佛法也且作箇長行粥飯僧免役心神乃泣辭溈山過南陽覩忠國師遺跡遂憩止焉一日芟除草木偶拋瓦礫擊竹作聲忽然省悟遽歸沐浴焚香遙禮溈山讚曰和尚大慈恩踰父母當時若為我說破何有今日之事乃有頌曰一擊忘所知更不假修持動容揚古路不墮悄然機處處無踪跡聲色外威儀諸方達道者咸言上上機溈山聞得謂仰山曰此子徹也仰曰此是心機意識著述得成待某甲親自勘過仰後見師曰和尚讚歎師弟發明大事你試說看師舉前頌仰曰此是夙習記持而成若有正悟別更說看師又頌曰去年貧未是貧今年貧始是貧去年貧猶有卓錐之地今年貧錐也無仰曰如來禪許師弟會祖師禪未夢見在師復頌曰我有一機瞬目視伊若人不會別喚沙彌仰乃報溈山曰且喜閑師弟會祖師禪也上堂若論此事如人上樹口銜樹枝脚不蹋枝手不攀枝樹下忽有人問如何是祖師西來意不對他又違他所問若對他又喪身失命當恁麼時作麼生即得時有虎頭招上座出眾云樹上即不問未上樹時請和尚道師乃呵呵大笑徑山洪諲禪師佛日長老訪師師問伏承長老獨化一方何以薦遊峯頂日曰朗月當空挂冰霜不自寒師曰莫是長老家風也無日曰峭峙萬重關於中含寶月師曰此猶是文言作麼生是長老家風日曰今日賴遇佛日却問隱密全真時人知有道不得太省無辜時人知有道得於此二途猶是時人陞降處未審和尚親道自道如何道師曰我家道處無可道日曰如來路上無私曲便請玄音和一場師曰任汝二輪更互照碧潭雲外不相關日曰為報白頭無限客此回年少莫歸鄉師曰老少同倫無向背我家玄路勿參差日曰一言定天下四句為誰宣師曰汝言有三四我道其中一也無師因有偈曰東西不相顧南北與誰留汝言有三四我道一也無僧問掩息如灰時如何師曰猶是時人功幹曰幹後如何師曰耕人田不種曰畢竟如何師曰禾熟不臨場許州全明上座先問石霜一毫穿眾穴時如何石霜曰直須萬年去曰萬年後如何石霜曰登科任汝登科拔萃任汝拔萃後問師曰一毫穿眾穴時如何師曰光靴任汝光靴結果任汝結果僧問如何是長師曰千聖不能量曰如何是短師曰蟭螟眼裏著不滿其僧不肯便去舉似石霜石霜曰祇為太近實頭僧却問石霜如何是長石霜曰不屈曲曰如何是短石霜曰雙陸盤中不喝彩定山神英禪師師因樹省和尚行脚時參問不落數量請師道師提起數珠曰是落不落省曰圓珠三竅時人知有請師圓前話師便打省拂袖便出師曰三十年後槌胸大哭去在省住後示眾曰老僧三十年前至定山被他熱謾一上不同小小京兆七師米和尚師參學後歸受業寺有老宿問月中斷井索時人喚作蛇未審七師見佛喚作甚麼師曰若有佛見即同眾生老宿曰千年桃核王敬初常侍公視事次米和尚至公乃舉筆示之米曰還判得虗空否公擲筆入宅更不復出米致疑明日憑鼓山供養主入探其意米亦隨至潛在屏蔽間偵伺供養主纔坐問曰昨日米和尚不審有甚麼言句便不相見公曰師子齩人韓盧逐塊米聞此語即省前繆遽出朗笑曰我會也我會也公曰會即不無你試道看米曰請常侍舉公乃豎起一隻箸米曰這野狐精公曰這漢徹也御選歷代禪師語錄後集中臨濟義玄禪師師問黃檗佛法大意三度問三度被打師辭黃檗檗曰不須他去祇往高安灘頭參大愚必為汝說師到大愚愚曰甚處來師曰黃檗來愚曰黃檗有何言句師曰某甲三度問佛法的的大意三度被打不知某甲有過無過愚曰黃檗與麼老婆心切為汝得徹困更來這裏問有過無過師於言下大悟乃曰元來黃檗佛法無多子愚搊住曰這尿牀鬼子適來道有過無過如今却道黃檗佛法無多子你見箇甚麼道理速道速道師於大愚肋下築三拳愚拓開曰汝師黃檗非干我事師辭大愚却回黃檗黃檗一日普請次師隨後行檗回頭見師空手乃問钁在何處師云有一人將去了也檗曰近前來共汝商量箇事師便近前檗豎起钁曰祇這箇天下人拈掇不起師就手掣得豎起曰為甚麼却在某甲手裏檗曰今日自有人普請便回寺師一日在僧堂前坐見黃檗來便閉却目黃檗乃作悕勢便歸方丈師隨至方丈禮謝首座在黃檗處侍立黃檗云此僧雖是後生却知有此事首座云老和尚脚跟不點地却證據箇後生黃檗自於口上打一摑首座云知即得師在僧堂裏睡檗入堂見以拄杖打板頭一下師舉首見是檗却又睡檗又打板頭一下却往上間見首座坐禪乃曰下間後生却坐禪汝在這裏妄想作麼座曰這老漢作甚麼檗又打板頭一下便出去黃檗因入廚下問飯頭作甚麼頭曰揀眾僧飯米檗曰一頓喫多少頭曰二石五檗曰莫太多麼頭曰猶恐少在檗便打頭舉似師師曰吾與汝勘這老漢纔到侍立檗舉前話師曰飯頭不會請和尚代轉一語檗曰汝但舉師曰莫太多麼檗曰來日更喫一頓師曰說甚麼來日即今便喫隨後打一掌檗曰這風顛漢又來這裏捋虎鬚師喝一喝便出去師半夏上黃檗山見檗看經師曰我將謂是箇人元來是唵黑豆老和尚住數日乃辭檗曰汝破夏來何不終夏去師曰某甲暫來禮拜和尚檗便打趁令去師行數里疑此事却回終夏後又辭檗檗曰甚處去師曰不是河南便歸河北檗便打師約住與一掌檗大笑乃喚侍者將百丈先師禪板几案來師曰侍者將火來檗曰不然子但將去已後坐斷天下人舌頭去在到三峯平和尚處平問甚處來師曰黃檗來平曰黃檗有何言句師曰金牛昨夜遭塗炭直至如今不見蹤平曰金風吹玉管那箇是知音師曰直透萬重關不住青霄內平曰子這一問太高生師曰龍生金鳳子衝破碧瑠璃平曰且坐喫茶又問近離甚處師曰龍光平曰龍光近日如何師便出去到鳳林林曰有事相借問得麼師曰何得剜肉作瘡林曰海月澄無影遊魚獨自迷師曰海月既無影遊魚何得迷林曰觀風知浪起玩水野帆飄師曰孤蟾獨耀江山靜長嘯一聲天地秋林曰任張三寸揮天地一句臨機試道看師曰路逢劍客須呈劍不是詩人莫獻詩林便休師乃有頌曰大道絕同任向西東石火莫及電光罔通到大慈慈在方丈內坐師問端居丈室時如何慈云寒松一色千年別野老拈花萬國春師云今古永超圓智體三山鎖斷萬重關慈便喝師亦喝慈云作麼師拂袖便出到明化化問來來去去作甚麼師云祇圖踏破草鞋化云畢竟作麼生師云老漢話頭也不識到金牛牛見師來橫按拄杖當門踞坐師以手敲拄杖三下却歸堂中第一位坐牛下來見乃問夫賓主相看各具威儀上座從何而來太無禮生師云老和尚道甚麼牛擬開口師便打一坐具牛作倒勢師又打一坐具牛曰今日不著便遂歸方丈師住鎮州臨濟學侶雲集一日謂普化克符二上座曰我欲於此建立黃檗宗旨汝等成褫我二人珍重下去三日後普化却上來問和尚三日前說甚麼師便打三日後克符上來問和尚三日前打普化作麼師亦打師曰有時一喝如金剛王寶劍有時一喝如踞地獅子有時一喝如探竿影草有時一喝不作一喝用汝作麼生會僧擬議師便喝上堂次兩堂首座相見同時下喝僧問師還有賓主也無師曰賓主歷然師召眾曰要會臨濟賓主句問取堂中二首座示眾我有時先照後用有時先用後照有時照用同時有時照用不同時先照後用有人在先用後照有法在照用同時驅耕夫之牛奪飢人之食敲骨取髓痛下針錐照用不同時有問有答立賓立主合水和泥應機接物若是過量人向未舉已前撩起便行猶較些子上堂赤肉團上有一無位真人常從汝等面門出入未證據者看看時有僧出問如何是無位真人師下禪牀把住云道道其僧擬議師托開云無位真人是甚麼乾矢橛便歸方丈僧問如何是佛法大意師豎起拂子僧便喝師便打又僧問如何是佛法大意師亦豎起拂子僧便喝師亦喝僧擬議師便打乃曰大眾夫為法者不避喪身失命我於黃檗先師處三度問佛法的的大意三度被打如蒿枝拂相似如今更思一頓誰為下手時有僧出曰某甲下手師度與拄杖僧擬接師便打有一老宿參便問禮拜即是不禮拜即是師便喝宿便拜師曰好箇草賊宿曰賊賊便出去師曰莫道無事好時首座侍立師曰還有過也無座曰有師曰賓家有過主家有過曰二俱有過師曰過在甚麼處座便出去師曰莫道無事好大覺到參師舉起拂子覺敷坐具師擲下拂子覺收坐具參堂去僧眾曰此僧莫是和尚親不禮拜又不喫棒師聞令喚覺覺至師曰大眾道汝不禮拜又不喫棒莫是長老親故覺乃珍重下去師問院主甚麼處去來曰州中糶黃米來師曰糶得盡麼曰糶得盡師以拄杖劃一劃曰還糶得這箇麼主便喝師便打典座至師舉前話座曰院主不會和尚意師曰你又作麼生座禮拜師亦打同普化赴施主齋次師問毛吞巨海芥納須彌為復是神通妙用為復是法爾如然化趯倒飯牀師曰太麤生曰這裏是甚麼所在說麤說細次日又同赴齋師復問今日供養何似昨日化又趯倒飯牀師曰得即得太麤生化喝曰瞎漢佛法說甚麼麤細師乃吐舌師與河陽木塔長老同在僧堂地爐內坐因說普化每日在街市掣風掣顛知他是凡是聖言猶未了普化入來師便問汝是凡是聖普化云汝且道我是凡是聖師便喝普化以手指云河陽新婦子木塔老婆禪臨濟小廝兒却具一隻眼師云者賊普化云賊賊便出去一日普化在僧堂前喫生菜師見云大似一頭驢普化便作驢鳴師謂直歲云細抹草料著普化云少室人不識金陵又再來臨濟一隻眼到處為人開師問杏山如何是露地白牛山曰吽吽師曰啞那山曰長老作麼師曰者畜生麻谷問大悲千手眼那箇是正眼師搊住曰大悲千手眼作麼生是正眼速道速道谷拽師下禪牀却坐師問訊曰不審谷擬議師便喝拽谷下禪牀却坐谷便出石霜慶諸禪師師抵溈山為米頭一日篩米次溈曰施主米莫拋撒師曰不拋撒溈於地上拾得一粒曰汝道不拋撒這箇是甚麼師不對溈又曰莫輕這一粒百千粒盡從這一粒生師曰百千粒從這一粒生未審這一粒從甚麼處生溈呵呵大笑歸方丈溈至晚上堂曰大眾米裏有蟲諸人好看因僧自洞山來師問和尚有何言句示徒曰解夏上堂云秋初夏末兄弟或東去西去直須向萬里無寸草處去復良久曰祇如萬里無寸草處作麼生去師曰有人下語否曰無師曰何不道出門便是草師在方丈內僧在窗外問咫尺之間為甚麼不覩師顏師曰徧界不曾藏僧舉問雪峯徧界不曾藏意旨如何峯曰甚麼處不是石霜師聞曰這老漢著甚死急峯聞曰老僧罪過僧問三千里外遠聞石霜有箇不顧師曰是曰祇如萬象歷然是顧不顧師曰我道不驚眾曰不驚眾是與萬象合如何是不顧師曰徧界不曾藏雲葢問萬戶俱閉即不問萬戶俱開時如何師曰堂中事作麼生曰無人接得渠師曰道也太煞道也只道得八九成曰未審和尚作麼生道師曰無人識得渠問僧近離甚處曰審道師於面前畫一畫曰汝刺脚與麼來還審得這箇麼曰審不得師曰汝衲衣與麼厚為甚却審這箇不得曰某甲衲衣雖厚爭奈審這箇不得師曰與麼則七佛出世也救你不得曰說甚七佛千佛出世也救某甲不得師曰太懵懂生曰爭奈呢師曰參堂去僧曰喏喏示眾初機未覯大事先須識取頭其尾自至疏山仁參問如何是頭師曰直須知有曰如何是尾師曰盡却今時曰有頭無尾時如何師曰吐得黃金堪作甚麼曰有尾無頭時如何師曰猶有依倚在曰直得頭尾相稱時如何師曰渠不作箇解會亦未許渠在漸源仲興禪師一日寶葢和尚來訪師便捲起簾子在方丈內坐葢一見乃下却簾便歸客位師令侍者傳語長老遠來不易猶隔津在葢擒住持者與一掌者曰不用打某甲有堂頭和尚在葢曰為有堂頭老漢所以打你者回舉似師師曰猶隔津在夾山善會禪師師會下有一僧到石霜入門便道不審霜曰不必闍黎僧云與麼則珍重又到巖頭亦云不審頭乃噓兩聲僧云與麼則珍重纔回步頭云雖是後生亦能管帶其僧歸舉似師師明日陞堂乃喚昨日從石霜巖頭來底阿師出來如法舉前話僧舉了師云大眾還會麼若無人道老僧不惜兩莖眉毛道去也乃云石霜雖有殺人刀且無活人劍巖頭亦有殺人刀亦有活人劍上堂我二十年住此山未曾舉著宗門中事有僧問承和尚有言二十年住此山未曾舉著宗門中事是否師曰是僧便掀倒禪牀師休去至明日普請掘一坑令侍者請昨日僧至曰老僧二十年說無義語今日請上座打殺老僧埋向坑裏便請便請若不打殺老僧上座自著打殺埋在坑中始得其僧歸堂束裝潛去虎頭上座參師問甚處來曰湖南來師曰曾到石霜麼曰要路經過爭得不到師曰聞石霜有毬子話是否曰和尚也須急著眼始得師曰作麼生是毬子曰跳不出師曰作麼生是毬杖曰沒手足師曰且去老僧未與闍黎相見明日升座師曰昨日新到在麼頭出應諾師曰目前無法意在目前不是目前法非耳目之所到頭曰今日雖問要且不是師曰片月難明非關天地頭曰莫𡱰沸便作掀禪牀勢師曰且緩緩虧著上座甚麼處頭豎起拳曰目前還著得這箇麼師曰作家作家頭又作掀禪牀勢師曰大眾看這一員戰將若是門庭布列山僧不如他若據入理之談也較山僧一級地德山宣鑒禪師師擔青龍䟽鈔出蜀至澧陽路上見一婆子賣餅因息肩買餅點心婆指擔曰這箇是甚麼文字師曰青龍疏鈔婆曰講何經師曰金剛經婆曰我有一問你若答得施與點心若答不得且別處去金剛經道過去心不可得現在心不可得未來心不可得未審上座點那箇心師無語師至龍潭上法堂曰久嚮龍潭及乎到來潭又不見龍又不現潭引身曰子親到龍潭師無語遂棲止焉一夕侍立次潭曰更深何不下去師珍重便出却回曰外面黑潭點紙燭度與師師擬接潭復吹滅師於此大悟便禮拜潭曰子見箇甚麼師曰從今向去更不疑天下老和尚舌頭也潭謂眾曰可中有箇漢牙如劍樹口似血盆一棒打不回頭他時向孤峯頂上立吾道去在師將疏鈔堆法堂前舉火炬曰窮諸玄辯若一毫置於太虗竭世樞機似一滴投於巨壑遂焚師抵溈山挾複子上法堂從西過東從東過西曰有麼有麼山坐次殊不顧盻師曰無無便出至門首乃曰雖然如此也不得草草遂具威儀再入相見纔跨門提起坐具曰和尚山擬取拂子師便喝拂袖而出溈山至晚問首座今日新到在否座曰當時背却法堂著草鞋出去也山曰此子已後向孤峯頂上盤結草庵呵佛罵祖去在小參示眾曰今夜不答話問話者三十棒時有僧出禮拜師便打僧曰某甲話也未問和尚因甚麼打某甲師曰汝是甚麼處人曰新羅人師曰未跨船絃好與三十棒示眾道得也三十棒道不得也三十棒臨濟聞得謂洛浦曰汝去問他道得為甚麼也三十棒待伊打汝接住棒送一送看伊作麼生浦如教而問師便打浦接住送一送師便歸方丈浦回舉似臨濟濟曰我從來疑著這漢雖然如是你還識德山麼浦擬議濟便打龍牙問學人仗鏌鎁劍擬取師頭時如何師引頸近前曰㘞牙曰頭落也師呵呵大笑牙後到洞山舉前話山曰德山道甚麼牙曰德山無語洞曰莫道無語且將德山落底頭呈似老僧看牙方省便懺謝有僧舉似師師曰洞山老人不識好惡這漢死來多少時救得有甚麼用處有僧相看乃近前作相撲勢師曰與麼無禮合喫山僧手裏棒僧拂袖便行師曰饒汝如是也祗得一半僧轉身便喝師曰須是我打你始得曰諸方有明眼人在師曰天然有眼僧擘開眼曰猫便出師曰黃河三千年一度清僧參師問維那今日幾人新到曰八人師曰喚來一時生按著上堂及盡知也直得三世諸佛口挂壁上猶有一人呵呵大笑若識此人參學事畢示眾有言時騎虎頭收虎尾第一句下明宗旨無言時覿露機鋒如同電拂師因疾僧問還有不病者也無師曰有曰如何是不病者師曰阿㖿阿㖿師復告眾曰捫空追響勞汝心神夢覺覺非竟有何事洞山良价悟本禪師師初行脚時路逢一婆擔水師索水飲婆曰水不妨飲婆有一問須先問過且道水具幾塵師曰不具諸塵婆云去休污我水擔他日因供養雲巖真次僧問先師道祗這是莫便是否師曰是曰意旨如何師曰當時幾錯會先師意曰未審先師還知有也無師曰若不知有爭解恁麼道若知有爭肯恁麼道雲巖諱日營齋僧問和尚於雲巖處得何指示師曰雖在彼中不蒙指示曰既不蒙指示又用設齋作甚麼師曰爭敢違背他曰和尚初見南泉為甚麼却與雲巖設齋師曰我不重先師道德佛法祇重他不為我說破曰和尚為先師設齋還肯先師也無師曰半肯半不肯曰為甚麼不全肯師曰若全肯即孤負先師也師與泰首座冬節喫果子次乃問有一物上拄天下拄地黑似漆常在動用中動用中收不得且道過在甚麼處泰曰過在動用中師喚侍者掇退果桌問雪峯從甚處來曰天台來師曰見智者否曰義存喫鐵棒有分雪峯上問訊師曰入門來須有語不得道早箇入了也峯曰某甲無口師曰無口且從還我眼來峯無語雪峯搬柴次乃於師面前拋下一束師曰重多少峯曰盡大地人提不起師曰爭得到這裏峯無語洗鉢次見兩烏爭蝦蟆有僧便問這箇因甚麼到恁麼地師曰祗為闍黎問三身之中阿那身不墮眾數師曰吾嘗於此切陳尚書問師五十二位菩薩中為甚麼不見妙覺師曰尚書親見妙覺官人問有人修行否師曰待公作男子即修行師有時曰體得佛向上事方有些子語話分僧問如何是語話師曰語話時闍黎不聞曰和尚還聞否師曰不語話時即聞僧問如何是佛向上人師曰非佛師不安令沙彌傳語雲居乃屬曰他或問和尚安樂否但道雲巖路相次絕也汝下此語須遠立恐他打汝沙彌領旨去傳語聲未絕早被雲居打一棒將圓寂謂眾曰吾有閒名在世誰人為吾除得眾皆無對時沙彌出曰請和尚法號師曰吾閒名已謝睦州刺史陳操尚書公問僧有箇事與上座商量得麼曰合取狗口公自摑口曰某甲罪過曰知過必改公曰恁麼則乞上座口喫飯得麼齋次拈起胡餅問僧江西湖南還有這箇麼曰尚書適來喫箇甚麼公曰敲鐘謝響又與僚屬登樓次見數僧行來有一官人曰來者總是行脚僧公曰不是曰焉知不是公曰待來勘過須臾僧至樓前公驀喚上座僧皆舉首公謂諸官曰不信道無著文喜禪師師往五臺山華嚴寺至金剛窟禮謁遇一老翁牽牛而行邀師入寺翁呼均提有童子應聲出迎翁縱牛引師陞堂堂宇皆耀金色翁踞牀指繡墩命坐翁曰近自何來師曰南方翁曰南方佛法如何住持師曰末法比丘少奉戒律翁曰多少眾師曰或三百或五百師却問此間佛法如何住持翁曰龍蛇混雜凡聖同居師曰多少眾翁曰前三三後三三翁呼童子致茶并進酥酪師食之覺心意開爽翁拈起玻瓈盞問曰南方還有這箇否師曰無翁曰尋常將甚麼喫茶師無對辭退翁令童子相送師問童子前三三後三三是多少童召大德師應諾童曰是多少師復問曰此為何處童曰此金剛窟般若寺也師悽然悟彼翁者即文殊也不可再見即稽首童子願乞一言為別童說偈曰面上無瞋供養具口裏無瞋吐妙香心裏無瞋是珍寶無垢無染是真常言訖均提與寺俱隱但見五色雲中文殊乘金毛師子往來忽有白雲自東方來覆之不見師因駐錫五臺後參仰山頓了心契令充典座文殊嘗現於粥鑊上師以攪粥篦便打曰文殊自文殊文喜自文喜殊乃說偈曰苦瓠連根苦甜瓜徹蔕甜修行三大劫却被老僧嫌一日有異僧來求齋食師減己分饋之仰山預知問曰適來果位人至汝給食否師曰輟己回施仰曰汝大利益霍山景通禪師有行者問如何是佛法大意師乃禮拜行者曰和尚為甚麼禮俗人師曰汝不見道尊重弟子興化存獎禪師師到大覺為院主一日覺喚院主我聞你道向南方行脚一遭拄杖頭不曾撥著一箇會佛法底你憑箇甚麼道理與麼道師便喝覺便打師又喝覺又打師來日從法堂過覺召院主我直下疑你昨日這兩喝師又喝覺又打師再喝覺亦打師曰某甲於三聖師兄處學得箇賓主句總被師兄折倒了也願與某甲箇安樂法門覺曰這瞎漢來這裏納敗缺脫下衲衣痛打一頓師於言下薦得臨濟先師在黃檗處喫棒底道理師後開堂日拈香曰此一炷香本為三聖師兄三聖於我太孤本為大覺師兄大覺於我太賒不如供養臨濟先師師謂克賓維那曰汝不久為唱導之師賓曰不入這保社師曰會了不入不會了不入曰總不與麼師便打曰克賓維那法戰不勝罰錢五貫設饡飯一堂次日師自白椎曰克賓維那法戰不勝不得喫飯即便出院示眾曰若是作家戰將便請單刀直入更莫如何若何有旻德禪師出禮拜起便喝師亦喝德又喝師亦喝德禮拜歸眾師曰適來若是別人三十棒一棒也較不得何故為他旻德會一喝不作一喝用師見同參來纔上法堂師便喝僧亦喝師又喝僧亦喝師近前拈棒僧又喝師曰你看這瞎漢猶作主在僧擬議師直打下法堂侍者請問適來那僧有甚觸忤和尚師曰他適來也有權也有實也有照也有用及乎我將手向伊面前橫兩橫到這裏却去不得似這般瞎漢不打更待何時僧禮拜後唐莊宗車駕幸河北回至魏府行宮詔師問曰朕收中原獲得一寶未曾有人酬價師曰請陛下寶看帝以兩手舒幞頭脚師曰君王之寶誰敢酬價宗大悅鎮州寶壽沼禪師師在方丈坐因僧問訊次師曰百千諸聖盡不出此方丈內曰祗如古人道大千沙界海中漚未審此方丈向甚麼處著師曰千聖現在曰阿誰證明師便擲下拂子僧從西過東立師便打僧曰若不久參焉知端的師曰三十年後此話大行師問僧甚處來曰西山來師曰見獼猴麼曰見師曰作甚麼伎倆曰見某甲一箇伎倆也作不得師便打三聖院慧然禪師師至仰山山問汝名甚麼師曰慧寂山曰慧寂是我名師曰我名慧然山大笑到德山纔展坐具山曰莫展炊巾這裏無殘羮餿飯師曰縱有也無著處山便打師接住棒推向禪牀上山大笑師哭蒼天便下參堂堂中首座號踢天泰問行脚高士須得本道公驗作麼生是本道公驗師曰道甚麼座再問師打一座具曰這漆桶前後觸忤多少賢良座擬人事師便過第二座人事問僧近離甚處僧便喝師亦喝僧又喝師又喝僧曰行棒即瞎便喝師拈棒僧乃轉身作受棒勢師曰下坡不走快便難逢便棒僧曰這賊便出去師遂拋下棒次有僧問適來爭容得這僧師曰是伊見先師來鎮州萬壽和尚師訪寶壽寶壽坐不起師展坐具寶壽下禪牀師却坐寶壽驟入方丈閉却門知事見師坐不起曰請和尚庫下喫茶師乃歸院翌日寶壽來復謁師踞禪牀寶壽展坐具師亦下禪牀寶壽却坐師歸方丈閉却門寶壽入侍者寮取灰圍却方丈門便歸去師遂開門見曰我不恁麼他却恁麼幽州談空和尚鎮州牧有姑為尼行脚回欲開堂為人牧令師勘過師問曰見說汝欲開堂為人是否尼曰是師曰尼是五障之身汝作麼生為人尼曰龍女八歲南方無垢世界成等正覺又作麼生師曰龍女有十八變你試一變看尼曰設使變得也祗是箇野狐精師便打牧聞舉乃曰和尚棒折那虎溪庵主僧問庵主在這裏多少年也師曰祗見冬凋夏長年代總不記得曰大好不記得師曰汝道我在這裏得多少年也曰冬凋長呢師曰鬧市裏虎桐峯庵主有老人入山參師曰住在甚處老人不語師曰善能對機老人地上拈一枝草示師師便喝老人禮拜師便歸庵老人曰與麼疑殺一切人在杉洋庵主有僧到參師問阿誰曰杉洋庵主師曰是我僧便喝師作噓聲僧曰猶要棒喫在師便打問僧甚麼處來曰江西來師豎起痒和子曰江西還有這箇麼僧拓膝閉目師曰東家廝兒却向西家使喚僧曰有口不煩賓主說師曰適來患聾而今患瘂僧曰買鐵得金一場富貴師曰客作無功未免逃避僧便行師曰自累猶可莫累老僧豁上座師參德山山纔見下禪牀作抽坐具勢師曰這箇且置或遇心境一如的人來向伊道箇甚麼免被諸方檢責山曰猶較昔日三步在別作箇主人公來師便喝山默然師曰塞却這老漢咽喉也拂袖便出九峯道虔禪師師為石霜侍者洎霜歸寂眾請首座繼住持師白眾曰須明得先師意始可座曰先師有甚麼意師曰先師道休去歇去冷湫湫地去一念萬年去寒灰枯木去古廟香罏去一條白練去其餘則不問如何是一條白練去座曰這箇祇是明一色邊事師曰元來未會先師意在座曰你不肯我那但裝香來香煙斷處若去不得即不會先師意遂焚香香煙未斷座已脫去師拊座背曰坐脫立亡即不無先師意未夢見在涌泉景欣禪師彊德二禪客於路次見師騎牛不識師忽曰蹄角甚分明爭奈騎者不鑒師驟牛而去彊德憩於樹下煎茶師回却下牛問曰二禪客近離甚麼處曰那邊師曰那邊事作麼生彊提起茶盞師曰此猶是這邊事那邊事作麼生彊無對師曰莫道騎者不鑒雲葢志元圓淨禪師僧問如何是獅子師曰善哮吼僧拊掌曰好手好手師曰青天白日却被鬼迷僧作掀禪牀勢師便打曰驢事未去馬事到來師曰灼然作家僧拂袖出師曰將甌盛水擬比大洋道吾問久嚮和尚會禪是否師曰蒼天蒼天吾近前掩師口曰低聲低聲師與一掌吾曰蒼天蒼天師把住曰得與麼無禮吾却與一掌師曰老僧罪過吾拂袖便行師呵呵大笑曰早知如是不見如是鳳翔石柱禪師師遊方時到洞山時虔和尚垂語曰有四種人一人說過佛祖一步行不得一人行過佛祖一句說不得一人說得行得一人說不得行不得阿那箇是其人師出眾曰一人說過佛祖行不得者祇是無舌不許行一人行過佛祖一句說不得者祗是無足不許說一人說得行得者祇是函葢相稱一人說不得行不得者如斷命求活此是石女兒披枷帶鎖山曰闍黎分上作麼生師曰該通分上卓卓寧彰山曰祗如海上明公秀又作麼生師曰幻人相逢拊掌呵呵張拙秀才士因禪月大師指參石霜霜問秀才何姓曰姓張名拙霜曰覓巧尚不可得拙自何來張忽有省乃呈偈曰光明寂照徧河沙凡聖含靈共我家一念不生全體現六根纔動被雲遮破除煩惱重增病趣向真如亦是邪隨順世緣無罣礙涅槃生死等空化洛浦元安禪師師抵涔陽遇故人因話武陵舊事問曰倏忽數年何處逃難師曰祗在闤闠中曰何不向無人處去師曰無人處有何難曰闤闠中如何逃避師曰雖在闤闠中要且人不識故人罔測龐居士禮拜起曰孟夏毒熱孟冬薄寒師曰莫錯士曰龐公年老師曰何不寒時道寒熱時道熱士曰患聾作麼師曰放你三十棒士曰啞却我口塞却你眼蛤溪道者相訪師問自從犁溪相別今得幾年溪曰和尚猶記得昔年事師曰見說道者總忘却年月也溪曰和尚住持事繁且容仔細看師曰打即打會禪漢溪曰某甲消得師曰道者住山事繁問一毫吞盡巨海於中更復何言師曰家有白澤之圖必無如是妖怪僧問供養百千諸佛不如供養一箇無心道人未審百千諸佛有何過無心道人有何德師曰一片白雲橫谷口幾多歸鳥盡迷巢上藍令超禪師僧問二龍爭珠誰是得者師曰其珠徧地目覩如泥黃山月輪禪師師謁夾山山問名甚麼師曰月輪山作一圓相曰何似這箇師曰和尚恁麼語話諸方大有人不肯在山曰闍黎作麼生師曰還見月輪麼山曰闍黎恁麼道此間大有人不肯諸方師乃服膺參訊一日夾山抗聲問曰子是甚麼處人師曰閩中人山曰還識老僧麼師曰和尚還識學人麼山曰不然子且還老僧草鞋錢然後老僧還子廬陵米價師曰恁麼則不識和尚也未委廬陵米作麼價山曰真師子兒善能哮吼乃入室受印韶山普寰禪師僧參師問莫是多口白頭因麼因曰不敢師曰有多少口曰通身是師曰尋常向甚麼處屙曰向韶山口裏屙師曰有韶山口即得無韶山口向甚麼處屙因無語師便打遵布衲訪師在山下相見遵問韶山路向甚麼處去師以手指曰嗚那青青黯黯處去遵近前把住曰久嚮韶山莫便是否師曰是即是闍黎有甚麼事遵曰擬伸一問師還答否師曰看君不是金牙作爭解彎弓射尉遲遵曰鳳凰直入煙霄去誰怕林間野兒師曰當軒畫鼓從君擊試展家風似老僧遵曰一句迥超千聖外松蘿不與月輪齊師曰饒君直出威音外猶較韶山半月程遵曰過在甚處師曰倜儻之辭時人知有遵曰恁麼則真玉泥中異不撥萬機塵師曰魯班門下徒施巧妙遵曰學人即恁麼未審師意如何師曰玉女夜拋梭織錦於西舍遵曰莫便是和尚家風也無師曰耕夫製玉漏不是行家作遵曰此猶是文言如何是和尚家風師曰橫身當宇宙誰是出頭人遵無語師遂同歸山纔人事了師召近前曰闍黎有衝天之氣老僧有入地之謀闍黎橫吞巨海老僧背負須彌闍黎按劍上來老僧掗鎗相待向上一路速道速道遵曰明鏡當臺請師一鑒師曰不鑒遵曰為甚不鑒師曰水淺無魚徒勞下釣遵無對師便打太原海湖禪師師因有人請灌頂三藏供養敷坐訖師乃就彼位坐時有雲涉座主問曰和尚甚麼年行道師曰座主近前來涉近前師曰祗如憍陳如是甚麼年行道涉茫然師喝曰這尿牀鬼投子感溫禪師師遊山見蟬蛻侍者問曰殻在這裏蟬向甚麼處去也師拈殻就耳畔搖三五下作蟬聲侍者於是開悟鄆州四禪禪師僧問古人有請不背今請和尚入井還背也無師曰深深無別源飲者消諸患鳳翔天葢幽禪師因有一院名無垢淨光造浴室有人問既是無垢淨光為甚麼却造浴室僧無語後請師代師曰三秋明月夜不是騁團圓巖頭全奯禪師師謁仰山纔入門提起坐具曰和尚仰山取拂子擬舉師曰不妨好手後參德山執坐具上法堂瞻視山曰作麼師便喝山曰老僧過在甚麼處師曰兩重公案乃下參堂山曰這箇阿師稍似箇行脚人至來日上問訊山曰闍黎是昨日新到否曰是山曰甚麼處學得這虗頭來師曰全奯終不自謾山曰他後不得辜負老僧一日參德山方跨門便問是凡是聖山便喝師禮拜有人舉似洞山山曰若不是奯公大難承當師曰洞山老人不識好惡錯下名言我當時一手擡一手搦雪峯在德山作飯頭一日飯遲德山擎鉢下法堂峯曬飯巾次見德山乃曰鐘未鳴鼓未響拓鉢向甚麼處去德山便歸方丈峯舉似師師曰大小德山未會末後句在山聞令侍者喚師去問汝不肯老僧那師密啟其意山乃休明日陞堂果與尋常不同師至僧堂前拊掌大笑曰且喜堂頭老漢會末後句他後天下人不奈伊何雖然也祗得三年活山果三年後示寂師與羅山卜塔基羅山中路忽曰和尚師回顧曰作麼山舉手指曰這裏好片地師咄曰瓜州賣瓜漢又行數里歇次山禮拜問曰和尚豈不是三十年前在洞山而不肯洞山師曰是又曰和尚豈不是嗣德山又不肯德山師曰是山曰不肯德山即不問祗如洞山有何虧缺師良久曰洞山好佛祗是無光山禮拜問三界競起時如何師曰坐却著曰未審師意如何師曰移取廬山來即向汝道僧問塵中如何辨主師曰銅䤬鑼裏滿盛油師值沙汰於鄂州湖邊作渡子兩岸各挂一板有人過渡打板一下師曰阿誰或曰要過那邊去師乃舞棹迎之一日因一婆抱一孩兒來乃曰呈橈舞棹即不問且道婆手中兒甚處得來師便打婆曰婆生七子六箇不遇知音祗這一箇也不消得便拋向水中牛頭微禪師上堂三世諸佛用一點伎倆不得天下老師口似匾擔諸人作麼生大不容易除非知有餘莫能知雪峯義存禪師師在洞山作飯頭淘米次山問淘沙去米淘米去沙師曰沙米一時去山曰大眾喫箇甚麼師遂覆却米盆山曰據子因緣合在德山洞山一日問師作甚麼來師曰斫槽來山曰幾斧斫成師曰一斧斫成山曰猶是這邊事那邊事作麼生師曰直得無下手處山曰猶是這邊事那邊事作麼生師休去師辭洞山山曰子甚處去師曰歸嶺中去山曰當時從甚麼路出師曰從飛猿嶺出山曰今回向甚麼路去師曰從飛猿嶺去山曰有一人不從飛猿嶺去子還識麼師曰不識山曰為甚麼不識師曰他無面目山曰子既不識爭知無面目師無對遂謁德山問從上宗乘學人還有分也無山打一棒曰道甚麼師曰不會至明日請益山曰我宗無語句實無一法與人師有省後與巖頭至澧州鰲山鎮阻雪頭每日祇是打睡師一向坐禪一日喚曰師兄師兄且起來頭曰作甚麼師曰今生不著便共文邃箇漢行脚到處被他帶累今日到此又祇管打睡頭喝曰噇眠去每日牀上坐恰似七村裏土地他時後日魔魅人家男女去在師自點胸曰我這裏未穩在不敢自謾頭曰我將謂你他日向孤峯頂上盤結草庵播揚大教猶作這箇語話師曰我實未穩在頭曰你若實如此據你見處一一通來是處與你證明不是處與你剗却師曰我初到鹽官見上堂舉色空義得箇入處頭曰此去三十年切忌舉著又見洞山過水偈曰切忌從他覓迢迢與我疏渠今正是我我今不是渠頭曰若與麼自救也未徹在師又曰後問德山從上宗乘中事學人還有分也無德山打一棒曰道甚麼我當時如桶底脫相似頭喝曰你不聞道從門入者不是家珍師曰他後如何即是頭曰他後若欲播揚大教一一從自己胸襟流出將來與我葢天葢地去師於言下大悟便作禮起連聲叫曰師兄今日始是鰲山成道住後僧問和尚見德山得箇甚麼便休去師曰我空手去空手歸有兩僧來師以手拓庵門放身出曰是甚麼僧亦曰是甚麼師低頭歸庵僧辭去師問甚麼處去曰湖南師曰我有箇同行住巖頭附汝一書去書曰某書上師兄某一自鰲山成道後迄至於今飽不飢同參某書上僧到巖頭問甚麼處來曰雪峯來有書達和尚頭接了乃問僧別有何言句僧遂舉前話頭曰他道甚麼曰他無語低頭歸庵頭曰噫我當初悔不向伊道末後句若向伊道天下人不奈雪老何僧至夏末請益前話頭曰何不早問曰未敢容易頭曰雪峯雖與我同條生不與我同條死要識末後句祇這是有一僧山下卓庵多年不剃頭畜一長柄杓溪邊舀水時有僧問如何是祖師西來意主曰溪深杓柄長師聞得乃曰也甚奇怪一日將剃刀同侍者去訪纔相見便舉前話問是庵主語否主曰是師曰若道得即不剃你頭主便洗頭跪師前師即與剃却僧問聲聞人見性如夜見月菩薩人見性如晝見日未審和尚見性如何師打三下後問巖頭頭打三掌問僧甚處來曰近離浙中師曰船來陸來曰二塗俱不涉師曰爭得到這裏曰有甚麼隔礙師便打趁出僧過十年後再來師又問甚處來曰湖南師曰湖南與這裏相去多少曰不隔師豎起拂子曰還隔這箇麼曰若隔即不到也師又打趁出此僧住後凡見人便罵師一日有同行聞特去訪問兄到雪峯有何言句便如是罵他遂舉前話被同行詬叱與他說破這僧當時悲泣常向中夜焚香遙禮問僧甚處去曰禮拜徑山和尚去師曰徑山若問此間佛法如何汝作麼生祗對曰待問即道師便打後舉問鏡清這僧過在甚麼處清曰問得徑山徹困師曰徑山在浙中因甚麼問得徹困清曰不見道遠問近對師曰如是如是問僧近離甚處曰覆船師曰生死海未渡為甚麼覆却船僧無對乃回舉似覆船船曰何不道渠無生死僧再至進此語師曰此不是汝語曰是覆船恁麼道師曰我有二十棒寄與覆船二十棒老僧自喫不干闍黎事閩帥施銀交牀僧問和尚受大王如此供養將何報答師以手拓地曰輕打我輕打我瓦棺和尚師在德山為侍者一日同入山斫木山將一碗水與師師接得便喫却山曰會麼師曰不會山又將一碗水與師師又接喫却山曰會麼師曰不會山曰何不成褫取不會底師曰不會又成褫箇甚麼山曰子大似箇鐵橛住後雪峯訪師茶話次峯問當時在德山斫木因緣作麼生師曰先師當時肯我峯曰和尚離師太早時面前偶有一碗水峯曰將水來師便度與峯接得便潑却高亭簡禪師師參德山隔江纔見便云不審山乃搖扇招之師忽開悟乃橫趨而去更不回顧曹山本寂禪師師謁洞山山問闍黎名甚麼師曰本寂山曰那箇呢師曰不名本寂山深器之自此入室盤桓數載乃辭去山問曰子向甚麼處去師曰不變異處去山曰不變異處豈有去耶師曰去亦不變異僧問學人通身是病請師醫師曰不醫曰為甚麼不醫師曰教汝求生不得求死不得鏡清問清虗之理畢竟無身時如何師曰理即如此事作麼生曰如理如事師曰謾曹山一人即得爭奈諸聖眼何曰若無諸聖眼爭鑑得箇不恁麼師曰官不容針私通車馬問具何知解善能問難師曰不呈句曰問難箇甚麼師曰刀斧砍不入曰恁麼問難還有不肯者麼師曰有曰是誰師曰曹山僧舉藥山問僧年多少曰七十二山曰是七十二那曰是山便打此意如何師曰前箭猶似可後箭射人深曰如何免得此棒師曰王勅既行諸侯避道僧問香嚴如何是道嚴曰枯木裏龍吟曰如何是道中人嚴曰髑髏裏眼睛僧不領乃問石霜如何是枯木裏龍吟霜曰猶帶喜在曰如何是髑髏裏眼睛霜曰猶帶識在又不領問師如何是枯木裏龍吟師曰血脈不斷曰如何是髑髏裏眼睛師曰乾不盡曰未審還有得聞者麼師曰盡大地未有一人不聞曰未審枯木裏龍吟是何章句師曰不知是何章句聞者皆喪遂示偈曰枯木龍吟真見道髑髏無識眼初明喜識盡時消息盡當人那辨濁中清師作四禁偈曰莫行心處路不挂本來衣何須正恁麼切忌未生時雲居道膺禪師師結庵於三峯經旬不赴堂山問子近日何不赴齋師曰每日自有天神送食山曰我將謂汝是箇人猶作這箇見解在汝晚間來師晚至山召膺庵主師應諾山曰不思善不思惡是甚麼師回庵寂然宴坐天神自此竟尋不見如是三日乃絕山問師作甚麼師曰合醬山曰用多少鹽師曰旋入山曰作何滋味師曰得山問大闡提人作五逆罪孝養何在師曰始成孝養自爾洞山許為室中領袖師曾令侍者送袴與一住庵道者道者曰自有孃生袴竟不受師再令侍者問孃未生時著箇甚麼道者無語後遷化有舍利持似於師師曰直饒得八斛四斗不如當時下得一轉語好新羅僧問佛陀波利見文殊為甚却回去師曰祇為不將來所以却回去荊南節度使成汭入山設供問曰世尊有密語迦葉不覆藏如何是世尊密語師召尚書成應諾師曰會麼成曰不會師曰汝若不會世尊有密語汝若會迦葉不覆藏疏山匡仁禪師師到夾山山上堂師問承師有言目前無法意在目前如何是非目前法山曰夜月流輝澄潭無影師作掀禪牀勢山曰闍黎作麼生師曰目前無法了不可得山曰大眾看取這一員戰將師參巖頭頭見來乃低頭佯睡師近前而立頭不顧師拍禪牀一下頭回首曰作甚麼師曰和尚且瞌睡拂袖便行頭呵呵大笑曰三十年弄馬騎今日被驢撲有僧為師造壽塔畢白師師曰將多少錢與匠人曰一切在和尚師曰為將三錢與匠人為將兩錢與匠人為將一錢與匠人若道得與吾親造壽塔來僧無語後僧舉似大嶺庵閒和尚即羅山也嶺曰還有人道得麼僧曰未有人道得嶺曰汝歸與疏山道若將三錢與匠人和尚此生決定不得塔若將兩錢與匠人和尚與匠人共出一隻手若將一錢與匠人累他匠人鬚眉墮落僧回如教而說師具威儀望大嶺作禮歎曰將謂無人大嶺有古佛放光射到此間雖然如是也是臘月蓮花大嶺後聞此語曰我恁麼道早是龜毛長三尺青林師䖍禪師師初參洞山山問近離甚處師曰武陵曰武陵法道何似此間師曰胡地冬抽筍山曰別甑炊香飯供養此人師拂袖便出山曰此子向後走殺天下人在師在洞山栽松次有劉辰翁者求偈師作偈曰長長三尺餘鬱鬱覆青草不知何代人得見此松老劉得偈呈洞山山謂曰此是第三代洞山主人師辭洞山山曰子向甚麼處去師曰金輪不隱的徧界絕紅塵山曰善自保任師珍重而出洞山門送謂師曰恁麼去一句作麼生道師曰步步跨紅塵通身無影像山良久師曰老和尚何不速道山曰子得恁麼性急師曰某甲罪過便禮辭問學人徑往時如何師曰死蛇當大路勸子莫當頭曰當頭者如何師曰喪子命根曰不當頭者如何師曰亦無迴避處曰正當恁麼時如何師曰失却也曰向甚麼處去師曰草深無覓處曰和尚也須隄防始得師拊掌曰一等是箇毒氣白水本仁禪師長生然和尚問如何是西來意師曰還見庭前杉樧樹否曰恁麼則和尚今日因學人致得是非師曰多口座主然去後師方知是雪峯禪客乃曰盜法之人終不成器上堂老僧尋常不欲向聲前色後鼓弄人家男女何故且聲不是聲色不是色僧問如何是聲不是聲師曰喚作色得麼曰如何是色不是色師曰喚作聲得麼僧作禮師曰且道為汝說答汝話若向這裏會得有箇入處白馬山靄和尚僧問如何是白馬正眼曰南看北斗龍牙居遁證空禪師師參翠微乃問學人自到和尚法席一箇餘月不蒙示誨一法意在於何微曰嫌甚麼師又問洞山山曰爭怪得老僧師又問翠微如何是祖師意微曰與我將禪板來師遂過禪板微接得便打師曰打即任打要且無祖師意又問臨濟如何是祖師意濟曰與我將蒲團來師乃過蒲團濟接得便打師曰打即任打要且無祖師意後有僧問和尚行脚時問二尊宿祖師意未審二尊宿明也未師曰明即明也要且無祖師意師復舉德山頭落底語因自省過遂止於洞山隨眾參請一日問如何是祖師西來意山曰待洞水逆流即向汝道師始悟厥旨服勤八稔裴相國入大安寺問諸大德曰羅睺羅以何為第一曰以密行為第一裴不肯遂問此間有何禪者時師在後園種菜遂請來問羅睺羅以何為第一師曰不知裴便拜曰破布裹真珠報慈嶼讚師真曰日出連山月圓當戶不是無身不欲全露師一日在帳中坐僧問不是無身不欲全露請師全露師撥開帳子曰還見麼曰不見師曰不將眼來上堂夫參玄人須透過祖佛始得新豐和尚道祖佛言教似生冤家始有參學分若透不得即被祖佛謾去僧問祖佛還有謾人之心也無師曰汝道江湖還有礙人之心也無乃曰江湖雖無礙人之心為時人過不得江湖成礙人去不得道江湖不礙人祖佛雖無謾人之心為時人透不得祖佛成謾人去不得道佛祖不謾人若透得祖佛過此人過却祖佛若也如是始體得佛祖意方與向上人同如未透得但學佛學祖則萬劫無有出期僧曰如何得不被祖佛謾去師曰道者直須自悟去始得益州北院通禪師師參洞山山上堂曰坐斷主人公不落第二見師出眾曰須知有一人不合伴山曰猶是第二見師便掀倒禪牀山曰老兄作麼生師曰待某甲舌頭爛即向和尚道後辭洞山擬入嶺山曰善為飛猿嶺峻好看師良久山召通闍黎師應諾山曰何不入嶺去師因有省更不入嶺欽山文邃禪師師與巖頭雪峯過江西到一茶店喫茶次師曰不會轉身通氣者不得茶喫頭曰若恁麼我定不得茶喫峯曰某甲亦然師曰這兩箇老漢話頭也不識頭曰甚處去也師曰布袋裏老鵶雖活如死頭退後曰看看師曰豁公且置存公作麼生峯以手畫一圓相師曰不得不問頭呵呵曰太遠生師曰有口不得茶喫者多德山侍者來參纔禮拜師把住曰還甘欽山與麼也無侍者曰某甲却悔久住德山今日無言可對師乃放手曰一任祗對侍者撥開胸曰且聽某通氣一上師曰德山門下即得這裏一點用不著侍者曰久聞欽山不通人情師曰累他德山眼目參堂去資福如寶禪師陳操尚書來師畫一圓相操曰弟子與麼來早是不著便更畫圓相師於中著一點操曰將謂是南番舶主師便歸方丈閉却門南院慧顒禪師師問僧近離甚處曰襄州師曰來作甚麼曰特來禮拜和尚師曰恰遇寶應老不在僧便喝師曰向汝道不在又喝作甚麼僧又喝師便打僧禮拜師曰這棒本是汝打我我且打汝要此話大行瞎漢參堂去問從上諸聖向甚麼處去師曰不上天堂則入地獄曰和尚又作麼生師曰還知寶應老漢落處麼僧擬議師打一拂子曰你還知喫拂子底麼曰不會師曰正令却是你行又打一拂子僧參方入丈室便以手指云敗也師乃拈起拄杖度與僧僧纔接師便打問僧近離甚處曰長水師曰東流西流曰總不恁麼師曰作麼生僧珍重師便打僧參師舉拂子僧曰今日敗缺師放下拂子僧曰猶有這箇在師便打守廓侍者師問德山曰從上諸聖向甚麼處去山曰作麼作麼師曰勅點飛龍馬跛鼈出頭來山便休去來日浴出師過茶與山山於背上拊一下曰昨日公案作麼生師曰這老漢今日方始瞥地山又休去師到鹿門一日見楚和尚與僧道話次鹿門下來問楚和尚你終日披披搭搭作甚麼楚云和尚見某甲披披搭搭那門便喝楚亦喝兩家總休去師云諸上座你看這兩箇瞎漢隨後便喝門歸方丈却令侍者請師上來云老僧適來與楚闍黎賓主相見什麼處敗缺師曰轉見病深門云老僧自見興化來便會也師云和尚到興化時某甲為侍者記得與麼時語門云請舉看師遂舉興化問和尚甚處來和尚云五臺來化云還見文殊麼和尚便喝化云我問你還見文殊麼又惡發作麼和尚又喝化不語和尚作禮化至明日教某甲喚和尚和尚早去也化上堂云你看這箇僧擔條斷貫索向南方去也已後也道見興化來師云今日公案恰似與麼時底門云興化當時為甚無語師曰見和尚不會賓主句所以不語及欲喚和尚持論和尚已去也鹿門明日特為煎茶晚參告眾曰夫參學龍象直須仔細入室決擇不得容易逴得箇語便以為極則道我靈利只如山僧當初見興化時認得箇動轉底見人道一喝兩喝便休以為佛法也今日被明眼人覰破却成一場笑具圖箇甚麼只為我慢無明不能回轉親近上流賴得明眼道人不惜身命對眾證據此恩難報何故興化云饒你喝得興化老人上三十三天却撲下來一點氣也無款款地蘇息起來向你道未在何故如此興化未曾向紫羅帳裏撒真珠與你在胡喝亂喝作麼真謂藥石之言道流難信如今直下分明辨取豈不慶快平生參學事畢汝州西院思明禪師從上座到法席旬日常自曰莫道會佛法人覓箇舉話底人也無師聞而默之異日上法堂次師召從舉首師曰錯進三兩步師又曰錯近前師曰適來兩錯是上座錯是思明老漢錯曰是從錯師曰錯錯乃曰上座且在這裏過夏共汝商量這兩錯不肯便去後住相州天平山每舉前話曰我行脚時被惡風吹到汝州有西院長老勘我連下兩錯更留我過夏待共我商量我不道恁麼時錯我發足向南方去時早知錯了也寶壽和尚師開堂日三聖推出一僧師便打聖云與麼為人非但瞎却這僧眼瞎却鎮州一城人眼去在師擲下拄杖便歸方丈鳳棲同安常察禪師僧問學人未曉時機乞師指示師曰參差松竹籠煙薄重疊峯巒月上遲僧擬進語師曰劍甲未施賊身已露僧曰何也師曰精陽不翦霜前竹水墨徒誇海上龍僧繞禪牀而出師曰閉目食蝸牛一場酸澀苦新到持錫繞師三匝振錫一下曰凡聖不到處請師道師鳴指三下僧曰同安今日嚇得忘前失後師曰闍黎發足何處僧珍重便出師曰五湖衲子一錫禪人未到同安不妨疑著僧回首曰遠聞不如近見師曰貪他一杯酒失却滿船魚問僧近離何處曰江西師曰江西法道何似此間曰賴遇問著某甲若問別人則禍生也師曰老僧適來造次曰某甲不是嬰兒徒用止啼黃葉師曰傷鼈恕龜殺活由我僧又問久造玄微如何洞曉師曰老僧耳背分明問將來曰快不打籬邊師曰暗中臨鏡誰辨妍曰向上機關如何洞曉師曰何必曰休休師曰始解乘舟擬跨劍水問僧甚處來曰五臺師曰還見文殊麼僧展兩手師曰展手頗多文殊難覩曰氣急殺人師曰不覩雲中雁焉知沙塞寒曰遠趨丈室乞師一言師曰孫臏門下徒話鑽龜曰名不浪得師曰喫茶去僧珍重便出師曰雖得一場榮刖却一雙足問僧近離甚處曰太原師曰太原近日法道如何曰只見雲隨日出水逐波生不知太原法道如何師曰豈不是離太原乎曰苦苦師曰不覩海雲色微覺旱雷聲曰以金易鍮憎真愛假師便歸方丈僧拂袖便出師曰得縮頭時且縮頭禾山無殷禪師師至九峯虔公問汝遠來何所見當由何路出生死對曰重昏廓闢盲者自盲虔笑以手揮之曰佛法不如是師不懌請曰豈無方便曰汝問我師理前語問之曰奴見婢殷勤師於是依止十餘年問習學謂之聞絕學謂之鄰過此二者謂之真過如何是真過師曰禾山解打鼓曰如何是真諦師曰禾山解打鼓問即心即佛則不問如何是非心非佛師曰禾山解打鼓曰如何是向上事師曰禾山解打鼓青峯傳楚禪師一日洛浦問院主去甚麼處來師曰掃雪來浦曰雪深多少師曰樹上總是浦曰得即得汝向後住箇雪窟定矣後訪白水水曰見說洛浦有生機一路是否師曰是水曰止却生路向熟路上來師曰生路上死人無數熟路上不著活漢水曰此是洛浦底你底作麼生師曰非但洛浦夾山亦不奈何水曰夾山為甚麼不奈何師曰不見道生機一路僧問大事已明為甚麼也如喪考妣師曰不得春風花不開及至花開又吹落木平善道禪師師初謁洛浦問一漚未發已前如何辨其水脈浦曰移舟諳水脈舉棹別波瀾師不契乃參蟠龍語同前問龍曰移舟不別水舉棹即迷源師從此悟入郢州桐泉山禪師師參黃山山問天門一合十方無路有人道得擺手出漳江師曰蟄戶不開龍無龍句山曰是你恁麼道師曰是即直言是不是直言不是山曰擺手出漳江山復問卞和到處荊山秀玉印從他天子傳時如何師曰靈鶴不於林下憩野老不重太平年山深肯之瑞巖師彥禪師師初禮巖頭問曰如何是本常理頭曰動也曰動時如何頭曰不是本常理師良久頭曰肯即未脫根塵不肯即永沈生死師遂領悟便禮拜後謁夾山山問甚處來曰臥龍來山曰來時龍還起也未師乃顧視之山曰炙瘡瘢上更著艾燋曰和尚又苦如此作甚麼山休去師問夾山與麼即易不與麼即難與麼與麼即惺惺不與麼不與麼即居空界與麼不與麼請師速道山曰老僧瞞闍黎去也師喝曰這老和尚而今是甚時節便出去羅山道閒禪師師問石霜起滅不停時如何霜曰直須寒灰枯木去一念萬年去函葢相應去全清絕點去師不契謁巖頭復如前問頭喝曰是誰起滅師於此有省師在禾山送同行矩長老出門把拄杖向前面一攛矩無對師曰石牛攔古路一馬生雙駒保福問巖頭道與麼與麼不與麼不與麼意作麼生師召福福應諾師曰雙明亦雙暗福禮謝三日後却問前日蒙和尚垂慈祇為看不破師曰盡情向汝道了也福曰和尚是把火行山師曰若與麼據汝疑處問將來福曰如何是雙明亦雙暗師曰同生亦同死福又禮謝而退別有僧問福同生亦同死時如何福曰彼此合取狗口僧曰和尚收取口喫飯其僧却問師同生亦同死時如何師曰如牛無角曰同生不同死時如何曰如虎帶角玄沙師備宗一禪師師福州閩縣謝氏子少漁於南臺江上及壯忽棄舟從芙蓉山靈訓禪師祝髮芒鞋布衲食纔接氣宴坐終日眾異之初兄事雪峯既而師承之峯以其苦行呼為頭陀一日峯問阿那箇是備頭陀師曰終不敢誑於人異日峰召曰備陀頭何不徧參去師曰達摩不來東土二祖不往西天峯然之暨登象骨山乃與師同力締搆玄徒臻萃師入室咨決罔替晨昏又閱楞嚴發明心地由是應機敏捷與脩多羅冥契諸方玄學有所未決必從之請益至與雪峯徵詰亦當仁不讓峯曰備頭陀再來人也師辭雪峯云啟和尚人人自由自在某甲如今下山去峯云是誰與麼道師曰是和尚與麼道峯曰汝作麼生師云不自由自在峯云知雪峯謂師曰有箇南際長老問無有答不得者際一日到雪峯峯令訪師師曰古人道此事惟我能知長老作麼生際曰須知有不求知者師曰山頭老漢喫許多辛苦作麼師見僧來禮拜乃曰禮拜著因我得禮汝閩王送茘枝與師師拈起示眾云這箇茘枝得恁麼紅這箇茘枝得恁麼赤諸人作麼生會若道得一色猶是儱侗若道是眾色又落斷常諸人作麼生有僧出云不可不識茘枝師自代云只是茘枝師一日見三人新到自去打普請鼓三下請歸方丈新到具威儀了亦自去打普請鼓三下却入僧堂久住來白師云新到輕欺和尚師云打鐘集眾勘過大眾集新到不赴師令侍者去喚新到纔至法堂却向侍者背上拍一下云和尚喚你侍者至師處新到便歸堂久住乃問和尚何不勘新到師云我與你勘了也韋監軍來謁乃曰曹山和尚甚奇怪師曰撫州取曹山幾里韋指旁僧曰上座曾到曹山否曰曾到韋曰撫州取曹山幾里曰百二十里韋曰恁麼則上座不到曹山韋却起禮拜師曰監軍却須禮此僧此僧却具慙愧師南遊莆田縣排百戲迎接來日師問小塘長老昨日許多喧閙向甚麼處去也塘提起衲衣角師曰料掉沒交涉問承和尚有言聞性徧周沙界雪峯打鼓這裏為甚麼不聞師曰誰知不聞長慶來師問除却藥忌作麼生道慶曰放憨作麼師曰雪峯山橡子拾食來這裏兒放糞泉守王公請師登樓先語客司曰待我引大師到樓前便舁却梯客司稟旨公曰請大師登樓師視樓復視其人乃曰佛法不是此道理師與泉守在室中說話有一沙彌揭簾入見却退步而出師曰那沙彌好與二十拄杖守曰恁麼即某甲罪過師曰佛法不是恁麼上堂眾集師將拄杖一時趁下却回丈室向侍者道我今日作得一解險入地獄如箭射者曰喜得和尚再復人身師垂語曰諸方老宿盡道接物利生祇如三種病人汝作麼生接患盲者拈槌豎拂他又不見患聾者語言三昧他又不聞患瘂者教伊說又說不得若接不得佛法無靈驗時有僧出曰三種病人還許學人商量否師曰許汝作麼生商量其僧珍重出師曰不是不是羅漢曰桂琛現有眼耳口和尚作麼生接師曰慙媿便歸方丈長慶慧稜禪師師往來雪峯玄沙二十年坐破七箇蒲團不明此事一日捲簾忽然大悟乃有頌曰也大差也大差捲起簾來見天下有人問我是何宗拈起拂子劈口打峯舉謂沙曰此子徹去也沙曰未可此是意識著述更須勘過始得至晚眾僧上來問訊峯問師曰備頭陀未肯汝在汝實有正悟對眾舉來師又頌曰萬象之中獨露身惟人自肯乃方親昔時謬向途中覓今日看來火裏冰峯乃顧沙曰不可更是意識著述師問峯曰從上諸聖傳授一路請師垂示峯良久師設禮而退峯乃微笑師入方丈參峯曰是甚麼師曰今日天晴好曬麥自此酬問未嘗爽於玄旨師與保福遊山福問古人道妙峯山頂莫祇這箇便是也無師曰是即是可惜許師在西院問詵上座曰這裏有象骨山汝曾到麼曰不曾到師曰為甚麼不到曰自有本分事在師曰作麼生是上座本分事詵乃提起衲衣角師曰為當祇這箇別更有曰上座見箇甚麼師曰何得龍頭蛇尾問僧甚處來曰鼓山來師曰鼓山有不跨石門底句有人借問汝作麼生道曰昨夜報慈宿師曰劈脊棒汝又作麼生曰和尚若行此棒不虗受人天供養師曰幾合放過雪峯問吾見溈山問仰山從上諸聖什麼處去仰云或在天上或在人間汝道仰山意作麼生師云若問諸聖出沒處與麼道即不可峯云汝渾不肯忽有人問汝作麼生道師云但道錯峯云是汝不錯師云何異於錯僧問如何是正法眼師曰有願不撒沙保福院從展禪師一日長慶謂師曰寧說阿羅漢有三毒不可說如來有二種語不道如來無語祇是無二種語師曰作麼生是如來語慶曰聾人爭得聞師曰情知和尚向第二頭道慶曰汝又作麼生師曰喫茶去因舉盤山道光境俱亡復是何物洞山道光境未亡復是何物師曰據此二尊宿商量猶未得剿絕乃問長慶如今作麼生道得剿絕慶良久師曰情知和尚向鬼窟裏作活計慶却問作麼生師曰兩手扶犁水過膝上堂有人從佛殿後過見是張三李四若從佛殿前過為甚麼不見且道佛法利害在甚麼處僧曰為有一分麤境所以不見師乃叱之自代曰若是佛殿即不見曰不是佛殿還可見否師曰不是佛殿見箇甚麼鼓山神宴興聖國師師與招慶相遇次慶曰家常師曰太無厭生慶曰且款款師却曰家常慶曰今日未有火師曰太鄙吝生慶曰穩便將取去師問保福古人道非不非是不是意作麼生福拈起茶盞師曰莫是非好師示眾云若論此事如一口劍時有僧問承和尚言若論此事如一口劍和尚是死尸學人是死尸如何是劍師云拖出這死尸僧應諾歸衣鉢下結束便行師至晚問首座問話底僧在否座云當時便去也師云好與二十棒師有偈曰直下猶難會尋言轉更賒若論佛與祖特地隔天涯師舉問僧汝作麼生會僧無語乃謂侍者曰某甲不會請代一轉語者曰和尚與麼道猶隔天涯在僧舉似師師喚侍者問汝為這僧代語是否者曰是師便打趁出院問東使只如仰山祗對溈山於面前與一畫意作麼生東使云作家麼師云兄真箇與麼作麼生東使云日可冷月可熱被師攔胸與一托清源王太尉問安國了院主云劫火洞然向甚麼處迴避院主云這裏迴避太尉不肯自代云不迴避進云為什麼不迴避太尉云他不出頭迴避什麼師云什麼處見他道不出頭師因與清源王太尉話次云但是世間一切雜學底事盡是網太尉云只如今還網得也無師云太尉太尉乃展手云即今有甚麼師云只這一網亦不少太尉舉南陽喚侍者事趙州云如空中書字雖然不成而文彩已彰師云只如與麼道是宗國師不宗國師太尉云宗與不宗俱是彰也師云只如趙州意旨作麼生太尉云不辜負趙州師云此是句也趙州意作麼生太尉云作麼師云彰也趙州意作麼生太尉無對鏡清道怤順德禪師師謁雪峯峯問甚處人曰溫州人峯曰恁麼則與一宿覺是鄉人也曰祇如一宿覺是甚麼處人峯曰好喫一頓棒且放過一日師問祗如古德豈不是以心傳心峯曰兼不立文字語句師曰祗如不立文字語句師如何傳峯良久師禮謝峯曰更問我一轉豈不好師曰就和尚請一轉問頭峯曰祗恁麼為別有商量師曰和尚恁麼即得峯曰於汝作麼生師曰辜負殺人雪峯謂眾曰堂堂密密地師出問是甚麼堂堂密密峯起立曰道甚麼師退步而立雪峯垂語曰此事得恁麼尊貴得恁麼緜密師曰道怤自到來數年不聞和尚恁麼示誨峯曰我向前雖無如今已有莫有所妨麼曰不敢此是和尚不已而已峯曰致使我如此師從此信入普請次雪峯舉溈山道見色便見心汝道還有過也無師曰古人為甚麼事峯曰雖然如此要共汝商量師曰恁麼則不如道怤鉏地去師再參雪峯峯問甚處來師曰嶺外來峯曰甚麼處逢見達摩師曰更在甚麼處峯曰未信汝在師曰和尚莫恁麼粘膩好峯便休問學人啐請師師曰還得活也無曰若不活遭人怪笑師曰也是草裏漢師一日於僧堂自擊鐘曰玄沙道底玄沙道底僧問玄沙道甚麼師乃畫一圓相僧曰若不久參爭知與麼師曰失錢遭罪問學人未達其源請師方便師曰是甚麼源曰其源師曰若是其源爭受方便僧禮拜退侍者問和尚適來莫是成褫伊麼師曰無曰莫是不成褫伊麼師曰無曰未審意旨如何師曰一點水墨兩處成龍普請鉏草次浴頭請師浴師不顧如是三請師舉钁作打勢頭便走師召曰來來頭回首師曰向後遇作家分明舉似頭後到保福舉前語未了福以手掩其口頭却回舉似師師曰饒伊恁麼也未作家安國弘瑫禪師師舉國師文云得之於心伊蘭作栴檀之樹失之於旨甘露乃蒺藜之園問僧曰一語須具得失兩意汝作麼生道僧舉拳曰不可喚作拳頭也師不肯亦舉拳別示祗為喚這箇作拳頭清化全怤禪師師初參南塔南塔問從何而來師曰鄂州南塔曰鄂州使君名甚麼師曰化下不敢相觸忤曰此地道不畏師曰大丈夫何必相試南塔囅然而笑遂乃印可長生皎然禪師師久依雪峯一日與僧斫樹次峯曰斫到心且住師曰斫却著峯曰古人以心傳心汝為甚麼道斫却師擲下斧曰傳峯打一拄杖而去普請次雪峯負一束藤路逢一僧便拋下僧擬取峯便踏倒歸謂師曰我今日踏這僧快師曰和尚却替這僧入涅槃堂始得峯便休去雪峯問光境俱亡復是何物師曰放皎然過有道處峯曰放汝過作麼生道曰皎然亦放和尚過峯曰放汝二十棒師便禮拜玄沙問我觀如來前際不來後際不去今亦無住長老作麼生師云放某甲過有箇道處沙云放你過作麼生道師默然沙云教誰委師云和尚不委沙云情知你向鬼窟裏作活計師休去太原孚上座師嘗遊浙中登徑山法會一日於大佛殿前有僧問上座曾到五臺否師曰曾到曰還見文殊麼師曰見曰甚麼處見師曰徑山佛殿前見其僧後適閩川舉似雪峯峯曰何不教伊入嶺來師聞乃趣裝入嶺初至雪峯廨院憩錫因分柑子與僧長慶問甚麼處將來師曰嶺外將來曰遠涉不易擔負將來師曰柑子柑子次日上山雪峯聞乃集眾師到法堂上顧視雪峯便下看知事明日却上禮拜曰某甲昨日觸忤和尚峯曰知是般事便休保福簽瓜次師至福曰道得與汝瓜喫師曰把將來福度與一片師接得便去鼓山問父母未生時鼻孔在甚麼處師曰老兄先道山曰如今生也汝道在甚麼處師不肯山却問作麼生師曰將手中扇子來山與扇子再徵前話師搖扇不對山罔測乃毆師一拳新羅國大嶺禪師僧問如何是一切處清淨師曰截瓊枝寸寸是寶析栴檀片片皆香金峯從志禪師師問僧發足甚處曰趙州師曰趙州法嗣何人曰南泉師曰你何曾離趙州曰未審和尚尊意何如師曰趙州實嗣南泉僧至晚請益曰今日蒙和尚慈悲某甲未會請和尚指示師曰若到別處莫道後語是金峯底曰為甚如此曰恐辱他趙州師一日上堂喫胡餅次乃拈一箇從上座板頭轉一匝大眾見一一合掌師曰假饒十分擡起手也只得一半至晚間有僧請益曰今日和尚行胡餅見眾僧合掌曰假饒十分擡起手也只得一半請和尚全道師以手作拈餅勢曰會麼曰不會師曰金峯也始道得一半僧問訊次師把住曰輒不得向人道我有一則因緣舉似你僧作聽勢師與一掌僧曰為甚麼打某甲師曰我要這話行上堂老僧二十年前有老婆心二十年後無老婆心僧問如何是二十年前有老婆心師曰問凡答凡問聖答聖曰如何是二十年後無老婆心師曰問凡不答凡問聖不答聖處州廣利容禪師因僧到師乃豎拂子云貞溪老漢還具眼麼僧云某甲不敢見人過師云老僧死在闍黎手裏僧以手指胸便出去師云闍黎參見先師來至晚請喫茶了僧拈起盞子云這箇是諸佛出世邊事作麼生是未出世邊事師以手撥却盞云到闍黎死在老僧手裏僧云五里牌在郭門外師云無故惑亂師僧僧遂起謝茶師曰特謝闍黎相訪鳳棲山同安丕禪師僧問如何是和尚家風師曰金雞抱子歸霄漢玉兔懷胎入紫微曰忽遇客來將何祗待師曰金果朝來猿摘去玉花晚後鳳銜歸新到參師問甚處來曰湖南師曰還知同安這裏風雲體道花檻璇璣麼曰知師曰非公境界僧便喝師曰短販樵人徒誇書劍僧擬進語師曰劍甲未施賊身已露佛日本空禪師師謁雲居作禮問曰二龍爭珠誰是得者居曰卸却業身來與子相見師曰業身已卸居曰珠在甚麼處師無對池州稽山章禪師師在投子作柴頭投子同喫茶次謂師曰森羅萬象總在裏許師潑却茶曰森羅萬象在甚麼處子曰可惜一碗茶師後謁雪峯峯問莫是章柴頭麼
子後僧問師急水上打毬子意旨如何師曰念念不停留師因僧問如何是十身調御師下禪牀立又問凡聖相去多少師亦下禪牀立問一等是水為甚麼海鹹河淡師曰天上星地下木師在京赴一檀越齋檀越將一盤草來師拳兩手安頭上檀越便將齋來後有僧問和尚在京投齋意旨如何師曰觀世音菩薩問和尚自住此山有何境界師曰丫脚女子白頭絲問一念不生時如何師曰堪作甚麼僧無語師又曰透出龍門雲雨合山川大地入無蹤清平安樂遵令禪師初參翠微便問如何是西來的的意翠微曰待無人即向汝說師良久曰無人也請和尚說翠微下禪牀引師入竹園師又曰無人也請和尚說翠微指竹曰這竿得恁麼長那竿得恁麼短師領謝僧問如何是大乘師曰井索曰如何是小乘師曰錢貫曰如何是有漏師曰笊籬曰如何是無漏師曰木杓問如何是清平家風師曰一斗作三箇蒸餅御選歷代禪師語錄前集下洞山良价悟本禪師師參溈山問曰頃聞南陽忠國師有無情說法話某甲未究其微溈曰我這裏亦有祇是罕遇其人師曰某甲未明乞師指示溈豎起拂子曰會麼師曰不會請和尚說溈曰父母所生口終不為子說此去澧陵攸縣有雲巖道人若能撥草瞻風必為子之所重師遂辭溈山徑造雲巖便問無情說法甚麼人得聞巖曰無情得聞師曰和尚聞否巖曰我若聞汝即不聞吾說法也師曰某甲為甚麼不聞巖豎起拂子曰還聞麼師曰不聞巖曰我說法汝尚不聞豈況無情說法乎師曰無情說法該何典教巖曰豈不見彌陀經云水鳥樹林悉皆念佛念法師於此有省乃述偈曰也大奇也大奇無情說法不思議若將耳聽終難會眼處聞聲方得知巖曰价闍黎承當箇事大須審細師猶涉疑後因過水睹影大悟前旨有偈曰切忌從他覓迢迢與我疏我今獨自往處處得逢渠渠今正是我我今不是渠應須恁麼會方得契如如師作五位君臣頌曰正中偏三更初夜月明前莫怪相逢不相識隱隱猶懷舊日嫌偏中正失曉老婆逢古鏡分明覿面別無真休更迷頭猶認影正中來無中有路隔塵埃但能不觸當今諱也勝前朝斷舌才兼中至兩刃交鋒不須避好手猶如火裏蓮宛然自有沖天志兼中到不落有無誰敢和人人盡欲出常流折合還歸炭裏坐問欲見和尚本來師如何得見師曰年牙相似即無阻矣僧擬進語師曰不躡前蹤別請一問僧無對問蛇吞蝦蟆救則是不救則是師曰救則雙目不睹不救則形影不彰僧問師尋常教學人行鳥道未審如何是鳥道師曰不逢一人曰如何行師曰直須足下無私去曰祇如行鳥道莫便是本來面目否師曰闍黎因甚顛倒曰甚麼處是學人顛倒師曰若不顛倒因甚麼却認奴作郎曰如何是本來面目師曰不行鳥道師曰今時人學道祇認得驢前馬後底將為自己佛法平沈此之是也賓中主尚未分如何辨得主中主僧問如何是主中主師曰闍黎自道取曰某甲道得即是賓中主如何是主中主師曰恁麼道即易相續也大難遂示頌曰嗟見今時學道流千千萬萬認門頭恰似入京朝聖主祇到潼關即便休僧問甚處來曰遊山來師曰還到頂麼曰到師曰頂上有人麼曰無人師曰恁麼則不到頂也曰若不到頂爭知無人師曰何不且住曰某甲不辭住西天有人不肯師曰我從來疑著這漢僧問如何是青山白雲父師曰不森森者是曰如何是白雲青山兒師曰不辨東西者是曰如何是白雲終日倚師曰去離不得曰如何是青山總不知師曰不顧視者是師與雲居過水師問水深多少居曰不濕師曰麤人居却問水深多少師曰不乾師因曹山辭遂囑曰吾在雲巖先師處親印寶鏡三昧事窮的要今付於汝詞曰如是之法佛祖密付汝今得之宜善保護銀盌盛雪明月藏鷺類之弗齊混則知處意不在言來機亦赴動成窠臼差落顧佇背觸俱非如大火聚但形文彩即屬染污夜半正明天曉不露為物作則用諸苦雖非有為不是無語如臨寶鏡形影相覩汝不是渠渠正是汝如世嬰兒五相完具不去不來不起不住婆婆和和有句無句終不得物語未正故重離六爻偏正回互疊而為三變盡成五如荎草味如金剛杵正中妙挾敲唱雙舉通宗通塗挾帶挾路錯然則吉不可犯忤天真而妙不屬迷悟因緣時節寂然昭著細入無間大絕方所毫忽之差不應律呂外寂中搖繫駒伏鼠先聖悲之為法檀度要合古轍請觀前古佛道垂成十劫觀樹如虎之缺如馬之馵以有下劣寶几珍御以有驚異貍奴白牯木人方歌石女起舞非情識到寧容思慮臣奉於君子順於父不順非孝不奉非輔潛行密用如愚若魯但能相續名主中主師又曰末法時代人多乾慧若要辨驗真偽有三種滲漏一曰見滲漏機不離位墮在毒海二曰情滲漏滯在向背見處偏枯三曰語滲漏究妙失宗機昧終始濁智流轉於此三種子宜知之偈曰道無心合人人無心合道欲識箇中意一老一不老仰山南塔光涌禪師師依仰山剃度北游謁臨濟復歸侍山山曰汝來作甚麼師曰禮覲和尚山曰還見和尚麼師曰見山曰和尚何似驢師曰某甲見和尚亦不似佛山曰若不似佛似箇甚麼師曰若有所似與驢何別山大驚曰凡聖兩忘情盡體露吾以此驗人二十年無決了者子保任之山每指謂人曰此子肉身佛也福州雙峰古禪師師因辭石霜石霜將拂子送出門首召曰古侍者師回首石霜曰擬著即差是著即乖不擬不是亦莫作箇會苟非知有莫能知之好去好去師應喏喏後僧問和尚當時辭石霜石霜恁麼道意作麼生師曰祇教我不著是非三聖院慧然禪師上堂我逢人即出出則不為人便下座僧問如何是祖師西來意師曰臭肉來蠅灌谿志閑禪師師住末山後上堂曰我在臨濟爺爺處得半杓末山孃孃處得半杓共成一杓喫了直至如今飽不飢僧問久嚮灌谿到來祇見漚麻池師曰汝祇見漚麻池且不見灌谿曰如何是灌谿師曰劈箭急九峰道虔禪師僧問無間中人行甚麼行師曰畜生行曰畜生復行甚麼行師曰無間行曰此猶是長生路上人師曰汝須知有不共命者曰不共甚麼命師曰長生氣不常師乃曰諸兄弟還識得命麼欲知命流泉是命湛寂是身千波競涌是文殊境界一亘晴空是普賢牀榻其次借一句子是指月話月且如諸方先德未建許多名目指陳已前諸兄弟約甚麼體格商量到這裏不假三寸試話會看不假耳試釆聽看不假眼試辨白看所以道聲前拋不出句後不藏形盡乾坤大地都來是汝當人箇體向甚麼處安眼耳鼻舌莫但向意根下圖度作解盡未來際亦未有休歇分所以洞山道擬將心意學玄宗大似西行却向東珍重台州涌泉景欣禪師上堂我四十九年在這裏尚自有時走作汝等諸人莫開大口見解人多行解人萬中無一箇見解言語總要知通若識不盡敢道輪回去在為何如此蓋為識漏未盡汝但盡却今時始得成立亦喚作立中功轉功就他去亦喚作就中功親他去我所以道親人不得度渠不度親人恁麼譬喻尚不會薦取渾圇底但管取性亂動舌頭不見洞山道相續也大難洛浦元安禪師師到夾山不禮拜乃當面叉手而立山曰雞棲鳳巢非其同類出去師曰自遠趨風請師一接山曰目前無闍黎此間無老僧師便喝山曰住住且莫草草悤悤雲月是同溪山各異截斷天下人舌頭即不無闍黎爭教無舌人解語師佇思山便打因茲服膺一日問山佛魔不到處如何體會山曰燭明千里像闇室老僧迷又問朝陽已昇夜月不現時如何山曰龍銜海珠遊魚不顧師於言下大悟山將示滅垂語曰石頭一枝看看即滅矣師曰不然山曰何也師曰他家自有青山在山曰苟如是即吾宗不墜矣上堂師云末後一句始到牢關鏁斷要津不通凡聖尋常向諸人道任從天下樂欣欣我獨不肯欲知上流之士不將佛祖言教貼在額頭上如龜負圖自取喪身之兆鳳縈金網趨霄漢以何期直須旨外明宗莫向言中取則是以石人機似汝也解唱巴歌汝若似石人雪曲也應和指南一路智者知疏問僧近離甚處曰荊南師曰有一人與麼去還逢麼曰不逢師曰為甚不逢曰若逢即頭粉碎師曰闍黎三寸甚密雲門於江西見其僧乃問還有此語否曰是門曰洛浦倒退三千里巖頭全豁禪師示眾但明取綱宗本無實法不見道無實無虗若向事上覰即疾若向意根下尋卒摸索不著又曰此是向上人活計只露目前些子如同電拂如擊石火截斷兩頭靈然自在若道向上有法有事真椀鳴聲塗糊汝繫汝古人喚作繫驢橛若將實法與人土亦消不得示眾云夫大統綱宗中事須識句若不識句難作箇話會甚麼是句百不思時喚作正句亦云居頂亦云得住亦云歷歷亦云惺惺亦云的的亦云佛未生時亦云得地亦云與麼時將與麼時等破一切是非纔與麼便不與麼便轉轆轆地不見古人道沈昏不好須轉得始得觸著便轉是句亦剗非句亦剗自然轉轆轆自然目前露倮倮地飽地不解却不解齩瞥起微情早落地上若也未得與麼蕩蕩地喚作依句修行有則便須等破與麼時一物不存信知從來學得一切言句隘在胸中有甚麼用處不見道辟觀辟句外不放入內不放出截斷兩頭自然光烯烯地不與一物作對便是無諍三昧兄弟若欲得易會但向根本明取不見道無依無欲便是能仁古人道置毒藥安乳中乃至醍醐亦能殺人這箇不是汝習學得底這箇不是汝去住底不是汝色裏底莫錯認門頭戶口賺汝臘月三十日赤閧閧地無益信知古風大好不見道有即是無無即是有與麼送出來時便知深淺這箇是古格於中有一般漢信彩吐出來有甚麼記但知喚作禪道但知喚作一句子軟嫩嫩地真是無孔鐵椎聚得一萬箇有甚麼用處若是有筋骨底不用多諸處行脚也須帶眼始得莫被人謾不見道依法生解猶落魔界夫唱教須一一從自己胸襟中吐得出來與人為榜樣今時還有與麼漢麼莫終日閧閧地亦無了期欲得易會但知於聲色前不被萬境惑亂自然露倮倮地自然無事送向聲色中蕩蕩地恰似一團火燄相似觸著便燒更有甚麼事不見道非是塵不侵自是我無心時熱珍重雪峰義存禪師僧問西山和尚如何是祖師西來意山舉拂子示之其僧不肯後參師師問甚處來云浙中來師曰今夏在甚處曰蘇州西山師曰和尚安否曰來時萬福師曰何不在彼從容曰佛法不明師曰有甚麼事僧舉前話師曰汝作麼生不肯他曰是境師曰汝見蘇州人家男女否曰見師曰汝見路上林木否曰見師曰凡覩人家男女大地林沼總是境汝肯他否曰肯師曰祇如拈拂子汝作麼生不肯僧乃禮拜曰學人取次發言乞和尚慈悲師曰盡乾坤是箇眼汝向甚麼處蹲坐僧無對三聖問透網金鱗以何為食師曰待汝出網來向汝道聖曰一千五百人善知識話頭也不識師曰老僧住持事繁師問僧甚處來曰溈山來師曰溈山有何言句曰某甲曾問如何是祖師西來意溈山據座師曰汝肯他否曰某甲不肯他師曰溈山古佛汝可速去懺悔問僧甚麼處去曰識得即知去處師曰你是了事人亂走作麼曰和尚莫塗污人好師曰我即不塗污你古人吹布毛作麼生與我說來看曰殘羮餿飯已有人吃了師休去玄沙問師曰某甲如今大用去和尚作麼生師將三箇木毬一時拋出沙作斫牌勢師曰你親在靈山方得如此沙曰也是自家事普請次路逢一獼猴師曰人人有一面古鏡這箇獼猴亦有一面古鏡三聖曰曠劫無名何以彰為古鏡師曰瑕生也聖曰這老漢著甚麼死急話頭也不識師曰老僧住持事繁問古磵寒泉時如何師曰瞪目不見底曰飲者如何師曰不從口入僧舉似趙州州曰不從口入不可從鼻孔裏入僧却問古磵寒泉時如何州曰苦曰飲者如何州曰死師聞得乃曰趙州古佛遙望作禮自此不答話師一日在僧堂內燒火閉却前後門乃叫曰救火救火玄沙將一片柴從窗櫺中拋入師便開門上堂南山有一條鼈鼻蛇汝等諸人切須好看長慶出曰今日堂中大有人喪身失命雲門以拄杖攛向師前作怕勢有僧舉似玄沙沙曰須是稜兄始得雖然如是我即不然曰和尚作麼生沙曰用南山作麼閩王問曰擬欲葢一所佛殿去時如何師曰大王何不葢取一所空王殿曰請師樣子師展兩手上堂盡大地撮來如粟米粒大拋向面前漆桶不會打鼓普請看上堂此事如一片田地相似一任諸人耕種無有不承此恩力者玄沙曰且作麼生是這田地師曰看玄沙曰是即是某甲不與麼師曰你作麼生玄沙曰祇是人人底上堂舉拂子曰這箇為中下僧問上上人來如何師舉拂子僧曰這箇為中下師便打上堂諸上座望州亭與汝相見了也烏石嶺與汝相見了也僧堂前與汝相見了也曹山本寂禪師僧問沙門豈不是具大慈悲底人師曰是曰若遇六賊來時却如何師曰亦須具大慈悲曰如何具大慈悲師曰一劍揮盡曰盡後如何師曰始得和同問眉與目還相識也無師曰不相識曰為甚麼不相識師曰為同在一處曰恁麼則不分去也師曰眉且不是目曰如何是目師曰端的去曰如何是眉師曰曹山却疑曰和尚為甚麼却疑師曰若不疑即端的去也雲門問如何是沙門行師曰喫常住苗稼者是曰便恁麼去時如何師曰你還畜得麼曰畜得師曰你作麼生畜曰著衣喫飯有甚麼難師曰何不道披毛戴角門禮拜師問德上座菩薩在定聞香象渡河出甚麼經曰出涅槃經師曰定前聞定後聞曰和尚流也師曰道也太煞道祇道得一半曰和尚如何師曰灘下接取師問僧作甚麼曰掃地師曰佛前掃佛後掃曰前後一時掃師曰與曹山過靸鞋來僧問親何道伴即得常聞於未聞師曰同共一被葢曰此猶是得聞如何是常聞於未聞師曰不同於木石曰何者在先何者在後師曰不見道常聞於未聞僧問一牛飲水五馬不嘶時如何師曰曹山解忌口紙衣道者來參師問莫是紙衣道者否者曰不敢師曰如何是紙衣下事者曰一裘纔挂體萬法悉皆如師曰如何是紙衣下用者近前應諾便立脫師曰汝祇解與麼去何不解恁麼來者忽開眼問曰一靈真性不假胞胎時如何師曰未是妙者曰如何是妙師曰不借借者珍重便化師示頌曰覺性圓明無相身莫將知見妄疏親念異便於玄體昧心差不與道為隣情分萬法沈前境識鑒多端喪本真如是句中全曉會了然無事昔時人師問強上座曰佛真法身猶若虗空應物現形如水中月作麼生說箇應底道理曰如驢覰井師曰道則太煞道祇道得八成曰和尚又如何師曰如井覰驢師讀杜順傅大士所作法身偈曰我意不欲與麼道門弟子請別作之既作偈又註釋之其詞曰渠本不是我非我我本不是渠非渠渠無我即死仰汝取活我無渠即余不別有渠如我是佛要且不是佛我如渠即驢二俱不立不食空王俸若遇御飯直須吐却何假雁傳書不通信我說橫身唱為信唱君看背上毛不與你相似乍如謠白雪將謂是白雪猶恐是巴歌傳此句無註雲居道膺禪師師造洞山山問甚處來師曰翠微來山曰翠微有何言句示徒師曰翠微供養羅漢某甲問供養羅漢羅漢還來否微曰你每日噇箇甚麼山曰實有此語否師曰有山曰不虗參見作家來山問汝名甚麼師曰道膺山曰向上更道師曰向上即不名道膺山曰與老僧祗對道吾底語一般深然之一日山問師甚處去來師曰蹋山來山曰那箇山堪住師曰那箇山不堪住山曰恁麼則國內總被闍黎占却師曰不然山曰恁麼則子得箇入路師曰無路山曰若無路爭得與老僧相見師曰若有路即與和尚隔山去也山曰此子已後千人萬人把不住去在僧問山河大地從何而有師曰從妄想有曰與某甲想出一鋌金得麼師便休去僧不肯示眾曰佛法有什麼多事行得即是但知心是佛莫愁佛不解語欲得如是事還須如是人自古先德醇素任真元來無巧設有人問如何是道或時答㼾磚木頭作麼皆重元來他根本脚下實有力即是不思議人握土成金若無如是事饒汝說得簇花簇錦相似盡說了合煞頭人總不信受元來自家脚下虗無力僧家發言吐氣須有來由莫當等閒一言參差即千里萬里若是知有底人自解護惜終不取次十度發言九度休去為什麼如此常恐無利益欲得與麼事須是與麼人既是與麼人不愁恁麼事恁麼事即難得師曰汝等直饒學得佛邊事早是錯用心了也不見古人講得天花落石點頭尚不干自己事如今擬將有限身心向無限中用有什麼交涉不見古人道學處不玄盡是流俗閨閤中物捨不得俱為滲漏直須向這裏及取去及去及來併盡一切事始得無過所以古人道猶如雙鏡光光相對光明相照更無虧盈豈不是一般猶喚作影像邊事如日出時光照世間明朗是一半那一半喚作甚麼如今人未認得光影門頭戶底麤淺底事將作屋裏事又爭得師曰從天降下即貧窮從地涌出即富貴門裏出身則易身裏出門則難動則埋身千尺不動則當處生苗一言迥脫獨拔當時語言不要多多則無用處僧問如何是從天降下即貧窮曰不貴得又問如何是從地涌出則富貴曰無中或有疏山匡仁禪師上堂病僧咸通年前會得法身邊事咸通年後會得法身向上事雲門出問如何是法身邊事師曰枯樁曰如何是法身向上事師曰非枯樁曰還許某甲說道理也無師曰許曰枯樁豈不是明法身邊事師曰是曰非枯樁豈不是明法身向上事師曰是曰祇如法身還該一切也無師曰法身周徧豈得不該門指淨瓶曰祇如淨瓶還該法身麼師曰闍黎莫向淨瓶邊覓門便禮拜師常握木蛇有僧問師手中是甚麼師提起曰曹家女洛京白馬遁儒禪師僧問如何是法身向上事師曰井底蝦蟆吞却月龍牙山居遁證空禪師師有頌曰學道如鑽火逢煙未可休直待金星現歸家始到頭問十二時中如何著力師曰如無手人欲行拳始得問古人得箇甚麼便休去師曰如賊入空室問如何是祖師西來意師曰待石烏龜解語即向汝道曰石烏龜語也師曰向汝道甚麼京兆府蜆子和尚師居無定所自印心於洞山混俗閩川冬夏惟披一衲逐日沿江岸採掇蝦蜆以充其腹暮即宿東山白馬廟紙錢中居民目為蜆子和尚華嚴靜禪師聞之欲決真假先潛入紙錢中深夜師歸嚴把住曰如何是祖師西來意師遽答曰神前酒臺盤嚴放手曰不虗與我同根生越州乾峰和尚上堂法身有三種病二種光須是一一透得始解歸家穩坐須知更有向上一竅在雲門出問菴內人為甚麼不知菴外事師呵呵大笑門曰猶是學人疑處師曰子是甚麼心行門曰也要和尚相委師曰直須與麼始解穩坐門應諾諾上堂舉一不得舉二放過一著落在第二雲門出眾曰昨日有人從天台來却往徑山去師曰典座來日不得普請便下座問十方薄伽梵一路涅槃門未審路頭在甚麼處師以拄杖畫云在這裏問僧甚處來曰天台師曰見說石橋作兩段是否曰和尚甚處得這消息來師曰將謂華頂峰前客元是平田莊裏人芭蕉山慧清禪師上堂拈拄杖示眾曰你有拄杖子我與你拄杖子你無拄杖子我奪却你拄杖子靠拄杖下座天童正覺云你有則一切有你無則一切無有無自是當人與奪關芭蕉甚事正恁麼時作麼生是你拄杖子南院慧顒禪師上堂諸方祇具啐同時眼不具啐同時用僧便問如何是啐同時用師曰作家不啐啐同時失曰此猶未是某甲問處師曰汝問處作麼生僧曰失師便打其僧不肯後於雲門會下聞二僧舉此話一僧曰當時南院棒折那其僧忽契悟台州瑞巖師彥禪師師尋居丹邱瑞巖坐盤石終日如愚每自喚主人公復應諾乃曰惺惺著他後莫受人瞞後有僧參玄沙沙問近離甚處曰瑞巖沙云有何言句示徒僧舉前話沙云一等是弄精魂也甚奇怪鏡清問天不能覆地不能載豈不是師曰若是即被覆載清曰若不是瑞巖幾遭也師自稱曰師彥玄沙師備宗一禪師雪峰上堂曰要會此事猶如古鏡當臺胡來胡現漢來漢現師出眾曰忽遇明鏡來時如何峰曰胡漢俱隱師曰老和尚脚跟猶未點地在一日雪峰指火曰三世諸佛在火𦦨裏轉大法輪師曰近日王令稍嚴峰曰作麼生師曰不許攙奪行市侍雪峰遊山次峰指面前地曰這一片地好造箇無縫塔師曰高多少峰乃顧視上下師曰人天福報即不無和尚若是靈山授記未夢見在峰曰你又作麼生師曰七尺八尺雪峰曰世界闊一尺古鏡闊一尺世界闊一丈古鏡闊一丈師指火罏曰火罏闊多少峰曰如古鏡闊師曰老和尚脚跟未點地在與雪峰夾籬次師問夾籬處還有佛法也無峰曰有師曰如何是夾籬處佛法峰撼籬一下師曰某甲不與麼峰曰子又作麼生師曰穿過篾頭來僧問如何是學人自己師曰用自己作麼鼓山來師作一圓相示之出曰人人出這箇不得師曰情知汝向驢胎馬腹裏作活計山曰和尚又作麼生師曰人人出這箇不得山曰和尚與麼道却得某甲為甚麼道不得師曰我得汝不得師與韋監軍茶話次軍曰占波國人語話稍難辨何況五天梵語還有人辨得麼師提起托子云識得這箇即辨得普請斫柴次見一虎天龍曰和尚虎師曰是汝虎歸院後天龍問適來見虎云是汝未審尊意如何師曰娑婆世界有四種極重事若人透得不妨出得陰界師問鏡清教中道不見一法為大過患且道不見甚麼法清指露柱曰莫是不見這箇法師曰浙中清水白米從汝喫佛法未夢見在僧問承和尚有言盡十方世界是一顆明珠學人如何得會師曰盡十方世界是一顆明珠用會作麼僧便休師來日却問其僧盡十方世界是一顆明珠汝作麼生會曰盡十方世界是一顆明珠用會作麼師曰知汝向鬼窟裏作活計師云若論此事喻如一片田地四至界分結契賣與諸人了也只有中心樹子猶屬老僧在上堂佛道閒曠無有程途無門解脫之門無意道人之意不在三際故不可升沈建立乖真非屬造化動則起生死之本靜則醉昏沈之鄉動靜雙泯即落空亡動靜雙收顢頇佛性必須對塵對境如枯木寒灰臨時應用不失其宜道本如如法爾天真不同修證祇要虗閒不昧作用不涉塵泥箇中纖毫道不盡即為魔王眷屬直饒得似秋潭月影靜夜鐘聲隨扣擊以無虧觸波瀾而不散猶是生死岸頭事道人行處如火銷冰終不却成冰箭既離弦無返回勢所以牢籠不肯住呼喚不回頭若到這裏步步登玄不屬邪正識不能識智不能知語路處絕心行處滅直得釋迦掩室於摩竭淨名杜口於毗耶若與麼現前更疑何事沒棲泊處離去來今不因莊嚴本來真淨便是千聖出頭來也安一字不得久立珍重示眾夫古佛真宗常隨物現堂堂應用處處流輝隱顯坦然高低盡照是以沙門上士道眼惟先契本明心方為究竟森羅萬象一體同源廓爾無邊誰論有滯塵劫中事都在目前時人曠隔年深致乖常體迷心認物以背真宗執有滯空渾成意度古德云情存聖量猶落法塵己見未忘還成滲漏不可道持齋持戒長坐不臥住意觀空凝神入定便當去也有甚麼交涉西天外道入得八萬劫定不免輪迴蓋為道眼不明生死根源不破如今甚麼處不是汝甚麼處不分明甚麼處不露現何不與麼會去若無這箇田地時中爭奈諸般滲漏何總成虗妄阿那箇便是平生得力處有為心法不可相依日久年深全無利益只為違真棄本厭離凡情忻心聖道作此見知不出他限量拋他五陰不去不見道諸行無常是生滅法你只擬向前爭能明得可中徹去方得知之若未究得當知盡是虗頭世間難信之法具大根器方能明達今生若徹去萬劫亦然古德云直向今生須了却誰能累劫受餘殃珍重上堂我今問汝諸人且承當得箇甚麼事在何世界安身立命還辨得麼若辨不得恰似揑目生花見事便差知麼如今目前現有山河大地色空明暗種種諸物皆是狂勞花相喚作顛倒知見夫出家人識心達本源故號為沙門大丈夫兒何不自省察看是甚麼事祇如從上宗乘是諸佛頂族但從迦葉門接續頓超去此一門超凡聖因果超毗盧妙莊嚴世界海直下永劫不教有一物與汝作眼見何不自急急究取未道我且待三生兩生久積淨業仁者宗乘是甚麼事不可由汝用功莊嚴便得去不可他心宿命便得去知麼識得即是大出脫大徹頭人所以超凡越聖出生離死離因離果超毗盧超釋迦不被凡聖因果所謾一切處無人識得汝知麼莫祇長戀生死愛網被善惡業拘將去無自由分饒汝鍊得身心同虗空去饒汝到精明湛不搖處不出識陰古人喚作如急流水流急不覺妄為恬靜恁麼修行盡出他輪迴際不得依前被輪迴去所以道諸行無常直是三乘功果若無道眼亦不究竟何似如今博地凡夫不用一毫功夫便頓超去解省心力麼我如今立地令汝搆去更不教汝加功鍊行如今不恁麼更待何時下座上堂汝諸人如在大海裏坐沒頭浸却了更展手問人乞水喫夫學般若菩薩須具大根器有大智慧始得有一般坐繩牀和尚稱善知識問著便搖身動手點眼吐舌瞪視更有一般說昭昭靈靈靈臺智性能見能聞向五蘊身田裏作主宰恁麼為善知識大賺人知麼我今問汝汝若認昭昭靈靈是汝真實為甚麼瞌睡時又不成昭昭靈靈若瞌睡時不是為甚麼有昭昭時汝還會麼這箇喚作認賊為子是生死根本妄想緣氣汝欲識根由麼我向汝道昭昭靈靈祇因前塵色聲香等法而有分別便道此是昭昭靈靈若無前塵汝此昭昭靈靈同於龜毛兔角仁者真實在甚麼處汝今欲得出他五蘊身田主宰但識取汝祕密金剛體古人向汝道圓成正徧徧周沙界祇如今山河大地十方國土色空明暗及汝身心莫非盡承汝圓成威光所現直是天人羣生類所作業次受生果報有情無情莫非承汝威光乃至諸佛成道成果接物利生莫非盡承汝威光祗如金剛體還有凡夫諸佛麼有汝心行麼不可道無便得當去也知麼汝既有如是奇特當陽出身處何不發明取因何却隨他向五蘊身田中鬼趣裏作活計直下自謾去若不了此煩惱惡業因緣不是一劫兩劫得休直與汝金剛齊壽知麼上堂太虗日輪是一切人成立太虗現在諸人作麼生滿目覰不見滿耳聽不聞此兩處省不得便是瞌睡漢若明徹得坐却凡聖坐却三界夢幻身心無一物如針鋒許為緣為對直饒諸佛出來作無限神通變現設如許多教網未曾措著一分毫惟助初學誠信之門還會麼如今沙門不薦此事翻成弄影漢生死海裏浮沈幾時休息去若要明徹即今這裏便明徹去不教仁者取一法如微塵大不教仁者捨一法如毫髮許還會麼師云是諸人見有險惡見有大蟲刀劍諸事逼汝身命便生無限怕怖如似什麼恰如世間畫師一般自畫作地獄變相作大蟲刀劍了好好地看時却自生怕怖汝今諸人亦復如是百般見有是汝自幻出自生怕怖亦不是別人與汝為過汝今欲覺此幻惑麼但識取汝金剛眼睛若識得不曾教汝有纖塵可得露現何處更有虎狼刀劍解愶嚇得汝所以我向汝道沙門眼把定世界函葢乾坤不漏絲髮何處更有一物為汝知見知麼何不急究取師示眾曰世尊道吾有正法眼藏付囑摩訶大迦葉猶如畫月曹溪豎拂猶如指月時鼓山出眾曰月呢師曰這箇阿師就我覓月鼓山不肯却歸眾曰道我就他覓月師以杖拄地問長生曰僧見俗見男見女見汝作麼生見曰和尚還見皎然見處麼師曰相識滿天下師與韋監軍喫果子韋問如何是百姓日用而不知師拈起果子曰喫韋喫果子了再問師曰祇這是日用而不知僧問學人乍入叢林乞師指箇入路師曰還聞偃溪水聲麼曰聞師曰從這裏入保福從展禪師長慶問見色便見心還見船子麼師曰見曰船子且置作麼生是心師却指船子師見僧以杖打露柱又打其僧頭僧作忍痛聲師曰那箇為甚麼不痛僧無對師因僧侍立問曰汝得恁麼麤心僧曰甚麼處是某甲麤心處師拈一塊土度與僧曰拋向門前著僧拋了却來曰甚麼處是某甲麤心處師曰我見築著磕著所以道汝麤心龍華靈照真覺禪師師一夕指半月問溥上座曰那一片甚麼處去也溥曰莫妄想師曰失却一片也翠巖令參永明禪師上堂一夏與兄弟東語西話看翠巖眉毛在麼圓悟勤拈云人多錯會道白日青天說無向當話無事生事夏末先自說過先自點檢免得別人點檢他且喜沒交涉這般見解謂之滅胡種族歷代宗師出世若不垂示於人都無利益圖箇甚麼到這裏見得透方知古人有驅耕夫之牛奪飢人之食手段如今人問著便向言句下齩嚼眉毛上作活計看他屋裏人自然知他行履處雪竇頌云千古無對他只道看翠巖眉毛在麼有什麼奇特處便乃千古無對須知古人吐一言半句出來不是造次須是有定乾坤底眼始得雪竇著一言半句如金剛王寶劍如踞地獅子如擊石火似閃電光若不是頂門具眼爭能見他古人落處這箇示眾直得千古無對過於德山棒臨濟喝且道翠巖雪竇為人意在什麼處急著眼看鏡清道怤順德禪師普請次雪峰舉溈山道見色便見心汝道還有過也無師曰古人為甚麼事峰曰雖然如此要共汝商量師曰恁麼則不如道怤鉏地去師再參雪峰峰問甚處來師曰嶺外來峰曰甚麼處逢見達摩師曰更在甚麼處峰曰未信汝在師曰和尚莫恁麼粘膩好峰便休師後徧歷諸方益資權智因訪先曹山山問甚麼處來師曰昨日離明水山曰甚麼時到明水師曰和尚到時到山曰汝道我甚麼時到師曰適來猶記得山曰如是如是師因僧問新年頭還有佛法也無師曰有曰如何是新年頭佛法師曰元正啟祚萬物咸新曰謝師答話師曰鏡清今日失利問僧近離甚處曰石橋師曰本分事作麼生曰近離石橋師曰我豈不知你近離石橋本分事作麼生曰和尚何不領話師便打僧曰某甲話在師曰你但喫棒我要這話行問僧門外甚麼聲曰雨滴聲師曰眾生顛倒迷己逐物曰和尚作麼生師曰洎不迷己曰洎不迷己意旨如何師曰出身猶可易脫體道應難太原孚上座雪峰一日見師乃指日示之師搖手而出峰曰汝不肯我那師曰和尚搖頭某甲擺尾甚麼處是不肯峰曰到處也須諱却一日眾僧晚參峰在中庭臥師曰五州管內祇有這老和尚較些子峰便起去峰問師見說臨濟有三句是否師曰是曰作麼生是第一句師舉目視之峰曰此猶是第二句如何是第一句師叉手而退自此峰深器之一日玄沙上問訊雪峰峰曰此間有箇老鼠子今在浴室裏沙曰待與和尚勘過言訖到浴室遇師打水沙曰相看上座師曰已相見了沙曰甚麼劫中曾相見師曰瞌睡作麼沙却入方丈白雪峰曰已勘破了峰曰作麼生勘伊沙舉前話峰曰汝著賊也金峰從志禪師師拈起枕子示僧曰一切人喚作枕子金峰道不是僧曰未審和尚喚作甚麼師拈起枕子僧曰恁麼則依而行之師曰你喚作甚麼曰枕子師曰落在金峰窩裏問是身無知如土木瓦石此意如何師下禪牀扭僧耳朵僧負痛作聲師曰今日始捉著箇無知漢僧作禮出去師召闍黎僧回首師曰若到堂中不可舉著曰何故師曰大有人笑金峰老婆心上堂事存函葢合理應箭鋒拄還有人道得麼如有人道得金峰分半院與他住時有僧出作禮師曰相見易得好共住難為人便下座僧侍次師曰舉一則因緣汝第一不得亂會曰請和尚舉師豎拂子僧良久師曰知道闍黎亂會僧以目視東西師曰雪上更加霜佛日本空禪師師年十三參夾山纔入門見維那那曰此間不著後生師曰某甲不求挂搭暫來禮謁和尚維那白夾山山許相見師擬上階山曰三道寶階從何而上師曰三道寶階曲為今時向上一路請師直指山便揖師乃上階禮拜山問闍黎與甚麼人同行師曰木上座山曰何不相看老僧師曰和尚看他有分山曰在甚麼處師曰在堂中山便同師下到堂中師遂取拄杖擲在山面前山曰莫從天台得否師曰非五嶽之所生山曰莫從須彌得否師曰月宮亦不逢山曰恁麼則從人得也師曰自己尚是冤家從人得堪作甚麼山曰冷灰裏有一粒豆𪹼乃喚維那明窗下安排著來日普請維那令師送茶師曰某甲為佛法來不為送茶來那曰奉和尚處分師曰和尚尊命即得乃將茶去作務處搖茶甌作聲山回顧師曰釅茶三五盌意在钁頭邊山曰瓶有傾茶勢籃中幾箇甌師曰瓶有傾茶勢籃中無一甌便行茶時眾皆舉目師曰大眾鶴望請師一言山曰路逢死蛇莫打殺無底籃子盛將歸師曰手執夜明符幾箇知天曉眾皆仰歎撫州疏山證禪師師謁投子投子問近離甚處曰延平投子曰還將得劍來麼曰將得來投子曰呈似老僧看師乃指面前地投子便休至晚問侍者新到在麼侍者曰當時去也投子曰三十年弄馬騎今日被驢撲頴橋鐵胡安禪師師與鐘司徒向火次鐘問三界焚燒時如何出得師以香匙撥開火鐘擬議師撥火云司徒司徒鐘忽有省同安慧敏禪師師初參洞山問諸聖以何為命洞山曰以不間斷師曰還有向上事也無洞山曰有師曰如何是向上事洞山曰不從間斷師於言下有省白雲藏和尚僧問如何是深深處師曰矮子渡深溪問赤脚時如何師曰何不脫却明招德謙禪師師到坦長老處坦曰夫參學一人所在亦須到半人所在亦須到師便問一人所在即不問如何是半人所在坦無對後令小師問師師曰汝欲識半人所在麼也祇是弄泥團漢到堯庵乃提起縧子云得恁麼鬍𣯶𣯶地庵云莫錯認定盤星師曰恰是訪保寧於中路相遇便問兄是道伴中人乃點鼻頭曰這箇礙塞我不徹與我拈却少時得麼寧曰和尚有來多少時師曰噫幾賺我踏破一緉草鞋便回師往國泰深乃領眾出接至門首師乃指金剛云者兩箇漢在這裏作什麼深揎拳作金剛勢師云殿裏黃面老子笑你師在招慶因普請去王太傅宅取木佛傅乃問大眾云忽遇丹霞又作麼生眾無語師當時捧起向頂上云也要分付著人鹿門譚和尚僧問如何是實際理地師曰南贍部洲北鬱單越云恁麼則事同一家師曰隔須彌在羅漢院桂琛禪師玄沙問三界惟心汝作麼生會師指椅子曰和尚喚這箇作甚麼曰椅子師曰和尚不會三界惟心曰我喚這箇作竹木汝喚作甚麼師曰桂琛亦喚作竹木曰盡大地覓一箇會佛法底人不可得師自爾愈加激勵師侍沙在方丈說話夜深侍者閉却門沙曰門總閉了汝作麼生得出去師曰喚甚麼作門問僧甚處來曰南方來師曰南方知識有何言句示徒曰彼中道金屑雖貴眼裏著不得師曰我道須彌在汝眼裏保福僧到師問彼中佛法如何答曰有時示眾云塞却你眼教你覰不見塞却你耳教你聽不聞坐却你意教你分別不得師曰吾問你不塞你眼見箇甚麼不塞你耳聞箇甚麼不坐你意作麼生分別師見僧舉拂子曰還會麼曰謝和尚慈悲示學人師曰見我豎拂子便云示學人汝每日見山見水可不示汝又見僧來舉拂子其僧讚歎禮拜師曰見我豎拂子便禮拜讚歎那裏掃地豎起掃帚為甚麼不讚歎上堂諸上座不用低頭思量思量不及便道不用揀擇委得下口處麼汝向什麼處下口試道看還有一法近得汝還有一法遠得汝麼同得汝異得汝麼既然如是為甚麼却特地艱難去上堂宗門玄妙為當祇恁麼也更別有奇特若別有奇特汝且舉將來看若無去不可將兩箇字便當却宗乘也何者兩箇字謂宗乘教乘也汝纔道著宗乘便是宗乘道著教乘便是教乘禪德佛法宗乘原來由汝口裏安立名字作取說取便是也斯須向這裏說平說實說圓說常禪德汝喚甚麼作平實把甚麼作圓常傍家行脚理須甄別莫相埋沒得些子聲色名字貯在心頭道我會解善能揀辨汝且會箇甚麼揀箇甚麼記持得底是名字揀辨得底是聲色若不是聲色名字汝又作麼生記持揀辨風吹松樹也是聲蝦蟆老鵶叫也是聲何不那裏聽取揀辨去若那裏有箇意度模樣祇如老師口裏又有多少意度與上座莫錯即今聲色摐摐地為當相及不相及若相及即汝靈性金剛祕密應有壞滅去也何以如此為聲貫破汝耳色穿破汝眼因緣即塞却汝幻妄走殺汝聲色體爾不可容也若不相及又甚麼處得聲色來會麼相及不相及試裁辨看少間又道是圓常平實甚麼人恁麼道未是黃夷村裏漢解恁麼說是他古聖垂些子相助顯發今時不識好惡便安圓實道我別有宗風玄妙釋迦佛無舌頭不如汝些子便恁麼點胸若論殺盜婬罪雖重猶輕尚有歇時此箇謗般若瞎却眾生眼入阿鼻地獄吞鐵丸莫將為等閒所以古人道過在化主不干汝事珍重安國慧球禪師師於玄沙室中參訊居首因問如何是第一月沙曰用汝箇月作麼師從此悟入上堂我此間粥飯因緣為兄弟舉唱終是不常欲得省要却是山河大地與汝發明其道既常亦能究竟若從文殊門入者一切無為土木瓦礫助汝發機若從觀音門入者一切音響蝦蟆蚯蚓助汝發機若是普賢門入者不動步而到以此三門方便示汝如將一隻折箸攪大海水令彼魚龍知水為命會麼若無智眼而審諦之任汝百般巧妙不為究竟師問了院主祇如先師道盡十方世界是真實人體你還見僧堂麼了曰和尚莫眼花師曰先師遷化肉猶煖在招慶省僜禪師師初參保福福一日入大殿覩佛像乃舉手問師曰佛恁麼意作麼生師曰和尚也是橫身福曰一橛我自收取師曰和尚非惟橫身福然之大龍智洪禪師僧問色身敗壞如何是堅固法身師曰山花開似錦㵎水碧如藍雪竇顯頌問曾不知答還不會月冷風高古巖寒檜堪笑路逢達道人不將語默對手把珊瑚鞭驪珠盡擊碎不擊碎增瑕纇國有憲章三千條罪龜洋慧忠禪師一日謂弟子曰眾生不能解脫者情累爾悟道易明道難問如何得明道去師曰但脫情見其道自明矣夫明之為言信也如禁蛇人信其呪力藥力以蛇綰弄揣懷袖中無難未知呪藥等力者怖駭棄去但諦見自心情見便破今千疑萬慮不得用者是未見自心者也白雲子祥禪師上堂諸人會麼但向街頭市尾屠兒魁劊地獄鑊湯處會取若恁麼會得堪與人天為師若向衲僧門下天地懸殊更有一般底祇向長連牀上作好人去汝道此兩般人那箇有長處無事珍重問僧不壞假名而談實相作麼生僧指椅子曰這箇是椅子師以手撥椅曰與我將鞋袋來僧無對師曰這虗頭漢雲門聞乃云須是我祥兄始得德山緣密禪師上堂我有三句語示汝諸人一句函葢乾坤一句截斷眾流一句隨波逐浪作麼生辨若辨得出有參學分若辨不出長安路上輥輥地示眾俱胝和尚但有問答只豎一指頭寒則普天普地寒熱則普天普地熱上堂但參活句莫參死句活句下薦得永劫無滯一塵一佛國一葉一釋迦是死句揚眉瞬目舉指豎拂是死句山河大地更無誵訛是死句時有僧問如何是活句師曰波斯仰面看曰恁麼則不謬去也師便打巴陵新開院顥鑒禪師師住後更不作法嗣書祇將三轉語上雲門僧問如何是道師曰明眼人落井問如何是吹毛劍師曰珊瑚枝枝撑著月問如何是提婆宗師曰銀盌裏盛雪雲門見曰他後老僧忌日祇消舉此三轉語足以報恩雙泉師寬明教禪師僧問洞山初和尚如何是佛初曰麻三斤師聞之乃曰向南有竹向北有木一日雲門問師今日喫得幾箇胡餅師曰五箇門曰露柱喫得幾箇師曰請和尚茶堂裏喫茶師一日訪白兆兆曰老僧有箇木魚頌師曰請舉看兆曰伏惟爛木一橛佛與眾生不別若以杖子擊著直得聖凡路絕師曰此頌有成禠無成禠兆曰無成禠師曰佛與眾生不別呢侍僧救曰有成禠師曰直得聖凡路絕呢當時白兆一眾失色洞山守初宗慧禪師師初參雲門門問近離甚處師曰查渡門曰夏在甚處師曰湖南報慈曰幾時離彼師曰八月二十五門曰放汝三頓棒師至明日却上問訊昨日蒙和尚放三頓棒不知過在甚麼處門曰飯袋子江西湖南便恁麼去師於言下大悟遂曰他後向無人煙處不蓄一粒米不種一莖菜接待十方往來盡與伊抽釘拔楔拈却炙脂帽子脫却鶻臭布衫教伊灑灑地作箇無事衲僧豈不快哉門曰你身如椰子大開得如許大口師便禮拜示眾語中有語名為死句語中無語名為活句諸禪德作麼生是活句到這裏實難得人若也不動一塵不撥一境見事便道答話長老下脚不得東西南北莫知多少要得去離泥水活人眼目舉唱宗風激揚大事不道全無其奈還少只緣未達其源落在第八魔境界中識得箇不名不物無是無非頭頭物物無不具足道我得安樂田地更不求餘凡有叩擊問難即便敲牀豎拂更不惜便施便設便行便用向惡水坑裏頭出頭沒弄箇無尾猢猻到臘月三十日鼓也打破猢猻又走却了手忙脚亂一無所成悔將何及若是箇衲僧乍可涷殺餓殺終不著他鶻臭布衫又曰舉唱宗乘闡揚大教須得法眼精明方能鑒辨緇素切緣真妄一源水乳同器到此難分洞山尋常以心中眼觀身外相觀之又觀乃辨真偽若不如是何名善知識夫善知識者驅耕夫之牛奪飢人之食方名善知識即今天下那箇是真善知識諸禪德參得幾箇善知識來也不是等閒直須參教徹覰教透千聖莫能證明方顯大丈夫兒不見釋迦老子明星出時豁然大悟與大地眾生同時成佛無前後際豈不暢哉雖然如是若遇明眼衲僧也好劈脊便棒問維摩掌擎四世界未審維摩身在甚處師曰在闍黎後底曰為甚麼在學人後底師曰還我話頭來問如何是佛師曰麻三斤問自古及今不從人得六祖在黃梅夜間聞何事師曰誌公拄杖曰得用時如何師曰用那曲尺作甚麼問十二時中行住坐臥自省覺時如何師曰看人喫飯曰爭奈樹影不斜何師曰親言出親口問金鍮現前請師辨師曰兩脚蝦蟆吞却月都監太保問眼處入正受諸塵三昧起此意如何師云洞山茶碗裏有太保太保茶碗裏有洞山太保無語首山省念禪師僧問如何是佛師曰新婦騎驢阿家牽曰未審此語甚麼句中收師曰三玄收不得四句豈能該曰此意如何師曰天長地久日月齊明僧問學人乍入叢林乞師指示師曰闍黎在老僧會裏多少時曰已經冬夏師曰莫錯舉似人乃曰若論此事實不挂一元字脚便下座問僧近離何處曰廣慧師曰穿雲不渡水渡水不穿雲離此二途速道曰昨夜宿長橋師曰與麼則合喫首山棒也曰尚未參堂師曰兩重公案曰恰是師曰耶耶示眾諸上座不得盲喝亂喝者裏尋常向你道賓則始終賓主則始終主賓無二賓主無二主若有二賓二主即是兩箇瞎漢所以我若立時你須坐我若坐時你須立坐則共你坐立則共你立雖然如是到這裏急著眼始得若是眼孔定動即千里萬里何故如此如隔窗看馬騎相似擬議即沒交涉諸上座既然於此留心直須仔細不要掠虗好他日異時賺著你在諸人若也有事近前無事珍重師示眾曰識得拄杖子行脚事畢嘗作綱宗偈曰咄哉拙郎君巧妙無人識打破鳳林關著靴水上立咄哉巧女兒攛梭不解織看他鬬鷄人水牛也不識背陰山子向陽多南來北往意如何若人問我西來意東海東面有新羅師上堂辭眾偈曰諸子謾波波過却幾恒河觀音指彌勒文殊不奈何良久曰白銀世界金色身情與無情共一真明暗盡時都不照日輪午後示全身日午後泊然而化清溪洪進禪師一日師問修山主曰明知生是不生之理為甚麼為生死之所流修曰筍畢竟成竹去如今作篾使還得麼師曰汝向後自悟去在修曰某所見止如此上座意旨又如何師指曰這箇是監院房那箇是典座房修即禮謝龍濟修禪師問劫火洞然大千俱壞未審這箇還壞也無師曰不壞曰為甚麼不壞師曰為同於大千上堂捲簾除却障閉戶生窒礙祇這障與礙古今無人會會得是障礙不會不自在僧問古鏡未磨時如何師曰照破天地曰磨後如何師曰黑漆漆地萬法是心光諸緣唯性曉本無迷悟人祇要今日了智門光祚禪師上堂赫日裏我人雲霧裏慈悲霜雪裏假褐雹子裏藏身還藏身得麼若藏不得却被雹子打破髑髏示眾數日好雨且道雨從甚處來若道從天降那箇是天若道從地出喚甚麼作地若更不會所以古人道天地之前徑時人莫強移箇中生解會眼上更安錐蓮花峰祥庵主師示眾云若是此事最是急切須是明取使得若是明得時中免被拘繫便得隨處安閒亦不要將心捺伏須是自然合他古轍去始得纔到學處分劑便須露布箇道理以為佛法幾時得心地休歇去上座却請與麼相委好示寂日拈拄杖示眾曰古人到這裏為甚麼不肯住眾無對師乃曰為他途路不得力復曰畢竟如何以杖橫肩曰楖𣗖橫擔不顧人直入千峰萬峰去言畢而逝藍田真禪師上堂成山假就於始簣修塗託至於初步上座適來從地鑪邊來還與初步同別若言同即不會不遷若言別亦不會不遷上座作麼生會還會麼這裏不是那裏那裏不是這裏且道一處兩處是遷不遷是來去不是來去若於此顯明得便乃古今一如初終自爾念念無常心心永滅所以道觀方知彼去去者不知方上座適來恁麼來却請恁麼去參清涼法眼文益禪師師同紹修法進三人欲出嶺過地藏院阻雪少憩附罏次藏問此行何之師曰行脚去藏曰作麼生是行脚事師曰不知藏曰不知最親切又同三人舉肇論至天地與我同根處藏曰山河大地與上座自己是同是別師曰別藏豎起兩指師曰同藏又豎起兩指便起去雪霽辭去藏門送之問曰上座尋常說三界惟心萬法惟識乃指庭下片石曰且道此石在心內在心外師曰在心內藏曰行脚人著甚麼來由安片石在心頭師窘無以對即放包依席下求決擇近一月餘日呈見解說道理藏語之曰佛法不恁麼師曰某甲辭窮理絕也藏曰若論佛法一切現成師於言下大悟僧慧超問如何是佛師曰汝是慧超嘗指竹問僧曰還見麼曰見師曰竹來眼裏眼到竹邊曰總不與麼師笑曰死急作麼師因患脚僧問訊次師曰非人來時不能動及至人來動不得且道佛法中下得甚麼語曰和尚且喜得較師不肯自別云和尚今日似減因開井被沙塞却泉眼師曰泉眼不通被沙礙道眼不通被甚麼礙僧無對師代曰被眼礙上堂盡十方世界皎皎地無一絲頭若有一絲頭即是一絲頭師曰出家兒但隨時及節便得寒即寒熱即熱欲識佛性義當觀時節因緣古今方便不少石頭初看肇論至會萬物為己者其惟聖人乎則曰聖人無己靡所不己乃作參同契首言竺土大仙心無過此語也中間亦只尋常說話夫欲會萬物為自己去蓋盡大地無一法可見已而又囑曰光陰莫虗度所以告汝輩但隨時及節便得若也移時失候即虗度光陰於非色中作色解於非色作色解即是移時失候且道色作非色解還當得否若與麼會便是沒交涉正是癡狂兩頭走有甚麼用處但守分過時好上堂大眾久立乃謂之曰諸人各曾看還源觀百門義海華嚴論涅槃經諸多䇿子阿那箇教中有這箇時節若有試舉看莫是恁麼經裏有恁麼語是此時節麼有甚麼交涉所以道微言滯於心首嘗為緣慮之場實際居於目前飜為名相之境又作麼生得飜去若也飜去又作麼生得正去還會麼莫祇恁麼念䇿子有甚麼用處文邃禪師嘗究首楞嚴為之節解句釋自謂深符經旨謁師師曰楞嚴豈不是有八還義邃曰是師曰明還甚麼邃曰明還日輪師曰日輪還甚麼邃懵然師戒令焚所注文邃始依師請益玄則禪師問青峰如何是學人自己峰曰丙丁童子來求火後謁師師問甚處來則曰青峰師曰青峰有何言句則舉前話師曰上座作麼生會則曰丙丁屬火而更求火如將自己求自己師曰與麼會又爭得則曰某甲祇與麼未審和尚如何師曰你問我我與你道則問如何是學人自己師曰丙丁童子來求火三界惟心頌曰三界惟心萬法惟識惟識惟心眼聲耳色色不到耳聲何觸眼眼色耳聲萬法成辦萬法匪緣豈觀如幻大地山河誰堅誰變華嚴六相義頌曰華嚴六相義同中還有異異若異於同全非諸佛意諸佛意總別何曾有同異男子身中入定時女子身中不留意不留意絕名字萬象明明無理事承天三交智嵩禪師師參首山問如何是佛法的的大意首山曰楚王城畔汝水東流師於此有省頓契佛意乃作三元偈曰須用真須用心意莫定動三歲獅子吼十方沒狐種我有真如性如同幕裏隱打破六門關顯出毗盧印真骨金剛體可誇六塵一拂永無遮廓落世界空為體體上無為真到家首山聞乃請喫茶問這三頌是汝作來耶師曰是首山曰或有人教汝現三十二相時如何師曰某甲不是野狐精首山曰惜取眉毛師曰和尚落了多少首山以竹篦頭上打曰這漢向後亂作去在鄭工部問師百尺竿頭獨打毬萬丈懸崖絲繫腰時如何師曰幽州著脚廣南廝撲鄭無語師曰勘破這胡漢鄭曰二十年江南界裏這回却見禪師師曰瞎老婆吹火潭州神鼎洪諲禪師師與數耆宿至襄沔間一僧舉論宗乘頗敏捷會野飯山店中供辦而僧論說不已師曰三界惟心萬法惟識惟識惟心眼聲耳色是甚麼人語僧曰法眼語師曰其義如何曰惟心故根境不相到惟識故聲色樅然師曰舌味是根境否曰是師以筯筴菜入口中含胡而語曰何謂相入耶坐者皆駭然僧不能答師曰途路之樂終未到家見解入微不名見道參須實參悟須實悟閻羅大王不怕多語上堂舉古德曰貪瞋癡太無知賴我今朝識得伊行便打坐便搥分付心王子細推無量劫來不解脫問汝三人知不知師曰古人與麼道神鼎則不然貪瞋癡實無知十二時中任從伊行即往坐即隨分付心王擬何為無量劫來元解脫何須更問知不知谷隱蘊聰慈照禪師僧問若能轉物即同如來未審三門佛殿如何轉師曰我向汝道汝還信麼曰和尚誠言安敢不信師曰這漆桶問一處火發任從你救八方齊發時如何師曰快曰還求出也無師曰若求出即燒殺你僧禮拜師曰直饒你不求出也燒殺你上堂師云五白猫兒爪距獰養來堂上絕蟲行分明上樹安身法切忌遺言許外生作麼生是許外生底句莫錯舉僧問深山巖崖還有佛法也無師曰有曰如何是深山巖崖中佛法曰奇怪石頭形似虎火燒松樹勢如龍洞山曉聰禪師僧問達摩未傳心地印釋迦未解髻中珠此時若問西來意還有西來意也無師曰六月雨淋淋寬其萬姓心曰恁麼則雲散家家月春來處處花師曰脚跟下到金剛水際是多少僧無語師曰祖師西來特唱此事自是上座不薦所以從門入者不是家珍認影迷頭豈非大錯既是祖師西來特唱此事又何必更對眾忉忉珍重天台德韶國師師所至少留見知識五十四人括磨搜剝窮極隱祕後至臨川謁法眼眼一見深契之師以徧涉叢林但隨眾而已無所咨參有僧問法眼禪師曰十二時中如何得頓息萬緣去法眼曰空與汝為緣耶色與汝為緣耶言空為緣則空本無緣言色為緣則色心不二日用果何物為汝緣乎師聞悚然異之又有問者曰如何是曹源一滴水法眼曰是曹源一滴水於是師大悟於座下平生疑滯渙若冰釋感涕沾衣法眼曰汝當大弘吾宗行矣無自滯興教明和尚問曰飲光持釋迦丈六之衣在雞足山侯彌勒下生將丈六之衣披在千尺之身應量恰好祇如釋迦身長丈六彌勒身長千尺為復是身解短耶衣解長耶師曰汝却會明拂袖便出去師曰小兒子山僧若答汝不是當有因果汝若不是吾當見之明歸七日吐血浮光和尚勸曰汝速去懺悔明乃至師方丈悲泣曰願和尚慈悲許某懺悔師曰如人倒地因地而起不曾教汝起倒明又曰若許懺悔某當終身給侍師為出語曰佛佛道齊宛爾高低釋迦彌勒如印印泥僧問承古有言若人見般若即被般若縛若人不見般若亦被般若縛既見般若為甚麼却被縛師曰你道般若見甚麼曰不見般若為甚麼亦被縛師曰你道般若甚麼處不見乃曰若見般若不名般若不見般若亦不名般若且作麼生說見不見所以古人道若欠一法不成法身若剩一法不成法身若有一法不成法身若無一法不成法身此是般若之真宗也示眾真宗不二萬德無言正當明時如王寶劍所以如來於一切處成等正覺於刀山劍樹上成等正覺於鑊湯罏炭裏成等正覺於棒下成等正覺於喝下成等正覺所以一動一靜一去一來一生一滅未曾有纖毫異相未曾有纖毫別相更無毫釐絲髮許作見聞心識解會何故誠謂是非路絕妙性天機所以云汝生我亦生汝殺我亦殺生殺輪王機交馳激電掣上堂佛法現成一切具足豈不見道圓同太虗無欠無餘若如是也且誰欠誰剩誰是誰非誰是會者誰是不會者所以道東去亦是上座西去亦是上座南去亦是上座北去亦是上座因甚麼却成東西南北若會得自然見聞覺知路絕一切諸法現前何故如此為法身無相觸目皆形般若無知對緣而照一時徹底會取好諸上座出家兒合作麼生此是本有之理未為分外識心達本源故名為沙門若識心皎皎地實無絲毫障礙上座久立珍重上堂古聖方便猶如河沙祖師道非風旛動仁者心動斯乃無上心印法門我輩是祖師門下客合作麼生會祖師意莫道風旛不動汝心妄動莫道不撥風旛就風旛通取莫道風旛動處是甚麼有云附物明心不須認物有云色即是空有云非風旛動應須妙會如是解會與祖師意旨有何交涉既不許如是會諸上座便合知悉若於這裏徹底悟去何法門而不明百千諸佛方便一時洞了更有甚麼疑情所以古人道一了千明一迷萬惑上堂毛吞巨海海性無虧纖芥投鋒鋒利無動見與不見會與不會唯我知焉乃有頌曰暫下高峰已顯揚般若圓通遍十方人天浩浩無差別法界縱橫處處彰珍重上堂古者道如何是禪三界緜緜如何是道十方浩浩因甚麼道三界緜緜何處是十方浩浩底道理要會麼塞却眼塞却耳塞却舌身意無空闕處無轉動處上座作麼生會橫亦不得豎亦不得縱亦不得奪亦不得無用心處亦無施設處若如是會得始會法門絕揀擇一切言語絕滲漏曾有僧問作麼生是絕滲漏底語向他道口似鼻孔甚好上座如此會自然不通風去如識得盡十方世界是金剛眼睛無事珍重上堂僧問欲入無為海先乘般若船如何是般若船師曰常無所住曰如何是無為海師曰且會般若船問古德道登天不借梯徧地無行路如何是登天不借梯師曰不遺絲髮地曰如何是徧地無行路師曰適來向你道甚麼乃曰百千三昧門百千神通門百千妙用門盡不出得般若海中何以故為於無住本建立諸法所以道生滅去來邪正動靜千變萬化是諸佛大定門無過於此諸上座大家究取珍重上堂舉古者道吾有一言天上人間若人不會綠水青山且作麼生是一言底道理古人語須是曉達始得若是將言而名於言未有箇會處良由究盡諸法根蒂始會一言不是一言半句思量解會喚作一言若會言語道斷心行處滅始到古人境界亦不是閉目藏睛暗中無所見喚作言語道斷且莫賺會佛法不是這箇道理要會麼假饒經塵沙劫說亦未曾有半句到諸上座經塵沙劫不說亦未曾欠少半句應須徹底會去始得若如是斟酌名言空勞心力並無用處與諸上座共相證明後學初心速須究取久立珍重師有偈曰通玄峰頂不是人間心外無法滿目青山法眼聞曰即此一頌可起吾宗師以涅槃四種聞示學者諸方目為韶國師四料揀云聞聞聞不聞不聞聞不聞不聞靈隱清聳禪師師參法眼眼指雨謂師曰滴滴落在上座眼裏師初不喻旨後因閱華嚴感悟承眼印可上堂曰十方諸佛常在汝前還見麼若言見將心見將眼見所以道一切法不生一切法不滅若能如是解諸佛常現前又曰見色便見心且喚甚麼作心山河大地萬象森羅青黃赤白男女等相是心不是心若是心為甚麼却成物象去若不是心又道見色便見心還會麼祇為迷此而成顛倒種種不同於無同異中強生同異且如今直下承當頓豁本心皎然無一物可作見聞若離心別求解脫者古人喚作迷波討源卒難曉悟奉先慧同禪師僧問教中道唯一堅密身一切塵中見又道佛身充滿於法界普現一切羣生前於此二途請師說師曰唯一堅密身一切塵中見永明道潛禪師師謁法眼眼曰子於參請外看甚麼經師曰華嚴經眼曰總別同異成壞六相是何門攝屬師曰文在十地品中據理則世出世間一切法皆具六相也眼曰空還具六相也無師無對眼曰汝問我師乃問空還具六相也無眼曰空師於是開悟踊躍禮謝眼曰子作麼生會師曰空眼然之異日因四眾士女入院眼問曰律中道隔壁聞釵釧聲即名破戒現覩金銀合雜朱紫駢闐是破戒不是破戒師曰好箇入路眼曰汝向後有五百毳徒為王侯所重在石霜慈明禪師師到大愚芝坐間開合子取香燒師問作麼生燒芝便放香爐中燒師指曰訝郎當漢又恁麼去也問鬧中取靜時如何師曰頭枕布袋問四山火來時如何師曰物逐人興永首座與師同辭汾陽永未盡其妙從師二十年終不脫灑一夕圍爐深夜師以火筯敲炭曰永首座永首座永咄曰野狐精師乃指永曰訝郎當漢又恁麼去也永乃豁然上堂道吾打鼓四大部洲同參拄杖橫也挑括乾坤大地鉢盂覆也葢却恒沙世界且問諸人向甚麼處安身立命若也知得向北俱盧洲喫粥喫飯若也不知長連牀上喫粥喫飯示眾一切聖賢皆以無為法而有差別前是按山後是主山那箇是無為法良久云向下文長付在來日作示徒偈曰黑黑黑道道道明明明得得得琅琊慧覺廣照禪師上堂山僧因看華嚴金師子章第九由心迴轉善成門又釋曰如一尺之鏡納重重之影像若然者道有也得道無也得道非亦得道是亦得雖然如是更須知有拄杖頭上一竅若也不會拄杖子穿燈籠入佛殿撞著釋迦磕倒彌勒露柱拊掌呵呵大笑你且道笑箇甚麼卓拄杖下座上堂汝等諸人在我這裏過夏與你點出五般病一不得向萬里無寸草處去二不得孤峰獨宿三不得張弓架箭四不得物外安身五不得滯於生殺何故一處有滯自救難為五處若通方名導師汝等諸人若到諸方遇明眼作者與我通箇消息貴得祖風不墜若是常徒即便寢息何故躶形國裏誇服飾想君太煞不知時示眾云有句無句如藤倚樹樹倒藤枯好一堆爛柴大愚守芝禪師僧問昔日靈山分半座二師相見事如何師曰記得麼僧良久師打禪牀一下曰多年忘却也乃曰且住且住若向言中取則句裏明機也似迷頭認影若也舉唱宗乘大似一場寐語雖然如是官不容針私通車馬放一線道有箇葛藤處遂敲禪牀一下曰三世諸佛盡皆頭痛且道大眾還有免得底麼若一人免得無有是處若免不得海印發光乃豎起拂子曰這箇是印那箇是光這箇是光那箇是印掣電之機徒勞佇思會麼老僧說夢且道夢見箇甚麼南柯十更若不會聽取一頌北斗挂須彌杖頭挑日月林泉有商量夏末秋風切珍重陞座揭香合子曰明頭來明頭合暗頭來暗頭合若道得天下橫行道不得且合却問通身是眼口在甚麼處師曰三跳曰不會師曰章底詞秋罷歌韻向春生慈明有善侍者號稱明眼聞師之風自石霜至大愚入室師趯出隻履示之善退身而立師俯取履善輒踏倒師起面壁以手點津連畫其壁三善瞠立其後師旋轉以履打至法堂善曰與麼為人瞎却一城人眼在文公楊億大年居士公出守汝州謁廣慧廣慧接見公便問布鼓當軒擊誰是知音者廣慧曰來風甚辨公曰恁麼則禪客相逢祇彈指也廣慧曰君子可入公應喏喏廣慧曰草賊大敗夜語次廣慧曰祕監曾與甚人道話來公曰某曾問雲巖諒監寺兩箇大蟲相齩時如何諒曰一合相某曰我祇管看未審恁麼道還得麼廣慧曰這裏即不然公曰請和尚別一轉語廣慧以手作拽鼻勢曰這畜生更𨁝跳在公於言下脫然無疑有偈曰八角磨盤空裏走金毛獅子變作狗擬欲將身北斗藏應須合掌南辰後天衣義懷禪師示眾古人云五蘊山頭一段空同門出入不相逢無量劫來賃屋住到頭不識主人翁有老宿拈云既不識他當初問甚麼人賃恁麼拈也太遠在何故須知死人路上有活人出身處活人路上死人無數那箇是活人路上死人無數那箇是死人路上活人出身處若檢點得分明拈却炙脂帽子脫却鶻臭布衫僧問如何是佛師曰布髮掩泥橫身臥地曰意旨如何師曰任是波旬也皺眉曰謝師指示師曰西天此土問學人上來請師說法師曰林間鳥噪水底魚行上堂須彌頂上不扣金鐘畢鉢巖中無人聚會山僧倒騎佛殿諸人反著草鞋朝遊檀特暮到羅浮拄杖針筒自家收取上堂師云衲僧橫說豎說未知有頂門上眼時有僧問如何是頂門上眼師曰衣穿瘦骨露屋破看星眠上堂大眾集定乃曰上來道箇不審能銷萬兩黃金下去道箇珍重亦銷得四天下供養若作佛法話會滴水難消若作無事商量眼中著屑且作麼生即是良久曰還會麼珍重上堂夫為宗師須是驅耕夫之牛奪飢人之食遇賤即貴遇貴即賤驅耕夫之牛令他苗稼豐登奪飢人之食令他永絕飢渴遇賤即貴握土成金遇貴即賤變金成土老僧亦不驅耕夫之牛亦不奪飢人之食何謂耕夫之牛我復何用飢人之食我復何餐我也不握土成金也不變金作土何也金是金土是土玉是玉石是石僧是僧俗是俗古今天地古今日月古今山河古今人倫雖然如此打破大散關幾箇迷逢達摩上堂鴈過長空影沈寒水鴈無遺蹤之意水無留影之心若能如是方解向異類中行不用續鳧截鶴夷嶽盈壑放行也百醜千拙收來也攣攣拳拳用之則敢與八大龍王鬬富不用都來不直半分錢參上堂髑髏常干世界鼻孔摩觸家風芭蕉聞雷開葵花隨日轉諸仁者芭蕉聞雷開還有耳麼葵花隨日轉還有眼麼若也會得西天即是此土若也不會七九六十三收上堂靈源絕朕普現色身法離斷常有無堪示所以道塵塵不見佛剎剎不聞經要會靈山親授記晝見日夜見星良久曰若到諸方不得錯舉參上堂無邊剎境自他不隔於毫端且道玅喜世界不動如來說甚麼法十世古今始終不離於當念祇如威音王佛最初一會度多少人若是通方作者試為道看良久曰行路難行路難萬仞峰頭君自看上堂僧問天不能葢地不能載未審是甚麼人師曰掘地深埋曰此人還受安排也無師曰土上更加泥師問僧無手人能行拳無舌人解言語忽然無手人打無舌人無舌人道箇甚麼色空頌二首色空空色色空空礙却潼關路不通劫火洞然毫末盡青山依舊白雲中東西南北十萬八千空生罔措火裏生蓮玉泉承皓禪師叢林號為皓布裩一日為張無盡舉傅大士頌曰空手把鉏頭步行騎水牛人從橋上過橋流水不流又舉洞山頌曰五臺山頂雲蒸飯佛殿階前狗尿天剎竿頭上煎䭔子三箇猢猻夜簸錢此二頌只頌得法身邊事不頌得法身向上事張曰請和尚頌師曰昨夜雨霶澎打倒蒲萄棚知事普請行者人力拄底拄撐底撑撑撑拄拄到天明依舊可憐生永明延壽禪師僧問如何是永明妙旨師曰更添香著曰謝師指示師曰且喜沒交涉僧禮拜師曰聽取一偈欲識永明旨門前一湖水日照光明生風來波浪起問如何是大圓鏡師曰破砂盆二僧來參乃問參頭曾到此間否曰曾到又問第二上座曾到否曰不曾到師曰一得一失少選侍僧問適來二僧未審那箇得那箇失師曰汝曾識這二僧也無曰不曾識師曰同坑無異土指法以佛祖之語為銓準曰迦葉波初聞偈曰諸法從緣生諸法從緣滅我師大沙門嘗作如是說此佛祖骨髓也龍勝曰無物從緣生無物從緣滅起惟諸緣起滅惟諸緣滅乃知色生時但是空生色滅時但是空滅譬如風性本不動以緣起故動倘風本性動則寧有靜時哉密室中若有風風何不動若無風遇緣即起非特風為然一切法皆然維摩謂文殊師利曰不來相而來不見相而見文殊乃曰如是居士若來已更不來若去已更不去所以者何來者無所從來去者無所至所可見者更不可見此緣起無生之旨也問學人久在永明為甚麼不會永明家風師曰不會處會取曰不會處如何會師曰牛胎生象子碧海起紅塵五雲華嚴志逢禪師上堂諸上座捨一知識參一知識盡道善財南遊之式樣且問上座祇如善財禮辭文殊擬登妙峰謁德雲比丘及到彼所何以德雲却於別峰相見夫教意祖意同一方便終無別理彼若明得此亦昭然諸上座即今簇著老僧是相見是不相見此處是妙峰是別峰脫或從此省去可謂不孤負老僧亦常見德雲比丘未嘗剎那相捨還信得及麼瑞鹿本先禪師師偈三首曰非風旛動仁心動自古相傳直至今今後水雲人欲曉祖師真是好知音又曰若是見色便見心人來問著方難答若求道理說多般孤負平生三事衲又曰曠大劫來祇如是如是同天亦同地同地同天作麼形作麼形兮無不是上堂華嚴稱佛身充滿於法界是真箇也無且如佛身既已充滿法界菩薩界緣覺聲聞界人天脩羅界餓鬼地獄畜生界應無處蹲如是理論太煞聱訛尋常說諸法所生唯心所現且道即今六根所對六境與汝是同耶是別耶同則何不作一塊別則如何說唯是一心大須著精彩佛法不是等閒上堂天台教中說文殊觀音普賢三門文殊門者一切色觀音門者一切聲普賢門者不動步而到我道文殊門者不是一切色觀音門者不是一切聲普賢門者是箇甚麼莫道別却天台教說話無事且退上堂你等諸人夜間眠熟不知一切既不知一切且問你等那時有本來性無本來性若道有本來性又不知一切與死無異若道無本來性睡眠忽省覺知如故還會麼不知一切與死無異睡眠忽省覺知如故如是等時是箇甚麼若也不會各體究取無事莫立興教洪壽禪師師同國師普請次聞墮薪有省作偈曰撲落非他物縱橫不是塵山河及大地全露法王身住後中丞王公隨一日過師師擁毳負暄自若王下拜師推蒲團席地與坐笑語終日而去門人讓師曰此一眾所仰奈何不加禮他日王復來師出前趨迎之王曰何不如前日相見師曰中丞即得奈知事瞋何王益重之雲居道齊禪師師謂門弟子曰達摩言此方經惟楞伽可以印心吾讀此經偈曰諸法無法體而說惟是心不見於自心而起於分別可謂大慈悲父如實極談我輩自不領受背負恩德如恒河沙或問曰然則見自心遂斷分別乎師曰非然也譬如調馬馬自見其影而不驚何以故以自知其影從自身出故吾以是知不斷分別亦捨心相也祇今目前如實而觀不見纖毫祖師曰若見現在過去未來亦應見若不見過去未來現在亦不應見此語分明人自迷昧黃龍慧南禪師有僧侍立師顧視久之問曰百千三昧無量妙門作一句說與汝汝還信否對曰和尚誠言何敢不信師指其左曰過這邊來僧將趨師咄之曰隨聲逐色有甚了期出去一僧知之即趨入師理前語問之亦對曰安敢不信師又指其左曰過這邊來僧豎住不往師又咄曰汝來親近我反不聽我語出去舜老夫暮年有所開示但曰本自無事從我何求師聞之謂侍者曰老夫耄矣何不有事令無事無事令有事是謂淨佛國土成就眾生師室中常問僧曰人人盡有生緣上座生緣在何處正當問答交鋒却復伸手曰我手何似佛手又問諸方參請宗師所得却復垂脚曰我脚何似驢脚三十餘年示此三問學者莫能契旨天下叢林目為三關大寧道寬禪師僧問如何是露地白牛師以火筯橫火罏上曰會麼曰不會師曰頭不欠尾不剩問天下禪客為甚麼出這箇不得師曰往往如斯僧問教中云始知眾生本來成佛為甚麼有煩惱菩提師曰甘草甜黃連苦曰却成兩箇去也師曰你不妨會得好道吾悟真禪師師問僧甚處來曰僧堂裏來師曰聖僧道甚麼僧近前曰不審師曰東家作驢西家作馬曰過在甚麼處師曰萬里崖州上堂夜來雷聲震地今朝細雨霏霏乾枯滋潤萬物萌芽且道嘉州大像長得髭鬚多少還有道得者麼若也道得陝府鐵牛是常不輕菩薩若道不得土宿拽脫你鼻孔越州姜山方禪師僧問如何是不動尊師曰單著布衫穿市過曰學人未曉師曰騎驢踏破洞庭波曰透過三級浪專聽一聲雷師曰伸手不見掌曰還許學人進向也無師曰踏地告虗空曰雷門之下布鼓難鳴師曰八花毬子上不用繡紅旗曰三十年後此話大行師便打雲峰文悅禪師僧問巔山巖崖還有佛法也無師曰有曰如何是巔山巖崖佛法師曰猢猻倒上樹上堂未達境惟心起種種分別達境惟心已分別即不生知諸法惟心便捨外塵相諸禪德只如大地山河明暗色空法法現前作麼生說箇捨底道理於此明得正在半塗須知向上更有一竅在便下座上堂即今休去便休去欲覓了時無了時此事若向言語上作解意根下卜度天地懸殊不得相應豈況被人喚去方丈裏塗糊指注舉楞嚴肇論根塵色法向上向下有無得失他時後日死不得其地近世更有一般宗匠二三十年馳聲走譽只管教人但莫上他言句喚作透聲色便問東答西以為格外之句將此狂解遞相沿習從此混傷宗教誑惑後生苦哉苦哉我王庫中無如是刀下座慧林宗本圓照禪師高麗僧統義天以王子奉國命使於朝聞師名請以弟子禮見問其所得以華嚴經對師曰華嚴經三身佛報身說耶化身說耶法身說耶義曰法身說師曰法身徧周沙界當時聽眾何處蹲立義茫然無對黃龍祖心晦堂寶覺禪師師與夏倚公立談至肇論會萬物為自己者及情與無情共一體時有狗臥香桌下師以壓尺擊狗又擊香卓曰狗有情即去香桌無情自住情與無情如何得成一體公立不能對師曰纔涉思惟便成剩法何曾會萬物為己哉上堂若也單明自己不悟目前此人有眼無足若悟目前不明自己此人有足無眼據此二人十二時中常有一物蘊在胸中物既在胸不安之相常在目前既在目前便觸塗成滯作麼生得平穩去祖不言乎執之失度必入邪路放之自然體無去住師室中常舉拳問僧曰喚作拳頭則觸不喚作拳頭則背喚作甚麼示眾云礙處非牆壁通處沒虗空若能如是會心色本來同拂子是色那箇是心靈利漢纔聞舉著隔牆見角早知是牛更若擬議思量白雲千里萬里寶峰雲庵真淨禪師開堂日乃曰問話且止祇知問佛問法殊不知佛法來處且道從甚麼處來垂一足曰昔日黃龍親行此令十方諸佛無敢違者諸代祖師一切聖賢無敢越者無量法門一切妙義天下老和尚舌頭始終一印無敢異者無異則且置印在甚麼處還見麼若見非僧非俗無偏無黨一一分付若不見而我自收遂收足喝一喝曰兵隨印轉將逐符行佛手驢脚生緣老好痛與三十棒而今會中莫有不甘者麼若有不妨奇特若無新長老謾你諸人去也白雲守端禪師示眾若端的得一回汗出來也向一莖草上便現瓊樓玉殿若未端的得一回汗出縱有玉殿瓊樓却被一莖草葢却且道作麼生得汗出去良久云自有一雙窮相手不曾容易舞三臺保寧勇和尚示眾云古人底今人用今人底古人為古今無背面今古幾人知㖿嗚咿一九與二九相逢不出手又云無種靈苗火裏栽鐵花還向樹頭開驀然結箇團圞果指似時人處得來黃龍死心悟新禪師師室中問僧月晦之陰以五色彩著於瞑中令百人千萬人夜視其色寧有辨其青黃赤白者麼僧無語師代曰箇箇是盲人示眾云心外無法而法可明法外無心而心可通可通可明心法全宗全其宗則法法皆宗全其心則心心無心心既無心直造其源得其源則現大身而滿虗空中現小身而纖塵不立作麼生是纖塵不立良久云一點水墨兩處成龍青原惟信禪師上堂師云老僧三十年前未參禪時見山是山見水是水及至後來親見知識有箇入處見山不是山見水不是水而今得箇休歇處依前見山祇是山見水祇是水大眾這三般見解是同是別有人緇素得出許汝親見老僧五祖法演禪師三佛侍師於一亭上夜話及歸燈已滅師於暗中曰各人下一轉語看佛鑑曰彩鳳舞丹霄佛眼曰鐵蛇橫古路佛果曰看脚下師曰滅吾宗者克勤耳示眾舉德山答僧我宗無語句雪峰聞之有省後峰云我當時空手去空手歸因緣師云白雲今日說向透未過者譬如有箇人從東京來問伊甚處來他却道蘇州來問伊蘇州事如何伊道一切祇尋常雖然如是謾白雲不過何故祇為他語音各別畢竟如何蘇州菱邵伯藕師上堂人之性命事第一須是欲得成此先須防於若是真人示眾云吾本來茲土傳法救迷情一花開五葉結果自然成達摩大師信脚來信口道後代兒孫多成計較要會開花結果處麼鄭州梨青州棗萬物無過出處好郭功甫初到五祖請祖陞座公趨前拈香曰此一瓣香爇向罏中供養我堂頭法兄禪師伏願於方廣座上擘開面門放出先師形相與他諸人描邈何以如此白雲巖畔舊相逢往日今朝事不同夜靜水寒魚不食一罏香散白蓮峰祖遂云曩謨薩怛哆鉢囉野恁麼恁麼幾度白雲谿上望黃梅花向雪中開不恁麼不恁麼嫩柳垂金線且要應時來不見龐居士問馬大師云不與萬法為侶者是甚麼人大師云待汝一口吸盡西江水即向汝道大眾一口吸盡西江水萬丈深潭窮到底略彴不是趙州橋明月清風安可比泐潭景祥禪師師室中問僧達摩西歸手𢹂隻履當時何不兩隻都將去曰此土也要留箇消息師曰一隻脚在西天一隻脚在東土著甚來由僧無語問僧惟一堅密身一切塵中現如何是塵中現底身僧指香罏曰這箇是香罏師曰帶累三世諸佛生陷地獄僧罔措師便打慈氏瑞仙禪師師至投子廣鑑問鄉里甚處師曰兩浙東越鑑曰東越事作麼生師曰秦望峰高鑑湖水闊鑑曰秦望峰與你自己是同是別師曰西天梵語此土唐言鑑曰此猶是叢林祗對畢竟是同是別師便喝鑑便打師曰恩大難酬便禮拜丞相張商英居士公嘗云先佛所說於一毛端現寶王剎坐微塵裏轉大法輪是真實義法華會上多寶如來在寶塔中分半座與釋迦文佛過去佛現在佛同坐一處實有如是事非謂表法太平慧懃佛鑑禪師文殊心道禪師初參諸方抵太平聞師夜參舉趙州柏樹子話至覺鐵觜云先師無此語莫謗先師好因大疑提撕既久一夕豁然即趨丈室擬敘所悟師見來便閉門道曰和尚莫瞞某甲師曰十方無壁落何不入門來道以拳擉破窗紙鑑即開門搊住云道道道以兩手捧師頭作口啐而出遂呈偈曰趙州有箇柏樹話禪客相傳徧天下多是摘葉與尋枝不能直向根源會覺公說道無此語正是惡言當面罵禪人若具通方眼好向此中辨真假師深然之龍門清遠佛眼禪師示眾千說萬說不若親面一見縱不說亦自分明王子寶刀喻眾盲摸象喻禪學中隔江招手事望州亭相見事迥絕無人處深山巖崖處事此皆親面而見之不在說也上堂云大眾或有人喚上座上座便應設使不應心中也須領覧今時學人便道應底是也領覽底是也若如此會便是入地獄漢子是即且置且道面前是阿誰喚你是有人喚耶是無人喚耶還裁斷得麼若是有人喚山精鬼魅喚你時天魔外道喚你時如何辨白若道無人喚你又不聾不騃如何得無人喚者箇是十二時中生死路頭事諸人明得麼有人喚生迷亂無人喚遭繫絆若能行生死斷萬兩金終不換下座師作示道三偈一曰隨流千聖靈蹤百草頭卓然放去號隨流從教萬古無人識笑殺溈山水牯牛二曰合轍水中月是天邊月南北東西更無別新羅打鐵火星飛燒著指頭名合轍三曰雙唱坐斷千差古路頭解開空岸濟人舟明明一句該羣象善唱無聲作麼求淨因繼成禪師師同圓悟法真慈受并十大法師禪講千僧赴太尉陳公良弼府齋時徽宗私幸觀之有善華嚴者賢首宗之義虎也對眾問曰吾佛設教自小乘至於圓頓掃除空有獨證真常然後萬德莊嚴方名為佛常聞禪宗一喝能轉凡成聖與諸經論似相違背今一喝若能入吾宗五教是為正說若不能入是為邪說諸禪視師師曰如法師所問不足三大禪師之酬淨因小長老可以使法師無惑也師召善善應諾師曰法師所謂小乘教者乃有義也大乘始教者乃空義也大乘終教者乃不有不空義也大乘頓教者乃即有即空義也一乘圓教者乃不有而有不空而空義也如我一喝非惟能入五教至於工巧伎藝諸子百家悉皆能入師震聲喝一喝問善曰聞麼曰聞師曰汝既聞此一喝是有能入小乘教須臾又問善曰聞麼曰不聞師曰汝既不聞適來一喝是無能入始教遂顧善曰我初一喝汝既道有喝久聲消汝復道無道無則原初實有道有則而今實無不有不無能入終教我有一喝之時有非是有因無故有無一喝之時無非是無因有故無即有即無能入頓教須知我此一喝不作一喝用有無不及情解俱忘道有之時纖塵不立道無之時橫徧虗空即此一喝入百千萬億喝百千萬億喝入此一喝是故能入圓教善乃起再拜師復謂曰非唯一喝為然乃至一語一默一動一靜從古至今十方虗空萬象森羅六趣四生三世諸佛一切聖賢八萬四千法門百千三昧無量妙義契理契機與天地萬物一體謂之法身三界惟心萬法惟識四時八節陰陽一致謂之法性是故華嚴經云法性徧在一切處有相無相一聲一色全在一塵中含四義事理無邊周徧無餘參而不雜混而不一於此一喝中皆悉具足猶是建化門庭隨機方便謂之小歇場未至寶所殊不知吾祖師門下以心傳心以法印法不立文字見性成佛有千聖不傳底向上一路在善又問曰如何是向上一路師曰汝且向下會取善曰如何是寶所師曰非汝境界善曰望禪師慈悲師曰任從滄海變終不為君通善膠口而出上大悅聞者靡不歎仰國清妙印禪師上堂滿口道得底為甚麼不知有十分知有底為甚麼道不得且道誵訛在甚麼處若也知處許你照用同時明暗俱了其或未然道得道不得知有不知有南山石大蟲解作獅子吼華藏密印安民禪師師一日白圓悟曰和尚休舉話待某說看圓悟諾師曰尋常拈槌豎拂豈不是經中道一切世界諸所有相皆即菩提妙明真心圓悟笑曰你元來在這裏作活計師又曰下喝敲牀時豈不是返聞聞自性性成無上道圓悟曰你豈不見經中道妙性圓明離諸名相師於言下釋然圓悟出蜀居夾山師罷講侍行圓悟為眾夜參舉古帆未挂因緣師聞未領遂求決圓悟曰你問我師舉前話圓悟曰庭前柏樹子師即洞明謂圓悟曰古人道如一滴投於巨壑殊不知大海投於一滴圓悟笑曰奈這漢何未幾令分座大溈法泰禪師僧問理隨事變該萬有而一片虗凝事逐理融等千差而咸歸實際如何是理法界師曰山河大地曰如何是事法界師曰萬象森羅曰如何是理事無礙法界師曰東西南北曰如何是事事無礙法界師曰上下四維雲居高菴善悟禪師一日有僧被蛇傷足佛眼問曰既是龍門為甚麼却被蛇齩師即應曰果然現大人相佛眼益器之後傳此語到照覺圓悟曰龍門有此僧耶東山法道未寂寥爾白楊法順禪師師依止佛眼聞普說舉傅大士心王銘云水中鹽味色裏膠青決定是有不見其形乃於言下有省後觀寶藏迅轉頓明大法趨丈室作禮呈偈曰頂有異峰雲冉冉源無別派水冷冷遊山未到山窮處終被青山礙眼睛佛眼笑而可之普菴印肅禪師師謁牧菴於湘之溈山問萬法歸一一歸何處牧菴豎拂示之有省歸壽隆時年二十九矣使牒請主慈化寺師利世不伐嘗言捨家出家當為何事披緇削髮本屬何因若不報國資家虗負皇恩若不導化檀那枉作釋子楮衣糲食脇不沾席者十有二年一日誦華嚴論至達本情亡知心體合豁然大悟徧體汗流曰我今親契華嚴法界矣遂示眾曰李公長者於華嚴大經之首痛下一槌擊碎三千大千世界如湯消雪不留毫髮許於後進者作得滯礙普菴老人一見不覺吞却五千四十八卷化成一氣充塞虗空方信釋迦老子出氣不得之句然後破一微塵出此華嚴經徧含法界無理不收無法不貫便見摩耶夫人是我身彌勒樓臺是我體善財童子是甚茄子文殊普賢與我同參不動道場徧周法界悲涕歡喜踊躍無量大似死中得活如夢忽醒良久云不可說不可說又不可說始信金剛經云信心清淨即生實相實相既生妄想相滅全體法身徧一切處方得大用現前即說偈曰捏不成團撥不開何須南嶽又天台六根門首無人用惹得胡僧特地來師一日舉似心齋圓通二子云達本情亡知心體合汝作麼生會二人相顧笑云未達明日各呈頌師因題云據宗眼看來句到意未到其體未合其情未亡乘便強占二詞調曰解佩令明眼人前覰著三十拄杖不饒為甚麼如此不合雪上加霜其一云先天先地何名何樣阿曼陀無物比況觸目菩提自是人不肯承當且輪迴滯名著相圓融法界無思無想廬陵米不用商量血脈纔通便知道擊木無聲打虗空盡成金響其二云柏庭立雪一場敗闕了無為當下休歇百帀千圍但只這孤圓心月不揩磨鎮常皎潔無餘無欠無聽無說韶陽老祇得一橛十聖三賢聞舉著魂消膽裂惟普菴迥然寂滅俄有僧稱道存自蜀冒雪而來既見師曰此吾不請友也遂相徵詰棒喝交馳心心密契僧曰師再來人也淨慈師一禪師師首參雪峰慧照禪師慧照舉藏身無迹話問之師數日方明呈偈曰藏身無迹更無藏脫體無依便廝當古鏡不勞還自照淡煙和霧濕秋光慧照質之曰畢竟那裏是藏身無迹處師曰嗄慧照曰無蹤迹處因甚麼莫藏身師曰石虎吞却木羊兒慧照深肯之大安山省和尚僧問離四句絕百非請和尚道曰我王庫內無如是刀問重重關鎖信息不通時如何曰爭得到這裏云到後如何曰彼中事作麼生問如何是真中真曰十字街頭泥佛子花藥英和尚示眾師拈拄杖云我今為汝等保任此事終不虗也大覺世尊是真語者實語者如語者不誑語者不異語者不賺汝諸人還信得及麼喝一喝云上無攀仰下絕己躬虗空大地咸出心中萬里八九月一身西北風下座清涼普明和尚示眾云祖師心法洞貫十方今古恒然法爾如是如是之法不假修而自就不假得而自圓一切現成名不動地用而非有不用非無妙體湛然恒常不變體合妙用應備無為映現重重無邊色相心無自性觸事全彰不動道場遍十方界如斯境界略暫回光背覺合塵妄為影事此之事意如王大路行之即是假使不行亦在其路如斯所論猶是化門之說若以舉唱宗乘只有一時散去好御製序達摩西來不立文字直指人心以此慧燈續佛慧命到者裏唯證乃知非可測見聞知覺一點難容才辨聰明絲毫無涉但將一句無義味話似銀山鐵壁看去一時不了閱一歲一歲不了閱一紀拚却今生來生與之抵對久之久之一時參破萬有皆空併此無義味話亦了不可得樹頭果熟因風墮地五花八裂㘞地一聲自然無著落處而知有著落在然此無義味話本同兔角龜毛豈為真實曰末後句曰活句者惟用以接引初機千篇一律正是敲門之瓦意在門開若持瓦不敲唯向門前之遶摩挲把玩瓦不釋手甚至謂人之瓦不良謂己之瓦至美張旗樹幟為瓦交鋒瓦戰彌深去門愈遠不曰狂徒不可得也今之宗門每以藏頭白海頭黑院主眉鬚墮落掇退菓棹之類謂之末後句蓋因先從解路推求推到解路斷絕處則強為末後句翻成虗套實法也更有以父母未生前本來面目萬法歸一一歸何處念佛的是誰等為死句以東山水上行庭前柏樹子唵啞吽蘇嚕蘇嚕㗭唎㗭唎等為活句蓋謂有字義可尋則為死句無字義可尋則曰活句也如此會取別末後句尚未是初句而活句已盡成死句矣水裏月輪豈容撈漉空中火聚安可推排果能化毒藥為醍醐嚼金剛為香飯脚跟著地鼻孔撩天自然知得祖師所言無非末後句無非活句即至三藏十二分亦無非末後句無非活句否則千七百則公案盡是死句亦無一末後句古德云有句無句如藤倚樹樹倒藤枯好一堆爛柴古人與麼老婆心切明明道出猶自不悟不肯向藤樹爛柴中直下承當體取活句只管向有句無句邊分別初末眾生顛倒實為可憐甚至各立門庭回護祖父或乃當場敗闕嫉妬同參揮勦情絕見之太阿鋒爭情爭見用療恚醫癡之甘露味增恚增癡不知轉得句圓辨得機捷與吾靈覺有何交涉佛祖慧命豈其在斯況此因緣本同龜毛兔角如曰勝則有言亦勝無言亦勝如曰負則一場懡㦬固負便百轉不窮愈見其負豈得曰勝者活句負者死句勝者知末後句負者不知末後句也朕二十餘年來於本分少得相應於藩邸時頗閱今時禪侶伎倆大抵不過如是嘗於此作游戲三昧巍巍堂堂者折其頭角窈窈沈沈者碎其窟窠出泥牛於海心載之片葉驟玉麟於天上控以單絲機辨紛馳遇者盡屈於句下方之於古朕實不後於人然於所為本分相應者何嘗於此有絲毫交涉耶為憫學人身住大圓覺場而不得正悟魔外滋繁狂參益熾故選錄從上古德專提向上之語刊示叢林以期燈傳無盡而凡接引初機及問答如流機鋒迅利者並不入選又恐未經舉出學人眼目不明用是取其中不悞學者中止化城有礙正知正見者別錄一帙以供隨喜蓋古人既於無梯航處設茲梯航朕即於無等次中分其等次譬如虗空方則空方圓則空圓朕以方還方以圓還圓而為分別然而方空圓空等是虗空非因分別而有同異也是選也譬如鼓瑟彈琴敲金擊石丹青書翰詠月吟花無非游戲三昧可佐法喜禪悅尚不得作楊葉止啼會云至其中有數十則可入前集者則以選閱指月錄等書之後採輯教外別傳禪宗正脈其時前集已經刻成難於按次添入因即編之後集卷內事出偶然遂成別例閱此書者玩千番之珉石忽遇九華散百斛之小璣間逢七采發心參學未妨引起疑情明眼宗徒不必逐條指出譬如曾遊龍藏自然到眼立分若其生長蓽門且任目迷五色爰識其緣起俟學人自擇焉雍正十一年癸丑八月望日御選歷代禪師語錄後集上善慧傅大士梁武帝請講金剛經士纔陞座以尺揮案一下便下座帝愕然聖師曰陛下還會麼帝曰不會聖師曰大士講經竟大士一日披衲頂冠靸履朝見帝問是僧耶士以手指冠帝曰是道耶士以手指靸履帝曰是俗耶士以手指衲衣偈曰空手把鉏頭步行騎水牛人在橋上過橋流水不流泗州僧伽大師唐高宗時至長安洛陽行化歷吳楚間手執楊枝混於緇流或問師何姓即答曰我姓何又問師何國人師曰我何國人天台豐干禪師師欲遊五臺問寒拾曰汝共我去遊五臺便是我同流若不共我去遊五臺不是我同流山曰你去遊五臺作甚麼師曰禮文殊山曰你不是我同流師尋獨入五臺逢一老人便問莫是文殊麼曰豈可有二文殊師作禮未起忽然不見師凡有人問佛理止答隨時二字寒山大士趙州遊天台路次相逢大士見牛迹問州曰還識牛麼州曰不識士指牛迹曰此是五百羅漢遊山州曰既是羅漢為甚麼却作牛去士曰蒼天蒼天州呵呵大笑士曰作甚麼州曰蒼天蒼天士曰這廝兒宛有大人之作拾得大士國清寺半月念戒眾集大士拍手曰聚頭作想那事如何維那叱之大士曰大德且住無瞋即是戒心淨即出家我性與你合一切法無差明州布袋和尚有一僧在師前行師乃拊僧背一下僧回頭師曰乞我一文錢曰道得即與你一文師放下布袋叉手而立師在街衢立有僧問和尚在這裏作甚麼師曰等箇人曰來也來也師云汝不是這箇人曰如何是這箇人師曰乞我一文錢偈曰是非憎愛世偏多仔細思量奈我何寬却肚腸須忍辱豁開心地任從他若逢知己須依分縱遇冤家也共和若能了此心頭事自然證得六波羅又偈曰一鉢千家飯孤身萬里遊青目覩人少問路白雲頭法華志言大士丞相呂許公問佛法大意師曰本來無一物一味却成真集仙王質問如何是祖師西來意師曰青山影裏潑藍起寶塔高吟撼曉風又曰請法華燒香師曰未從齋戒覓不向佛邊求國子助教徐岳問祖師西來意師曰街頭東畔底徐曰某甲未會師曰三般人不會僧問世有佛否師曰寺裏文殊有問師凡耶聖耶遂舉手曰我不在此住扣冰澡先禪師師謁雪峯手𢹂鳧茨一包醬一器獻之峯曰包中是何物師曰鳧茨峯曰何處得來師曰泥中得峯曰泥深多少師曰無丈數峯曰還更有麼師曰轉有轉深又問器中何物曰醬峯曰何處得來曰自合得峯曰還熟也未曰不較多峯異之曰子異日必為王者師初居溫嶺繼居將軍巖二虎侍側神人獻地為瑞巖院學者爭集嘗謂眾曰古聖修行全憑苦節吾今夏則衣楮冬則扣冰而浴故人號為扣冰古佛有僧燒炭積成火龕曰請師入此修行曰真玉不隨流水化瑠璃爭奪眾星明曰莫祇這便是麼曰且莫認奴作郎曰畢竟如何曰梅花臘月開天成戊子應閩王之召王敬禮謝茶次師提起橐子曰會麼曰不會曰人王法王各自照了留十日以疾辭懶殘大士師有歌曰兀然無事無改換無事何須論一段直心無散亂他事不須斷過去已過去未來猶莫算兀然無事坐何曾有人喚向外覓工夫總是癡頑漢糧不畜一粒逢飯但知嗎世人多事人相趁渾不及我不樂生天亦不愛福田飢來喫飯困來即眠愚人笑我智乃知焉不是癡鈍本體如然要去即去要住即住身披一破衲脚著娘生袴多言復多語由來反相悞若欲度眾生無過且自度莫謾求真佛真佛不可見妙性及靈臺何須受薰煉心是無事心面是娘生面劫石可移動箇中無改變無事本無事何須讀文字削除人我本冥合箇中意種種勞筋骨不如林下睡兀兀舉頭見日高喫飯從頭𢫫將功用功展轉冥蒙取即不得不取自通吾有一言絕慮忘緣巧說不得只用心傳更有一語無過直與細如毫末大無方所本自圓成不勞機杼世事悠悠不如山邱青松蔽日碧㵎長流山雲當幕夜月為鉤臥藤蘿下塊石枕頭不朝天子豈羨王侯生死無慮更復何憂水月無影我常只寧萬法皆爾本自無生兀然無事坐春來草自青法順大師師作法身頌曰嘉州牛喫禾益州馬腹脹天下覓醫人灸豬左膊上南嶽懷讓禪師有大德問如鏡鑄像像成後未審光向甚麼處去師曰如大德為童子時相貌何在曰祇如像成後為甚麼不鑑照師曰雖然不鑑照謾他一點不得馬大師闡化於江西師問眾曰道一為眾說法否眾曰已為眾說法師曰總未見人持箇消息來眾無對因遣一僧去囑曰待伊上堂時但問作麼生伊道底言語記將來僧去一如師旨回謂師曰馬師云自從胡亂後三十年不曾少鹽醬師然之青原行思禪師希遷詣靜居參禮師曰子何方來遷曰曹溪師曰將得甚麼來曰未到曹溪亦不失師曰若恁麼用去曹溪作甚麼曰若不到曹溪爭知不失遷又曰曹溪大師還識和尚否師曰汝今識吾否曰識又爭能識得師曰眾角雖多一麟足矣遷又問和尚自離曹溪甚麼時至此間師曰我却知汝早晚離曹溪曰希遷不從曹溪來師曰我亦知汝去處也曰和尚幸是大人莫造次他日師復問遷汝甚麼處來曰曹溪師乃舉拂子曰曹溪還有這箇麼曰非但曹溪西天亦無師曰子莫曾到西天否曰若到即有也師曰未在更道曰和尚也須道取一半莫全靠學人師曰不辭向汝道恐已後無人承當馬祖道一禪師僧問和尚為甚麼說即心即佛曰為止小兒啼曰啼止時如何師曰非心非佛曰除此二種人來如何指示師曰向伊道不是物曰忽遇其中人來時如何曰且教伊體會大道一夕西堂百丈南泉隨侍玩月次師問正恁麼時如何堂曰正好供養丈曰正好修行泉拂袖便行師曰經入藏禪歸海惟有普願獨超物外僧參次師乃畫一圓相云入也打不入也打僧纔入師便打僧云和尚打某甲不得師靠拄杖休去問如何得合道師曰我早不合道有小師耽源行脚回於師前畫箇圓相就上拜了立師曰汝莫欲作佛否曰某甲不解揑目師曰吾不如汝小師不對鄧隱峯辭師師曰甚麼處去曰石頭去師曰石頭路滑曰竿木隨身逢場作戲便去纔到石頭即繞禪牀一帀振錫一聲問是何宗旨石頭曰蒼天蒼天峯無語却回舉似師師曰汝更去問待他有答汝便噓兩聲峯又去依前問石頭乃噓兩聲峯又無語回舉似師師曰向汝道石頭路滑有僧於師前作四畫上一畫長下三畫短曰不得道一畫長三畫短離此四字外請和尚答師乃畫地一畫曰不得道長短答汝了也師問僧什麼處來云湖南來師云東湖水滿也未云未師云許多時雨水尚未滿石頭希遷禪師門人道悟問曹溪意旨誰人得師曰會佛法人得曰師還得否師曰不得曰為甚麼不得曰我不會佛法牛頭山法融禪師師年十九學通經史尋閱大部般若曉達真空忽一日歎曰儒學世典非究竟法般若真觀出世舟航遂隱茅山投師落髮後入牛頭山幽棲寺北巖之石室有百鳥銜花之異四祖遙觀氣象知彼山有異人乃躬自尋訪問寺僧此間有道人否曰出家兒那箇不是道人祖曰阿那箇是道人僧無對別僧曰此去山中十里許有一嬾融見人不起亦不合掌莫是道人麼祖遂入山見師端坐自若曾無所顧祖問曰在此作甚麼師曰觀心祖曰觀是何人心是何物師無對便起作禮曰大德高棲何所祖曰貧道不決所止或東或西師曰還識道信禪師否祖曰何以問他師曰嚮德滋久冀一禮謁祖曰道信禪師貧道是也師曰因何降此祖曰特來相訪莫更有宴息之處否師指後面曰別有小庵遂引祖至庵所遶庵惟見虎狼之類祖乃舉兩手作怖勢師曰猶有這箇在祖曰這箇是甚麼師無語少選祖却於師宴坐石上書一佛字師視之竦然祖曰猶有這箇在博陵王問曰恰恰用心時若為安隱好師曰恰恰用心時恰恰無心用曲談名相勞直說無繁重無心恰恰用常用恰恰無今說無心處不與有心殊問曰智者引妙言與心相會當言與心路別合則萬倍乖師曰方便說妙言破病大乘道非關本性談還從空化造無念為真常終當絕心路離念性不動生滅無乖悞谷響既有聲鏡像能回顧天柱崇慧禪師僧問達摩未來此土時還有佛法也無師曰未來且置即今事作麼生曰某甲不會乞師指示師曰萬古長空一朝風月僧無語師復曰闍黎會麼曰不會師曰自己分上作麼生干他達摩來與未來作麼他家來大似賣卜漢見汝不會為汝錐破卦文纔生吉凶盡在汝分上一切自看僧曰如何是解卜度人師曰汝纔出門時便不中也徑山道欽禪師馬祖令人送書到書中作一圓相師發緘於圓相中著一點却封回鳥窠道林禪師白居易守杭時入山謁師問曰禪師住處甚危險師曰太守危險尤甚白曰弟子位鎮江山何險之有師曰薪火相交識性不停得非險乎又問如何是佛法大意師曰諸惡莫作眾善奉行白曰三歲孩兒也解恁麼道師曰三歲孩兒雖道得八十老人行不得白作禮而退壽州道樹禪師師得法於北宗秀卜壽州三峯山結茅而居常有野人服色素樸言談詭異時忽化作佛及菩薩羅漢天仙等形或放神光或呈聲響師之學徒覩之皆不能測如此涉十年後寂無形影師告眾曰野人作多色伎倆眩惑於人只消老僧不見不聞伊伎倆有窮吾不見不聞無盡嵩嶽破竈墮和尚師不稱名氏言行叵測隱居嵩嶽山塢有廟甚靈殿中惟安一竈遠近祭祀不輟烹宰物命甚多師一日領寺僧入廟以杖敲竈三下曰咄此竈只是泥瓦合成聖從何來靈從何起恁麼烹宰物命又打三下竈乃傾破墮落須臾有一人青衣峩冠設拜師前師曰是甚麼人曰我本此廟竈神久受業報今日蒙師說無生法得脫此處生在天中特來致謝師曰是汝本有之性非吾強言神再禮而沒少選侍僧問曰某等久侍和尚不蒙示誨竈神得甚麼徑旨便得生天師曰我只向伊道是泥瓦合成別也無道理為伊侍僧無言師曰會麼僧曰不會師曰本有之性為甚麼不會侍僧等乃禮拜師曰破也破也墮也墮也嵩嶽元珪禪師師得法安國師隱於嶽之龐塢一日有神人率羣從謁師師覩其貌奇偉非常乃問曰善來仁者胡為而至彼曰師寧識我耶師曰吾觀佛與眾生等吾一目之豈分別耶彼曰吾此嶽神也能生死於人師安得一目我哉師曰吾本不生汝焉能死吾視身與空等視吾與汝等汝能壞空與汝乎苟能壞空及汝吾則不生不滅也汝尚不能如是又安能生死吾耶神稽首曰我亦聰明正直於餘神詎知師有廣大之智辯乎願授以正戒令我度世師曰汝既乞戒即既戒也所以者何戒外無戒又何戒哉神曰此理也我聞茫昧止求師戒我身為門弟子師即為張座秉鑪正几曰付汝五戒若能奉持即應曰能不能即曰否曰謹受教師曰汝能不婬乎曰我亦娶也師曰非謂此也謂無羅欲也曰能師曰汝能不盜乎曰何乏我也焉有盜取哉師曰非謂此也謂嚮而福淫不供而禍善也曰能師曰汝能不殺乎曰實司其柄焉曰不殺師曰非謂此也謂有濫悞疑混也曰能師曰汝能不妄乎曰我正直焉有妄乎師曰非謂此也謂先後不合天心也曰能師曰汝不遭酒敗乎曰能師曰如上是為佛戒也又言以有心奉持而無心拘執以有心為物而無心想身能如是則先天地生不為精後天地死不為老終日變化而不為動畢盡寂默而不為休信此則雖娶非妻也雖嚮非取也雖柄非權也雖作非故也雖醉非惽也若能無心於萬物則羅欲不為淫福淫禍善不為盜濫悞疑混不為殺先後違天不為妄惛荒顛倒不為醉是謂無心也無心則無戒無戒則無心無佛無眾生無汝及無我孰為戒哉神曰我神通亞佛師曰汝神通十句五能五不能佛則十句七能三不能神竦然避席跪啟曰可得聞乎師曰汝能戾上帝東天行而西七曜乎曰不能師曰汝能奪地祇融五嶽而結四海乎曰不能師曰是謂五不能也佛能空一切相成萬法智而不能即滅定業佛能知羣有性窮億劫事而不能化導無緣佛能度無量有情而不能盡眾生界是為三不能也定業亦不牢久無緣亦是一期眾生界本無增減亘無一人能主其法有法無主是謂無法無法無主是謂無心如我解佛亦無神通也但能以無心通達一切法爾神曰我誠淺昧未聞空義師所授戒我當奉行今願報慈德效我所能師曰我觀身無物觀法無常塊然更有何欲耶神曰師必命我為世間事展我小神功使已發心初發心未發心不信心必信心五等人目我神踪知有佛有神有能有不能有自然有非自然者師曰無為是無為是神曰佛亦使神護法師寧墮叛佛耶願隨意垂誨師不得已而言曰東巖寺之障莽然無樹北岫有之而背非屏擁汝能移北樹於東嶺乎神曰已聞命矣然昏夜必有喧動願師無駭即作禮而去師門送而目觀之見儀衛逶迤如王者之狀其夕果有暴風吼雷棟宇搖蕩師曰神言徵矣眾可無怖詰旦和霽則北巖松栝盡移東嶺森然行植師謂其徒曰毋令外知人將妖我曰吾始居寺東嶺吾滅汝必置吾骸於彼言訖若委蛻焉嵩山峻極和尚僧問如何是修善行人師曰擔枷帶鎖曰如何是作惡行人師曰修禪入定曰某甲淺機請師直指師曰汝問我惡惡不從善汝問我善善不從惡僧良久師曰會麼曰不會師曰惡人無善念善人無惡心所以道善惡如浮雲俱無起滅處僧於言下大悟後破竈墮聞舉乃曰此子會盡諸法無生南陽慧忠國師西天大耳三藏到京云得他心通帝命師試驗三藏纔見師便禮拜立於右邊師問曰汝得他心通那對曰不敢師曰汝道老僧即今在甚麼處曰和尚是一國之師何得却去西川看競渡良久再問汝道老僧即今在甚麼處曰和尚是一國之師何得却在天津橋上看弄猢猻師良久復問汝道老僧只今在甚麼處藏罔測師叱曰這野狐精他心通在甚麼處藏無對一日喚侍者者應諾如是三召三應師曰將謂吾孤負汝却是汝孤負吾南泉到參師問甚麼處來曰江西來師曰還將得馬師真來否曰只這是師曰背後底呢南泉便休丹霞來訪值師睡次乃問侍者耽源云國師在否者曰在即在祇是不見客霞云太深遠生者云莫道上座佛眼也不見霞云龍生龍子鳳生鳳兒師睡起侍者舉似師師打二十棒趁出丹霞聞云不謬為南陽國師師問紫璘供奉甚處來云城南來師云城南草作何色云作黃色師乃問童子城南草作何色云作黃色師云只這童子亦可簾前賜紫對御談玄耽源應真禪師吉州耽源山應真禪師為國師侍者時一日國師在法堂中師入來國師乃放下一足師見便出良久却回國師曰適來意作麼生師曰向阿誰說即得國師曰我問你師曰甚麼處見某甲師又問百年後有人問極則事如何國師曰幸自可憐生須要覓箇護身符子作麼國師諱日設齋有僧問曰國師還來否師曰未具他心曰又用設齋作麼師曰不斷世諦宋太宗皇帝一日幸相國寺問看經僧曰是甚麼經曰仁王經曰既是寡人經因甚却在卿手裏無對幸開寶塔問僧卿是甚人曰塔主曰朕之塔因甚卿作主無對僧朝宗問甚處來曰廬山臥雲庵曰朕聞臥雲深處不朝天因甚到此無對僧入對次奏曰陛下還記得麼曰甚處相見來曰靈山一別直至如今曰以何為驗無對京寺回祿藏經僧乞宣賜召問昔日摩騰不燒如今為甚却燒無對宗嘗夢神人報曰請陛下發菩提心因早朝宣問左右街菩提心作麼生發無對茶陵郁山主師不曾行脚因廬山有化士至論及宗門中事教看僧問法燈百尺竿頭如何進步燈曰噁凡三年一日乘驢度橋一蹋橋板而墮忽然大悟遂有頌云我有神珠一顆久被塵勞關鎖今朝塵盡光生照破山河萬朵因茲更不遊方樓子和尚師不知何許人亦不知其名氏一日偶經遊街市間於酒樓下整韈帶次聞樓上人唱曲云你既無心我便休忽然大悟因號樓子焉福州雲頂禪師有居士問洞山道有一物上拄天下拄地未審是甚麼物師曰擔鐵枷喫鐵棒曰天地黑山河走師曰閻老殿前添一鬼北邙山下臥千年曰快活快活師曰也是野狐吞老鼠無名老宿師一夏不為師僧說話有僧歎曰我祇恁麼空過一夏不敢望和尚說佛法得聞正因兩字也得老宿聞乃曰闍黎莫𧬊速若論正因一字也無道了扣齒云適來無端不合與麼道鄰壁有一老宿聞曰好一釜羮被一顆鼠糞污却無名婆子婆子供養一庵主經二十年常令一二八女子送飯給侍一日令女子抱定曰正恁麼時如何主曰枯木倚寒巖三冬無煖氣女子舉似婆婆曰我二十年祇供養得箇俗漢遂遣出燒却庵有一僧參米胡路逢一婆住庵僧問婆有眷屬否曰有僧曰在甚麼處曰山河大地若草若木皆是我眷屬僧曰婆莫作師姑來否曰汝見我是甚麼僧曰俗人婆曰汝不可是僧僧曰婆莫混濫佛法好婆曰我不混濫佛法僧曰汝恁麼豈不是混濫佛法婆曰你是男子我是女人豈曾混濫處州法海立禪師師因徽宗革本寺作神霄宮師陞座謂眾曰都緣未徹所以說是說非蓋為不真便乃分彼分此我身尚且不有身外烏足道哉正眼觀來一場笑具今則聖君垂旨更僧寺作神霄佛頭添箇冠兒算來有何不可山僧今日不免橫擔拄杖高挂鉢囊向無縫塔中安身立命於無根樹下嘯月吟風一任乘雲仙客來此呪水書符叩牙作法他年成道白日上昇堪報不報之恩以助無為之化祇恐不是玉是玉也大奇然雖如是且道山僧轉身一句作麼生道還委悉麼擲下拂子竟爾趨寂郡守具奏詔仍改寺額曰真身歐陽文忠公公昔官洛中一日遊嵩山却去僕吏放意而往至一山寺入門修竹滿軒霜清鳥啼風物鮮明文忠休於殿陛旁有老僧閱經自若與語不甚顧答文忠異之問曰道人住山久否對曰甚久也又問誦何經對曰法華經文忠曰古之高僧臨生死之際類皆談笑脫去何道致之耶對曰定慧力耳又問今乃寂寥無有何哉老僧笑曰古之人念念在定慧臨終安得亂今之人念念在散亂臨終安得定文忠大喜不自知膝之屈也無名僧鹽官會下有一主事僧忽見一鬼使來追僧告曰某甲身為主事未暇修行乞容七日得否使曰待為白王若許即七日後來不然須臾便至言訖不見至七日後覓其僧了不可得後有人舉問一僧若被覓著時如何抵擬他又無名僧僧在經堂內不看經每日打坐藏主曰何不看經僧曰某甲不識字藏主曰何不問人僧近前叉手鞠躬曰這箇是甚麼字藏主無對僧入冥見地藏菩薩地藏問你平生修何業僧曰念法華經曰止止不須說我法妙難思為是說是不說僧無對無名古德師一日不赴堂侍者請赴堂德曰我今日在莊上喫油糍飽也侍者曰和尚不曾出入德曰汝去問莊主者方出門忽見莊主來謝和尚到莊天竺證悟法師師依白蓮僊法師嘗患學者囿於名相至以天台為文字之學南宗鄙之乃謁護國此庵元禪師夜語次師舉東坡宿東林偈且曰也不易到此田地元曰尚未見路徑何言到耶曰祇如他道溪聲便是廣長舌山色豈非清淨身若不到此田地如何有這箇消息元曰是門外漢耳曰和尚不吝可為說破元曰却祇從這裏猛著精彩覰捕看若覰捕得他破則亦知本命元辰落著處師通夕不寐及曉鐘鳴去其祕畜以前偈別曰東坡居士太饒舌聲色關中欲透身溪若是聲山是色無山無水好愁人特以告元元曰向汝道是門外漢師禮謝未幾有化馬祖殿瓦者求語發揚師書曰寄語江西老古錐從教日炙與風吹兒孫不是無料理要見冰消瓦解時此庵見之笑曰須是這闍黎始得淨居尼玄機師常習定於大日山石窟中一日忽念曰法性湛然本無去住厭喧趨寂豈為達耶乃往參雪峯雪峯問甚處來曰大日山來雪峯曰日出也未師曰若出則鎔却雪峯雪峯曰汝名甚麼師曰玄機雪峯曰日織多少師曰寸絲不挂遂禮拜退纔行三五步雪峯召曰袈裟角拖地也師回首雪峯曰大好寸絲不挂賣鹽翁有一僧去覆船路逢一賣鹽翁僧問覆船路向甚麼處去翁良久僧再問翁曰你患聾那僧曰你向我道甚麼翁曰向你道覆船路僧曰翁莫會禪麼翁曰莫道會禪佛法也會盡僧曰你試說看翁挑起鹽籃僧曰難翁曰你喚這箇作甚麼僧曰鹽翁曰有甚麼交涉僧曰你喚作甚麼曰不可更向你道是鹽僧文通慧師河南開封白雲寺僧也其師令掌盥盆偶有市鮮者濯於盆文恚擊之遽隕因潛奔華州總持寺久之為長老蓋二十年餘矣一日忽語其徒曰二十年前一段公案今日當了眾問故曰日午當自知之遂趺坐以俟時張浚統兵至關中一卒持弓矢至法堂瞪目視文將射之文笑曰老僧相待久矣卒曰素未相面今見而恚心不可遏即欲相戕何耶文語以昔故卒遽說偈曰冤冤相報何時了劫劫相纏豈偶然不若與師俱解釋如今立地往西天視之已立化矣文即索筆書偈曰三十三年飄蕩做了幾番模樣誰知今日相逢却是在前變障書畢泊然而化百丈懷海禪師馬祖陞座眾纔集師出卷却席祖便下座師隨至方丈祖曰我適來未曾說話汝為甚便卷却席師曰昨日被和尚扭得鼻頭痛祖曰汝昨日向甚處留心師曰鼻頭今日又不痛也祖曰汝深明昨日事師作禮而退師再參侍立次祖目視繩牀角拂子師曰即此用離此用祖曰汝向後開兩片皮將何為人師取拂子豎起祖曰即此用離此用師挂拂子於舊處祖振威一喝師直得三日耳聾未幾住大雄山以所處巖巒峻極故號百丈四方學者至一日謂眾曰佛法不是小事老僧昔被馬大師一喝直得三日耳聾黃檗聞舉不覺吐舌師曰子已後莫承嗣馬祖去麼檗曰不然今日因和尚舉得見馬祖大機之用然且不識馬祖若嗣馬祖已後喪我兒孫師曰如是如是見與師齊減師半德見過於師方堪傳授子甚有超師之見檗便禮拜住後馬師寄三甕醬至師集眾上堂開書了拈拄杖指甕曰道得即不打破道不得即打破眾無語師打破歸方丈溈山五峯雲巖侍立次師問溈山併却咽喉唇吻作麼生道山曰却請和尚道師曰不辭向汝道恐已後喪汝兒孫又問五峯峯曰和尚也須併却師曰無人處斫額望汝又問雲巖巖曰和尚有也未師曰喪我兒孫師每上堂有一老人隨眾聽法一日眾退唯老人不去師問汝是何人老人曰某非人也於過去迦葉佛時曾住此山因學人問大修行人還落因果也無某對云不落因果遂五百生墮野狐身今請和尚代一轉語貴脫野狐身師曰汝問老人曰大修行人還落因果也無師曰不昧因果老人於言下大悟作禮曰某已脫野狐身住在山後敢乞依亡僧津送師食後領眾至山後巖下以杖挑出一死野狐乃依法火葬師至晚上堂舉前因緣黃檗便問古人錯祗對一轉語墮五百生野狐身轉轉不錯合作箇甚麼師曰近前來向汝道檗近前打師一掌師笑曰將謂胡鬚赤更有赤鬚胡時溈山在會下作典座司馬頭陀舉野狐話問典座作麼生座撼門扇三下司馬曰太麤生座曰佛法不是這箇道理普請钁地次忽有一僧聞鼓鳴舉钁頭大笑便歸師曰俊哉此是觀音入理之門師歸院喚其僧問適來見甚麼道理便恁麼曰適來肚飢聞鼓聲歸喫飯師乃笑僧問西堂有問有答即且置無問無答時如何堂曰怕爛却那師聞舉乃曰從來疑這箇老兄曰請和尚道師曰一合相不可得雲巖問每日區區為阿誰師曰有一人要巖曰因甚麼不教伊自作師曰他無家活趙州參師問近離甚處曰南泉師曰南泉近日有何言句曰未得之人直須悄然師曰悄然一句且置茫然一句作麼生道州進前三步師便喝州作縮身勢師曰大好悄然州便出去師有時說法竟大眾下堂乃召之大眾回首師曰是甚麼上堂靈光獨耀迥脫根塵體露真常不拘文字心性無染本自圓成但離妄緣即如如佛南泉普願禪師南泉山下有一庵主人謂曰近日南泉和尚出世何不去禮見主曰非但南泉出世直饒千佛出興我亦不去師聞乃令趙州去勘州去便設拜主不顧州從東過西又從西過東主亦不顧州曰草賊大敗遂拽下簾子便歸舉似師師曰我從來疑著這漢次日師與沙彌𢹂茶一瓶盞三隻到庵擲向地上乃曰昨日底昨日底主曰昨日底是甚麼師於沙彌背上拍一下曰賺我來賺我來拂袖便回趙州問道非物外物外非道如何是物外道師便打州捉住棒云已後莫錯打人師曰龍蛇易辨衲子難瞞師參百丈涅槃和尚丈問從上諸聖還有不為人說底法麼師曰有丈曰作麼生是不為人說底法師曰不是心不是佛不是物丈曰說了也師曰某甲只恁麼和尚作麼生丈曰我又不是大善知識爭知有說不說師曰某甲不會丈曰我忒煞為你說了也師同魯祖杉山歸宗喫茶次魯祖提起茶盞云世界未成時便有這箇師云今人祇識這箇未識世界宗云是師云師兄莫同此見麼宗却拈起盞云向世界未成時道得麼師作掌勢宗以面作承掌勢麻谷持錫到章敬遶禪牀三帀振錫一下卓然而立敬云是是谷又到師處亦遶禪牀三帀振錫一下卓然而立師云不是不是谷云章敬道是和尚為甚麼道不是師云章敬即是是汝不是此是風力所轉終成敗壞鹽官謂眾曰虗空為鼓須彌為椎甚麼人打得眾無對有僧舉似師師云王老師不打這破鼓笛師與歸宗麻谷同去參禮南陽國師師於路上畫一圓相曰道得即去宗便於圓相中坐谷便作女人拜師曰恁麼則不去也宗曰是什麼心行師乃相喚便回更不去禮國師有一座主辭師師問甚麼處去對曰山下去師曰第一不得謗王老師對曰爭敢謗和尚師乃噴嚏曰多少主便出去師一日掩方丈門將灰圍却門外曰若有人道得即開或有祗對多未愜師意趙州曰蒼天師便開門陸大夫問弟子家中有一片石或時坐或時臥如今擬鐫作佛得否師曰得陸曰莫不得否師曰不得問父母未生時鼻孔在甚麼處師曰父母已生了鼻孔在甚麼處師問神山何處來神山云打羅來師曰手打脚打山無語師曰你問我我與你道山如問師曰分明記取已後遇明眼人舉似他師問座主講甚麼經座主云彌勒下生經師云彌勒幾時下生主云現在天宮未來師云天上無彌勒地下無彌勒師住庵時有一僧到庵師向伊道我上山去作務待齋時作飯自喫了送一分上來少時其僧作飯自喫了却一時打破家事就牀臥師待不見來便歸庵見僧臥師亦就伊邊臥僧便起去師住後曰我往前住庵時有箇靈利道者直至如今不見師因東西兩堂爭猫兒師遇之白眾曰道得即救取猫兒道不得即斬却也眾無對師便斬之趙州自外歸師舉前語示之州脫履安頭上而出師曰子若在即救得猫兒也師曰我十八上便解作活計師示眾云江西馬祖說即心即佛王老師不恁麼道不是心不是佛不是物恁麼道有過麼趙州禮拜而出時有一僧隨問趙州曰上座禮拜便出意作麼生州曰汝却問取和尚僧乃問適來諗上座意作麼生師曰他却領得老僧意旨師云心如枯木始有少許相應師云文殊普賢昨夜三更相打每人與二十棒趁出院了也上堂王老師賣身去也還有人買麼一僧出曰某甲買師曰不作貴不作賤汝作麼生買僧無對師至莊所莊主預備迎奉師曰老僧居常出入不與人知何得排辦如此莊主曰昨夜土地報道和尚今日來師曰王老師修行無力被鬼神覰見侍者便問和尚既是善知識為甚麼被鬼神覰見師曰土地前更下一分飯鹽官齊安國師有講僧來參師問座主蘊何事業對曰講華嚴經師曰有幾種法界曰廣說則重重無盡略說有四種師豎起拂子曰這箇是第幾種法界主沈吟師曰思而知慮而解是鬼家活計日下孤燈果然失照師一日喚侍者曰將犀牛扇子來者曰破也師曰扇子既破還我犀牛兒來者無對歸宗智常禪師上堂從上古德不是無知解他高尚之士不同常流今時不能自成自立虗度時光諸子莫錯用心無人替汝亦無汝用心處莫就他覓從前祇是依他解發言皆滯光不透脫祇為目前有物問如何是玄旨師曰無人能會曰向者如何師曰有向即乖曰不向者如何師曰誰求玄旨又曰去無汝用心處曰豈無方便門令學人得入師曰觀音妙智力能救世間苦曰如何是觀音妙智力師敲鼎葢三下曰子還聞否曰聞師曰我何不聞僧無語師以棒趁下大愚一日辭師師問甚處去愚曰諸方學五味禪去師曰諸方有五味禪我這裏只有一味禪愚便問如何是一味禪師便打愚忽然大悟云嗄我會也師云道道愚擬開口師又打趁出愚後到黃檗舉前話檗上堂曰馬大師出八十四員善知識問著箇箇屙漉漉地祇有歸宗較些子師入園取菜次乃畫圓相圍却一株語眾曰輒不得動著這箇眾不敢動少頃師復來見菜猶在便以棒趁眾僧曰這一隊漢無一箇有智慧底刺史李渤問教中所言須彌納芥子渤即不疑芥子納須彌莫是妄談否師曰人傳使君讀萬卷書籍還是否曰然師曰摩頂至踵如椰子大萬卷書向何處著李俛首李異日又問一大藏教明得箇甚麼邊事師舉拳示之曰還會麼曰不會師曰這箇措大拳頭也不識曰請師指示師曰遇人則塗中授與不遇即世諦流布大梅法常禪師初參大寂問如何是佛寂曰即心是佛師即大悟遂之四明梅子真舊隱縛茆燕處寂聞師住山乃令僧問和尚見馬大師得箇甚麼便住此山師曰大師向我道即心是佛我便向這裏住僧曰大師近日佛法又別師曰作麼生曰又道非心非佛師曰這老漢惑亂人未有了日任他非心非佛我祇管即心即佛其僧回舉似寂寂曰梅子熟也龐居士欲驗師特相訪纔見便問久嚮大梅未審梅子熟也未師曰熟也你向甚麼處下口士曰百雜碎師伸手曰還我核子來士無語僧問如何是佛法大意師曰蒲花柳絮竹針麻線夾山與定山同行言話次定山曰生死中無佛即無生死夾山曰生死中有佛即不迷生死互相不肯同上山見師夾山便舉問未審二人見處那箇較親師曰一親一疏夾山復問那箇親師曰且去明日來夾山明日再上問師曰親者不問問者不親大梅山旁有石庫相傳神仙置藥之所一夕師夢神人告之曰君非凡夫石庫中有聖書受之者為地下主不然亦為帝王師於夢中答曰昔僧稠不顧仙經其卷自亡吾以涅槃為樂厥壽何啻與天偕老耶神曰此地靈府俗人居此立致變怪師曰吾寓跡梅尉之鄉耳非久據也忽一日謂其徒曰來莫可抑往莫可追從容間聞鼯鼠聲乃曰即此物非他物汝等諸人善自護持吾今逝矣言訖示滅魯祖寶雲禪師師尋常見僧來便面壁南泉聞乃云我尋常向僧道佛未出世時會取尚不得一箇半箇他漝麼驢年去師因僧問如何是不言言師曰汝口在甚麼處曰無口師曰將甚麼喫飯僧無對泐潭常興和尚南泉至見師面壁泉乃拊師背師問汝是阿誰曰普願師曰如何曰也尋常師曰汝何多事泐潭法會禪師師問馬祖如何是祖師西來意祖曰低聲近前來向汝道師便近前祖打一摑曰六耳不同謀且去來日來師至來日獨入法堂曰請和尚道祖曰且去待老漢上堂出來問與汝證明師忽有省遂曰謝大眾證明乃繞法堂一帀便去五洩山靈默禪師師初謁馬祖次謁石頭便問一言相契即住不契即去石頭據坐師便行頭隨後召曰闍黎師回首頭曰從生至死祇是這箇回頭轉腦作麼師言下大悟乃拗折拄杖而棲止焉幽州寶積禪師師因於市肆行見一客人買豬肉語屠家曰精底割一觔來屠家放下刀叉手曰長史那箇不是精底師於此有省僧問如何是道師便咄僧曰學人未曉師曰去上堂心若無事萬法不生意絕玄機纖塵何立道本無體因體而立名道本無名因名而得號若言即心即佛今時未入玄微若言非心非佛猶是指蹤極則向上一路千聖不傳學者勞形如猿捉影麻谷寶徹禪師師侍馬祖行次問如何是大涅槃祖曰急師曰急箇甚麼祖曰看水師同南泉歸宗謁徑山路逢一婆乃問徑山路向甚處去婆曰驀直去師曰前頭水深過得否婆曰不溼脚師又問上岸稻得與麼好下岸稻得與麼怯婆曰總被螃蠏喫却也師曰禾好香婆曰沒氣息師又問婆在甚處住婆曰祇在這裏三人至店婆煎茶一瓶𢹂盞三隻至謂曰和尚有神通者即喫茶三人相顧間婆曰看老朽自逞神通去也於是拈盞傾茶便行東寺如會禪師仰山參師問汝是甚處人仰曰廣南人師曰我聞廣南有鎮海明珠是否仰曰是師曰此珠如何仰曰黑月即隱白月即現師曰還將得來也無仰曰將得來師曰何不呈似老僧仰叉手近前曰昨到溈山亦被索此珠直得無言可對無理可伸師曰真獅子兒善能哮吼仰禮拜了却入客位具威儀再上人事師纔見乃曰已相見了也仰曰恁麼相見莫不當否師歸方丈閉却門仰歸舉似溈山溈曰寂子是甚麼心行仰曰若不恁麼爭識得他相國崔公羣出為湖南觀察使見師問曰師以何得師曰見性得師方病眼公譏曰既云見性其奈眼何師曰見性非眼眼病何害公稽首謝之公見鳥於佛頭上放糞乃問鳥還有佛性也無師曰有公曰為甚麼向佛頭上放糞師曰是伊為甚麼不向子頭上放西堂智藏禪師師與百丈南泉同入大寂之室李尚書嘗問僧馬大師有甚麼言教僧曰大師或說即心即佛或說非心非佛李曰總過這邊李却問師馬大師有甚麼言教師呼李翱李應諾師曰鼓角動也僧問有問有答賓主歷然無問無答時如何師曰怕爛却那有一俗士問有天堂地獄否師曰有曰有佛法僧寶否師曰有更有多問盡答言有曰和尚恁麼道莫錯否師曰汝曾見尊宿來耶曰某甲曾參徑山和尚來師曰徑山向汝作麼生道曰他道一切總無師曰汝有妻否曰有師曰徑山和尚有妻否曰無師曰徑山和尚道無即得俗士禮謝而去大珠慧海禪師道光座主問曰禪師用何心修道師曰老僧無心可用無道可修曰既無心可用無道可修云何每日聚眾勸人學禪修道師曰老僧尚無卓錐之地甚麼處聚眾來老僧尚無舌何曾勸人來曰禪師對面妄語師曰老僧尚無舌勸人焉解妄語曰某甲却不會禪師語論也師曰老僧自亦不會維摩座主問經云諸菩薩各入不二法門維摩默然是究竟否師曰未是究竟聖意若盡第三卷更說何事座主良久曰請禪師為說未究竟之意師曰如經第一卷是引眾呵十大弟子住心第二諸菩薩各說入不二法門以言顯於無言文殊以無言顯於無言維摩不以言不以無言故默然收前言語故第三卷從默然起說又顯神通作用座主會麼曰奇怪如是師曰亦未如是曰何故未是師曰且破人執情作如此說若據經意只說色心空寂令見本性教捨偽行入真行莫向言語紙墨上討意度但會淨名兩字便得淨者本體也名者跡用也從本體起跡用從跡用歸本體體用不二本跡非殊所以古人道本跡雖殊不思議一也一亦非一若識淨名兩字假號更說甚麼究竟與不究竟無前無後非本非末非淨非名只示眾生本性不思議解脫若不見性人終身不見此理華嚴座主問禪師信無情是佛否師曰不信若無情是佛者活人應不如死人死驢死狗亦應勝於活人經云佛身者即法身也從戒定慧生從三明六通生從一切善法生若說無情是佛大德如今便死應作佛去曰如何得作佛師曰是心是佛是心作佛曰眾生入地獄佛性入否師曰如今正作惡時更有善否曰無師曰眾生入地獄佛性亦如是三藏法師問真如有變易否師曰有變易藏曰禪師錯也師却問三藏有真如否曰有師曰若無變易決定是凡僧也豈不聞善知識者能回三毒為三聚淨戒回六識為六神通回煩惱作菩提回無明為大智真如若無變易三藏真是自然外道也藏曰若爾者真如即有變易也師曰若執真如有變易亦是外道曰禪師適來說真如有變易如今又道不變易如何即是的當師曰若了了見性者如摩尼珠現色說變亦得說不變亦得若不見性人聞說真如變易便作變易解會說不變易便作不變易解會藏曰固知南宗實不可測問三教同異師曰大量者用之即同小機者執之即異總從一性上起用機見差別成三迷悟由人不在教之同異也源律師問和尚修道還用功否師曰用功曰如何用功師曰飢來喫飯困來即眠曰一切人總如是同師用功否師曰不同曰何故不同師曰他喫飯時不肯喫飯百種須索睡時不肯睡千般計較所以不同也律師杜口杉山智堅禪師師初與歸宗南泉行脚時路達一虎各從虎邊過了泉問歸宗適來見虎似箇甚麼宗曰似箇猫兒宗却問師師曰似箇狗子又問南泉泉曰我見是箇大蟲師喫飯次南泉收生飯乃曰生呢師曰無生泉曰無生猶是末泉行數步師召曰長老泉回頭曰作麼師曰莫道是末普請擇蕨次南泉拈起一莖曰這箇大好供養師曰非但這箇百味珍羞他亦不顧泉曰雖然如是箇箇須嘗過始得石鞏慧藏禪師師本以弋獵為務惡見沙門因逐鹿從馬祖庵前過祖乃逆之師遂問還見鹿過否祖曰汝是何人曰獵者祖曰汝解射否曰解射祖曰汝一箭射幾箇曰一箭射一箇祖曰汝不解射曰和尚解射否祖曰解射曰一箭射幾箇祖曰一箭射一羣曰彼此生命何用射他一羣祖曰汝既知如是何不自射曰若教某甲自射直是無下手處祖曰這漢曠劫無明煩惱今日頓息師擲下弓投祖出家一日在廚作務次祖問作甚麼曰牧牛祖曰作麼生牧曰一回入草去驀鼻拽將回祖曰子真牧牛師便休師住後常以弓箭接機南源道明禪師洞山參方上法堂師曰已相見了也山便下去明日却上問曰昨日已蒙和尚慈悲不知甚麼處是與某甲已相見處師云心心無間斷流入於性海山曰幾合放過中邑洪恩禪師仰山問如何得見佛性義師曰我與汝說箇譬喻如一室有六窗內有一獼猴外有獼猴從東邊喚猩猩猩猩即應如是六窗俱喚俱應仰山禮謝起曰適蒙和尚譬喻無不了知更有一事祇如內獼猴睡著外獼猴欲與相見又且如何師下繩牀執仰山手作舞曰猩猩與汝相見了譬如蟭螟蟲在蚊子眼睫上作窠向十字街頭叫云土曠人稀相逢者少三角總印禪師師示眾曰凡說法須用應時應節時有僧問曰四黃四赤時如何師曰三月杖頭挑曰為甚麼滿肚皮貯氣師曰爭奈一條繩何曰如何得出氣去師曰直待皮穿僧問如何是三寶師曰禾麥豆曰學人不會師曰大眾欣然奉持汾州無業禪師師謁馬祖祖覩狀貌奇偉語音如鐘乃曰巍巍堂堂其中無佛師禮跪而問曰三乘文學麤窮其旨常聞禪門即心是佛實未能了祖曰祇未了底心即是更無別物師曰如何是祖師西來密傳心印祖曰大德正閙在且去別時來師纔出祖召曰大德師回首祖曰是甚麼師便領悟乃禮拜祖曰這鈍漢禮拜作麼師既住後凡學者致問多答之曰莫妄想師曰諸佛不曾出世亦無一法與人但隨病施方遂有十二分教如將蜜果換苦葫蘆淘汝諸人業根又云他古德道人得意之後茅茨石室向折脚鐺中煑飯喫過三二十年名利不干懷財寶不為念大忘人世隱跡巖叢君王命而不來諸侯請而不赴豈同我輩貪名愛利汩沒世塗如短販人芙蓉太毓禪師師因行食到龐居士前居士擬接師乃縮手曰生心受施淨名早訶去此一機居士還甘否居士曰當時善現豈不作家師曰非關他事居士曰食到口邊被他奪却師乃下食居士曰不消一句居士又問馬大師著實為人處還分付吾師否師曰某甲尚未見他作麼生知他著實處居士曰祇此見知也無討處師曰居士也不得一向言說居士曰一向言說師又失宗若作兩向三向師還開得口否師曰直是開口不得可謂實也居士撫掌而出利山和尚僧問眾色歸空空歸何所師曰舌頭不出口曰為甚麼不出口師曰內外一如故松山和尚師同龐居士喫茶士舉橐子曰人人盡有分為甚麼道不得師曰祇為人人盡有所以道不得士曰阿兄為甚麼却道得師曰不可無言也士曰灼然灼然師便喫茶士曰阿兄喫茶為甚麼不揖客師曰誰士曰龐公師曰何須更揖後丹霞聞乃曰若不是松山幾被箇老翁惑亂一上士聞之乃令人傳語霞曰何不會取未舉橐子時紫玉山道通禪師于頔相公問如何是黑風吹其船舫漂墮羅剎鬼國師曰于頔客作漢問恁麼事作麼于公失色師乃指曰這箇便是漂墮羅剎鬼國公又問如何是佛師喚相公公應諾師曰更莫別求藥山聞曰噫可惜于家漢生埋向紫玉山中公聞乃謁見藥山山問曰聞相公在紫玉山中大作佛事是否公曰不敢乃曰承聞有語相救今日特來山曰有疑但問公曰如何是佛山召于頔公應諾山曰是甚麼公於此有省五臺隱峯禪師師問石頭如何得合道去頭曰我亦不合道師曰畢竟如何頭曰汝被這箇礙得多少時耶石頭剗草次師在左側叉手而立頭飛剗子向師前剗一株草師曰和尚祇剗得這箇不剗得那箇頭提起剗子師接得便作剗草勢頭曰汝祇剗得那箇不解剗得這箇師無對師推車次馬祖展脚在路上坐師曰請師收足祖曰已展不縮師曰已進不退乃推車碾損祖脚祖歸法堂執斧子曰適來碾損老僧脚底出來師便出於祖前引頸祖笑置斧到南泉值眾參次泉指淨瓶曰銅瓶是境瓶中有水不得動著境與老僧將水來師拈起淨瓶向泉面前瀉泉便休到溈山便入堂於上板頭解放衣鉢溈聞師叔到先具威儀下堂內相看師見來便作臥勢溈便歸方丈師乃發去少間溈山問侍者師叔在否曰已去溈曰去時有甚麼語曰無語溈曰莫道無語其聲如雷師在襄州破威儀堂只著襯衣於砧椎邊拈椎云道得即不打於時大眾默然師便打一下南嶽西園曇藏禪師師一日自燒浴次僧問何不使沙彌師撫掌三下東廚有一大蟒長數丈張口呀氣毒𦦨熾然侍者請避之師曰死可逃乎彼以毒來我以慈受毒無實性激發則強慈苟無緣冤親一揆言訖其蟒按首徐行倏然不見磁州馬頭峯神藏禪師上堂知而無知不是無知而說無知便下座烏臼和尚玄紹二上座參師乃問二禪客發足甚麼處玄曰江西師便打玄曰久知和尚有此機要師曰汝既不會後面箇師僧祗對看紹擬近前師便打曰信知同坑無異土參堂去問僧近離甚處曰定州師曰定州法道何似這裏曰不別師曰若不別更轉彼中去便打僧曰棒頭有眼不得草草打人師曰今日打著一箇也又打三下僧便出去師曰屈棒元來有人喫在曰爭奈杓柄在和尚手裏師曰汝若要山僧回與汝僧近前奪棒打師三下師曰屈棒屈棒曰有人喫在師曰草草打著箇漢僧禮拜師曰却與麼去也僧大笑而出師曰消得恁麼消得恁麼古寺和尚丹霞來參經宿明旦粥熟行者祇盛一鉢與師又盛一椀自喫殊不顧丹霞丹霞亦自盛粥喫行者曰五更侵早起更有夜行人丹霞問師何不教訓行者得恁麼無禮師曰淨地上不要點污人家男女丹霞曰幾不問過這老漢石臼和尚師初參馬祖祖問甚麼處來師曰烏臼來祖曰烏臼近日有何言句師曰幾人於此茫然祖曰茫然且置悄然一句作麼生師乃近前三步祖曰我有七棒寄打烏臼你還甘否師曰和尚先喫某甲後甘本谿和尚師因龐居士問丹霞打侍者意在何所師曰大老翁見人長短在居士曰為我與師同參方敢借問師曰若恁麼從頭舉來共你商量居士曰大老翁不可共你說人是非師曰念翁年老居士曰罪過罪過石林和尚師見龐居士來乃豎起拂子曰不落丹霞機試道一句子居士奪却拂子却自豎起拳師曰正是丹霞機居士曰與我不落看師曰丹霞患瘂龐公患聾居士曰恰是師無語居士曰向道偶爾又一日問居士某甲有箇借問居士莫惜言語居士曰便請舉來師曰元來惜言語居士曰這箇問訊不覺落他便宜師乃掩耳曰作家作家鎮州金牛和尚師每自做飯供養眾僧至齋時舁飯桶到堂前作舞呵呵大笑曰菩薩子喫飯來百靈和尚師一日與龐居士路次相逢問曰南嶽得力句還曾舉向人也無士曰曾舉來師曰舉向甚麼人士以手自指曰龐公師曰直是妙德空生也讚歎不及士却問阿師得力句是誰得知師戴笠子便行士曰善為道路師更不回首則川和尚師摘茶次龐蘊曰法界不容身師還見我否師曰不是老師洎答公話士曰有問有答蓋是尋常師乃摘茶不聽士曰莫怪適來容易借問師亦不顧士喝曰這無禮儀老漢待我一一舉向明眼人師乃拋却茶籃便歸方丈一日在方丈內坐士來見乃曰只知端居丈室不覺僧到參時師垂下一足士便出行三兩步却回師乃收足士曰可謂自由自在師曰我是主士曰阿師只知有主不知有客師喚侍者點茶士作舞而出忻州打地和尚師自江西領旨常晦其名凡學者致問唯以棒打地示之時謂之打地和尚一日被僧藏却棒然後致問師但張其口僧問門人曰祇如和尚每日有人問便打地意旨如何門人即於竈內取柴一片擲置釜中江西樹和尚師臥次道吾近前牽被覆之師曰作麼吾曰葢覆師曰臥底是坐底是吾曰不在這兩處師曰爭奈葢覆何吾曰莫亂道道吾一日從外歸師問甚麼處去來道吾曰親近來師曰用簸這兩片皮作麼道吾曰借師曰他有從汝借無作麼生道吾曰祇為有所以借浮盃和尚凌行婆來禮拜師與坐喫茶婆乃問盡力道不得底句分付阿誰師曰浮盃無剩語婆曰未到浮盃不妨疑著師曰別有長處不妨拈出婆斂手哭曰蒼天中更添冤苦師無語婆曰語不知偏正理不識倒邪為人即禍生後有僧舉似南泉泉曰苦哉浮盃被這老婆摧折一上婆後聞笑曰王老師猶少機關在澄一禪客逢見行婆便問怎生是南泉猶少機關在婆乃哭曰可悲可痛一罔措婆曰會麼一合掌而立婆曰伎死禪和如麻似粟一舉似趙州州曰我若見這臭老婆問教口瘂一曰未審和尚怎生問他州便打一曰為甚麼却打某甲州曰似這伎死漢不打更待幾時連打數棒婆聞却曰趙州合喫婆手裏棒後僧舉似趙州州哭曰可悲可痛婆聞此語合掌歎曰趙州眼光爍破四天下州令僧問如何是趙州眼婆乃豎起拳頭僧回舉似趙州州作偈曰當機覿面提覿面當機疾報汝凌行婆哭聲何得失婆以偈答曰哭聲師已曉已曉復誰知當時摩竭國幾喪目前機潭州龍山和尚洞山與密師伯行脚見溪流菜葉洞曰深山無人因何有菜隨流莫有道人居否乃相與撥草溪行五七里間忽見師羸形異貌放下行李問訊師曰此山無路闍黎從何處來洞曰無路且置和尚從何而入師曰我不從雲水來洞曰和尚住此山多少時耶師曰春秋不涉洞曰和尚先住此山先住師曰不知洞曰為甚麼不知師曰我不從人天來洞曰和尚得何道理便住此山師曰我見兩箇泥牛鬬入海直至於今絕消息洞山始具威儀禮拜便問如何是主中賓師曰青山覆白雲曰如何是賓中主師曰長年不出戶曰賓主相去幾何師曰長江水上波曰賓主相見有何言說師曰清風拂白月洞山辭退師乃述偈曰三間茅屋從來住一道神光萬境閒莫把是非來辨我浮生穿鑿不相關又曰一池荷葉衣無數滿地松花食有餘剛被世人知住處又移茅屋入深居因燒庵不知所如故人亦稱隱山和尚襄州龐蘊居士唐貞元初謁石頭乃問不與萬法為侶者是甚麼人頭以手掩其口豁然有省後與丹霞為友一日石頭問曰見老僧以來日用事作麼生士曰若問日用事即無開口處乃呈偈曰日用事無別惟吾自偶諧頭頭非取捨處處沒張乖朱紫誰為號邱山絕點埃神通并妙用運水及搬柴頭然之曰子以緇耶素耶士曰願從所慕遂不剃染後參馬祖問曰不與萬法為侶者是甚麼人祖曰待汝一口吸盡西江水即向汝道士於言下頓領玄旨士見丹霞霞作走勢士曰猶是拋身勢作麼生是嚬呻勢霞便坐士以拄杖劃地作七字霞於下劃箇一字士曰因七見一見一忘七霞便起去士曰更坐少時猶有第二句在霞曰向這裏著語得麼士遂哭出去士悟後以舟盡載珍橐數萬沈之湘流舉室修行有女名靈照常鬻竹漉籬以供朝夕有偈曰有男不婚有女不嫁大家團欒頭共說無生話士一日庵中獨坐驀地云難難十石油麻樹上攤龐婆接聲云易易百草頭上祖師意靈照云也不難也不易飢來喫飯困來睡士坐次問靈照曰古人道明明百草頭明明祖師意作麼生照曰老老大大作這箇語話士曰你作麼生照曰明明百草頭明明祖師意士乃笑士賣竹漉籬下橋喫撲靈照見亦去爺邊倒士曰你作甚麼照曰見爺倒地某甲相扶士曰賴是無人見士將入滅謂靈照曰視日早晚及午以報照遽報日已中矣而有蝕也士出戶觀次靈照即登父座合掌坐亡士笑曰我女鋒捷矣於是更延七日州牧于公頔問疾次士謂之曰但願空諸所有慎勿實諸所無好去世間皆如影響言訖枕于公膝而化遺命焚棄江湖藥山惟儼禪師住藥山後海眾四集遵布衲浴佛師曰這箇從汝浴還浴得那箇麼遵曰把將那箇來師乃休院主報打鐘也請和尚上堂師曰汝與我擎鉢盂去曰和尚無手來多少時師曰汝祇是枉披袈裟曰某甲祇恁麼和尚如何師曰我無這箇眷屬謂雲巖曰與我喚沙彌來巖曰喚他來作甚麼師曰我有箇折脚鐺子要他提上挈下巖曰恁麼則與和尚出一隻手去也師便休園頭栽菜次師曰栽即不障汝栽莫教根生曰既不教根生大眾喫甚麼師曰汝還有口麼頭無對師晚參云我有一句子待特牛生兒即向汝道時有僧便出云特牛生兒也祇是和尚不道師喚侍者將燈來其僧便抽身入眾師問龐居士一乘中還著得這箇事麼士曰某甲祇管日求升合不知還著得麼師曰道居士不見石頭得麼士曰拈一放一未為好手師曰老僧住持事繁士珍重便出師曰拈一放一的是好手士曰好箇一乘問宗今日失却也師曰是是師因僧問學人有疑請師決師曰待上堂時來與闍黎決疑至晚上堂眾集師曰今日請決疑上座在甚麼處其僧出眾而立師下禪牀把住曰大眾這僧有疑便與一推却歸方丈問僧年多少也僧云七十二也師云是年七十二那僧云是師便打問己事未明乞和尚指示師良久曰吾今為汝道一句亦不難祇宜汝於言下便見去猶較些子若更入思量却成吾罪過不如且各合口免相累及師令供養主抄化甘贄行者問甚處來曰藥山來甘曰作麼曰教化甘曰將得藥來麼曰行者有甚麼病甘便捨銀兩錠意山中有人必不受此主歸納疏師問曰子歸何速主舉前話師曰速送還他子著賊了也主遂送還甘曰由來有人益金以施師久不陞座一日院主白云大眾久思和尚示誨曰打鐘著時大眾纔集定便下座歸方丈院主隨後問云和尚許為大眾說話為甚麼一言不措師曰經有經師律有律師爭怪得老僧丹霞天然禪師一日石頭告眾曰來日剗佛殿前草至來日大眾諸童行各備鍬钁剗草獨師以盆盛水沐頭於石頭前胡跪頭見而笑之便與剃髮又為說戒師乃掩耳而出再往江西謁馬祖未參禮便入僧堂內騎聖僧頸而坐時大眾驚愕遽報馬祖祖躬入堂視之曰我子天然師即下地禮拜曰謝師賜法號因名天然祖問從甚處來師曰石頭祖曰石頭路滑還躂倒汝麼師曰若躂倒即不來也乃杖錫觀方過慧林寺遇天大寒取木佛燒火向院主訶曰何得燒我木佛師以杖子撥灰曰吾燒取舍利主曰木佛何有舍利師曰既無舍利更取兩尊燒主自後眉鬚墮落明日再往禮拜見國師便展坐具國師曰不用不用師退後國師曰如是如是師却進前國師曰不是不是師繞國師一帀便出國師曰去聖時遙人多懈怠三十年後覓此漢也難得訪龐居士見女子靈照洗菜次師曰居士在否女子放下菜籃叉手而立師又問居士在否女子提籃便行師遂回須臾居士歸女子乃舉前話士曰丹霞在麼女曰去也士曰赤土塗牛嬭師問龐居士昨日相見何似今日士曰如法舉昨日事來作箇宗眼師曰祇如宗眼還著得龐公麼士曰我在你眼裏師曰某甲眼窄何處安身士曰是眼何窄是身何安師休去士曰更道取一句便得此話圓師亦不對士曰就中這一句無人道得師與龐居士行次見一泓水士以手指曰便與麼也還辨不出師曰灼然是辨不出士乃戽水潑師二掬師曰莫與麼莫與麼士曰須與麼須與麼師却戽水發士三掬師曰正與麼時堪作甚麼士曰無外物師曰得便宜者少士曰誰是落便宜者問僧甚麼處宿曰山下宿師曰甚麼處喫飯曰山下喫飯師曰將飯與闍黎喫底人還具眼也無僧無對潮州大顛禪師僧問其中人相見時如何師曰早不其中也曰其中者如何師曰不作箇問韓文公一日相訪問師春秋多少師提起數珠曰會麼公曰不會師曰晝夜一百八公不曉遂回次日再來至門前見首座舉前話問意旨如何座扣齒三下及見師理前問師亦扣齒三下公曰元來佛法無兩般師曰是何道理公曰適來問首座亦如是師乃召首座問是汝如此對否座曰是師便打趁出院文公又一日白師曰弟子軍州事繁佛法省要處乞師一語師良久公罔措時三平為侍者乃敲禪牀三下師曰作麼平曰先以定動後以智公乃曰和尚門風高峻弟子於侍者邊得箇入處僧問苦海波深以何為船筏師曰以木為船筏曰恁麼即得度也師曰盲者依前盲瘂者依前瘂一日將痒和子廊下行逢一僧問訊次師以痒和子驀口打曰會麼曰不會師曰大顛老野狐不曾孤負人潭州長髭禪師師問僧甚處來曰九華山控石庵師曰庵主是甚麼人曰馬祖下尊宿師曰名甚麼曰不委他法號師曰他不委你不委曰尊宿眼在甚處師曰若是庵主親來今日也須喫棒曰賴遇和尚放過某甲師曰百年後討箇師僧也難得李行婆來師乃問憶得在絳州時事麼婆曰非師不委師曰多虗少實在婆曰有甚諱處師曰念你是女人放你拄杖婆曰某甲終不見尊宿過師曰老僧過在甚麼處婆曰和尚無過婆豈有過師曰無過底人作麼生婆乃豎拳曰與麼總成顛倒師曰實無諱處師見僧乃擒住曰獅子兒野干屬僧以手作撥眉勢師曰雖然如此猶欠哮吼在僧擒住師曰偏愛行此一機師與一摑僧拍手三下師曰若見同風汝甘與麼否曰終不由別人師作撥眉勢僧曰猶欠哮吼在師曰料想不由別人汾州石樓禪師僧問未識本來性乞師方便指師曰石樓無耳朵曰某甲自知非師曰老僧還有過曰和尚過在甚麼處師曰過在汝非處僧禮拜師便打大同濟禪師米胡領眾來纔欲相見師便拽轉禪牀面壁而坐米於背後立少時却回客位師曰是即是若不驗破已後遭人貶剝令侍者請米米却拽轉禪牀便坐師乃遶禪牀一帀便歸方丈米却拽倒禪牀領眾便出訪龐居士士曰憶在母胎時有一則語舉似阿師切不得作道理主持師曰猶是隔生也士曰向道不得作道理師曰驚人之句爭得不怕士曰如師見解可謂驚人師曰不作道理却成作道理士曰不但隔一生兩生師曰粥飯底僧一任檢責士鳴指三下師見龐居士來便掩却門曰多知老翁莫與相見士曰獨坐獨語過在阿誰師便開門纔出被士把住曰師多知我多知師曰多知且置閉門開門卷之與舒相較幾許士曰祇此一問氣急殺人師默然士曰弄巧成拙一日問龐居士是箇語言古今少人避得只如龐公還避得麼曰諾師再舉前話士曰甚麼處去來師曰非但如今古人亦有此語士作舞而出去師曰風顛老風顛老自過教誰檢士來訪提起笊籬喚曰大同師大同師師不顧士曰石頭一宗瓦解冰消師曰若不得龐公輩灼然如此士拋下笊籬曰寧教不直一文錢師曰錢雖不直欠他又爭得士作舞而退師乃提起笊籬曰龐公龐公士曰你要我笊籬我要你木杓師作舞而退士撫掌笑曰歸去來歸去來黃檗希運禪師師上堂眾纔集師拈拄杖一時打散復召大眾眾回首師曰月似彎弓少雨多風問如何是西來意師便打一日上堂大眾雲集乃曰汝等諸人欲何所求以拄杖趁之大眾不散師却復坐曰汝等諸人盡是噇酒糟漢恁麼行脚取笑於人但見八百一千人處便去不可圖他熱閙也汝等既稱行脚亦須著些精神好還知道大唐國裏無禪師麼時有僧問諸方尊宿盡聚眾開化為甚麼却道無禪師師曰不道無禪祇是無師長慶大安禪師僧問此陰已謝彼陰未生時如何師曰此陰未謝那箇是大德曰不會師曰若會此陰便明彼陰問黃巢軍來和尚向甚麼處迴避師曰五蘊山中曰忽被他捉著時如何師曰惱亂將軍古靈神贊禪師師行脚遇百丈開悟却回受業本師問曰汝離吾在外得何事業曰並無事業遂遣執役一日因澡身命師去垢師乃拊背曰好所佛堂而佛不聖本師回首視之師曰佛雖不聖且能放光本師又一日在窗下看經蜂子投窗紙求出師覩之曰世界如許廣闊不肯出鑽他故紙驢年去遂有偈曰空門不肯出投窗也太癡百年鑽故紙何日出頭時本師置經問曰汝行脚遇何人吾前後見汝發言異常師曰某甲蒙百丈和尚指箇歇處今欲報慈德耳本師於是告眾致齋請師說法師乃登座舉唱百丈門風曰靈光獨耀迥脫根塵體露真常不拘文字心性無染本自圓成但離妄緣即如如佛本師於言下感悟曰何期垂老得聞極則事天台平田普岸禪師師訪茂源和尚源纔起迎師近前把住云開口即失閉口即喪去此二途請師別道源以手掩鼻師放開云一步較易兩步較難源云著甚死急師云若非是師不免諸方點檢臨濟訪師到路口先逢一嫂在田使牛濟問嫂平田路向甚麼處去嫂打牛一棒曰這畜生到處走到此路也不識濟又曰我問你平田路向甚麼處去嫂曰這畜生五歲尚使不得濟心語曰欲觀主人先觀所使便有抽釘拔楔之意及見師師問你還曾見我嫂也未濟曰已收下了也師遂問近離甚處濟曰江西黃檗師曰情知你見作家來濟曰特來禮拜和尚師曰已相見了也濟曰賓主之禮合施三拜師曰既是賓主之禮禮拜著洪州東山慧禪師大於侍者到師問金剛正定一切皆然秋去冬來且作麼生者曰不妨和尚借問師曰即今即得去後作麼生者曰誰敢問著某甲師曰大於還得麼者曰猶要別人點檢在師曰輔弼宗師不廢光彩侍者禮拜百丈山涅槃和尚師一日謂眾曰汝等與我開田我與汝說大義眾開田了歸請說大義師乃展兩手眾罔措趙州真際從諗禪師師到黃檗檗見來便閉方丈門師乃把火於法堂內叫曰救火救火檗開門捉住曰道道師曰賊過後張弓師一日於雪中倒臥曰相救相救有僧便去身邊臥師便起去師在東司上見遠侍者過驀召文遠遠應諾師曰東司上不可與汝說佛法僧問二龍爭珠誰是得者師曰老僧祇管看僧問至道無難唯嫌揀擇是時人窠臼否師曰曾有人問我老僧直得五年分疏不下問院主甚麼處來主曰送生來師曰鵶為甚麼飛去主曰怕某甲師曰汝十年知事作恁麼語話主却問鵶為甚麼飛去師曰院主無殺心僧遊五臺問一婆子曰臺山路向甚處去婆曰驀直去僧便去婆曰好箇師僧又恁麼去後有僧舉似師師曰待我去勘過明日師便去問臺山路向甚處去婆曰驀直去師便去婆曰好箇師僧又恁麼去師歸院謂僧曰臺山婆子為汝勘破了也問如何是玄中玄師曰汝玄來多少時耶曰玄之久矣師曰闍黎若不遇老僧幾乎玄殺有一婆子令人送錢請轉藏經師受施利了却下禪牀轉一匝乃曰傳語婆轉藏經已竟其人回舉似婆婆曰比來請轉全藏如何祇為轉半藏官人問丹霞燒木佛院主為甚麼眉鬚墮落師云官人宅內變生作熟是甚麼人云所使師云却是他好手問作何方便即得聞於未聞師云未聞且置你曾聞箇甚麼來新到參師曰甚處來曰南方來師曰佛法盡在南方汝來這裏作甚麼曰佛法豈有南北耶師曰饒汝從雲居雪峯來祇是箇擔板漢師問一婆子甚麼處去曰偷趙州筍去師曰忽遇趙州又作麼生婆與一掌師休去師因有老宿問近離甚處師云滑州宿云幾程到這裏師云一躂到宿云好箇捷疾鬼師云萬福大王宿云參堂去師應喏喏又謂眾曰你若一生不離叢林不語五年十載無人喚你作瘂漢已後佛也不奈你何你若不信載取老僧頭去南泉從浴室裏過見浴頭燒火問云作什麼云燒浴泉云記取來喚水牯牛浴浴頭應喏至晚間浴頭入方丈泉問作什麼云請水牯牛去浴泉云將得繩索來不浴頭無對師來問訊泉泉舉似師師云某甲有語泉便云還將得繩索來麼師便近前驀鼻便拽泉云是即是太麤生師問南泉離四句絕百非外請師道泉便歸方丈師云這老和尚每常口𭺗𭺗地及其問著一言不措侍者云莫道和尚無語好師便打一掌南泉便掩却方丈門便把灰圍却問僧云道得即開門多有人下語並不契泉意師云蒼天蒼天泉便開門問承聞和尚親見南泉是否師云鎮州出大蘿蔔頭問如何是佛真法身師云更嫌什麼問如何是賓中主師云山僧不問婦如何是主中賓師云老僧無丈人問如何是一切法常住師云老僧不諱祖其僧再問師云今日不答話問萬物中何物最堅師云相罵饒汝接觜相唾饒汝潑水問曉夜不停時如何師云僧中無與麼兩稅百姓師上堂云兄弟你正在第三冤裏所以道但改舊時行履處莫改舊時人共你各自家出家比來無事更問禪問道三十二十人聚頭來問恰似欠伊禪道相似你喚作善知識我是同受栲老僧不是戲好恐帶累佗古人所以東道西說問如何是趙州主人公師咄云這篐桶漢學人應喏師云如法篐桶著問如何是學人本分事師云樹搖鳥散魚驚水渾問如何玄中玄師云說什麼玄中玄七中七八中八問如何是玄中玄師云這僧若在合年七十四五師上堂云兄弟但改往修來若不改大有著你處在尼問離却上來說處請和尚指示師咄云煨破鐵瓶尼將鐵瓶添水來請和尚答話師笑之問從上至今即心是佛不即心還許學人商量也無師云即心且置商量箇什麼師示眾云擬心即差僧便問不擬心時如何師打二下云莫是老僧辜負闍黎麼問凡有問答落在意根不落意根師如何對師云問學云便請師道師云莫向這裏是非問上上人一撥便轉下下人來時如何師云汝是上上下下云請和尚答話師云話未有主在云某甲七千里來莫作心行師云據你者一問心行莫不得麼此僧一宿便去問真如凡聖皆是夢言如何是真言師云更不道者兩箇學云兩箇且置如何是真言師云唵𭊘啉㗶師示眾云心生即種種法生心滅即種種法滅你諸人作麼生僧乃問只如不生不滅時如何師云我許你者一問師因參次云明又未明道昏欲曉你在阿那頭僧云不在兩頭師云與麼即在中間也云若在中間即在兩頭師云這僧多少時在老僧這裏作與麼語話不出得三句裏然直饒出得也在三句裏你作麼生僧云某甲使得三句師云何不早與麼道問萬境俱起還有惑不得者也無師云有學云如何是惑不得者師云你還信有佛法否學云信有佛法古人道了如何是惑不得者師云為什麼不問老僧學云問了也師云惑也師示眾云教化得底人是今生事教化不得底人是第三生冤若不教化恐墮却一切眾生教化亦是冤是你還教化也無僧云教化師云一切眾生還見你也無學云不見師云為什麼不見學云無相師云即今還見老僧否學云和尚不是眾生師云自知罪過即得師示眾云八百箇作佛漢覓一箇道人難得問白雲不落時如何師云老僧不會上象學云豈無賓主師云老僧是主闍黎是賓白雲在什麼處師示眾云佛之一字吾不喜聞問和尚還為人也無師云為人學云如何為人師云不識玄旨徒勞念靜學云既是玄作麼生是旨師云我不把本學云者箇是玄如何是旨師云答你是旨問狗子還有佛性也無師云無學云上至諸佛下至螘子皆有佛性狗子為什麼無師云為伊有業識性在問如何是道人師云我向道是佛人問凡有言句舉手動足盡落在學人網中離此外請師道師云老僧齋了未喫茶馬大夫問和尚還修行也無師云老僧若修行即禍事云和尚既不修行教什麼人修行師云大夫是修行底人云某甲何名修行師云若不修行爭得撲在人王位中餧得來赤凍紅地無有解出期大夫乃下淚拜謝問學人才到總不知門戶頭事如何師云上座名什麼學云惠南師云大好不知問學人欲學又謗於和尚如何得不謗去師云你名什麼學云道皎師云靜處去者米囤子問不挂寸絲時如何師云不挂什麼學云不挂寸絲師云大好不挂寸絲問用處不現時如何師云用即不無現是誰問空劫中還有人修行也無師云喚什麼作空劫云無一物是師云者箇始稱修行喚什麼作空劫問如何是出家師云不履高名不求垢壞有秀才見師手中拄杖乃云佛不奪眾生願是否師云是秀才云某甲就和尚乞取手中拄杖得否師云君子不奪人所好秀才云某甲不是君子師云老僧亦不是佛師因出外見婆子插田云忽遇猛虎作麼生婆云無一法可當情師云唋婆子云唋師云難有者箇在問如何是佛向上人師云只者牽耕牛底是問初生孩子還具六識也無師云急流水上打毬子問唯佛一人是善知識如何師云魔語問如何是急切處師云一問一答問如何是無師智師云老僧不曾教闍黎問如何是親切一句師云話墮也問如何是西來意師云板齒生毛問如何是丈六金身師云腋下打領云學人不會師云不會請人裁尼問如何是密密意師以手掐之云和尚猶有者箇在師云是你有者箇問如何是塵中人師云布施茶鹽錢來問如何是佛法大意師云禮拜著僧擬進話次師喚沙彌文遠文遠到師叱云適來去什麼處來問如何是忠言師云你娘醜陋問如何是忠言師云喫鐵棒問如何是不思處師云快道快道問非思量處如何師云速道速道問出來底是什麼人師云佛菩薩問如何是聖師云不凡云如何是凡師云不聖云不凡不聖時如何師云好箇禪僧問兩鏡相向那箇最明師云闍黎眼皮葢須彌山問高峻難上時如何師云老僧不向高峯頂問如何是沙門行師云離行問真休之處請師指師云指即不休問利劍出匣時如何師云黑問如何是沙門得力處師云你什麼處不得力問高峻難上時如何師云老僧自住峯頂云爭奈曹溪路側何師云曹溪是惡云今時為什麼不到師云是渠高峻問祖佛命不斷處如何師云無人知問貧子來將什麼物與他師云不欠少師因在室坐禪次主事報和尚云大王來禮拜大王禮拜了左右問烈士王來為什麼不起師云你不會老僧者裏下等人來出三門接中等人來下禪牀接上等人來禪牀上接不可喚大王作中等下等人也恐屈大王大王歡喜再三請入內供養師因問周員外你還夢見臨濟也無員外豎起拳師云那邊見外云者邊見師云什麼處見臨濟員外無對師問周員外什麼處來云非來非去師云不是老鵶飛來飛去問新到從何方來云無方面來師乃轉背僧將坐具隨師轉師云大好無方面師與侍郎遊園見兔走過侍郎問和尚是大善知識兔子見為什麼走師云老僧好殺師問僧離什麼處云離京中師云你還從潼關過麼云不歷師云今日捉得者販私鹽漢師因到臨濟方始洗脚臨濟便問如何是祖師西來意師云正值洗脚臨濟乃近前側聆師云若會便會不會更莫啗作麼臨濟拂袖去師云三十年行脚今日為人錯下註脚師行脚時見二庵主一人作丫角童師問訊二人殊不顧來日早晨丫角童將一鐺飯來放地上分作三分庵主將席子近前坐丫角童亦將席近前相對坐亦不喚師師乃亦將席子近前坐丫童目顧於師庵主云莫言侵早起更有夜行人師云何不教詔這行者庵主云他是人家男女師云洎合放過丫童便起顧視庵主云多口作麼丫童從此入山不見師因看經次沙彌文遠入來師乃將經側視之沙彌乃出去師隨後把住云速道速道文遠云阿彌陀佛阿彌陀佛師便歸方丈有新羅院主請師齋師到門首問此是什麼院云新羅院師云我與你隔海有一婆子日晚入院來師云作什麼婆云寄宿師云者裏是什麼所在婆呵呵大笑而去長沙景岑禪師師與仰山玩月次山曰人人盡有這箇祇是用不得師曰恰是倩汝用山曰你作麼生用師劈胸與一蹋山曰㘞直下似箇大蟲自此諸方稱為岑大蟲問南泉道三世諸佛不知有貍奴白牯却知有為甚麼三世諸佛不知有師曰未入鹿苑時猶較些子曰貍奴白牯為甚麼却知有師曰汝爭怪得伊問南泉遷化向甚麼處去師曰東家作驢西家作馬曰學人不會此意如何師曰要騎即騎要下即下三聖令秀上座問曰南泉遷化向甚麼處去師曰石頭作沙彌時參見六祖秀曰不問石頭見六祖南泉遷化向甚麼處去師曰教伊尋思去秀曰和尚雖有千尺寒松且無抽條石筍師默然秀曰謝和尚答話師亦默然秀回舉似三聖聖曰若恁麼猶勝臨濟七步然雖如此待我更驗看至明日三聖上問承聞和尚昨日答南泉遷化一則語可謂光前絕後今古罕聞師亦默然子湖巖利蹤禪師師於門下立牌曰子湖有一隻狗上取人頭中取人心下取人足擬議即喪身失命臨濟會下二僧來參方揭簾師喝曰看狗僧回顧師便歸方丈劉鐵磨參師曰汝是劉鐵磨否曰不敢師曰左轉右轉曰和尚莫顛倒師便打陸亘大夫宣州刺史陸亘大夫問南泉古人瓶中養一鵞鵞漸長大出瓶不得如今不得毀瓶不得損鵞和尚作麼生出得南泉召大夫亘應諾南泉曰出也亘從此開解即禮謝池州甘贄行者一日入南泉設齋黃檗為首座行者請施財座曰財法二施等無差別甘曰恁麼道爭消得某甲䞋便將出去須臾復入曰請施財座曰財法二施等無差別甘乃行䞋又一日入寺設粥請南泉念誦泉乃白椎曰請大眾為貍奴白牯念摩訶般若波羅密甘拂袖便出泉粥後問典座行者在甚處座曰當時便去也泉便打破鍋子芙蓉靈訓禪師師初參歸宗問如何是佛宗曰我向汝道汝還信否曰和尚誠言安敢不信宗曰即汝便是師曰如何保任宗曰一翳在眼空華亂墜五臺智通禪師師初在歸宗會下忽一夜連叫曰我大悟也眾駭之明日上堂眾集宗曰昨夜大悟底僧出來師出曰某甲宗曰汝見甚麼道理便言大悟試說看師曰師姑原是女人做宗異之師便辭去宗門送與提笠子師接得笠子戴頭上便行更不回顧後居臺山法華寺臨終有偈曰舉手攀南斗回身倚北辰出頭天外看誰是我般人鎮州普化和尚師事盤山密受記莂而佯狂出言無度暨盤山順世乃於此地行化每振一鐸曰明頭來明頭打暗頭來暗頭打四面八方來旋風打虗空來連架打一日臨濟令僧捉住曰總不恁麼來時如何師拓開曰來日大悲院裏有齋僧回舉似濟濟曰我從來疑著這漢師見馬步使出喝道師亦喝道作相撲勢馬步使令人打五棒師曰似即似是即不是師嘗於闤闠間搖鐸唱曰覓箇去處不可得時道吾遇之把住問曰汝擬去甚麼處師曰汝從甚麼處來吾無語師掣手便去虔州處微禪師僧問三乘十二分教體理得妙與祖意是同是別師曰須向六句外鑒不得隨聲色轉曰如何是六句師曰語底默底不語不默總是總不是汝合作麼生僧無對金州操禪師師請米和尚齋不排坐位米到展坐具禮拜師下禪牀米乃坐師位師却席地而坐齋訖米便去侍者曰和尚受一切人欽仰今日坐位被人奪却師曰三日後若來即受救在米三日後果來曰前日遭賊朗州古堤和尚師尋常見僧來但曰去汝無佛性僧無對或有對者莫契其旨仰山到參師曰去汝無佛性仰山叉手近前三步應喏師笑曰子甚麼處得此三昧來仰山曰我從耽源處得名溈山處得地師曰莫是溈山的子麼仰山曰世諦即不無佛法即不敢仰山却問和尚從甚處得此三昧師曰我從章敬處得此三昧仰山嘆曰不可思議來者難為湊泊湖南上林戒靈禪師師初參溈山山曰大德作甚麼來師曰介冑全具山曰盡卸了來與大德相見師曰卸了也山咄曰賊尚未打卸作甚麼師無對仰山代曰請和尚屏却左右溈山以手指曰喏喏師後參永泰方諭其旨五臺祕魔巖和尚師常持一木叉每見僧來禮拜即叉却頸曰那箇魔魅教汝出家那箇魔魅教汝行脚道得也叉下死道不得也叉下死速道速道學徒鮮有對者霍山通和尚訪師纔見不禮拜便攛入壞裏師拊通背三下通起拍手曰師兄三千里外賺我來三千里外賺我來便回溈山靈祐禪師合醬次問仰山這箇用多少鹽水仰曰某甲不會不欲祗對師云却是老僧會仰云不知用多少鹽水師云汝既不會我亦不答晚間師却問仰山今日因緣子作麼生主持仰云待問即答師云現問次仰云耳背眼昏見聞不曉師云凡有問答出子此語不得仰禮謝師云寂子今日忘前失後不是小小師謂仰山曰汝須獨自回光返照別人不知汝解處汝試將實解獻老僧看仰曰若教某甲自看到這裏無圓位亦無一物一解得獻和尚師云無圓位處原是汝作解處未離心境在仰曰既無圓位何處有法把何物作境師曰適來是汝作與麼解是否仰曰是師云若恁麼是具足心境法未脫我所心在元來有解獻我許汝信位顯人位隱在師一日見香巖仰山作餅次師曰當時百丈先師親得這箇道理仰與香巖相顧視云什麼人答得此話師云有一人答得仰云是阿誰師指水牯牛云道道仰取一束草來香巖取一桶水來放牛前牛纔喫師云與麼與麼不與麼不與麼二人俱作禮師云或時明或時暗師因資國來參乃指月示之國以手撥三下師云不道汝不見祇是見處太麤師問道吾甚處去來吾云看病來師曰有幾人病吾云有病底有不病底師云不病底莫是智頭陀否吾云病與不病總不干他事急道急道師云道得也與他沒交涉師問仰山終日與子商量成得箇甚麼邊事仰空中畫一畫師曰若不是吾終被子惑師問僧甚處來曰西京來師曰還得西京主人公書來麼曰不敢妄通消息師曰作家師僧天然猶在曰殘羮餿飯誰人喫之師曰獨有闍黎不喫僧作嘔吐勢師曰扶出這病僧著僧便出去道吾山宗智禪師溈山問雲巖菩提以何為座巖曰以無為為座巖却問溈山山曰以諸法空為座又問師作麼生師曰坐也聽伊坐臥也聽伊臥有一人不坐不臥速道速道山便休去師指佛桑花問僧曰這箇何似那箇曰直得寒毛卓豎師曰畢竟如何曰道吾門下底師曰十里大王雲巖不安師乃謂曰離此殻漏子向甚麼處相見巖曰不生不滅處相見師曰何不道非不生不滅處亦不求相見雲巖曇晟禪師師少出家於石門參百丈海禪師二十年因緣不契後造藥山山問甚處來曰百丈來山曰百丈有何言句示徒師曰尋常道我有一句子百味具足山曰鹹則鹹味淡則淡味不鹹不淡是常味作麼生是百味具足底句師無對山曰爭奈目前生死何師曰目前無生死山曰在百丈多少時師曰二十年山曰二十年在百丈俗氣也不除他日侍立次山又問百丈更說甚麼法師曰有時道三句外省去六句內會取山曰三千里外且喜沒交涉山又問更說甚麼法師曰有時上堂大眾立定以拄杖一時趁散復召大眾眾回首丈曰是甚麼山曰何不早恁麼道今日因子得見海兄師於言下頓省便禮拜師煎茶次道吾問煎與阿誰師曰有一人要曰何不教伊自煎師曰幸有某甲在師問石霜甚麼處來曰溈山來師曰在彼中得多少時曰麤經冬夏師曰若恁麼即成山長也曰雖在彼中却不知師曰他家亦非知非識石霜無對僧問一念瞥起便落魔界時如何師曰汝因甚麼却從佛界來僧無對師曰會麼曰不會師曰莫道體不得設使體得也祇是左之右之裴大夫問僧供養佛佛還喫否僧曰如大夫祭家神大夫舉似師師曰有幾般飯食但一時下來師却問神山一時下來後作麼生神山曰合取鉢盂師然之師一日作草鞋次洞山近前曰學人乞師眼睛得麼師曰汝底與阿誰去也曰良价無師曰設有汝向甚麼處著洞山無語師曰乞眼睛底是眼否洞山曰非眼師便喝出尼僧禮拜師問汝爺在否曰在師曰年多少曰年八十師曰汝有箇爺不年八十還知否曰莫是恁麼來者師曰恁麼來者猶是兒孫一日藥山問汝除在百丈更到甚麼處來師曰曾到廣南來曰見說廣州城東門外有一片石被州主移去是否師曰非但州主闔國人移亦不動百巖明哲禪師洞山與密師伯到參師問二上座甚處來山曰湖南師曰觀察使姓甚麼曰不得姓師曰名甚麼曰不得名師曰還治事也無曰自有郎幕在師曰還出入也無曰不出入師曰豈不出入山拂袖便出師次早入堂召二上座曰昨日老僧對闍黎一轉語不相契一夜不安今請闍黎別下一轉語若愜老僧意便開粥相伴過夏山曰請和尚問師曰豈不出入山曰太尊貴生師乃開粥同共過夏翠微無學禪師一日師在法堂內行投子進前接禮問曰西來密旨和尚如何示人師駐步少時子曰乞師垂示師曰更要第二杓惡水那子便禮謝師曰莫躲根子曰時至根苗自生師因供養羅漢僧問丹霞燒木佛和尚為甚麼供養羅漢師曰燒也燒不著供養亦一任供養曰供養羅漢羅漢還來也無師曰汝每日還喫飯麼僧無語師曰少有靈利的孝義性空禪師丁行者看師師打一棒云瞎却汝本來眼也丁云非但今日古人亦行此令師云誰向汝道古今丁拂袖便出師云青天白日有迷路人丁云莫要指示麼師便打丁云莫瞎却人眼好師云瞎却俗人眼有甚麼過仙天禪師僧參纔展坐具師曰不用通時暄還我文彩未生時道理來曰某甲有口瘂却即閒苦死覓箇臘月扇子作麼師拈棒作打勢僧把住曰還我未拈棒時道理師曰隨我者隨之南北不隨我者死住東西曰隨與不隨且置請師指出東西南北師便打披雲和尚來纔入方丈師便問未見東越老人時作麼生為物雲曰祇見雲生碧嶂焉知月落寒潭師曰祇與麼也難得曰莫是未見時麼師便喝雲展兩手師曰錯怪人者有甚麼限雲掩耳出師曰死却這漢平生也馬頰本空禪師上堂祇這施為動轉還合得本來祖翁麼若合得十二時中無虗棄底道理若合不得喫茶說話往往喚作茶話在僧便問如何免得不成茶話去師曰你識得口也未曰如何是口師曰兩片皮也不識曰如何是本來祖翁師曰大眾前不要牽爺恃孃曰大眾欣然去也師曰你試點大眾性看僧作禮師曰伊往往道一性一切性在僧欲進語師曰孤負平生行脚眼問去却即今言句請師直指本來性師曰你迷源來得多少時曰即今蒙和尚指示師曰若指示你我即迷源曰如何即是師示頌曰心是性體性是心用心性一如誰別誰共妄外迷源祇者難洞古今凡聖如幻如夢本生禪師師拈拄杖示眾曰我若拈起你便向未拈起時作道理我若不拈起你便向拈起時作主宰且道老僧為人在甚麼處時有僧出曰不敢妄生節目師曰也知闍黎不分外曰低低處平之有餘高高處觀之不足師曰節目上更生節目僧無語師曰掩鼻偷香空招罪犯石室善道禪師師參石頭一日隨頭遊山次頭曰汝與我斫却面前樹子免礙我師曰不將刀來頭乃抽刀倒與師曰何不過那頭來頭曰你用那頭作甚麼師即大悟師一夕與仰山玩月山問這箇月尖時圓相甚麼處去圓時尖相又甚麼處去師曰尖時圓相隱圓時尖相在龍潭崇信禪師初悟和尚居天王寺師家於寺巷其家賣餅師日以十餅饋之天王食畢常留一餅曰吾惠汝以蔭子孫師一日自念曰餅是我持去何返遺我其別有旨乎遂造問焉天王曰是汝持來復汝何咎師聞之頗曉玄旨因投出家服勤左右一日問曰某自到來不蒙指示心要天王曰自汝到來吾未嘗不指汝心要師曰何處指示天王曰汝擎茶來吾為汝接汝行食來吾為汝受汝和南時吾便低首何處不指示心要師低頭良久天王曰見則直下便見擬思即差師當下開解復問如何保任天王曰任性逍遙隨緣放曠但盡凡心別無聖解僧問髻中珠誰人得師曰不賞玩者得曰安著何處師曰有處即道來有尼問如何得為僧去師曰作尼來多少時也曰還有為僧時也無師曰汝即今是甚麼曰現是尼身何得不識師曰誰識汝李翱刺史問如何是真如
body:
  text: 御製序漢明帝時佛法始入中國盛於晉宋間遠公其殊勝者也向傳泥洹宗旨由遠公而始聞於此土然觀蓮社高賢傳中所載遠公之語遠公固非洞明泥洹宗旨者徒聞其說耳僧肇與遠公同時晉有遠公秦有僧肇言淨土者推遠公言講經者推僧肇宗徒皆視為小乘謂是菩提達摩以前時人震旦未聞教外別傳之旨不得入祖席焉朕閱肇法師所作般若無知涅槃無名空有不遷形山祕寶諸論非深明宗旨何能了了如斯以此講經正是不立文字諸佛慧命奚隔封疆有何今古豈得謂菩提達摩未來以前震旦無宗旨哉故刪輯其要文序而刊行之學者勿於長江一葦𦵇嶺隻履邊目起狂華則知菩提達摩見梁武時無所從來遇宋雲時亦無所去也雍正十一年癸丑四月望日御選大智圓正聖僧肇法師論肇論序慧達率愚序長安釋僧肇法師所作宗本不遷等四論曰有美若人超語兼默標本則句句深達佛心明末則言言備通眾教達猥生天幸逢此正音每至披尋不勝手舞誓願生生盡命弘述夫神道不形心敏難繪聊寄一序請俟來哲蓋大分深義厥號本無故建言宗旨標乎實相開空法道莫逾真俗所以次釋二諦顯佛教門但圓正之因無尚般若至極之果唯有涅槃故末啟重元明眾聖之所宅雖以性空擬本無本可稱語本絕言非心行處然則不遷當俗俗則不生不真為真真但名說若能崇茲一道無言二諦斯則靜照之功著故般若無知無名之德興而涅槃不稱余謂此說周圓罄佛淵海浩博無涯窮法體相洪論第一肇公其人矣傳燈錄載僧肇在姚秦問大辟師乞七日假著寶藏論畢臨刑時說偈曰四大元無主五陰本來空將頭臨白刃猶似斬春風然此偈非肇所作也肇為鳩摩羅什高弟秦王姚興命入逍遙園助什詳定經論尊禮有加十六國春秋僧肇傳云以姚秦弘始十六年卒於長安時晉義熈十年也況典刑之人豈有給假著論之理則肇法師之以吉祥滅度信矣事既子虗偈非師作蓋訛傳焉御製序古人遇時節因緣每云言下大悟夫言下大悟悟不在言也韓廬逐塊乃於言中求悟夢到驢年是為執指求月者黃梅曹溪密室夜分傳衣授受究何曾道一字耶迨後黃梅送曹溪至九江驛邊兩人共語曹溪云只合自性自度黃梅云如是如是夫既自性自度則黃梅何授曹溪何受乎雖然此正黃梅所授曹溪所受也永嘉之於曹溪更可分明舉似天下後世夫永嘉參承止一宿耳故謂之一宿覺今觀其問答語永嘉全是逆水之機毫無順水之意然則曹溪何授而永嘉何受乎不知永嘉正從此得曹溪乳不可誣也蓋使有一實法與人而曰法乳直同馬生馬驢生驢耳若此魔外別生魔外又如久竹生青寧青寧生程尚安得稱慧命哉永嘉言句西竺推為東土大乘論朕披覧之嘉其修悟雙圓乘戒兼妙自淺之深淺深一致實惟宗徒指南爰加刪訂刊示十方叢林焉雍正十一年癸丑四月望日御選洞明妙智永嘉覺禪師語錄師永嘉人也姓戴氏丱歲出家徧探三藏精天台止觀圓妙法門於四威儀中常冥禪觀後因左谿朗禪師激勵與東陽䇿禪師同詣曹溪初到振錫𢹂瓶繞祖三帀祖曰夫沙門者具三千威儀八萬細行大德自何方而來生大我慢師曰生死事大無常迅速祖曰何以體取無生了無速乎曰體即無生了本無速祖云如是如是於時大眾無不愕然師方具威儀參禮須臾告辭祖曰返太速乎師曰本自非動豈有速耶祖曰誰知非動曰仁者自生分別祖曰汝甚得無生之意曰無生豈有意耶祖曰無意誰當分別曰分別亦非意祖歎曰善哉善哉少留一宿時謂一宿覺矣迴住溫江學者輻輳號真覺大師著禪宗悟修圓旨自淺之深慶州刺史魏靜緝而成篇目為永嘉集御製序寒山詩三百餘首拾得詩五十餘首唐閭邱太守寫自寒巖流傳閻浮提界讀者或以為俗語或以為韻語或以為教語或以為禪語如摩尼珠體非一色處處皆圓隨人目之所見朕以為非俗非韻非教非禪真乃古佛直心直語也永明云修習空花萬行宴坐水月道場降伏鏡裏魔軍大作夢中佛事如二大士者其庶幾乎正信調直不離和尚因緣圓滿光華周遍大千世界不萌枝上金鳳翱翔無影樹邊玉象圍繞性空行實性實行空妄有真無妄無真有有空無實念念不留有實無空如如不動是以直心直語如是如是學者狐疑淨盡圓證真如亦能有無一體性行一貫乃可與讀二大士之詩否則隨文生解總無交涉也刪而錄之以貽後世寒山子云有子期辨此音是為序雍正十一年癸丑五月朔日御製序夫佛祖代代相承稱為父子雖曰假世間之名教表出世之真傳然大死大活而慧命斯續視屬毛離裏而四大和合者一為生身一為無生身同是實際本非引喻也永明云須臾即俗歸真莫疇茲旨頃刻從凡入聖難報斯恩夫火宅而登清凉之山開迷雲而入光明之海迴視頭刺膠盆身同繭縛之時正所謂如人飲水冷暖自知豈有不念皮肉骨髓所由來者乎莫非父子也而其中父子濟美以溈仰為最當日提唱一聲啐一時同稟法王之正令共現瑠璃之金身一堂兩琴鼓宮而宮應鼓商而商應一奩兩鏡胡來而皆胡漢來而皆漢無上妙旨齊轉金輪一代法門雙標銅柱蓋溈山仰山之父子正同寒山拾得之弟兄於佛法中如世間所云家慶人瑞者矣故合為一編以為天下後世宗徒勸是為序雍正十一年癸丑五月朔日御製序夫達摩西來九年面壁無多言句而能直指人心見性成佛首開震旦之宗風後人演唱提持照用權實鳴塗毒鼓揮太阿鋒於言象不該之表形名未兆之先機如電掣雷奔譚似河流海注青蓮花紛飄舌本大師子吼斷十方穿透百千諸佛耳根𨁝跳三十三天空外究其所歸不過鋪荊列棘徧地生枝甘草黃連自心甘苦耳然則自利利他固不在於多言歟趙州諗禪師圓證無生法忍以本分事接人龍門之桐高百尺而無枝朕閱其言句真所謂皮膚剝落盡獨見一真實者誠達摩之所護念獅乳一滴足迸散千斛驢乳但禪師垂示如五色珠若小知淺見會於言表則辜負古佛之慈悲落草之婆心也觀師信手拈來信口說出皆令十方智者一時直入如來地可謂壁立萬仞月印千江如趙州之接人誠為直指人心見性成佛之古佛云爰錄其精粹者著於篇以示後學俾知真宗軌範如是如是爾雍正十一年癸丑五月望日御製序顧著曰鑒擬問即咦揚眉眨眼敗闕如斯又道古來老宿為慈悲之故有落草之談如是鑒咦落草也未大慈大悲那顧喪身失命祇這註破即今早已落草了也佛印元曰雲門說法如雲雨絕不喜人記錄見必罵逐曰汝口不用反記吾語今室中對機錄皆香林明教以紙為衣隨即書之朕今刊錄刪輯雲門言句且道與雲門意旨是同是別雲門古德豈畏落草朕亦大丈夫豈問與雲門是同是別者哉雖然超情絕解直指自心如雲門者實為奇特垂示後世雲門與朕實是大慈大悲設使燈籠露柱向前致問還慈悲個什麼答曰鑒進云落草了也答曰咦雍正十一年癸丑六月朔日御製序宋初杭州永明智覺禪師平生著述有宗鏡錄唯心訣心賦萬善同歸等集凡千萬言並在大藏有流傳海外者朕披閱採錄不勝敬禮喜悅真所謂明逾曉日高越太清如鼓師子弦眾響俱絕如發摩尼寶五色生光信為曹溪後第一人超出歷代大善知識者特加封妙圓正修智覺禪師卷中萬善同歸集一書禪師自謂略述教海之一塵普施法界之含識云自師證明方知大小齊觀宗教一貫但學人須必真參實有所悟乃可觀此書依教行持可以普獨耀之神光圓幻有之萬行所為無成之成不修之修無礙妙諦有益圓證若未能解縛俱空境智雙泯則必依情起識執相求詮則墮鐵圍之山轉迷真覺之海禪師云先明其宗方能進道若一向逐末實有所妨然則此書未經參悟不必觀讀本禪師之志也朕既刊其全書頒示宗徒又採其至言附於本集因恐疑悞初學故又指述於此雍正十一年癸丑六月望日御製序紫陽真人作悟真篇以明元門祕要復作頌偈等三十二篇一一從性地演出西來最上一乘之妙旨自敘云此無為妙覺之至道也標為外集夫外之云者真人豈以元門為內而以宗門為外哉審如是真人止應專事元教又何必旁及於宗說且又何謂此為最上豈非以其超乎三界真亦不立故為悟真之外也歟真人云世人根性迷鈍執其有身惡死悅生卒難了悟黃老悲其貪著乃以修生之術順其所欲漸次導之觀乎斯言則長生不死雖經八萬劫究是楊葉止啼非為了義信矣若此事雖超三界之外仍不離乎一毛孔之中特以不自了證則非人所可代學者將箇無義味語放在八識田中奮起根本無明發大疑情猛利無間縱喪身失命亦不放捨久之久之人法空心境寂能所亡情識盡并此無義味語一時忘却當下百雜粉碎覿體真純此從上古德所為決不相賺者真人以華池神水溫養子珠會三界於一身之後能以金丹作無義味語用忽地翻身一擲抹過太虗脫體無依隨處自在仙俊哉大丈夫也篇中言句真證了徹直指妙圓即禪門古德中如此自利利他不可思議者猶為希有如禪師薛道光皆歸依為弟子不亦宜乎刊示來今使學元門者知有真宗學宗門者知惟此一事實餘二即非真焉是為序雍正十一年癸丑七月朔日御選大慈圓通禪仙紫陽真人張平叔語錄悟真篇後序切以人之生也皆緣妄情而有其身有其身則有患若其無身患從何有夫欲免夫患者莫若體夫至道欲體夫至道莫若明夫本心故心者道之體也道者心之用也人能察心觀性則圓明之體自現無為之用自成不假施功頓超彼岸此非心鏡朗然神珠廓明則何以使諸相頓離纖塵不染心源自在決定無生者哉然其明心體道之士身不能累其性境不能亂其真則刀兵烏能傷虎兕烏能害巨焚大浸烏足為虞達人心若明鏡鑑而不納隨機應物和而不唱故能勝物而無傷也此所謂無上至真之妙道也原其道本無名聖人強名道本無言聖人強言爾然則名言若寂則時流無以識其體而歸其真是以聖人設教立言以顯其道故道因言而後顯言因道而返忘柰何此道至妙至微世人根性迷鈍執其有身而惡死悅生故卒難了悟黃老悲其貪著乃以修生之術順其所欲漸次導之以修生之要在金丹金丹之要在乎神水華池故道德陰符之教得以盛行於世矣蓋人悅其生也然其言隱而理奧學者雖諷誦其文皆莫曉其義若不遇至人授之口訣縱揣量百種終莫能著其功而成其事豈非學者紛如牛毛而達者乃如角也余向己酉歲於成都遇師授丹法當年且生公傾背自後三傳於人三遭禍患皆不逾兩旬近方憶師之所戒云異日有與汝解韁脫鎖者當宜授之餘不許爾後欲解名籍而患此道人不知信遂撰此悟真篇敘丹藥本末既成而求學者湊然而來觀其意勤心不忍祕乃擇而授之然而所授者皆非有巨勢強力能持危拯溺慷慨特達能仁明道之士初再罹禍患心猶未知竟至於三乃省前過故知大丹之法至簡至易雖愚昧小人得而行之則立超聖地是以天意祕惜不許輕傳於非其人也而余不遵師語屢泄天機以其有身故每膺譴患此天之深戒如此之神且速敢不恐懼克責自今以往當鉗口結舌雖鼎鑊居前刀劍加項亦無復敢言矣此悟真篇中所歌詠大丹藥物火候細微之旨無不備悉好事者夙有仙骨觀之則智慮自明可以尋文解義豈須余區區之口授之矣如此乃天之所賜非余之輒傳也如其篇末歌頌談見性之法即上之所謂無為妙覺之道也然無為之道齊物為心雖顯祕要終無過咎柰何凡夫緣業有厚薄性根有利鈍縱聞一音紛成異見故釋迦文殊所演法寶無非一乘而聽學者隨量會解自然成三乘之差此後若有根性猛利之士見聞此篇則知余得達摩六祖最上一乘之妙旨可因一言而悟萬法也如其習氣尚餘則歸中小之見亦非余之咎矣時元豐改元戊午歲仲夏月戊寅日張平叔再序悟真篇外集性地頌一佛性非同異千燈共一光增之寧解益減著且無傷取舍俱無過焚漂總不妨見聞知覺法無一可猜量二如來妙體遍河沙萬象森羅無障遮會得圓通真法眼始知三界是吾家三視之不可見其形及至呼之又却應莫道此聲如谷響若還無谷有何聲四一物含聞見覺知蓋諸塵境顯其機靈常一物尚非有四者憑何作所依五不移一步到西天端坐諸方在目前頂後有光猶是幻雲生足下未為仙六求生本自無生畏滅何曾暫滅眼見不如耳見口說爭如鼻說無罪福終日行不曾行終日坐不曾坐修善不成功德造惡原無罪過時人若未明心莫執此言亂做死後須見閻王難免鑊湯碓磨三界惟心三界惟心妙理萬物非此非彼無一物非我心無一物是我己見物便見心見物便見心無物心不現十方通塞中真心無不遍若生知識解却成顛倒見覩境能無心始見菩提面圓通見了真空空不空圓明何處不圓通根塵心法都無物妙用方知與物同隨他萬物縱橫在目前看他動靜任他權圓明定慧終無染似水生蓮蓮自蓮寶月一輪明月當虗空萬國清光無障礙收之不聚撥不開前之不進後不退彼非遠兮此非近表非外兮裏非內同中有異異中同問你傀儡會不會心經頌蘊諦根塵空色都無一法堪言顛倒之見已盡寂靜之體翛然人我又名齊物我不異人人心自異人有親疏我無彼此水陸飛行等觀一體貴賤尊卑首足同己我尚非我何甞有你彼此俱無眾泡歸水讀雪竇禪師祖英集曹溪一水分千派照古澄今無滯礙近來學者不窮源妄指蹄窪為大海雪竇老師達真趣大震雷音椎法鼓獅王哮吼出窟來百獸千邪皆恐懼或歌詩兮或語句叮嚀指引迷人路言詞磊落義高深擊玉敲金響千古爭柰迷人逐境留却將言相尋名數真如實相本無言無下無高無有邊非色非空非二體十方塵剎一輪圓正定何曾分語默取不得兮捨不得但於諸相不留心即是如來真軌則為除妄想將真對妄若不生真亦晦能知真妄兩俱非方得真心無罣礙無罣礙兮能自在一悟頓消窮劫罪不施功力證菩提從此永離生死海吾師近而言語暢留在世間為榜樣昨宵被我喚將來把鼻孔穿放杖上問他第一義何如却道有言皆是謗戒定慧解夫戒定慧者乃法中之妙用也佛祖雖嘗有言而未達者有所執今略而言之庶資開悟然其心境兩忘一念不動曰戒覺性圓明內外瑩徹曰定隨緣應物妙用無窮曰慧此三者相須而成互為體用或戒之為體者則定慧為其用定之為體者則戒慧為其用慧之為體者則戒定為其用三者未嘗斯須相離也猶如日假光而能照光假照以能明非光則不能照非照則不能明原其戒定慧者本乎一性光照明者本乎一日一尚非一三復何三三一俱忘湛然清淨即心是佛頌佛即心兮心即佛心佛從來皆妄物若知無佛復無心始是真如法身佛法身佛沒模樣一顆圓光含萬象無體之體即真體無相之相即實相非色非空非不空不動不靜不來往無異無同無有無難取難捨難聽望內外圓通到處通一佛國在一沙中一粒沙含大千界一箇身心萬箇同知之須會無心法不染不滯為淨業善惡千端無所為便是如來及迦葉採珠歌貧子衣中珠本自圓明好不會自尋求却數他人寶數他寶終無益只是教君空費力爭如認取自家珍價值黃金千萬億此寶珠光最大遍照三千大千界從來不解少分毫剛被浮雲無障礙自從認得此摩尼泡體空花誰更愛佛珠還與我珠同我性即歸佛性海珠非珠海非海坦然心量包法界任你塵囂滿眼前定慧圓明常自在不是空不是色內外皎然無壅塞六通神明妙無窮自利利他寧解極見即了萬事畢絕學無為度終日怕兮如未兆嬰兒動止隨緣無固必不斷妄不修真真妄之心總屬塵從來萬法皆無相無相之中有法身法身即是天真佛亦非人兮亦非物浩然充塞天地間只是希夷并恍惚垢不染光自明無法不從心裏生心若不生法自滅即知罪福本無形無佛形無法說丈夫智見自然別出言便作獅子鳴不似野狐論生滅禪定指迷歌如來禪性如水體靜風波自止興居湛湛常清不獨坐時方是今人靜坐取證不道全在見性性於見裏若明見向性中自定定成慧用無窮是名諸佛神通幾欲究其體用但見十方虗空空中杳無一物亦無希夷恍惚希恍既不可尋尋之却成乖失只此乖失兩字不可執為憑據本心尚乃如空豈有得失能所但將萬法遣除遣令淨盡無餘豁然圓明自現便與諸佛無殊色身為我桎梏且恁和光混俗舉動一切無心爭甚是非榮辱生身只是寄居逆旅主號毗盧毗盧不來不去乃知生滅無餘或問毗盧何似只為有相不是眼前葉葉塵塵塵葉非同非異況此塵塵葉葉箇箇釋迦迦葉異則萬籟皆鳴同則一風都攝若要認得摩尼莫道得法方知有病用他藥療病差藥更何施心迷須假法照心悟法更不要又如昏鏡得磨痕垢自然滅了本為心法皆妄故令離盡諸相諸相離了何如是名至真無上若欲莊嚴佛土平等行慈救苦菩提本願雖深切莫相中有取此為福慧雙圓當來授記居先斷常纖塵有染却於諸佛無緣翻念凡夫迷執盡被情愛染習只為貪著情多常生胎卵化濕學道須教猛烈無情心剛似鐵直饒父母妻兒又與他人何別常守一顆圓光不見可欲思量萬法一時無著說甚地獄天堂然後我命在我空中無聲無墮出沒諸佛土中不離菩提本坐觀音三十二應我當亦從中證化現不可思議盡出逍遙之性我是無心禪客凡事不會揀擇昔時一箇黑牛今日渾身總白有時自歌自笑傍人道我神少爭知被褐之形內懷無價之寶更若見我談空恰似渾圇吞棗此法惟佛能知凡愚豈解相表兼有修禪上人只學鬬口合唇誇我問答敏急却元不識主人盡是尋枝摘葉不解窮究本根得根枝葉自茂無根枝葉難存便逞己握靈珠轉於人我難除與我靈源妙覺遠隔千里之殊此輩可傷可笑空說積年學道心高不肯問人枉使一生虗老乃是愚迷鈍根邪見業重為因若向此生不悟後世爭免沈淪無心頌堪笑我心如頑如鄙兀兀騰騰任物安委不解修行亦不造罪不曾利人亦不私己不持戒律不徇忌諱不知禮樂不行仁義人間所能百無一會飢來喫飯渴來飲水困則打睡覺則行履熱則單衣寒則葢被無思無慮何憂何喜不悔不謀無念無意凡生榮辱逆旅而已林木棲鳥亦可為比來且不禁去亦不止不避不求無讚無毀不厭醜惡不羨善美不趨靜室不遠閙市不說人非不誇己是不厚尊崇不薄賤稚親愛冤讎大小內外哀樂得喪欽侮險易心無兩覩坦然一揆不為福先不為禍始感而後應迫而後起不畏鋒刃焉怕虎兕隨物稱呼豈拘名字眼不就色聲不來耳凡所有相皆屬妄偽男女形聲悉非定體體相無心不染不礙自在逍遙物莫能累妙覺光圓映徹表裏包裹六極無有遐邇光兮非光如月在水取捨既難復何比擬了茲妙用迥然超彼或問所宗此而已矣西江月一十二首一妄想不復強滅真如何必希求本源自性佛齊修迷悟豈拘前後悟即剎那成佛迷而萬劫輪流若能一念契真修滅盡恒沙罪垢二本自無生無滅強作生滅區分祇如罪福亦無根妙體何曾增損我有一輪明鏡從來只為蒙昏今朝磨瑩照乾坤萬象昭然難隱三我性入諸佛性諸方佛性皆然亭亭寒影照寒泉一月千潭普現小即毫毛莫識大時徧滿三千高低不約信方圓說甚短長深淺四法法法元無法空空空亦非空靜喧語默本來同夢裏何勞說夢有用用中無用無功功裏施功還如果熟自然紅莫問如何修種五善惡一時忘念榮枯都不關心晦明隱顯任浮沈隨分飢餐渴飲神靜湛然常寂不妨坐臥歌吟一池秋水碧仍深風動莫驚儘恁六對鏡不須強滅假名權立菩提色空明暗本來齊真妄休分兩體悟即便名淨土更無天竺曹溪誰言極樂在天西了即彌陀出世七人我眾生壽者寧分彼此高低法身通照沒吾伊念念不須尋覓見是何曾見是聞非未必聞非從來諸用不相知生死誰能礙你八住相修行布施果報不離天人恰如仰箭射浮雲墜落只緣力盡爭似無為實相還源返樸歸湻境忘情盡任天真以證無生法忍九魚兔若還入手自然忘却筌渡河筏子上天梯到彼悉皆遺棄未悟須憑言說悟來言說成非雖然四句屬無為此等仍須脫離十悟了莫求寂滅隨緣且接羣迷斷常知見及提𢹂方識指歸實際五眼三身四智六度萬行修齊圓光一顆好摩尼利物兼能自濟十一我見時人談性只誇口急酬機及逢境界轉癡迷又與愚人何異說得便須行得方明言行無虧能將慧劍斬摩尼此號如來正智十二欲了無生妙道惟須自見真心真身無相亦無音清淨法身只恁此道非無非有非中有甚求尋二邊俱遣棄中心見了名為上品御製序雪竇徧參諸方機辯無敵忽遇智門兩度拂子驀口打豁然開悟乃嗣智門學者於此薦得當知心不在思維而普照法界口不必語言而遍演恒沙如雪竇云直饒乾坤大地草木叢林盡為衲僧異口同聲各置百千問難也不消長老一彈指便乃高低普應前後無差也雖然一彈指中隨緣自結如三十三天共食寶器隨其福德而飯色不同故經云一切賢聖皆以無為法而有差別一彈指尚且如是況乃有答有問有字有文豈得顢頇渾同無復選擇昔年雪竇眉毛拖地留此葛藤今日圓明解髻探珠蛇足一上茲編也皆是第一義諦最上宗乘學者不假外求直下自證則不離此言句而皆有從凡入聖之機譬如以火銷冰冰釋於水水冰一味得無所得火水殊途有何交涉然而火力銷冰其功曷可誣歟雍正十一年癸丑七月朔日御製序頻呼小玉緣何事為要檀郎認得聲圓悟勤禪師因此言下頓徹斯語也綺語耶禪語耶塗毒鼓邊豈容側耳但於綺語禪語一佇思擬議則劍去遠矣亙古亙今亙上亙下亙東亙西亙南亙北皆是微塵一微塵中皆建寶剎一寶剎中皆作佛事凡諸佛事皆具如來正法眼藏涅槃妙心於何開口說得於何著手揀得開口說者即是者個著手揀者亦是者個豈得以者個說者個以者個揀者個略一佇思擬議這邊是地水火風鐵山岌岌那邊是見聞知覺玉海沈沈何由撒手懸厓盡是開眼說夢所以古德云若欠一法不成法身若剩一法不成法身若有一法不成法身若無一法不成法身於此薦取開口說亦可著手揀亦可如或未能可惜孤負圓悟平生許多絡索即圓明主人一番選錄亦復鈍置不少雍正十一年癸丑七月望日御製序昔黃帝訪道於廣成子湯問於卞隨務光古之聖王其於高世之士必資其薰習身心以為宰制萬事之本迨於後世凡入帝王之門者功業邊事尚難其人何況心性邊事從來宗門古德傳靈山之心燈其中不少大丈夫而不入帝王之門其居帝王之位者悟宗旨主復少間或浮慕教相淺識小夫輒以崇尚異端議之而其所尊禮之人多每不足以服世徒滋疑謗於是黃帝成湯之美事不可復見於後世我朝之初居東土也風俗湻古實忠實孝直心直行歷代敬禮佛天而於僧道並無不問高下一概尊敬之事與蒙古習尚迥殊我皇祖世祖章皇帝撫有方夏萬幾餘暇與玉琳琇䒢溪森父子究竟心性之學一時遇合蓋與黃帝成湯之事無二無別非我朝夙有崇僧之習而然也朕覧玉琳琇父子之書闡揚宗乘之妙旨實能利人濟世如杲日在空迷雲頓淨如清鐘響夜幻夢旋消惠當來龍象於無窮從上佛祖而不愧用是採輯校刊傳示後世因念帝王訪道於高世之士乃古聖之盛軌而自昔世儒每於二氏限量區別朕不忍將來者之終懵而不為之剖晰也故敘其說如左至於萬善殿西苑說法併奏對機緣雖載自骨巖侍香紀略但皆佛法中事非裝點誇張妄謬之說亦玉琳琇揚日月之光華作人天之眼目處尚足取者故採編數則敬昭皇祖當日之恩遇云雍正十一年癸丑八月朔日御選大覺普濟能仁玉琳琇國師語錄順治十六年己亥閏三月初一日萬善殿奉御旨上堂師至座前召眾云會麼若也會得山僧未離江南陞座說法已竟如或未然看向第二門頭施展去也便登座拈香云此一瓣香親受靈山記莂焫向爐中祝嚴佛心天子成等正覺次拈香云此一瓣香華藏海會早已敷宣焫向爐中祝嚴佛母太后百福具備保助皇躬大揚法化上首白椎竟問百福叢中選佛場海眾側聆求法要如何是賓中賓師云一千家飯進云箇中好消息剎剎塵塵現如何是賓中主師云青目覩人少進云一人有慶兆民賴之如何是主中賓師云庭前古柏蔭人天進云天高羣象正海闊百川朝如何是主中主師云當堂不正坐進云賓主歷然承指示當陽一句又如何師打云有功者賞問仁皇好道啟大會於重玄祖令當行建法幢於今日從上宗猷如何展演師云進前來與汝道進云金輪頂上無生曲唱徹皇都調更新師云一句聳人進云恁麼則萬善殿中為雨露五龍亭上起清風師云共願如是進云只如仰答聖明一句又作麼生道師云天台華頂萬年藤報德酬恩心鐵石問即今萬善堂中頂禮萬佛寶號但知其名未審居何國土師云上座醉那進云某甲則不然師便打僧喝師又打進云不勞重舉師復打問如何是十方薄伽梵師云處處撞著進云如何是一路涅槃門師云看脚下進云如何是選佛場師云棒頭有眼明如日進云如何是心空及第歸師便打進云恁麼則天上有星皆拱北人間無水不朝東師又打問五祖門下有一神秀大師因什麼不得衣師云為他通身是佛進云盧行者因什麼却得衣師云為他不會禪道進云恁麼可謂伶俐不妨隨處有癡愚端的世間稀師便打是日名德頗多師復左右顧眎云世尊拈花迦葉微笑百萬人天次第成佛御駕儼臨命登萬善寶座揭露正法眼藏涅槃妙心作家禪侶盡出相見還更有麼乃云九年面壁計較未成立雪齊腰苦勞徒爾三拜依位立可知禮也懺罪解縛鞭影高飛無性性空松風聒耳本無一物追金琢玉兩枝嫩桂五葉芬敷異口同音千山一月乃至笑巖老祖挺生神京建立臨濟宗旨禹門浪闊突兀孤危事是恁麼事人須恁麼人但得恁麼人何愁恁麼事且道如何是恁麼事舉袈裟云如天普葢似地普擎好風齋著力盡向此中吹上堂上首白椎竟問仙客乘雲泛紫畿欣逢聖主話玄微五旬金殿垂恩重又許扁舟渡雪谿未審其中祕密還得大家知也無師云天高地厚進云雷音已震青霄外四海咸聞第一機師云日光月華問當今天子聖明君隆興三寶剔禪燈特請和尚登寶座御駕親臨轉法輪如何是轉法輪師云山僧慚愧進云本來大道無言說未審如何又有言師云聖恩難報進云一顆明珠在海中光照虗空作慧燈師卓拄杖云念汝老實問舌無十字關脚斷五色線請問和尚如何是舌頭上無十字關師云恁麼的人來與他茶喫進云如何是脚跟下斷五色線師云恁麼的人來教他地下坐著進云打破十字關掃斷五色線師打云你替他各喫三十棒乃云釋迦文佛降生之月朔旦良辰奉旨重陞寶座舉揚大法通琇打點些佛法出來供養大眾及乎陞到座上觀諸大眾通身是法一一毛孔出無量口一一口出無量音聲一一音聲宣無量妙義人人爾法法爾盈虗空徧法界無有一毫虧欠處無有一毫空缺處通琇更作麼擔水河頭賣直如河伯見海若恍然自失耳伏惟大眾各自珍重下座己亥春詔迎入京命住西苑世祖問心在七處不在七處師云覓心了不可得世祖問悟道的人還有喜怒哀樂也無師云喚什麼作喜怒哀樂世祖問山河大地從妄念而生妄念若息山河大地還有也無師云如人睡醒夢中之事是有是無世祖問如何用工師云端拱無為世祖問如何是大師云光被四表格于上下世祖問本來面目如何參師云如六祖所言參云六祖如何說師云祖言不思善不思惡正恁麼時如何是本來面目世祖問思善思惡時如何師云好善但好善惡惡但惡惡正好善惡惡時即參者好善惡惡的是箇什麼所謂要一切處參第一要動裏參動中得力靜中愈勝古人所謂從緣薦得相應捷也世祖退命近侍傳語云恨相見之晚庚子秋世祖馬上有省連詔敦請至京世祖就見西苑丈室相視而笑日窮玄奧世祖見一矮戒子指問師師云長者長法身短者短法身世祖喜謝奉旨進頌深殿焚香永心齋笑坐忘大圓鏡智淨應物妙無方又慈幃色養適侍坐快談玄法界塵塵佛同光照大千雨夜奉旨書僧問趙州如何得不蹉路州云識自本心見自本性即不蹉路心同虗空界示等虗空法證得虗空時無是無非法且道虗空作麼生證心隨萬境轉轉處實能幽隨流認得性無喜亦無憂見聞覺知是流且道性作麼生認一念不生全體現六根纔動被雲遮且道全體現時如何略彴不是趙州橋明月清風安可比世祖賓天拈香師云報身如夢幻世界若空華唯過量大人去來無礙進如意云此是皇上生生用不盡的現前大眾專精持念究竟堅固大陀羅尼執事舉楞嚴大悲藥師往生等神呪並遶誦普門大士名懺悔發願回向元旦上堂問答不錄師云追金琢玉繡口文心自有當行作者轉身掉臂努目撑眉一任逞俊禪流兩眼對兩眼真金不博鍮未舉先知早已屬二屬三當陽薦取豈止落七落八諸佛不出世祖師不西來目前無闍黎此間無老僧但有言說都無實義擲拂子云踏著故鄉田地密人人鼓腹樂昇平下座端陽上堂白椎竟舉天龍為玄沙侍者侍沙山行遇虎龍曰和尚虎沙云是汝虎師召眾云衲僧行處如火消冰萬法本閒惟人自閙六祖大師云非風旛動仁者心動將謂說心性禪承言者喪滯句者迷舍多尊者云非風鈴鳴我心鳴耳多少人面牆而立心復誰乎俱寂靜故大眾還會麼一物寂靜多物寂靜一身寂靜多身寂靜一世界寂靜多世界寂靜先師天隱老和尚如是龍池幻翁老和尚如是濟宗上下諸祖如是東土二三西天四七如是卓拄杖云拄杖如是山僧如是大眾如是顧左右云堂中喫糉子如是下座幻有大和尚誕日設供師指真云兀坐嘴盧都教人沒奈何箇老漢慣得其便者裏透得過的如龍得水似虎靠山有意氣時添意氣不風流處也風流而今大明國裏稱為師翁後裔者不啻百千萬億究竟得大機顯大用堪為的骨兒孫者能有幾人某上座初閱龍池語錄見師翁云世間多少不平之輩務要別尋一箇人與我老釋迦比勝負較優劣還知我釋迦如來是何等一箇面目麼某上座便於此喪身失命將謂師翁面目只如是後來呈似先師和尚受他許多惡辣鉗錘方知見與翁齊減翁半德見過於翁方堪嗣續從此脚跟下自解作活計雖與師翁同條生不與師翁同條死師翁善為隱語云人還知我釋迦如來是何等一箇面目令某小瞎禿最初祇見師翁殺人刀未見師翁活人劍今日某上座不妨顯示令見者聞者知我祖師門下亦有殺人刀亦有活人劍顧視左右云若有問如何是我師翁真面目拈香云急著眼佛誕度僧上堂師云報恩新長老今年纔廿四黃面老瞿曇是吾最小子古往今來多少居曲彔牀的大善知識凡於四月八日播弄瞿曇小老的矢臭氣則有分還曾夢見瞿曇的師麼若向者裏緇素得則不論鬀髮不鬀髮不虗親到報恩來若者裏緇素不得直饒新報恩親手為他剗草也未免對面白雲千萬里驀喝一喝下座秋中行化上堂師拈拄杖召眾云終日與山僧同居共處還識得山僧立地處也未時常見山僧搖唇鼓舌還會得山僧真實相為處也未若識得山僧立地處則於此深山窮谷臥月披雲却在十字街頭拖泥帶水而十字街頭拖泥帶水却在此深山窮谷臥月披雲若識得山僧真實相為處則與大眾耳提面命却千里萬里而千里萬里未嘗不與大眾耳提面命還會麼卓柱杖云頂上一輪滿清光何處無元旦上堂眾問話畢師乃云參禪流聽我說此事非常休倉卒登山須到絕頂頭入水須至最深窟乾坤寬廣實難知滄海淵深豈易識不識不知且止透頂透底一句作麼生道草樹盡非前度色藍田日暖玉生光便舟化主領崑山眾居士請上堂師顧左右云毀形易服作世外之士直須不惜身命飢寒困苦置之度外顓究大事圖報佛恩所以古德示眾云夫既出家如囚脫獄於佛法中萬死一生更莫棄捨蓋慮後學遇境界艱難一時打不過故爾苦口叮嚀殊不知清苦僧家本分不獨今時如此自古皆然昔日大愚芝和尚常住澹薄想與報恩差不多而芝老和尚窮酸直是窮酸到底幾株宿菜也不令人好喫嘗上堂云大家相聚喫莖虀喚作一莖虀入地獄如箭射報恩者裏雖云澹薄然山僧素願有食有法令眾安止近因饑饉安眾無方直是食不下咽坐臥不寧幸有化主發心在外漸領信心檀越入山且不要學他古人見識度量與麼小口門與麼窄大家相聚在此澹薄時澹薄喫齋時喫齋喚作喫齋我等與施主皆共成佛道問如何是函葢乾坤句師云滿院梅花香噴鼻進云如何是截斷眾流句師云近日厨房幾斷烟進云如何是隨波逐浪句師云禮拜著復舉雪竇禪師云客從遠方來贈我徑寸璧中有四箇字字字無人識報恩亦有一偈化主崑山歸獻我數塊石通身渾是口有眼誰不識下座行化過清谿明道蔡封翁就開封寺請上堂師云本是真實人共譚真實話欲明真實事須辦真實心會中辦心真實的出來互相酬唱問臨濟問黃檗佛法大意黃檗便打某甲問和尚佛法大意和尚如何師云化長生米師迺云佛祖出世為一大事因緣人人悟自妙心得自寶藏虗空不足以喻其久宇宙不足以喻其寬岱嶽未可以為高滄海未可以為深取之不竭用之無窮明道老居士深受靈山付囑欲為有情揭開迷封悟自妙心得自寶藏特重建此開封古剎玉琳道人到來特為舉揚驀召眾云我不輕於大眾大眾皆當作佛下座蔡居士作禮云弟子每對神佛前發願護持蔡鐸正念禁止蔡鐸邪思惟願臨欲命終時淨除一切諸障礙等是否師云即此誓願真實皆成佛道士再禮謝誕日上堂眾僧問話畢師乃云白雲千頃老屋數間一榻高眠令土木瓦石為大眾轉大法輪者是先師和尚向日家風唐存翁合諸檀越建大禪堂十方聚會應時及節請山僧說法者是新報恩今日行履且道先和尚向日家風是新報恩今日行履是豎柱杖云若也會得釋迦不在前彌勒不在後大眾與諸佛同證一相三昧山僧與大眾壽量無殊若也不會父少而子老舉世所不信擲柱杖下座出坡上堂問歲將終期已半當人脚下事請師相為師云三十棒一棒也較不得師乃云報恩寺裏禪盡在衲僧邊搬柴及運土終日擔橫肩下座上堂師云馬祖道一口吸盡西江水慈悲之故而有落草之譚世尊道十方虗空生汝心中猶如片雲點太清裏與麼會得正好捉來朝打三千暮打八百有般漢迷頭認影棄本逐末以守箇昭昭靈靈為悟主人公把舉足動步搖唇鼓舌的為常住心體認六塵緣影為自心相譬如病眼見空中華及第二月百千澄清大海棄之惟認一浮漚迷中倍人佛所深愍世尊又示阿難云如汝今者承聽我法此則因聲而有分別縱離一切見聞覺知內守幽閒猶為法塵分別影事今時外道好笑殺人既以曉得走路問話的為悟自心更以識神空主人公也不可得為末後無疑誰知數千年前盡被世尊痛呵明叱有如斯舉凡學者可弗見不善如探湯猛看破浮幻身心向一念未生前當下證得廣大心體連證之一字亦不可得便識得一切佛祖廣大心體方可出生出死方可入死入生事是恁麼事人須恁麼人苟不如斯生死到來便驗真偽復舉古德云毫釐有差天地懸隔師驀豎如意召大眾云還會麼良久擲如意云萬古碧潭空界月再三撈摝始應知示眾示眾舉法眼禪師指凳子云識得凳子周匝有餘雲門偃云識得凳子天地懸殊天衣懷云識得凳子榆楠木做大慧杲云識得凳子好鬀頭洗脚師云諸大老與麼各出好手放過則盡可居寶華王座仔細檢點將來合各與三十矮凳脚因課誦示眾師云邇來魔彊法弱亦以上無嚴師故容邪謬之徒插足宗門多是學宗旨論宗旨虗擬宗旨一味妄穿妄鑿妄卜妄度從上綱宗面目儼然何嘗夢見所以言言會旨步步迷宗即如一等無慚愧漢妄稱自己亦是臨濟兒孫開口便道垂慈必有法無法不垂慈臨濟宗有元有要有權有實有照有用有主有賓而竟把叢林正務及兩堂課誦皆曰此只是應點故事可將就些必當少念佛方像祖師門下客吁嗟乎我不知此等人面皮厚多少若道是泛常故事有礙祖道則直當不念何得云少念及將就些若如此隨順俗套將就故事豈是大丈夫作人天眼目與佛祖為師者之所為耶我今誠實指示此輩暗短流俗阿師且莫誇是祖師門下客莫虗稱會宗旨莫別求所以為人既欲明宗旨且莫當面蹉過莫拈一放一好教你知報恩者裏即兩堂課誦便有玄有要有權有實有照有用某上座有時一聲佛如金剛王寶劍有時一聲佛如踞地獅子有時一聲佛如探竿影草有時一聲佛不作一聲佛用亦有殺亦有活亦有縱亦有奪亦有主亦有賓亦如清涼池亦如大火聚背之則受諸苦惱觸之則燒却面門饒人左之右之時進時退或邪或正或是或非或行解相應不相應或見地透脫不透脫不消別施勘驗只者兩堂課誦都料簡詳悉也凡在報恩者切莫以課誦出坡等為虗應故事須知無不是佛祖之祕密法無不是佛祖之總持門無不是佛祖之不傳心要無不是佛祖之自利利人捷徑若道別有宗旨別有佛法別有好知解更欲假借趙州念佛潄口之說以圖避懶妄擬議人則先謗他趙州為不要人念佛又以報恩念佛作念佛會則真可憐生你若果是箇人能各出手眼別樣設施為人去某上座自識得你不要你類我若你等道必要恁麼我又不恁麼也祇如我恁麼事無不具玄要權實照用主賓縱奪你作麼生會敢妄擬議耶凡為魔所攝毒氣深入者一任你別去學佛法學宗旨多生分別異樣揀擇他日眼開自知負墮如我同志真實學道者切須立定脚跟努力行持莫為魔惑其或獅子蟲定不輕縱以亂清規羯磨夜示眾師云毀犯者墮諸苦趣執持者報在人天且道既不毀犯又不執持的當生何處良久云自是不歸歸便得故園風月有誰爭便歸方丈示眾舉僧問慈明閙中取靜時如何明曰頭枕布袋師云山僧若在座下管教先南源不只恁麼休去何不進云和尚莫世諦流布且道先南源又且如何示眾師云汝等諸人須信本來是佛各須識取本來面目蹋著本地風光若識得本來面目黃金世界白玉為身栴檀叢林栴檀圍繞不然草木叢林時時凋喪眾禮拜示眾舉佛眼禪師上堂云世人盡道路行難本分真金入火看煉去煉來金體淨一槌打作玉欄杆師云古德恁麼道應有聞之踊躍者應有聞之竦惕者示眾舉淨覺本禪師僧問同聲相應時如何淨云鵓鳩樹上啼師云可惜者僧浪問不知落處見淨老云鵓鳩樹上啼何不遙空掌云打落枝頭時如何儻淨老再云作家禪客天然有在何不進云某甲點茶來請和尚儻淨老再云果然作家便禮拜而出豈不話不虗行雖然鵓鳩樹上啼汝諸大眾作麼生會死關千丈巖回示眾云者一百二十日老僧日日在兩序諸公肚裏走三轉諸公知麼眾進語畢師又云者一百二十日老僧日日在各堂寮苦行諸禪肚裏走三轉諸禪知麼眾進語畢師又云者一百二十日老僧日日在內外大眾肚裏走三轉大眾知麼眾久立師左右顧視下座小參晚參師拈柱杖云我此山中一物也無石頭大的大小的小內外諸人每日出坡三兩度驀有箇漢出來道和尚前言不應後語但向他道非汝境界顧左右云若也會得許你不齩一粒米大碗喫飯不挂一縷絲終日著衣若也不會不是逐色隨聲即落解脫深坑大眾到者裏切須仔細良久卓柱杖云參晚參師拈柱杖云當初龐居士到百尺竿頭將謂見過於人開口便道不與萬法為侶者是什麼人幸而其時諸方有人若遇如今狐狼野干之屬盲引眾盲見有百尺竿頭坐的便道你已死了須透祖師機緣方是死中得活便教人胡穿亂鑿今日透者一則明日透那一則若恁麼豈不見笑一時遺臭萬世討甚葢天蓋地好龐老耶然而也是當人肯入作家爐鞴肯求大手眼人鍛鍊始得你看龐居士見石頭問不與萬法為侶者是什麼人頭驀掩其口於此有箇會處慚惶不少未到大休大歇田地到江西馬大師處仍舊問云不與萬法為侶者是什麼人馬大師蹋向前一步云待汝一口吸盡西江水方與汝道龐居士到者裏方纔命根子卒地折𪹼地斷放開窮肚皮海納百川七縱八橫千通萬達高步大方發一言令人不敢正耳聽著立一行令人不敢正眼視著師召眾云馬大師進那一步諸人還見到也未若也見到方可與山僧柱杖子相見若未見到豈可衲子不如他俗人有麼有麼驀豎柱杖云吸盡西江且止只如山僧柱杖子作麼生吞良久卓杖云劍為不平離寶匣藥因救病出金缾擲杖出堂十五夜小參舉僧問趙州如何是祖師西來意州云庭前柏樹子師云報恩則不然有人問如何是祖師西來意但向道今夜一輪滿清光何處無小參師云山僧不指路頭一任諸人瞎闖諸人若也瞎闖得勇猛不顧危亡得失盡力闖將去驀然撞著峭壁巉巖磕破腦殻則一回知痛癢也未可知問諸人瞎闖則不問磕破腦殻時如何師云又慚惶又好笑問磕破腦殻則不問為甚又慚惶又好笑師云非汝境界小參舉眉州黃龍禪師僧問如何是密室龍曰斫不開曰如何是密室中人龍曰非男女相師云古人恁麼道山僧則不然如何是密室七通八達如何是密室中人長的長矮的矮且道與古人是同是別喝一喝卓柱杖一下仲春晚參師云古者道靈雲見處不在桃華上且道他見處作麼生眾無語師云正所謂如將名品菓子殻也去了核也去了送人口邊人不解喫舉峰西堂秉拂師云昔日趙州云我在南方火爐邊有箇無賓主話至今無人舉著噁直饒道閉門打睡接上上機也未若如斯提持今時人聞舉著向上一路末後牢關未嘗不商量浩浩地如說藥人真藥現前都不能識淵明云平疇交遠風良苗亦懷新東坡云非古之耦耕植杖者不能道非吾世農不知此語之妙吾於趙州亦云少間煩峰西堂對眾拈出晚參問答不錄師云早間森首座領眾請法山僧道鐘動喫齋召眾云大包方外細徹毫端帆正晴湘衡開九面出家兒造次顛沛不離衣鉢之側端能與露柱同披一領袈裟與山僧同一鉢盂烹饗也未此間一草一木同證圓明胡為有人自疑自別損法財滅功德莫不繇茲心意識誠哉是言也台山南岱宗北殊天異域之賓咸與山僧晨香暮燈共分寥寂胡為有人咫尺關山只為分明極翻令所得遲不大可哀乎昔日少林面壁二祖趨風寒庭立雪沒膝齊腰何等心骨鼻祖尚訶為輕心慢心徒勞無益斷臂安心出羣得髓瞻彼前修豈同裨販打一拂云精金百鍊自光瑩藥汞從教誇耀冶晚參問某甲閱楞嚴至七處徵心有箇會處師云咄此非汝心作麼生會進云某甲無心師云齩人矢橛不是好狗問光陰如箭日月如梭如何了生脫死師云莫厚顏師乃云莫謂無心云是道無心猶隔一重關又有道說甚一重直是千重萬重既然如是畢竟如何明心見性良久云山僧昨在報恩示眾云古之天地日月猶今之天地日月天地日月無古今之異禪道佛法亦不應有古今之分為甚麼古之知識千百世之下𪷤𪷤常在人目前後之知識當世現在每淹淹如九泉下人古之學者一面瞥地耀古輝今今之學者今日有些會處明日有些會處及乎生死到來依舊手忙脚亂蓋道無同異同異在人今之發心未嘗不如古人參究未嘗不如古人刻苦未嘗不如古人用心到無用心處亦未嘗不如古人但古人到無用心處決不望崖而退百尺竿頭更能進步所以道懸崖撒手自肯承當絕後再甦欺君不得今人到千峰絕頂不惟不進步反退轉身來云吾已死而得活了以了不可得為究竟以擎拳豎指為透祖師關盡是懸崖縮脚種種自欺去他古人遠之遠矣卓柱杖云有志之士自知好惡晚參師云明道者多行道者少大小祖師話作兩橛明而不能行明的事向那裏去也諸人十二時中行的事作麼生良久云遶菴一水聲常住擁榻千峰勢欲翔早參師云古者道莫被天下老和尚舌頭瞞山僧道莫被天下善知識行履瞞祖師門下客須確實為生死口不嚼一粒米身不挂一縷絲方可隨意穿衣喫飯眼中不見一畫一豎耳中不聞一語一言方可隨時寫字看書否則大事未明如喪考妣大事已明如喪考妣如或生死心不切慎勿出家縱出家慎勿來宗門何以故目下雖未為生死儻不輕易出家不輕易來宗門尚知有出家事在尚知有宗門事在有等造次出家來此宗門隨羣逐隊發意做工夫如撞釆的一般做幾時撞不著便一日悠忽一日一時怠惰一時自己既然將謂他人亦是如此謗大般若苦報無量有志之士務須確實晚參師云同居在此不論久參初學須各各退步到真實不欺之地晚參師云龍淵今冬與大眾約法三章第一飲水不得打濕口第二喫飯不得齩著米第三經行不得撞著露柱元旦知浴領檀越請小參師云大眾知麼汝等成佛以來已經無量阿僧祇劫舉足下足其地堅固金剛所成上妙寶輪以為嚴飭寶池瓊閣奇樹珍禽樂具充溢無有苦緣壽命無量光明無量法親無量如或未知則不矜久修不薄初學一念回光即同諸聖若也根思遲鈍便請一念不生去如或多知解多愚癡便請淨念相繼去但辦肯心決不相賺雖然如是且道善財入樓閣門為甚入已還閉所以道如來不出世祖師不西來汝等成佛已經無量阿僧祇劫晚參師云昨夜行者通大眾晚參山僧傳語云大好月你諸人作麼生會僧云砍却月中桂清光應更多師云矢上加尖眾久立師云山僧自領三十棒知浴古淵領海寧眾居士請解制紹興范居士求釋𠎝同請小參問答畢師揮拂云人人殊勝箇箇淨明似鳥行空而昧空如魚在水而忘水無瑕翳中自生瑕翳無障緣處自生障緣結空花於無明樹頭有何實果撈水月於昏沈海上徒見勞心既能物外逍遙必須真源頓達苟知空門皈向定應覺性洞明覺性明真源達方知罪垢本空而無罪不懺法道本超而無法不成大眾我不輕於汝等汝等皆當作佛下座小參師云昨日大眾晚參山僧道洗清昔日擔泉處斫出當年面壁巖汝諸大眾各各領悟也否聞斯提舉若能正眼洞開則忙閒動靜一語一默著著有出身之路用得十二時不為十二時用轉得一切物不為一切物轉攪長河為酥酪變大地作黃金供養大眾不為分外如或不然二時粥飯齩須彌山子唇齒之間太費支持七尺形骸挂冰稜鐵甲俯仰之際大有不便卓柱杖結夏檀越請小參師云圓陀陀光爍爍淨躶躶赤灑灑三頭六臂千手千眼而本無一物純真一如無臭無聲而萬象縱橫閉門打座徧界不藏閙市橫身孤巍嚴密諸作紛紜而非動一物不為而非寂違之者自暴求之者愈失千賢萬聖趨向無門千佛萬祖退身有分師以拂子打一下云誰參勝熱婆羅門六月霜花凝枕席下座晚參師云去聖時遙言高志下欲明格外旨須盡域中情顧左右云大眾看脚下晚參師云劫火洞然大千俱壞未審者箇壞不壞壞恁麼則隨他去也隨他去大隨恁麼答話有甚長處投子望山禮拜眾無語師云古之學者為己以竹篦拍香案便歸寢室晚參師云祖師時時在水桶上出現剛見人挑水走入水桶裏去也祖師時時在火𦦨上出現剛見人燒火走入火𦦨裏去也祖師時時在木魚上出現剛見人打木魚走入木魚裏去也祖師時時在鐘鼓上出現剛見人打鐘鼓走入鐘鼓裏去也良久云有人出來道和尚何得壓良為賤山僧只要你恁麼道小參師云理無事外之理事無理外之事理外之事則愚事外之理則狂狂則為魔所攝愚則為佛所悲寧為佛悲莫為魔攝大眾來此祖庭必須立深誓願正知正見正路修行庶幾同證圓滿菩提晚參師云昔年大慧禪師因一禪子參公案不透乞求方便慧云你是福建人我為汝說箇譬喻如將名品茘枝皮也去了核也去了送在汝口邊只是汝不解喫師召眾云當初大慧為此一人設箇譬喻此人當下齩破舌頭山僧因眾參上樹公案重重相為云緊夾籓籬寬闢道如何眾中未見有脚頭點地的乃云但辦肯心必不相賺更與汝等一箇安心丸子三文大光錢買得箇油餈喫向肚裏了當下便不飢晚參師顧左右云今日晚參不許問話不問話者三十棒眾擬議師云自從立雪人歸後幾片白雲護翠岑結制古淵知浴領海寧眾檀越請小參問爐韛大開不留鈍鐵金鎚揮擲萬竅通明還許學人立地成佛也無師云進前來喫棒進云與麼則滾入紅爐大冶中直得通身無縫罅師云許汝膽大問得祖宗之髓登祖宗之堂敢問和尚昔日僧問臨濟如何是奪人不奪境濟云煦日發生鋪地錦嬰兒垂髮白如絲為甚本山中祖道錯師云一對無孔鐵鎚進云與麼則二大老料揀一齊蒙和尚指示去也師云與汝六十棒問如何是法王正令師云千鈞之弩進云與麼則人人沾恩箇箇得力師云已放過居士問不侶萬法不取凡聖事如何師云佛子受佛戒即入諸佛位師乃云天目山下無寸土天目山頭無片雲脚跟跐著寸土有寒暑兮促君壽有鬼神兮妒君福眼中見有片雲風力所轉終成敗壞且道住此天目山如何行履即得虗空拍手呵呵笑報汝人人淨法身聞斯告報直下承當如來禪許汝會更須知有祖師禪始得且道如何是祖師禪驀喝一喝隨聲以竹篦撫案一下晚參師云祖師示現全身向汝諸人毛孔中念普字真言汝等盡見盡聞麼一僧喝師云胡喝亂喝乃云分明指出平川路却奈忠言逆耳何除夕晚參師拈柱杖召眾云識得柱杖子麼一日不為少千載不成多小則蟭螟眼裏橫眠大則乾坤西傾東闕出息不隨眾緣入息不居陰界試看先宗是何標格你有柱杖子與你柱杖子你無柱杖子奪你柱杖子晚參師召大眾云莫瞌睡石庭晚參師以杖指一碎石云者石版如何沒一些縫良久又指一完石云者石版若為有許多縫一僧云謝師指示師便打乃云今時學者有兩種錯路一種錯路的問著便道喚什麼作燈籠一種錯路的問著便道露柱沒一點縫是者兩般錯路便掩蔽却人人本地風光若不蹋著本地風光終不能免此兩種錯路今日不惜眉毛說似諸人豎柱杖云山僧柱杖子有九千九百九十九隻眼顧眎左右云更有一隻不與你們說盡何故若教容易得便作等閒看晚參師云吾觀大眾盡與佛祖無二無別但存人我自生間隔所以祖師示眾誦金剛般若經上根者一聞千悟後來祖師教人參死了燒了話父母未生前話便是將一卷般若經括作一句教人持念汝諸大眾須在佛祖路上行方到佛祖田地若四相未空徒勞無益各宜珍重晚參師云山僧說得一篇佛法懸在雨華橋上大眾各去看取良久云伯樂曾三顧千金誰解增贈君君不納完璧倚枯藤晚參舉傅大士道空手把鋤頭步行騎水牛人從橋上過橋流水不流師云天目則不然生鐵打鋤頭披簑牧水牛人從橋上過水流橋不流且道傅大士的是山僧的是良久云朝參暮請緣何事應須立透祖師關早參舉六祖云本來無一物長慶云萬象之中獨露身師云孫必類祖大眾會麼拈柱杖旋風打散晚參師云汝諸大眾多有廣遊人間世徧禮諸名山的多有參徧諸方久親知識的多有諸方許可記莂的我不問汝別樣佛法只有一句極平常的話問你且道者一時香在什麼所在坐良久云衲僧在處如火消冰終不却成冰若道有香可坐有坐的人有坐的所在莫道你廣遊博禮參方受記直饒你向世尊肚中轉一過來也只是箇能仁的矢橛各各自揣摩道箇驚人句看顧視左右震威一喝小參舉世尊九十日在忉利天為母說法及辭天界下時四眾八部俱住空界迎有蓮華色比丘尼作念云我是尼身必居大僧後見佛不如用神力變作轉輪聖王千子圍繞最初見佛果滿其願世尊纔見乃訶云蓮華色比丘尼汝何得越大僧見我汝雖見我色身且不見我法身須菩提巖中宴坐却見我法身師云大小世尊抑強為劣山僧若見蓮華色比丘尼但云汝真能現大人相殷勤見我若須菩提巖中宴坐乃是閉門作活豈能見我全身驀拈柱杖云還有為世尊作主的麼有則出來各出人一頭地卓柱杖云好手豈容無妙拍三臺須是大家推小參舉趙州問南泉知有的人向甚處去泉云山前檀越家作一頭水牯牛去師云長帬新婦拖泥走州云謝師答話師云帆隨湘轉望衡九面泉云昨夜三更月到牕師云向上一路千聖不傳晚參舉僧問趙州如何是佛州云殿裏的師云古佛恁麼道可謂眼空四海晚參師云解制來走動的走動各執少人久住者未免辛苦汝諸大眾如何得不為境轉一僧云心如木石師笑云說到行到吾為汝保任此事終不虗也早參師云有一人日勤眾務一物不為有一人一物不為日勤眾務且道那箇作家一僧出師打退又一僧作禮師亦喝出師迺云有叟情相似日香夜夜燈晚參師云如淨瑠璃內外明徹凡見道者若身心世界果如淨瑠璃內外明徹方是真見本來面目的人不然徒自欺耳生死到來悔將何及不見道吾心似燈籠點火內外紅雖非依樣畫描却是一鼻出氣晚參師云秋來好坐禪賢衲莫亂走各得坐具地他年大開口且得地一句作麼生道父母所生口終不為人說燈節知浴同王檀越請小參師云如淨瑠璃內外明徹光逾日月量裹太虗探之不見其初避之莫究其極山河大地即之靡不消鎔明暗色空捨之無以建立神鬼不能覰賢聖不能知潔之不新垢之不故蝡動不減佛祖不增謂之為微普天帀地謂之為顯朕蹟不留指為智珠闇然日著目為福嶽坦然日尊召大眾云我見燈明佛本光瑞如此戒私看文書晚參師云上三畫長下二畫短天左旋地右轉日月照臨乎其上龍象奔走乎其下高出無頂天深逾香水海無論智愚賢不肖識得者箇字宣聖孟夫子拱手讚歎釋迦不在前彌勒不在後奔軼絕塵今之古之誰敢與偶好大哥直截根源尚迂曲尋枝摘葉復何如小參問話畢師云一片清涼地安閒絕比倫往來及住眾舉步莫迷津眾久立師震威一喝下座小參師云有一無事人終日忙鹿鹿有一精進漢長年訥且木如是二人中有一人堪與人為師汝諸大眾出入好看良久云寂光真境何嘗遠同在瑠璃國土行下座法語示全菴進上座進上座事我十年不動竿頭每為齩破拇指夏初入大雄室聞舉一歸何處話直下透脫須念自利易利人難深心大心終身誓居學地所謂證無量聖身猶未是泊頭處也示嵿侍司禪和家善用心難善用心的得正悟難得正悟的打脫見地難打脫見地的不走作難翻此四難為四易則自利利他一切了辦古人道數十年尚有走作或云我數十年方打成一片成片者無論矣未成片者但把曹谿云什麼物恁麼來隨時覺察管教衲僧行處如火消冰示岳書狀余生平無甚長處祇不記古今隻言片字生平亦有自負處不學他諸方佛法世法噫安得不記人言句者聆我斯言乎書付行岳以示千百年知音者示𡿄侍司在堂中不要學佛學法辯古明今當毒眼孤𥋇無佛無祖無人無己放出葢天葢地志氣來東拂于逮橫身西瞿耶尼展脚南贍部洲啜飯北鬱單越撒溺語默超越常情動止迥殊舊習天神捧華無路人鬼覰捕無門果能如是不變不雜等閒舉起鈍刀子也能殺也能活也能照人肝膽也能稱人伎倆把從上千七百老古錐遺下一言半句或是作家相見或是出格提持或嚴密或危險或泥中有刺或沙裏無油或人目為誵訛或人目為奇特千岐萬別駭狀奇音逢著箇鈍刀子自然如庖丁之解牛由基之繞樹豈他穿窬擔板亂統支離者可同年而語哉然猶未也并知山僧與麼庭訓亦是憐兒不覺醜方是有氣性衲子祖師云行解相應名之曰祖又曰明道者多行道者少如斯料簡豈是等閒今時有等無忌憚者擬為佛祖苗裔得些見地全不修省難免道力不勝業力又安望其透末後句向上關哉戒之勉之示峰首座長沙岑禪師因秀才看千佛名經問曰百千諸佛但見其名未審居何國土還化物也無岑曰黃鶴樓崔顥題後秀才還曾題也未曰未曾曰得閒題取一篇好如斯答話非大有福慧人不能自勵四誓一誓不與本分間隔作一佛事乃至一稱一禮一誓不與本分間隔為一人乃至交一言一誓不與本分間隔閱一書作一字一誓不與本分間隔一坐立一譚笑客問客問學道如何不蹉路曰善哉斯問世之不參涅槃堂裏禪者難乎其不蹉路矣雖然當今傳法者徧界方行等慈不擇淨穢開闡無遮度諸疑謗先進者以廣接為心後進者以易入為事知名盛而實衰辯名似而實非者難道全無敢謂罕有吾言之安足為人重而可與子深言之也哉客固請曰如子之不以人廢言吾姑與子漫言之學道欲無首越之燕之歎第一須發心諦當或志小見近圖作世間善人只消讀治世聖賢之書行治世聖賢之事或遵行如來權教法門助其修省亦有益無損若欲究竟出世無上妙道當顓為生死始得顓為生死則博聞強記如慶喜一問十答如香嚴百鳥銜華如牛頭千指遶座如夾山尚須捨己從人況降斯而下者乎不為生死必尚知見此道不屬知見不為生死必務功能此道不屬功能不為生死必慕豪放此道不屬豪放一尚知見務功能慕豪放則非愚即狂成魔落外善因而招惡果多自不顓為生死學道者而成豈不一蹉永蹉哉第二須工夫諦當既為生死發心學道可不返躬自省果能具大根器一聞千悟也未若也未能須參一句話頭一日不透一日參一月不透一月參一年不透一年參一生不透一生參今生不透來生參永無退失永無改變方謂之諦當工夫參定一句話頭便是斬知見稠林之利刃渡生死苦海之慈航解雜毒入心之聖藥指萬古迷津之導師不集善而自集不斷惡而自斷不持戒而自戒不習定而自定不修慧而自慧不課佛而自課不誦經而即誦不求生勝處而自生勝處不求多善友而自多善友本不求譽亦莫可毀如是顓一如是精進如是久遠縱未發明亦現在可為後學規模將來必得佛祖心髓儻名色為生死學道而起傍疑求別助生異見多外騖憚艱辛喜快便管教百妄交集其蹉可勝言哉第三須悟處諦當既顓為生死純一參究必待工窮力極時至理彰命根斷本來面目現不疑生死不疑古今不墮坑落塹不彊作主宰不認識神不陷空豁不涉矯亂不入邪師圈繢不犯明眼料簡儻魚目為珠瞌睡當死以鹵莽承當為有力量以硬差排為不疑以粗放狂亂為大機大用以顢頇為透脫無餘竿頭宜進而不進言句應參而不參不煩穿鑿而穿鑿不可抹殺而抹殺入門一蹉異解雜陳所謂可痛哭流涕長太息者非此類乎第四須師承諦當非但無真傳杜撰阿師不可承虗接響即沿流不斷者亦須察其行實不擔條斷貫索謬自主張蹉過師家相為處否不孤負師家腦後深錐否洞明從上綱宗否不施為偏重瞎人眼目否若無真正作家宗師為之打瞎頂門眼奪却肘後符則雖有實悟自了則可為人則禍生儻若己見既偏投人又謬自方空豁復向瞎棒瞎喝下似木合水如空合空謬執金剛寶劍斬盡一切為實不知我王庫內無如是刀盲引眾盲江河日下或自入處廉纖沾著邪知惡解家滋味邪毒入心如油入麵更或不知錯認漫云自肯不受人究竟謂之不被他轉却又或云我見處是的只要行履了此等何足挂之齒頰第五須末後諦當末後一句始到牢關靈龜負圖自取喪身之兆不透末後牢關而言得大機大用不透末後牢關而言具本分草料其不為粗惡狂徒者鮮矣不透此關有正悟者猶可為一時唱導之師如無正悟不知有此關者其於古人參悟與悟後重疑不移前作後指悟為迷者鮮矣謗先聖悞後人皆由不知向上一關可不畏懼乎自利不全利人不足皆由不透向上一關可不惕厲乎第六須修道諦當雖發心諦當工夫諦當悟處諦當師承諦當末後透脫諦當更須自己覺察是頓悟頓修根器否是果地善知識否打成一片速於香林否不走作過涌泉否現業流識淨盡否事事無礙否行解相應名之為祖試看先宗是何標格第七須為人諦當不可有實法與人不可騙人云有方便助汝易入不可教人不參死話頭決要人真參決要人實悟決要人悟後達向上關棙決以見性謂之悟不可輕意牢籠人於人認識之謬哄云有省於人向念未生時認妄為真印云有入圖一時門庭熱閙不顧展轉誤賺邪法縱橫病發於此寧絕嗣不亂傳方謂之為人諦當前六種不諦當則自錯後一種不諦當則錯人良藥苦口忠言逆耳憐子請之誠而示之甚弗輕以語人機緣僧問如何是函葢乾坤句師鼓腹云我容得你者些人萬萬千進云如何是截斷眾流句師云趕得你無脚跑進云如何是隨波逐浪句師云容你在者裏立片時師問僧玄沙是汝虎話你如何會僧舒五指云牙爪齊露師便打復示偈云生平不出嶺一語古今傳明眼人難會君須向上看師問僧向父母未生前道將一句來進云八角磨盤空裏走師指香盒云者是什麼僧擬議師便打僧無語師云真誠莫作小兒嬉問行堂云飯桶裏多少達磨眼睛堂罔措問火頭三世諸佛向火𦦨裏說法還端的也未頭亦罔措師指傍立一僧云惟有者箇師僧解答話便歸方丈園頭問和尚病好了麼師云我從來不病有何好不好進云某甲不能親近得和尚師云我日日在你園中退菴呈世尊拈花頌云倚天長劍露鋒鋩拈出何人敢近傍潦倒飲光輕觸著面門血濺太郎當師云只見錐頭利不見鑿頭方進云却被和尚看破師面壁云誰人知此意令我憶龐公僧問如何是有柱杖子與柱杖子師云長安風月貫今昔那箇兒童摸壁行進云如何是無柱杖子奪却柱杖子師云多少人飯籮邊餓死師還江上度親張靜涵老居士過訪十方菴話次伸問塵勞中如何得本師云居士者一問從那裏來士無語師云昔雲棲大師雖不主持宗門指示人參究却甚諦當嘗盛稱人著述之妙末後提撕之云須看者段光明從何處流出於此著眼便是得本之捷徑士云如何用力師云者箇代居士不得師一日入庫房指團子問庫頭吸盡西江即不問你試吞却者兩籮團子看進云吞却了也師云大眾喫箇什麼頭答不契師自代云樂則同歡僧問不與萬法為侶的是誰師云桌子板凳韞荊璧入精進三次日上方丈云某有箇見處師云狗子為甚無佛性韞拳師肋下云一向在趙州處落節今日在和尚處本師便推出次日復入師云盡大地火發得何三昧不被燒却進云特來度夏師便喝璧呈頌云圓似滿月圓寬同太虗寬歷劫無姓氏從來絕躋攀聖凡由此出剎海在伊安始終無變異觸處善隨緣師云還會適來一喝麼璧便出師從龍淵歸問侍司云你十二時中還見念頭起處麼進云念頭了不可得更覓什麼起處師云我適來見一塊石有九十九條縫師與一秀才話次謂云你合會得天地同根萬物一體進云某甲何嘗不會師云為甚殺生食肉修殿公務作禮師云釋迦老子向灰瓦上轉大法輪什麼人得聞眾無語師云好生看取壁侍司作禮云請和尚答一轉語師云問將來進云聞的事作麼生師云逼塞虗空無縫殿東西南北月輪紅江上歸師問眾云大地無寸土是什麼人境界一僧進云和尚家風師云如何大地無寸土是山僧家風僧不能答師代云常州湖州杭州僧問大地山河即不問一毛頭上事如何師云吞取七箇八箇進云不會師云吐却兩箇三箇僧問如何是萬法歸一師云天圓地方進云一歸何處師云地方天圓僧問百千法門無量妙義如何是第一義師云橫七豎八問如何是本來面目師舉扇示云不得喚作扇僧禮拜師云伶俐衲僧問前不得後不得時如何是出身處師云前去佛殿後去東司為甚不得問僧父母未生前道來僧以手外拱云徧界不曾藏師云徧界不曾藏因甚偏向那邊僧無語師云何不道某甲指東畫西僧參師云承你遠來無可供養將五間禪堂與你一口吞却進云大地無寸土吞箇什麼師云多少人恁麼道苕帚柄也要打三十僧問一塵透脫千界光輝為甚十聖三賢不明斯旨師云你莫管他十聖三賢且道虗空作麼生證進云覓虗空了不可得師云恰是進云和尚是大善知識師云正要你檢點僧擬議師云直透萬重關莫住青霄裏師問圓證堂寮主云香爐幾時成佛進云成佛久矣師云昨夜被虗空壓碎你還知麼僧擬議師云脫空妄語漢師雲覆菴歸侍司中路接師云你來得遲將前面遠山與你作點心侍擬議師以柱杖驀面劃一劃云再加一分䞋錢進云也不得將別人家物作人情師云不但䞋錢點心也消受不起頌古舉趙州問南泉知有的人向甚處去泉云山前檀越家作一頭水牯牛去州作禮云謝師指示泉云昨夜三更月到牕雪中春色梅梢見黃鳥聲聞意氣新意氣新誰知黃鳥笑聲頻說與風流明敏者眼從今日碧華自去年馨舉歸宗常禪師素與南泉同行忽一日相別煎茶次南泉問曰從來與師兄商量語句彼此已知或後有人問畢竟事作麼生宗曰者一片地大好築菴泉曰築菴且置畢竟事作麼生宗打翻茶銚便起泉曰師兄喫茶了普願未喫宗曰作者箇說話滴水也難消賓則始終賓主則始終主金鎚各逞藏鋒技父子不傳兄弟同氣和烟搭在玉欄干上苑垂楊鳥深處舉陸亘大夫向南泉云肇法師也甚奇怪解道天地與我同根萬物與我一體泉指牡丹華云大夫時人見此一株華如夢相似一枝華發十分春覩徹根源把玩新堪羨大夫打失鼻共來笑傲古今人舉僧問疏山禪師如何是法身山云枯樁如何是法身向上事山云非枯樁一拳拳倒黃鶴樓一踢踢翻鸚鵡洲有意氣時添意氣不風流處也風流舉慈明祖師僧問閙中取靜時如何云頭枕布袋悟入汾陽鞋穿足裂塞却口門出廣長舌如鐘在𥲤小大徐疾有扣斯應渾身金石三玄彈指四看語默易知難會易見難識蓮棹洛伽雲開兜率詩贈履坦禪人兼報天一居士鼎立三峰勢插天嶺門雖闢白雲連飛鴻傳得人間信石壁難依過別川入磬山隱居風範依然在說法堂前任草生莫謂門庭能閴寂從來此道少人行示退菴重子住敔山澄江有山孰多僻敔山兩灣蒼翠積澄江有水孰多情敔山前後敔水平當年一身澹如水夜隨明月過深林化山擬作推蓬室扁舟乘興堪深入汝今為我先去住菴傍閒地多栽芋忘世情懷爾我同茅鐮鐵钁振先風得人不在門如市猶憶當年面壁翁贈禪人見道誰修道忘山好住山雪深巖屋老百衲一身閒又重巖之下茅屋耽耽有幽人兮雪立冰餐又好山如畫畫如山紅葉村村杖笠閒看到桃華成一笑再來雲外訪柴關守塔懷古多年黃葉類形骸此日徘徊誰偶諧麻衣草履食接氣象骨崖前呼再來咏懷千峰絕頂尖頭屋草薦柴牀火一爐三十年中無一事諸方何處覓潛夫靜夜思枝枝葉葉月疏疏密密風誰共蹋流水倚杖石橋東題壁星高月曉松雨滿衣西岡危坐嗒然忘歸偶題月浸千山冷風鳴萬木清一聲村外犬客路有人行山居荒涼苔壁寺孤冷草堂人雨後舒長望庭泥虎迹新烹泉廣修供養事如何百沸清泉上佛陀早色爭妍排闥入鶯啼古木梵音多對鏡華山蘭若對鏡吾非昔捫懷志自新何林一枝別蔭我雪霜身冬日有懷荊山旅堂空階柏子落飢鳥入門來千尺危巖下梅花幾樹開望臺山荒闊三千路高閒一萬人當年冰畔石遲我未歸身舟居三却竹林澹蕩寒煙古木孤懸雪浪輕帆只在尋常行處杳然萬壑千嵒又一葉千谿水三盂六月霜逢人不舞棹高臥對斜陽冬歸草堂潛形餐柏實放目看梅花何處忘機客同來灌古畬濟寧道中臨溪茅屋臨簷樹雞犬依依水國村虞夏平成風化永江南江北共林園讀白樂天詩懷扣冰舟次東昌池上有小舟舟中虗胡牀我心久忘世愧未使世忘甲馬營夜泊水上舟如織人間事若蕉無為與無欲誰共我逍遙節食寄形天地間飲食唯接氣翛然等箇人明此澹泊意龍淵南塢坐月松樹三長四短石臺七高八低坐來夕陽在樹歸去月落峰西晝寢譬如木偶人鼓歇索亦住山僧動與靜請問諸露柱荊溪道中招友正是千山紅葉時摩挲石壁好題詩百年嚼蠟能多味分取松根帶露葵高祖寢堂題壁牀頭懸瀑布塔頂長苔衣一住不復入高寒到乃知示眾萬里晴空誰共三春花柳爭遊王孫醉眠芳草何似潄石枕流我有蓮舟一葉沙城芥劫全收高歌唾壺擊破童稚出沒洪流山居胸中無一事終日坐閒閒睡起摩挲腹山間與水間高步登山造極步自此始有懷君子行遠本邇促都監立還山山中有佳月宜人終夜看山中有好風解衣可盤桓泉鳴千嶂寂松靜一濤寒永日鳥相喚清秋蟲自紈解聽紫芝曲喬木在層巒活埋與斷壁千古仰金蘭時哉石梁雉雪飲且霞餐普請口占年來漸覺精神復老去偏知日月閒飽飯安眠無一事椎鳴隨眾看秋山枕流臺題石山中流水寂無聲枯木生花別有春若箇到來知解絕紅爐分取萬年冰庚戌二月磬山題壁面目分明徧界親偏於此地受恩深三更月下低徊立恍是當年侍拂巾磬山揮麈臺先錄法濟十咏之一有此名松根時獨坐花雨不從栽憶昔別峰侍無言聲似雷庚戌題壁三首本是矜矜自了僧飽餐安寢別無能酬恩報祖雄明哲斗室焚香懷古人一霜華半榻雲無求無喜亦無瞋三更對月開扉坐慚愧焚香侍立人臥倚青山飯白雲谿聲鳥語共晨昏空庭有隙栽蘭蕙緘戶無蹊入怨恩捲簾尋常入望驚殊絕何意全身住此中傳語巖棲木石侶時時放眼識雲松獨樂園雨後二首一谿銀鳳玉龍騰想見霜華此得名步到上方忘藥石勞他從者請頻頻枕流石上枕流臺到者教君悔晚來白鷺羣飛千磵雪洪鐘大扣萬山雷巡寮至大義閣癸丑燈前花滿寒庭月滿林巡寮未半欲三更到門且莫掀簾入愛此樓前布水聲邗江贈虎公至契交道江河下於公見古人素心千里月青目一山晴楚州題壁澹黃微綠拂疏風到處垂楊適我慵覓得小舠瓜子大一帆漂渺水雲中旅堂愛柳無如我摩挲玩歲年旅堂忘岑寂一樹適垂軒開窗風聲雨聲聲聲入耳花色草色色色幽妍書問復岵瞻戴廷丞在在是居士菩提場物物是居士正法眼事事是居士菩薩行步步是居士那伽定使十二時不為十二時使轉一切境不為一切境轉斯為道人若一處光不透脫一時光不透脫即本分不透脫須刻刻向父母未生前絕思惟無依倚既恒且密時至道成冷眼圓明方知在在是菩提場物物是正法眼事事是菩薩行步步是那伽定使十二時不為十二時使轉一切境不為一切境轉此言不欺人也居士心光時注天目居士慧性不昧古今居士至行大建法幢奉復不覺縷縷答王泰卿居士三問問為人容易做人難敢問為人之道師云己所不欲勿施於人問何為知生何為知死師云知所從來為知生知所從去為知死問臨去時心不顛倒意不散亂在何處捉摸師云驗在目前師復云居士真為生死須知制心一處無事不辦但勤持藥師如來萬德洪名持到持而無持徹見念未生前本來面目則率性而行頭頭是道所謂發而皆中節天下之達道也如是方能了生脫死方可出死入生何謂了生脫死如太虗空先天地而生後天地而不老何謂出死入生譬如大海日照光明生風來波浪起到此則去來自在夭壽不二又臨去時作得主有二種徹見本來面目則了知生死不相干如上所云若未見本來面目勤持藥師如來則臨命終時八大菩薩接引上生極樂世界入不退地見佛明心因切問虔請不覺縷縷雜著東語西話開了兩片皮只是粥飯罐當世有與麼人山僧禮他三拜顛仙謠憎愛胸中盡是非眼底空泥牛入海後聚散問漚風書溈山語行脚高士須向聲色裏睡眠聲色裏坐臥始得山谷云東坡文字語言歷劫贊揚有不能盡吾於溈山亦云戊子春二日荊邸書題雪竇頌古野鴨子知何許馬祖見來相共語話盡雲山水月情依然不會還飛去却把住道道頌出雪竇真能於法自在匪夷所思如清光匝地猶戽夜塘以盡所欲言而妙此却把住道道以不完題而妙盡所欲言如千雷並吼易不完題如千日並照難偶閱之直欲擊碎唾壺草堂書壁日中一食樹下一宿世尊模範如是一語不投折葦渡江少林九年終日面壁鼻祖標格何如荊山旅堂紀事丁亥十一月朔著新絮襖飽領本菴香飯飯餘展足熟睡皆行脚經年未曾有事睡起一趺晚晴快人遺景在屋庭東大樹茂綠未衰殊映日溢目忽憶十五年前侍先師烏峰竹齋瞌睡起書窗浣壁時復憶甲戌秋先師遷吳興報恩是日結冬破屋敗垣炊巾滿谷羣賢臥草眠霜冰骨老人支枯藤指點磚頭瓦礫為諸人闡最上機余時獨處江干野色無垠天光連水曾和老人寄示偈云師闢山頭宇吾撑水上門脚同蹋實地眼獨空叢林小兒無繩尺曠蕩之言不謂至今多人成誦昨便鴻南去拈句寄重監院高歌天地外穩臥雪霜中他日憶此更作何狀書巖子紙大雄道人廿年來炊冰煑雪接納諸方能三十夏不憚寒苦者敢保出他人一頭地巖子能否參禪悟難既悟已忘悟難且道忘悟的人何如巖子道看此事極平易極欺人等閒看得平易者此最受人欺者也戒之哉多見人在殻漏子裏譚葢天葢地之道徒自欺耳葢天葢地者能把殻漏子作塗毒鼓撾書楚紙近年少至性衲子蓋稍有見處不能出頭天外全體受用多以名利熏心學文字語言還知但患不成佛不怕佛不解說法麼筆此蜆子和尚卓立紙末三師說吾有三師父師母師師師父師生我眼師師開我眼母師護我眼父師身示無常此生我眼者也師師了我生死此開我眼者也母師勖我證果此護我眼者也三師皆有大因緣使我悚然省豁然開惻然痛吾何修而得此三善知識師也噫吾於荊溪磬山開此眼於江上水關忘此眼於吳興草堂保此眼不知何年得真不負三師也有客躡而問曰忘矣何用保為曰此非汝所知也保矣更俟何年不負師曰此非汝所知也待汝證果地涅槃與汝共報難報之恩可也雖然父師母師出離之緣皆賴師師師乎師乎粉骨碎身未足酬將此身心奉塵剎潛子苫次草述時乙未九月戊戌西樓聞雪潛子早失泰山之仰不獲徧任兩序列職壬辰夏報恩乏住持供先老人方丈重歸侍室首修殿公務攝客司諸禪極不安潛子有餘樂也向志夙夜守塔每為事奪適寓監院寮後軒篝燈正當寶峰塔下漏下三十刻聞雪起立不禁清絕向於磬山有生平徼幸處千古快心時之句此際是第二番境界時壬辰十一月癸巳手書所用破硯猶是二十年前記室舊物并記報恩旅堂閒書近日學者有二病一等弄聰明習外學一等守愚抱拙般若不清楚二者皆不可與言道不識一丁者必如六祖方可不撥文字者必須遠同西天龍樹馬鳴近同永明明教始得無過題壁本學古人莫視流俗閱趙州語錄自勵䟦趙州三佛話金佛不度爐木佛不度火泥佛不度水真佛內裏坐南嶽磨磚江西鹽醬不是過也又云非四十年不雜用心者不知斯言簡盡題藥師日課語予辭恩絕塵不暇披覧偶入藏閱藥師如來本願功德不覺手額失聲願人人入如來願海也或問何於此經驚歎如是告之曰予見世人順境淪溺者不一富貴可畏甚於貧賤今此如來使人所求如願遂從此永不退道直至菩提則欲於王臣長者一切人中作同事攝不乘如來願航何從濟乎大凡修持須量己量法直心直行誠能厭惡三界堅志往生則專依阿彌陀經收攝六根淨念相繼所謂執持名號一心不亂決定往生此先自利而後利人者之所為也若於現前富貴功名未能忘情男女飲食之欲未知深厭則於往生法門未易深信即信矣身修淨土而心戀娑婆果何益乎則求其不離欲鉤而成佛智處於順境不致淪胥者固無如修持藥師願海者之殊勝難思也癸巳之夏山居不寧偶奉親歸養江上晏如程君以刻成藥師日課見示此出人意表是經流傳已久編成日課未之聞也乃得之吾江之善士為之助喜信能修持久久不懈知不獨富貴功名轉女成男離危迪吉如如意珠隨願成就即得於一切成就處直至菩提永無退轉何幸如之人間亦有揚州鶴但泛如來功德船御選明道正覺䒢溪森禪師語錄附結制陞座問答畢師云放下布袋快活無匹閒看猢猻偷喫生鐵阿呵呵的的的問甚生前面目誰論梨花笑日齋堂有粥有飯禪和要喫便喫喫即不無飽後作麼生夜行莫踏白下座解制陞座問正法眼藏即不問今朝解制句如何師云穿山鼻孔破僧禮拜師大笑云雖然和盤托出却是大段不同瑯琊禪師道本來無一物厭殺天下人直饒便分明坐在糞坑裏作麼生是透脫一路妙音觀世音梵音海潮音眾兄弟朝看東南暮看西北近世雙笛從羗侊飯不及壺食下座報恩元旦秉拂僧問古德道清光照眼尚迷家明白轉身猶墮位且止請問報恩意作麼生師云數點梅花報曉春進云恁麼則月明簾外家風古寶鏡堂前瑞氣新師云且站過問靈山記莂則不問今朝分座事如何師云孤鴻嚦嚦進云龍象雲臻乞慈再示師云野鶴穿雲進云點開碧眼水到渠成畢竟恩歸何地師云不許物外安身進云恁麼則水接長天遠春光徧界新師云巡照去問物有新舊拄杖子還有新舊也無師云老鴉亂叫進云今古頓超圓智體何山松柏不青青師云截斷葛藤進云謝師答話師云今日且放過問幾點梅花送春來那裏來師云人笑你進云數聲𪹼竹催臘去那裏去師云羞也不識進云去來且止卉木咸新又作麼生師云轉見轉見進云一天佳氣萬象騰輝師云望煙尋食地一僧出呈數珠云這箇依舊一百八請師點出新鮮句師云光寒星斗少進云不會師云切忌五更初又進云不會師便打進云從今更不疑師云錯認焇皮家問舉足動步則不問新年接新令句作麼生師云貴貨易土僧禮拜師云今日行森承老人命為眾敷揚適纔一問一答祇恐錯會數點梅花報曉春一聲𪹼竹催殘臘不許物外安身誰論老鴉亂叫嗟嗟多少人望煙尋食地錯認焇皮家呵呵光寒星斗少切忌五更初咄孤鴻嚦嚦野鶴穿雲新年新令貴貨易土眾兄弟六橋近日水仙花十字街頭鐵拐李卓柱杖云珍重上堂問答畢師乃云行脚須具眼參禪要識句大眾識得句也未適纔答僧云是柱不見柱咦非柱亦不見柱既然是非都去了因甚又說是非裏薦取汝等諸人作麼生薦莫是雲日能催曉風光不惜年麼莫錯會好幸逢征客盡歸在落花前切忌顢頇儱侗去所以古德云至道無難唯嫌揀擇桃花紅李花白誰道融融只一色諸禪德瞥不瞥一夜東風吹散枝頭殘雪會麼老祖殿前梵王宮闕雙峰燈放九天風月燕子語黃鶯鳴誰道關關只一聲不透祖師關棙子空認山河作眼睛咄冷的冷熱的熱粥鍋西邊底莓苔裹石碣良久喝一喝云歇如今是什麼時節師大笑曳杖下座兩序請陞座師豎拂云一羣子上來一羣子下去殘夢五更鐘落花三月雨合掌低頭換步時進前退後翻身處有利有害人無遠慮歸到故鄉還似客布穀催耕鳴別樹叉手句可惜許一切數句非數句打一拂云去下座問學人道眼不明未審什麼礙師云幾時立春僧云昨日二十三師云怪我作麼小參眾入室師拈杖云摩訶般若波羅密明如日黑如漆異解多途商量非一卓柱杖云急若人信受奉行一生參學事畢昔日殃崛摩羅尊者持鉢至一長者家其家婦人正值產難子母未分長者曰瞿曇弟子汝為至聖當有何法能免產難尊者曰我乍入道未知此法待問世尊却來相報及返具事白佛佛告殃崛速往報言我從賢聖法來未曾殺生殃崛奉佛語疾往告之其婦得聞當時分娩師云從古至今拈提者極多錯會者不少龍溪今晚索性與你點出天蒼蒼野茫茫風吹草見牛羊禪和子會也未不會再說一遍水溢天開堤花落滿龍溪鳧隨潮落去日上綺霞低眾作禮師擲拄杖便起晚參師云萬法歸一一歸何處呵呵學人也有趣和尚也有趣拂一拂歸臥室晚參師云山門前得底句禪堂裏商量去進到方丈不必再舉何也天溪不肯辜負汝晚參師云竹窗夜啟月明霜大高鴻入雲鼠兒穿磨大眾行住坐臥且道是箇什麼良久大笑云癩頭回子騎駱駝重陽早參師云今朝九月九猢猻上樹賽觔斗右轉左左轉右好手手中呈好手呵呵天溪長老不唧𠺕早參師云水中鹽味色裏膠青咄將謂明星是眼睛通身有口向誰說挽盡天河洗鐵丁室中晚參問答畢師乃云阿逸多笑甚麼蛇穿耗子窟普化搖鈴過嗚呼小子脚板踏破癢瘡近火血沾衣傷鹽傷醋陳年貨有人道慈翁老有茶請喫茶無茶滾水好咄漢仙琴高騎赤鯉羲之寫字換鵞兒良久云歸堂去六月十九早參師云路上紅塵起江中白浪飛拈拄杖云觀音菩薩來也有眼者近前無眼者退後一僧出作禮畢擬歸位師打云與麼不得得與麼良久卓拄杖云禮拜歸位真堪笑與麼不得得與麼曼拏羅指地為泉胡大頭錘破鐵山若也知去龍行虎步如或懵懂世尊陞座默然阿難遣出比丘左右顧云半山廟三天竺遂以柱杖一齊打散雪夜晚參師云喫苦茶說淡話誰管佛法不佛法馮夷剪破龍溪練枯柳梅花處處春咦月下凍痕生綠井隔窗玉片飛無影樹枝風息轉迎寒寒人如鳥棲未安日短夜長誰先覺熒熒殘燭嗚嗚角咄咄黃龍三關香巖獨脚冬至早參師云冷地裏夢見一獃和尚曰昨夜三更子癸時楓杉隔塢問松枝滿天飛雪來何處寒梅低首笑嘻嘻他又大叫云老祖老祖如今是什麼時節大眾說看傍僧擬答師便打僧復出問生擒猛虎活捉獰龍人來時如何師云官法如爐進云忽遇透網金鱗又作麼生師云謹慎火燭進云驅耕夫牛奪飢人食未是向上鉗鎚如何是向上鉗鎚師叱云揚州客僧擬議師云大眾歸堂小年晚參眾集師舉柱杖云是我不是眾茫然師擲下歸臥室四月八日早參師云從古相傳釋迦佛今日降生不知是否說與諸人檢點看南康府裏星子縣黃梅縣外義豐城這便是森長老見處良久云知客在否眾答在復云內外大眾今早都念課誦麼眾云念師便入臥室師見病人多逐苦境乃示云莫莫莫病是眾生之良藥我在俗時一病幾死正迷悶中忽聞鼓吹始知病源不從他有遂決志出家云鼓角分明破毒針驀然劄斷愛情心死去活來真好笑石頭土塊盡知音語諸人識病因大家割捨夢中身咄咄不作維摩詰文殊何處尋機緣僧問如何是鳥道玄路師云白雲飛起紅葉落進云文武兼濟人來時如何施設師云不許飲酒食肉進云邪法難扶時如何師云豈有此理進云如何是正法眼師云早晚也進云何以為之大機師云米進云何以為之大用師云時進云異類中如何行得師云斗有大小秤有輕重進云疑情未息時如何師云魚勞尾赤人勞頭白同參問首座親見老人是否師云是參云還有奇特事也無師云扣冰人少崇福人多僧入室請師決疑師云鬼谷老爺不在家僧云豈無方便師云歸去門前自打瓦僧問如何是清淨法身師云普請擔泥僧云因甚學人不會師云有直歲在僧云如何是超佛越祖之談師云依教奉行僧云牛頭橫說豎說不知有關棙子如何是關棙子師云止僧擬議師云去僧問如何是妙唱不干舌師云罕遇知音僧云如何是死蛇驚出草師云照顧性命僧云如何是鐵鋸舞三臺師云呆鴨聞雷僧云如何是解針枯骨吟師云切忌寐語僧問終日紛紛擾擾如何是不動尊師云天晴快走僧擬進語師云換手搥胸僧問四方八面來時如何師云門前石馬脚撩天僧問羚羊挂角時如何師云引我笑僧問一等是水因甚海鹹河淡師云莫矢溺僧請益云不假半寸繩如何出得深井人師云賴遇天溪進云大似失便宜師云看你顛倒進云乞師方便師云大聖緊那羅王菩薩僧問如何是玄中玄師云日長夜短僧問佛心無處不慈悲觀音大士因甚不去高麗國師云謝汝饅頭湯餅游山歸問僧塗毒鼓聞者皆喪因甚擊者不死僧下語不契師示偈云山上鴟夷又買舟清風明月幾時休欲知進退存亡事只問歸來鄭化州僧問昔日趙州勘破臺山婆子畢竟在甚麼處師云天開河進云學人不知落處師云齋堂東邊進云乞師慈悲直說師云趙州兩隻眼婆子一條舌五臺山上去舊路嶺莫歇僧問如何是先照後用師云臨濟來也僧擬議師便喝僧云如何是先用後照師搊住云道道僧茫然師遂托開僧云如何是照用同時師掌云非驢所堪僧云如何是照用不同時師云不知痛癢漢僧喝師云再喝看僧又喝師便打僧問如何是無相涅槃師云五里亭十里舖僧云因甚學人不會師云驢前馬後僧問如何是雲門顧鑑咦師展手云那僧擬議師云了僧再問師云去僧問劈面來時如何師隨聲便掌僧問如何是大雄山底佛法師云白額當途坐僧云還有方便也無師云闍黎莫夜行僧問如何是西來祖意師云南人瘦北人肥僧問諸佛出身處且置如何是和尚安身立命處師云你却跳得好僧喝師云為什麼僧擬議師打退僧問因甚不點路燈師云一任瞎闖僧問入門便喝便打意作麼生師云祖師在你背後僧問不慕千聖不重己靈時如何師云你五戒也不持僧云古人到者裏為甚不肯住師劃一畫僧喝師云好喝僧擬議師便打僧問金鎖斷後時作麼生師云腦門著地僧問堆堆坐禪圖箇什麼師掩鼻云出去僧茫然師云走來僧近前師云三黃丸好僧問從上宗乘如何接續師云日東上月西下僧云與麼則人人有分也師云知章騎馬似乘船同參問如何是首座家風師云沒籬沒壁參云忽遇賊來時作麼生師云憑你模索僧問畢竟如何是佛師云撞不破便燒僧問如何是梵音相師云鋪堂不細行僧問箭鋒相拄時如何師云過者邊立僧喝師便笑僧擬議師云大好箭鋒相拄僧問作麼生轉得自己歸山河大地去師云昨夜好秋雨僧問如何是和尚為人處師云獃子獃子進云不落古今句作麼生道師云官久必富進云七佛未出世時向甚處行履師云疑人莫用僧入室請益心經云揭諦揭諦意旨如何師云孔子產山東文才今古通大夫天下有白屋出三公僧云學人不知落處師云自衛返魯僧問一人發真歸元十方虗空悉皆消殞為什麼方丈後泥挑不盡師云鬼喫餿饅頭僧問既是報恩人因甚不識金車山師云看你打之遶僧喝師云有甚了期僧擬議師云還怪得我麼便打僧問山河大地還有過也無師云缺嘴打鑼僧問乍起乍滅時如何師云不是鬼燈便是螢火僧問如何是觀音三昧師云夜來孩子哭僧云如何是文殊三昧師云日裏踢繡毬僧云如何是普賢三昧師云包公廟裏失毡包僧問心佛俱忘時如何師云誰與麼道僧擬議師喝出僧問浩浩塵中如何辨主師云飯裏沙多僧云謝師指示師云莫亂嚼僧問無夢無想時主人公在什麼處師云大眾笑你師問僧仙鄉那裏僧答合浦縣師云明珠拈出看僧無對師云想是新戒師問座主金剛且止喚什麼作經主擬議師便笑主問如何是經師召云法師主應諾師云好箇座主主指茶鍾云者裏有趙州也無師云匙挑不上師問一切葛藤敲門瓦子如今門開也瓦子在什麼處僧茫然師云可惜七間僧堂僧問一字不著畫是什麼字師云鼻大心無毒僧問未生之前即不問如何是趙州勘破婆子處師云飯飽弄筯進云某甲即不然師云要屙那邊去僧無語師云急歸堂僧問如何是有柱杖子與柱杖子師云伶俐好僧云如何是無柱杖子奪柱杖子師云懵懂漢僧問目前蕩盡時如何師云更夢見什麼僧作禮師問汝名什麼僧云南山師云南山起雲為甚北山下雨僧無對師云春無三日晴僧問百尺竿頭進步時如何師云三月三僧云學人不知落處師云起席不謝坐僧云從今得箇安樂地師云義塚淚痕多師問僧抑而為之可謂貴人多忘擬向那邊施設僧無對師問傍僧若也鑑不出落地作金聲你道作麼生僧擬作禮師便打師遊牛首時路逢一道者者彈指一下問云是何宗旨師云老鼠喫鹽者云如何是藏鋒句子師云東西南北者云如何是事藏鋒師云隔岸醉人多者云如何是理藏鋒師云滿江野鴨子者云如何是事理俱藏鋒師云水裏船船裏水者云如何是事理俱不藏鋒師云上底上下底下者便作禮僧問萬法歸一即不問畢竟一歸何處師云昨日典座來今朝柴頭去僧問髑髏粉碎時如何師云僧排夏臘俗列耆年僧問供養百千諸佛不如供養一無心道人諸佛有何過無心道人有何德師云打鼓轉船頭僧問王索仙陀婆意作麼生師云聽事不真僧云古人點鐵成金乞師直捷指示師云淮北鼓師問打稻僧禾熟不臨場且置作麼生耕人田不種僧無對師云賀家湖上天華寺僧問不是風動不是旛動是什麼動師云禪和走入漆桶僧云和尚作麼生師云䒢溪號做慈翁僧問樹彫葉落時如何師云大好從頭起僧云體露金風又作麼生師云歌於斯哭於斯僧喝師云汝命何短僧擬議師打退僧問至道無難唯嫌揀擇是否師云雙陸盤開大喝彩進云如何是至道師云不差不差進云學人今日得遇和尚師云禪客昨晚在那裏歇僧問如何是大通智勝佛師云古家橋下進云為什麼佛法不現前師云臨平腐乾入室僧問臨濟的的意作麼生師云官打現在進云學人不識宗旨時如何師云我是天溪主人進云道眼如何得明師云禮防君子進云乞師方便師云你問什麼僧罔然師云近前來僧近前師大笑云金風落落洗芳菲瘦盡千峯雁始飛南海一波長不定西山半面莫疑非僧問燕子善談實相如何是實相師云韓獹韓獹僧問撩起便行時如何師云泥作頭僧問如何是古佛心師云槁流紅樹僧云如何是物不遷師云葉泛霜波僧問禪客相逢祇彈指此心能有幾人知如何是此心師云闍黎鼻頭黑僧問如何是道師云好日多同僧云如何是道中人師云再過一家僧問作麼生是禪師云日裏不點燈僧問牛頭未見四祖時如何師云初七清明僧云見後如何師云念二穀雨僧問上木下鐵意旨如何師云逢凶化吉僧擬議師大笑僧再問師云近日工夫太殺閒師問僧無根樹子作麼生種僧無對師云巡山稍暇僧請益舉玄沙問光侍者打鐵船也未光無對請師代師云今日好風問進門一句作麼生道師云猢猻騎鱉背問既是大雄山因甚麼又道雲覆菴師云你是瓶窑來的僧云是師云扣冰去黴大連雨師落堂云大眾因甚麼迷痴許久不晴眾無對師云知之為知之不知為不知天上雷公叫地下走蟛蜞呵呵好場熱亂以柱杖畫云湄眾茫然師喝云聾牛瞎驢一齊打散解制師問僧云秋風清秋月明百城煙水任君行只有一事撞見勝熱婆羅門時莫道在者裏起程何故呢彭良久云你道老祖意在甚麼處師問僧語是謗默是誑語默向上有事在什麼事呵呵不到死牛邊不欠死牛錢我與麼道你又作麼生僧問如何是學人親切處師云火燒烏龜進云如何是本身盧舍那師云受戒也未僧云如何是清淨法身師云鬬打相爭僧問如何是大通智勝佛師云東廊西廊僧云為甚十劫坐道場師云看你顛僧云作麼生佛法不現前師笑云酒鬼子僧云何故不得成佛道師咄云痴虫師問柴頭無根樹子斫斷也未頭無對次早云昨夜看無根樹子聞鑼聲忽然斷去師指花云因甚麼喚作海棠頭擬議師便掌僧問清淨本然云何忽生山河大地師云你尋衣單麼進云學人請問佛法師云天旱棉花少僧呈懷州牛食禾頌師笑云蠻婆哈醋嘴三尺村老聞酸面百摺引得乞兒聳膊寒儼然一幅吳生筆師垂問云祖師西來籬邊山菜帶泥挑滋味新鮮好諸增上慢者聞必不敬信侍者答云甘草甜黃連苦師云向去莫言今日事觀音自在放毫光誰不忍者說答深山藏猛虎師云風燈動夜幃大棒打老鼠為什麼窗敲碎玉聲偏細答明月堂前風冷淡師云太平時節桑麻話不用兵符佩絳紗錯過也答雲從龍風從虎師云蛟翻波作雪鼉吼氣蒸雲金色頭陀供麥飯還知否答曲不藏直師云畢陵伽呵叱河神梅花倒影插人頭是否答樓閣裏善財師云一鉤新月魚吞影雙峯雲外瞑是何病答碧波生水面師云月上女出城舍利弗入城布袋和尚何故如今笑不止答辰屬龍卯屬兔師云東西南北水灑不著潑墨飛毫莫浪題你能搆得麼答雨過看長虹師云禪和子親舍每疑雲外近長安翻覺日邊遙呢侍者答不契師遂遣出偈頌雁宕山過夏示徒踏破草鞋坐消白日北海天麻南臺烏藥嚼得破者急須吐却吞不下者翻成毒藥示溟源禪人水至柔而能攻堅故一其內美哉渢渢乎經始緜緜滂沱淮海子宜自勉天目秋夜禮祖塔凉月侵衣紅葉鮮杖藜幾度塔松前寒鴉數點棲枯杪一陣西風霜滿天天目掃高祖塔綠犀海外分離坎金毛崖畔甲丁庚三四四三三四四四三三四四三三西方菴上鐵蛇鑽入金剛眼東塢峰下巖前石虎抱兒眠恭惟老祖珍重萬福行森到此瞻之仰之萬年松拂日百怪石騰溪不一而一不二而二世尊出山相頭髼鬆鼻突兀膝拄腮皮裹骨見之曰佛咄咄水月觀音大士一蒲青草上四面白雲飛盡日無言說巖花落滿衣野店風濤驚泊岸西峯月上善財歸布袋和尚讚頭大頭無角肚大肚無橐盡道是奉化縣老官不知說得著不著放下布袋等箇人手裏把柄破木杓噁頌世尊拈花迦葉微笑是處江湖有釣簑相逢猶更問如何橫吹黃鶴樓前笛直是廬山採菊歌頌汾陽十智同真示僧當軒竹珮因風嚮遶徑梧陰帶月奢曾識桃源仙子面豈緣流水覓胡麻達摩祖師贊怒目咬齒何苦如此而今用師不著有理也是無理西天東土一般各各自有所以祖師祖師請起請起示明鏡本來無一物何處惹塵埃六祖好語話幾人不錯會宿黃梅小石口五祖送六祖灘夕陽樓外淡煙籠野渡舟橫草接空望斷嶺南人不見九江月冷水溶溶宿四祖塔前破額山窗紙泣風烏聲月下遶青桐夜寒古殿鷄鳴蚤曳杖仍登最上峯宿黃梅東禪寺撲面蓬塵擬蔽天東禪槽廠若為傳應菴華祖三生室耕者南田又北田秋日掃龍池傳祖塔塔上雙虹適偶期焚香誰識獨悲思池當夕照半添色句與秋山兩鬬奇龍出無心三汲浪鶴鳴有意九皐岐若非吾祖何來此雨細風斜歸去遲禮罄山師翁塔宿海會寺遊罷荊溪過上方笑看歸鳥磨斜陽千盤石徑雲承屐一室松風月滿牀既破
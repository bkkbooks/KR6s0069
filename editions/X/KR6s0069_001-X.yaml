師應喏喏自是往來楊李之門以法為友久之辭還河東年曰有一語寄與唐明得麼師曰明月照見夜行人年曰却不相當師曰更深猶自可午後更愁人年曰開寶寺前金剛近日因甚麼汗出師曰知年曰上座臨行豈無為人底句師曰重疊關山路年曰與麼則隨上座去也師噓一聲年曰真獅子兒大獅子吼師曰放去又收來年曰適來失脚蹋倒又得家童扶起師曰有甚麼了期年大笑師還唐明謁神鼎諲禪師鼎首山高弟望尊一時衲子非人類精奇無敢登其門者門弟子氣吞諸方師髮長不翦敝衣楚音通謁稱法姪一眾大笑鼎遣童子問長老誰之嗣師仰視屋曰親見汾陽來鼎杖而出顧見頎然問曰汾州有西河師子是否師指其後高叫曰屋倒矣童子返走鼎回顧相矍鑠師地坐脫隻履而示之鼎老忘所問又失師所在師徐起整衣且行且語見面不如聞名遂去鼎遣人追之不可歎曰汾州乃有此兒耶問行脚不逢人時如何師曰釣絲絞水問磨礲三尺劍去化不平人師意如何師曰好去僧曰點師曰你看僧拍手一下歸眾師曰了問僧近離甚處曰雲過千山碧師曰著忙作麼曰鴈過水聲凄師便喝僧亦喝師便打僧亦打師曰你看這瞎漢本分打出三門外念你是新到且坐喫茶師問顯英首座近離甚處曰金鑾曰去夏在甚處曰金鑾曰前夏在甚處曰金鑾曰先前夏在甚處曰和尚何不領話曰我也不能勘得汝教庫下供過奴子來勘且點一碗茶與汝濕口師室中晏坐橫刀水盆之上旁置草鞋使來參扣者下語無有契其機者又冬日牓僧堂作此字二三其下註云若人識得不離四威儀中有首座者見之謂曰和尚今日放參師聞而笑之法華全舉禪師師得法汾陽徧歷諸方首謁荊南福昌善禪師善問曰回互不回互師曰總不與麼曰為甚麼已喫福昌棒師曰一家有事百家忙曰脫空謾語師曰調琴澄太古琢句體全真謁公安遠禪師遠問作麼生是伽藍師曰深山藏獨虎淺草露羣蛇曰作麼生是伽藍中人師曰青松葢不帀黃葉豈能遮曰道什麼師曰少年玩盡天邊月老倒扶桑沒日頭曰一句兩句雲開月露作麼生師曰照破祖師關謁夾山真首座真曰還見麼師曰萬事全無曰還不見麼師曰千般皆在手師曰首座未見澄散聖時如何曰湖南江西又問見後如何曰江西湖南師曰却共首座一般耶曰打草驚蛇師曰終不揑怪謁大愚芝禪師芝問古人見桃花意作麼生師曰曲不藏直曰那箇且從遮箇作麼生師曰市中拾得寶比鄰那得知曰上座還知麼師曰路逢劍客須呈劍不是詩人不獻詩曰作家詩客師曰一條紅線兩人牽曰元沙道諦當又作麼生師曰海枯終見底人死不知心曰恰是師曰樓閣凌雲勢峰巒疊翠層謁五祖戒禪師戒問作麼生是絕羈絆底人師曰反手把籠頭曰却是作家師曰背鞭打不著曰為什麼上來下去師曰甚處見上來下去戒便打師曰一言無別路千里不逢人謁雪竇顯禪師竇問牛喫草草喫牛師曰回頭欲就尾已隔萬重關曰應知無背面要須常現前師曰驗在目前曰自領出去到瑯琊覺和尚處琊問近離甚處師曰兩浙曰船來陸來師曰船來曰船在甚處師曰步下曰不涉程途一句作麼生道師以坐具摵一摵曰杜撰長老如麻似粟拂袖而出琊問侍者此是甚麼人者曰舉上座琊曰莫是舉師叔麼先師教我尋見伊遂下旦過問上座莫是舉師叔麼莫怪適來相觸忤師便喝復問長老何時到汾陽耶曰某時到師曰我在浙江早聞你名元來見解祇如此何得名播寰宇琊遂作禮曰某甲罪過示眾釋迦不出世達摩不西來佛法徧天下談玄口不開芭蕉谷泉禪師師謁慈明明問曰白雲橫谷口道人何處來師左右顧曰夜來何處火燒出古人墳慈明呵曰未在更道師乃作虎聲慈明以坐具摵之師接住推明置禪牀上明却作虎聲師大笑曰我見七十餘員善知識今日始遇作家天聖皓泰禪師師到瑯琊琊問埋兵掉鬬未是作家匹馬單鎗便請相見師指琊曰將頭不猛帶累三軍琊打師一坐具師亦打琊一坐具琊接住曰適來一坐具是山僧令行上座一坐具落在甚麼處師曰伏惟尚饗琊拓開曰五更侵早起更有夜行人師曰賊過後張弓琊曰且坐喫茶浮山圓鑒禪師歐陽文忠公聞師奇逸造其室未有以異之與客碁師坐其旁文忠遽收局請因碁說法師即令撾鼓陞座曰若論此事如兩家著碁相似何謂也敵手知音當機不讓若是綴五饒三又通一路始得有一般底祇解閉門作活不會奪角衝關硬節與虎口齊彰局破後徒勞綽幹所以道肥邊易得瘦肚難求思行則住往失粘心麤而時時頭撞休誇國手謾說神仙贏局輸籌即不問且道黑白未分時一著落在甚麼處良久曰從來十九路迷悟幾多人文忠嘉歎從容謂同僚曰修初疑禪語為虗誕今日見此老機緣所得所造非悟明於心地安能有此妙旨哉師老退休於會聖巖因閱班固九流遂擬之作九帶敘佛祖教義博採先德機語參同印證其一曰佛正法眼帶其二曰佛法藏帶其三曰理貫帶其四曰事貫帶其五曰事理縱橫帶其六曰屈曲帶其七曰妙叶兼帶其八曰金鍼雙鎖帶其九曰平懷常實帶學者既已傳誦師曰若據圓極法門本具十數今此九帶已為諸人說了更有一帶還見得麼若也見得親切分明却請出來說看說得分明許汝通前九帶圓明道眼若見不親切說不相應惟依吾語而為己解則名謗法大眾到此如何眾無語師叱之去金山曇頴達觀禪師師首謁太陽玄禪師遂問洞山特設偏正君臣意明何事陽曰父母未生時事師曰如何體會陽曰夜半正明天曉不露師罔然遂謁谷隱舉前話隱曰太陽不道不是祇是口門窄滿口說未盡老僧即不然師問如何是父母未生時事隱曰糞墼子師曰如何是夜半正明天曉不露隱曰牡丹花下睡猫兒師愈疑駭一日普請隱問今日運薪耶師曰然隱曰雲門問僧人搬柴柴搬人如何會師無對隱曰此事如人學書點畫可效者工否者拙蓋未能忘法耳當筆忘手手忘心乃可也師於是默契良久曰如石頭云執事元是迷契理亦非悟隱曰汝以為藥語為病語師曰是藥語隱呵曰汝以病為藥又安可哉師曰事如函得葢理如箭直鋒妙寧有加者而猶以為病實未喻旨隱曰妙至是亦祇名理事祖師意旨智識所不能到矧事理能盡乎故世尊云理障礙正見知事障續諸生死師恍如夢覺曰如何受用隱曰語不離窠臼安能出葢纏師歎曰纔涉唇吻便落意思盡是死門終非活路住後示眾曰纔涉唇吻便落意思盡是死門俱非活路直饒透脫猶在沈淪莫教孤負平生虗度此世要得不孤負平生麼拈拄杖卓一下曰須是莫被拄杖謾始得看看拄杖子穿過你諸人髑髏𨁝跳入你鼻孔裏去也又卓一下過京師寓止駙馬都尉李端愿之園李公問曰地獄畢竟是有是無師曰諸佛向無中說有眼見空花太尉就有裏尋無手𢳛水月堪笑眼前見牢獄不避心外見天堂欲生殊不知欣怖在心善惡成境太尉但了自心自然無惑李曰心如何了師曰善惡都莫思量李曰不思量後心歸何所師曰且請太尉歸宅上堂山僧平生意好相撲祇是無人搭對今日且共首座搭對捲起袈裟下座索首座相撲座纔出師曰平地上喫交便歸方丈光慶遇安禪師上堂欲識曹谿旨雲飛前面山分明真實箇不用別追攀僧問古德有言井底紅塵生山頭波浪起未審此意如何師曰若到諸方但恁麼問曰和尚意旨如何師曰適來向汝道甚麼景清居素禪師僧問即此見聞非見聞為甚麼法身有三種病二種光師曰填凹就缺駙馬李遵勖居士公謁谷隱問出家事隱以崔趙公問徑山公案答之公於言下大悟作偈曰學道須是鐵漢著手心頭便判直趨無上菩提一切是非莫管公一日與堅上座送別公問近離上黨得屆中都方接麈談遽回虎錫指雲屏之翠嶠訪雪嶺之清流未審此處彼處的的事作麼生座曰利劍拂開天地靜霜刀纔舉斗牛寒公曰恰值今日耳聵座曰一箭落雙鵰公曰上座為甚麼著草鞋睡座以衣袖一拂公低頭曰今日可謂降伏也座曰普化出僧堂華嚴道隆禪師師初參石門徹和尚問曰古者道但得隨處安閒自然合他古轍雖有此語疑心未歇時如何石門曰知有乃可隨處安閒如人在州縣住或聞或見千奇百怪他總將作尋常不知有而安閒如人在村落住有少聲色則驚怪傳說師於言下有省文公楊億大年居士公問廣慧曰承和尚有言一切罪業皆因財寶所生勸人疏於財利況南閻浮提眾生以財為命國以財聚人教中有財法二施何得勸人疏財乎慧曰旛竿尖上鐵籠頭公曰海壇馬子似驢大慧曰楚雞不是丹山鳳公曰佛滅二千歲比丘少慙愧投子義青禪師師謁見圓通秀禪師無所參問惟嗜睡而已執事白通通即曳杖入堂見師正睡乃擊牀呵曰我這裏無閒飯與上座喫了打眠師曰和尚教某何為通曰何不參禪去師曰美食不中飽人喫通曰爭奈大有人不肯上座師曰待肯堪作甚麼通曰上座曾見甚麼人來師曰浮山通曰怪得恁麼頑賴遂握手相笑歸方丈興陽清剖禪師師在太陽作園頭種瓜次陽問甜瓜何時得熟師曰即今熟爛了也曰揀甜底摘來師曰與甚麼人喫曰不入園者師曰未審不入園者還喫也無曰汝還識伊麼師曰雖然不識不得不與陽笑而去僧問娑竭出海乾坤震覿面相逢事若何師曰金翅鳥王當宇宙箇中誰是出頭人曰忽遇出頭時又作麼生師曰似鶻捉鳩君不信髑髏前驗始知真曰恁麼則叉手當胸退身三步也師曰須彌座下烏龜子莫待重遭點額回羅浮山顯如禪師師初到太陽陽問汝是甚處人曰益州陽曰此去幾里曰五千里陽曰你與麼來還曾踏著麼曰不曾踏著陽曰汝解騰空那曰不解騰空陽曰爭得到這裏曰步步不迷方通身無辨處陽曰汝得超方三昧耶曰聖心不可得三昧豈彰名陽曰如是如是修撰曾會居士公幼與明覺同舍及冠異塗天禧間公守池州一日會於景德寺公遂以中庸大學參以楞嚴符宗門語句質明覺覺曰這箇尚不與教乘合況中庸大學耶學士要徑節理會此事乃彈指一下曰但恁麼薦取公於言下領旨雲居曉舜禪師師參洞山一日如武昌行乞首謁劉居士士曰老漢有一問若相契即請開疏若不相契即請還山遂問古鏡未磨時如何師曰黑似漆磨後如何師曰照天照地士長揖曰且請上人還山師懡㦬而歸洞山問其故師述前語山曰汝問我師理前問山曰此去漢陽不遠師進後語山曰黃鶴樓前鸚鵡洲師於言下大悟師嘗譏天衣說葛藤禪一日聞懷遷化於法堂上合掌云且喜葛藤樁子倒了也秀圓通時在會中作維那每見訶罵不已乃謂同列曰我須與這老漢理會一上及夜參又如前訶罵秀出眾厲聲曰豈不見圓覺經中道師遽曰久立大眾伏惟珍重便歸方丈秀曰這老漢通身是眼罵得懷和尚也翠巖真點胸常罵師說無事禪石霜永和尚令人傳語云舜在洞山悟古鏡因緣豈是說無事禪你罵他自失却一隻眼師聞之作頌曰雲居不會禪洗脚上牀眠冬瓜直儱侗瓠子曲彎彎永和尚亦作頌曰石霜不會禪洗脚上牀眠枕子撲落地打破常住磚上堂諸方有弄蛇頭撥虎尾跳大海劍刃裏藏身雲居這裏寒天熱水洗脚夜間脫韈打睡早朝旋打行纏風吹籬倒喚人夫劈蔑縛起師問秀圓通曰你見懷和尚有何言句秀舉懷投機頌師曰不好別有甚言句秀曰一日有長老來參懷舉拂子云會麼云不會懷云耳朵兩片皮牙齒一具骨師歎曰真善知識佛日契嵩禪師師得法於洞山師夜則頂戴觀世音菩薩像而誦其號必滿十萬乃寢自是世間經書章句不學而能作原教論十萬餘言以抗宗韓排佛之說讀者畏服後居永安蘭若著禪門定祖圖傳法正宗記輔教編上進仁宗嘉賞令編次入藏賜號明教太守許式公得法於洞山一日與泐潭澄上藍溥坐次潭問聞郎中道夜坐連雲石春栽帶雨松當時答洞山甚麼話公曰今日放衙早潭曰聞答泗州大聖揚州出現語是否公曰別點茶來潭曰名不虗傳公曰和尚早晚回山潭曰今日被上藍覰破藍便喝潭曰須你始得公曰不奈船何打破戽斗公入上藍僧堂問首座年多少曰六十八公曰僧臘多少曰四十七夏公曰聖僧得幾夏曰與虗空齊受戒公拍板頭曰下官喫飯不似首座喫鹽多玉泉承皓禪師無盡居士張公奉使京西南路就謁之問曰師得法何人師曰復州北塔廣和尚公曰與伊相契可得聞乎師曰只為伊不肯與人說破公善其言僧入室次狗子在室中師叱一聲狗子便出去師曰狗却會你却不會一日眾集師問曰作什麼曰入室師曰待我抽解來及上廁來見僧不去以拄杖趕散示寂門人圍繞師笑曰吾年八十一老死舁屍出兒郎齊著力一年三百六十日言畢而逝育王懷璉大覺禪師師持律嚴甚仁廟嘗賜以龍腦鉢盂師對使者焚之曰吾法以壞色衣以瓦鉢食此鉢非法仁廟益嘉歎師自京師乞還山時英宗賜手詔有經過庵院任性住持語師藏之不以示人東坡為師撰宸奎閣記欲一見之師終不出示寂後始得之笥中示寂之時年八十二法昌倚遇禪師師謁北禪禪問近離甚處師曰福嚴禪曰思大鼻孔長多少師曰與和尚當時見底一般禪曰汝道我見時長多少師曰和尚大似不曾到福嚴禪曰學語之流又問來時馬大師安樂否師曰安樂禪曰向汝道甚麼師曰教和尚莫亂統禪曰念汝新到不能打得你師曰某甲亦放和尚過茶罷禪問鄉里甚處師曰漳州禪曰三平在彼作甚麼師曰說禪說道禪曰年多少師曰與露柱齊年禪曰有露柱且從無露柱年多少師曰無露柱一年也不少禪曰夜半放烏雞師事北禪最久慈明過北禪師侍立禪曰汾陽獅子可煞威獰明曰不道來者齩殺禪曰審如此汾陽門下道絕人荒耶明舉拂子曰這箇因甚到今日禪未及對師從旁曰養子不及父家門一世衰禪呵曰汝具甚眼目乃敢爾師曰若是齩人獅子終不與麼明將去至龍牙像前指問師云誰像師曰龍牙像明曰既是龍牙像為甚在北禪師曰兩彩一賽明曰像在此龍牙在甚處師擬對明掌之曰莫道不能齩人師曰乞兒見小利明呵逐之遊廬山寓圓通時大覺璉公方赴詔辭眾曰此事分明須薦取莫教累劫受輪迴師問曰如何是此事曰薦取師曰頭上是天脚下是地薦箇甚麼曰不是知音者徒勞話歲寒師曰豈無方便曰胡人飲乳反怪良醫師曰暴虎憑河徒誇好手拍一拍歸眾師在雙嶺受法昌請與英勝二首座相別曰三年聚首無事不知檢點將來不無滲漏以拄杖畫一畫曰這箇即且止宗門事作麼生英曰須彌安鼻孔師曰恁麼則臨崖看滸眼特地一場愁英曰深沙努眼睛師曰爭奈聖凡無異路方便有多門英曰鐵蛇鑽不入師曰這般漢有甚共語處英曰自緣根力淺莫怨太陽春却畫一畫曰宗門事且止這箇事作麼生師便掌英曰這漳州子莫無去就師曰你這般見解不打更待何時又打英曰也是老僧招得住後英勝到山相訪英曰和尚尋常愛點檢諸方今日因甚麼却來古廟裏作活計師曰打草祗要驚蛇英曰莫塗糊人好師曰你又刺頭入膠盆作甚麼英曰古人道我見兩箇泥牛鬬入海所以住此山未審和尚見箇甚麼師曰你他時異日有把茆葢頭人或問你作麼生祗對英曰山頭不如嶺尾師曰你且道還當得住山事也無英曰使钁不及拖犂師曰還曾夢見古人麼英曰和尚作麼生師展兩手英曰蝦跳不出斗師曰休將三寸燭擬比太陽輝英曰爭奈公案現在師曰亂統禪和如麻似粟雲居了元佛印禪師師入室次蘇子瞻適至師曰此間無坐處蘇曰暫借佛印四大為座師曰山僧有一問學士道得即請坐道不得即輸玉帶蘇欣然請問師曰四大本空五陰非有居士向甚麼處坐蘇遂施帶師答一衲西塞帥王公韶自以殺業重祈為澡雪請說法上藍師炷香曰此香為殺人不眨眼上將軍立地成佛大居士眾稱善韶亦悠然意消智海逸正覺禪師僧問古鏡未磨時如何師曰青青河畔草曰磨後如何師曰鬱鬱園中柳曰磨與未磨是同是別師曰同別且置還我鏡來僧擬議師便喝道士問如何是道師曰龍吟金鼎虎嘯丹田曰如何是道中人師曰吐故納新曰道與道中人相去多少師曰罥鶴顛崖上沖天昧米民五雲華嚴志逢禪師師一日入普賢殿中宴坐倐有一神人跪膝於前師問汝其誰乎曰護戒神也師曰吾患有宿愆未殄汝知之乎曰師有何罪惟一小過耳師曰何也曰凡折鉢水亦施主物師每傾棄非所宜也言訖而隱師自此洗鉢水盡飲之積久因致脾疾十載方愈瑞鹿上方遇安禪師師事天台閱首楞嚴經到知見立知即無明本知見無見斯即涅槃師乃破句讀曰知見立知即無明本知見無見斯即涅槃於此有省有人語師曰破句了也師曰此是我悟處畢生不易時謂之安楞嚴雁蕩願齊禪師僧問夜月舒光為甚麼碧潭無影師曰作家弄影漢其僧從東過西立師曰不惟弄影兼乃怖頭雲居道齊禪師大梅煦來參師問汝從甚處來若從僧堂來即是謾語不從僧堂來又是自瞞汝從甚處來梅於言下頓悟支提辯隆禪師上堂巍巍實相逼塞虗空金剛之體無有破壞大眾還見不見若言見也且實相之體本無青黃赤白長短方圓亦非見聞覺知之法且作麼生作箇見底道理若言不見又道巍巍實相逼塞虗空為甚麼不見僧問如何是向上一路師曰脚下底曰恁麼則尋常履踐師曰莫錯認廬山棲賢澄湜禪師僧問毗目仙人執善財手見微塵諸佛祗如未執手時見箇甚麼師曰如今又見箇甚麼師性高簡律身精嚴動不違法度暮年三終藏經以坐閱為未敬則立誦行披之黃龍南禪師初遊方年方少從之屢年故其平生所為多取法焉嘗曰棲賢和尚定從人天中來叢林標表也黃龍慧南禪師化主歸上堂世間有五種不易一化者不易二施者不易三變生為熟者不易四端坐喫者不易更有一種不易是甚麼人良久云便下座師問翠巖承聞首座常將女子出定話為人是否巖曰無師曰奢而不儉儉而不奢為甚道無巖曰若是本分衲僧也少他鹽醫不得師却回首喚侍者報典座明日只煑白粥師風度凝遠叢林中有終身未嘗見其破顏者居積翠時一夕燕坐間光爥室戒侍者令勿言四祖演長老通法嗣書上堂山僧才輕德薄豈堪人師蓋不昧本心不欺諸聖未免生死今免生死未出輪迴今出輪迴未得解脫今得解脫未得自在今得自在所以大覺世尊於然燈佛所無一法可得六祖夜半於黃梅又傳箇甚麼乃說偈曰得不得傳不傳歸根得旨復何言憶得首山曾漏泄新婦騎驢阿家牽楊岐方會禪師慈明上堂師出問幽鳥語喃喃辭雲入亂峰時如何明曰我行荒草裏汝又入深村師曰官不容針更借一問明便喝師曰好喝明又喝師亦喝明連喝兩喝師禮拜明曰此事是箇人方能擔荷師拂袖便行一日慈明問師馬祖見讓師便悟去且道迷却在甚麼處師曰要悟即易要迷即難陞座時有僧出師曰漁翁未擲釣躍鱗衝浪來僧便喝師曰不信道僧拊掌歸眾師曰消得龍王多少風問師唱誰家曲宗風嗣阿誰師曰有馬騎馬無馬步行曰少年長老足有機籌師曰念汝年老放汝三十棒問如何是佛師曰三脚驢子弄蹄行曰莫祗這便是麼師曰湖南長老師下座九峰勤和尚把住云今日喜得箇同參師曰作麼生是同參底事曰九峰牽犂楊岐拽耙師曰正恁麼時楊岐在前九峰在前勤擬議師拓開曰將謂同參元來不是慈明忌辰設齋眾纔集師於真前以兩手揑拳安頭上以坐具畫一畫打一圓相便燒香退身三步作女人拜首座曰休揑怪師曰首座作麼生座曰和尚休揑怪師曰兔子喫牛嬭第二座近前打一圓相便燒香亦退身三步作女人拜師近前作聽勢座擬議師打一掌曰這漆桶也亂做問來僧曰雲深路僻高駕何來曰天無四壁師曰踏破多少草鞋僧便喝師曰一喝兩喝後作麼生曰看這老和尚著忙師曰拄杖不在且坐喫茶又問來僧敗葉堆雲朝離何處曰觀音師曰觀音脚跟下一句作麼生道曰適來相見了也師曰相見底事作麼生其僧無對師曰第二上座代參頭道看亦無對師曰彼此相鈍置室中問僧栗棘蓬你作麼生吞金剛圈你作麼生透一日七人新到師問陣勢既圓作家戰將何不出陣與楊岐相見僧以坐具便打師曰作家僧又打師曰一坐具兩坐具又作麼生僧擬議師背面立僧又打師曰你道楊岐話頭落在甚處僧指面前曰在這裏師曰三十年後遇明眼人不得錯舉好且坐喫茶翠巖可真禪師慈明問如何是佛法大意師曰無雲生嶺上有月落波心明嗔目喝曰頭白齒豁猶作這箇見解如何脫離生死師悚然求指示明曰汝問我師理前語問之明震聲喝曰無雲生嶺上有月落波心師於言下大悟師語南禪師曰我他日十字街頭作箇粥飯主人有僧自黃檗來我必勘之南公曰何必他日我作黃檗僧汝今試問師便問近離甚處曰黃檗師曰見說堂頭老子脚跟不點地是否曰上座何處得這消息來師曰有人傳至南公笑曰却是汝脚跟不點地師亦大笑而去靈隱德章禪師師初住大相國寺西經藏院仁宗詔師於延春閣下齋宣普照大師問如何是當機一句師曰一言迥出青霄外萬仞峰前嶮處行曰作麼生是嶮處行師便喝曰皇帝面前何得如此後再宣入化成殿齋宣守賢問齋筵大啟如何報答聖君師曰空中求鳥跡曰意旨如何師曰水內覓魚踪大寧道寬禪師僧問飲光正見為甚拈花却微笑師曰忍俊不禁問既是一真法界為甚麼有千差萬別師曰根深葉盛曰未審還出得這箇也無師曰弄巧成拙道吾悟真禪師示眾舉洞山云五臺山上雲蒸飯佛殿階前狗尿天旛竿頭上煎䭔子三箇猢猻夜簸錢老僧即不然三面貍奴脚踏月兩頭白牯手拏煙戴冠碧兔立庭柏脫殻烏龜飛上天老僧葛藤盡被汝諸人覰破了也洞山老人甚是奇特雖然如是只行得三步四步且不過七跳八跳且道誵訛在甚麼處老僧今日不惜眉毛一時布施良久曰丁寧損君德無言真有功任從滄海變終不為君通師臥病院主問和尚近日尊候如何師曰粥飯頭不得氣力良久曰會麼曰不會師曰老鼠尾上帶研椎數人新到禮拜師曰總是浙裏師僧曰猢猻向火師曰𨁝跳作麼僧曰今日得見和尚師曰伏惟尚饗僧無語師便打師在慈明會裏一日提螺螄一籃遶院行云賣螺螄令眾下語皆不契有一老宿揭簾見以目顧視師放身便臥師放籃子便行越州姜山方禪師僧問奔流度刃疾𦦨過風未審姜山門下還許借借也無師曰天寒日短夜更長曰錦帳繡鴛鴦行人難得見師曰髑髏裏面氣衝天僧召和尚師曰雞頭鳳尾曰諸方泥裏洗姜山畫將來師曰姜山今日為客且望闍黎善傳雖然如是不得放過乃拍禪牀一下興教院坦禪師師住興教有雪竇化主省宗出問諸佛未出世人人鼻孔撩天出世後為甚麼杳無消息師曰雞足峰前風悄然宗曰未在更道師曰大雪滿長安宗曰誰人知此意令我憶南泉拂袖歸眾更不禮拜師曰新興教今日失利便歸方丈令人請宗至師曰適來錯祗對一轉語人天眾前何不禮拜葢覆却宗曰大丈夫膝下有黃金爭肯禮拜無眼長老師曰我別有語在宗乃理前語至未在更道處師曰我有三十棒寄與打雪竇宗禮拜西余淨端禪師師始見弄師子發明心要往見龍華蒙印可遂旋里合綵為師子皮時被之因號端師子丞相章惇慕其道躬請開法吳山化風盛播開堂日僧宣疏至七軸之蓮經未誦一聲之漁父先聞師止之遂登座拈香祝聖罷引聲吟曰本是瀟湘一釣客自西自東自南北大眾雜然稱善師顧笑曰諦觀法王法法王法如是便下座一日章丞相留飯師瞋說偈曰章惇章惇請我看墳我却喫素汝却喫葷惇為大笑又因惇請供賺下餛飩師偈曰腥餛飩素餛飩滿碗盛來渾圇吞垃圾打從灘上過龍宮海藏自分明惇赴召別師師曰且為愛護佛法惇曰不興不廢愛護佛法也師令侍者取糖與相公送路喫糖次師問甜麼惇曰甜師曰甜便住惇一笑遂起師到華亭眾請上堂靈山獅子雲間哮吼佛法無可商量不如打箇筋斗便下座問羚羊未掛角時如何師曰怕曰既是善知識因何却怕師曰山僧不曾見恁麼差異畜生師抵鄣南見上方超和尚有一尼來參師曰待來日五更三點入來師侵早紅粉搽面而坐尼入見驚而遂悟天寧道楷禪師師謁投子於海會乃問佛祖言教如家常茶飯離此之外別有為人處也無子曰汝道寰中天子勑還假堯舜禹湯也無師方擬進語子以拂子摵師口曰汝發意來早有三十棒也師即開悟再拜便行子曰且來闍黎師不顧子曰汝到不疑之地耶師以手掩耳後作典座子曰廚務勾當不易師曰不敢子曰煑粥耶蒸飯耶師曰人工淘米著火行者煑粥蒸飯子曰汝作甚麼師曰和尚慈悲放他閒去一日侍投子遊菜園子度拄杖與師師接得便隨行子曰理合恁麼師曰與和尚提鞋挈杖也不為分外子曰有同行在師曰那一人不受教子休去至晚問師早來說話未盡師曰請和尚舉子曰卯生日戌生月師即點燈來子曰汝上來下去總不徒然師曰在和尚左右理合如此子曰奴兒婢子誰家屋裏無師曰和尚年尊缺他不可子曰得恁麼慇懃師曰報恩有分示眾略曰夫出家者為厭塵勞求脫生死休心息念斷絕攀緣遇聲遇色如石上栽花見利見名如眼中著屑無始以來此等不是不曾經歷何須苦苦貪戀如今不歇更待何時能盡今時更有何事若得心中無事佛祖猶是冤家一切世事自然冷淡方始那邊相應你不見隱山至死不肯見人趙州至死不肯告人匾擔拾橡栗為食大梅以荷葉為衣紙衣道者祇披紙玄泰上座祇著布石霜置枯木堂與人坐臥祇要死了你心投子使人辦米同煑共餐要得省取你事且從上諸聖有如此榜樣若無長處如何甘得諸仁者若也於斯體究的不虧人若也不肯承當向後深恐費力山僧今日向諸人說家門已是不著便豈可更去陞堂入室拈槌豎拂張眉努目東棒西喝如癎病發相似不見達摩西來少室山下面壁九年二祖至於立雪斷臂可謂受盡艱辛然而達摩不曾措一辭二祖不曾問著一句喚達摩作不為人得麼喚二祖作不求師得麼靈隱玄本禪師師見僧看經乃問看甚麼經僧無語乃示頌曰看經不識經徒勞損眼睛欲得不損眼分明識取經慧林宗本圓照禪師神宗最重師嘗召對師翛然自如無所加損出都日王公貴人送者車騎相屬師誨之曰歲月不可把玩老病不與人期惟勤修勿怠是真相為聞者莫不感動長蘆應夫禪師上堂召眾曰江山繞檻宛如水墨屏風殿閣凌空麗若神仙洞府森羅萬象海印交參一道神光更無遮障諸人還會麼良久曰寥寥天地間獨立望何極參佛日智才禪師上堂城裏喧繁空山寂靜然雖如此動靜一如死生不二四時輪轉物理湛然夏不去而秋自來風不涼而人自爽今也古也不改絲毫誰少誰多身無二用諸禪德既身無二用為甚麼龍女現十八變君不見弄潮須是弄潮人珍重上堂風雨蕭騷塞汝耳根落葉交加塞汝眼根香臭叢雜塞汝鼻根冷熱甘甜塞汝舌根衣緜溫冷塞汝身根顛倒妄想塞汝意根諸禪德直饒汝飜得轉也是平地骨堆參上堂舉柏樹子話師曰趙州庭柏說與禪客黑漆屏風松欏亮隔開聖棲禪師開堂垂語曰選佛場開人天普會莫有久歷覺場罷參禪客出來相見時有僧出師曰作家作家僧曰莫著忙師曰元來不是作家僧提起坐具曰看看摩竭陀國親行此令師曰祇今作麼生僧禮拜師曰龍頭蛇尾法雲寺法秀禪師師習圓覺華嚴妙入精義而頗疑禪宗聞懷禪師法席之盛徑往參謁懷問座主講何經師曰華嚴曰華嚴以何為宗師曰法界為宗曰法界以何為宗師曰以心為宗曰心以何為宗師無對懷曰毫𨤲有差天地懸隔汝當自看必有發明後聞僧舉白兆參報慈情未生時如何慈曰隔師忽大悟住真州長蘆眾千人有全椒長老至登座眾目笑之無出問者師出拜趨問如何是法秀自己椒笑曰秀鐵面乃不識自己乎師曰當局者迷一眾服其荷法心長蘆福長老道眼不明常將所得施利舟載往上江齋僧師聞之往驗其虗實適至見福上堂云入荒田不揀可煞顢頇信手拈來草猶較些子便下座師大驚曰說禪如此誰道不會乃謂諸方生滅也遂躬造方丈禮謁具說前事仍請益提唱之語福為依文解義師曰若如此諸方不漫道你不會禪福不肯師曰請打鐘集眾有法秀上座在此與和尚理會福休去李伯時善畫馬師呵曰汝士大夫以畫名矧又畫馬期人誇妙妙入馬腹中亦足懼也伯時遂絕筆師勸畫觀音贖過黃魯直工豓詞師亦詆呵之魯直笑曰又當置我馬腹耶師曰汝以豓語動天下人淫心不止馬腹正恐生泥犂耳黃竦然悔謝遂勵精求道禮部楊傑無為居士公歷參諸名宿晚從天衣遊衣每引老龐機語令參究深造後奉祠太山一日雞初鳴覩日如盤涌忽大悟乃別老龐偈曰男大須婚女大須嫁討甚閒工夫更說無生話書寄衣衣稱善會芙蓉楷禪師公曰與師相別幾年蓉曰七年公曰學道來參禪來蓉曰不打這鼓笛公曰恁麼則空游山水百無所能也蓉曰別來未久善能高鑒公大笑公有辭世偈曰無一可戀無一可捨太虗空中之乎者也將錯就錯西方極樂慈雲慧禪師上堂片月浸寒潭微雲滿空碧若於達道人好箇真消息還有達道人麼微雲穿過你髑髏片月觸著你鼻孔珍重黃龍祖心晦堂禪師居士吳敦夫自謂多見知識心地明淨偶閱鄧隱峰傳見其倒卓化去而衣亦順身不褪忽疑之曰彼化之異故莫測而衣亦順之何也以問師師曰汝今衣順垂於地復疑之乎曰無所疑也師笑曰此既無疑則彼倒化衣亦順體何疑之有哉敦夫言下開解師過法昌遇禪師遇問曰承聞和尚造草堂已畢工否師曰已畢工曰幾工師曰止用數百工遇恚曰大好草堂師拊掌笑曰且要天下人疑著師於南公圓寂之日作偈曰昔人去時是今日今日依前人不來今既不來昔不往白雲流水空徘徊誰云秤尺平直中還有曲誰云物理齊種麻還得粟可憐馳逐天下人六六元來三十六寶峰克文真淨禪師師坐夏大溈聞舉僧問雲門佛法如水中月是否門曰清波無透路師乃領解往見黃龍不契却曰我有好處這老漢不識我遂往香城見順和尚順問甚處來師曰黃龍來曰黃龍近日有何言句師曰黃龍近日州府委請黃檗長老龍垂語云鐘樓上念讚牀脚下種菜有人下得語契便往住持勝上座云猛虎當路坐龍遂令去住黃檗順不覺云勝上座祇下得一轉語便得黃檗住佛法未夢見在師於言下大悟方知黃龍用處遂回見黃龍問甚處來師曰特來禮拜和尚龍曰恰值老僧不在師曰向甚麼處去龍曰天台普請南嶽遊山師曰恁麼則學人得自在去也龍曰脚下鞋甚處得來師曰廬山七百五十文唱得龍曰何曾得自在師指鞋曰何嘗不自在龍異之一日龍曰適令侍者捲簾問渠捲起簾時如何曰照見天下放下簾時如何曰水泄不通不捲不放時如何侍者無語汝作麼生師曰和尚替侍者下涅槃堂始得龍喝曰關西人果無頭腦乃顧旁僧師指之曰只這僧也未夢見龍大笑問講師曰火災起時山河大地皆被焚盡世間虗空是否曰教有明文安有不是之理師曰如許多灰燼將置何處講師笑曰不知師亦笑曰汝所講者紙上語耳劉宜翁嘗參佛印頗自負一日見師便問長老寫戲來得幾年師曰專候樂官來曰我不入這保社師曰爭奈即今在這場子裏劉擬議師拍手曰蝦蟆禪祇跳得一跳又坐次劉指禪衣曰喚作甚麼師曰禪衣曰如何是禪師乃抖擻曰抖擻不下劉無語師打一下曰你伎倆如此敢勘老僧耶錢弋郎中訪師談久錢如廁師令侍者引從西邊去錢遽曰既是東司為甚麼向西去師曰多少人向東邊討師報謁錢有獒逸出師避之錢戲曰禪者教誨龍虎乃畏狗乎師應聲曰易伏隈巖虎難降護宅龍錢嘉之南康諸山相會佛印後至師問曰雲居來何遲曰為著草鞋從歸宗肚裏過所以遲師曰却被歸宗吞了曰爭奈吐不出師曰吐不出即屙出僧問如何是道師曰寶公云若欲將心求佛道問取虗空始出塵汝今求佛道虗空向汝道甚麼其僧於是大悟於言下僧問如何是佛師呵呵大笑曰何哂之有師曰笑你隨語生解曰偶然失利師喝曰不得禮拜僧便歸眾師復笑曰隨語生解僧問有一人欲出長安有一人欲入長安未審那箇在先師曰多少人疑著曰不許夜行師曰蚊子錐鐵牛曰山頂老猿啼古木渡頭新鴈下平沙師曰長安人已入你合作麼生曰春日華山青師曰這僧雖然後生却可與商量僧問雲門大師欲一棒打殺釋迦老子和尚又欲糞掃堆裏殺雲門未審和尚罪過還許學人點檢也無師曰且莫造次曰和尚坐斷廬山為甚麼不識某甲這話師曰三十棒曰關師曰點曰劄師曰念汝做街坊師室中問僧云了也未僧云未了師云你喫粥了也未僧云了師云又道未了復云門外甚麼聲僧云雨聲師云又道未了復云面前是甚麼僧云屏風師云又道未了復云還會麼僧云不會乃云聽取一頌隨緣事事了日用何欠少一切但尋常自然不顛倒上堂裩無襠袴無口頭上青灰三五斗趙州老子少賣弄然則國清才子貴家富小兒驕其奈禾黍不陽豓競栽桃李春飜令力耕者半作賣花人隆慶院慶閒禪師師父事黃龍龍甚重之時與翠巖順公同在黃檗順時時詰問師師橫機無所讓順謂龍曰閒輕易且語未辨觸淨龍曰法應如是以情求閒乃成是非既龍過雙嶺師謁龍龍問甚處來師曰百丈曰幾時離彼師曰正月十三龍曰脚跟好痛與三十棒師曰非但三十棒龍喝曰許多時行脚無點氣息師曰百千諸佛亦乃如是龍曰汝與麼來何曾有纖毫到諸佛境界師曰諸佛未必到慶閒境界龍隨問如何是汝生緣處師曰早晨喫白粥如今又覺飢問我手何似佛手師曰月下弄琵琶問我脚何似驢脚師曰鷺鷥立雪非同色龍咨嗟而視曰汝剃除鬚髮當為何事師曰祇要無事龍曰既無事何須剃髮師曰若不剃髮爭知無事曰與麼則數聲清磬是非外一箇閒人天地間也師曰是何言歟曰靈利衲子師曰也不消得龍便喝師拍一拍龍又喝師便出復侍次龍曰此間有辨上座者汝著精彩師曰他有甚麼長處曰他拊汝背一下又如何師曰作甚麼曰他展兩手師曰甚處學這虗頭來龍大笑師却展兩手龍喝師便出齋後又侍立龍問𢤱𢤱鬆鬆兩人共一椀作麼生會師曰百雜碎曰盡大地是箇須彌山撮來掌中汝又作麼生會師曰兩重公案曰這裏從汝胡言漢語若到同安如何過得師曰渠也須到這箇田地始得曰忽被渠指火罏曰這箇是黑漆火罏那箇是黑漆香桌甚處是不到處師曰慶閒面前且從恁麼說話若是別人笑和尚去龍拍一拍師便喝明日同看僧堂曰好僧堂師曰極好工夫曰好在甚處師曰一梁拄一柱曰此未是好處師曰和尚又作麼生龍以手指曰這柱得與麼圓那枋得與麼匾師曰人天大善知識須是和尚始得便出龍出堂外曰適來與麼是肯你不肯你師曰若與麼何曾得安樂處師上方丈問訊龍曰據汝知見祇得上梢不得下梢師曰某甲上梢亦得下梢亦得曰如何是上梢師曰風過樹頭搖曰如何是下梢師曰刀斫斧鑿龍曰老僧即不然師曰如何是上梢曰頭鬅鬙耳卓朔曰如何是下梢曰緊帩草鞋師曰謝師答話龍便喝明日侍立龍問得坐披衣向後如何施設師曰遇方即方遇圓即圓曰汝與麼說話猶帶唇齒在師曰慶閒即與麼和尚作麼生曰近前來為汝說師拊掌曰三十年用底今朝捉敗龍大笑曰一等是精靈師拂袖而去由是學者爭歸之泐潭洪英禪師有僧禮拜起便垂下袈裟角曰脫衣卸甲時如何師曰喜得狼煙息弓弰壁上懸僧却攬上袈裟曰重整衣甲時如何師曰不到烏江畔知君未肯休僧便喝師曰驚殺我僧拍一拍師曰也是死中得活僧禮拜師曰將謂是收燕破趙之才元來是販私鹽漢雙嶺順禪師問菴中老師好問學者併却咽喉唇吻道取一句首座曾道得麼師乾笑已而有偈曰阿家嘗醋三尺喙新婦洗面摸著鼻道吾答話得腰裩玄沙開書是白紙順公屈服黃檗積翠永菴主師問僧審奇汝久不見何所為奇曰見偉藏主有箇安樂處師曰舉似我奇敘所得師曰汝是偉未是奇莫測以語偉偉曰汝非永不非奇走積翠質之南公南亦大笑師聞作偈曰明暗相參殺活機大人境界普賢知同條生不同條死笑倒菴中老古錐白雲守端禪師師參楊岐岐一日忽問受業師為誰師曰茶陵郁和尚岐曰吾聞伊過橋遭攧有省作偈甚奇能記否師誦曰我有明珠一顆久被塵勞關鎖今朝塵盡光生照破山河萬朵岐笑而趨起師愕然通夕不寐黎明咨詢之適歲暮岐曰汝見昨日打敺儺者麼曰見岐曰汝一籌不及渠師復駭曰何謂也岐曰渠愛人笑汝怕人笑師大悟示眾明明知道只是這箇為甚麼透不過只為見人開口時便喚作言句見人閉口時便喚作良久默然又道動展施為開言吐氣盡十方世界內無不是自己所以墮在塗中隱隱猶懷近日嫌豈不見雲門道聞聲悟道見色明心遂舉手云觀世音菩薩將錢來買胡餅放下手云元來却是饅頭又不見山僧在法華時嘗示眾云無業禪師道一毫頭聖凡情念未盡未免入驢胎馬腹裏去大眾直饒一毫頭聖凡情念頓盡亦未免入驢胎馬腹裏去瞎漢但恁麼看取參示眾曰此事如萬仞崖頭相似總知道放著手便撲到底只是捨命不得法華今日不動一毫頭教諸人到底去也擲拄杖下座保寧仁勇禪師僧問如何是佛師曰近火先焦曰如何是道曰泥裏有刺曰如何是道中人曰切忌踏著上堂有手脚無背面明眼人看不見天左旋地右轉拍膝云西風一陣來落葉兩三片示眾云釋迦老子四十九年說法不曾道著一字優波毱多丈室盈籌不曾度得一人達摩不居少室六祖不住曹溪彼自無瘡勿傷之也拍膝顧眾云且喜得天下太平師云一是一二是二三是三四是四數目甚分明上下依資次依資次有何事以拄杖畫一畫云大眾一時亂却六十甲子了也示眾曰三界唯心萬法唯識檻外雲生簷前雨滴㵎水湛如藍山花開似錦此時若不究根源直待當來問彌勒比部孫居士因楊岐來訪值視斷次士曰某為王事所牽何由免難岐指曰委悉得麼士曰望師點破岐曰此是比部弘願深廣利濟羣生士曰未審如何岐示以偈曰應現宰官身廣弘悲願深為人重指處棒下血淋淋士於此有省寶峰闡提惟照禪師示聰藏主法語五則一曰曹山立四禁盡衲僧命脈透得過切忌依倚將來了事人須別有生機一路二曰衲僧向異類中行履先德道異類墮此了事人病明安道須是識主始得三曰闡提尋常向人道不得參禪不得學佛只要伊如大死人只恐聞此語作無事會作無法可當情會正是死不得若是死得決不肯作這般見解他時為人切宜仔細四曰吾家立五位為宗往往人以理事明以寂照會以能所見以體用解盡落今時何得名為教外別傳之妙生死路頭那箇是得處總不恁麼時如何卜度即不中五曰有情故情滲漏有見故見滲漏有語故語滲漏設得見無情無語無拽住便問他你是何人上堂過去諸佛已入涅槃了也汝等諸人不應追念未來諸佛未出於世汝等諸人不要妄想正當今日你是何人上堂本自不生今亦無滅是死不得底樣子當處出生隨處滅盡是活生受底規模大丈夫漢直須處生死流臥荊棘林俯仰屈伸隨機施設能如是也無量方便莊嚴三昧大解脫門蕩然頓開其或未然無量煩惱一切塵勞嶽立面前塞却古路雪下僧問祖師西來即不問時節因緣事若何師曰一片兩片三四片落在眼中猶不薦石門元易禪師上堂十方同聚會箇箇學無為此是選佛場心空及第歸大眾祇如聞見覺知未嘗有間作麼生說箇心空底道理莫是見而不見聞而不聞謂之心空耶錯莫是忘機息慮萬法俱捐銷能所以入元宗泯性相而歸法界謂之心空耶錯恁麼也不得不恁麼也不得恁麼不恁麼總不得未審畢竟作麼生還會麼良久曰若實無為無不為天堂地獄長相隨三尺杖子攪黃河八臂那吒冷眼窺無限魚龍盡奔走捉得循河三脚龜脫取殻鐵錐錐吉凶之兆便分輝借問東村白頭老吉凶未兆若何為休休休古往今來春復秋白日騰騰隨分過更嫌何處不風流咄資聖南禪師聖節上堂顧視左右曰諸人還知麼夜明簾外之主萬化不渝瑠璃殿上之尊四臣不昧端拱而治不令而行壽逾百億須彌化洽大千沙界且道正恁麼時如何行履野老不知黃屋貴六街慵聽靜鞭聲法雲善本大通禪師僧問寶塔原無縫如何指示人師曰煙霞生背面星月遶簷楹曰如何是塔中人師曰竟日不干清世事長年占斷白雲鄉曰向上更有事也無師曰太無厭生師所至見佛菩薩行立之像不敢坐伊蒲塞饌以魚胾名者不食其真誠應事防心離過類如此壽州資壽巖禪師僧問大藏經中還有奇特事也無師曰祇恐汝不信曰如何即是師曰黑底是墨黃底是紙曰謝師答話師曰領取鉤頭意莫認定盤星上堂乾坤肅靜海晏河清風不鳴條雨不破塊春生夏長秋收冬藏這箇是世間法作麼生是佛法良久曰欲得不招無間業莫謗如來正法輪投子修顒禪師師參慧林因喫攧有省作偈曰這一交這一交萬兩黃金也合消頭上笠腰下包清風明月杖頭挑富鄭公因趙清獻公警發不捨晝夜力進此道謁師於投子會師方為眾登座富見師左右顧視忽有省因執弟子禮趨函丈命侍者請為入室師見即曰相公已入來富弼猶在外富聞汗流浹背即大悟清獻公趙抃字悅道公年四十餘擯去聲色繫心宗教會佛慧來居衢之南禪公日親之慧未嘗容措一詞後典青州政事之餘多宴坐忽大雷震驚即契悟作偈曰默坐公堂虗隱几心源不動湛如水一聲霹𮦷頂門開喚起從前自家底慧聞笑曰趙悅道撞彩耳公嘗自題偈齋中曰腰佩黃金已退藏箇中消息也尋常世人欲識高齋老祇是柯村趙四郎復曰切忌錯認臨終遺書佛慧有曰非師平日警誨至此必不得力矣黃龍死心悟新禪師師初謁棲賢秀鐵面秀問上座甚處人師曰廣南韶州又問曾到雲門否師曰曾到又問曾到靈樹否師曰曾到秀曰如何是靈樹枝條師曰長底自長短底自短秀曰廣南蠻莫亂統師曰向北驢只恁麼拂袖而出秀器之而師無留意至黃龍謁晦堂堂豎拳問曰喚作拳頭則觸不喚作拳頭則背汝喚作甚麼師罔措經二年方領解然尚談辯無所牴牾堂患之偶與語至其銳堂遽曰住住說食豈能飽人師窘乃曰某到此弓折箭盡望和尚慈悲指箇安樂處堂曰一塵飛而翳天一芥墮而覆地安樂處正忌上座許多骨董直須死却無量劫來識心乃可耳師趨出一日聞知事捶行者而迅雷忽震即大悟趨見晦堂忘納其屨即自譽曰天下人總是參得底禪某是悟底堂笑曰選佛得甲科何可當也因號死心叟謁法昌遇禪師遇問近離甚處師曰某甲自黃龍來遇曰還見心禪師麼師曰見遇曰甚麼處見師曰喫粥喫飯處見遇插火箸於罏中曰這箇又作麼生師搜脫火箸便打王正言問嘗聞三緣和合而生又聞即死即生何故有奪胎而生者師曰如正言作漕使隨所住處即居其位還疑否王曰不疑師曰復何疑也王於言下領解師住翠巖時翠巖有淫祠鄉人禳禬酒胾無虗日師誡知事令毀之知事辭以不敢掇禍師曰使能作禍吾自當之乃躬自毀拆俄有巨蟒盤臥內引首作吞噬之狀師叱之蟒遁安寢無他領雲巖建經藏太史黃庭堅為作記有以其親墓志䥴於陰者師罵曰凌侮不避禍若是語未卒電光翻屋雷擊自戶入析其陰中分之視之志已灰燼而藏記安然無損晚屬疾退居晦堂夜參豎起拂子云看看拂子病死心病拂子安死心安拂子穿却死心死心穿却拂子正當恁麼時喚作拂子又是死心喚作死心又是拂子畢竟喚作甚麼良久云莫把是非來辨我浮生穿鑿不相關有乞末後句者師示偈曰末後一句子直須心路絕六根門既空萬法無生滅於此徹其源不須求解脫平生愛罵人只為長快活泐潭草堂清禪師上堂色心不異彼我無差豎起拂子曰若喚作拂子入地獄如箭不喚作拂子有眼如盲直饒透脫兩頭也是黑牛臥死水太史山谷黃庭堅居士士初謁秀圓通語具圓通章自是遂著發願文痛戒酒色日惟朝粥午飯銳志參求既依晦堂乞指徑捷處堂曰祗如仲尼道二三子以我為隱乎吾無隱乎爾者太史居常如何理論公擬對堂曰不是不是公迷悶不已一日同堂山行次時巖桂盛開堂曰聞木樨花香麼公曰聞堂曰吾無隱乎爾公釋然即拜之曰和尚得恁麼老婆心切堂笑曰祗要公到家耳久之謁死心新禪師隨眾入室心見張目問曰新長老死學士死燒作兩堆灰向甚麼處相見公無語心約出曰晦堂處參得底使未著在後左官黔南道力愈勝於無思念中頓明死心所問報以書曰往年嘗蒙苦苦提撕長如醉夢依稀在光影中蓋疑情不盡命根不斷故望崖而退耳謫官在黔南道中晝臥覺來忽爾尋思被天下老和尚瞞了多少惟有死心道人不肯乃是第一相為也祕書吳恂德夫居士士參晦堂堂謂曰平生學解記憶多聞即不問你父母未生已前道將一句來公擬議堂以拂子擊之即領深旨連呈三偈其後曰咄這多知俗漢齩盡古今公案忽於狼藉堆頭拾得𧏙螂糞彈明明不直分文萬兩黃金不換等閒拈出示人祇為走盤難看兜率從悅禪師師初首眾於道吾領數衲謁雲葢智和尚智與語未數句盡知所蘊乃笑曰觀首座氣質不凡奈何出言吐氣如醉人耶師面熱汗下曰願和尚不吝慈悲智復與語錐劄之師茫然遂求入室智曰曾見法昌遇和尚否師曰曾看他語錄自了可也不願見之智曰曾見洞山文和尚否師曰關西子沒頭惱拖一條布裙作尿臭氣有甚長處智曰你但向尿臭氣處參取師依教即謁洞山深領奧旨復謁智智曰見關西子後大事如何師曰若不得和尚指示洎乎蹉過一生遂禮謝師復謁真淨後出世鹿苑有清素者久參慈明寓居一室未始與人交師因食蜜漬茘枝偶素過門師呼曰此老人鄉果也可同食之素曰自先師亡後不得此食久矣師曰先師為誰素曰慈明也某忝執事十三年耳師乃疑駭曰十三年堪忍執事之役非得其道而何遂饋以餘果稍稍親之素問師所見者何人曰洞山文素曰文見何人師曰黃龍南素曰南匾頭見先師不久法道大振如此師益疑駭遂袖香詣素作禮素起避之曰吾以福薄先師受記不許為人師益恭素乃曰憐子之誠違先師之記子平生所得試語我師具通所見素曰子之所見可以入佛而不能入魔師曰何謂也素曰豈不見古人道末後一句始到牢關如是累日素乃印可仍戒之曰文示子者皆正知正見然子離師太早不能盡其妙吾今為子點破使子受用得大自在他日切勿嗣吾也師後嗣真淨如素所戒師室中設三語以驗學者一曰撥草瞻風祇圖見性即今上人性在甚麼處二曰識得自性方脫生死眼光落地時作麼生脫三曰脫得生死便知去處四大分離向甚麼處去泐潭湛堂文準禪師初雲巖虗席郡牧命死心禪師舉所知心曰準山主住得某未嘗識渠見有洗鉢頌甚好牧請舉心舉云之乎者也衲僧鼻孔大頭向下若也不會問取東村王大姐牧奇之因請主雲巖一日新到相看展坐具師曰未得人事上座近離甚處曰廬山歸宗師曰宗歸何處曰嗄師曰蝦蟆窟裏作活計曰和尚何不領話師曰是你豈不從歸宗來曰是師曰驢前馬後漢問第二上座近離甚處曰袁州師曰夏在甚處曰仰山師曰還見小釋迦麼曰見師曰鼻孔長多少僧擬議師曰話墮阿師問僧你來作甚麼曰特來問訊和尚師曰雲在嶺頭閒不徹水流㵎下太忙生曰和尚莫瞞人師曰馬大師為甚麼從闍黎脚跟下走過僧無語師曰却是闍黎瞞老僧一日法堂上逢首座便問向甚麼處去座曰擬與和尚商量一事師曰便請曰東家杓柄長西家杓柄短師曰為甚拈起鞏縣茶瓶却是饒州磁碗曰臨崖看滸眼特地一場愁師叫屈座吐舌而退僧問教中道若有一人發真歸源十方虗空悉皆銷隕未審此理如何師遂展掌點指曰子丑寅卯辰巳午未一羅二土三水四金五太陽六太陰七計都今日計都星入巨蟹宮寶峰不打這鼓笛便下座示眾云鑽珍珠解玉板却易看窟籠著楔却難月色和雲白松聲帶露寒即不問你諸人且道大目犍連共須菩提商量箇甚麼事清涼洪範慧禪師師示眾曰靈源禪師謂予曰道人保養如人病須服藥藥之靈驗易見要須忌口乃可不然服藥何益生死是大病佛祖言教是良藥汙染心是雜食不能忌之生死之病無時而損也予愛其言追念圓覺經曰末世諸眾生心不生虗妄佛說如是人現世即菩薩法句經曰若起精進心是妄非精進但能心不妄精進無有涯南嶽思大禪師悟入法華三昧即誦曰是真精進是名真法供養汾陽大達國師一生答學者之問但曰莫妄想是謂稱性之語見道徑門而禪者易其言反求元妙良可笑也尊勝有朋講師師嘗疏楞嚴維摩等經學者宗之每疑祖師直指之道故多與禪衲遊一日謁開元跡未及閫心忽領悟開元出遂問座主來作甚麼師曰不敢貴耳賤目開元曰老老大大何必如是師曰自是者不長開元曰朝看華嚴夜讀般若則不問如何是當今一句師曰日輪正當午開元曰閒言語更道來師曰平生仗忠信今日任風波然雖如是祗如和尚恁麼道有甚交涉須要新戒草鞋穿開元曰這裏且放你過忽遇達摩問你作麼生道師便喝開元曰這座主今日見老僧氣衝牛斗師曰再犯不容開元拊掌大笑五祖法演禪師師至白雲舉僧問南泉摩尼珠話請問雲叱之師領悟獻投機偈曰山前一片閒田地叉手叮嚀問祖翁幾度賣來還自買為憐松竹引清風雲特印可令掌磨事一日有僧見磨轉遽指以問師曰此神通耶法爾耶師褰衣旋磨一匝僧無語未幾雲至語師曰有數禪客自廬山來皆有悟入處教伊說亦說得有來由舉因緣問伊亦明得教伊下語亦下得祗是未在師於是大疑私自計曰既悟了說亦說得明亦明得如何却未在遂參究累日忽然省悟從前寶惜一時放下走見白雲雲為手舞足蹈師亦一笑而已師後曰吾因茲出一身白汗便明得下載清風雲一日示眾曰古人道如鏡鑄像像成後鏡在甚麼處眾下語不契舉以問師師近前問訊曰也不較多雲笑曰須是道者始得乃命分座問如何是佛師曰露胸跣足曰如何是法師曰大赦不放曰如何是僧師曰釣魚船上謝三郎圓悟一日請益臨濟四賓主師曰也祗箇程限是甚麼閒事又云我這裏却似馬前相撲倒便休師謂圓悟曰你也儘好只是有些病悟再三請問不知某有甚麼病師云只是禪忒多悟云本為參禪因甚麼却嫌人說禪師云只似尋常說話時多少好時有僧便問因甚嫌人說禪師云惡情悰師一日問圓悟無縫塔話悟罔然直從方丈至三門方道得師云你道得也悟云不然暫時不在便不堪也三佛一日相謂曰老和尚祗是乾𪹼𪹼地往往說心說性不得因請益佛身無為不墮諸數師曰譬如清淨摩尼寶珠映於五色五色是數摩尼是佛身圓悟謂二老曰他大段會說我輩說時費多少工夫他祗一兩句便了分明是箇老大蟲師聞之乃曰若說心說性便是惡口又曰猫有歃血之功虎有起屍之德所謂驅耕夫之牛奪飢人之食若不如是盡是弄泥團漢示眾將四大海水為一枚硯須彌山作一管筆有人向虗空裏寫祖師西來意五字太平下座大展坐具禮拜為師若寫不得佛法無靈驗有麼有麼便下座大眾散師高聲云侍者者應諾師曰收取坐具復問侍者云收得坐具麼者提起坐具師曰我早知汝恁麼也上堂汝等諸人見老和尚鼓動唇吻豎起拂子便作勝解及乎山禽聚集牛動尾巴却將作等閒殊不知簷聲不斷前旬雨電影還連後夜雷上堂山僧昨日入城見一棚傀儡不免近前看或見端嚴奇特或見醜陋不堪動轉行坐青黃赤白一一見了仔細看時元來青布幔裏有人山僧忍俊不禁乃問長史高姓他道老和尚看便了問甚麼姓大眾山僧被他一問直得無言可對無理可伸還有人為山僧道得麼昨日那裏落節今日這裏拔本師垂語曰譬如水牯牛過窗櫺頭角四蹄都過了因甚尾巴過不得室中常問僧倩女離魂那箇是真底示眾云每日起來拄却臨濟棒吹雲門曲應趙州拍擔仰山鍬驅溈山牛耕白雲田七八年來漸成家活更告諸公每人出一隻手相共扶助唱歸田樂麤羮淡飯且恁麼過何也但願今年蠶麥熟羅睺羅兒與一文僧問牛頭未見四祖時如何曰頭上戴纍垂云見後如何曰青布遮前云未見四祖時為甚麼百鳥㗸花獻曰富與貴是人之所欲云見後為甚麼百鳥不㘅花獻曰貧與賤是人之所惡問一代時教是箇切脚未審切那箇字師曰鉢囉娘天童正覺禪師師至汝州香山成枯木一見深所器重一日聞僧誦蓮經至父母所生眼悉見三千界瞥然有省即詣丈室陳所悟香山指臺上香合曰裏面是甚麼物師曰是甚麼心行香山曰汝悟處又作麼生師以手畫一圓相呈之復拋向後香山曰弄泥團漢有甚麼限師曰錯香山曰別見人始得師應喏喏即造丹霞丹霞問如何是空劫已前自己師曰井底蝦蟆吞却月三更不借夜明簾丹霞曰未在更道師擬議丹霞打一拂子曰又道不借師言下釋然華藥智朋禪師師依寶峰有年無省因為眾持鉢寶峰自題其像曰雨洗淡紅桃蕚嫩風搖淺碧柳絲輕白雲影裏怪石露綠水光中古木清噫你是何人至焦山枯木成禪師見之歎曰今日方知此老親見先師來師遂請益其贊成曰豈不見法眼拈夾山境話曰我二十年祇作境會師即契悟乃曰元來恁麼地成曰汝作麼生會師曰春生夏長秋收冬藏成曰直須保任師應喏寶林果昌禪師師與提刑楊次公入山同遊山次楊拈起大士飯石問既是飯石為甚麼齩不破師曰祗為太硬楊曰猶涉繁詞師曰未審提刑作麼生楊曰硬師曰也是第二月楊為寫七佛殿額乃問七佛重出世時如何師曰一回相見一回新雲葢智本禪師上堂滿口道不出句句甚分明滿目覰不見山山疊亂青鼓聲猶不會何況是鐘鳴喝一喝禾山方禪師上堂舉拂子曰看看祗這箇在臨濟則照用齊行在雲門則理事俱備在曹洞則偏正叶通在溈山則暗機圓合在法眼則何止於心然五家宗派門庭施設則不無直饒辯得倜儻分明去猶是光影邊事若要抵敵生死則霄壤有隔且超越生死一句作麼生道良久曰洎合錯下註脚空室道人智通龍圖范珣女也幼聰慧厭世相求父祝髮龍圖難之遂清修因看法界觀有省乃連作二偈見意一曰浩浩塵中體一如縱橫交互印毗盧全波是水波非水全水成波水自殊二曰物我元無異森羅鏡像同明明超主伴了了徹真空一體含多法交參帝網中重重無盡處動靜悉圓通後父母俱亡兄涓領分寧尉通偕行聞死心名重往謁之心見知其所得便問常啼菩薩賣却心肝教誰學般若通曰你若無心我也休又問一雨所滋根苗有異無陰陽地上生箇甚麼通曰一華五葉復問十二時中向甚麼處安身立命通曰和尚惜取眉毛好心打曰這婦女亂作次第通禮拜心然之政和間居金陵嘗設浴於保寧揭榜於門曰一物也無洗箇甚麼纖塵若有起自何來道取一句乃可入浴古靈祗解揩背開士何曾明心欲證離垢地時須是通身汗出盡道水能洗垢焉知水亦是塵直饒水垢頓除到此亦須洗却後為尼名惟久挂錫姑蘇之西竺雪竇持禪師上堂悟心容易息心難息得心源到處閒斗轉星移天欲曉白雲依舊覆青山石佛益禪師上堂一葉落天下秋一塵起大地收一法透萬法周且道透那一法遂喝曰切忌錯認驢鞍橋作阿爺下頷便下座中巖蘊能禪師師一日與黃提刑奕棊黃曰數局之中無一局同千著萬著則固是如何是那一著師提起棊子示之黃佇思師曰不見道從前十九路迷殺幾多人慧日安禪師僧問如何是和尚為人一句師曰狗走抖擻口曰意旨如何師曰猴愁擻𢳯頭雪竇智鑑禪師上堂世尊有密語迦葉不覆藏一夜落華雨滿城流水香大平慧懃佛鑑禪師師以惟此一事實餘二則非真味之有省乃徧參名宿往來五祖之門有年恚祖不為印據與圓悟相繼而去及悟還侍五祖得徹證而師忽至意欲他邁悟勉令挂搭且曰某與兄相別始月餘比舊相見時如何師曰我所疑者此也遂參堂一日聞祖舉僧問趙州如何是和尚家風州曰老僧耳聾高聲問將來僧再問州曰你問我家風我却識你家風了也師即大豁所疑曰乞和尚指示極則祖曰森羅及萬象一法之所印師展拜祖令掌翰墨後同圓悟語話次舉東寺和尚問仰山汝是甚處人仰山曰廣南人寺曰我聞廣南有鎮海明珠曾收得否山曰收得寺曰珠作何色山曰白月即現黑月即隱寺曰何不呈似老僧山叉手近前云慧寂昨到溈山被索此珠直得無言可對無理可伸悟顧師曰既云收得逮索此珠又云無言可對無理可伸是如何師無語忽一日謂悟曰仰山見東寺因緣我有語也東寺當時只索一顆珠仰山傾出一栲栳悟深肯之乃告之曰老兄更宜親近老和尚去師一日造方丈未及語被祖詬罵懡㦬而退歸寮閉門打睡恨祖不已悟已密知即往扣門師曰誰悟曰我師即開門悟問你見老和尚何如師曰我本不去被你賺累我遭這老漢詬罵悟呵呵大笑曰你記得前日下的語麼師曰是甚麼語悟曰你又道東寺祗索一顆仰山傾出一栲栳師當下釋然悟遂領師同上方丈祖纔見遽曰懃兄且喜大事了畢龍門清遠佛眼禪師師讀法華至是法非思量分別之所能解質其講師師不能答遂徧參至太平見五祖旋丐於廬州偶雨仆地煩懣間聞二人交相惡罵諫者曰你猶自煩惱在師於言下有省及歸凡有所問祖即曰我不如你你自會得好或曰我不會我不如你師愈疑遂咨決於元禮首座禮乃以手引師之耳繞圍罏數匝且行且語曰你自會得好師曰有冀開發乃爾相戲耶禮曰你他後悟去方知今日曲折耳太平將遷海會師慨然曰吾持鉢方歸復參隨往一荒院安能究決己事耶遂作偈告辭之蔣山坐夏邂逅靈源禪師相與甚善話次師曰比見都下一尊宿語句似有緣源曰演公天下第一宗師何故捨而事遠遊耶所謂有緣者蓋知解之師與公初心相應耳師從所勉徑趨海會後命典謁適寒夜孤坐撥罏見火如豆許恍然自喜曰深深撥有些子平生事只如此遽起閱几上傳燈錄至破竈墮因緣忽大悟作偈曰刀刀林鳥啼披衣終夜坐撥火悟平生窮神歸破墮事皎人自迷曲淡誰能和念之永不忘門開少人過示眾以迷心故山林中來見善知識將謂別有一道可令人安樂不知返究向來迷處工夫乃最第一大隨南堂元靜禪師師參永安恩於臨濟三頓棒話發明次依諸名宿無有當意者聞五祖機峻欲抑之遂謁祖祖乃曰我此間不比諸方凡於室中不要汝進前退後豎指擎拳繞禪牀作女人拜提起坐具千般伎倆祗要你一言下諦當便是汝見處師茫然退參歷三載一日入室罷祖謂曰子所下語已得十分試更與我說看師即剖而陳之祖曰說亦說得十分更與我斷看師隨所問而判之祖曰好即好祗是未得老僧說話在齋後汝可來祖爺塔所與汝一一按過始得及至彼祖便以即心即佛非心非佛睦州擔板漢南泉斬猫兒趙州狗子無佛性有佛性之語編辟之其所對了無凝滯至子胡狗話祖遽轉面曰不是師曰不是却如何祖曰此不是則和前面皆不是師曰望和尚慈悲指示祖曰看他道子胡有一狗上取人頭中取人腰下取人脚入門者好看纔見僧入門便道看狗向子胡道看狗處下得一轉語教子胡結舌老僧鈐口便是你了當處次日入室師密啟其說祖笑曰不道你不是千了百當底人此語祗似先師下底語師曰某何人得似端和尚祖曰不然老僧雖承嗣他謂他語拙蓋祗用遠錄公手段接人故也如老僧共遠錄公便與百丈黃檗南泉趙州輩把手共行纔見語拙即不堪師以為不然乃拽杖渡江適大水泛漲因留四祖儕輩挽其歸又二年祖方許可嘗商略古今次執師手曰得汝說須是吾舉得汝舉須是吾說而今而後佛祖祕要諸方關鍵無逃子掌握矣上堂有祖已來時人錯會祗將言句以為禪道殊不知道本無體因體而立名道本無名因名而立號祗如適來上座纔恁麼出來便恁麼歸眾且道具眼不具眼若道具眼纔恁麼出來眼在甚麼處若道不具眼爭合便恁麼去諸仁者於此見得倜儻分明則知二祖禮拜依位而立真得其髓祗這些子是三世諸佛命根六代祖師命脈天下老和尚安身立命處雖然如是須是親到始得有一老宿垂語云十字街頭起一間茅廝祗是不許人屙僧舉以叩師師曰是你先屙了更教甚麼人屙宿聞焚香遙望大隨拜謝無為宗泰禪師師參五祖祖舉趙州洗鉢盂話俾參洎入室舉此話問師你道趙州向伊道甚麼這僧便悟去師曰洗鉢盂去呢祖曰你祗知路上事不知路上滋味師曰既知路上事路上有甚滋味祖曰你不知耶又問你曾游浙否師曰未也祖曰你未悟在師自此凡五年不能對祖一日陞堂顧眾曰八十翁翁輥繡毬便下座師欣然出眾曰和尚試輥一輥看祖以手作打杖鼓勢操蜀音唱緜州巴歌曰豆子山打瓦鼓楊平山撒白雨白雨下取龍女織得絹二丈五一半屬羅江一半屬元武師聞大悟掩祖口曰祇消唱到這裏祖大笑而歸五祖表自禪師師依五祖最久未有省時圓悟為座元往請益悟曰兄有疑處試語我師遂舉德山小參不答話問話者三十棒悟曰禮拜著我作得你師舉話尚不會師作禮竟悟令再舉前話師曰德山小參不答話悟掩其口曰但恁麼看師出揚聲曰屈屈豈有公案祇教人看一句底道理有僧謂師曰兄不可如此說首座須有方便因靜坐體究及旬頓釋所疑詣悟禮謝悟曰兄始知吾不汝欺又詣方丈祖迎笑師榜侍者門曰東山有三句若人道得即挂搭衲子皆披靡一日有僧𢹂坐具徑造丈室謂師曰某甲道不得祇要挂搭師大喜呼維那於明窗下安排九頂清素禪師師聞五祖舉首山西來意話倏然契悟述偈曰顛倒顛顛倒顛新婦騎驢阿家牽便恁麼太無端回頭不覺布衫穿祖見乃問百丈野狐話又作麼生師曰來說是非者便是是非人祖大悅太守呂公來瞻大像問曰既是大像因甚肩負兩楹師曰船上無散工至閣下覩觀音像又問彌勒化境觀音何來師曰家富小兒嬌守乃禮敬法閃上座師久依五祖未有所入一日造室祖問不與萬法為侶者是甚麼人曰法閃即不然祖以手指曰住住法閃即不然作麼生師於是啟悟師至東林宣密度禪師席下見其得平實之旨一日拈花繞度禪牀一帀背手插香罏中曰和尚且道意作麼生度屢下語皆不契踰兩月乃令師試說之師曰某祗將花插香罏中和尚自疑有甚麼事來金陵俞道婆市油餐為業常隨眾參問瑯琊琊以臨濟無位真人話示之一日聞丐者唱蓮花落云不因柳毅傳書信何緣得到洞庭湖忽大悟以油餈投地夫曰你顛耶婆掌曰非汝境界往見瑯琊琊望之知其造詣問那箇是無位真人婆應聲曰有一無位真人六臂三頭努力瞋一擘華山分兩路萬年流水不知春圓悟蔣山開堂方至法座前婆於眾中躍出以身一拶便歸眾悟曰見怪不怪其怪自壞悟次日至其家婆不出厲聲曰這般黃口小兒也道出來開堂說法悟曰婆子少賣弄我識得你了也婆遂大笑出相見凡有僧至則曰兒兒僧擬議即掩門佛燈珣禪師往勘之婆見如前問珣曰爺在甚處婆轉身拜露柱珣即踏倒曰將謂有多少奇特便出婆蹶起曰兒兒來惜你則箇珣竟不顧頌馬祖不安因緣曰日面月面虗空閃電雖然截斷天下人舌頭分明祇道得一半石門聰和尚師在報慈聞鳩子鳴乃問僧是甚麼聲云鳩鳩聲師曰欲得不招無間業莫謗如來正法輪淨慈慧暉禪師師謁宏智智舉當明中有暗不以暗相遇當暗中有明不以明相覩問之語不契初夜定回往聖僧前燒香而宏智適至師見之頓明前話次日入室智舉堪嗟去日顏如玉却歎回時𩯭似霜詰之師曰其入離其出微自爾問答無滯智許為室中真子雪竇嗣宗禪師僧問如何是正法眼師曰烏豆問如何是君師曰磨礱三尺劍待斬不平人曰如何是臣師曰白雲閒不徹流水太忙生曰如何是君臣道合師曰雲行雨施月皎星輝問如何是正中偏師曰菱華未照前曰如何是偏中正師曰團圞無少剩曰如何是正中來師曰徧界絕纖埃曰如何是兼中至師曰齧鏃功前戲曰如何是兼中到師曰十道不通耗問如何是轉功就位師曰撒手無依全體現扁舟漁父宿蘆華曰如何是轉位就功師曰半夜嶺頭風月靜一聲高樹老猿啼曰如何是功位齊彰師曰出門不踏來時路滿目飛塵絕點埃曰如何是功位俱隱師曰泥牛飲盡澄潭月石馬加鞭不轉頭吉祥元實禪師師自到天衣早夜精勤脇不至席一日偶失笑喧眾天衣擯之中夜宿田里覩星月粲然有省曉歸趨方丈天衣見乃問洞山五位君臣如何話會師曰我這裏一位也無天衣令參堂謂侍僧曰這漢却有箇見處奈不識宗旨何入室次天衣預令行者五人分序而立師至俱召實上座師於是密契奧旨述偈曰一位纔彰五位分君臣叶處紫雲屯夜明簾卷無私照金殿重重顯至尊天衣稱善左丞范冲致虗居士公由翰苑守豫章過圓通謁旻禪師茶罷曰某行將老矣墮在金紫行中去此事稍遠通呼內翰公應諾通曰何遠之有公躍然曰乞師再垂指示通曰此去洪都有四程公佇思通曰見即便見擬思即差公豁然有省士與圓通擁罏次公問諸家因緣不勞拈出直截一句請師指示通厲聲指曰看火公急撥衣忽大悟謝曰灼然佛法無多子通喝曰放下著公應諾諾士問圓通曰是法非思量分別之所能解如何湊泊通曰全身入火聚公曰畢竟如何會通曰驀直去公沈吟通曰可更喫茶麼公曰不必通曰何不恁麼會公契旨曰元來太近通曰十萬八千公占偈曰不可思議是大火聚便恁麼去不離當處通曰咦猶有這箇在公曰乞師再垂指示通曰便恁麼去鐺是鐵鑄公頓首謝之徑山塗毒智䇿禪師師初謁寂室光灑然有省次謁大圓於萬壽圓問曰甚處來師曰天台來曰見智者大師麼師曰即今亦不少曰因甚在汝脚跟下師曰當面蹉過圓曰上人不耘而秀不扶而直一日辭去圓送之門拊師背曰寶所在近此城非實師頷之往豫章謁典牛道由雲居風雪塞路坐閱四十二日午時版聲鏗然豁爾大悟及造門典牛獨指師曰甚處見神見鬼來師曰雲居聞版聲來牛曰是甚麼師曰打破虗空全不柄靶牛曰向上事未在師曰東家暗坐西家廝罵牛曰嶄然超出佛祖他日起家一麟足矣虎丘紹隆禪師師初謁長蘆信禪師得其大略有傳圓悟語至者師讀之歎曰想酢生液雖未澆腸沃胃要且使人慶快第恨未聆謦欬耳遂由寶峰次湛堂客黃龍扣死心禪師次謁圓悟一日入堂悟問曰見見之時見非是見見猶離見見不能及舉拳曰還見麼師曰見悟曰頭上安頭師聞脫然契證悟叱曰見箇甚麼師曰竹密不妨流水過悟肯之尋俾掌藏教有問悟曰隆藏主柔易若此何能為哉悟曰瞌睡虎耳育王佛智端裕禪師上堂曰行時絕行跡說時無說蹤行說若到則垛生招箭行說未明則神鋒劃斷就使說無滲漏行不迷方猶滯㲉漏在若是大鵬金翅奮迅百千由旬十影神駒馳驟四方八極不取次啗不隨處埋身且總不依倚還有履踐分也無剎剎塵塵是要津護國景元禪師上堂威音王已前這一隊漢錯七錯八威音王已後這一隊漢落二落三而今這一隊漢坐立儼然且道是錯七錯八落二落三還定當得出麼舉拂子曰吽吽師因僧讀死心小參語云既迷須得箇悟既悟須識悟中迷迷中悟迷悟雙忘却從無迷悟處建立一切法師聞而疑即趨佛殿以手拓開門扉豁然大徹繼而執事機辯逸發圓悟目為聱頭玄侍者悟自題肖像付之有曰生平只說聱頭禪撞著聱頭如鐵壁靈隱慧遠禪師內翰曾開居士久參諸方紹興辛未值師領光孝開來謁問曰如何是善知識師曰燈籠露柱猫兒狗子開曰為甚麼贊即歡喜毀即煩惱師曰侍郎曾見善知識否開曰某三十年參問何言不見師曰向煩惱處見向歡喜處見開擬議師震聲便喝開擬對師曰開口底不是公開罔然師召曰侍郎向甚麼處去也開猛省點頭說偈曰咄哉瞎驢叢林妖孼震地一聲天機漏泄有人更問意如何拈起拂子劈口截師曰也祇得一橛知府葛剡志慕禪宗久無證入一日舉不是心不是佛不是物豁然有省說偈云非心非佛亦非物五鳳樓前山突兀豔陽影裏倒翻身野狐跳入金毛窟謁師求證師云居士見處祇可入佛未得入魔在葛禮拜師曰云何不道金毛跳入野狐窟葛乃頓領華藏安民禪師師謁佛鑑鑑問佛果有不曾亂為人說底句曾與你說麼師曰合取狗口鑑震聲曰不是這箇道理師曰無人奪你茶鹽袋叫作甚麼鑑曰佛果若不為你說我為你說師曰和尚疑時退院別參去鑑呵呵大笑玄沙僧昭禪師上堂天上無彌勒地下無彌勒且道彌勒在甚麼處良久曰夜行莫踏白不是水便是石南峰雲辯禪師師參圓悟值入室纔踵門悟曰看脚下師打露柱一下悟曰何不著實道取一句師曰師若搖頭弟子擺尾悟曰你試擺尾看師翻筋斗而出悟大笑上堂好是仲春漸暖那堪寒食清明萬疊雲山聳翠一天風月良鄰在處華紅柳綠湖天浪穩風平山禽枝上語諄諄再三瑣瑣碎碎囑付叮叮嚀嚀且道叮嚀囑付箇甚麼卓拄杖曰記取明年今日依舊寒食清明僧問十二時中教學人如何用心師曰蘸雪喫冬瓜問浩浩塵中如何辨主師曰木杓頭邊鐮切菜曰莫便是和尚為人處也無師曰研槌撩䬪飥大溈佛性法泰禪師上堂欲識佛去處祇這語聲是咄傅大士不識好惡以昭昭靈靈教壞人家男女被誌公和尚一喝曰大士莫作是說別更道看大士復說曰空手把鋤頭步行騎水牛人從橋上過橋流水不流誌公呵呵大笑曰前頭猶似可末後更愁人鼓山珍禪師上堂尋牛須訪跡學道貴無心跡在牛還在無心道易尋豎起拂子曰這箇是跡牛在甚麼處直饒見得頭角分明鼻孔也在法石手裏昭覺道祖首座初見圓悟於即心即佛語下發明久之悟命分座一日為眾入室師忽問曰生死到來如何迴避僧無對師擲下拂子奄然而逝眾皆眙愕悟聞至召曰祖首座師張目視之悟曰抖擻精神透關去師點頭竟爾趨寂慧日默菴道禪師上堂同雲欲雪未雪愛日似暉不暉寒啾啾閙籬落朔風冽冽舞簾帷要會韶陽親切句今朝覿面為提撕卓拄杖下座樞密徐俯師川居士公參圓悟悟喜其見地超邁一日至書記寮指悟頂相曰這老漢脚跟猶未點地在悟面曰甕裏何曾走却鱉公曰且喜老漢脚跟點地悟曰莫謗他好公休去龍牙智才禪師師初住嶽麓開堂日僧問德山棒臨濟喝今日請師為拈掇師曰蘇嚕蘇嚕曰蘇嚕蘇嚕還有西來意也無師曰蘇嚕蘇嚕由是叢林呼為才蘇嚕何山佛燈守珣禪師師參佛鑑隨眾咨請邈無所入乃封其衾曰此生若不徹誓不展此於是晝坐宵立如喪考妣逾七七日忽佛鑑上堂曰森羅及萬象一法之所印師聞頓悟往見鑑鑑曰可惜一顆明珠被這風顛漢拾得乃詰之曰靈雲道自從一見桃花後直至如今更不疑如何是他不疑處師曰莫道靈雲不疑知今覓箇疑處了不可得鑑曰玄沙道諦當甚諦當敢保老兄未徹在那裏是他未徹處師曰深知和尚老婆心切鑑然之師拜起呈偈曰終日看天不舉頭桃花爛熳始擡眸饒君更有遮天網透得牢關即便休鑑囑令護持是夕厲聲謂眾曰這回珣上座穩睡去也圓悟聞得疑其未然乃曰我須勘過始得遂令人召至因與遊山偶到一水潭悟推師入水遽問曰牛頭未見四祖時如何師曰潭深魚聚悟曰見後如何師曰樹高招風悟曰見與未見時如何師曰伸脚在縮脚裏悟大稱之待制潘良貴依師久不契謂師曰某祇欲死去如何師曰好箇封皮且留著使用而今不了不當便去忽被他換却封皮卒無整理處公又以南泉斬猫話問曰某看此甚久終未透徹望和尚慈悲師曰你祇管理會別人家猫兒不知走却自家狗子公於言下如醉醒師復曰不易公進此一步更須知有向上事始得如今士大夫說禪說道祇依著義理便快活大率似將錢買油餈喫了便不飢其餘便道是瞞他亦可笑也公唯唯師嘗謂眾曰兄弟如有省悟處不拘時節請來露箇消息雪夜有僧扣方丈門師起秉燭震威喝曰雪深夜半求決疑情因甚麼威儀不具僧顧視衣裓師逐出院龍翔士珪禪師師醉心楞嚴逾五秋南遊謁諸尊宿始登龍門即以平時所得白佛眼眼曰汝解心已極但欠著力開眼耳俾職堂司一日侍立次問云絕對待時如何眼曰如汝僧堂中白椎相似師罔措眼晚至堂司師理前話眼曰閒言語師遂大悟黃龍法忠禪師師習台教悟一心三觀之旨未能泯跡徧參名宿至龍門觀水磨旋轉發明心要乃述偈曰轉大法輪目前包裹更問如何水推石磨呈佛眼眼曰其中事作麼生師曰磵下水長流眼曰我有末後一句待分付汝師掩耳而出已而禮辭渡九江登廬阜露眠草宿相羊山水會意則居或數日不食或連宵不臥髮長不翦衣敝不易故禪會呼為忠道者宣和間湘潭大旱禱而不應師躍入龍淵呼曰業畜當雨一尺雨隨至居南嶽恒跨虎出遊儒釋望塵而拜世奇首座師徧參諸方晚造龍門一日燕坐瞌睡間羣蛙忽鳴悞聽為淨髮版響亟趨往有曉之者曰蛙鳴非版也師恍然詣方丈剖露佛眼曰豈不見羅睺羅師遽止曰和尚不必舉待去自看未幾有省乃占偈曰夢中聞版響覺後蝦蟆啼蝦蟆與版響山嶽一時齊由是益加參究洞臻玄奧佛眼命分座師固辭曰此非細事也如金針刺眼毫髮若差眼則破矣願生生居學地而自煅煉佛眼因以偈美之護聖居靜禪師師年十四禮白馬安慧為師聞南堂道望遂往依焉南堂舉香嚴枯木裏龍吟話往返酬詰師於言下大悟一日南堂問曰莫守寒巖異草青坐却白雲宗不妙汝作麼生師曰直須揮劍若不揮劍漁父棲巢南堂矍然曰這小廝兒師珍重便行開先智和尚示眾曰宗之與教權道佛之與祖強名受教傳心俱為虗妄求真覓實轉更參差若取自己自心為究竟必有他物他人作對治時有僧問如何則是曰是則有非云如何得入曰汝何劫在外頭問如何是佛曰汝喚那箇作眾生云與麼則無佛無眾生也曰者眾生問如何是平常心曰蜂蠆狼貪云與麼則全眾生心也曰你道那箇是平常心云不會曰汝他後會去在問四大何緣有形曰你道虗空何緣無像云到者裏却不會曰我也不會又曰汝道汝不會與我不會是一是二云乞和尚慈悲曰我早晚曾罵辱汝問如何是大道曰我無小徑云如何是小徑曰我不知有大道問和尚見處如何曰非汝境界云學人見處如何曰取我處分又爭得云乞師指授曰我長劫來不曾蒙蔽汝龍圖王蕭居士居士字觀復留昭覺日聞開靜板聲有省問南堂曰某有箇見處纔被人問却開口不得未審過在甚處南堂曰過在有箇見處南堂却問朝斾幾時到任公曰去年八月四日南堂曰自按察幾時離衙公曰前月二十南堂曰為甚麼道開口不得公乃契悟南臺安和尚因僧問寂寂無依時如何曰寂寂底呢因有頌曰南臺靜坐一爐香終日凝然萬慮忘不是息心除忘想都緣無事可思量法輪添禪師上堂喝一喝曰獅子哮吼又喝一喝曰象王嚬呻又喝一喝曰狂狗趁塊又喝一喝曰鰕跳不出斗乃曰此四喝有一喝堪與祖佛為師明眼衲僧試請揀看若揀不出大似日中迷路光孝深禪師上堂維摩一默普賢廣說歷代聖人互呈醜拙君不見落華三月子規啼一聲聲是一點血上堂風蕭蕭葉飄飄雲片片水茫茫江干獨立向誰說天外飛鴻三兩行中竺癡禪玄妙禪師僧問如何是截斷眾流句師曰佛祖開口無分曰如何是函葢乾坤句師曰匝地普天曰如何是隨波逐浪句師曰有時入荒草有時上孤峰御製序朕自去臘閱宗乘之書因遇輯從上古德語錄聽政餘閒嘗與在內廷之王大臣等言之自春入夏未及半載而王大臣之能徹底洞明者遂得八人夫古今禪侶或息影雲林棲遲泉石或諸方行脚到處參堂乃談空說妙者似粟如麻而了悟自心者鳳毛麟角今王大臣於半載之間略經朕之提示遂得如許人一時大徹豈非法會盛事選刻語錄既竣因取王大臣所著述曾進呈朕覽者擇其合作編為一集錫名當今法會附刊於後朕惟如來正法眼藏涅槃妙心如杲日在空有目共覩迷者自迷悟者無語誠於此一超直入則經綸萬有實為行所無事朕一日二日萬幾諸臣朝夕不懈於位莫非平治天下之為而即於此深嘗圓頓甘露之味可知此事之為實際理地而非狂參及解路所可得而託也朕居帝王之位行帝王之事於通曉宗乘之虗名何有況此數大臣皆學問淵溥公忠方正之君子一言一行從無欺妄又豈肯假此迎合為諂諛小人之事朕又豈肯默傳口授作塗污慧命之端誠以人果於心性之地直透根源則其為利益自他至大而至普朕之惓惓於此固非無謂而然也卷中言句所為師子祇三歲便能大哮吼可以啟人弘信廣布正燈是選之傳或於宗風不無小補至在內焚修之沙門羽士亦有同時證入者六人其所作亦附刊焉是為序雍正十一年癸丑九月望日御選當今法會皇十六弟莊親王愛月居士禮佛盈天地間惟一真佛百千萬億泥佛木佛總是一佛若著相而求翻成隔礙不須擬議叩求但辦立地薦取欲識真佛無往不是非將曠劫無明徹底盡去何可得見如何得徹底盡去但只去縛縛之一字眾生業識根深千生萬劫纏繞無休色能縛見聲能縛聞觸緣便縛對境即昏轉求轉遠愈覓愈深欲得解縛別無方便一念回光即覩佛面非心非佛白雲萬里是心是佛萬里白雲佛即是見見本離因如青蓮花不染一塵見如不見聞如不聞色不礙見聲不礙聞根塵空寂歷歷明明千江一月一月千江風來水面雲繞層崗極樂世界東方西方有何隔礙不用參詳佛即是我我即是佛佛與眾生無二無別孰欠孰剩孰優孰劣迷之則凡悟之則聖凡聖雙泯全體大用離相若非即相則是即相若非離相則是是非兩忘真佛出世佛生一如無出無入彼此不二無來無去大慈悲父設茲慈航拯救羣迷解縛脫韁此恩此德難議難量無上醍醐今已得嘗願同含識共登道場稽首歸依頂禮法王祖意六祖不傳衣達摩留隻履欲分異與同透得知玄旨若直露消息一月千江裏何妨更註脚脚跟下薦取問答一則一僧問有僧問雲門如何是透法身句雲門曰北斗裏藏身意旨如何王頌曰透法身藏北斗有是無無是有泥牛吼月木郎醉酒如是如是知否知否六根頌六根原來一物收誰知一物價難酬鍵關碌碌空妨鼠鞭扑勞勞錯打牛綠水青山觀自在清風明月任優游拔根應會生根地聽取涼蟬報早秋地大地一毫端本來不見土識得脚根下任伊吞與吐水一勺全滄海滄海無滴水滄海與桑田海田只如此火石火與電光何須分人我識得丙丁因自知火中果風遍界不曾藏遍界不曾有但觀動靜聲盡是獅子吼道至道原無一語何妨信口吟哦靜喧語默任和和無可亦無不可極樂世界何處色空裏面誵訛曰魔曰佛總非他却又本來無我月朔日何曾隱晦光明仍滿三千莫言三五是團圓大地依然黑暗明自暗中折合暗從明裏周旋明明暗暗兩無偏此月方纔出現燈一盞能分千盞須知一盞何來直饒照出九層臺者箇何嘗有礙用處分明無照體時不隔塵埃蓮花火裏霎時開方得名為自在鏡恰似冰輪高掛自然形影不藏何須刮垢更磨光方現如如妙相縱使塵封豈掩便從籠無妨昏明只辨一毫芒畏障都盧生障心珠性水心珠性水合同途此界他方本不殊珠燦爛時涵湛水水澄清處見圓珠光風霽月全身現碧沼寒潭寸影無亘古至今無箇事何須依樣畫葫蘆錄語二則萬物如如在目前小而無內廣無邊圓通一性何來往水底青山火裏蓮尊貴從來不自知幸逢一拶好修持誰知一滴曹溪水却在吾皇太液池示明鼎柏林寺禮佛次示明鼎曰佛為一大事出家豈僅為自了生死已哉眾生沈淪願拯拔之眾生迷謬願儆覺之眾生纏縛願解脫之眾生蔽障願開明之一切聖凡料共喻斯旨然拯拔眾生即自拯也儆覺眾生即自儆覺也解脫眾生即自解脫也開明眾生即自開明也如是拯拔儆覺解脫開明實無我得拯我得儆覺我得解脫我得開明者亦無眾生得我拯拔得我儆覺得我解脫得我開明者如是謂之度人如是謂之自度所以從上古德已得已證必為人天推作導師一本慈悲隨人接引而當其所得未得所證未證之時則必孳孳汲汲眠食俱廢不惜軀命力索勤求匿影銷聲閉關杜口惟依本分絕不關人甚至兀坐空岩行脚異域斷臂立雪若救頭燃其苦心忍行曾不以年歲計逼拶戞擊誓期徹悟一旦摸著鼻孔如絕如甦然後即事即理無無礙以至人天趨向秉拂開堂自利利人一時圓滿蓋己事未明而即能導人不能導人而遂為了己事者十方萬古決定無此教無此法也今爾著僧伽衣喫香廚飯為佛弟子人號善知識住名剎升法席集緇素而說法亦歷有歲年矣皇上以帝王之尊證如來之果隨喜所及時承開示不異日月輪邊光明常被其為萬辛歷劫難逢然以余觀爾桶底不脫竿頭未進雖經行禪誦日不忘兩餐而見性明心實莫參一味執著名相纏繞語言尋討無功啐奚補豈不上負聖恩下負自己如此而或欲為人是乃聾以導聾瞽以傳瞽迷人正覺斷人慧命鐵蛇橫路自誤誤人墮落輪迴將阿誰消受余深代汝愧畏爾亟當及此猛省打透關頭自度度人並不是兩事爾應知皇上恩大難酬并肯余言之無妄也古佛已過再世未來不向今生度懊惱亦何及況自誤猶小誤人罪大舌在不從心具眼莫問口其努力迴向毋有玷沙門俾三千大眾各發信心廣衍宗旨且謾道授記靈山必將獲人天福報是否是否如何如何莫謂如來教下絮絮瑣瑣大似談老婆禪也爾其珍重毋忽皇十七弟果親王自得居士究竟銘三界眾生自從無始忽起無明成就根塵即此無明同佛正覺迷妄執著昇沈業識悟無愚智覺無凡聖不從彼來不從此去前後際斷非即非難無依有立有憑無成坦然一致真妄無二能所俱離隨類普應有方則滯著處即邪癡靜冥空六塵緣影不染而染是而非是聲聲色色揑目生花昭昭靈靈龜毛兔角二途俱泯圓成彈指無證之證無修之修次第漸除宿昔染習六般同濟眾生一如佛魔邪外一軌同收好醜分明寶鏡不垢常泯常照常動常寂無可不可不取不捨圓通蕩蕩不思不議如如歌從上佛祖傳心法無異無同無二轍本非知見所能明不是施功可了脫目前色相悉真常耳畔音聲盡妙說箇中毫髮費商量即落千差與萬別未從擬議全賓主不用足移入道場圓滿融通無淨染希夷微妙又尋常凝然不動超塵劫寂爾無為建寶幢剎剎塵塵皆實相更餘何物可承當中非內兮表非外非須彌兮非纖芥還問皓月印千江復若颷風鳴萬籟揑之不聚視無形當前即是尋無在但能頃刻回光照不勞彈指便圓成真諦無聖無不聖妙義非生非不生逢建立時隨建立遇光明處合光明山河大地如來藏動植含靈佛祖燈何用改弦兼易調從他月白與風清澄之不清淆不濁亦非迷兮亦非覺圓融即是寶金繩耽玩翻成斷貫索塵勞妄想等龜毛般若涅槃同兔角那伽常定繁興處徧界縱橫無住著大千世界一慈航露柱燈籠何處藏若向草頭尋祖意恰如針上覓鴛鴦六根即是菩提種萬念無非如意幢大似寒梅經雪後花開不是去年香把斷一津非是入放縱千流非是出泊然心境湛兮澄豈假絲毫功與力無住無行不墮空常明常照還如漆滄海涓涓入百川盈溪盈壑作波瀾曹溪一滴遍三千豈待拈花始莞然月照寒潭波映月月波浩渺潭皎潔此中體用甚分明何必諦詮墮言說物物同參報化身一塵不染淨光佛淨光佛住在何方即在眾微塵裏覓渴飲飢餐朝復昏本無些子異於人纔言解脫即坑塹脚底何非不二門有作有為終屬妄除煩除惱亦非真若言如如成兩橛試問此歌聞不聞示初學達摩西來直指人心見性成佛不假文字語言蓋因眾生以無量劫來識情染習一向外求不知返本但推窮尋逐攀緣思慮只益多聞還成滯礙故祖師慈愍垂示後學於剎那之頃令明心地直達本源則言言盡是真常無一句不指清淨之體無一聲不闡圓妙之音經云先佛所說後佛隨順三藏十二部即語言文字而非語言文字從此了明而無了明之者是為實語不誑語弗契斯旨但隨文解義墮於見網如日下孤燈失其所照亟須勇猛精進直下了脫自有釋然於無邊教海之詮諦矣閒言說十則有生於無無生於有有無相生統歸之道有為無為超乎名言是道耶非道耶道非巍巍如仁者樂山道非蕩蕩如智者樂水山水之外道將何求若執山水以為道又復以魚目作明珠且道究竟如何山不是山水却是水人言空花我談實相人說山河大地我道夢幻泡影非衒異於人正所以示大同若以異為同以同為異風馬牛不自見故普見不自生故長生以其無生萬物大同故覰無上菩提猶如兒戲道本無動故不在動道本無靜故不在靜道若在靜但守槁木寒灰便超法海道若在動但逐颷塵野馬即踏真如總沒交涉在夫體道者但向湛寂就紛紜紛紜成湛寂處會千尋之木成於尺寸萬里之程始於跬步故道雖高妙不離尋常目下若舍近而求遠厭凡而慕聖是捨萌芽之木而求參天不出戶庭而欲適遠不謂愚得乎一切自然矯作則失因無矯作天地成其廣大日月成其光明山川草木飛潛動植自然合體故曰如來藏明鏡照形其短長肥瘠一如也釋鏡求吾貌而不可得虗谷應聲其大小緩急一如也去谷尋吾聲而不可得故曰在鏡即鏡在谷即谷大道希夷不可得而尊不可得而貴安之隨之和之同之有而不有為而不為是名大道寥廓者天無物不包浩瀚者海無物不容故則天者同其廣大法海者同其淵深至於道不可思議而莫之量隨筆五頌佛祖弘慈拯溺一切蓋為眾生本真錮蔽客塵揜埋業濤騰沸憎愛取舍自縛自繫輪迴生滅致難脫離憎凡愛聖求靜厭喧皆為執著盡屬攀緣在聖則聖在凡則凡處靜即靜處喧即喧本無方所如珠走盤素位而行佛儒同道俗則居家僧則秉教為臣當忠為子當孝能盡倫常即為玄妙絕世違情捨明求照或以釋教遺棄綱常競相排詆如墨如楊或慕邪行裂衣毀裳𠢐容撚指妄自殘傷兩俱謗佛與道乖張拈一放一未是平沈水不洗水金不博金心外非物物外非心物自是物心自是心何為昧昧撥相而尋觀山山之高兮眾石所成石雖眾兮山一其形千仞之山一拳之石石即是山而山非石臨水漚之與水異形同體結則為漚散則為水漚非是水水却是漚不如縱目任其注流性根偈恒沙諸佛同一性此性無修亦無證若離修證却成狂動非動兮靜非靜性觸目盡成顛倒見山河大地誰形容自從一覩明星後物我原來無異同眼若向音聲求佛法譬猶假翅欲騰飛何如撒手行平路靜默語喧無二歸耳見說旃檀片片香此中非嗅孰知芳若言佛性離聞性何處尋求寂滅場鼻百味莫言只一味分明河淡海為鹹必須一一從吾辨始把塵砂作米鹽舌幻化空身即法身縱然認著亦非真直將瓦礫成吾體誰道身心奉剎塵身動靜卷舒無二致後前左右合其宜若於意外求他道何異輕金而重泥意錄語我不談空空亦不說有有問我何所言一聲獅子吼萬川一月印一月緣何印萬川隨波上下自年年莫將戲論談同異一月圓來萬月圓偶述佛性非從色相尋若離色相轉勞心龜毛兔角真如體鵲噪鴉鳴般若音不是吾身同木石直須木石即吾身聖凡情見從生滅山自高兮水自深皇四子和碩寶親王長春居士覺海論覺以海言強喻也海亦覺中之一物覺不可以海喻覺固無可喻以海於天地間為物最鉅故強以為喻夫天一生水降而為膏升而為月動而為波凝而為冰渟而為陂為澤流而為江為河千支萬派莫不朝宗于海海受之而不見其盈海洩之而不見其竭海亦鉅矣哉雖然海固有形在也海之形在則海之名存至若不可以形求不可以名擬無所於受而實無所不受無所於洩而實無所不洩受不見受洩不見洩湛湛乎蕩蕩乎是海也其自性之覺海歟非從中出非從外生其先無始其後無終上之莫見其顛下之莫窮其底十方世界莫測其涯涘大地眾生莫不備具如來此覺海菩薩此覺海一切聖凡以至蝡動含靈無非此覺海三界同居生佛一體於一體中而差別逕庭者生佛之攸分也差別逕庭而同歸覺海者生佛之本來也以覺海為體而不執覺海不捨覺海者如來也在覺海中而或執體海或捨覺海者眾生也教外別傳令人透脫根塵剿絕情見並覺海二字亦無所存修而無修證而無證譬之百川歸海而海不自識其容納也夫修世間法至於聖極矣若明出世間法廓然無聖廓然無聖聖凡等觀戒定慧亦覺也貪瞋癡亦覺也貪瞋癡之覺非圓覺戒定慧之覺亦非圓覺求貪瞋癡不可得求戒定慧不可得不可得中如是得如是得中無所得而後其覺乃圓圓亦非圓而覺乃覺海矣古人云損法財滅功德莫不由斯心意識又曰無明實性即佛性幻化空身即法身佛生之分在覺與不覺之別然覺者與未覺者同住覺海之中如或以覺為覺則是心意識之覺所為損法財滅功德者也即不以覺為覺仍是幻化空身中之無明實性非真覺也必得無明實性即佛性幻化空身即法身并此無明佛性幻化法身之名亦不可得夫然後入微塵而不洩徧大千而不溢以缶取之盈缶以甕取之盈甕以陂取之盈陂以澤取之盈澤以江取之盈江以河取之盈河以海取之盈海以天地取之盈天地澄澄湛湛寂寂惺惺雖覺而不覺不覺而常覺是乃所為覺海歟水月說天上之月一耳水印之而萬焉一月普現一切水其本自同一切水月一月攝其歸不二設使祗明得真體之一而未明幻體之亦一則古人水月之妙喻猶為未究也有如泛航溪中溪中此月也由溪以之湖湖中即此溪月也由湖以之長江黃河長江黃河中即此湖月也由長江黃河以之海海中即此長江黃河月也由一小海以之乎四大海四大海之月即此一小海之月而亦即此發航時小溪中之月也祗有一月求兩月不可得忽於其間堤岸隔之一溪之水分為二溪則一月亦分為兩月矣由是而之焉四海之內江有沱河有滎汝有濆漢有潛水草之交為湄水決之澤為汧注川為谿注谿為谷注谷為溝注溝為澮又細之而為行潦又細之而為牛蹄之涔各各得水則各各得月而月乃不知其幾千萬矣又細之而為瓶為罍為杓為甖為杯為斝各各得水則亦各各得月而月又不知其恒河沙數矣如舉百小器之水併於一大器則百小器中之百月皆空而成一大器中之一月矣如舉百千萬器之水併於一谿則百千萬器中之百千萬月皆空而成一谿中之一月矣由是從谿之湖之江之河之海則恒河沙數之月又成一月如初矣信乎水中之月本一其不一者有隔之而使然非其本然也由此觀之不特天上之月普同水中之月亦普同矣天上之月真如也水中之月幻有也幻從真出幻乃成萬幻亦無萬幻萬亦一一亦不立夫是以萬然則真如之月即在水中幻有之月亦在天上也人尚其撲陶器而破之掘堤岸而通之庶幾宴坐水月道場也歟呵佛罵祖論或問宗門每有呵佛罵祖之語何也王曰佛身充滿於法界普現一切羣生前隨緣赴感靡不周而恒處此菩提座華嚴四句誠為諸祖要語的旨雖然人若於此隨語生解便成天地懸隔即此隨語生解之心便是業識茫茫無本可據於此尚未能灑然命根何由得斷縱使盡山河大地化為齒頰喉舌一一齒頰喉舌演無量妙音同時讚佛亦沒交涉夫能讚歎者即所讚歎者也所呵罵者即能呵罵者也然則何讚歎之有又何呵罵之有況乎能所皆空讚歎呵罵又有何處可以安著眾生以是佛為聖非佛為凡凡聖兩途即是眾生無始以來之見病必得聖凡情盡然後人我雙忘古德老婆心切是以呵佛罵祖除其見相云爾或曰若然則皇上之斥人呵佛罵祖其義何居王曰古德為此不過接引初機何嘗以此為究竟極則接引初機之善權方便甚多又何必定出於呵佛罵祖皇父以現在佛顯如來身慈悲無盡化導無垠智日普臨法雲常潤所見所證超出從上古德萬萬豈尋常所能窺測余惟信奉受持安能疎通證明其義雖然恭承誨示得領玄音亦忝一知半解不忍不以示天下後世作將來眼也特為爾申論之夫虗空大地皆屬幻結而成然此大地虗空即是實際理地真全是幻諸幻皆真幻全是真一真亦幻此幻影中步步不離真地此真如性剎剎歷此幻緣松原是直棘原是曲烏原是黑鶴原是白松直棘曲烏黑鶴白尚不得改其自然之幻影況人為萬物之靈乎是故為臣當忠為子當孝民則當仁物則當愛萬善具足乃得圓此幻影幻影真如無二無別幻影圓即真如矣離此一字便屬魔外夫佛祖者以出世間法論則無生身之所自生也以世間法論即先聖先師也下口呵斥可乎不可乎夫聖凡俱泯然後前後際斷固已然若以呵罵為聖凡俱泯則此聖凡俱泯之見并凡見亦無分矣安得不墮畜生道宗徒又謂古德嘗言須向異類中行六道輪迴一道齊平方是透天透地有何因果可言不知即此執著狂見止有墮畜生道分無古德透天透地分古德心行驢年未夢見在人果踏過重關幻真一致正須圓滿幻中真果安得呵佛罵祖若猶未也則呵佛罵祖如何可容區區接引初機之無舌人饒舌皇父豈不照破爾悟耶吾與爾信受奉行爾不悟耶聖旨不可違也或人唯唯而退示超鼎禪喜次示超鼎曰佛法者出世之梯航世法者住世之關鍵徑異途分南轅北轍殆夫人而云然矣然使其人果於佛法能了自心得無所得則以不染之心現隨緣之相無憎無愛無取無捨自然不逐波流不隨影住而得理事一如空相無二世法正是佛法也若或心依塵剎任起糺纏取捨愛憎雜然紛錯甚至奔趨名利希望寵榮隱顯異行外內異習如此則雖三藏十二部千七百公案一一如瓶瀉水其所為佛知見者已不啻狐唾貍涎況復藉古德之微言作逢時之利器了了於口役役於心其不至塗污慧命垢濁祖庭者幾何惟貴力行佛訓信守沙門於一切世法中不生歡喜心而持貪瞋戒則雖鐵蛇橫路終可作弄死蛇想從未有不行戒定頓為了知假借佛法以行世法而不至習染因仍增諸幻妄以昧佛性而攖世網者我皇父以現在佛發如來藏萬幾餘暇時一隨喜偶揭片語如灌醍醐所以提持禪衲整飭宗門諄諄懇懇直引曲喻期望各有成就者原為如來教外之旨實能普利十方弘濟萬品會者自得一如本分當下即是不假外求而於修齊治平兵農禮樂政刑德教及飲食起居出入作息一切有為法原無干礙故欲護此一燈永毋消殞慈悲念切光照無私此物我之胥忘固緇素所共信余言不其然乎爾幸際隆時叨蒙開示蓋有夙因得具正見正宜及此努力合眼埋頭進慚愧門修迴向行誓期徹底了此一事以仰報高厚聖恩克紹佛日乃邇者聽汝言說驗汝行為鳥欲沖天脚未點地雖荊榛隊裏曾暫斬斷葛藤而水月光中猶時錯認花影對人饒舌豈接引之婆心到處呈身半逢迎之鬼伎試問此選佛場一塊乾淨土既不能伐毛洗髓轉且目眩耳譁於些子榮利事尚無從勘破而可望其於本分向上事有所探討不至墮落或且能度人有是因乎有是果乎無種且勿道何下種之不審也語云見道易修道難又曰知之易行之難縠羅之隔即不能辨物何論九嶷咫尺之間即不云到家何況萬里爾其及早猛省痛自翦除毋作非非想但作如如觀途路未迷驀直前去庶此一事猶終還故吾不然文殊念起鐵圍隨之下又下者地獄何辭佛法本無住度溺皆自取究無與世間法也勉諸勉諸皇五子和碩和親王旭日居士初學詩六十首人我原無二主賓自歷然當前不迴換一月萬川圓空亦本非空有亦本非有空有兩相忘三三原是九𦦨影不解渴畫餅不充飢愚夫多錯認達者會其機纔擬離於空已是落於有不知空有間何物最長久古鏡埋塵垢幾人仔細尋東風回暖候窗外日華新東院風光好扁舟一櫂輕千山沈翠影山行舟不行跳出金剛圈打破栗棘蓬問余何所得一擔挑春風魚兔不需用何必守筌蹄偶爾閱金經權為遮眼皮但知翻貝葉日日誦哆囉不聽林間鳥盡演摩訶歌以聲為直指拈色作單傳但即此聲色觀音如是觀先了同中異還明異裏同三千原是幻四大本非空閉目妄求見觀心誤覓通可憐講解者恰似觸窗蜂倒騎龍象走春夏髮鬅鬆去際渾無影來時不見踪慈雲鋪密密法雨落重重雖弄泥團漢却能立峭峰證佛還除佛達禪莫泥禪若從露柱覓即落淨瓶邊妄處塵心滯通時佛性圓茫茫如涉水且趁法王船佛國隨方現西天只在東但開彌勒閣自上德雲峰樹杪留明月花邊送好風一般奇絕處從古與今同住此無為地何妨處閙場歸來炭裏坐還去雪中藏大道絕能所虗空不可量世尊一按指海印盡生光打破黑漆桶瑠璃界裏行十方自普遍三際任縱橫有火還同暗無燈却是明此身齊日月何必問年庚對病得良方長生極樂鄉山河為事業雨露作壺漿伏虎空勞力降龍徒逞狂須知龍與虎覿體是心王入定原無定休心更錯休階花兮並茂溪水兮隨流誰去尋蘭若何妨執釣鉤年年祗此日暖冷自春秋幻妄何曾幻須看火裏蓮一池常湛湛八水自淵淵無佛方云佛非仙始是仙佛仙毫錯認霄壤兩茫然一線通天地何人能覩之夢中不識夢迷裏復尋迷歲月如風疾時光似電馳於茲當警醒速覓法王師臘月乘涼解帶三伏向火披裘愚夫𠷣謂顛倒知者笑默點頭丈六三千法相區區一粒微塵芥子須彌不別山川草木全身一人常喫不飽一人不喫不飢此意阿誰參透直言不掛一絲黑炭難方其黑白冰莫比其冰畢竟問他何物答云白炭黑冰將欲以靜止動恍如日下逃影欲修無上菩提務須開眼落井春日嚴風栗冽三冬煖氣溫和不是春冬互換祇因曾見彌陀對鏡二我現前畢竟自著何所當下人鏡雙忘了然他我我我昨日園花開放幾枝白白紅紅祇因貪觀芳色不肯踏入叢中四面八方惟我飛潛動植皆佛佛我原無兩箇非是依稀彷彿學道方不自棄見道自棄方親六塵六根放下大千總一真人湛湛純清元氣澄澄不雜精神識透三千世界能使十二時辰秋水一泓作體㵎松百尺為身頂後金光是幻雲生足下非真有意超登淨土却於諸佛無緣一芥猶餘一芥三千豈止三千識得七花八裂何分六欲四禪漫說鳶飛魚躍毫釐即隔天淵常時隨緣飲閒來乘興高歌看破菩提是妄了知佛祖皆魔識得六根無我放教五蘊從他祇此理窮性盡如頑如鄙呵呵莫論誰觀誰聽休問有言無言欲證至真正道須知探本尋源欲得古佛會面須從草鞋踏翻但會懷中滌垢孰能物外馳奔小攝毫毛却大大彌宇宙而微不識不知佛智非生非滅天機冬日雪飄纍纍春朝雨灑霏霏雨雪任教應節我祇相時著衣猛虎當途何懼從來物我原同同處原無彼此異時却辨雌雄養素全真失䇿含醇抱樸非功若然以南作北究竟未見西東風雲體態無定猿馬情性難安依靜止動妄作將有為無自謾浮漚非是濤浪海水却即波瀾不教絲毫障礙一顆寶珠走盤一點微塵之內一佛國在其中道有森然實有說空豁爾皆空彼此親疏無二東西南北皆同莫詫輝煌古鏡團團只是青銅迷則多知多識悟却如醉如癡無見方成實見有為即是無為大道非難非易天下何慮何思鸚鵡緣何有舌蜘蛛畢竟無絲色相元非色相空虗豈是空虗三昧由來都幻六根隨在皆如此地端然有我他方何處尋渠西天只在脚下不煩走馬驅車己躬下事作麼參兀坐蒲團意不甘前後一朝窣地斷十方四面是瞿曇一歸何處是耶非笑倒庭前木板扉唯有此門為不二本無有一更何歸色空明暗千般相地水火風一箇身若要捨離增謬妄塵塵涉入始為真直教如幻方非幻莫要消除幻百端欲覓是真非幻者猶如風裏捉風看桃花溪上年年發只有靈雲見不疑我欲將花問少室此花為髓抑為皮者箇豈容有悟迷無餘無欠等均齊若言今日方成悟何異朝東說向西畢竟色前無別法良由聲外有單傳騎聲葢色何方便如色如聲任自然無錐可立尚餘身彼岸猶遙毒海深直待將身也貧却方纔撮土即黃金明明昨定今何定一句包涵萬法門猶向法塵邊覓取將頭自刺入膠盆寶殿黃金丈六身萬年常轉法王輪展單作禮人多少開眼誰能見得親家舍途中百事宜何須端䇿問庖羲山河大地無非自晝夜迴環不是伊一月迥明千佛土六時夢作四威儀堂堂獨立渾無事歷劫常如者片時一聲鳥語出林端說得如珠走玉盤五教分明齊貫串三乘階級總團圞大千已是渾包裹些子何曾更熱瞞若也未能拋漆桶廣長舌又底相干動念何非生死根不生一念又沈淪大圓覺海無門路兩鐵圍山矗昊旻放則雪獅鎔火聚捉時流汞入沙塵中邊若不齊拈却難與空王結淨因百般神妙都除屏一味真如任所之莫是透天還透地本來無我亦無伊三身總不分長短此路何曾有順違堪笑南泉牧水牯東西岐處又成岐直下本來無一事莫從無事覓安心精修原屬尋常分密行唯隨力所任中不容他清淨慧外無可問去來今搬柴運水如如裏便是無絃太古琴羣生盡是金剛體四相全彰般若光坐斷菩提與煩惱踏翻地獄并天堂出門一笑青天闊欹枕三更白月涼樹倒藤枯是何物分明寶印出輪王合水和泥與麼來雖然何處惹塵埃解開六結無餘結蕩盡凡胎與聖胎撤手懸崖履平地開睛墮井上蓮臺丈夫步驟當如此一念千年復億垓三尺兒童也共之千生歷劫久忘斯拽將鼻孔虗空吼打著頭顱大地知直下何曾些子欠當前莫更自相欺若於此外閒拈弄畫餅終難充汝飢千門萬戶盡司南只要拈來仔細參莫道此中還是一當知句裏亦無三泥牛入海探消息鐵馬當風演妙譚妙覺空王真種子毫毛頭上坐瞿曇山重重又水重重寶鏡交光光不窮能所頓消何軌格聖凡淨盡始圓融草鞋倒覆三千界破衲高圍丈六空半點安排渾不用何須更覓主人公多羅平郡王福彭如心居士真如銘真如性海法界圓通聖凡一轍佛生途同只緣迷己逐物西東從有背有從空背空識心顛倒生死相從憎愛繼起善惡業生輪迴六道受捨不停大慈悲父悲憫羣迷設茲寶筏拯救出離誠言寶訓作速皈依若求解脫不遠非難信心一辦祇在目前不需半念不用一言鴉鳴鵲噪木片碌磚同演摩訶普示莊嚴當下薦得誰分彼此三界唯心萬法一己知解體會却沒交涉若非真了何言休歇自誤誤人魔行邪說即心即物即物即佛心佛物兮何異何同無一無二二一圓融色空明暗隨處合通無心於法無法於心心法雙泯是名曰真真亦強名普告來今一貫說語默動靜不異暗明通塞何殊了達彼此無二大千沙界如如雲山圖青山自青山白雲自白雲欲識雲山意諦觀分不分真妄謠起妄遣妄雙成妄用真求真何處真真妄兩地情能盡寒灰枯木一時春迷悟誥迷者將空作色悟者以色為空迷兮悟兮如夢色兮空兮本同心體歌剎剎塵塵總一心沙界之中獨露身其間妙體誰人識直饒識得亦非真不住詞住南却在北住北却在南一切如是住無所住心然人我論人法本來無二物我原自一同就中妄生隔礙致令觸途難通轉物解轉得山河歸自己轉得自己成山河兩箇黃鸝鳴翠柳一行白鷺落平坡動靜詠靜中須覓動動中須覓靜解此動靜關是名真如用心境曲人多言境礙心不知乃心礙境若能除却此心萬境自然相應智光三時頌境有心有雙成幻心有境空半幻真心境俱空離真幻空不空兮無比倫真如言有言皆是謗無言盡成誑除却有無言地下與天上活汞吟我有水銀一團迸散三千法界縱橫離合隨緣十方通塞無礙談夢話睡夢安和夢是幻覺來方悟夢非真迷人譬似夢中客悟者猶如醒睡人空橛註將橛釘空易將空釘橛難會得箇中意大千隨處安三際論現在總無現在事未來那有未來時能知三際原無際一任今之又古之西江月六首法相雖超色體真機不在空觀維摩空裏散花天見者見須離見能合六塵不染何妨萬象當前試看雲影靜寒潭雁過可曾留戀驀聽空中鶴唳渾忘牀下牛鳴不分笛韻與鐘聲萬籟自然各靜毒鼓人言當避火輪我道堪乘隨緣不動寂常明便是如來本性五教三乘懇懇半萬八卷諄諄別傳却不在經文默契自心自印但會歸一妙諦即通不二法門得來隨手總家珍執著還防錯認大地亦非大地一絲便是一絲此中機祕少人知非是是非非是若問如何行履告君不假修持莫言無事亦無為好作夢中佛事括盡恒河沙界那來法藏真經維摩一默豈無音何在高談闊論試聽窗前竹韻自然葉上風生風生葉響兩無因古渡舟橫不定若問心根心蒂靈苗不變春秋尋蛇撥草費窮搜如覓霜前雪後物我原同一色孤雲欲去還留三更明月正當樓又復半遮半露偈語二則數黑尋白自鼓風浪指東畫西錯尋古路泥牛海底穩棲身石虎山中復何懼沒名沒姓無繫無拘數萍海面一塵空裏漫訝青山藏曉霧還看淥水長新蕖偶偈四首一念清淨是佛一念煩惱眾生清淨不離煩惱佛與眾生同名緣塵起於對待無對待處無因一心自生萬法萬法本不礙心是非便生憎愛憎愛取捨流輪識得高下平等三千世界一身眾生執空作色二乘執色為空執空執色皆非當知即空即色警迷箴地水火風流轉三界幻化空身惟此四大無明識性紛馳其中妄執為我憎愛交攻既貪且瞋既瞋且癡癡為其體貪瞋用之因起果生生生滅滅滅必更生恒河沙劫或乃悲悔誓斷無明求證佛道脫離眾生如走日中而欲無影形到影隨謂影為梗乃起狂見一切皆空何佛何生善惡混同持此一念萬有俱刪此念維何大鐵圍山未了空性強排有緣一空何據萬有現前有即是空空不異有厭有欣空怖頭而走幻身法身識性佛性皆無寸土一大圓鏡祇緣曠劫迷其本真強生分別而有幻因佛祖慈悲垂諸方便己躬下事直須自薦大學士伯鄂爾泰坦然居士述課十載攀緣歷四天須彌百億鐵圍前因知舌在還成業縱使錐無未是禪入慚愧門覓進步感慈悲力度重顛三關到底如何踏風在林梢月在川禪課截句楞嚴說罷又楞伽法語從無一字差畢竟何曾留一字隨緣且喫趙州茶雲門臨濟各紛然棒喝無端更豎拳截却葛藤佛法現秋風八月好涼天折葦西來有意無麻觔柏子忒糢糊夜來瞥見天邊月恰似驪龍項下珠香嚴卓地漫經年錐到無時也未然米熟便篩篩在否獦獠根性幾曾全輥毬活計許誰拈得一猶非寧有三認取箇中關捩子餓時喫飯困時眠風旛互動各成真饒語誰煩更說心到底此中無覓處古錐密諦不從尋三世因緣彈指間去來來去幾曾閒有時看取階前樹秋露如珠葉葉圓出門拂袖恰衝塵放下緣何便入真滿院梧桐花落盡沿階秋草又生春謾說小乘與大乘斷常生滅本無情辟支成果塵煙淨依舊恒河沙裏行泥洹功德了無因法化何曾有二身普界金光沈黑裏兜羅掌下正迷人是迷是悟是文殊門外應須一再呼入得門來門是外一簾香雨著花無西堂風月總無功捉向西來又向東拽斷鼻頭脫未得虗空何處捉虗空山原著地玉無瑕如此能時便出家出得家來家故在祇陀林裏看曇花巖前獨坐月輪圓對月只須作月看指月是心心是月寒山此語要重參摘茶樹底覓形聲覓到形聲古路橫紅葉青山秋正好涅槃般若本同名難難易易幾多般就裏憑他下手看踏破鐵鞋還穩坐雪山風月古今寒偈語二十一則迷非迷覺非覺識得迷時似脫纏認煞覺處旋成縛覺迷迷覺兩無干一輪秋月照東閣昨日桐花開今朝桐葉落花開是何因葉落成何果曉來冷露濕秋衣年年花葉自開落菩提本無因種因隨生果有果轉生因顛倒沒歸著世尊有何言拈花笑無可水底陽光微火中陰氣顯陰陽不二物水火何相反住取水火無吞吐金蓮火裏灑甘露甘露成珠火自燃到頭即是回頭路回頭是何家眼底具三界身色雖本空還須持淨戒盧師大利根且喫肉邊菜東西南北行只此山下路打破黑漆桶倏忽晶光露露處轉成黑來須驀直去趙州老枯禪布衫七觔半過橋度馬驢銷落無一片縱然無一片這半還相見留得這半相見時也祇是弄泥團漢芥子藏須彌古德遺閒話須彌不減小芥子誰添大夜來溪上行碧天如圖畫萬法無一法無法亦非法非法住法位何處別真假雲門鐵棒疾如雷打破虗空須自打大地一隻眼問口說三跳設復問耳鼻跳到幾時了南北是長江東西是官道牛羊只戀山不戀山中草朝看山頭雲夕對溪邊月雲月本無心溪山各有別溪山若不別千嶺閒雲千潭月一串摩尼珠箇箇相連貫孰知連貫中處處成隔斷是連是斷是斷連寶光顆顆輪如閃黃蘗持钁來活埋速於火火化有商量活埋無閃躲任是金剛不壞身尋常一例都埋却結社來東平薦送溈山鏡偶爾亦何因兩當成聚訟老僧斷獄如商鞅一時撲却無質證無質證還質證空林月上餘清影曉起階下行階前踏塵起塵起本無根欲掃掃不已放下笤且遊行如來一生塵坌裏東方西方人各自問佛果佛果是如何東西各自著等閒掀倒青猊座文殊普賢非渠我船子一顛僧持橈胡亂撞撞著撞不著總成隔壁帳折却橈竿翻却船碧波光溢三千丈獅子項下鈴本是何人繫解須繫鈴人解向何處去解鈴繫鈴認煞鈴泥牛入海無消息月自西方升日向西方墮升墮本如環甚處覓鉤鎖大家拊掌笑呵呵常住常住團欒坐因縛有解因著有脫本無縛著何須解脫因解又縛因脫又著若非解脫何來縛著羽自飛飛鱗自躍躍不知不識無病無藥宣尼有至訓克己復禮為先難而後獲勤而行者誰夫道若大路遠邇本同規一舉足之役胡乃不知歸此心生微礙寸步隨多岐藉曰力未充畫地慎登危深幸提撕切頗為賢聖資誠明不貳物坐立皆通逵恩大實難酬所感匪慈悲如如契妙理唯唯識良師無入不自得黽勉及今茲問答偶錄或問於坦然居士曰世尊千言萬語只要人見性但這性字却是佛與眾生一切有情無情以至脩羅非人等普同共具的隨你上天下地日生月落明暗中邊前際後劫那一處脫却那一時粘住一切眾生凡耳所聞目所見意念所觸觀感所現種種因緣空色那一件不可見那一件是可見且道性字是如何見時又如何粘住則執縛脫却無歸著不粘不脫是粘是脫又早成合頭活套須直指一下落以便學人脚踏實地驀直前去答曰這性字原是人人同有物物不無只因眾生迷墮障却本來隨緣顛倒認相起滅如失路人忘記家鄉落在荊棘坑坎去又去不得回又回不得惶駭昏憒自仆自立總無出頭處經云如嬰兒失母此語極切世尊發大慈悲直指心源令人步步追尋反源還本一旦省悟正如識路歸家嬰兒見母其悲感歡慶無可譬喻無可形容無可思議無可擬會妙明圓覺無生無滅非無生滅以無生故證取無生無因無果非無因果以無果故證取無果學者只須發大勇猛驀直前去有時醒然有時瞶然有時擾然有時寂然一任生滅滅生生生滅滅迷覺覺迷迷迷覺覺總不須疑擬不須體會到得功行圓滿瓜熟蒂落那時本來自現本來却只如是眼原是眼耳原是耳人原是人物原是物眾生原是眾生佛原是佛一切有情無情有相無相各歸本性同入般若涅槃共證圓覺各認圓覺各具妙明共具妙明無論本來面目四字如同戲論即如何是三字亦屬贅語此是如來說法第一實諦非緣覺聲聞各所取證亦不可認作拈花微笑為教外別傳學者且只向這裏究去自然得箇消息却又不是向這裏討得箇消息出也又問世尊直指心源固是第一實諦但這心字却也是捉不來推不去粘不著脫不落原自灼灼的的却又渺渺茫茫還是心因物覺還是物由心見若道是心因物覺一物未對時此中原自醒省說不得無心若道物由心見一念未起時萬相原自森列說不得無物如今說是明心還是將心去明心還是將物去明心若道將心去明心這未明處是那裏將去明他的是那裏若道將物去明心這物還是由外而入還是由中而出況這心字明與暗俱無可著如何說得已明未明這物字內與外俱加不上如何認取由中由外學人誓要明心只是將甚箇去明心請再為指出答云性字是萬物同歸這心字却是眾生各具只因凡夫誤認知覺作心因知覺遂成繫綴因繫綴遂成執著因執著遂成分別因分別遂成顛倒靈根一昧塵境紛起宿業現緣迷失本體不知這心字却本是虗明圓妙任是十聖出世并不增一些靈光任是六道現前并不減一些妙體湛然寂然任行任住湛然處如日月普光寂然處如陰陽默運行處如風轉雲流住處如水澄波定學者且向一念未起一物未對時極力參尋任他參尋不出到底一力參尋於萬念紛起萬物雜陳時極力體驗任他體驗不出只是一力體驗久之又久一旦豁然正如一輪寶鏡具足光明任你業山慾海一例照了毫無滯染任你梵天淨土一例看破些無繫戀這光明并非從內生亦非從外來任是天魔外道總逃不出任是菩薩大乘亦逼不入長寂長照長顯長隱這事極須參會却用不著參會極須修持却依不定修持經云迷時師度悟時自度佛度眾生眾生度佛學人若當下領會便不妨立地成佛且為諸佛師若不肯參會時亦不妨向黑漆桶中任坐百劫千劫但可惜當面錯過枉自蹉跎正世尊所謂可憐愍者爾或悚然起更端而進曰心性之指既聞大略矣敢不努力但些子未明即成隔礙縱稍有知解亦無以堅信心而發勇猛願終白之敢問儒言入世佛言出世儒將天下國家皆歸到身心佛併眼耳鼻舌總攝還心性雖俱於世無著却同是一步步入來如何又說是出世譬如現今坐立處還是身入虗空還是身出虗空若道身入虗空現今並不見有逼攏處如何見得是入若道身出虗空現今並不見有邊際處如何見得是出這出入二字畢竟著落在那邊答云只因世人認煞一邊便自出入兩礙然果識得出入即便認煞一邊亦正無出入且如學者現擬出門原因身在屋裏纔說是出門若並不曾入屋何從更道出門此處極易見但如何道是入却自費解只如世間萬法萬緣各各現在世人曾出却那一件既未出却如何道得入在那一件禪講入定出定且不道如何是定請道如何是出入儒解得出入二字便能功參造化禪解得出入二字便可坐證涅槃學者且究尋這入處閉眼埋頭勿參雜念但理會得入處出處自不須再說再說時便是騎牛覓牛世間第一呆漢然亦不妨再說再說時却是見月認月當前如如佛也或又唯唯否否重申問曰儒行親疏遠近逐事分明佛法方便慈悲一切平等若說不必分別試看天地間尊卑上下動植飛潛智愚善惡是非剛柔那一件是一樣的若是一例的平等便自禮樂刑政不須設施城郭阡陌不須經畫如何行得去即佛法中亦自有三途六道五戒四果種種分別如何說得平等若道儒是世間法佛所說是出世法世法必不得平等佛法原可平等則佛乃大聖人具足萬法妙明圓覺普度萬方若到得世間有行不去處便是小道可觀致遠則泥矣如何稱為世尊萬劫賢聖普同皈依如今只道這平等法門是行得去是行不去還是有行得去的去處又有行不去的去處亦須剖示俾學人得有下手處答云此理只在眼前學者不曾體認便道出許多閒話現今不必遠引試看今日這一天霜影從空飛下點草著木撲水浮山這霜下來時却是一例平等道不得更有分別然松柏添翠蕭艾自萎老幹仍直柔條各腓菊被之而競秀蘭觸之而爭摧波合之而益澄峰承之而益峭只緣這霜是一例平等降來所以能因物付物萬物各得其天各還其本若使這霜降來時先作分別一物各作一霜便是化工大力驅役丁甲經營轉移亦只是一處到一處缺無論缺處不是即到處亦不是推之鏡光波影日照風迴無不如是須知平等二字天道如是王政亦如是佛法如是聖功亦如是學人若能識得便不妨實指妙明圓覺亦不妨直認參贊化育頭頭指來處處現出易云聖人無心而成治經云一切聖賢皆以無為法而有差別正是平等註脚學者須自認取若此不能理會措大只守著誠敬二字衲子只守著戒行二字尋把茅葢頭自行理會定然有箇見處到得有箇見處時方知這誠敬戒行之功用宣尼論語釋迦談經總於此住實無所住一貫不二本是大同其微有不同者緣孔子之言性止於無聲無臭如來之印心極於無性無生一箇圈裏一箇圈外此又入世出世之名之所從來也若不及此窮究踏實前行纔得一知半解便自妄語狂言以為希有世尊不過如是無論於佛宗旨如癡人說夢即於聖道亦豈有了知日哉慚愧慚愧勉旃勉旃大學士張廷玉澄懷居士佛法頌并序蓋聞法雲普蔭靈相徧於十方慧照朗升恩光曜於八極握仁王之寶鏡日月重輝轉梵帝之金輪雷霆並銳惟湛然長住大雄包混沌之源寂爾無生正覺超氤氳之表故能使九十六道紀菩提之一門三十三天貫須彌之四頂天上天下通明之體常圓三千大千無緣之慈廣被信乎海水可量虗空不可量虗空可量菩薩摩訶薩成就眾生變化隨感不可量菩薩摩訶薩修行地位有分劑可量諸佛真如性海無邊無中無內無外不可量至哉大哉鄒衍之口不能譚章亥之術不能算鈞天之奏不能聲易牙之頰不能味然則雖欲頌之曷從而頌之粤稽古昔三藏之義未顯二乘之運莫窺蠢爾眾生芸然食息并識同奔隨緣受業人天異軌生死紛馳起伏沈浮千態萬狀如來乘本願以度人現慈力而應化制六師而正四倒祛八邪而歸一味折世智之角杜異人之口導求珠之妄心發觀象之翳目持寶炬而明覺路揚法舸而濟迷津應病投藥為無上之醫王含乳調酥作羣生之慈母此法王之至仁也法忍智忍率難忍以皆空無心即心總羣心以俱攝珊瑚江海彈一指而起波瀾瑠璃日月垂兩手而綰晝夜百千妙偈生於鳥翅之間十二音聲出於象牙之表演涅槃則智超三界說般若則天雨四華獅子一吼而外道摧鋒法鼓暫鳴而天魔稽首此法王之神力也高梯直上籠絡太虗抽針旁投區分小有貫花之句光如水上之祥蓮說偈之音朗若星中之皎月非有相而非無相凡聖莫窮其幽微空是色而色是空智愚鮮洞其要妙綜括弘遠奧致遐深八萬四千之藏二諦十地之文祇園鹿苑之譚海殿龍宮之訓玉諜金書之字七處九會之言罔非垂妙道於天上人間扇元風於前今後古開千百葉之因因果果啟億萬心之法法如如實為世界福田盡是蒼生歸宿聞者甘露入頂悟者慧水灌心含生抱氣之倫蠕動翾飛之眾莫不掌合腹內思聞十善之音聲唱殻中遙頷四天之說金口妙義掩二曜以長懸瓊軸微言貫三才而靡絕此法王之教化也以妙法為車以禪定為軫以忍辱為轂以持戒為轄以勇猛精進為輻以金剛般若為輪始於自載終於載人俾訪道者識路迷宅者知歸智珠法鑑人人可持四忍五明家家有望斯其為功豈海水恒沙之所可量哉至若晨鐘暮鼓喚回夢境之愚頑皓月清池洗淨塵襟之坌集六時翹請常以國王水土為心三業精修必以君父恩深為念斯又熱毒之清涼忠孝之遒鐸歟夫月無却水之心水有含月之性如水失本清之質則月無自現之方必也早契禪那久依定水意花不染弘上善之慈心勝果爭扳察中乘於慧眼則積滯皆傾類秋風之落葉繁疑盡釋比春日之銷冰矣麤述勝因接茲初地若夫向上非可言詮頌曰藹藹慈雲葢覆十方湛甘露味溥瑠璃光慧燈常照智日常臨斯日斯燈萬古之心惟心非心名亦強名現無相相廣無生生十地九天破幽燭暗月月之光海海之岸象馬東馳金身丈六柱地維天經航法轂傳衣一花說法無字震耀鏗鍧聾聰瞽視祖紹宗承皮髓肉骨究何有哉佛亦無佛明星漏光本心直示法爾如然西來大意真如說達摩自西天來至中國祇期密傳心印印爾本心以心印法以法印心心既如此法亦如此所以說無一法可得祇教了取本心當下了時不得了相無了之心心了兩融是乃所謂真如也夫真如者寂而非無動而非有行而非遷住而非止萬色齊彰非青黃黑白之可色眾聲交作非清濁短長之可聲用周沙界而纖影不留體遍大千而寸絲不掛古之今之八萬劫不離當念人之我之三千佛總在現前化城八面無非清淨法身蓮座千層總是莊嚴妙相四生六趣俱遊寶筏慧津十地五天盡作水晶堂壁無一法本有無一法本無無一法欠缺無一法棄餘泯中邊斷前後絕妄真同垢淨忘能所齊色空印同異等聖凡一滴水味與八海無差一釐金體與全礦無別一毛孔能容納太虗一毫端能葢覆大地即性是相即相是性即理是事即事是理即空是有即有是空即法是塵即塵是法現今天覆地載日東月西晝明夜暗山峙水流更無一絲一毫不同隱現過去八萬劫未來八萬劫更無一塵一剎不共出沒人誠到此真如境界如鏡照鏡如空合空如水投水如月攝月摩尼寶珠具含眾色淨瑠璃瓶光境兩忘收則俱收現則俱現不容造作不假安排自然無作無止無任無滅且也作亦無作止亦無止任亦無任滅亦無滅卷舒與奪如意分疏生死去來於法自在即真如二字亦了不可得矣至哉此旨難遇罕聞惟證乃知非悟可測言前薦得已涉程途擬著意求刻舟何益昔雪山夜覩明星覩此也迦葉破顏微笑笑此也少室面壁九年面此也六祖夜半傳衣傳此也以及從上古錐凡有一契一證一棒一喝無非契此證此棒此喝此也覓來移步換形不道却在這裏拈去千頭萬緒可知究竟無多吹無孔之笛簫聽空中之法鼓乃至覩無所覩笑無所笑面無所面傳無所傳亦復契無所契證無所證棒無所棒喝無所喝擎拳豎拂自是傀儡登場掂兩簸三是說他家財寶旨哉世尊有言如夢中人夢時非無及至於醒了無所得然則猶有一絲未淨仍在夢中必至了無所得乃為大醒耳夫此了無所得豈言思擬議所可及哉請為偈曰我有一丸佛虗空滿一切欲說本無形欲畫元無色來時有信潮定處無痕月妙味難言言欲問須問舌又偈曰如來還來如來來還如如是名為真如真如定何如唱覺歌淨掃塵根幻妄身先須認得本來心寶相莊嚴皆色相無相無心見始真持心觀心紛主客即心即佛添名目非心非佛又如何箇中妙意難容說浩浩靈臺方寸區湛然無有亦無無靜不滯兮動不溢化非變兮寂非枯誰栽意樹發空花誰放心香吐塵馥誰施八水潤焦芽誰握雙丸啟凡目一點靈光無障礙就裏普含十方界一一界中放光明一佛千佛皆現在太虗中法雨香醍醐一滴幾人嘗嘗過醍醐味無味夏飲水兮冬飲湯妙勝堂牟尼殿幾人曾見如來面戒香手炷謁靈山又早山門闔兩扇迷迷迷兮迷不醒一聲獅子當空震日照潼關四面開長安大道何須問垢垢垢兮垢不淨縱汲西江浣難盡亭亭出水妙蓮花生在污泥不染性狂狂狂兮狂不定罡風吹透寒冰浸六窗受月片雲閒猿馬何須繩索禁邪邪邪兮邪不正驅逐么魔愁劍鈍金剛百練繞指柔百萬魔軍齊乞命迷者醒垢者淨狂者定邪者正頃刻凡夫頃刻聖聖聖凡凡豈兩人明珠一顆當心印三春物態好繁華萬樹夭桃萬樹花如何遍滿無虧缺請從箇裏究根芽日上三竿萬象森大千世界普光明如何一隙皆生白破暗通幽徹底清滄江之水浩漫漫一平如掌無峰巒如何盡泯高低跡放眼從教平等觀梵志夢中多梵志剎那一夢千年事如何千劫一剎那妙諦須知融攝意冷然微笑天宇空聞聲讚歎繞天龍何人長嘯響山谷直似寒蟲吟壁中巨靈擡手華山劈區區真是縛雞力我聞佛力大無邊一指能援眾生溺渡非航卓非錫海靡涯履一隻黑漫漫明歷歷二五原來是一十打破算盤珠珠珠歸一一何須披半夜之衣不待面九年之壁歸依復歸依稽首當前佛祥風甘露徧十方億眾常安一心福偶吟二十首圓光一顆本虗空萬象森羅面面逢月影印潭潭印月欲分賓主却何從雙丸旋轉在當前暑往寒來孰後先探取無生無滅理大椿朝槿恰齊年鳶飛魚躍各升沈山自蒼蒼水自深欲識高山流水意夜來明月印天心思從覺路覓真傳枉踏芒鞋路萬千識得平常心是道飢來喫飯困來眠本來無相亦無名纔著思量翳障生塵掩鏡光雲掩月不分明處最分明非空非色非明暗無我無人無古今可歎世人多不解掌中一指是知音參佛佛原無覓處傳心心又在何方不如真妄都忘了笑看忙人夢裏忙佛本無心安有意西來之意問奚為莫言此處人難會露柱原來也不知認著依然不是真休從語句枉勞神可憐一樹庭前柏賺盡古今多少人永嘉七字指迷津心法雙忘性即真始信如來大圓覺仍然宇宙一凡人不坐蒲團不面牆聲聞色見總尋常自從領略醍醐味六月炎風透體涼多年暗谷一燈明明暗都從眼界成何似道人酣寢後一輪紅日在三更地闊天空方寸寬笑他蟻磨與鮎竿一笻偶上蓬山頂百萬峰巒脚底看畏喧求寂兩紛張臧穀原來總失羊萬事心中無一事荷花雨迸滿池香門前誰斷客停車只要主人省得家一任春風蝴蝶閙可能飛上雪梅花焚修朝暮傍蓮臺聖見凡情枉自猜大地山河俱是佛謾教移過淨瓶來合浦珠光映月圓行人岸上誤流連歸來認取衣中寶何用重尋下水船奧義莫從言外覓真詮休向句中求撥開文字拋知識無孔笛吹江上秋心淨時時聞妙香何勞鼻觀費思量諸般法相歸烏有一任天花作道場誦罷蓮經有會時倚闌高詠昔賢詩梧桐月向懷中落楊柳風來面上吹西江月十二首纔見冬風栗冽旋看春色芳菲箇中消息是耶非斯理無難領會都說鳶飛魚躍何妨鳶躍魚飛高卑俯仰總天機方是活潑潑地身上垢衣未解懷中塵鏡慵磨不知自障礙偏多反說佛門高大悟即易如拾芥迷時難若填河忽然夢醒發高歌心佛原無兩箇代謝本無生滅循環安有初終請看春夏與秋冬來往猶如接踵人見是空是色我言無異無同天然空色在其中一任風旛自動泛海乘風破浪蒼茫不見涯垠忽逢寶筏渡迷津彼岸不須重問本自無真無幻休言非幻非真萬緣既息有何因一點靈光無性佛旨非藏非露佛言非淺非深若從語句覓真心恍似充飢畫餅魚兔得時便了筌蹄何用重尋自參自悟自通靈聊把經文印證誰道心兮微渺時時遍滿乾坤一輪月印萬川明方識萬殊一本悟道誰分頓漸成功豈在操存天長地久自惺惺到底不離主敬多少靈山法眾一人識解高超語言文字總徒勞纔覩拈花即笑老馬也能知路昬鴉幾見迷巢即心即佛不須招何必自生顛倒喻法偶拈拄杖傳心試取袈裟雲門胡餅趙州茶妙味惜無知者窗外青青翠竹籬邊鬱鬱黃花無端花竹影交加聊作道人禪話現在尚為幻境未來過去茫然強詢父母未生前有見仍同無見池內是冰是水爨中為火為煙開時成掌握成拳此際何須分辨無味乃為至味希音方是玄音何人解鼓沒絃琴更有何人解聽古井湛然常寂閒雲散去休尋經言成佛本無心心有即成凡境煩惱皆由心起無心煩惱何居誌公密諦指迷途脫盡眾生愁苦方寸本無愛憎大千安有榮枯妄從塵海覓亨衢忘却家園樂土史說不知不識易言何慮何思果然無作亦無為便是羲皇上世芳草落花踪跡孤雲野鶴襟期春風沂水詠歸時想見一般況味左都御史張照得天居士心賦并序臣幼誦詩書惟通章句長窺緗素徒亂狂華既理障之沈深亦欲根之堅固周旋樂趣彌益苦荄意蕊紛開頭燃良痛側聞宗說能使心地清涼乃閱教文涉獵龍宮寶藏初知山河大地本是妄生地水火風原從幻結一身非有此外何言然而明暗色空塵塵和合身親民物了了當前欲遣去則皆非豈混同而猶是捨一取一罔息於馳求前三後三彌增其較計得少謂足中止化城慕聖厭凡兩頭壁壘惟身惟口惟意步步交加曰貪曰瞋曰癡層層涉入滅此生彼終無已時誤後悔前豈能自在幸十世福田之廣種遇一人首出之垂慈欽惟皇上參贊三無經綸萬有用周孔之典則致唐虞之協和尊居九重而如遊山澤恩覃八極而視等浮雲同太虗之穆清若杲日之明照現帝王身而為說法發如來藏於一微塵夙契一貫之心源宏闡別傳之妙旨未嘗言說已震雷音普示提撕常垂甘露憐臣迷頭認影為臣解結開巾遂使蛙出井心翹首而瞻天際蜂穿紙隙翾飛以近日輝始知本性如然此門不二大學之道固御世之權衡直指之傳乃明德之統要非敘倫庸禮修政明刑何以妙此心之法相非破妄泯真圓通普覺何以濬萬化之靈源空有相倚而成盡其有纔圓空性幻實異名而一履其實始了幻因名相空華涅槃實際如猶未到寸絲不掛之實際將何以釆萬善具足之空華世出世間不取一法空投空際寧捨萬緣歷劫難報斯恩大千的歸一旨今者奉勅恭撰心賦一篇進呈御覽爰述此序自志本末夫心也者譬喻莫施敷陳奚盡嬰兒開口已了根源佛祖相商莫能下語即金針在手何由捉霞彩以裁縫縱綵筆凌雲豈可取太清以繪畫然一絲孔宛然華藏千須彌不異毫毛物物圓成頭頭顯露豈臣斯賦獨乃非心心亦非心賦寧是賦蓋即鸚鵡翦舌而學語蚯蚓鼓脰而鳴歡黃花對日而舒顏翠竹因風而吟籟云爾賦曰無生無滅無在無遷慈氏以後威音以前卓爾獨存而離彼離此湛然常住而匪中匪邊惟圓斯覺惟覺斯圓圓不見圓圓周他自覺無所覺覺徧人天拈起十方虗空不足以絜其大數盡恒沙萬有不足以語其全芥子孔中容納四大海水屈伸臂頃直過萬八千年攘為己有則曰正法眼藏權當人情則曰直指別傳何凡何俗何聖何賢何迷何悟何法何禪六趣三塗全該真體十身四智靡隔妄緣起而無生諸佛入涅槃於眾生識海寂而常動眾生墮生死於諸佛心源無一塵而不入如大圓鏡無一剎而非真是金剛圈若大火之聚空濯手難近若水銀之墮地轉瞬渺然法法依之影現如摩尼珠體非一色物物仗此光騰如寶絲網層映相連擴為六合而又包六合之外故莫量其外之際碎為微塵而又居微塵之中故莫測其中之堅色色全彰頭頭顯露廓然無相而眾相交橫寂爾無音而羣音並吐欲要其終智勝之所不能窮欲原其始然燈之所不能溯欲走以避則九天九地總相逢欲捉以觀則千劫千生不能遇茫無朕跡何地可以染污周遍大千何所容其保護大小同量高卑同度有無同體生滅同住亦是亦非亦起亦仆亦遠亦近亦緇亦素了之則一道齊平執之則千途各立依回於地水火風眩轉於受想行識牽纏於見聞覺知泥滯於去來今昔迷誤於狐唾貍涎尋探於破書殘籍茫昧於泬寥杳冥計較於寸分丈尺拈弄於有覺精魂斷滅於無知木石厭棄於人我眾生埋沒於暗明空色安排於佛剎道場起倒於世諦徽纆習慣於揑目生華癡著於遺金拾礫淆亂於欣就厭離紛紜於得失損益烏非黑鶴非白無始劫來名相跡道黑道白鶴正白烏正黑六結當心不調直疑白疑黑是以著處便粘交加不釋以膠投漆而漆亦為膠以客迎賓而賓全是客春蠶成繭而繭還縛身夏蟲依冰而冰先喪魄熱毒海漫漫沈沈鐵圍山巍巍岌岌四種相怪怪奇奇一箇我緜緜脈脈枕中槐國指揮鳥虎龍蛇石裏火光分別卵胎化濕人間之滴水難消地獄之程途孔亟火厚二百肘何處蓮華風吹三千年幾時安宅病既千端丹斯萬品西天四七受藥師之親傳東土二三共醫王之正稟或拈大地作伊蒲之饌充彼飢虗或緝浮雲成金縷之衣蘇其凚㾕或然香燈寶炬照彼昏酣或驅法電智雷醒其寱寢或喻空華或方二月滌除有漏根窠或指四大或標六塵卷却無明衾枕或現檀那之力佛鉢可滿以少華或建精進之幢金剛不雜於凡餁或戒香薰習出白淨於泥塗或定水淵澄返真常以漸寖或禁瞋蛇之妄動免燒功德之林或喻太末之難緣拈出菩提之錦或收狂象以擐拴或禁亡猿以圈檻或揮智慧劍破欲網之重重或棹般若航度愛河之黮黮或說乾城大海上無邊龍蜃樓臺或譚淨土寶池中無數金銀菡萏或顯三身應現非斷非常或示一顆圓成不增不減裂開一味平等之法爾如然演出萬般差別之教宗頓漸超方便住圓覺止啼楊葉婆娑成佛果斷輪回翳眼空華荏苒蓋燒須獼雅宜螢火而束虗空純賴龜毛撥開幻影浮光玉龍迴䟦築著銀山鐵壁石虎聲猇華亂澄空五宗各飄其香雨浪翻平地三關長卷夫銀濤非半非滿非偏非圓一種沒華之果有權有實有照有用單通無木之橋走殺天下參禪衲子惑倒世間成佛英豪獅兒口喝樹頭風縛歸袖裏兔子角挑潭底月挂在眉稍八海水化為醍醐無非毒藥一些子現成法寶只這毫毛即此是實際理地即此是夢幻影泡何愛何憎刀割檀塗一般滋味何取何舍釋迦調達兩處逍遙非見非聞涉解會而皆為自棄非無非有滯方隅而即起塵勞等量均齊若動一念即資其顛倒本來具足若向他求轉益其紛囂必也如杲日之皎皎必也如太虗之寥寥必也如風輪之急轉必也如川月之普昭須如是人明者箇事寶鏡光千千不隱切忌眼觀師子弦喤喤厥聲直須目視如水成冰是冰非水而全水是冰如金成器是器非金而全金皆器開眼作夢中之佛六度萬行圓滿方成一事不為操心降鏡裏之魔十聖六凡齊遣始知兩頭皆是事即理理即事二障全消迷即悟悟即迷雙因並置隔時能隔所隔是名為愚了却無了可了乃稱曰智似騰蛇之遊霧住霧非空若香象之渡河履河皆地不執緣以修證不住相以布施玉水自然澄澈一任波濤金山不畏泥封何為瞋恚德瓶撲而不破只因包舉三千道岸登而捨航始信泥洹不二夫惟者箇不落圈䙡無一法自中出無一法自外至昭昭太古之先歷歷窮未來際大光明藏覿體無依清淨本然獨尊至貴生人生物生佛絕妄絕真絕對即別而同四不離一即同而別一不離四一本無一四寧有四能所兩亡色空雙寄體離凡聖路絕彼己靡間一絲云何可祕本無所悟強名曰會蓋見以心明而絕明以見絕而澄見絕故真俗垢淨不礙眼光何大千之可辨心明則菩提煩惱一路涅槃何七處之可徵一珠入一切珠一切珠入一珠無分無合一月普現一切水一切水月一月攝頓圓頓成窮三際而直立亘十方而大橫百千萬劫如是南北東西等平斯為華嚴會之方廣是以無量壽而圓明勉學論或於座次問何以入道余曰道無門戶而子問何以入者毋乃失問歟夫道不取不捨即今能失問之子所失問之語俱在道中而又何從入耶或曰豈無善權方便曰世尊四十九年說三藏十二分作善權方便矣末後拈出一華在百萬人天中作將來眼誠亘古亘今善權方便矣西天四七各有偈示機緣傳至少室以及曹溪流乳分波枝條蕃衍四方八面霆轟雷震如所為木上座金剛圈青州衫娘生袴三脚驢蔴三斤鼈鼻蛇獼猴鏡拈布毛旋風打至若五位君臣四賓主三玄三要九帶十智等前後出興莫之紀極各各隨緣順時以垂善權方便矣孟子有云子歸而求之有餘師而又何問之有或曰雖然必有以告我曰迷者覓悟譬如坐者求起尚不得言易何況於難今子坐於此設欲起而立則亦惟子自起於座耳他人其何由代焉他人為子說善權方便不過曰子竦身直足離座斯起如是而已告子而子不知起即驅毒蛇猛獸以駭子而子仍不能起則他人其奈何縱使令兩人夾而掖子以興而子不會於起則兩人釋手而子又廢然還其故坐矣即時時刻刻令兩人夾而掖子以興此兩人者終必有釋手之時則子亦終必有廢然還其故坐之日矣且也夾掖之久而子乃謂人之由坐而起也非用兩人夾而掖之不能則子將終身不知起立之所由矣將毋所謂善權方便者轉而為𮊁擭陷阱也夫子若真欲自起於座唯辦肯心不知不覺蹶然而興則子雖欲自言其由坐而起之因緣方且語言文字不能詮釋丹青粉墨不能摹繪而他人又何處可以畫蛇添足哉客聞此語嗒然不能起於座筏喻室記余室左右窗皆臨池形似舫名之曰筏喻有客入室請問筏喻之義曰子今在筏而問筏耶漭沆大海濁浪拍空魚龍出沒水怪磨牙其順流而尾風則千萬里不知其所止其首風而觸流則尺寸地不能以自前不有此筏曷登彼岸生死猶大海也眾生歷劫不能自出佛祖乃為設善權方便解粘去縛抽釘楔使獲大自在一切安隱以筏為喻豈曰不然客曰此子所為以見聞覺知傍語言文字用之乎者也而解如是我聞夫豈小子之所請益也古德云唯此一事實餘二即非真如子之云猶有岸焉猶有筏焉岸與筏既為二矣并乘筏登岸者而為三安在其為一路涅槃門耶曰眾生自無始來沈沒生死大海塵根相對根識互牽剎那剎那微塵微塵息息不停心心不住如波擊風如風盪波善因惡果迴環轉旋萬劫千生生滅無已世尊於是生憐憫心於四十九年中為說三藏十二分明此六根六塵六識皆是虗妄和合因緣非真如自性本覺明妙此熙連禪河所結筏也迨佛以一華囑付飲光而令阿難輔之傳至菩提達摩實來震旦時則三藏十二分復被六根六塵六識所和合如油入是皆油無油不紛紛穿鑿全失佛心乃為直指一華渾作無義味語俾學人味之如木扎羮鐵釘飯親之如吹毛劍大火聚目之如閃電光擊石火耳之如塗毒鼓旱地雷緣到時來直下粉碎覿體真純此葱嶺發源曹溪流乳歷代祖師所結筏也語未竟客曰嘻子豈已登岸而捨筏乎岸也筏也子也仍三也我聞此門不二子何以云曰居吾語汝自久遠劫來一段心光動為妄習所障而不自覺不特四大六根已也乃至讀書書障窮理理障行善善障持戒習定戒定障參禪學佛禪佛障但有所為皆是心光影事苟不到淨躶躶地則命根終於不斷然則淨躶躶地乃岸也而凡諸善權方便俾得到此淨躶躶地者皆筏也然雖如是一旦迷妄頓消開豁顯露讀書亦無書障窮理亦無理障行善亦無善障持戒習定無持戒習定障參禪學佛無參禪學佛障乃至六根六塵六識亦無六根六塵六識障頭頭是道一一全彰盡是菩提皆成甘露豎窮三際橫亘十方無一剎那而非佛日無一毫毛而非法身脚跟點地岸斯在矣向所為淨躶躶地者其又筏歟雖然如是讀書窮理行善持戒習定參禪學佛即是空華即是夢幻了不可得於了不可得中如是如是無間無斷純真一如始得休歇於無休歇處然則所為脚跟點地固時時刻刻不離筏上大海本來是岸亦無此岸彼岸之可言岸即清淨法身筏即百千萬億化身乘筏登岸即圓滿報身三者一耳一亦不立安得云三今我與子相對此室岸耶筏耶子耶吾耶客乃相視而笑因書其語以為記茶話或問有曰空問空曰有或猶未達乃說偈曰空倚有以立有倚空以名萬有悉皆空虗空實為有一毛孔之空有有中居之凡此實有物自具本性空有既不可得空亦是強名若住空有相何得云涅槃今爾問於我我爾復何名名空既不可名有實豈然若然無爾我何處立問答於此二無中為空抑為有空有若一如強名曰不二覺生寺文覺禪師元信雪鴻上堂佛法兩字不是惟佛有此法亦非眾生無此法謂之佛法也佛者覺義覺即是法覺因迷立不迷何覺何為迷見山河大地認作山河大地於見聞覺知便立見聞覺知此即是迷何為覺見山河大地喚山河大地於見聞覺知使見聞覺知此即是覺同見山河大地同是見聞覺知因甚有迷有覺咄山河大地見聞覺知幾曾向你道迷道覺來總之說覺說迷說真說妄皆以假名字引導於眾生吾人本有之性本自現成本自具足本無生滅非空非有非真非妄非迷非覺祇為眾生無執生執無礙作礙妄見有空有有有真有妄有迷有覺若能一念回光自然萬法俱了要知了底道理麼驢事未去馬事又來上堂一人有眼不能見有耳不能聞有舌不能語有心不能鑒一人無眼能見無耳能聞無舌能語無心能鑒兩人相見那箇在前那箇在後復云且道兩人因甚得恁麼上堂但有言說都無實義山僧敢道凡有言說無非實義諸人還識得者道理磨若識得也塵說剎說熾然說無間歇但有言說無非實義若識不得也塵亦不說剎亦不說無熾然說無無間歇但有言說都無實義上堂南方行脚一遭拄杖頭不曾撥著一箇會佛法底人者箇說話大似不知自己拄杖頭短山僧亦南方來拄杖頭不敢動著一箇何故呢彼自無瘡勿傷之也乃一夏在者裏終日與諸人搬石運土拆東補西山門決要向南露柱定須著地鍋子有大有小杓柄較短較長無規繩中立規繩無內外處分內外堂內底要知堂外事不得離堂內堂外底要知堂內事不得離堂外且道與諸人分中最動耶不是動耶靠拄杖云且喜太平示眾東弗於逮人喫飯西瞿耶尼人腹脹南閻浮提人行路北鬱單越人脚痛是合有底常事因甚眼能見物有見得及底有見不及底耳能聞聲有聞得到底有聞不到底為見聞之性有不徧耶為見聞之境有隔礙耶皆因迷却目前往往失却背後理上無不融通事上不免成滯總能理事一如畢竟事理兩橛釋迦老子直得差排不來只得道箇是法住法位世間相常住須知者法位迷亦在是悟亦在是無明煩惱由此妄想執著由此全身在者位裏更向外覓全身原不在者位裏却向內求左也被他礙右也被他礙口能喫飯手能捉持通融不來火作水用水作火用假借不得所以學道人貴知處處有出身之路物物上有轉身之機能於一法位中轉得身便於一切法位出得身自然東不礙西南不礙北移彼作此移此作彼然後入佛不礙入魔不礙入凡不礙入聖不礙入空不礙入有不礙入生不礙入滅不礙若作本無佛魔凡聖本無空有生滅認為不礙敢保伊總會得是法住法位未會得世間相常住在示眾不可以智知亦可以智知不可以識識亦可以識識本無名相亦有名相本無言說亦有言說本無差別亦有差別本無遷變亦有遷變因有遷變知無遷變因有差別知無差別因有言說知無言說因有名相知無名相因可識識知不可識識因可智知知不可智知所以若剩一法不是者箇法若欠一法不是者箇法譬如說普天之下莫非王土率土之濵莫非王臣肥亦土也瘠亦土也大亦臣也小亦臣也恁麼也王還有功幹也無不見道不現而章不動而化無為而成其惟聖人之道乎設謂山僧不解直指只念篇章便向道某也幸示眾達摩西來直指人心見性成佛要知別無指法只要忘情泯見自然見性明心若不明心不知心之本空若不見性不識性之本該本空故即執著全消本該故即圓融無礙何為執著全消色不是色聲不是聲何為圓融無礙色直是色聲直是聲雖然聲色不到處又作麼生莫著空好示眾人但知凡聖情盡體露真常不知凡聖情起真常體露何謂凡諸佛是何謂聖眾生是何謂真幻化是何謂常生滅是雖然須開透關眼始得若透關眼未開古人道山河及大地全露法王身是一箇是兩箇毫釐有差天地懸隔毫釐無差天地懸隔參小參諸法皆有對待生佛聖凡頓漸偏圓等法是也惟者箇法無對無待非生佛聖凡頓漸偏圓可該而該得生佛聖凡頓漸偏圓故擬向對待法裏覓者箇法不可得不向對待法裏覓者箇法亦不可得只者兩箇不可得處無教可收那得不是教外也既總不得又如何傳彈指一下云切莫妄想小參華嚴經云心佛眾生三無差別山僧道差別心不是佛佛不是生生不是佛何故佛時決不見有生生時決不見有佛心時決不見有生佛生佛時決不見有心試體驗看小參三教聖人皆貴說中或說時中或說守中或說中道祖師門下却用不著若有中即有偏中偏相立取捨情生是法非取捨法所以從上只說者箇其實者箇亦不立故方如圓如高如下如一亦如多亦如橫亦如豎亦如塵塵如剎剎如謂之如如法門也心佛即心即佛非心非佛心佛本空即非何有能不守空真源自通佛佛祖祖以此立宗真性偈譬如富長者財施遍國土令各各莊嚴成就種種事而此富長者安住自娛樂都不知有是真性諸法依亦復如是爾若佛若眾生身心及世界乃至無量法皆從性幻起真性常清淨猶如世間海現蜃樓幻市海相還如故所以修學人勿滯一切法一切法無實但以無見見見此無性性皆成無佛佛常度無生生山居偈七凸八凹山下路有誰來叩白雲扉披雲常嘯千峰月閒却人間是與非住得青山深更深長松脩竹沒閒林神光一道從無昧非去來今貫古今枯者自枯榮者榮春來秋去又經冬要知山上住山客即是山中山住翁聖因寺悟修禪師明慧楚雲寶親王贈拄杖師接杖拈起云這杖也是七十年與山衲同庚王云一百四亦不為分外師笑云大家的大家的小參佛者心也法者心也僧者心也色空者心也明暗者心也是非者心也善惡者心也凡此等心皆屬幻妄如空中花水中月了不可得乃生滅法也且道如何是真心心者佛也心者法也心者僧也心者色空也心者明暗也心者是非也心者善惡也良久云莫者便是真心那將拂子擊案兩下云莫瞞人好小參太湖三萬頃葱嶺五由旬塵塵葉葉出頭天外易葉葉塵塵從空放下難頂門具眼的黑漆漆十萬脚跟點地的露堂堂八千若以色見聲求何異鑽冰覓火如或意解思度大似向西東行這件事欠一法不是剩一法不是取一法不是捨一法不是即一法不是離一法不是設有人問如何得是去但低聲向他道老僧却在是非裏小參諸人看看闔常住山僧及大眾殿堂寮舍柴水米鹽椅案牀架盡被一條繩一串穿却諸人還見這條繩麼良久云是什麼斷貫索小參無言說無言說沒甚事沒甚事大道只在目前祇此目前空色色即是空空即是色他即是我我即是他若也眼目定動却成白雲萬里豎拂子云莫將閒學解望擬祖師心小參豎拂云山川人物上下四維五金八石磚頭瓦礫琴瑟鐘鼓風雲月露寒燠溫涼馨香臭穢布綿羅綺米麵醬醋菴觀寺院庭堂殿陛是什麼擲拂大笑云那里說得盡小參目前六月好箇時節熱處却冷冷處却熱火裏水裏蓮紅藕白佛法門中有權有實衲僧分上何得何失銀碗盛出峨嵋雪聊與諸人解煩渴雲門扇子風凜冽扇得虗空毛骨徹舉起扇子云且待翠岩眉毛落再向諸人細解說且道說箇什麼搖扇云舌頭一片肉牙齒兩排骨向侍僧云切不可記錄上堂前者蒙聖恩賜一飽齋實可謂天厨御饌百味具足大眾且道是何珍饈眾云請和尚告示師云老實對汝等說也不過是土物耳下座上堂問答畢乃高舉拂子云山僧即是拂子拂子即是山僧且道大眾是拂子拂子是大眾也不將拂子向空一拂擊几案三下下座上堂兩班闍黎一箇老僧恰好一比山僧即是香餌大眾一一皆如貪他香餌上他鉤雖然眾中若有奔騰霄漢的英靈吞却山僧則易著山僧吞却却難諸仁者作麼生會若也不會聽山僧重下註脚喝一喝云向嘉州大象牙裏作活計去上堂召大眾云看看老僧手中一握水從何處得來眾無語便下座上堂拈拄杖云者木上座有時向洪濤裏燃香有時向烈𦦨中酌水諸仁者切莫道作夢中佛事的然實相功德只有一件事不唧𠺕却與老僧相同何者不解誦經號佛有僧出云若然和尚何得每每示人念佛師云孟八郎又恁麼去也上堂一僧出眾叩謁師喝云闍黎何得受老僧禮拜僧罔措師笑云若要好大就小上堂老僧偶作一夢夢與大眾陞座說法諸人且為圓兆看眾無語師云累我累我便下座上堂師云唵啞吽口字傍邊添一奄字名曰唵左口字右亞字名曰啞口牛相並名曰吽梵語唵啞吽此云阿耶阿耶吃嘹舌頭註脚不來慚愧慚愧便下座上堂師據座良久大眾啟請說法師袖中取心經一部高聲朗誦一遍下座上堂拈一瓣香云將此一粒金丹布施大眾但只可吐不可吞眾中還有領受底也無若不肯領受老僧只得取入三十三天寶藏庫去也爇向於爐天寧章禪師過訪師門迎才見指面前案山云老僧日來高掛孤峰頂上何以相救天寧向地作舞钁鋤勢師曰橛放橛埋天寧云百消丸一任咬嚼師大笑𢹂手歸丈室西江月十首堪笑多年鈍置把磚作鏡研磨百千關鍵指彈過袖裏乾坤粟大放開山河大地揑聚大地山河而今任我樂高歌囫圇劈開一箇太古鴻濛前後威音彌勒始終誰論九夏與三冬秋春一任接踵色即是空空色同中有異異同色空同異自縱橫妙用隨宜定動本元豈容造作心田那有涯垠渾忘彼岸和迷津踏著無勞更問佛曰離名離相法云非假非真森羅萬象露全身物物各彰妙性打開凡聖關鎖霎時徹透玄微無心何是復何非貴在當人自會戴角大蟲穩臥落毛鐵鷂翻飛一塵劈破露真機吞吐三賢十地千仞須彌不廣萬丈香水非深覓心不得是安心可把雙丸作餅覓佛不在聲色求法何用搜尋本來不昧一虗靈自怡還須自證九秋黃菊冉冉三春芳草菲菲西來祖意是耶非箇事急須領會兩手拍成一響兩隻孤雁同飛打開權實自知歸穩穩脚跟點地古鏡本雖具照然須假借揩磨云何歲月枉蹉跎自愧浮生老大能達一塵不立却然大地山河空手行拳舞娑婆何妨將錯就錯迷本苦連根蒂悟時甜合邊中分疏一點枉勞工休把葛藤播種聞見非聲非色心佛非異非同萬象不著即空空皎月澄潭不動有念山頭鼓浪無心海底揚塵悟迷迷悟總非真生佛何修何證太虗純清絕點寒潭皓月一輪百花叢裏不沾身許汝明心見性勘破色香味觸了無知見覺聞空空色色露天真㘞地一聲方恁明明百草叢裏普現自己家珍頂門豁眼覰方真此眼人人有分妙正真人婁近垣三臣性地頌四首輝輝大圓鏡物我具此照彌勒與威音一身兼兩號心本無可明因明啟其奧性本無可見因見顯其妙惟茲心性中同含真常道妙體恒湛然光華六門耀紛紜處本靜寂歷中原閙忘機泯取捨歸根無老少欲知佛仙理祇這玄關竅三千金世界即此方寸壺毫端顯真性大地驗幻軀心無因境有境有因心無心如不逐物何處更尋吾仙凡分頃刻表裏別精麤萬象任紛紜真心迥峭孤於焉契妙理一滴隱江湖天心一輪月清淨印我心我心與明月互印光轉深有光便有相焉能免物侵何如泯其光萬境任浮沈此之謂至明翛然出五陰若箇金丹訣多少錯推尋從天本無降從地本無出其間此一事自在而自適如珠在虗空光華不染色如露滴荷盤圓轉不落跡應現諸剎塵遊戲仙佛土幻化雖異形如千燈一室在智本非智言得却無得前聖本無說後學強傳述諸佛與眾生同仁不同德若作分別想歷劫迷邪惑如月印千潭含元萬而一說與智愚人共證波羅密心佛歌心與佛等虗空空中之物妙難窮碧海光涵輝萬狀青山色霽聳千峰休摸索莫施功無形無象迥絕踪真如妙相原非相六通解慧亦非通塵塵起處佛佛現剎剎隱時心心空了知真佛住無心始悟無心是真佛如是心如是佛心兮佛兮皆妄說認得摩尼一粒珠恒河沙界光常徹寒兮暑兮侵不侵赤條條地滅非滅快活歌快活快活真快活一切葛藤都擺脫如今不用覓真詮任我去來活潑潑時人不解真實義只待遇緣參活佛誰知活佛眼睛前爭奈凡夫愚不識此心何異頑石頭此身不殊樗櫟質聖恩一指髑髏碎恰似盲人見日月見見之中絕見聞方得名為大休歇眼聞耳見也尋常不動週行八萬億舊時窠臼潑生涯一一於今都掉脫我非我兮彼不知彼非彼兮我却識大地原來真是我一切非我是真說不知往古與來今誰道長生及寂滅憑他春夏與秋冬任聽炎蒸寒徹骨東西南北懶拈名懵懵懂懂忘分別自在縱橫無定體即是天仙三世佛閒跨泥牛海底行或乘木鳳雲中涉千峰頂上弄瘋顛十字街頭打鶻突穿衣喫飯只尋常混俗同塵應時節有酒一杯復一杯有歌一闋復一闋愚人笑我是誑言誰解我言真老實由他笑我非笑我我只如今且快活闡真篇原夫道本無名因名立名道本無形因形成形名者道之用形者道之體至道之體本無定位沖然漠然而住於無所住也非空非有非來非去非始非末非向非背明明而非照歷歷而不知融空有合真妄萬象紛紜而自不適閒者我為法轉也一鏡圓明而物無遁形者法為我用也真妄相待迷悟相因融妄即真猶冰之於水轉迷就悟猶影之於形夫鑑覺之功不至於圓滿者心有照也欲泯照而覺圓須無心而應運故曰天地同根物我一如明並日月而普被其光輝功高二儀而均受其陶鎔非至人之無心孰能一至於此乎是以世尊覩明星而起悟太上跨青牛而觀化至聖樂沂水以徜徉皆灼知萬物之備於我而未嘗有心於萬物也無心於物故心心皆佛心無心於道故處處是道體水燥火濕陽靜陰騰一來一往互為出入化母孕其靈胎真君宰其堅骨是以丹汞成焉谷神養焉內外明徹表裏洞達內其神而神固外其身而身存然後易彼幻形成其真體出此真體轉彼幻形是知大地山河無非我體蟲魚鸞鶴悉成我身可以翱翔六合放曠八表泠泠然御景風乘慶雲逍遙於聖人之世觀瞻舜日堯天又何必蓬瀛閬苑更問壺中天地乎雖然非參無悟非悟無修非修無證含萬法於一空納一空於萬法不空即空空即不空是之謂妙有真空真空妙有即真空而顯妙有即妙有以證真空於參而實無所參於悟而實無所悟於修而實無所修於證而實無所證是謂之真參真悟真修真證所謂沖然漠然而住於無所住者此也西江月十二首覰著壺中日月毫端一撮三千由來非佛亦非仙誰在瓊樓玉殿此界他方不隔圓明一性明圓真圓明處照無邊說甚夜藏晝現運出六般神用打破明暗色空不空空處是真空一任風旛定動起滅不離當念頭頭物物圓融識得萬綠與千紅彈指桃源仙洞水自不留雲影月非長在天心沈沈湛湛去來今明暗雙彰雙隱若要太空著實還從大地推尋水雲天月已分明鳶躍魚飛悉聽空色從來一體就中誰強安名汝渠伊我互相稱究竟何曾喚定擬把空花滅却眼中自起無明不能真幻兩平平大似磨磚作鏡性悟頭頭是道心空處處菩提若人會得這玄機即是佛仙祕義誰禮函關老子不參西域牟尼無根樹下舊時廬覓甚真詮妙諦一切有為境界百千無相莊嚴這些因被那些牽彼此空生留戀師子雲中哮吼蒼龍窟裏盤旋霎時一縷遍三千舒展萬條白練慢說太虗無體莫言大道有形有無形體任升沈總即圓明自性恰似深潭印月却如空谷傳聲昭然隨處露天真一派寒空妙境白浪風吹鯨躍綠林月度驚笑看上下箇中因箇裏誰探箇境月印寒潭有跡荷珠滾葉無痕去來動止甚分明但唱應時律令對境何嘗有境遣心何處非心癡人妄執境和心遂使紛馳不定翠竹黃花漏洩鴉鳴鵲噪宣明百般幻化此形聲法法真如實性即色色中非色離空空外無空天邊明月水邊風活潑機關定動陰至冬寒凜冽陽生春暖和融真如運用妙難窮切莫思量奪弄彼此幻軀互易幻身真體同途箇中此味在冰壺嘗著一任吞吐但自無心於物何妨物我都盧一條拄杖萬人扶走遍天涯寸步大小高低踢踏十方六合遨遊逢源物物與頭頭自覺非前非後觸目光風霽月聖恩浩蕩難酬祝言萬載與千秋一句天長地久觸境會心偈四首泉流明月月流泉上是清溪下是天就裏玄機誰識得只應分付釣魚船觸目無非大道場明明遍界不曾藏金風一動全身露巖桂傳來八月香一池秋水月為心萬象森羅倒影沈北斗藏身南斗住無聲曲和沒絃琴幻滅覺圓圓即幻眾生與佛更何殊妄心盡處真心了說箇真如早不如示後學紫陽張祖師云見物便見心無物心不現又云覩境能無心始是菩提面只此二語一部楞嚴全旨已備即世尊四十九年所說妙法總不出此四句佛仙一貫之理總以見性明心開導後學世間種種法皆出於自心故曰心生種種法生心滅種種法滅如果一心不生萬法無咎則自然能轉一切而不為一切轉去究竟我是一切畢竟一切非我轉與不轉大似吹光割水真實地位有何轉與不轉也一切有情無情乃如如來大圓覺海中漚泡皆海水所成然離海無漚泡離漚泡別無海水眾生仙佛同一大圓鏡智不過遇聖現聖遇凡現凡因有聖凡之差別強立鏡中之覺照如聖凡同體心鏡一如則覺照之功何處施設所謂大千沙界海中漚一切聖賢如電拂到者裏始知本無聖凡本無生滅本無來去本無前後本無今古本無上下本無垢淨本無表裏增半點不得減半點不得捨半點不得取半點不得一種平懷泯然自盡不妨於本無聖凡出入聖凡本無生滅出入生滅本無來去出入來去本無前後出入前後本無今古出入今古本無上下出入上下本無垢淨出入垢淨本無表裏出入表裏非出入是出入離內外即內外心是箇甚麼物是箇甚麼見是箇甚麼不見是箇甚麼直饒識得菩提面猶恐祖師未肯點頭在若然則祖師與從上佛祖實實同一鼻孔呼吸吾徒究明大道者當奉為寶範幸共勉旃拈花寺方丈僧超善若水性海頌真如性海湛寂常澄生佛一致物我同情世出世間孰濁孰清情與無情誰死誰生死原不死生亦無生死亦何減生亦何增生死去來是幻非真真如性海無臭無聲水中鹽味色裏膠青言語道斷心識不行非智可測辨豈能明五眼難覩四山莫侵蕩然寬廣靜矣淵深大而河岳細而魚禽炳然齊現無跡可尋六凡四聖渾融一心毫釐差互便見升沈理隨事變萬法森森相以性融眾器一金不虧不溢亘古亘今潔不可垢高莫能齊非純非雜無著無依空而不空江漢所宗有而不有沖虗自守妙體瑩然鑒物無謬識浪奔騰水性無咎或東或西坎止行流適用隨器巽順溫柔百川收納一味無餘三際平等十界一如迷則生死悟則涅槃一根返源法界平安頭頭無礙法法圓通恒沙性德應用不窮輝天鑒地月朗天中徧歷塵剎跬步不移彈指超越一念三祇因該果海果徹因基幻相皆實實相却非非即是是是即是非無是非是無非不非佛魔一室邪正同歸萬象參天肉眼不黏羣音揭地聞性寂然眼聞耳見六用通圓卷舒任運出沒隨緣六度萬行本自無偏修而無修是名莊嚴至尊至貴無上無先一乘捷徑不二妙門本來具足法爾現成何必擬心斷妄著意求真厭凡忻聖奪境奪人如猿捕影枉自勞形絕情離見當下洞然無思無慮密密緜緜廓如太虗萬物育焉淵如大海無不包涵亦同亦別非一非三縱橫豁達自在優游欲歸性海直須溯流溯流窮源泯絕中邊無功用道飽食安眠聖凡情盡妙覺明圓塵塵剎剎體用無偏與麼與麼如然如然拈花說或問師曰拈花之說果有之耶曰然心印之傳誠有之者曰若是則世尊之出世也祗應專以拈花設教俾百萬人天各各自契自悟立踏佛祖田地豈不簡易慶快又何須四十九年說法三百餘會談經小乘大乘之各別漸教頓教之攸分終日勞勞焉觀機逗教以說聽為事哉曰惡是何言歟而獨不聞夫子之誨曾子曰參乎吾道一以貫之曾子曰唯然則夫子亦惟應以一貫之說詔門人而七十子之徒亦惟當應之以唯也又何必以文行忠信為教詩書禮樂為言哉顏子曰夫子循循然善誘人博我以文約我以禮不博則觸途成滯不約則汗漫無歸二者皆不足以語道也泗水諸賢如宰我子貢輩是徒以文章詞說求夫子者也子雖告以一貫之旨終不能直下無疑故曰予欲無言蓋不返博以歸約終不足以適道也我佛祕傳心印教外別傳之涅槃妙心乃如來三祇煉行百劫修因自覺已圓悲他未悟然後降跡皇宮現身說法始自華嚴終至涅槃隨機設教應病施方雖十聖三賢不無化城之果而髻中明珠未肯妄授於人直到多子塔前時至理彰垂慈分付故有拈花微笑之說正法眼藏之傳經云欲識佛性義當觀時節因緣時節若至其理自彰設若世尊但拈花迦葉不破顏而心印未始不傳假如拈花之際百萬人天各各微笑而正法眼藏亦有攸歸故知教外別傳之旨不在拈花而亦不外拈花譬之春在百花草木間百花草木無不是春若執花木以尋春而春遠矣若離花木以求春而春愈遠矣何得執末後拈花之意分辨四十九年之說耶子縱不會拈花之旨寧獨未聞一貫之道乎若知一貫之與四教雅言並行則亦應知教內教外之傳不相悖也復何疑於拈花之說哉行解歌咄哉出家兒箇箇稱佛子圓頂與方袍當思為何事菩提根本定慧基最初一步莫遲疑三衣具鉢為羽翼身心淨潔似瑠璃精戒律習威儀究講參禪遵古宜親近高流須檢擇庸師慎勿誤相依研經教觀心識切莫執文而解義從上智者與清涼靡不由茲而悟入最上乘要真參急急用功勿等閒一片身心無滲漏管教直下透三關三關透須料掉坐斷白雲宗不妙一輪心月印千江萬朵身雲隨處照不持戒不破戒任運騰騰常自在雲收雨霽碧天秋一亘晴空無內外誰為我誰為人荊棘林中好臥身拖泥帶水渾閒事外道天魔是我親禪亦通教亦通智悲雙運振宗風不是攙行并奪市丈夫意氣活如龍過量人正好修其實無修無不修若能泯絕聖凡情曠劫無明當下休廣六度勤萬行濟人利物隨緣應不是莽蕩撥無因亦非住相而執行行如解解如行行解相應始名證堪嗟著有談空者拈一放一錯奪弄當末劫法垂秋四弘誓願急須修真參實悟踪前哲便是苦海大慈舟不傍岸不中流來來往往無定浮只解身心奉塵剎誰知德報與恩酬地藏聖誕陞座眾生度盡方證菩提地獄未空誓不成佛此是我地藏能仁直心深心大悲心也汝等諸人作麼生會若謂有眾生界有地獄界有菩提可證有佛道可成是凡夫見若言一切皆無是闡提見文殊普賢起佛見法見被世尊威神貶向二鐵圍山地藏菩薩未證菩提誓不成佛是無佛見法見為甚麼却常在鐵圍山間有的道在彼教化眾生有的道只為願力弘大所以不肯成佛且喜沒交涉眾中還有緇素得出的麼若有不妨出來通箇消息如無善上座且作死馬醫驀豎拄杖云看看地藏菩薩來也在拄杖頭上放光動地宣說偈言曰假使熱鐵輪於我頂上旋終不以此苦退失菩提心說此偈已見漆桶不會仍入鐵圍山間去也顧左右云且道此偈是佛法不是佛法若作佛法會入地獄如箭射不作佛法會亦入地獄如箭射畢竟如何良久云鴛鴦繡出從君看不把金針度與人示眾大凡舉唱宗乘須離四句欲離四句莫遣四句若用心去遣則百千妄句從此而生八萬塵勞因之而起是以有無相生色空相奪明暗相傾高下相形博地凡夫動步著有上慢狂徒滯守偏空直饒坐斷千差強作主宰亦不能出亦有亦無非有非無所謂斷除妄想重增病又安得離之若欲得離直須竿頭進步絕後再蘇無一物非我心無一法是我己然後隨波逐浪全身在裏許無絲毫法為對為緣方有些子相應譬如蓮花處汙泥而不染透清波而香潔高超羣卉為世所珍豈不快哉若未到恁麼田地大須仔細師曰般若無知無所不知般若無相現一切相無知而知斯為真知無相而相名為實相是故無名無說無滅無生非同非異非實非虗寂而常照性覺妙明照而常寂本覺明妙知而無知故非有無知而知故非無是以知即無知無知即知相即無相無相亦相用雖殊而體不異智雖鑒而無照功同中異不可得而同異中同不可得而異同者同其異異者異其同言論莫能詮心識終難測直須真參實悟妙契環中拶得髑髏無識枯木龍吟方許少有語話分不見洞山道相續也大難急須努力早參諸仁者當知內之色身外洎虗空大地咸是妙明真精妙心中所現物且道妙明真心因甚却現色身大地是你諸人即今妙心在甚麼所在試指出看眾無語師敲禪牀云只在此山中雲深不知處晚參眾兄弟當自愛己躬下事休懈怠朝三暮四等閒過萬劫千生不自在桶底脫心暢快明月清風如有待根身器界總圓通剎剎塵塵無障礙九衢燈萬戶彩昔日家聲今尚在揮拂子下座萬壽寺方丈僧超鼎玉鉉上堂大眾列兩序請山僧陞此座舉揚法要鼎上座今日將無上妙法布施大眾諸佛子可各盡心念直登彼岸良久一手指云兩序不得移一步東序的西序來西序的東序去下座上堂以拄杖向空一點向地一畫復卓一卓云拄杖子騰空諸人則道是龍拄杖子入地諸人則道是蛇目今拄杖子在諸人面前道他是阿誰喚作拄杖子則觸不喚作拄杖子則背却將他喚作什麼良久云釣魚船上謝三郎却然不是閒相識小參供養三世諸佛不如齋一無心道人然無心易無我難投大海於一滴易投一滴於大海難會則途中受用不會則世諦流布必待目前不現方能句後不迷要問不迷不現的意旨麼眼若不睡諸夢自除小參將絲縧擲地云看看絲縧化為毒蟒欲將諸人一口吞去大眾何不齊力敵對良久云亦不得草草不見道路逢死蛇休打殺早參云日東昇宇宙清乾坤大地普光明摩醯首羅非鼻孔八角磨盤是眼睛喝一喝下座小參既知萬物是我何不解我是萬物一陣薰風自南來千枝菡萏波中出癩蝦蟆天真佛屈不屈夜來說盡了十二部經天曉依然是箇脫柄龜毛拂諸人不得將我面前案山移向後閣去晚參鳥窠拈一毛便有人悟去玉鉉今日舉筆還有人悟去的麼眾無語師云佛法太多之過小參流水日日流曾見河裏減去一點麼行雲朝朝起還見山頭增了一片麼既無增又無減豈不是去來自爾起滅如然如趙州三十年不雜用心且道是起是滅是增是減咄莫謗古佛好小參有一人無眼無耳無鼻無舌無身無意會盡無生法忍有一人有眼有耳有鼻有舌有身有意不會無生法忍且道二人孰優孰劣豎拂云遊山若到山窮處不計青山高與低下座僧問實際理地不受一法為甚經中又道有三受師云南無佛陀耶南無達摩耶南無僧伽耶僧問不生一念未審與本分有交涉否師云無交涉僧云作麼生得交涉去師云不生一念僧問如何是黑白裏藏身師云日光菩薩月光菩薩云莫只者便是麼師云山高水深僧問如何是塵塵剎剎盡圓融師云白月現黑月隱云還假修證否師云修證則不無隱現則不得僧問如何是萬壽門前一灣水師云全身在裏許云還能鑒物否師云不鑒云為甚不鑒師云上不在天下不在田僧問如何是真語實語師云鵲噪鴉鳴柏樹間云如何領會師曰有眼須合有耳須塞云不會師曰南天台北五臺一步不移十萬里應知無去亦無來心物心外無物物外無心無物無心一出百出心內有物物內有心有心有物千入萬入心物物心是內是外物心心物非內非外物非外有心非內守無去無來天長地久大圓鏡大圓鏡無背面上下通四維現淨月光大火𦦨含萬物不隔線入泥沙超閃電貫古今融貴賤不盈餘不虧欠有迷悟墮頓漸虗豁豁空念念靜何忻閙何厭無解脫無貪戀任去來不遷變性體薰蕕味非二青黃色是一說一早已分言二成辨別此物無比倫非二亦非一不後不先不離不即言莫能詮語莫能及春夏秋冬常湛然寒來暑往無休歇無休歇常湛寂珍重諸人當下息若能息鐵牛背上木郎騎抱著琵琶吹篳篥如物說有時百億合身有時分身百億分身百億無分百億合身不合合則萬物一如分則一如萬物萬物一如非如一如萬物不物非如不物是如不物非如物是如如物物如是是名諸佛妙義性用名不得狀不得名狀多由是強說出亦非入亦非出入何嘗有所依無深無淺無高無低包六合塞四維分三界列九嶷百千萬億數一種是虗期有今有古有去有來玉洞金蓮幾度開火燒不損水洒不濕長餓不飢長凍不冽變化萬端未曾漏洩圓非點方非塊囫圇非全零星非碎圓明無生滅湛然何代謝千賢妙用萬聖三昧林木森森石頭磊磊天長地久遠非遙奉告諸仁從裏會本源硬是石軟是緜紅非赤黑非玄隨聚散任方圓靜不止動不遷活潑潑滑涓涓入微塵出大千無名相常湛然假出入虗往還擊不碎揑不團孰先天孰後天太極始一畫先設凡聖證佛仙或山林或市廛響誰應答誰傳一彈指一豎拳有言說非真詮無言說是狂禪盡夕惕空朝乾隨隱顯曰本源混然吟水光月印白含白草色雨滋青吐青於此觀心若了了混然一味自惺惺山中四儀山中行足底煙雲生未曾移一步踏遍十方城山中住不動常來去野蕨結紫芋幽蘭開綠樹山中坐芒鞋都著破嶺橫碧㵎長脚枕石頭大山中臥睡著念功課佛陀達摩僧三身只一箇三身頌絕相離名不欠虧箇中無物自巍巍倒騎佛殿吟風月百尺竿頭歸不歸山河大地非吾體草木叢林是我身無往無來沙界現却然覿面不相親一串穿來古即今色空空色兩般心當陽爍破乾坤體剎剎塵塵觀世音海會寺方丈僧超盛如川上堂一人會得一是一一人會得萬是萬一人會得一是萬一人會得萬是一且道四人是何面貌眾無語師云風花雪月上堂拈拄杖云纔被鐘聲引入去又被鼓聲喚出來且道引入的是阿誰喚出的是那箇若道有出有入辜負拄杖子若道無出無入埋沒鐘鼓去在畢竟還是有出入也無卓杖兩下云空花結果石筍含茅下座上堂舉世尊陞座文殊白椎云諦觀法王法法王法如是此乃我佛大慈大悲開導人天第一義諦指示勝如拈花之旨若道本無言說會不但辜負文殊抑且塗污世尊不少且道世尊所說的是什麼法良久云萬象之中獨露身一句了然超百億下座上堂古人道苦海無邊回頭是岸豎拂云這是苦海作麼生回頭又道放下屠刀立地成佛這是屠刀作麼生放下不見文殊令善財採藥善財遍採無不是藥將一莖草度與文殊菩薩云此藥亦能殺人亦能活人所以岸無彼此刀無操放智者自智仁者自仁全在當人自會諸仁者作麼生會擲拂云不可推解心望會佛祖意下座上堂六祖道心是地性是王王居心地上盛上座則不如是說心是地性是海海居心地內若道與祖師同陝府鐵牛吞却嘉州大象若道不同嘉州大象吐却陝府鐵牛諸人作麼生會以手作普施抉云來受甘露味下座小參拈竹杖云有者有合空者空應上者上去下者下來長者長使短者短用外者外住裏者裏立寒者寒中熱者熱內明者明出暗者暗入莫是因物付物麼莫是遇緣即住麼莫是應時及節麼莫是如如不動麼却都沒交涉在畢竟如何多少老堂頭手中竹杖子到者裏管教節節自生隔礙去在下座小參小盛上座有面鼓不是禾山鼓有條棒不是德山棒有箇球不是雪峰球有隻狗不是子湖狗此鼓擊不響此棒拈不起此球滾不動此狗不咬人諸人若道四般無用之物也是為他閒事長無明下座小參色即是空空即是色二句人人盡知念誦大似鸚鵡學人言却沒交涉在以拂子點空云這不是色又擊案云這不是空指空云原是色何必言即是二字復指案云原是空何必言即是二字恁麼說話若尚不能領會欲待彌勒下生那高聲唱念色空空色空色色空空空色色色色空空下座小參古人道大海投於一滴易將一滴投於大海難此等說話慈悲之故而有落草之談只為分明極令人輕易看今日盛上座重開一面大千投入虗空易將虗空投入大千難諸仁者作麼生會若仍不肯薦取可謂不貪香餌味盡是碧潭龍噓一噓下座小參古人道大善知識須具驅耕夫之牛奪飢人之食手段方堪為人盛上座乏此伎倆但知助耕夫之牛與飢人之食何故呢佛不違眾生願且道與古人還有同異也不將拂擊几兩下云山中草木皆光潤知有寒輝玉在淵下座問如何是佛師曰除却拄杖子一切都是佛問如何是法師曰除却拄杖子一切都不是法問如何是僧師曰你道拄杖子是僧不是僧問如何是戒師曰一切處不著為戒問如何是定師曰一切處不住為定問如何是慧師曰一切處不知為慧問不著如何是戒師曰用戒作麼問不住如何是定師曰用定作麼問不知如何是慧師曰用慧作麼問如何是清淨法身師曰蔴三觔問如何是千百億化身師曰蔴三觔問如何是圓滿報身師曰蔴三觔問若然三身乃一體也師曰不見祖師道但用名言無實性問究竟如何是三身師曰清淨法身千百億化身圓滿報身問如何是空如來藏師曰喫飽了睡問如何是不空如來藏師曰睡醒了喫問如何是空不空如來藏師曰日間喫夜間睡僧云學人不會師曰鈍置漢喫飯睡覺也不會問如何是過去心師曰目前是問如何是現在心師曰目前是問如何是未來心師曰目前是問若然三心皆可得也師曰你道目前得箇什麼問如何是第一玄師豎一指問如何是第二玄師豎兩指問如何是第三玄師豎三指僧云是何言歟師曰向你道什麼來問如何是第一要師豎一指問如何是第二要師豎兩指問如何是第三要師豎三指僧禮拜師曰是何言歟問如何是欲界師曰君臣父子問如何是色界師曰山海川原問如何是無色界師曰風雲雷電問如何是天師曰無色界問如何是地師曰色界問如何是人師曰欲界云若然則與經旨大相違背師曰夢裏更要作夢那問第一句薦得堪與佛祖為師如何是第一句師曰我這裏無一句問第二句薦得堪與人天為師如何是第二句師曰有兩句爭又道不出問第三句薦得自救不了如何是第三句師曰此乃山僧尋常日用的云恁麼則不堪為師也師曰不見道人之患在好為人師問如何是見滲漏師曰泯見即不滲漏問如何是情滲漏師曰絕情即不滲漏問如何是語滲漏師曰無言即不滲漏問何得泯見絕情無言去師曰孟八郎又恁麼會也問如何是無師智師曰空界影中空界月萬年峰頂萬年枝問如何是自然智師曰畢竟水朝滄海去到頭雲定覓山歸問如何是無礙智師曰一步密移玄路轉通身放下劫壺中問如何是含葢乾坤句師曰赤如日白如月問如何是截斷眾流句師曰鐘未鳴鼓未響問如何是隨波逐浪句師曰拂子短拄杖長問如何是空無變易義師曰你曾見煮砂得成飯那問如何是空無邊際義師曰你道岸山高多少丈問如何是空無礙義師曰你說燈籠礙露柱什麼僧云學人問的是空義師曰莫不山僧向你答的是有意僧問一物不將來請師一接師曰寄放何處去在云何不領話師曰又道不將一物來云直下似箇大虫師曰只恐汝不肯云嘉州大象吞却陝府鐵牛坐斷衲子舌頭不無好手如何令不具口的人能言師曰你道阿誰是具口的云百匝千重不消一拶師曰自起自倒自領去云多少天台人不識寒山子師曰莫將寸管擬覰穹蒼僧便喝師曰龍頭前喝蛇尾後喝僧又喝師曰將謂龍門躍鯉原來潭底蝦蟆云莫念篇章請師再示師曰始信古德不誑言云莫將閒學解錯擬聖賢心師云東西南北一任闍黎行脚且道上中下是一是三云雲水非闍黎請問和尚於雲水而得自在也不師曰錯擬了也云恁麼則皇上釣盡清波金鱗始遇師曰律有明條云淨潔打疊了也猶是路途邊事意旨如何師曰既為大僧何得不持五戒云不因漁父引怎得見洪濤師曰又念篇章云誰人知此意令我憶南泉師曰這漢曠劫無明今始方息云鬼腦上安神頭師曰昨日有人從普陀來為何却往落伽去云某甲常不喫飯從不道飢師曰那里得這箇消息來云不遇中郎鑑還同野舍薪師便打僧禮拜師曰捉敗這賊

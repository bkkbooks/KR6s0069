座不在師弟代上名受衣弇歸弟曰某甲為師兄上名了弇曰汝道我名甚麼弟無對師代云師兄得恁麼貪又曰甚麼處是貪處又代云兩度上名師與長慶保福入州見牡丹幛子保福曰好一朵牡丹花長慶曰莫眼花師曰可惜許一朵花師因疾僧問和尚尊候較否師以杖柱地曰汝道這箇還痛否曰和尚問阿誰師曰問汝曰還痛否師曰元來共我作道理太傅王延彬居士公一日入招慶佛殿指鉢盂問殿主這箇是甚麼鉢主曰藥師鉢公曰祇聞有降龍鉢主曰待有龍即降公曰忽遇拏雲浪來時作麼生主曰他亦不顧公曰話墮也公到招慶煎茶朗上座與明招把銚忽飜茶銚公問茶罏下是甚麼朗曰捧罏神公曰既是捧罏神為甚麼飜却茶朗曰事官千日失在一朝公拂袖便出明招曰朗上座喫却招慶飯了却向外邊打野榸朗曰上座作麼生招曰非人得其便漳州報恩道熙禪師師因與保福送書到泉州王太尉尉問漳南和尚近日還為人也無師曰若道為人即屈著和尚若道不為人又屈著太尉來問太尉曰道取一句待鐵牛能齧草木馬解含煙師曰某甲惜口喫飯尉良久又問驢來馬來師曰驢馬不同途尉曰爭得到這裏師曰謝太尉領話鼓山智嶽禪師師遊方至鄂州黃龍問久嚮黃龍及乎到來祇見赤斑蛇龍曰汝祇見赤斑蛇不見黃龍師曰如何是黃龍龍曰滔滔地師曰忽遇金翅鳥來又作麼生龍曰性命難存師曰恁麼則被他吞却去也龍曰謝闍黎供養師便禮拜報國照禪師佛塔被雷霹有問祖佛塔廟為甚麼却被雷霹師曰通天作用曰既是通天作用為甚麼却霹佛師曰作用處何處見有佛曰爭奈狼藉何師曰見甚麼同安志禪師先同安將示寂上堂曰多子塔前宗子秀五老峯前事若何如是三舉莫有對者師出曰夜明簾外排班立萬里歌謠道太平安曰須是這驢漢始得襄州廣德義禪師師謁先廣德作禮問曰如何是和尚密密處德曰隱身不必須巖谷闤闠堆堆覩者稀師曰恁麼則酌水獻花去也德曰忽然雲霧靄闍黎作麼生師曰採汲不虗施廣德忻然曰大眾看取第二代廣德襄州廣德周禪師僧問教中道阿逸多不斷煩惱不修禪定佛記此人成佛無疑此理如何師曰鹽又盡炭又無曰鹽盡炭無時如何師曰愁人莫向愁人說說向愁人愁殺人石門慧徹禪師僧問雲光作牛意旨如何師曰陋巷不騎金色馬回途却著破襴衫雲光法師不事戒律誌公曰出家何為光曰吾不齋而齋食而非食後招報作牛拽車於途誌公見之呼曰雲光牛舉首誌曰何不道拽而非拽牛墮淚跳號而卒香林澄遠禪師僧問美味醍醐為甚麼變成毒藥師曰導江紙貴問如何是西來的的意師曰坐久成勞僧問北斗裏藏身意旨如何曰月似彎弓少雨多風問如何是室內一燈曰三人證龜成鼈問如何是衲衣下事曰臘月火燒山問魚游陸地時如何曰發言必有後救僧云却下碧潭時如何曰頭重尾輕問一子出家九族盡得解脫目連為甚麼母入地獄師曰確將示寂辭知府宋公璫曰老僧行脚去通判曰這僧風狂八十歲行脚去那裏宋曰大善知識去住自由歸謂眾曰老僧四十年方打成一片言訖而逝新開院顥鑒禪師師問僧遊山來為佛法來曰清平世界說甚麼佛法師曰好箇無事禪客曰早是多事了也師曰上座去年在此過夏了曰不曾師曰與麼則先來不相識下去問祖意教意是同是別師曰雞寒上樹鴨寒下水洞山守初宗慧禪師師曰言無展事語不投機乘言者喪滯句者迷於此四句語中見得分明也作箇脫灑衲僧根椽片瓦粥飯因緣堪與人天為善知識於此不明終成莽鹵問僧甚處來曰汝州師曰此去多少曰七百里師曰踏破幾緉草鞋曰三緉師曰甚處得錢買曰打笠子師曰參堂去僧應諾問僧莫便是新到否曰是師曰夜來投棲處今朝事如何曰今朝風較急青山背上行師曰不是更道曰珍重師便打問不向心頭安了義如何得達祖師言師曰六脚蜘蛛上板牀金陵奉先深禪師師同明和尚在眾時聞僧問法眼如何是色眼豎起拂子或曰雞冠花或曰貼肉汗衫二人特往請益問曰承聞和尚有三種色語是否眼曰是師曰子過新羅便歸眾時李主在座下不肯乃白法眼曰寡人來日致茶筵請二人重新問話明日茶罷備綵一箱劍一口謂二師曰上座若問話得是奉賞雜綵一箱若問不是祇賜一劍法眼陞座師復出問今日奉勅問話師還許也無眼曰許曰子過新羅捧綵便行大眾一時散去時法燈作維那乃鳴鐘集眾僧堂前勘師眾集燈問承聞二上座久在雲門有甚奇特因緣舉一兩則來商量看師曰古人道白鷺下田千點雪黃鸝上樹一枝花維那作麼生商量燈擬議師打一坐具便歸眾師同明和尚到淮河見人牽網有魚從網透出師曰明兄俊哉一似箇衲僧相似明曰雖然如此爭如當初不撞入網羅好師曰明兄你欠悟在明至中夜方省大容諲禪師僧問既是大容為甚麼趁出僧師曰大海不容塵小谿多搕𢶍問如何是古佛一路師指地僧曰不問這箇師曰去師與一老宿相期他往偶因事不去宿曰佛無二言師曰法無一向華嚴慧禪師僧問承古有言妄心無處即菩提正當妄時還有菩提也無師曰來音已照曰不會師曰妄心無處即菩提西禪欽禪師僧問如何是函葢乾坤句師曰天上有星皆拱北曰如何是截斷眾流句師曰大地坦然平曰如何是隨波逐浪句師曰春生夏長洞山清稟禪師師參雲門門問今日離甚處曰慧林門舉拄杖曰慧林大師恁麼去汝見麼師曰深領此問門顧左右微笑而已白雲智作禪師僧問如何是枯木裏龍吟師曰火裏蓮生曰如何是髑髏裏眼睛師曰泥牛入海北禪寂禪師師問僧甚處來曰黃州師曰夏在甚處曰資福師曰福將何資曰兩重公案師曰爭奈在北禪手裏曰在手裏即收取師便打僧不甘師隨後趁出首山省念禪師師與真園頭同上問訊風穴次穴問真曰作麼生是世尊不說說真曰鵓鳩樹頭鳴穴曰汝作許多癡福作麼何不體究言句又問師曰汝作麼生師曰動容揚古路不墮悄然機穴謂真曰汝何不看念法華下語問僧不從人薦得底事試道看僧便喝師曰好好相借問惡發作麼僧又喝師曰今日放過即不可僧擬議師喝之問有一人蕩盡來時師還接否師曰蕩盡即置那一人是誰曰風高月冷師曰僧堂內幾人坐臥僧無對師曰賺殺老僧問如何是梵音相師曰驢鳴犬吠乃曰要得親切第一莫將問來問還會麼問在答處答在問處汝若將問來問老僧在汝脚底汝若擬議即沒交涉時有僧出禮拜師便打僧便問挂錫幽巖時如何師曰錯僧曰錯師又打師問僧近離甚處僧曰襄州師云路上曾逢達摩也無僧近前云不審師云這箇是驢前馬後底僧云和尚又如何師曰非公境界且坐喫茶僧纔坐師又問在甚麼處過夏僧云石門師云水牯牛安樂麼僧云及時水草師曰為甚麼傷人苗稼僧云對和尚不敢造次師云放過即不可便打黑水和尚師參黃龍問雪覆蘆花時如何龍曰猛烈師曰不猛烈龍又曰猛烈師又曰不猛烈龍便打師於此有省便禮拜棗樹和尚師問僧近離甚處曰漢國師曰漢國天子還重佛法也無曰苦哉賴值問著某甲問著別人則禍生師曰作甚麼曰人尚不見有何佛法可重師曰闍黎受戒來多少時曰二十夏師曰大好不見有人便打清涼休復禪師僧問古人得箇甚麼即便休歇去師曰汝得箇甚麼即不休歇去龍濟紹修禪師示眾具足凡夫法凡夫不知具足聖人法聖人不會聖人若會即是凡夫凡夫若知即是聖人此語具一理二義若人辨得不妨於佛法中有箇入處若辨不得莫道不疑好又云是柱不見柱非柱不見柱是非已去了是非裏薦取問如何得出三界師曰是三界則一任出曰不是三界又如何師曰甚麼處不是三界問僧甚處來曰翠巖師曰翠巖有何言句示徒曰尋常道出門逢彌勒入門見釋迦師曰與麼道又爭得曰和尚又如何師曰出門逢阿誰入門見甚麼僧於言下有省上堂聲色不到處病在見聞言詮不及處過在唇吻僧問離却聲色請和尚道師曰聲色裏問將來廣平玄旨禪師僧問如何是廣平境師曰地負名山秀谿連海水清曰如何是境中人師曰汝問我答問如何是法身體師曰廓落虗空絕點瑕曰如何是體中物師曰一輪明月散秋江曰未審體與物分不分師曰適來道甚麼曰恁麼則不分也師曰穿耳胡僧笑點頭靈峯志恩禪師僧問如何是靈峯境師曰萬疊青山如釘出兩條綠水若圖成曰如何是境中人師曰明明密密密密明明鼎州梁山緣觀禪師師會下有箇園頭參得禪眾中多有不信者一日有僧去撩撥他要其露箇消息乃問園頭何不出問堂頭一兩則話結緣園頭云我除是不出問若出須教這老漢下禪牀立地在及梁山上堂果出問曰家賊難防時如何山曰識得不為冤曰識得後如何山云貶向無生國裏曰莫是他安身立命處也無山云死水不藏龍曰如何是活水裏龍山云興波不作浪曰忽然傾湫倒嶽時如何梁山果然從法座上走下把住云闍黎莫教溼著老僧袈裟角智門光祚禪師上堂一法若有毗盧墮在凡夫萬法若無普賢失其境界正當恁麼時文殊向甚麼處出頭若也出頭不得金毛師子腰折幸好一盤飯莫待糝薑椒上堂山僧記得在母胎中有一則語今日舉似大眾諸人不得作道理商量還有人商量得麼若商量不得三十年後不得錯舉開福賢禪師僧問如何是衲僧活計師曰耳裏種田上堂不用思而知不用慮而解知解俱泯合談何事師曰一葉落天下秋乾明睦禪師師問洞山停機罷賞時如何洞山曰水底弄傀儡師曰誰是看玩者洞山曰停機罷賞者師曰恁麼則知音不和也洞山曰知音底事作麼生師曰大盡三十日洞山曰未在更道師曰某甲合喫和尚手中痛棒洞山休去西峯雲豁禪師師早扣諸方晚見清涼問佛未出世時如何清涼曰雲遮海門樹曰出世後如何清涼曰擘破鐵圍山師於言下大悟清涼印可之大歷和尚僧問施主供養將何報答師以手撚髭曰有髭即撚無髭又如何師曰非公境界連州寶華和尚師問僧甚處來曰大容來師曰大容近日作麼生曰近來合得一甕醬師喚沙彌將一碗水來與這僧照影月華山月禪師有一老宿上法堂東西顧視曰好箇法堂要且無主師聞乃召曰且坐喫茶宿問曰玄中最的猶是龜毛兔角不向二諦中修如何密用師曰側宿曰恁麼則抝折拄杖割斷草鞋去也師曰細而詳之蘄州五祖師戒禪師湖州上方嶽禪師至丈室師曰上人名甚麼對曰齊嶽師曰何似泰山嶽無語師即打趕翌日復謁師曰汝作甚麼嶽回首以手畫圓相呈之師曰是甚麼嶽曰老老大大胡餅也不識師曰趁罏竈熱更褡一箇嶽擬議師拽拄杖趕出門及數日後嶽再詣乃提起坐具曰展則大千沙界不展則毫髮不存為復展即是不展即是師遽下繩牀把住云既是熟人何須如此嶽又無語師又打出福昌善禪師僧問如何是正法眼師曰夜觀乾象曰學人不會意旨如何師曰日裏看山法眼文益禪師僧問聲色兩字甚麼人透得師却謂眾曰諸上座且道這僧還透得也未若會此僧問處透聲色也不難師問修山主毫釐有差天地懸隔兄作麼生會修曰毫釐有差天地懸隔師曰恁麼會又爭得修曰和尚如何師曰毫釐有差天地懸隔修便禮拜因僧來參次師以手指簾尋有二僧齊去捲簾師云一得一失問覺上座船來陸來曰船來師曰船在甚麼處曰在河裏覺退師問旁僧曰你道適來這僧具眼不具眼師令僧取土添蓮盆僧取土到師曰橋東取橋西取曰橋東取師曰是真實是虗妄問僧甚處來曰泗州禮拜大聖來師曰今年大聖出塔否曰出師却問旁僧曰汝道伊到泗州不到雲門問僧甚處來曰江西來門曰江西一隊老宿寱語住也未僧無對後僧問師不知雲門意作麼生師曰大小雲門被這僧勘破生法師曰敲空作響擊木無聲師忽聞齋魚聲謂侍者曰還聞麼適來若聞如今不聞如今若聞適來不聞會麼師見僧搬土次乃以一塊土放僧擔上曰吾助汝僧曰謝和尚慈悲師不肯一僧別云和尚是甚麼心行師便休去問六處不知音時如何師曰汝家眷屬一羣子師又曰作麼生會莫道恁麼來問便是不得汝道六處不知音眼處不知音耳處不知音若也根本是有爭解無得古人道離聲色著聲色離名字著名字所以無想天修得經八萬大劫一朝退墮諸事儼然蓋為不知根本真實次地修行三生六十劫四生一百劫如是直到三祇果滿他古人猶道不如一念緣起無生超彼三乘權學等見又道彈指圓成八萬門剎那滅却三祇劫也須體究若如此用多少氣力汾陽善昭禪師僧問如何是接初機底句師曰汝是行脚僧又問如何是辨衲僧底句師曰西方日出卯又問如何是正令行底句師曰千里持來呈舊面又問如何是立乾坤底句師曰北俱盧洲長粳米食者無瞋亦無喜又曰只將此四轉語驗天下衲僧纔見汝出來驗得了也問大悲千手眼如何是正眼師曰瞎曰恁麼則一條拄杖兩人舁師曰三家村裏唱巴歌曰恁麼則和尚同在裏頭師曰謝汝慇懃鄭工部到茶話次鄭呈師偈曰黃紙休遮眼青雲自有陰莫將閒學解埋沒祖師心復云只將此偈驗天下長老師曰與麼則汾陽也在裏頭云擔枷過狀師云更不再勘鄭云兩重公案師云知即得鄭良久師噓一聲鄭云文寶文寶師云在甚所在鄭云不容某甲出氣爭得瞋他道淹滯長老在此師曰是何言歟鄭云實師云也不得放過鄭云請師一偈師云不閒紙墨隨示偈云荒草尋幽徑巖松迥布陰幾多玄學客失却本來心上堂謂眾曰夫說法者須具十智同真作麼生是十智同真與諸上座點出一同一質二同大事三總同參四同真智五同徧普六同具足七同得失八同生殺九同音吼十同得入又曰與甚麼人同得入與阿誰同音吼作麼生是同生殺甚麼物同得失阿那箇同具足是甚麼同徧普何人同真智孰能總同參那箇同大事何物同一質有點得出底麼點得出者莫吝慈悲點不出來未有參方眼在切須辨取要識是非面目見在不可久立珍重承天三交智嵩禪師師辭首山山以拄杖送師師接得有偈曰和尚拄杖照破龍象臨濟家風落在我掌山云莫相帶累師打山一坐具山曰果然帶累師云今日捉敗這老漢山云又似得便宜又似落便宜楊侍郎李駙馬與師問答問彌陀演化於西方達摩傳心於東土胡來漢現水到渠成五嶽鎮靜以崢嶸百谷朝宗而浩渺一靈之性託境現形三有之中憑何立命師云仙人無婦玉女無夫楊云尼剃頭不復生子師云陝府鐵牛能哮吼嘉州大像念摩訶李云側跳上山巔師云騎牛不著靴問玄沙不出嶺保壽不渡河善財參知識五十三員慧遠結黑白一十八士雪峯三度上投子智者九旬講法華遮六箇漢為復野干鳴為復獅子吼速道速道師云水急魚行澀峯高鳥不棲楊云泗州大聖師云土上加泥更一重李云舌上覆金錢師云半夜歌樂動誰是得知音師作宗本頌左顧右覰黃昏莽鹵展手回來早是彰露且道作麼生是彰露底句楊云正殺人時努出頭師云兩脚捎空手叉胸李云左鬚右髮隱文章師云名利已彰天下去丫頭女子倒騎牛師復云維摩一默文殊贊善若遇老僧在彼各與三十棒且道這二老漢過在什麼處楊云頭破作七分如阿棃樹枝師云迦葉不擎拳阿難不合掌李云似犢牛兒未用角時師云忙屈拳打令師復云教有明文佛身充滿於法界老僧今日充滿於法界侍郎即今在什麼處楊云布裙一截泥努出膝葢子師云寬口布袴三尺杖李云河水一擔直三文師云只見鼻頭津不見頂後溼廣教歸省禪師師參首山山一日舉竹篦問曰喚作竹篦即觸不喚作竹篦則背喚作甚麼師掣得擲地上曰是甚麼山曰瞎師於言下瞎然頓悟問維摩丈室不以日月為明和尚丈室以何為明師曰眉分八字曰未審意旨如何師曰雙耳垂肩問如何是和尚深深處師曰猫有歃血之功虎有起尸之德曰莫便是也無師曰碓搗東南磨推西北問忽遇大闡提人來還相為也無師曰法久成弊曰慈悲何在師曰年老成魔問己事未明以何為驗師曰閙市裏打靜槌曰意旨如何師曰日午點金鐙僧問聞鐘聲只有這箇聲為復別有師曰腦後三斤問一僧曰近離什麼處僧曰東京師曰你因甚口上破僧曰和尚也須仔細師曰七棒對十三庫下喫茶去師到洞山問洞山廓然無依法歸何處山云三番羯磨師云恁麼即知音不和也山云知音不和底事作麼生師云龜毛拂子長三尺山云你因什麼眉鬚墮落師便禮拜神鼎洪諲禪師有僧自汾州來師倚拄杖曰一朵峯巒上獨樹不成林時如何僧曰水分江樹淺遠㵎碧泉深又問作麼生是回互之機僧曰盲人無眼又問曰我在眾時不會汾陽一偈上座久在法席必然明了僧曰請和尚舉看師曰鵝王飛鳥去馬頭嶺上住天高葢不得大家總上路作麼僧舉起坐具曰萬年松在祝融峯師曰不要上座答話試說看僧曰忽憶少年曾覧照十分光彩臉邊紅即拂衣去師曰弄巧成拙師住神鼎以一朽牀為說法座其甘枯淡無比德臘俱高諸方尊之如古趙州谷隱蘊聰慈照禪師師到太陽玄和尚問近離甚處師曰襄州陽曰作麼生是不隔底句師曰和尚住持不易陽曰且坐喫茶師便參眾去侍者問適來新到祗對住持不易和尚為甚麼教坐喫茶陽曰我獻他新羅附子他酬我舶上茴香你去問他有語在侍者請師喫茶問適來祗對和尚道住持不易意旨如何師曰真鍮不博金僧侍立次師問甚麼處坐曰後架裏坐師曰你向甚麼處舉話曰與主人公舉話師曰主人公姓甚麼曰不得姓師曰名甚麼曰不得名師曰恁麼則不識主人公也僧便喝師不對問古人索火意旨如何師曰任他滅曰滅後如何師曰初三十一問寸絲不挂法網無邊為甚麼却有迷悟師曰兩桶一擔上堂十五日已前諸佛生十五日已後諸佛滅十五日已前諸佛生你不得離我這裏若離我這裏我有鉤子鉤你十五日已後諸佛滅你不得住我這裏若住我這裏我有錐子錐你且道正當十五日用鉤即是用錐即是遂有偈曰正當十五日鉤錐一時息更擬問如何回頭日又出廣慧元璉禪師師初依招慶真覺禪師日事炊㸑有間誦經真覺見而問曰汝念甚麼經對曰維摩經真覺曰經在這裏維摩在甚麼處師芒然無以酬泣涕曰大丈夫漢被人一問無詞可措豈不媿哉於是謁閩中尊宿歷五十餘員不能契旨遂趨河南首山山問近離甚處師曰漢上山豎起拳曰漢上還有這箇麼師曰這箇是甚麼盌鳴聲山曰瞎師曰恰是拍一拍便出他日又問學人親到寶山空手回時如何山曰家家門前火把子師當下大悟云某甲不疑天下老和尚舌頭也山曰汝會處作麼生與我說來看師曰祇是地上水碙砂也山曰汝會也師便禮拜許郎中式漕西蜀經由謁師適接見於佛前許曰先拜佛先拜長老師曰蝦蟆吞大蟲許曰恁麼則總不拜去也師曰運使話墮許曰許長老具一隻眼師以衣袖便拂許曰今日看破便禮拜住後楊億侍郎問天上無彌勒地下無彌勒未審在甚麼處師曰敲甎打瓦又問風穴道金沙灘頭馬郎婦意旨如何師曰更道也不及鹿門慧昭山主楊億侍郎問曰入山不畏虎當路却防人時如何師曰君子坦蕩蕩智門罕迥禪師師為北塔僧使點茶次師起揖曰僧使近上坐使曰子頭上爭敢安巢師曰棒上不成龍隨後打一坐具使茶罷起曰適來却成觸忤和尚師曰江南杜禪客覓甚麼第二盌太陽警玄禪師師遊方初到梁山問如何是無相道場梁山指觀音曰這箇是吳處士畫師擬進語梁山急索曰這箇是有相底那箇是無相底師遂有省便禮拜梁山曰何不道取一句師曰道即不辭恐上紙筆梁山笑曰此語上去在石霜誠禪師僧問古曰道捲簾當白晝移榻對青山如何是捲簾當白晝師曰過淨瓶來曰如何是移榻對青山師曰却安舊處著上堂云心外無法法外無心隨緣蕩蕩更莫沈吟你等諸人纔上階道便好回去更要待第二杓惡水潑作甚麼泐潭澄禪師師一日見僧披衲師曰得恁麼好針線曰祇要牢固師曰打草驚蛇作甚麼曰客來須看師曰祇有這箇更別有曰雲生嶺上師曰未在更道曰水滴巖前御製後序朕少年時喜閱內典惟慕有為佛事於諸公案總以解路推求心輕禪宗謂如來正教不應如是聖祖勅封灌頂普慧廣慈大國師章嘉呼土克圖剌麻乃真再來人實大善知識也梵行精純圓通無礙西藏蒙古中外諸土之所歸依僧俗萬眾之所欽仰藩邸清閒時接茶話者十餘載得其善權方便因知究竟此事壬辰春正月延僧坐七二十二十一隨喜同坐兩日共五枝香即洞達本來方知惟此一事實之理然自知未造究竟而迦陵音乃踊躍讚嘆遂謂已徹元微儱侗稱許叩問章嘉乃曰若王所見如針破紙窗從隙窺天雖云見天然天體廣大針隙中之見可謂徧見乎佛法無邊當勉進步朕聞斯語深洽朕意二月中復結制於集雲堂著力參求十四日晚經行次出得一身透汗桶底當下脫落始知實有重關之理乃復問證章嘉章嘉國師云王今見處雖進一步譬猶出在庭院中觀天矣然天體無盡究未悉見法體無量當更加勇猛精進云云朕將章嘉示語問之迦陵音則茫然不解其意但支吾云此不過剌麻教回途工夫之論更有何事而朕諦信章嘉之垂示而不然性音之妄可仍勤提撕恰至明年癸巳之正月二十一日復堂中靜坐無意中忽蹋末後一關方達三身四智合一之理物我一如本空之道慶快平生詣章嘉所禮謝國師望見即曰王得大自在矣朕進問更有事也無國師乃笑展手云更有何事耶復用手從外向身揮云不過尚有恁麼之理然易事耳此朕平生參究因緣章嘉呼土克圖國師剌麻實為朕證明恩師也其他禪侶輩不過曾在朕藩邸往來壬辰癸巳間坐七時曾與法會耳迦陵性音之得見朕也乃朕初欲隨喜結七因柏林方丈年老問及都中堂頭僉云只有千佛音禪師乃命召至既見問難甚久其伎倆未能令朕發一疑情迫窘詰屈但云王爺解路過於大慧杲貧衲實無計柰何矣朕笑云汝等只管打七余且在傍隨喜爾時醒發因緣已具述如左若謂性音默用神力能令朕五枝香了明此事何得奔波一生開堂數處而不能得一人妄付十數庸徒耶向後性音惟勸朕研辨五家宗旨朕問五家宗旨如何研辨音云宗旨須待口傳朕意是何言歟口傳耳受豈是拈花別傳之旨堂堂丈夫豈肯拾人涕唾從茲棄置語錄不復再覽者二十年此府中宮中人人之所盡知者夫五家宗旨同是曹溪一味不過權移更換面目接人究之皆是無義味語所為毒藥醍醐攪成一器黃金瓦礫融作一團用處無差拈來有準並皆一代之宗師百世之模楷柰庸流不了自心累他塗污有分鼓動識情橫生法執謬加穿鑿取笑傍觀明眼人前不堪舉似因見性音諄諄於此是乃逐語分宗齊文定旨也甚輕其未能了徹如使性音明知之而勸朕於此打之遶更是何心行也則其限於見地可知矣如達摩傳衣偈云一花開五葉結果自然成後世附會其說以為五葉者五宗也夫傳衣止於曹溪則是從慧可而下五世矣因震旦信心已熟法周沙界衣乃爭端不復用以表信達摩黃梅之言具在由可至能豈非五葉後來萬派同源豈非結果自然成耶何得以五宗當之且傳衣公案世多囫圇吞棗全未明白世尊至多子塔前命摩訶迦葉分座令坐以僧伽黎圍之遂告曰吾以正法眼藏密付於汝汝當護持繼又告迦葉吾將金縷僧伽黎衣傳付於汝轉授補處至慈氏佛出世勿令朽壞世尊所分之座究是何座僧伽黎究是何物如云即是此金縷僧伽黎衣從迦葉傳至六祖者豈有自周昭王至梁武帝時尚不朽壞即屬異寶不可思議便能常存世間又與正法眼藏有何交涉且自六祖以後何以又復消泯世尊明言至慈氏佛出世勿令朽壞乃未至唐時即已無存豈世尊妄語誑語耶且以僧伽黎圍迦葉者又是何意總之未悟正法眼藏從何推測人必明取僧伽黎定然留得到慈氏出世之故然後可與論傳衣之事何得支離穿鑿妄定宗旨更以五宗牽合附會耶況五宗前後參差亦非一時即五宗所明同是大圓覺性宗若有五性亦當有五矣古人專為勦情絕見惟恐一門路熟又復情見熾然是以別出一番手眼使人悟取眾生心不能緣於般若之上今乃轉以情見分別之埋沒古人不少朕既深明本旨只圖真實以辦平生豈肯被伊牽絆葛藤窠也因一年之後自清涼山回宗教兩不拈提迨即位以來十年不見一僧未嘗涉及禪之一字蓋此事實明者少逐塊之流徒勞延佇求名之輩更長業緣而世間井底蛙又必妄生議論朕愍諸有情無知愚陋恐其因此造諸謗般若大罪孽不談之意良非偶然今見去聖日遠宗風掃地正法眼藏垂絕如綫又不忍當朕世而聽其滔滔日下也乃選輯從上宗師喫緊為人之語刊示天下後世使之擺脫生死根塵掀翻輪迴陷穽學者當知朕今此舉實為佛祖慧命所繫不惜眉毛拖地非與十方常住行脚秉拂之徒較論見地短長朕此選出莫又緝緝聚頭妄論是何宗派却與朕莫交涉在天下宗徒能為自己一大事勇猛精進如救頭然立雪不寒斷臂無痛自然黑漆桶攔空撲破玉麒麟就地勒回那時方省得朕此一番話墮無量慈悲如或此心不真不誠不苦不切但從語言文字放出見聞覺知任情卜度細意推求此一則是臨濟宗那一則是曹洞派起模畫樣滯相執緣以此求契求證所為將空塞空徒使朕與從上諸古德百千方便亦如取聲鎖向匣中吹網欲令氣滿耳豈不鈍置人耶朕在藩邸時亦以本分事接人不無漏逗所有語句並已刊入圓明居士語錄卷內此外並無一則機緣流布人世況朕身居帝王之位口宣佛祖之心天下後世理障深重者必以教外別傳之旨未經周公孔子評定懷疑而不肯信然此其為害猶淺若夫外託禪宗心希榮利之輩必有千般誑惑百種聱訛或曾在藩邸望見顏色或曾於法侶傳述緒言便如骨巖木陳之流揑飾妄詞私相紀載以無為有恣意矜誇刊刻流行煽惑觀聽此等之人既為佛法所不容更為國法所宜禁發覺之日即以詐為制書律論朕今此舉實以教外別傳將墜於地不得已而為此至於宗門能殺能活能縱能奪之趣皆由宗師所參不謬所悟無垠如千里駒隨意舉步便是追風逐日其不可及者皆其所不自知苟存一與奪自在擒縱無偏之見於八識田內則人法不空能所交接其與魔外有何分別茲選之有正集外集前集後集而又諄諄提示各序其旨於篇端者專欲學人真參實悟各得本分正知正見如象渡河脚踏實地便能超出三界而一一具足六度萬行切莫仍向此中轉求口頭滑利也此事不由語言文字分迷悟豈由語言文字定是非已悟已證者有語有句固能為人解粘去縛若平生無一則機緣語句傳世者豈得遂謂未悟未證乎如西天四七所垂言句甚少東土二三惟達摩曹溪尚傳語句璨大師尚有信心銘一篇其他二祖四祖並無一語垂後豈皆是未悟未證人也應知何在語錄之流傳與否乃近代宗徒動輒拾取他人涕唾陳襴葛藤串合彌縫偷作自己法語災棃禍棗誑惑人家男女其口頭實能滑利者便鳴鐘擊板豎拂擎拳彼建立則我掃蕩彼掃蕩則我建立各出妄見爭持大家一場懡㦬禮拜者作出身之活路棒喝者成漂墮之黑風如此心行稱曰度人佛祖門庭豈不污辱又如古人契證無差每有拈代偈頌以相印合今則不然不於契證處自了自心但於公案上盲拈瞎頌剽竊成語差排牽合為可解不可解之語作若通若不通之文千七百則皆可通融百千萬言無非活套以此為拈代偈頌豈不塗污古人誤累自己有何交涉虗費鑽研夫講師詮解教典何嘗不同於如來之語而不得謂傳如來之心者以心宗非語言文字所可傳故曰教外別傳今將教外別傳所有公案作文字則是又成一教外別傳之教典矣況文字邊事欲其工妙亦非聚數十年心力不能到家至作得文字好則此數十年不究本分可知教外別傳只是本分二字安可離却而為此門庭以外事拈代偈頌四者頌最為後學人於頌古切用工夫遂漸至宗風日墜此端一開盡向文字邊作活計趙州所呵枝蔓上生枝蔓正為此輩至乃子孫稍得世榮便欲將祖父言句夤緣入藏不思千古自有明眼人豈得欺盡謾盡夫本為利益將來流芳百世夤緣入藏而乃忘其貽誤後人遺臭萬年也何苦夤緣自貽伊戚平素一無所事喫得飯飽長連床上三三五五握管伸紙商量作一部好語錄垂後縱使句句如初祖所說亦乃餿羮餲飯與靈覺有何交涉況此實非學問之所能及思慮之所能到何苦造大罪孽同於謗佛古人云佛法不怕爛却又云但得成佛不愁不會說法朕願天下宗徒參則實參悟則實悟此是菩提道場其中無求名利處於此尚不無污染可見從初發心便非真實為生死出家也若為名利何如耕農作一孝弟力田之民不然應試作一科舉文學之士留此宗門以待真正發心參學之人免致塗污佛祖之慧命朕閱指月錄正法眼藏禪宗正脈教外別傳諸書所選古德機緣語句皆錯雜不倫至於迦陵音所選宗統一絲者尤為乖謬古人語句專為開人迷雲後人選輯專為垂諸久遠今乃挨門逐戶拾取剩遺或珠或璣或金或鍮或絲或布或柴或草或瓦或礫或垢或膩一家強收一物入籠中更自誇曰秉公何庸愚之甚也但圖人人有分個個不遺紛紜雜陳撩亂錯出蝌斗與神龍並游野狐與師子齊吼飽參者尚或一時目迷況初學之人豈不觀之而愈惑求之而愈遠其為毒害奚可勝言此選朕近日方見未料性音昏憒卑鄙至於此極也至於取本朝開堂說法之衲僧平生所有亂統各各人編一則錯雜不堪謂之宗統一絲直接西天四七東土二三真令人笑之齒冷若然則禪宗之統實危如一絲也其意不過取媚同門參學之徒俾惑其選錄伊祖父言句入集以為榮華此何異世間澆薄士子彼此標榜選刻文字自稱名士乎噫可為宗風太息流涕者矣如朕於涌泉欣天衣懷韶國師等古德語句寶之如摩尼夜光赤刀大貝而諸書所載極少徧求不可復得蓋瞿汝稷輩自然皆是性音心行既雜取下等語句又畏繁多自然將真正師範至言轉播棄之而不惜歷年既久漸以無傳良可歎惋因念從上古德不肯以佛法當人情一任香火歇絕不妄付拂者其與盲傳盲受祇圖支派蕃衍之人高下相去天地懸隔夫慧命絕續正同父子但與身體髮膚之稟受其理相不可強同雖瓣香所承定不容昧但如朕所採語句中諸禪師現在已無法嗣者天下宗徒之祖父豈得不從此摸著鼻孔是則亦為伊祖父生身之所自也凡為嗣續正當飲水思源柰何各立門庭同於世間種族趙甲之家不祀錢乙之祖橫分畛域各守封疆況伊輩盲傳盲受並未大死大活有何法乳所報何恩倘從此選中諸禪師垂示處得個入頭是乃瓣香法乳之恩理宜酬答者也如或未能則姑如先聖先賢列祀學宮之例使人人致敬要亦未為不可天下叢林古剎衲子除各自供養伊本支祖父外應將從來拔萃古德一一設位於堂朝夕供養禮拜使其香火絕而復續徧滿震旦不但為後世真參實學者勸亦報本酬源之正舉再者從上祖師設呵佛罵祖之路蓋為學人聖見不除則觸途成礙苟不向脚跟下如斬一握絲一斬一齊斷則見相橫前仍沿此岸夫如來直指靈鑑心體不特破根塵相對之妄亦乃破離妄絕對之真真妄兩途皆眾生無始以來之見病大善知識透天透地泯妄泯真是以掃空生佛之虗華蕩盡妄真之閒說喫緊為人無柰立此呵佛罵祖之說所謂以慈悲之故而有落草之談也其實水月道場空花萬行中此等語言何處安著如德山鑒平生語句都無可取一味狂見恣肆乃性音選宗統一絲採其二條內一條載去前後語言專錄其辱罵佛祖不堪之詞如市井無賴小人詬誶實令人驚訝不解其是何心行將以此開示學人耶是何為耶近世宗徒未踏門庭先決堤岸一腔私意唯恐若不呵佛罵祖則非宗門強作解事學人饒舌狐行象跡鴞學鳳音是何言歟是何言歟釋子既以佛祖為祖父豈得信口譏訶譬如家之逆子國之逆臣豈有不人神共嫉天地不容者閻羅面前刀山劍樹專為此輩而設極宜猛省如南泉願牧水牯牛公案最為下品因南泉願頗有本分之語是以朕未加訶斥而性音則於其他語句概置不錄所錄二條其一即是此條具此凡眼有何聖見可除輒敢見人呵佛罵祖便生歡喜採輯鴟鼠嗜糞斯之謂矣又如大慧杲云今時宗師為人入室三五徧辨白不出却教他說悟處若恁麼地如何為人等語此論大誤從來如永嘉一宿覺之類祇因當時但知教乘初闡禪宗所以一言半語漏逗本分皆胸襟流出便可印合自唐季以後古德垂示流布海內人人捃摭攘竊預備應機若不入室細扣知其是何心行朕亦頗能為人然實不能不令入室三五徧而即悉其底蘊開堂說法臨機問答固不可無若止憑一二語以定虗實此盲傳盲受之根大慧杲悞人謬論叢林當為炯戒況大慧杲既具如此眼目所談奇妙法何耶所得英俊才誰耶朕實深嘗上乘圓頓甘露之味非依牆摸壁率意之亂統既知之無疑豈忍不報佛祖深恩因不辭話墮竭力為宗門一番整頓所冀天下禪僧改往修來英靈輩出如朕所選中諸禪師者唱導十方使如來正教有振興之象是則朕之深願如爾等僧徒仍執迷不悟將朕一片慈悲全不領受仍以無明緇素人我心會取如世尊所說三藏十二分一例束之高閣則宗風之衰朕亦無如之何矣選輯既竣書此以為後序雍正十一年癸丑九月朔日御選歷代禪師語錄後集下雪竇重顯禪師師造智門即伸問曰不起一念云何有過門召師近前師纔近前門以拂子驀口打師擬開口門又打師豁然開悟留止五年盡得其道乃復徧參師到大龍為知客一日問曰語者默者不是非語非默更非總是總不是拈却大用現前時人知有未審大龍如何龍曰子有如是見解師曰這老漢瓦解冰消龍曰放你三十棒師禮拜歸眾龍却喚適來問話底僧來師便出龍曰老僧因甚麼瓦解冰消師曰轉見敗闕龍作色曰尀耐尀耐師休去後舉似南嶽雅和尚雅曰大龍何不與本分草料師曰和尚更須行脚問羅漢林曰法爾不爾如何指南林曰只為法爾不爾師曰大眾記取某甲話頭拂衣歸眾林下堂却令侍者請師至方丈問上座適來不肯老僧那師曰和尚當代宗匠焉敢不肯林曰你為甚拂衣歸眾師曰還許某甲說道理也無師曰你說看師拍一拍下去僧問遠離翠峰祖席已臨雪竇道場未審是一是二師曰馬無千里謾追風曰恁麼則雲散家家月師曰龍頭蛇尾漢師問新到甚處人僧提起坐具師曰蝦跳不出斗僧曰𨁝跳師便打僧曰更𨁝跳師又打僧便走師喚回僧作禮曰觸忤和尚師曰我要這話行你又走作甚麼僧曰已徧天下了也師復打五棒僧曰有諸方在師曰你只管喫棒師又喚第二底近前來問甚處人僧曰鼎州人師曰敗也僧曰青天白日師曰兩重公案僧曰恰是師以拄杖指曰你擬𨁝跳僧擬議師亦打五棒參頭曰這僧喫棒與某甲不同師一時喚近前僧珍重便走師隨後與一拄杖問僧名甚麼云義懷師云何不名懷義云當時致得師云誰與汝安著云某甲受戒來十年也師云行脚費却多
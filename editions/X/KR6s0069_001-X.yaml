霄裏或共蟲魚山水間不動不定無往無還飛潛任其所以出沒聽其如然極樂界自在天彌勒後威音前不得號佛強名曰仙西江月乘片時之興率成一十六首書罷不覺擲筆大笑其一海底泥牛聲寂掛樹石羊沒踪三千破衲擁晴空却惹非人出夢耳覰鐵驢拽磨目聽木馬嘶風銅蛇鑽入石稜中兔角龜毛廝共其二大道非三非一凡夫說一說三終朝揑怪曰參禪此句何嘗夢見此句却非此句此句不出一三高低普應霎時間一月千潭徧現其三遍界如來妙體萬象隱顯其中乾坤物我本來同莫作經文空誦會得千途一轍不會六道縱橫如如若若自從容豈費纖毫功用其四煙水雲山疊疊浩浩萬里前程默移寸步自分明大千須臾坐定從他寒來暑往誰云地濁天清笑看日月任西東一曲無聲三弄其五八風吹來不動還同柳絮楊花箇中妙理實堪誇不是脫空說話會得途中受用不會屋裏波查分明直截報君家不必別探奇法其六春夏秋冬四序覆載高厚乾坤就中一物太慇懃處處皆有渠分視之却又不見聽之更復無音欲識此物名和身塞耳合睛相認其七鼻舌身意眼耳香味觸法色聲但不對待便靈通翻成六般神用凡情聖見無二佛性即是無明幻化空身妙體成何止三十二應其八佛性戒珠心印廓週沙界沒垠塵塵剎剎滿圓身拆合不離方寸識得無形妙體如來寶藏奇珍但棄生滅守常真根塵自然脫盡其九空空空兮色色色色色兮空空色空通塞本來同隱顯測其定動動動動兮定定定動豈假施功榮枯得失聽天公自在彌陀淨境其十霧鎖長江浩瀚雲封華嶽氤氳霎時風捲霧雲分山水依然遠近濁浪攪為酥酪大千變作黃金不須卜度妄勞心雲霧從他為暈其十一一二三四五六六一二五四三芥納須彌自等閑說甚顛倒互換不是神通妙用亦非法爾如然石人鼻孔垂唇邊誰道一條白練其十二善惡種瓜種豆收來亦屬空花何如自種野人家心田一粒無價此粒非空非有大千隨處生芽根深蒂固遍天涯道子難描難畫其十三十方世界法體名曰如來化身不須斷妄莫求真即在目前切近取之轉迷轉遠捨之愈沈愈深的實妙訣在無心歷歷明明普印其十四石火電光歲月急忙下手猶遲光陰荏苒幾多時剎那疾如彈指心田離此即此迷途百轍千岐茫茫堪笑世人癡大似河邊覓水其十五至道本離言語風雲月露成吟信手拈出却無心聊寄閑情一哂多少詞壇詩社刻畫爭欲驚人平頭合掌各評論總被文魔牽引其十六西江月詞數首堪笑不諳宮商參差韻調欠鏗鏘大似無聲演唱乘興豈知工拙推敲不費思量游戲三昧偶逢場腔板原來一樣教外別傳不立語言文字如何是三寶大地是佛虗空是法眾生是僧如威音前彌勒後之說世尊若不指出我輩何以得聞凡似此皆從緣所知非自真見但了目前虗空自然會豎窮三際但了目前片地自然會得橫徧十方三寶一體大道只在目前不必向高遠奇妙會實不用一句語言文字如是參上諭附錄佛祖之道指悟自心為本是此說者名為正知正見用之以利人接物令人直達心源方得稱佛祖兒孫所言外道魔道者亦具有知見因其妄認識神生死本以為極則誤認佛性謗毀戒行所以謂之外道魔道朕覽密雲悟天隱修語錄其言句機用單提向上直指人心乃契西來的意得曹溪正脈者及見密雲悟錄內示其徒法藏闢妄語其中所據法藏之言駭其全迷本性無知妄說不但不知佛法宗旨即其本師悟處亦全未窺見肆其臆誕狂世惑人此真外魔知見所以其師一闢再闢而天隱修亦有釋疑普說以斥其謬然當日魔心不歇其所著述不行即如魔嗣弘忍中其毒者復有五宗救一書一併流傳冀魔說之不朽造魔業於無窮天下後世具眼者少不知其害即有知而闢之者有德無位一人之言無徵不信將使究竟禪宗者懷疑而不知所歸而傳染其說者將謂禪宗在是始而起邪信繼而具邪見起邪信則正信斷具邪見則正見滅必至處處有其魔種人人承其魔說自具之性宗不明而言條之枝蔓肆出今其魔子魔孫至於不坐香不結制甚至於飲酒食肉毀戒破律唯以吟詩作文媚悅士大夫同於倡優伎倆豈不污濁祖庭若不剪除則諸佛法眼眾生慧命所關非細朕為天下主精一執中以行修齊治平之事身居局外並非開堂說法之人於悟修何有又於藏忍何有但既深悉禪宗之旨洞知魔外之情灼見現在魔業之大預識將來魔患之深實有不得不言不忍不言者夫禪宗者教外別傳可以無言可以有言古德云窮諸玄辨若一毫置於太虗竭世樞機若一滴投於巨海如是言者言言從本性中自然流出如三藏十二部千七百則公案何一非從本性中自然流出從無一實法繫綴人天今魔藏立一相為千佛萬佛之祖以袈裟縷縷為宗旨所繫有四法有雙頭有小法大法有大法之大法稱為細宗密旨有傳有授而魔嗣弘忍以僧伽難提遇童子持鑒直前為從來有象可示證其魔師一之象為不悖又以多子塔前袈裟圍繞一事作袈裟為宗旨所繫之明證又以臨濟打克苻普化鑿為黃蘗三頓棒之彖象種種作為實法不勝枚舉全從知解穿鑿失却自心黃蘗云今時人只欲多知多解翻成壅塞唯知多與兒酥喫消與不消都總不知三乘學道人皆是此樣盡名食不消者所以知解不消皆為毒藥盡向生滅中取真如之中都無此事夫食不消之人多而魔藏父子則是已經飽毒者也佛法不二豈可執定三四而更有密傳三四之宗旨廣引從上古德言句相似者為之注脚轉以較勘不立言說單提向上之正宗仰面唾雲反污己面趙州云老僧此間即以本分事接人若教老僧隨伊根基接人自有三藏十二部接他了也祇說無是非分別相早不本分何況宛立箇是非分別相世尊四十九年所說古錐千七百則公案總是語言文字若不識得這箇縱使字字句句依樣葫蘆即為魔說即為謗佛縱能記得佛祖所說三藏十二部千七百則公案字字句句不差正是光明海中多著泥滓況既落言詮即同教相既同教相則三藏十二部現在又何必立教外別傳之旨任伊橫說豎說能出三藏十二部之外乎聖人多能佛多神通能非聖本神通亦非佛宗仲尼何嘗知西方之梵語如來不能作震旦之唐言能與神通各有所窮與這箇有何交涉何況文字一端魔藏父子輒以不識字譏密雲意謂不如伊等學問若要詮理論文自有秀才們在何用宗徒識字不識字與這箇又有何交涉博通經史如剪綵以添樹上之生花目不識丁亦飯熟不借鄰家之水火若魔藏父子其大病根正在識丁而不識這箇今使蒙古人來便接蒙古俄羅斯人來便接俄羅斯暹羅蘇祿琉球日本人來便接暹羅蘇祿琉球日本若必待伊識得文字然後接得則佛法不能葢天葢地矣魔藏邪外知見自以為言言據古字字稟經豈知盡三藏十二部乃至十三經二十一史諸子百家盡世間四庫縹緗所有文字並與貫串配合極其稜消縫泯自道佛來也開口不得正是佛出世也救不得也阿難三十年為侍者祇為多聞智慧被佛呵云汝千日學慧不如一日學道若不學道滴水難消況魔藏以邪外知見唐突佛祖向上邊事尚安得有呵斥分祇瞞得有眼無珠之徒明眼人前魔形自露趙州云如今知識枝蔓上生枝蔓都大是去聖遙遠一代不如一代只如南泉尋常道須向異類中行且作麼生會如今黃口小兒向十字街頭說葛藤博飯噇覓禮拜聚三五百眾云我是善知識爾是學人可知法藏父子之魔形從數百年前趙州早為判定更不必到眼始知也悟修皆以臨濟一棒指人魔藏斥曰一橛頭禪躲跟窠臼若論箇事無論奇言妙句俱用不著雖一棒一喝亦為剩法古人不得已而用棒喝原為剿絕情見直指人心魔藏若以情見解會乖謬之甚古不云乎一棒喝不作一棒喝用何嘗執此一喝一棒也魔意但欲抵排棒喝希將伊所妄立之一相雙頭四法之實法以邀奇取勝殊不知其大乖教外別傳無法可傳之旨也且悟修未嘗謂一棒為千佛萬佛之祖而魔藏妄揑一相為千佛萬佛之祖獨非躲跟窠臼乎若將一相作棒喝用猶是躲跟窠臼若將一相為千佛萬佛之祖直是魔家窟宅矣忠國師以九十七相示耽源耽源以示溈仰魔藏杜撰稱為然燈以前無文密印當日耽源示仰山仰山一見即焚却源後問仰仰即重集一本呈源更無遺失又溈山舉相內作一日字仰山就地畫一相內作一日字以脚抹之溈山大笑魔藏但於仰山一見即能記憶處詫為神奇而不於溈山大笑處仰山焚却及脚抹處薦取所謂韓盧逐塊若謂九十七相奇特者朕今即作八萬四千相歸於八千三百九十七相又歸於七百九十一相又歸於九十五相又歸於九相又歸於一相正如入海算沙亦遊戲華藏之一具有何奇特至於三玄三要自臨濟唱出以來古今宗師無不拈提而皆不能分明舉似魔藏乃執黃蘗三頓棒以附會之杜撰差排是乃全不知三玄三要臨濟不云乎大凡演唱宗乘須一句語具三玄門一玄中須具三要首提演唱二字演唱不能無言句言句須識玄要方成活句然一玄而三要即具三玄而九要全具如此乃玄以立要要以貫玄非九要不能貫三玄得九要而三玄始圓不分而分分而不分所以玄要之法無法不該如一棒喝不作一棒喝用顯而易見者又如四料揀之法亦如春夏秋冬之四時雖寒暑變遷總不出此一年此一年即棒喝也曹洞之五位亦如五行之互具不出此一氣此一氣即棒喝也若夫浮山九帶朕謂一句中須具九帶而九帶中須具五十五束又如汾陽十智同真朕謂一句中須具十智同真而一同真中須具五十五實如此與玄要之旨何別推而廣之難以悉數總之歷代祖師雖更換面目接引世人總不離世尊拈花臨濟棒喝之旨離此者即為魔說況此棒喝能具萬法能消萬法此棒喝豈有定相一棒喝何得作一棒喝用魔藏不識目為一橛禪如果言禪即一橛已屬多設魔藏意猶未足不知必待幾橛方稱其魔意也三頓棒與三日耳聾豈更有別意有何交涉乎又魔藏作五宗錄序以窣堵波為喻以九級為五時教義以結頂處為如來禪以千丈旃檀從空破頂為祖師禪以五光三昧為五家宗派又自詡其言為塔頂上加聚沙一掬種種魔說夫一切教相皆屬筌墾土種瓜瓜成非土金從鑛出鑛豈即金乃謂教之級盡其結頂處即如來禪直同夢囈且西來大意即是如來涅槃妙心五家分派的的歸宗何可分佛分祖而又分五家雖二乘之與大乘尚如皮肉骨髓層次歷歷而分拆不開何況單提向上邊事五光五派有何交涉大似漢代迂儒謂尚書二十八篇應雲臺二十八將魔意祇欲推五宗為超佛越祖而掬沙加頂已又度越五宗如來所謂大妄語成者又魔藏指曹溪本來無一物為落空亡外道而弘忍泥黃梅亦未見性一語死在句下夫祇就本來無一物句論固似自了之見而下既云何處惹塵埃亦可謂超越功勳直臻向上也黃梅亦未見性一語死在句下者且不必論若言掩人耳目者亦非黃梅豈肯疑誤眾生而米白無篩之對曹溪又豈世法謙讓悟修所判雖稍儱侗而藏忍直斥為空亡外道轉見不堪可見其自了尚未能一味有為實法邪知邪見耳弘忍又指斥密雲情與無情煥然頓現為閨閤中物引雲門直得大地無纖毫過患為轉句不見一色為半提須知更有全提底時節為證殊不知密雲之一棒到底正是處處全提皆是情與無情煥然頓現之力彼既未到密雲悟處乃牽引雲門言句附會葢覆狐憑於城鼠依於社使人不敢焚熏究竟城社自是城社狐鼠自是狐鼠何能混狐鼠同於城社弘忍又云三峰師天童師其源流我輩師三峰師其法乳魔罪不問自承豈非並未會實無一法可得故曰源流所得有憑有據故妄云法乳耶夫工夫了徹識得自心師資道合針芥相投啐同時從上心印亦惟言汝如是吾亦如是耳何曾有一法可傳況亦實無一法可得一言相授受者如是方名法乳若藏忍之邪知邪見魔外師徒以密傳口授為乳是乃毒乳何云法乳朕謂魔藏原非全無知識只因離師太早煩惱妄想貢高我慢祇圖爭勝欲於法門中獨出一頭不顧己之脚跟全未著地欲裝點智過於師伎倆揑定一四法雙頭等名相擬為超師之作每立一妄語即捃摭文史穿配古德言句以證實之正如永明云以限量心起分齊見局太虗之闊狹定法界之邊疆遂令分別之情不越眾塵之境向真如境上鼓動心機於寂滅海中奔騰識浪於管中存見向壁罅偷光立能所之知起勝劣之解齊文定旨逐語分宗蟭螟豈健於鵬翼螢照那齊於日曜魔藏父子之語言著作永明數語可為判盡當日魔藏取悅士大夫為之保護使緇徒競相逐塊遂引為種類其徒至今散布人間不少宗門衰壞職此之由朕今不加屏斥魔法何時熄滅著將藏內有所藏忍語錄并五宗原五宗救等書盡行毀板僧徒不許私自收藏有違旨隱匿者發覺以不敬律論另將五宗救一書逐條駁正刻入藏內使後世具正知見者知其魔異不起他疑天童密雲悟派下法藏一支所有徒眾著直省督撫詳細查明盡削去支派永不許復入祖庭果能於他方參學得正知見別嗣他宗方許秉拂諭到之日天下祖庭係法藏子孫開堂者即撤鐘板不許說法地方官即擇天童下別支承接方丈凡祖庭皆古來名剎且常住本屬十方朕但斥除魔外與常住原自無涉與十方參學人更無涉地方官勿誤會朕意凡常住內一草一木不得動搖參學之徒不得驚擾奉行不善即以違旨論如伊門下僧徒固守魔說自謂法乳不謬正契別傳之旨實得臨濟之宗不肯心悅誠服夢覺醉醒者著來見朕令其面陳朕自以佛法與之較量如果見過於朕所論尤高朕即收回原旨仍立三峰宗派如伎倆已窮負固不服以世法哀求者則朕以世法從重治罪莫貽後悔從來邪說之作易惑人心然內道外道是非邪正亦不難辨本乎自性而為修為說即謂之內不本乎自性而妄修妄說即謂之外釋宗每闢玄門為外如紫陽真人於所註悟真篇後另註外集不雜玄門一語一一從性地演出禪宗即從上宗門禪師似此曉暢無礙包括於數篇之中者亦為罕見而目之為外可乎如真人者是外之內也如魔藏之徒攘佛法而壞佛法乃內之外也曹溪清派何可容此濁流況此魔說與魔子孫流落人間末學受其無窮之遺毒法眼慧命之所關朕豈忍不辨其是非天下後世必有蒙朕眉毛拖地之深恩者須知此魔之不可不辨因其為佛界之魔此異之不可不揀因其為同中之異傳曰息邪說正人心夫祛邪扶正朕之所不得不然者也粤稽三教之名始於晉魏後世拘泥崇儒之虗名遂有意詆黜二氏朕思老子與孔子同時問禮之意猶龍之褒載在史冊非與孔子有異教也佛生西域先孔子數十年倘使釋迦孔子接迹同方自必交相敬禮蓋五典九經三物六行治天下之大綱小紀固始自二帝三王而集成於我至聖然必解脫諸相而後此心方能達萬事萬物之性理此則其必然者後世或以日月星比三教謂某為日謂某為月謂某為星朕意不必如此作拘礙之見但於日月星之本同一光處喻三教之異用而同體可也觀紫陽真人之外集自可無疑於仙佛一貫之旨道既一貫愈可以無疑於三教並行不悖之說爰附及於此使天下後世真實究竟性理之人屏去畛域廣大識見朕實有厚望焉朕意禪宗莫盛於今日亦莫衰於今日直省剎寺棊布開堂秉拂者不可勝計固莫盛於今日也然天下宗徒不特透得向上一關者罕有其人即能破本參具正知見者亦不多得宗風如此實莫衰於今日也夫達磨西來九年面壁方得二祖慧可傳衣以佛祖之慧力接引人天尚俟九年之久始得一人今溥天之下萬剎萬僧萬僧萬拂師以盲傳弟以盲受人人提唱宗乘箇箇不了自心豈不使正法眼藏涅槃妙心垂絕如綫雖曰豈能必如達磨之傳二祖然亦必真參實悟自具正知正見而得正知正見之人而授之豈有盲傳盲受毫無著落若以此為振興佛教續佛慧命與毀佛滅法何殊甚至名利熏心造大妄語動稱悟道喝佛罵祖不重戒律彼此相欺賣拂賣衣同於市井將佛祖之慧命作世諦之人情雖竊有佛祖兒孫之名並無人天師範之實如法藏弘忍輩惟以結交士大夫倚托勢力為保護法席計士大夫中喜負作家居士之名者受其顢頇互相標榜世尊當日雖以佛法付囑國王大臣善信護持未有令枉道而從人也況乃不結制不坐香惟務吟詩作文以媚悅士大夫捨本逐末如是居心與在家何異若此則將來佛法掃地矣夫西來的意不落言詮綱宗之設所以揀魔辨異雖更換面目接人何甞有意別立言說離單提向上之正旨橫分畛域各立門庭也於今宗徒多將識神生死本傍語言文字邊拾人唾餘學人饒舌問者答者互相亂統棒者喝者翻成躲跟忽於解路中相逢便作交融之水乳謂是我宗密意若然與外道邪魔何異正所謂一盲引眾盲相牽入火坑自負良重何言利生以限量心起分別見向真如境上鼓動業識齊文定旨逐語分宗令後學者雖欲勤心力參奈荊棘布地熱毒迷空措足無從依心生業日積月久雖宗徒愈盛而宗旨愈泯矣良可愍歎特頒明諭曉示叢林目今直省諸剎堂頭若有自信無疑已臻向上如願來見朕者著來京朕自以佛法接之其深山窮谷之中或有獨老煙霞不肯受盲師衣拂自具正知正見之人宜念宗風頺敗當出而仰報佛恩果是實蹋三關知見超越朕必褒賜禪師之號令續從上諸祖法乳設若以名利心生徼倖想一至朕前水落石出伊既希冀世榮朕即投諸法網其或本未自信不過依樣葫蘆既稱禪徒只得說法正見魔見兩皆不具者聞朕此旨當竭力領眾結制坐香勤求本分或摘鐘撤板或棄拂捨篦重復加力參學必期了證毋再自欺誤人若大誑語成則善因而遭惡果何苦如此其餘緇侶未受付囑者當念佛祖留此法門原為眾生生死若不以了生死為念披袈裟何事要了生死須明心地勿守一知半解得少為足勿墮學識依通未證謂證勿但圖妄囑出頭誤人勿苟合世法求名損己所謂業識茫茫無本可據上則孤負佛祖眉毛拖地之深恩下則孤負自己本來具足之面目長受沈淪永依苦趣誠為可憫豈不惕然是宜真心切念求了求當惟有大悟大徹方免醉生夢死其或未能且堅守佛制嚴淨梵行莫犯貪瞋癡常修戒定慧不可妄為知證貽誤後學存此佛種以待機緣若惟以邪知邪見密傳口授欺己欺人貪名逐利世諦流布毀戒犯律則俗子之不如豈法門所宜有亟須自省知往修來毋負朕諄切護法訓誨之至意著該部傳諭直省督撫曉示天下宗門禪林圓明百問問凡有一身必有一心清淨法心百千萬億化心即不問如何是圓滿報心問既是頭頭顯露法法全彰為何被森羅萬象色空明暗埋却問鐘聲鼓聲同來耳中黑色白色同在目前且道辨別的是不辨別的是問如何是覿體現前的水中真火火中真水問有一絲毫便多一絲毫即不問有一絲毫便少一絲毫事如何問一人賣珠買產一人賣產買珠且道二人阿誰獲利問兔角弓龜毛箭發發中紅心此人伎倆何如問太陽中却具太陰之體太陰中却具太陽之用將此體用試定奪看問大海內有一通天徹地至寶神物且道是什麼問天上有件物地上有件物人上有件物山河萬籟上風雲星辰上昆虫草木上皆有一物且道是何物問屋棚為何在人脚下臥榻為何在人頭上問一人乘馬却脚點地一人步行却脚不點地且道是什麼人問水結為冰冰解為水且道那箇是真體問且道光含萬象是光透萬象是試檢點看問松樹稍頭有一物有體松樹根下有一物無體且道是何二物問圓月內有一點太空中有一點大地裏有一點巨海心有一點有人會得此四點參學事畢問大則遍滿三千即不問如何是小則毫毛莫識問金木畢竟是金木為何水火不是水火土為何又是土不是土試道看問四通八達易七花八裂難七花八裂易四通八達難若檢別得出許汝內外一如問老鼠鑽入米囤裏且道是鼠吃米米吃鼠問一人山頂立一人山脚坐二人相顧且道誰上誰下問如何是東行却西走如何是北走却南行問世尊說大藏經訓導眾生之恩初祖九年面壁開示諸人之德且道孰為深厚問將四海投於一滴水五岳移入一撮土則不問將虗空收歸何處問天無上有上泉無下有下空無際有際海無邊有邊且道箇什麼是無的問以三千為己任為何又道寸絲不掛體問平伸兩空掌一手有物一手無物且道却是為何問氈蓆乃萬毛千葦共相無明之所成且道羣毛眾葦無明在什麼處問一部華嚴經內有一字與當人最切且道是那一字問歷歷三千界為何又道湛湛絕點塵問一間屋棟梁椽柱磚瓦土石基址且道以何為體以何為用問以刀割水且道是斷不斷大好譬一事試舉看問春夏秋冬四序以何為正令問一圓青銅鏡一方玻瓈鏡且道二鏡那一鏡有痕跡那一鏡無痕跡問空中書字是水面簽押是泥上搭印是問目下在土地上有百千萬億魚鼈蝦蠏浮沈游泳諸人還見也否問雪峰三箇木球如何得合一球去俱胝一指如何得成三指去試作用看問萬有諸法皆是鏡中花水中月且道鏡在彼鏡在此問五音六律合聲五蘊六根合性且道似同似別問有因無為果無因有為果除此有無以何為因以何為果問人人脚跟下有對金剛釘為何各各步步不能插地問天上羣星皆拱北辰世間萬有却朝何宗問一人飾粉塗脂一人灰頭土面一人浣濯灰土亦不塗飾脂粉且道三人孰優孰劣問一人多夢夢裏作得主一人無夢夢裏作不得主且道二人孰優孰劣問一般果子桃為何甜李為何苦問一人道山中有水一人道水中有山二人內一人得體一人得用試辨別看問萬有諸色皆各分五色萬有聲音皆各合五音且道何因有此差別問如何是仰觀却下視如何是下視却仰觀問泥金剛鬍鬚儼然且道四肢有寒毛耶無寒毛耶問相識熟人對面如何得不識去不識生人對面如何得相識去問古人言殺人刀活人劍今射一箭殺一物活一物且道活者何物殺者何物問器世界內瓜多子情世界內魚多子且道空世界內阿誰多子問城東老母怕見佛一人怕見太陽相同太陽在東此人避於西太陽向西亦然且道此人住居何所姓甚名誰問一枝筆具清淨法身圓滿報身百千化身且道還有欠缺處也無問地上有一羣星天上有一撮塵試拈出看問桃紅復含宿雨柳綠更帶朝煙兩句有一句親一句疏試檢點看問如何是將大千撮來如粟米大問佛說三藏十二部如語實語真語者為何又道不曾說著一字問大海汪洋滔天波浪為何不見一滴水問山頂有一松樹水底有一松樹二樹同根且道那裏是同根處問五九合十四數五九成四十五數且道那句是體那句是用問拂子絲絲向下垂為甚珊瑚枝枝撑著月問投何色於水水便變成何色且道水性合色色性合水問晝明屬日夜黑何因試道看問會絲為繩以那一絲為體聚毫為筆以那一毫為用試分析看問山是山水是水為甚鹿不是鹿魚不是魚問有一人好靜而不淨有一人好淨而不靜且道二人有優劣也不問且道鏡中花水中月較天中月檻邊花孰真孰幻問古剎三門且道那一門是正路問山上有一人却在山下山下有一人却在山上且道二人相去多少問千萬字中皆容一字一字之中却容何字問日月日日東升西落風雲為何時刻不定試比量看問如何是峻嶺不高如何是陂澤不下問月光穿簾入燈光透簾出二光相合去還道有分別也無問金剛經內有第一義字包括全經之旨且道是那一字問引鏡照形孰為真我空谷應聲孰是我聲問上而最上者何物下而最下者何物外而又外者何物內而又內者何物問百爐焚百種香且道以那一味為主問雲無心以出岫誰知無心鳥倦飛而知還誰知有意問大地沙門一隻眼為何千手千眼觀世音問日下如何得逃影去問二人執線兩頭東扯西拉且道誰是得者問香燈一般是火為何一有光一無光問海濵有一老姆家有一甕有時一甕中盡是海水有時將甕水成大海去且道具何神通不可作大海投於一滴會問有一條線從三十三天直穿到十八層地獄試拈出這一條線看線不可作絲會問有一人修行而不修行有一人不修行而修行且道孰是孰非不可作執相修修無修會問玉琳國師不安有僧問候師云我本無病有甚好不好且道此意如何若道另有不病者則國師話成兩橛矣不可作此解誣謗問星月普印一潭且道以那箇為主不可作潭水為主會問凡人有六金剛圈若能跳得出許汝出三界不可作六根六塵六欲六道會問三千大千可是百千萬億化身否答云是問目前叢叢蘆葦可是百千萬億化身否答云不是問云何得話成兩橛笑答云人情慣務遠而略近且道意旨如何問人身內有一物具一體五用身外有一物具五體一用且道是什麼物不可作五蘊六識五色五音會問水火之中皆具殺人刀活人劍且道鋒刃在什麼處利害在什麼處不可作焚漂飲食會問情世界器世界萬有之中有一物是我自己試定當看不可作儱侗會去問如何是上而又上之人如何是下而又下之人且道二人是同是別不可作尊𢍉山上山下會問水因何解渴而不能解飢飯因何解飢而不能解渴答云勤勞思歇閒極思動寒則思暖熱則思凉且道是何意旨問萬有諸法皆歸一空且道空歸何處不可作本分解路問缾盤釵釧總是一金且道分也不分也不可作製造前溶化後以道理講說會問心手水墨筆紙且指出是誰成字不可作和合相看問三千大千色空明暗萬有諸法總是一箇字且道是何字不可作歸於一心一理會問不論聖凡賢愚蝡動含靈各各身中有一物最高且道是何物不可作頂會御製序達摩未到梁土以前北則什公弟子講譯經文南則蓮社諸賢精修淨土迨後直指心傳輝暎震旦宗門每以教典為尋文解義淨土為著相菩提置而勿論不知不覺話成兩橛朕於肇法師語錄序已詳言宗教之合一矣至於淨土之旨又豈有二這箇如摩尼珠面面皆圓如寶絲網重重交暎如大圓鏡萬有虗空不得而出如大火聚萬有虗空不得而入誠乃不無不有無欠無餘果能了悟則終日喫飯不曾嚼著一粒米終日著衣不曾掛著一條絲然則終日念佛豈有為念佛所礙哉如猶不能了悟則色空明暗受想行識盡是一場大夢又何必但許人惡夢而不許人善夢也曹溪十一傳而至永明壽禪師始以淨土提持後學而長蘆北磵諸人亦作淨土章句及明蓮池大師專以此為家法倡導於浙之雲棲其所著雲棲法彚一書於本分雖非徹底圓通之論然而已皆正知正見之說朕欲表是淨土一門使學人宴坐水月道場不致歧而視之誤謗般若故擇其言之融合貫通者刊為外集以示後世如學人宗旨不明即將南無阿彌陀佛一句作無義味語一念萬年與之抵對自然摸著鼻孔如其已得正悟則丈六金身是一莖草三千世界是一微塵延一剎那頃於萬億年擴一毫毛端為四大部寶池金地充塞現前翠竹黃花無非正受於此淨土正可隨喜花開見佛豈不是直指心傳也耶是為序雍正十一年癸丑八月望日御選雲棲蓮池大師語錄淨土問答問念佛之心無雜無間即精進度何故乃云不退墮耶答將謂精進乃能不退墮非精進即是不退墮耶辯此有二一者亦可即是不退何以故雖常言精不雜進不退然此二字總之成就進義古云精進度懈怠是也進與退對故精進即不退二者此重念佛普攝諸度不重訓詁精進二字況既云精進乃能不退今念佛之人永不退墮則念佛即成精進不必更求精進矣如所問乃是精進念佛非念佛即精進問世人聞念佛念心心淨土淨之語因膠執內心拂拭令淨偏空自喜撥無西方及語心土一如則曰我心非石懷土奚為蚓實含泥黃壤豈侔金界鰲誠戴岳持地何若摶空蓋亦喻似丹臺象比蓮蕚四十脈絡以當寶網交羅一靈內朗以況彌陀安住近肺約西通舌為池法譬而已無論實境則有引風水之凶吉致子孫之興衰例依正之互融示機感之靡忒此猶未委正因未窮十妙更求明誨傾此惡見答心淨土淨語則誠然但語有二義一者約理謂心即是土淨心之外無淨土也二者約事謂心為土因其心淨者其土淨也若執理而廢事世謂清閒即是仙果清閒之外無真仙乎至如攬身分而言淨土此則邪見尤甚苦報彌深蓋吾佛唯明一心而謬人恒執四大是故認肉絡為寶羅指妄想為真佛肺屬西而便名金地舌生津而遂號華池鄙偽千途莫可枚舉豈知革囊不淨幻質非真徒費辛勤終成敗壞而復迷醉無知竊附於心淨土淨之說不但愚夫愚婦惑之士大夫亦有受其害者良可歎也問或謂佛逼眾生拋離骨肉棄捨形骸近別家鄉遠投外國魂爽幽幽入此夢境夢中獲寶色色非真聞之慘然有何極樂又云在生亦是夢境既全是夢益復可悲將謂菩薩先醒却行如夢六波羅密則實報莊嚴更成恍忽矣我其歸常寂光乎寂光無色莽渺安依不如寓世夢間一任獻吉憎惡答虗浮界內是夢非真常寂光中是真非夢世人以夢為真以真為夢顛倒如斯良可悲矣豈知骨肉之即讐冤形骸之為桎梏得生淨土是則脫沈疴而再獲天年釋狴犴而榮歸故里名之極樂詎不然乎若夫菩薩行門雖云如夢譬之大喜將臨夜現吉祥之境豈比重昏失曉魂招凶惡之徵蓋菩薩在夢而將甦凡夫由夢而入夢至於寂光則朗然大寐之得醒矣問世之求往生者非即欲往生者也就使正禮念時佛現其前引之西往必辭以化緣未周婚嫁未畢幸少須臾無死耳復有一人異於前人力修三昧無間六時慮後倦勤失此機會便乃投身自斃縱火自焚既匪捨報安詳如入禪定佛憐其愚亦肯手相接否答智人之修淨土也在生則自淨其心報滿則任緣而往不欲生而戀著世緣者慢也急欲生而自殘軀命者愚也如是之流輕則攝入魔羣重則沈於惡趣日光普照不及覆盆佛雖大慈莫之能救問王臣往生是不舍國事者也居士往生是不舍家事者也夫居士一心念佛或無他礙若王臣之勞於王事當不若家事之可推諉者楊無為諸君亦何嘗被鰥官之刺而竟致化佛之迎豈軍旅政刑一切不妨往生乎抑彼念念與實相不背乎答達心之士萬機萬變而國政非繁執境之流一夫一婦而家緣尚累譬之明鏡照物終日照而無勞空谷傳聲多眾傳而不困如是則大君不異世尊百辟何非海眾都俞吁咈而妙法交宣慶賞刑威而真慈平等王事佛事打成一片何淨土之難生耶問今之迷者猶背燭而坐回首無不見燭者彼一念緣佛便應見佛如必念之熟而後見將回首見燭者亦必瞪目熟視久而後見哉向令佛設善權念佛時隨念見佛停心絕念及與雜念時便爾懵然斯人人念佛矣安有闡提耶答太陽日日當天而戴盆不覺明鏡時時對面而瞽目無知念佛之人念念與彌陀相接而自昧自迷何以異於是良以心水不清佛月不現眾生自咎於佛何尤且明燭在背回首幾人指點徒勞堅然強項乃責佛之難見亦獨何歟問黃帝內經明大惑之病謂目中無端忽有所見是也今學人於本無中忽有所見與見鬼何別又云將死之時乃得接引所謂時衰鬼弄人捨身而隨之不亦大惑歟答無故而忽見安得非邪昔觀而今成安得非正蓋因果之常理也淨業學人應須平日考因果之根原辨邪正之微細至於臨終所見魔佛顯然誰足為惑如觀立佛而現坐佛者魔也正報依報不與經文符合者魔也以空觀空而隱者魔也苟為不然則淨心成就淨境現前接引往生訓垂金口安得與無故忽見比耶問或云西乃天傾物老之方人死念絕乃得生彼又云天傾之處地為有餘有餘則能廣容往生之眾又云庚辛屬金金不變壞以示不退轉之義又云萬物以西而成百果皆實於秋行人東方行因西方證果竊為往生乃是生機何不入東方生物之府而反入肅殺之地若標第一義諦何不直於中央攝人耶無乃但論一時當機所謂西者無所取義歟答如來一語多義攸含但邪正殊途理應揀擇若云念絕則誰生念若云地容則地容有限金性不變秋位司成二義為近據實而論亦不盡然蓋虗空無盡世界何窮今此極樂之東觀則西西觀則東南北二方亦復類是釋迦勸往故說西方別佛讚生必標他向那得執西立義膠固不融不然童子遍參何復南為正位藥師示現乃令東亦淨方但歸心一處專念斯成已耳問兜率彌勒宮也昔人往往發願求生具有儀法至唐道昂專修西方而臨終兜率來迎夫兜率可不願而致西方似亦可不願而致矣又或誓取銅輪反得鐵輪誓取金臺反得銀臺則誓取西方淨土反得東方淨土亦未可知答十善戒定生天之正因發願回向淨土之正因故生天者容有不資於願而生淨土者無願則不成蓋淨土非無善力而願乃居先生天亦假慕求而善為之主世有初修天業後一意西方是以歿現玉京俄隱跡而重彰佛國正專求之所感豈漫修而可成至如銅鐵未符金銀稍隔則是求上僅得其中然而終竟必如其願志西方而功未就要於人天善道受生耳若能純一用心堅誠發願西則必西何東生之足慮問懺中所禮佛乃盡三世而所念佛獨一彌陀固謂三世諸佛無稱名之願耳然彌陀亦有多名具在經中隨取一名持之得否據小彌陀經翻為無量壽無量光而觀經獨稱無量壽者豈能觀之智所觀之光即為光耶六方佛中其西亦有無量壽者即是此佛自讚否耶答如來名號誠曰多端但取偏熟眾生耳根於中實無差別惟彼彌陀之號普遍十方故令稱念之人皆歸一致且無量壽是唐言阿彌陀乃梵語而壽量現等虗空光明自徧宇宙舉體該用但云無量壽足矣若夫十方諸佛覈之歷有同名釋迦尊稱多之至於無算極樂教主何獨不然非佛自讚亦無疑矣今時有人執念釋迦而不念彌陀者自以為是拗眾稱高噫釋迦使汝師彌陀而汝不從教譬之子違父命而不就明師雖日呼其父安得不云忤逆問極樂之樂從情識生三禪而上已不耽樂九品之內顧復求樂何也若云寂滅為樂之樂豈必緣衣食自然無有眾苦而得名乎若云淨土唯心心體常樂何為又言觀佛心者大慈悲是答極樂雖接凡情其實有二一者對苦說樂無有眾苦故名極樂二者稱性說樂無苦無樂故名極樂此之真樂豈情識之擬耶又聲聞以寂滅為樂大聖以慈悲為樂則大慈悲心非即常樂乎而世人以戚戚言悲抑末矣問一人作佛事諸佛應盡知十方佛來迎是人何所向諸佛本同迹同種種皆同念佛者合是十方諸佛同來接引此獨一方三聖往迎必其念時所見偏淺答諸佛雖能徧知而赴機不亂一佛既勤專念而感應自符修淨土者就使諸佛齊彰亦必有主有伴彌陀獨顯化佛雲從因果法爾如然非是偏淺所致問涅槃云釋迦亦有淨土本我導師在彼末法最後誠言可無信受便爾六時但念迦文生難勝國豈不當機耶釋迦極讚彌陀合如其願既生彼已遣我承事彌陀亦復何礙答諸佛誰無淨土彌陀亦有穢良繇土土交資佛佛互讚如世易子而教猶花接幹而生妙用微權不可思議惡知難勝非即清泰之鄉安辨瞿曇得無法藏之後但遵現教毋用他求問有云大徹大悟人不妨更見彌陀既已不歷諸位立地成佛矣以佛見佛猶以知知知此一見為是參為是證意者權示榜樣又或理既頓超身猶凡下往獲妙用乃可度生耳答凡夫心始得悟見處與佛相齊菩薩行實無邊功能去佛猶遠不妨再依古佛重受新聞且證且參何窮何盡昔人謂離師太早不能盡其妙況離佛乎若執三祇薰鍊是藏教小乘而弱羽狂飛失利多矣可不慎諸問即淨即穢即穢即淨西方此土不踰分寸生而即無生去則實不去今彈指一念頃屈伸臂此已約時便似舉足移步雖云極速猶是兩途答執謝惑銷縱使路阻千山而融通不二情關識鎖就令速超彈指而判隔彌深今學人唯圖句語尖新喜談即穢即淨不知頭沒九淵之下謂天壤無殊身沈鮑廁之中謂薰蕕不別良可哀夫問執途之人而問之皆曰念佛乃口稱非心念詰之則曰心口相應夫心口相應斯成聲因心而動斯為念安得以聲為念乎或謂萬法唯心何聲之非心耶然則鐘鼓琴瑟之鳴亦是念乎幾矯亂矣答鐘鼓雖含洪韻非叩不鳴琴瑟雖具妙音無指不發鐘鼓琴瑟譬唇舌之外張若擊若彈似心念之內動如其絕念從何發聲是以寐語喃喃亦由夢想豈得佛聲浩浩不自心源但世人任運稱呼不專不切初則藉念成聲頃則隨聲亂念名曰相應實不相應耳天如有言口與心聲聲相應心與佛步步不離如是念佛其庶幾乎問善財之參德雲始知念佛法門及南過百城五十四參而見阿彌陀佛則三昧成矣他日文殊現身竹林但令人念阿彌陀佛夫以善則位殝十信文殊何不徑指彌陀而顧使周歷百城彼學人未南詢而輒議西歸者太早計乎答始參而教念佛則從源以及流周歷而見彌陀則由末而歸本所謂無不從此法界流無不還歸此法界是故南詢而西返豈曰遲還往生而徧游何云早計醫王發藥標本隨宜操縱微機凡情靡測問總攝六根而念佛此勢至語也念既從心則凡發願回向禮懺者一念蔽之矣世無心外之願與心外之回向禮懺也夫一心念佛而是佛所發之菩提即願也專向是佛即回向也南無即禮也一念消生死之罪即懺也餘可例知矣念佛有何不足而紛紛使心亂哉答一心清淨是為理觀內明五體翹勤乃曰事懺外助直觀本心非不徑要而末法眾生慧薄垢重須假理觀事懺內外交攻庶得定就慧成死生速脫但今人惟存事懺理觀全荒何況外飾虗文中無實悔反令清信男女紛紛亂心背普賢之願王乖慈雲之本制嗟乎傷哉弊也久矣問觀經言觀佛心者大慈悲是世人若能放生戒殺仁民愛物以至九類眾生皆滅度之而不作滅度想遂與法藏之心契矣且又不違釋迦觀心之訓柰何取觀身與稱名之麤迹而反以佛心為助緣耶答念佛有二一者念佛心性二者念佛身名念心性者見真佛也不妨覲光明相好之佛於西方念身名者見應佛也亦能覩自性天真之佛於象外本迹雙舉理事同原心性良非助緣身名豈云麤迹今五部六冊之徒藉口無為撥空因果障人禮像嗤彼稱名古德有言人人丹霞方可劈佛箇箇百丈始可道無其或未然入地獄如箭射問空花巾兔之類世所謂幻妄也一切依正之報世所謂實事也佛言實事俱是幻妄則空花巾兔又當何名藉令彼之實事果為幻妄其形狀了了虗偽一空花巾兔可矣安俟推破始知幻妄是故有幻者有如幻者有妄者有如妄者彼同居淨土幻妄耶如幻妄耶全妄是真全幻是中同居穢土即同居淨土同居淨土即上三土耶答空花巾兔全體虗無肉兔樹花從來幻妄本不推而自破但在迷而未知故正幻與如幻無殊實妄與似妄何別同居淨土即幻即如即真即中統而論之即穢即淨即一即三畢竟空寂有何階限然雖如是情見未破欣厭猶存應須消除幻妄證入真常捐棄穢求生淨國若夫捨垢取淨是生死業何淨土之有問人畏生死事大無常迅速乃始猛欲求脫不敢暫息也一聞橫出三界之旨捷路修行之說念佛消罪之文十聲往生之願便謂有佛可憑無業足懼以致悠悠竟不得力而入閻老手者多矣則蓮宗誤之也彼宗教二門參究甚難又不許疾見功效生死二字常係於心安得有此答凡人修道有聞難則止聞易則行者有聞難則勤聞易則惰者古聖施教各順時宜善用心者存乎其人而已念佛一途直超三界大悲之極故啟斯門若夫怠荒成弊眾生自誤非佛誤眾生也我欲仁而仁斯至仁在目前狂克念而聖斯成聖非遙遠是亦以易誤人乎若夫一言頓悟立地成佛宗門言易抑又甚矣安得亦謂之誤問豐干彌陀化身也寒山拾得文殊普賢也彌陀之現不領觀音勢至而挾文殊普賢以遊至所屬詞又多宗門語將無以念佛觀佛為局而轉如來禪成祖師禪乎抑常寂光土之人匪是莫由接乎答觀音勢至固稱日侍導師文殊普賢何曾暫離安養故釋迦乃娑婆化主會有觀音黃蘗非儒教宗師席延斐相融通攝化寧有定乎至謂語涉宗門似乎更翻淨業殊不知九蓮華蕊枝枝開迦葉之顏七寶欄楯步步入善財之閣八稜毫相稜稜觀中道真詮六字名稱字字示西來密意何待轉小為大變局為通然後接彼上根演斯玄化故知念佛一路即是入理妙門圓喫五宗弘該諸教精微莫測廣大無窮鈍根者得之而疾免苦輪利智者逢之而直超彼岸似麤而細若易而難普願深思慎勿忽也答曹魯川附原書久不奉面命歉歉乃時時獲翻刻教迪我孔多慰謝慰謝南企法雲殊切瞻依適敝郡斷凡悟上人祇趨壇下為求法故附此候安不繆迂近守東魯遠宗西竺乃於儒釋之書為蠧魚者四十年於茲矣亦嘗奉教於諸達者有所蓄積冀正之於大善知識茲因斷凡之來布之也夫釋尊有三藏十二部教所謂於廣大海張眾多網又所謂大囷小囷也者祇宜談大以該小詎可舉一而廢多比吾黨中有倡為歷劫成聖必漸無頓之說者夫漸亦聖說未嘗不是而以漸廢頓左矣尊者內祕頓圓而外顯淨土法門諸佛有然無足疑者豈近來聽眾不無如法華所說初聞佛法遇便信受思惟取證者直欲以彌陀一聖而盡廢十五王子以淨土一經而盡廢三藏十二部則不侫之所不願聞者也時雖末法而斯人之機豈無巧鈍有如釋尊為迦葉為憍陳如其說如此為善財為龍女其說如彼二十五聖各證圓通文殊所稱又如彼正所謂昨日定今日不定又所謂說我是空且不是空說我是有且不是有此所以為善無常主活潑潑地如水上按葫蘆然非死煞法也倘釘樁守窟焉利人天所願尊者為大眾衍淨教遇利根指上乘圓融通達不滯方隅俾鵬鷃並適不亦盡美盡善乎哉又佛華嚴乃無上一乘圓教如來稱性之極談非教非宗而即宗即教不空不有而無垢無淨是在法華猶較一籌若餘乘似難與之絜長比短也者尊者乃與彌陀經並稱已似未妥因此遂有著論騰之駕淨土於華嚴之上者朱紫遞淆之謂何鹿馬互指又何說也此而無人言之天下後世必有秦無人焉之嗤亦願尊者為淨土根人說淨土為華嚴根人說華嚴毋相誚亦毋相濫乃為流通佛乘乃為五教並陳三根盡攝奈之何必刻舟而求劍且彈而走鷂也若夫華嚴一經有信解行證四法善說此法者宜莫如方山今其言具在可覆也爰有清涼人號為華嚴菩薩而實不會華嚴義旨草草將全經裂為四分以隷四法舍那妙義委之草莽矣亦願尊者辨黑白分涇渭揚杲日於義天嗟嗟今之時緇素中高流日就彫謝不之所仰重於尊者如泰嵩然故不以贊而以規知尊者無我而不亦非為我故諄諄言之惟尊者亮之久聞居士精意華嚴極懷敬仰茲接手教殷勤直欲盡法界眾生而納之一乘性海是普賢大願也然不肖雖崇尚淨土而實則崇尚華嚴不異於居士夫華嚴具無量門求生淨土華嚴無量門中之一門耳就時之機蓋由此一門而入華嚴非舉此一門而廢華嚴也又來諭謂不肖以彌陀與華嚴並稱因此遂有著論駕淨土於華嚴之上者此論誰作乎華嚴如天子誰有駕諸侯王大臣百官於天子之上者乎然不肖亦未甞並稱也疏鈔中特謂華嚴圓極彌陀經得圓少分是華嚴之眷屬流類非並也古稱華嚴之與餘經喻如杲日麗天奪眾景之耀須彌橫海落羣峰之高夫焉有並之者此不待論也又來諭謂宜隨機演教為宜淨土人說淨土宜華嚴人說華嚴此意甚妙然中有二義一者千機並育乃如來出世事非不肖所能故曹溪專直指之禪豈其不通餘教遠公擅東林之社亦非止接鈍根至於雲門法眼曹洞溈仰臨濟雖五宗同出一源而亦授受稍別門庭施設理自應爾無足怪者況不肖凡品乎若其妄效古人昨日定今日不定而漫無師承變亂不一名曰利人實誤人矣何以故我為法王於法自在平民自號國王不可不慎也二者說華嚴則該淨土說淨土亦通華嚴是以說華嚴者自說華嚴說淨土者自說淨土固並行而不相悖今人但知華嚴廣於極樂而不知彌陀即是遮那也又來諭清涼不會華嚴義旨而裂全經為四分以屬四法夫信解行證雖貫徹全經而經文從始至終亦有自然之次第非清涼強為割截也其貫徹也所謂圓融其次第也所謂行布即行布而圓融四分何害使無行布圓融何物必去行布而圓融則不圓融矣且信住行向地以至等妙佛亦自裂全經為五十二段乎何不將五十二段一句說盡而為此多卷之文乎因該果海果徹因源因果未甞不同時而亦未甞不因自因果自果也何必定執八十卷經束作一塊都盧是箇無孔鐵錘而後謂之圓融乎定執一塊不許分開即死煞法即釘樁即守窟安在其為活潑潑也方山之論自是千古雄談而論有論體疏有疏體統明大義則方山專美於前極深探賾窮微盡玄則方山得清涼而始為大備豈獨方山即杜順而至賢首諸祖亦復得清涼而大備豈獨華嚴諸祖即三藏十二部百家論疏亦復得清涼而大備溫陵解華嚴以方山為主清涼為助已為失宜而居士顧訾之此不肖之所未解也又龍樹於龍宮而出華嚴而願生極樂普賢為華嚴長子而願生極樂文殊與普賢同佐遮那號華嚴三聖而願生極樂咸有明據皎如日星居士將提唱華嚴以風四方而與文殊普賢龍樹違背此又不肖之所未解也況方山列十種淨土極樂雖曰是權而華嚴權實融通理事無礙事事無礙故淫房殺地無非清淨道場而況七寶莊嚴之極樂乎婆須無厭皆是古佛作用而況萬德具足之彌陀乎居士游戲於華嚴無礙門中而礙淨土此又不肖之所未解也不肖與居士同為華藏莫逆良友而居士不察區區之心復欲拉居士為蓮胎骨肉弟兄而望居士之不我外也居士愛我不贊而規今妄有所規亦猶居士之愛我也病筆略申梗槩殊未盡意惟鑒之諒之敝郡斷凡上人索書上謁附致悃素顧承來翰規切究竟殷殷亟也荷荷謝謝來翰云華嚴具無量門求生淨土華嚴無量門中之一門就時之機由此一門而入華嚴非舉一門而廢華嚴又謂華嚴圓極無可駕於其上者並為確論第華嚴是法身佛說一乘妙義迥異諸經而人多與釋迦經一目之故疏此經者賢首爰肇其端方山深契其旨在清涼則擇焉而弗精在溫陵則語焉而未詳至有譔為綸貫者抑末矣溫陵云方山為正清涼為助此見最卓而尊者以為失宜似未知溫陵亦未知方山者諸不了義經論及別行普賢行願品與起信等論皆稱說淨土此豈無因然華嚴經中未甞及之即方山所第十淨土更晰也法華鱗差十六王子內有彌陀未甞定為一尊其贊持經功德旁授安樂實說女人因果首楞嚴二十五聖證圓通文殊無所軒輊但云方便有多門又云順逆皆方便然繼以遲速不同倫則於無軒輊中又未甞無所指歸也者故要極於普門而不推詡夫勢至更加貶剝曰無常曰生滅若夫釋尊祇說大小彌陀不啻足矣胡為乎紛紛然三藏十二部為乎賢首清涼諸師亟標小始終頓圓五教僉以為允而未嘗品及淨土心宗家流尤所蕩掃大鑒之言且未及詮更拈一二如誌公曰智者知心是佛愚人樂往西方如齊己禪師曰惟有徑路修行依舊打之遶但念阿彌陀佛念得不濟事又曰你諸人日夕在徑路中往來因甚麼當面蹉過阿彌陀佛又曰其或準前捨父逃去流落他鄉東撞西磕苦哉阿彌陀佛此之三言或以為苛然豈無謂而彼言之亦必有道矣古德云一切眾生自己迷悟不同迷心外見修行覓佛未悟自性即是小乘又有云直下頓了此心本來是佛無一法可得此是無上道此是真如佛學道人祇怕一念有與道隔矣又有云目前無法意在目前他不是目前法若向佛祖邊學此人未具眼在何不向生死中定當何處更擬佛擬祖替汝生死有智人笑汝在所以達者亟道祇劫辛苦修行不如一念得無生法忍又道一念緣起無生超出三乘權學況毋論三乘一乘要之無我我所今之往生淨土也者我為能生土為所生自他歷然生滅宛然欣厭紛然所未及悉顧從來談蓮乘者必曰華開見佛悟無生蓋必待往生而見彌陀始從觀音若勢至抑或彌陀誨以無生此時方悟豈其上品絕少中下滋多滯在祇劫似為迂遲矧欲修淨土亦須先修有無等四四十六觀門試問所觀者是何軌則能觀者還有幾人所以念佛者如牛毛往生者如麟角何似反而求之自有餘佛在也彼寒山之勖豐干謂往五臺禮文殊不是我同流此在通達佛道者出辭吐氣自別且也一切佛道以金剛般若為入門以佛華嚴為究竟金剛則曰實無少法可得而佛華嚴所稱佛地二愚一則曰微細所知愚一則曰極微細所知愚所以阿難自道不歷僧祇獲法身識者猶且呵之故或曰佛瘡或曰佛魔文殊瞥起佛見未免貶向二鐵圍嗟嗟見河能漂香象智主不受功德道人心無住處蹤跡不可尋故不歷權乘獨秉一乘此則不之所為惓惓者也彼諸佛諸祖為一分執著我識下劣眾生以及小乘弟子惟依一意識計以現在色心等為染淨依者憫其四大既離一靈無歸如失水魚躑躅就斃故不得不將錯淨土而安置之此亦化城之類也傳有之若能悟法性身法性土要歸於無物是真佛土若華嚴性海所現全身如人身中有八萬四千毛孔東藥師西彌陀各各在一毛孔中說法度生人若渙毛孔徹全身未甞不可倘拋撮全身入一毛孔不但海漚倒置而蠅投窗紙其謂之何昨不手疏所云為宜淨土人說淨土為宜華嚴人說華嚴自謂不悖諸佛法門亦是為尊者赤心片片尊者乃欲𢹂我蓮胎則昔人所云若捉物入迷津與夫棄金擔草之謂矣更稽之古人有云若欲究竟此事須向高高山頂立深深海底行若閨閣中軟煖物捨不得有甚麼用處又有云諸經所稱無瞋恨行此之瞋恨非凡情可比恨者恨一切眾生皆有如來智慧福相而不自覺瞋者瞋吾度脫之未至也以故自覺覺他有世間智有出世間智有世出世間上上智舉以語人得無違拒庶幾能利益於人遡昔三教聖人出興於世無不為一大事且觀時節因緣偏者補之弊者救之微者顯之要以心性開示於人已耳以今天下拘儒株守傳註曠士溺意虗玄餘之手木槵而口彌陀者自通道大都迨窮村僻巷居相望而肩相摩也尊者又從而和之非所謂順世情之教波隨而風偃者乎是在不不能無疑而來翰乃稱雖崇淨土實尚華嚴又云由此淨土一門而入華嚴此如古德所云但為弘實而眾生不信須為實施權以淺助深又云用與適時口雖說權內不違實但使含生得權實諸益也者則不誠契之祇領之且羨且慰矣乃會下聽眾自杭過蘇者時時有之罔弗津津九品間與之言稍涉上乘則駭心瞠目或更笑之此其過在弟子耶在師耶大丈夫氣宇沖天而度生為急若出世矣開堂矣敷座矣不具大人作略祇作閭巷老齋公齋婆舉止忽被伶俐人問著或明眼人拶著擬向北斗裏潛身耶抑鐵圍山裏潛身耶不見道若是大鵬金翅鳥奮迅百千由旬躡影神駒馳驟四方八極斷不取次啗亦不隨便埋身且總不依倚佛法大事非同小可願尊者重厝意焉來翰又云彌陀不異遮那是也第化境化儀各各差殊蓋諸佛教義通宗因緣既墮因緣豈無大小定有深淺故謂諸佛為異則千佛一佛不可謂異謂諸佛為同則徧照能仁二尊亦自不同古人以為一切諸法同異重重不可一向全同不可一向全異不可以全同作全異不可以全異作全同迷此同異二門則智不自在如云擬向白雪蘆花處覓則以溫州橘皮作火得乎首山念有云夫為宗師須具擇法眼始得所以古來有拈古頌古又有別古憋古如云至道無難惟嫌揀擇又云至道最難須要揀擇所以華嚴第八地曰寂滅真境現前矣猶云應起無量差別智又云觀察分別諸法門此非作而致其情也我之鑑覺自性本自圓明如大寶鏡胡漢不分而分如如意珠青黃不異而異若是於諸法中不生二解人何甞離却揀擇別求明白者些道理便是揀擇不揀擇所謂善巧分別清淨智非耶方山為論清涼為疏皆綜佛乘共闡圓宗雖論有論體疏有疏體然惟其義不惟其文文或殊而義則一耳如以其義則見地迥別清涼演說諸經真善知識惟於華嚴其句訓而字釋豈無補於舍那其挈領而引維實弗逮夫棗柏清涼棗柏之區別弗明則盧舍那經之旨要終晦所謂信解行證四法裂全經而瓜豆之此其大者自餘更多不謂之擇焉弗精非無以也倘以為未然請更質之於棗柏大士辱惠書纍纍及二千言玄詞妙辨汪濊層叠誠羨之仰之然竊以為愛我深而辭太費也果欲揚禪宗抑淨土不消多語曷不曰三世諸佛被我一口吞盡既一佛不立何人更是彌陀又曷不曰若人識得心大地無寸土既寸土皆無何方更有極樂國只此二語來諭二千言攝無不盡矣茲擬一一酬對則恐犯鬬爭不對則大道所關終不可默敢略陳之來諭謂清涼擇焉而未精愚意不知清涼擇華嚴未精耶抑亦居士擇清涼未精耶又來諭謂不了義經乃談說淨土而以行願品起信論當之起信且止行願以一品而攝八十卷之全經自古及今誰敢議其不了義者居士獨尚華嚴而非行願行願不了義則華嚴亦不了義矣又來諭謂法華記往生淨土為女人因果則龍女成佛亦只是女人因果耶謂彌陀乃十六王子之一則毗盧遮那亦止是二十重華藏之第十三耶居士獨尊毗盧奈何毗盧與彌陀等也又來諭謂楞嚴取觀音遺勢至復貶為無常生滅則憍陳如悟客塵二字可謂達無常契不生滅矣何不入圓通之選誠曰觀音登科勢至下第豈不聞龍門點額之喻為齊東野人之語耶又來諭謂齊己禪師將古人念佛偈逐句著語其曰惟有徑路修行則著云依舊打之遶其曰但念阿彌陀佛則著云念得不濟事居士達禪宗何不知此是宗師家直下為人解粘去縛乃作實法會而死在句下耶果爾古人有言踏毗盧頂上行則不但彌陀不濟事毗盧亦不濟事耶此等語言語錄傳紀中百千萬億老朽四十年前亦曾用以快其唇吻雄其筆劄後知慚愧不敢復然至於今猶赧赧也又齊己謂求西方者捨父逃逝流落他鄉東撞西磕苦哉阿彌陀佛往應之曰即今却是如子憶母還歸本鄉捨東得西樂哉阿彌陀佛且道此語與齊己所說相去多少又來諭謂多劫修行不如一念得無生法忍居士已得無生法忍否如得則不應以我為能生以土為所生何則即心是土誰為能生即土是心誰為所生不見能生所生而往生故終日生而未嘗生也乃所以為真無生也必不許生而後謂之無生是斷滅空也非無生之旨也又來諭謂必待華開見佛方悟無生則為迂遲居士達禪宗豈不知從迷得悟如睡夢覺如蓮華開念佛人有現生見性者是華開頃刻也有生後見性者是華開久遠也機有利鈍功有勤怠故華開有遲速安得槩以為迂遲耶又來諭謂遮那與彌陀不同而喻華藏以全身喻西方以毛孔生西方者如撮全身入毛孔為海漚倒置夫大小之喻則然矣第居士通華嚴宗奈何止許小入大不許大入小且大小相入特華嚴十玄門之一玄耳舉華藏不可說不可說無盡世界而入極樂國一蓮華中尚不盈華之一葉葉之一芥子地則何傷乎全身之入毛孔也又來諭謂荒山僧但問以上乘便駭心瞠目居士向謂宜華嚴者語以華嚴宜淨土者語以淨土今此鈍根輩正宜淨土何為不與應病之藥而強聒之耶又來諭謂老朽既出世開堂不具大人作略而作閭巷老齋公齋婆舉止設被伶俐人問著明眼人拶著向北斗裏潛身耶鐵圍裏潛身耶老朽曾不敢當出世之名自應無有大人之略姑置弗論而以修淨土者鄙之齋公齋婆則古人所謂非鄙愚夫愚婦是鄙文殊普賢馬鳴龍樹也豈獨文殊普賢馬鳴龍樹凡遠祖善導天台永明清涼圭峰圓照真歇黃龍慈受中峰天如等諸菩薩諸善知識悉齋公齋婆耶劉遺民白少傅柳柳州文潞公蘇長公楊無為陳瑩中等諸大君子悉齋公齋婆耶就令齋公齋婆但念佛往生者即得不退轉地亦安可鄙耶且齋公齋婆庸呆下劣而謹守規模者是也愚也若夫聰明才辨妄談般若喫得肉已飽來尋僧說禪者魔也愚貴安愚吾誠自揣矣寧為老齋公老齋婆無為老魔民老魔女也至於所稱伶俐人明眼人者來問著拶著則彼齋公齋婆不須高登北斗遠覓鐵圍只就伶俐漢咽喉處安單明眼者瞳人上敷座何以故且教伊暫閉口頭三昧回光返照故抑居士尚華嚴而力詆淨土老朽業淨土而極贊華嚴居士靜中試一思之是果何為而然乎又來諭謂勸己求生淨土喻如棄金擔麻是顛倒行事大相屈辱也但此喻尚未親切今代作一喻如農人投刺於大富長者之門延之入彼田舍聞者皆笑之農人不知進退更掃徑謀重請焉笑之者曰主人向者不汝責幸矣欲為馮婦乎農人曰吾見諸富室有為富而不仁者有外富而中貧者有未富而先驕者有典庫於富人之門而自以為富者且金谷郿塢於今安在哉而吾以田舍翁享太平之樂故忘己之卑憐而為此今知過矣於是相與大笑散去答吳觀我來書云兢兢以未獲了明此一大事為甚憂此人情所謂不足憂者也即此是入道正因願一心本參而已又浮山冊中諸名公俱稱述觀棋黑白語為上妙玄談此語雖傳誦千古而遠老深深處不在此此等今日聰明人亦能為之即九帶等亦不須穿鑿求會但做遠老安樂工夫耳有如是工夫方有如是證悟古德謂祇愁不成佛不愁佛不解語至哉言也幸留意焉答謝青蓮提話頭是宗門發悟最緊切工夫修淨土人即以一聲佛號做箇話頭此妙法也但心麤氣浮則未能相應須是沈潛反照至於力極勢窮乃有㘞地一聲消息答金廣聚來問曰末後緊關曰甚深之旨曰本地相應曰直捷指斯事緊也深也本也直也皆切問也然只在近思而已除此靈知炯炯外皆緩耳淺耳末耳曲耳誠即此念佛一念所起覰得破管取大事了畢又不可見如是說便作思惟卜度穿鑿求通則反失之矣但念念體究真積力久而自得之方是證悟答張廣經所問雲門語不須究他說教外別傳只看他說須退步向自己脚跟下推尋是箇甚麼其推尋今亦不難既信念佛但內看念佛的是誰便是脚跟下推尋也久之則正訛中所云最後窮玄極微一段事不患不得答廣印真信淨土決志往生者不論已悟未悟其從事單傳直指而未悟者雖曰以參禪為務不妨發願往生以未能不受後有畢竟有生處故不是偷心岐路心也其已悟者古人云汝將謂一悟便可上齊諸佛乎故普賢為華嚴長子雖塵塵華藏在在蓮而行願品必拳拳乎以往生安樂為言也已悟尚然未悟可知矣一念不生是禪非參起念下疑乃名曰參楞嚴經云又以此心反覆研究等是也念時參時俱屬有念亦不相悖即心即佛若真信得及真見得徹千了百當更無疑滯者方可任運過時如其不然未可放參大悟則有念亦可無念亦可所謂入息不居陰界出息不涉眾緣是也永明說先以聞解信入却又說後以無思契同契同則法身透矣情識盡矣是亦解亦證紹祖位不亦宜乎不務實修實證而以口頭三昧逞機鋒鬬勝負此言語不可有也真為生死心地未明互相辨論互相酬唱此言語不可無也三登九上一句千山不論未悟以前即既悟以後尚有最後重關參求決擇之功未可便止答僧海光汝若一切無在何人受衣汝若周遍一切衣居何地汝若一切無在則本自無體安用戒為汝若周徧一切則本自無欠何求具足菩提有樹明鏡有臺本來有物此三句翻破曹溪後一句原不惹塵埃依舊落他窠臼何不道本來有一物任使惹塵埃答周海門諸惡莫作眾善奉行當下布毛滿地何待拈吹那更說同說別直饒是同早已成兩橛去也鳥窠初不曾鈍置白公偏厚侍者然雖如是於前言不會玄旨只麼止惡行善亦不誤人若向古人道如來不斷性惡及兀兀不修善等處錯會為禍不少雜答歸元性無二方便有多門今之執禪謗淨土者却不曾真實參究執淨土謗禪者亦不曾真實念佛若各各做工夫到徹底窮源處則知兩條門路原不差毫釐也若直指西方不但過此娑婆十萬億剎者為非也說箇自性已涉程途若實談淨土不但寶池金地種種莊嚴者為非也纔著惟心翻成垢穢離此二邊作麼生是西方淨土工夫最怕揀擇有志於學者只是一箇正念常在胸中逢靜時也如此逢閙時也如此憑他靜閙變遷而我者箇念頭斷然無有移易如是方無間斷謂之善做工夫也豈不見古人道智者除心愚者除境如必嫌喧取靜則境界恐無有靜之時亦無有靜之處夫求靜者莫如深山之中然深山靜矣而樵斧聞於隔雲牧笛鳴於斜照則耳畔又安能靜也然樵斧牧笛或可使屏絕之使不交於吾耳至於清宵而猿啼虎嘯白晝而鵲噪鴉鳴又安能靜耶然猿啼虎嘯鵲噪鴉鳴或可驅逐之使不交於吾耳至於狂風起而萬竅怒號迅雷發而千山震撼則此時嫌喧取寂者將屏絕之耶驅逐之耶以此推之境界決無有靜之時也決無有靜之處也學人但患志不猛烈耳存一猛烈之志則何之而不可示大同古人教親近明師求善知識而善知識實無口傳心授祕密法門只替人解粘去縛便是秘密今但執持名號一心不亂此八箇字即是解粘去縛祕密法門即是出生死堂堂大路朝念暮念行念坐念念念相續自成三昧莫更他求也示李居士參疑二字不必分解疑即參之別名總是體究追審之意但看念佛是誰以悟為則而已又古德云看話頭不得卜度穿鑿亦不得拋向無事甲裏但只恁麼看此要言也示吳大峻莫管悟與不悟莫管有無內外中間莫管止觀莫管與他法門同與不同既疑情不起亦莫管是誰不是誰但執持名號一心一意無間無斷純一不雜做去示沈廣䢦世諦中覺名利恩愛之畢竟成空便成覰破真體上覓生老病死而本來無有即是修持初機與究竟同歸因該果海究竟與初機不二果徹因源祇貴明心別無異法答周海門月雖皎潔水清濁而影別昏明心本昭靈事善惡而迹分升墜豈得以月體本無清濁而故云濁水為佳心體本無善惡而遂云惡事不礙既存空見便悖圓宗識渠善惡雙空正好止惡行善定禁止惡行善猶是識渠未真步步行有口口談空此今日聰明人參禪之大病也答戒問高談無佛之世直指當人之心則不但老瞿曇絕口毗尼優波離羞稱羯磨即使束五部置之高閣褫三衣懸之樹端未足為過如或不然法林惟恐不稠正見惟恐不應耳何紛紛之足厭空有二契真空則萬法俱備何須更習毗尼墮頑空則眾善皆墮豈不有傷戒品執莽蕩輕軌儀其失大矣總觀心地本體則體惟一念本自圓成細析心地法門則門有萬殊不妨分屬故云三十心者皆一毫頭也復以一二分屬戒相者毛頭之上更出毛頭也譬天王雖名天主亦應列任六曹六曹猶未徧周豈不重開百職經始標某心某心者六曹之謂也今復增某心某心者百職之謂也姑取義之相近亦令餘可例推便初學易知簡行在智者神融意會而已非常大器過量圓人既不拘夏前夏後自相應即小即大纔持戒品已達教相全文正受毗尼便悟禪宗妙旨建立則繁興萬法不礙六時掃蕩則屏絕纖塵奚存一念遠公常禮有定永明自行不虧豈彼小根故為細事凡我後學願各深思此梵網經以心地為宗無一法不從心地中流無一法不還歸心地菩薩萬行若非出自一心還歸一心即不名佛因不名佛果今此華出舍那心地表菩薩從自心中出無量因行還以此華供養彼佛表還以自心因行成自心果佛也據華嚴因該果徹不離因果不落因果拈來無一物不可供佛舉起無一法不可為因若執華必表因非圓教義何以故有時華表因實表果開華後乃結實故有時實表因華表果種核後乃生華故有時定因慧果淨極光通故有時慧因定果惑破心安故烏可一途而取一格而論乎如來妙定非動非靜而常動靜非出非入而常出入此三昧號體性虗空虗對實故使體性不空當如山不納山石不容石一頑定耳體本虗空故華光任現豈以既入三昧便應灰滅不生圓覺經如來入大光明藏三昧而起現淨土與十二大士更相酬答抑又何也且三昧有百千萬億等名不是一味寂靜故有三昧二乘尚不聞其名菩薩猶未解其義而執泥寂靜則獅子奮迅嚬呻皆成喧閙矣又問諸三昧各有出入何獨此中而說出入答出入非難自在為難三乘斂念方入起念方出不名自在隨心自在乃稱妙定也據華嚴即入即出依報正報交互圓融不可思議此特其小小者耳何足為異與劉羅陽居士曩啟專以念佛求生淨土奉動然此道至玄至妙亦復至簡至易以簡易故高明者忽焉夫生死不離一念乃至世出世間萬法皆不離一念今即以此念念佛何等切近真實若覰破此念起處即是自性彌陀即是祖師西來意縱念不悟乘此念力往極樂國且橫截生死不受輪迴終當大悟耳願翁放下萬緣十二時中念念提撕是所至望與馮筠居居士七十古稀百年能幾今此暮景正宜放開懷抱看破世間宛如一場戲劇何有真實但以一聲阿彌陀佛消遣光陰但以西方極樂世界為我家舍我今念佛日後當生西方何幸如之發大歡喜莫生煩惱倘遇不如意事即便撥轉心頭這一聲佛急急提念却回光返照我是阿彌陀佛世界中人柰何與世人一般見識回瞋作喜一心念佛此是智慧中人大安樂大解脫法門也答袁孝廉嬰兒曾不欠少圓明寂照之體但迷而不發耳何止嬰兒凡人自幼而壯自壯而老自老而死無不在迷此圓明寂照之體有而不現非無也至於曹溪水趙州茶且不必以胸臆強解只顧本參以求正悟何謂本參若於念佛法門信得及但參是誰念佛所謂本參也與朱西宗居士人之處世遇順境者其情愉以安遇逆境者其情憂以危然而順未足為幸逆未足為不幸也溺於意之所願則出世之心不生戚戚乎不得志夫然後厭身世之桎梏而求以出世是故萬苦交於前但以正智觀察苦從何生從身生身從何生從業生業從何生從惑生因惑造業因業成身因身受苦但能破惑一切空寂敢問所以破惑之方只須就本參話頭上理會念佛的是誰捉敗此疑諸惑皆破思之毋忽答江廣宥居士承居士來諭朱紫陽終是謗法當有何報余謂各有其報其為儒家賢者自有人天之福然既排佛則聞法為難己事辦方可為人古人大徹大悟參學事畢且於水邊林下長養聖胎不惜口頭生醭龍天推出方乃為人故辭法席者願生生居學地而自鍛鍊予出家時篤奉此語佩之胸襟後以病入山久久不覺漸成叢林然至今不敢目所居為方丈不敢開大口妄論宗乘蓋與眾同修非領眾行道也忝一日之長互相激勸而已諸仁者以友道待我而責善焉幸甚自他二利古云未能自利先能利人者菩薩發心斯言甘露也不善用之則翻成毒藥試反己而思之我是菩薩否況云發心非實己能也獨不聞自覺己圓復行覺他者如來應世乎或謂必待己圓而後利他則利他終無時矣然自疾不能救而能救他人無有是處是故當發菩薩廣大之心而復確守如來真切之訓不然以盲引盲欲自附於菩薩而人己雙失謂之何哉講宗宗門之壞講宗者壞之也或問講以明宗曷言乎壞之也予曰經律論有義路不講則不明宗門無義路講之則反晦將使其參而自得耳故曰任從滄海變終不為君通又曰我若與汝說破汝向後罵我在今講者翻成套子話矣西來意不明正坐此耳妄拈古德機緣一雲棲僧約妄拈古德機緣者出院一僧云此不必禁禁之則斷般若緣彼謗法華者地獄罪畢還以謗故植緣法華況妄拈者非謗乎予曰子言則誠善矣然知其一未知其二謗法華者出地獄而植善緣孰若敬信法華者不入地獄而即植善緣乎又謂妄拈非謗而不思無知臆談皆名謗大般若是故漫述師言者被點檢云先師無此語莫謗先師好彼尊師也非謗也錯答一轉語者墮野狐身彼錯也非謗也何二人皆成罪戾古人一問一答皆從真實了悟中來今人馳騁口頭三昧明眼人前似藥汞之入紅爐妖邪之遇白澤耳若不禁止東豎一拳西下一喝此作一偈彼說一頌如風如狂如戲如謔虗頭熾而實踐亡子以為宗門復興吾以為佛法大壞也妄拈古德機緣二僧不悅曰審如是古德機緣更不可開口一評量乎曰止禁妄拈未甞言不可拈也二僧同起捲簾古德云一得一失子試評量得失誰在僧無語予曰昔人有言十回被師家問九回答不得未為害但恐無知妄談則終無升進耳慎之哉禪宗淨土遲速一僧專修念佛法門一僧以禪自負謂念佛者曰汝念佛必待生西方已見阿彌陀佛然後得悟我參禪者現生便得悟去遲速較然矣汝罷念而參可也僧莫能決舉以問予予曰根有利鈍力有勤惰存乎其人則彼此互為遲速未可是此而非彼也喻如二人同趨寶所一人乘馬一人乘船同日起程而到之遲速未可定也則利鈍勤惰之說也參禪念佛亦復如是語其遲念佛人有累劫蓮花始開參禪人亦有多生勤苦不能見性者矣語其速參禪人有當下了悟不歷僧祇獲法身念佛人亦有現生打徹臨終上上品生者矣古云如人涉遠以到為期不取途中強分難易居山古云大隱居廛小隱居山遂有甘心汩沒於塵俗者不知居廛者混俗和光閙中得靜有道之士則然非初心所宜也或曰永嘉謂未得道而先居山但見其山必忘其道是不許居山也此各有說予讚山居為汩沒於塵者誡也而永嘉所言自是正理出家兒大事未明千里萬里尋師訪道親近知識朝參暮請豈得蒙昧無知作守山鬼乎故知行脚在前居山在後可也則亦不悖乎永嘉之言也為僧宜孝養父母有為僧不孝父母者予深責之或曰出家既已辭親割愛責之則反動其恩愛心矣曰惡是何言也大孝釋迦尊累劫報親恩積因成正覺而梵網云戒雖萬行以孝為宗觀經云孝養父母淨業正因古人有作堂奉母者擔母乞食者未嘗以恩愛累也奈何於親割愛矣而締交施主不絕餽遺畜養弟子過於骨肉是無親而有親出一愛而復入一愛也何顛倒乃爾且已受十方供養飽暖安居而坐視父母之飢寒寥落汝安則為之真友中峰大師警䇿有參禪必待尋師友敢保工夫一世休又曰縱饒達摩與釋迦擬親早已成窠臼此醍醐至妙之言也然不可聞於下士也執此言而自用自專不復知取友之益則翻成毒藥矣取友非難得真友為難飲食財帛相徵逐者惡友也善相勸惡相規者好友也開我以正修行路示我以最上乘法為我燈為我眼為我導師為我醫王者真善知識友也不可一日而遠離者也傳燈傳燈錄所載諸師如六代相承五燈分𦦨諸大尊宿皆天下古今第一流人物所謂始知周孔外別自有英豪者是也豈易言哉而今人或得一知半見或得些少輕安便自以為大徹大悟而無眼長老又或以東瓜印子印之一盲眾盲非徒無益而有害可勝悼歟續原教論國初翰林待詔沈士榮居士作續原教論其詳品名儒學佛一篇備舉唐宋諸君子如白香山蘇內翰至裴丞相楊大年等諸公禪學淺深最為精覈其言曰即裴楊諸公不云無悟入而保養受持則未可知也豈有身居名利之場又非果位菩薩而能無細惑流注者哉游戲法門者固不必論矣我輩身為出家兒者試靜思之護法人知佛法外護付與王臣而未知僧之當其護者不可以不慎也護法有三一曰興崇梵剎二曰流通大教三曰獎掖緇流曷言乎慎也護剎者梵剎果爾原屬寺產豪強占焉奪而復之理也有如考諸圖籍則疑似不明傳之遠久則張王互易以勢取之可乎喜捨名為吉祥地力不敵而與者謂之冤業藪若僧惟勸化有力大人以復舊剎為大功德主而不思佛固等視眾生如羅睺羅殃民建剎即廣踰千頃高凌九霄旃檀為林珠玉為飾佛所悲憐而不喜者也有過無功不可不慎一也護教者其所著述果爾遠合佛心近得經旨贊歎而傳揚之理也有如外道迂談胸臆偏見過為稱譽可乎若僧惟乞諸名公作序作跋而不思疑誤後學有過無功不可不慎二也護僧者其僧果爾真參實悟具大知見者尊而禮之實心實行操持敦確者信而近之理也有如虗頭禪客下劣庸流亦尊之信之可乎若僧惟親附貴門糞其覆庇而緜纊錦繡以裹癰疽祇益其毒有過無功不可不慎三也是則王臣護法而僧壞法也悲夫頌古拈古一或問古人皆有頌古拈古子獨無何也答曰不敢也古人大徹大悟之後吐半偈發片言皆從真實心地大光明藏中自然流出不假思惟不煩造作今人能如是乎國初尊宿言公案有二等如狗子佛性萬法歸一之類是一等又有最後極則誵訛謂之腦後一槌極為難透予於前狗子萬法尚未能無疑何況最後故不敢恣其臆見妄為拈頌也頌古拈古二或曰子其謙乎蓋能而示之以不能乎曰非謙也是真語實語也楞伽示宗說二通而教多顯義宗多密義故又云無義味語予於教之深玄者猶未能盡通也而況於宗門中語乎復次宗門問答機緣雖云無義味語然有猶存少分義路可思議者有絕無義路似無孔鐵槌不可鑽刺者有似太虗空不可捉摸者有似鐵蒺藜不可咬嚼者有似大火聚不可近傍者有似赫日輪不可著眼者有似砒霜鴆羽不可沾唇者安得妄議略舉古人一二世尊拈花迦葉破顏微笑我今已能冥會佛心如迦葉否客誦金剛六祖即時契悟我今已能頓了深經如六祖否臨濟見大愚而曰黃檗佛法無多子我今已能實見得無多子否趙州八十行脚曰祇為心頭未悄然我今已能心頭悄然否香巖擊竹有聲而曰一擊忘所知我今已能忘所知否靈雲見桃花而曰直至如今更不疑我今已能的的到不疑之地否高峰被雪巖問正睡著無夢時主人不能答我今已能答斯問否又三年而於枕子落地處大悟我今已能有此大悟否如此類者不可勝舉倘有一未明其餘皆未必明如兜率悅公之謂張無盡是也非惟古人即今人所作亦不敢輕評其是非而漫為之貶駁也何也人坐於堂上方能辨堂下人曲直又未曾繫籍聖賢故也嗟乎錯答一轉語墮野狐身百劫笑明眼人答話倒屙三十年覆轍昭然可弗慎諸出家利益古德云最勝兒出家好俗有恒言曰一子出家九族生天此皆贊歎出家而未明言出家之所以為利益也豈曰不耕不織而有自然衣食之為利益乎豈曰不買宅不賃房而有自然安居之為利益乎豈曰王臣護法信施恭敬上不役於官下不擾於民而有自然清閒逸樂之為利益乎古有偈曰施主一粒米大似須彌山若然不了道披毛戴角還又曰他日閻老子與你打算飯錢看你將何抵對此則出家乃大患所伏而況利益乎哉所謂出家之利益者以其破煩惱斷無明得無生忍出生死苦是則天上人間之最勝而父母宗族被其澤也不然則雖富積千箱貴師七帝何利益之有吾實大憂大懼而併以告夫同業者三難淨土一人問釋迦如來以足指按地即成金色世界佛具足如是神力何不即變此娑婆土石諸山穢惡充滿之處便成七寶莊嚴之極樂國乃必令眾生驅馳於十萬億佛土之迢迢也噫佛不能度無緣子知之乎淨緣感淨土眾生心不淨雖有淨土何由得生喻如十善生天即變地獄為天堂而彼十惡眾生如來垂金色臂牽之彼終不能一登其閾也是故剎那金色世界佛攝神力而依然娑婆矣又一人問經言至心念阿彌陀佛一聲滅八十億劫生死重罪斯言論事乎論理乎噫經云一稱南無佛皆已成佛道又云禮佛一拜從其足跟至金剛際一塵一轉輪王位今正不必論其事之與理但於至心二字上著倒惟患心之不至勿患罪之不滅事如是理亦如是理如是事亦如是何足疑也又一人問有人一生精勤念佛臨終一念退悔遂不得生有人一生積惡臨終發心念佛遂得往生則善者何為反受虧而惡者何為反得利也噫積惡而臨終正念者千萬人中之一人耳苟非宿世善根臨終痛苦逼迫昏迷瞀亂何由而能發起正念乎善人臨終退悔亦千萬人中之一人耳即有之必其一生念佛悠悠之徒非所謂精勤者精則心無雜亂勤則心無間歇何由而生退悔乎是則為惡者急宜修省毋妄想臨終有此僥倖真心求淨土者但益自精勤勿憂臨終之退悔也世夢古云處世若大夢經云却來觀世間猶如夢中事云若云如者不得已而喻言之也究極而言則真夢也非喻也人生自少而壯自壯而老自老而死俄而入一胞胎也俄而出一胞胎也俄而又入又出之無窮已也而生不知來死不知去蒙蒙然冥冥然千生萬劫而不自知也俄而沈地獄俄而為鬼為畜為人為天升而沈沈而升惶惶然忙忙然千生萬劫而不自知也非真夢乎古詩云枕上片時春夢中行盡江南數千里今被利名牽往返於萬里者豈必枕上為然也故知莊生夢蝴蝶其未夢蝴蝶時亦夢也夫子夢周公其未夢周公時亦夢也曠大劫來無一時一刻而不在夢中也破盡無明朗然大覺曰天上天下惟吾獨尊夫是之謂夢醒漢一轉語先德開示學人謂我今亦不論你禪定智慧神通辨才只要你下一轉語諦當學人聞此便晝夜學轉語錯了也既一轉語如是尊貴如是奇特則知定不是情識卜度見解依通所可襲取蓋從真實大徹大悟中自然流出者也如其向經教中向古人問答機緣中以聰明小智摸倣穿鑿取辨於口非不語句尖新其實隔靴抓癢直饒一剎那下恒河沙數轉語與自己有何交涉今莫管轉語諦當不諦當且拋向不可說不可說世界之外只牢守本參密密用心時時不捨但得悟徹時豈愁無語吾雖鈍根不敢不勉本身盧舍那僧問古德如何是本身盧舍那答云與我過拂子來俄而曰置舊處僧理前問曰古佛過去久矣又云未了之人聽一言只這如今誰動口後人由此以舉手動足開口作聲便為真佛是則是是而實不是所謂認賊為子者也遂將柏樹子麻三觔翠竹黃花鳥啣猨抱等一槩認去豈不誤哉俱胝遇問即豎一指魯祖見僧回身面壁昔人道我若看見抝折指頭予亦云待渠回身攔胸踏倒宗門語不可亂擬古人大悟之後橫說豎說正說反說顯說密說一一契佛心印皆真語實語非莊生寓言比也今人心未妙悟而資性聰利辭辨捷給者窺看諸語錄中問答機緣便能摸倣只貴顛倒異常可喜可愕以眩俗目如當午三更夜半日出山頭起浪海底生塵種種無義味語信口亂發諸無識者莫能校勘同聲讚揚彼人久假不歸亦謂真得甚至一棒打殺與狗子喫者裏有祖師麼喚來與我洗脚此等處亦復無忌憚往往效嚬吁妄談般若罪在不原可畏哉看語錄須求古人用心處凡看古人語錄文字不可專就一問一答一拈一頌機鋒峻利語妙言奇處以爽我心目資我談柄須窮究他因何到此大徹大悟田地其中自敘下手工夫刻苦用心處遵而行之所謂何不依他樣子修也若但剽竊摸擬直饒日久歲深口滑舌便儼然與古人亂真亦只是剪綵之花畫紙之餅成得甚麼邊事古玩入吾手今人於一彝一罌一書一畫其遠在上古者出自名家者平生歆慕而不能致者一旦得之則大喜過望忻然慰曰此某某所遞互珍藏者今幸入吾手矣曾不思曠劫以來無酬價之至寶何時入吾手況世玩在外求未必獲至寶在我求則得之亦弗思而已矣喜怒哀樂未發予初入道憶子思以喜怒哀樂未發為中意此中即空劫以前自己也既而參諸楞嚴則云縱滅一切見聞覺知內守幽閒猶為法塵分別影事夫見聞泯覺知絕似喜怒哀樂未發而曰法塵分別者何也意根也法塵也根與塵對順境感而喜與樂發逆境感而怒與哀發是意根分別法塵也未發則塵未交於外根未起於內寂然悄然應是本體不知向緣動境今緣靜境向緣法塵之麤分別也今亦法塵之細分別也皆影事也非真實也謂之幽閒特幽勝顯閒勝閙耳空劫以前自己尚隔遠在此處更當諦審精察研之又研窮之又窮不可草草急參急悟放牛居士古杭人余氏子參無門老人得悟於宋湻祐中其言曰大聰明人纔聞此事便以心意識領解所以認影為真到臘月三十日眼光欲落時向閻老子道待我澄心攝念却與你去斷不可也須是急參急悟放牛此語可謂喫緊為人若真實徹悟者平日踏得牢牢固固穩穩當當不動干戈可以八面受敵無常到來安閒自如不荒不忙不怖不亂何更待澄心攝念勉強支吾耶所謂急參急悟吾輩當力圖之厭喧求靜有習靜者獨居一室稍有人聲便以為礙夫人聲可禁也鴉鵲噪於庭則如之何鴉鵲可驅也虎豹嘯於林則如之何虎豹猶可使獵人捕之也風嚮水流雷轟雨驟則如之何故曰愚人除境不除心智者除心不除境欲除境而境卒不可除則道終不可學矣或曰世尊不知五百車聲蓋禪定中事非凡夫所能然則高鳳讀書不知驟雨漂麥當是時鳳所入何定不咎志之不堅而嫌境之不寂亦謬矣哉除日古人以除日當死日蓋一歲盡處猶一生盡處故黃檗垂示云預先若打不徹臘月三十日到來管取你熱閙然則正月初一便理會除日事不為早初生墮地時便理會死日事不為早那堪荏荏苒苒悠悠揚揚不覺少而壯壯而老老而死況更有不及壯且老者豈不重可哀哉今晚歲除應當惕然自誓自要不可明年依舊蹉跎去也雖然此打徹二字不可容易看過不是通幾本經論當得徹也不是坐幾炷香不動不搖當得徹也不是解幾則古德問答機緣作幾句頌古拈古當得徹也不是酬對幾句口頭三昧滑溜當得徹也古人謂於此事洞然如桶底驟脫爽然如大夢得醒更無纖毫疑處然後可耳嗟乎敢不努力念佛不礙參禪古謂參禪不礙念佛念佛不礙參禪又云不許互相兼帶然亦有禪兼淨土者如圓照本真歇了永明壽黃龍新慈受深等諸師皆禪門大宗匠而留心淨土不礙其禪故知參禪人雖念念究自本心而不妨發願願命終時往生極樂所以者何參禪雖得箇悟處倘未能如諸佛住常寂光又未能如阿羅漢不受後有則盡此報身必有生處與其生人世而親近明師孰若生蓮花而親近彌陀之為勝乎然則念佛不惟不礙參禪實有益於參禪也心得以耳聽受而得者不如以目看讀而得之者廣也以目看讀而得者不如以心悟明而得之者極其廣也以心為君以目為臣以耳為佐使可也用目當心斯下矣用耳當目又下之下矣世智當悟智有二有世間智有出世間智世智有二一者博學宏辭長技遠略但以多智多解而勝乎人者是也二者明善惡別邪正行其所當行而止其所當止者是也僅得其初是謂狂智當墮三塗兼得其後是謂正智報在人天何以故德勝才謂之君子才勝德謂之小人也出世間智亦二一者善能分別如來正法四諦六度等依而奉行者是也二者破無明惑如實了了見自本心者是也僅得其初是出世間智也名為漸入兼得其後是出世間上上智也乃名頓超何以故但得本莫愁末得末者未必得本也今有乍得世智初分便謂大徹大悟者何謬昧之甚靜之益日間有事或處分不定睡去四五更起坐是非可否忽自了然日間錯處於此悉現乃知爾來不得明見心性皆由忙亂覆却本體耳古人云靜見真如性又云性水澄清心珠自現豈虗語哉佛經不可不讀予少時見前賢闢佛主先入之言作矮人之視罔覺也偶於戒壇經肆請數卷經讀之始大驚曰不讀如是書幾虗度一生矣今人乃有自少而壯而老而死不一過目者可謂面寶山而不入者也又一類雖讀之不過採其辭致以資談柄助筆勢自少而壯而老而死不一究其理者可謂入寶山而不取者也又一類雖討論講演亦不過訓字詁文爭新競高自少而壯而老而死不一真修而實踐者可謂取其寶把玩之賞鑑之懷之袖之而復棄之者也雖然一染識田終成道種是故佛經不可不讀泰首座或謂泰首座刻香坐脫九峰不許以不會石霜休去歇去寒灰枯木去等語也而紙衣道者能去能來將無會石霜意而洞山亦不許者何也愚謂紙衣若果已出息不涉眾緣入息不居陰界則去住自由當與洞山作愚癡齋把手共行泰何可及如或不然未免是弄精魂漢古人所謂鬼神活計者是也而泰公却有真實定方特其耽著靜境不解轉身一句二者病則均也然紙衣虗心就洞山理會而泰公奮然長往自失大利滿招損謙受益學禪者宜知之心之精神是謂聖孔叢子云心之精神是謂聖楊慈湖平生學問以是為宗其於良知何似得無合佛說之真知歟曰精神更淺於良知均之水上波耳惡得為真知乎哉且精神二字分言之則各有旨合而成文則精魂神識之謂也昔人有言無量劫來生死本癡人認作本來人者是也僧習末法僧有習書習詩習尺牘語而是三者皆士大夫所有事士大夫捨之不習而習禪僧反習其所捨而於己分上一大事因緣置之度外何顛倒乃爾宗門問答古尊宿家相見其問答機緣或無義無味或可驚可疑或如罵如謔而皆自真參實悟中來莫不水乳投函葢合無一字一句浪施也後人無知效嚬則口業不小譬之二同邑人千里久別忽然邂逅相對作鄉語隱語諺語傍人聽之亦復無義無味可驚可疑如罵如謔而實字字句句皆衷曲之談肝膈之要也傍人固不知是何等語而二人默契如水乳如函葢矣今不如緘口結舌但向本參上著力祇愁不悟不愁悟後無語聞謗經言人之謗我也出初一字時後字未生出後一字時初字已滅是乃風氣鼓動全無真實若因此發瞋則鵲噪鴉鳴皆應發瞋矣其說甚妙而或謂設彼作為謗詩則一覽之下字字具足又永存不滅將何法以破之獨不思白者是紙黑者是墨何者是謗況一字一字皆篇韻凑合而成然則置一部篇韻在案是百千萬億謗書無一時不現前也何惑之甚也雖然此猶是對治法門若知我空誰受謗者菩薩不現今時竊怪今時造業者多信道者寡菩薩既度生無已何不分身示現化誘羣迷且昔佛法東流自漢魏以迄宋元善知識出世若鱗次然元季國初猶見一二近何寥寥無聞如地藏願度盡眾生觀音稱無剎不現豈其忍遺未度之生亦有不現之剎耶久而思之乃知菩薩隨願度生眾生無緣則不能度喻如月在天上本無絕水之心水自不清月則不現況今末法漸深心垢彌甚菩薩固時時度生而生無受度之地是則臨濁水而求明月奚可得乎曹溪不斷思想有誦六祖偈云惠能沒伎倆不斷百思想對境心數生菩提作麼長揚揚自謂得旨便擬縱心任身一切無礙坐中一居士斥之曰大師此偈藥臥龍能斷思想之病也爾未有是病妄服是藥是藥反成病善哉言乎今更為一喻曹溪之不斷百思想明鏡之不斷萬像也今人之不斷百思想素縑之不斷五采也曹溪之對境心數起空谷之遇呼而聲起也今人之對境心數起枯木之遇火而煙起也不揣己而自附於先聖者試閒處一思之根原枝葉末法人業經論其所尚多在名繁相劇而難為記持者義幽理晦而難為剖析者文隱句澀而難為銷會者以是騁辨博誇新奇而衲僧脚跟下一大事因緣置之罔聞又寧知彼名相義理文句皆從此中流出是則攻枝葉而昧根原永嘉所以浩歎也故曰但得本不愁末祇恐時人於此信不及放不下耳種種法門譬如王師討伐臨陣格鬬以殺賊為全勝而殺賊者或劍或槊或槌或戟乃至矢石種種隨用唯貴精於一技而已以例學人則無明惑障如彼賊人種種法門如劍槊等破滅惑障如獲全勝是知無論殺具但取殺賊賊既殺已大事斯畢所云殺具皆過河筏耳不務其大而沾沾焉謂劍能殺人槊不能殺豈理也哉參禪者譏念佛為著相勵行者呵修定為落空亦猶是也故經云歸元無二道方便有多門先德云如人涉遠以到為期不取途中強分難易生死根本黃魯直曰深求禪悅照破生死之根則憂畏淫怒無處著脚但枯其根枝葉自瘁此至論也但未明言孰為生死根者又禪悅下要緊在照破字若得禪悅便謂至足則內守幽閒正生死根耳須是窮參力究了了見自本性則生死無處著脚生死無處著脚憂畏淫怒何由而生智慧增一阿含經佛言戒律成就是世俗常數三昧成就亦世俗常數神足飛行成就亦世俗常數唯智慧成就為第一義則知戒定等三學布施等六波羅蜜唯智慧最重不可輕也唯智慧最先不可後也唯智慧貫徹一切法門不可等也經云因戒生定因定發慧蓋語其生發之次第然而要當知所重知所先知所貫徹始得雖然此智慧者又非聰明辨才之謂也如前世智當悟中說行脚住山今人見玄沙不越嶺保福不度關即便端拱安居眼空四海及見雪峰三登投子九上洞山趙州八旬行脚即便奔南走北浪蕩一生斯二者皆非也心地未明正應千里萬里親附知識何得守愚空坐我慢自高既為生死參師訪道又何得觀山觀水徒誇履歷之廣而已哉正因行脚之士自不如此山色近觀山色蒼然其青焉如藍也遠觀山色鬱然其翠焉如藍之成靛也山之色果變乎山色如故而目力有長短也自近而漸遠焉青易為翠自遠而漸近焉翠易為青是則青以緣會而青翠以緣會而翠非唯翠之為幻而青亦幻也蓋萬法皆如是矣惺寂止觀之貴均等尚矣聖人復起不能易矣或有稍緩急於其間者曰經言因定發慧則止為要以是相沿成習修行之人多主寂靜唯永嘉既為惺惺寂寂寂寂惺惺之說以明均等而後文曰惺惺為正寂寂為助則迥然獨得之見從古至今無道及者自後宗門教人看話以期徹悟而妙喜呵默照為邪禪正此意也是故佛稱大覺眾生稱不覺覺者惺也永嘉之旨微乎真道人難凡人造業者百而為善者一二為善者百而向道者一二向道者百而堅久者一二堅久者百而堅之又堅久之又久直至菩提心不退轉者一二如是最後名真道人難乎哉楞嚴天如集楞嚴會解或曰此天如之楞嚴非釋迦之楞嚴也予謂此語雖是而新學執此遂欲盡廢古人註疏則非也即盡廢註疏單存白文獨不曰此釋迦之楞嚴非自己之楞嚴乎則經可廢也何況註䟽又不曰自己之楞嚴徧一切處乎則諸子百家乃至樵歌牧唱皆不可廢也何況註疏悟後溈山和尚云如今初心雖從緣得一念頓悟自理尤有無始曠劫習氣未能頓淨須教渠淨除現業流識即是修也不道別有法教渠修行趨向溈山此語非徹法源底者不能道今稍有省覺便謂一生參學事畢者獨何歟去障修行去障亦有五等喻如一人之身五重纏裹最外鐵甲次以皮裘次以布袍次以羅衫又次貼肉極以輕綃次第解之輕綃俱去方是本體赤歷自身也行人外去粗障去之又去直至根本無明極微細障皆悉去盡方是本體清淨法身也禪佛相爭二僧遇諸途一參禪一念佛參禪者謂本來無佛無可念者佛之一字吾不喜聞念佛者謂西方有佛號阿彌陀憶佛念佛必定見佛執有執無爭論不已有少年過而聽焉曰兩君所言皆徐六擔板耳二僧叱曰爾俗士也安知佛法少年曰吾誠俗士然以俗士為喻而知佛法也吾梨園子也於戲場中或為君或為臣或為男或為女或為善人或為惡人而求其所謂君臣男女善惡者以為有則實無以為無則實有蓋有是即無而有無是即有而無有無俱非真而我則湛然常住也知我常住何以爭為二僧無對談宗予未出家時乍閱宗門語便以情識摸擬與一座主書左縱右橫座主憚焉出家數年後重會座主於一宿菴勞問間見予專志淨土語不及宗矍然曰子向日見地超卓今反卑近何也予笑曰諺有之初生牛犢不畏虎識法者懼君知之乎座主不答名利榮名厚利世所同競而昔賢謂求之既不可得却之亦不可免此却之不可免一語最極玄妙處世者當深信熟玩蓋求不可得人或知之却不可免誰知之者如知其不可免也何以求為又求之未得不勝其慍及其得之不勝其喜如知其不可免也何以喜為又己得則喜他人得之則忌如知其不可免也何以忌為庶幾達宿緣之自致了萬劫之如空而成敗利鈍興味蕭然矣故知此語玄妙神通神通大約有三一報得一修得一證得報得者福業自致如諸天皆能徹視徹聽及鬼亦有通是也修得者習學而成如提婆達多學神通於阿難尊者是也證得者專心學道無心學通道具而通自具但遲速不同耳如古今諸祖諸善知識是也較而論之得道不患無通得通未必有道先德有言神通妙用不如闍黎佛法還須老僧意有在矣試為喻之世間官人所有爵祿冠服府署儀衛等若神通然而亦有三種其報得者如功勳蔭襲自然而有者也其修得者人力夤緣古人所惡不由其道者是也其證得者道明德立而位自隨之仲尼云學也祿在其中矣是也是三者勝劣可知也大豪貴人世間大豪貴人多從修行中來然有三等其一持戒修福而般若正智念念不忘則來生雖處高位五欲具足而心則時時在道真所謂有髮僧也其二持戒修福而般若之念稍疏則來生遊戲法門而已其三持戒修福而於般若邈不繫念則來生為順境所迷背善從惡甚而謗佛毀法滅僧者有矣鞠其因地則均之修行人耳而差別如是來生更來生其差別又何如也寒心哉世界憶昔童子時戲與諸童子相問難謂天地盡處當作何狀將空然皆太虗歟則此空者又何所止將結實如垣壁歟則此實者又何所止諸童子無以應笑而罷而予則隱隱礙於胸中也彼山海經所謂東西相去二億里南北相去一億五萬里祇據一方誠管窺而已後閱內典至虗空不可盡世界不可盡意始大豁以為非佛不能道嗟乎此未易言也心不在內楞嚴徵心謂心不在內者指真心也若妄想心則亦可云在內此意微妙未易與不知者道世書曰心藏神神即妄想別名其所稱心則肉團之謂耳有義學輩聞予言搖首不信今請以事明之人熟寐戲以物壓其心則魘或自手誤掩其心亦魘又戲畫睡人面有至魘死者此在內之明徵也義學曰如是則真妄成二物矣曰子徒知真妄不二不知真妄一而常二二而常一也不觀水與冰乎水冰不二孰不知之而水既成冰水流動而無定方冰凝實而有常所真無方妄有所亦猶是也從真起妄妄外無真由水結冰冰外無水故其體常一而用常二也義學曰此子臆見終違楞嚴有據則可曰有據據在楞嚴諸君自不察耳經云一迷為心決定惑為色身之內雖在色身之內不妨體徧十方正徧十方之時不妨現在身內此意妄想破盡者方能證之吾與子尚在妄想中葛藤且止出谷喻詩咏鳥謂出自幽谷遷於喬木蓋別是非慎取舍之論昔德山作青龍鈔初以為三祇鍊修乃得成佛而南方魔子謂一悟了畢吾當往滅其種以報佛恩當是時是一片真實好心耿耿於懷特不自知其所見之謬耳及夫受指教於婆子親見龍潭而積歲所寶所重棄之如腐草故能終成大器震耀末法也向使封滯臆見我慢自賢喻如窶人珍祕燕石反謗賈胡謂嫉己寶雖有百婆子千龍潭其將若之何丸餅誑兒憶在家時一兒晚索湯餅時市門已掩家人無以應丸米粉與之啼不顧其母恚甚予曰易事耳取米丸匾之兒入手啞然而笑時謂兒易誑若此因知今人輕淨土重禪宗者似焉語以丸湯餅之淨土則啼易以匾米丸之禪宗則笑此真與兒童之見何異嗟夫好名人知好利之害而不知好名之為害尤甚所以不知者利之害麤而易見名之害細而難知也故稍知自好者便能輕利至於名非大賢大智不能免也思立名則故為詭異之行思保名則曲為遮掩之計終身役役於名之不暇而暇治身心乎昔一老宿言舉世無有不好名者因發長歎坐中一人作而曰誠如尊諭不好名者惟公一人而已老宿欣然大悅解不知己為所賣矣名關之難破如是哉看忙世有家業已辦者於歲盡之日安坐而觀貧人之役役於衣食也名曰看忙世有科名已辦者於大比之日安坐而觀士人之役役於進取也亦名曰看忙獨不曰世有惑破智成所作已辦者安坐而觀六道眾生之役役於輪迴生死也非所謂看忙乎吁舉世在忙中誰為看忙者古人云老僧自有安閒法此安閒法可易言哉雖然世人以閒看忙有矜己心無憐彼心菩薩看忙起大慈悲心普覺羣迷冀彼同得解脫則二心迥異所以為凡聖小大之別無義味語宗門答話有所謂無義味語者不可以道理會不可以思惟通故也後人以思惟心強說道理則愈說愈遠豈惟謬說直饒說得極是亦只如鸚鵡學人語而已圓悟老人曰汝但情識意解一切妄想都盡自然於這裏會去此先德已驗之方斷非虗語吾輩所當深信而力行者也得悟人正宜往生淨土或問某甲向修淨土有禪者曰但悟自佛即己何必外求他佛而願往生此意如何予謂此實最上開示但執之亦能有誤請以喻明假使有人穎悟同於顏子而百里千里之外有聖如夫子者倡道於其間七十子三千賢相與周旋焉汝聞其名往而見之未必不更有長處而自恃穎悟拒不覲謁可乎雖然得悟不願往生敢保老兄未悟在何者天如有言汝但未悟若悟則汝淨土之生萬牛不能挽矣深矣哉言乎親師古人心地未通不遠千里求師訪道既得真師於是抝折柱杖高掛鉢囊久久親近太上則阿難一生侍佛嗣後歷代諸賢其久參知識者未易悉舉只如慈明老人下二尊宿一則楊岐輔佐終世一則清素執侍一十三年是以晨咨暮炙浹耳洽心終得其道以成大器而予出家時晚又色力羸弱氣不助志先師為度出家便相別去方外行脚所到之處或阻機會或罹病緣皆乍住而已遂至今日白首無知抱愚守拙嗟乎予不能於杏壇泗水濟濟多士中作將命童子而乃於三家村裏充教讀師可勝歎哉千僧無一衲子龍興靖公受知於雪峰大師峰記靖云汝他日住持座下千僧無一衲子後靖應錢王之請住持龍興果眾千餘皆三藏誦習之徒而已一如峰記昔馬大師得人之多其成大器者至八十八人靖去馬師年不甚遠而衲子之難得乃千中罕見其一況今時乎人間無十善則天類衰僧中無衲子則佛種斷近且不知衲子之謂何也法道伶仃如綫欲絕悲夫生日世人生日設宴會張音樂繪圖畫競辭賦以之為樂唐文皇獨不為可謂超越常情矣或曰是日也不為樂而誦經禮懺修諸福事則何如曰誠善矣欲報父母劬勞生育之恩及滅己躬平生所作之業於此宜盡心焉然末也非本也先德有言父母未生前誰是汝本來面目是日也有能不為樂而正念觀察未生前之面目者乎若於此廓爾洞明則不但報此身之父母而累劫之親恩無不報不但滅現生之業而多生之夙障罔弗滅矣罷人世之樂得涅槃之樂孝矣哉若人乎偉矣哉若人乎年少閉關閉關之說古未有也後世乃有之所以養道非所以造道也且夫已發菩提大心者猶尚航海梯山冒風霜於百郡不契隨他一語者方且挑包頂笠踏雲水於千山八旬行脚老更驅馳九上三登不厭勤苦爾何人斯安坐一室人來參我我弗求人耶昔高峰坐死關於張公洞依岩架屋懸處虗空如鳥在巢人罕覯之者然大悟以後事耳如其圖安逸而緘封自便則斷乎不可僧畜僮僕僧有畜僮僕供使令者夫出家人有弟子可服役奚以僮僕為或曰弟子為求道而來非執役人也噫夫子之適國也一則曰冉有僕一則曰樊遲御淵明之赴友人召也一門生二子舁其籃輿後世圖而繪之以為高致今出家為僧乃寵愛其弟子如富貴家兒而另以錢買僮僕供㸑負薪張傘執刺末法之弊一至是乎時光不可空過世人耽著處不捨晝夜曰晝短苦夜長何不秉燭遊耽賞玩也百年三萬六千日一日須傾三百杯耽𮓒也野客吟殘半夜燈耽詩賦也長夏惟消一局棋耽博奕也古有明訓曰是日已過命亦隨減當勤精進如救頭然今出家兒耽𮓒者固少而前後三事或未免焉將好光陰驀然空過豈不大可惜哉一蹉百蹉古云今生若不修一蹉是百蹉一之至百何蹉之多直至於是經言離惡道得人身難得人生逢佛法難然而逢念佛法門信受為尤難也如經所言蟻子自七佛以來未脫蟻身安知何日得人身又何日逢佛法又何日逢念佛法門而信受也何止百蹉蓋千蹉萬蹉而無窮也傷哉修福古有偈修慧不修福羅漢應供薄修福不修慧象身掛瓔珞有專執前之二句者終日營營惟勤募化曰吾造佛也吾建殿也吾齋僧也此雖悉是萬行之門而有二說一則因果不可不分明二則己事不可不先辦或曰果如子言則佛像湮沒誰其整之塔寺崩頺誰其立之僧餓於道路而不得食誰其濟之人人惟辦己事而三寶荒蕪矣曰不然但患一體三寶荒蕪耳世間三寶自佛法入中國以來造佛建殿齋僧者時時不休處處相望何煩子之私憂而過計也吾獨慨夫僧之營事者其瞞因昧果不懼罪福剋減常住藏匿信施者無論矣即守分僧而未諳律學但知我不私用入已則已遂乃移東就西將甲補乙或那還急債或餽送俗家不知磚錢買瓦僧糧作堂枉受辛勤翻成惡報是則天堂未就地獄先成所謂無功而有禍者也中峰大師訓眾曰一心為本萬行可以次之則所謂己事先辦者也己事辦而作福事則所作自然當可矣至哉言乎為僧者當銘之肺腑可也大鑑大通大鑑能禪師世稱南宗大通秀禪師世稱北宗然黃梅衣鉢不付時時勤拂拭之大通而獨付本來無一物之大鑑何宗鏡錄謂大鑑止具一隻眼大通則雙眼圓明信如是何以不得衣鉢夫曹溪親接黃梅遠承達摩又遠之承迦葉又遠之承釋迦乃永明傳道於天台韶國師而為此說者何也抑隨時救弊之說也昔人言晉宋以來競以禪觀相高而不復知直指人心見性成佛之旨故初祖西來至永明時又或以為一悟即了故宗鏡及萬善同歸等書力贊修持則似乎南宗專於頓悟而北宗頓悟漸修智行雙備故有隻眼雙眼之喻萬松老人獨奮筆曰此一隻眼是之謂盡大地是沙門一隻眼也是之謂把定乾坤眼也是之謂頂門金剛眼也倘新學輩諸淺見者執宗鏡所云作實法會則大鑑止是空諦而大通方始是中道第一義諦可乎或曰曹溪六代傳衣舉世靡不知之而當是時何為惟見兩京法主二帝門師北宗大著於天下而不及曹溪者又何也曰曹溪既承印記祕其衣鉢為獵人守網潛光匿彩至於一十八年大通之道盛行曹溪之名未顯也迨風旛之對而後道播萬世矣曹溪潛龍深淵不自炫耀大通見龍在田不自滿盈其言曰彼親傳吾師衣鉢者也蓋善知識之相與以有成也如是詩偈勸修四料簡作福不念佛福盡還沈淪念佛不作福入道多苦辛無福不念佛地獄鬼畜羣念佛兼作福後證兩足尊示廣位病從身生身從業生不造諸業禍消福增娑婆念佛極樂標名一心不亂上品位登因性靈示眾聾啞癡僧名曰性靈世間好惡何足評論是非長短何必強分以此不說即杜禍門以此勿聽即塞謗門以此不疑成就信門人能學我萬禍無侵再或精進聖道可成僧大文求偈字無外號含空萬象之中唯空為大空在我心眇如一芥大哉心乎誰與對待無對待故是以無外示大琸有生必有死長短安足論今得圓僧相平生願已滿當生大歡喜切勿懷憂惱萬緣俱放下但一心念佛注想極樂國上品蓮花生見佛悟無生還來度一切新春日示眾今日賀新春歲時重換却昨日作麼生十二月廿八宿地藏院濟寧城地藏院隱隱猶聞發弘願巧禪和空鉢還家癡道人賣衣買麵喫麵人休亂嚥照管胸中石頭片還俗僧復祝髮入靈隱數年佛殿蔓延一瞬魔宮震肅即非新起規模原是本來面目答台州王敬所侍郎問夜來牀頭老鼠唧唧說盡一部華嚴經師云猫兒突出時如何王無語師自代云走却法師留下講案因書頌曰老鼠唧唧華嚴歷歷奇哉王侍郎却被畜生惑猫兒突出畫堂前牀頭說法無消息無消息大方廣佛華嚴經世主妙嚴品第一採蕨歎雲棲主人愛食蕨衲子山前羣採折採歸食已洗足坐忉忉喚我談心訣心訣何須待我談蹉過山前好時節蕨蕨豎起拳頭向汝說放螺螄有感盤盤曲曲深深密密出門則帶水拖泥閉戶則泯踪絕跡險遭玉鼎調和幾被金針挑剔今來復入波濤但願永離羅織休嫌肢體廉纖莫怪廊房窄塞若知圓覺作伽藍眼前便是金剛窟示沈居士見衡五十年前咏見衡一似描形不識面要將無見當玄修野狐偽作金毛現願依夫子真實言念念存誠心不變一朝悟取首楞嚴見見之時非是見向偈附此以戒妄言跨上白牛車尺木橫當面頂門眼圓睜正見時時現千程復萬程永劫何曾變畢竟是甚麼來黑臉胡僧坐壁邊一物不存如是見大音希聲空谷幽然也一呼而響應十方雷霆寂然也一鼓而震驚百里若夫春禽晝啼秋虫夜鳴繁其聲者小音而已矣故世尊默然良久而外道謂開我迷雲空生宴坐不言而帝釋云善說般若大音希聲非此之謂乎頌曰不音之音名曰至音沈沈寂寂吼動乾坤無叩而鳴古人所箴學道之士默以養真大器晚成楩梓在山千歲而巨材成室干將鑄冶九載而神光燭天若夫槿花早發而萎不終朝蜉蝣易生而壽不逾夕速其成者小器而已矣故長慶七破蒲團而捲簾大悟趙州八旬行脚而傑出叢林大器晚成非此之謂乎頌曰不器之器名曰上器積厚養深一出名世欲速不達古人所刺學道之士靜以俟勢大智如愚連城之璧隱頑石而藏輝照乘之珠孕深淵而祕彩若夫象以齒而焚身翠因毛而殞命衒其智者小智而已矣故曹溪妙契五祖而執勞負辛以韜光慈明親見汾陽而含垢忍恥以匿迹大智如愚非此之謂乎頌曰不智之智名曰真智蠢然其容靈輝內熾用察為明古人所忌學道之士晦以混世大巧若拙騏驥負千里之能而迹濫駑駘栴檀值大千之價而形同枯木若夫振螳臂於齊輪呈驢技於黔虎售其巧者小巧而已矣故馬師具大機大用而初守鈍於磨磚香巖能答十答百而終甘心乎學圃大巧若拙非此之謂乎頌曰不巧之巧名曰極巧一事無能萬法俱了露才揚己古人所少學道之士朴以自保畫像自贊瘦若枯柴衰如落葉呆比盲龜拙同跂鱉無道可尊無法可說問渠趺坐何為但念阿彌陀佛又十晝九不像惱殺丹青匠庶幾此近之權留作供養若道這便是依然成兩樣不兩樣三十棒示孫居士無高人苦凡夫名超之欲入聖操此上人心窮高不知病我觀聖與凡無欠亦無剩廓然平等門高下何足競抑之又抑之乃見真如性鬼子母揭鉢圖鬼母失兒情太戚天上人間求未得鉢盂指示空覩形盡其神力不能出回光省過大歸依剎那母子重相識重相識遲八刻自家懷裏抱嬰兒何必向如來膝下殷勤覓答頭陀袁希賢須知有念終無念千丈綺羅無一線誰識無情却有情庭前鐵樹發新英無亦非有亦非偏南倚北莫相譏無亦是有亦是東行西去隨我意君不見虗空本自絕中邊東西南北何曾異擬古四首畏寒時欲夏苦熱復思冬妄想能消滅安身處處同其二忖得翻成失擬東仍復西未來杳無定何必預勞思其三蠶出桑抽葉蜂飢樹給花有人斯有祿貧者不須嗟其四草食勝空腹茆堂過露居人生解知足煩惱一時除藍田藹藹平畦瑞起煙山翁懷玉正高眠春深莫訝犁鋤靜不是人間稻黍田東銘一瓦一椽一粥一飯檀信脂膏行人血汗爾戒不持爾事不辦可懼可憂可嗟可歎西銘一時一日一月一年流光易度幻形匪堅凡心未盡聖果未圓可驚可怖可悲可憐厨房銘雪峰飯頭溈山典座古德芳風於今未墮攝爾狂心慎爾口過運水搬柴無忘這箇堂內坐禪堂外禪坐誰信傳衣不離碓磨浴堂銘山巍路遠致其柴薪瀹釜然火効其勞勤一月八浴叢林罕聞沙彌戲笑沸湯澆淋洗心滌慮日新又新何以報德忽悟水因御製序朕既選刻僧肇等禪師語錄長夏幾暇欲全覽歷代古德之所激揚而錄其真切為人者柰華藏浩瀚目不暇給臣工中與禪衲輩具能辨別淄澠目力者不得其人莫可使分任繙閱呈朕總覽者無已乃就妙喜所輯正法眼藏幻寄所刻指月錄二書採取若干則公案以示後學夫正法眼藏指月錄二書行海內數百年矣西竺四七震旦二三佛佛祖祖無義味語至今普遍閻浮提界俾荒山古剎渺渺禪棲楖栗蒲團脩脩釋子皆得展卷而見提唱而聞妙喜幻寄之功勳固為不可磨滅但惜皆未具透關眼所以拈提自先失利則粉中之雪煤裏之墨豈能揀辨的當擲黃金而取瓦礫寶魚目而棄摩尼定所不免是以正法眼藏指月錄之外其尚有元樞正體靈鑑真光開示指歸裨益末世者未經朕目無可如何在二書之中則可以自信選擇一無所遺矣明眼人自能辨取帙中所採言句非如妙喜幻寄所選祇尚語句尖新機鋒敏捷不論與本分心地有無交涉也皆專以提持向上不但時人之所推尚流俗之所盛傳而實非旨要未契真宗者概置不錄即古來大善知識遞相拈示之公案少或不依本分任其口頭滑利即不與選焉夫此不了言句歷代明眼善知識非不知其為非第一義諦或以祖父所遺只得傳為家珍或因諸方檢點恐起爭端不無回互不但不肯明以指斥且棄短取長附合拈提將方寸之木聳令高於岑樓亦不過無柰聊作門前之繞豈實謂祖印在茲也初機後學未能人人具生知慧眼則不無悞人在朕今日無罣無礙一稟覺王正令黜陟古今有何忌諱而不為直捷指明後世真正發心參學之人如墮網之欲出若沐漆而求解者豈可不令解粘去縛之淨盡俾少留餘地耶如傅大士如大珠海如丹霞天然如靈雲勤如德山鑒如興化獎如長慶稜如風穴沼如汾陽昭如端師子如大慧杲如弘覺範如高峯妙皆宗門中歷代推為提持後學之宗匠柰其機緣示語無一可入選者聊舉數端以見其旨如傅大士夜夜抱佛眠朝朝還共起起坐鎮相隨語默同居止及能為萬象主不逐四時凋之句長慶上堂曰撞著道伴交肩過一生參學事畢僧問興化四方八面來時如何化曰打中間的如此語句皆是祇識得個昭昭靈靈耳即傅大士所云空手把鉏頭步行騎水牛人從橋上過橋流水不流亦祇到得脫凡情執著見耳祇如步行騎水牛較古德道士倒騎牛之句雖若彷彿而相去天淵如普化云明頭來明頭打暗頭來暗頭打四方八面來旋風把虗空來連架打此語雖亦非究竟較興化打中間語奚啻霄壤如龐居士一口吸盡西江水乃從來多傳為極則者却不知但只會得個光吞萬象而已豈曾脚跟點地所以五祖演云一口吸盡西江水萬丈深潭窮到底略彴不似趙州橋明月清風安可比此頌可謂補龐縕之欠缺也如龐婆百草頭邊祖師意之句尤為麤淺而無知狂參亦稱為究竟之說如汾陽昭除十智同真之外其他語句無一可取似此見地則十智同真之設亦從解路中得來耳若欲如是推演敷布豈有底止十智同真亦奚足重若為啟初學之疑情何必如此多言徒使真參實悟之人牽連入於解路耳如德山乃從來歷代推崇之古錐而除一棒之外詳細搜求其垂示機緣却無一則可採不過會得個本無言說之理不被天下老和尚舌頭瞞地位耳未踏向上一著在所以溈山之語泥裏有刺道德山向後孤峯頂上盤結草庵呵佛罵祖去在可謂將德山數語判盡也如托鉢公案亦只可啟發初學疑情與本分毫無交涉況亦有何奇特直得數千百年提唱殊不可解如巖頭雪峯實乃見過於師然亦未到圓通處較伊法嗣元沙猶欠百步在如大珠頓悟入道要門論不過提唱初機全未具頂門正眼其馬祖賞歎之說未必確實如妙喜乃數百年望重海內之人其武庫全錄朕皆詳細披閱其示語機緣中一無可取其拈提古德處亦間有透脫之論而支離謬誤處甚多觀此則非具真知見者亦乃認得個本來微光用解識學問勉強擴充之所致非實透關之侶如靈雲青山原不動白雲任去來之句如露柱懷胎打破鏡來相見之說亦屬一流至風穴錄中所載不過默悟三元指要是其極則其語句如老僧闍黎祖意教意皆左右兩拍之說家國與野老老僧與闍黎豈有兩個雖將左右兩拍解路粉飾似同中有異異中同者其顰蹙安貼話成兩橛如何葢覆如答隨緣不變云披簑側立千峯外引水澆蔬五老峯又如壁立千仞誰敢正眼覰著之句皆從元要中知解得來不問可知不但非第一義而且貽悞後學況與世理大相矛盾似此不經之說徒增文士𠷣謗耳與佛法毫無裨益此一實事有一絲毫便是一絲毫失之毫釐差之千里真偽之辨若遇明眼人斷不能逃影如丹霞燒木佛觀其語錄見地只止無心實為狂參妄作據丹霞之見木佛之外別有佛耶若此則子孫焚燒祖先牌臣工毀棄帝王位可乎在丹霞以為除佛見殊不知自墮鐵圍而不覺也意在立奇掃相而通身泥水自不知也若謂院主眉鬚墮設立疑案究亦無可疑處不過亦從解路中成就耳非切實為人開人天眼目之宗匠況其示寂時一足未及地而化此亦護法神明令伊自示脚跟不點地之一證如一古德殿前背佛坐又一古德入殿向佛唾傍僧云何得背佛坐向佛唾答云將無佛處來與某甲唾指無佛處來與某甲背此等見解與丹霞同但知掃目前一像却不覺自執千像萬像矣當日但問此二狂徒你道除此殿中佛尚別有何佛試指取看管教立地現形此等無稽魔說何堪提唱書錄掛齒更有拾狐唾以為獅乳者尤堪憐愍似此者不可枚舉以上所拈尚皆非屬邪妄但脚跟未踏實地非了義之說耳如弘覺範指月錄中採其拈提處甚多其支離謬妄處與幻寄同可謂同病相憐不過令人作發笑之戲具更不必論者至如三喚侍者婆子燒庵喫油糍野狐斬猫犀牛扇臺山婆子子湖狗香嚴上樹雲門扇子禾山鼓慈明榜等公案皆古今叢林中日日舉似者朕悉不錄蓋雖言語道斷不過啟發初機非是究竟但此等公案尚不至榛蕪向上一路耳總之此事如杲日光如大火聚提則全提印則全印否乃不達佛之正旨盡屬奪弄精魂其言雖皆數千百年以來人人之所提唱其人雖皆數千百年以來人人之所推崇朕皆置之不論蓋歷代震於其名無人指出殊不知此等未了之談雜入真正人天眼目之宗師語句中後學豈能盡具參方眼其目光如豆者必致金鍮莫辨皂白不分到此地位自以為已造某古德所造之境向上自然無路妄為參學事畢豈不是盡九州鐵鑄成這一大錯此等語句雖於提掇初機發人淨信未始無功然其功甚小能令真正發心參學之人中止化城過由伊造其過甚大如迦陵音亦可謂具參方眼者乃於興化古廟躲過丹霞燒木佛長慶路逢道伴等公案尚被牽絆而未看破且尤喜提唱風穴闍黎老僧一則朕當年一一討論為之說破尚不能透脫何況初機後學耶茲集所選歷代禪師除六祖外一百五十六人語句固皆本分極則而諸人中如誌公馬祖一南嶽思石頭遷忠國師長沙岑觀國師臨濟元投子同曹山寂玄沙備韶國師其見證與前選中諸大善知識無二無別但其傳世語句可採者止於此因其難成卷帙是以並在後集中至於藥山儼黃蘗運洞山价羅漢琛法眼益天依懷細細評量猶有珠與璣之分其餘諸禪師公案言句二書所載祇此一二則語雖可錄不能品其次第學者能於古人語言相似而高下懸殊之處自具隻眼知朕採取刪汰意趣之所歸舉一明三方為於此有分否則毋得顢頇含胡輕言參透葛藤轉不如講誦經典薰此佛種以待機緣尚為未昧自己朕今此舉若無灼知定見豈肯多生枝節為天下後世之所𠷣笑實憐禪宗頹廢慧命懸絲皆由此輩未了宗師開此紛雜岐徑令魚龍莫辨後學不知所從也故不得不為蛇足一上如標月指所指必月無論三垣二十八宿未嘗悞指即弦朓之月亦所不指所指者如月之恒既圓且明普照三千大千後學但毋向指邊求月也是為序雍正十一年癸丑八月望日無名氏問千七百則陳爛葛藤皆是無義味語皇上品其優劣毋乃涉於解路乎有名氏答從上祖師言句汝作麼生會無名氏云如鴉鳴鵲噪會有名氏曰汝既不作言句會汝今云何復生分別心如可分別者固應如是分別如曰不可分別則古來言句既作鴉鳴鵲噪會皇上今日品題何不作鳳嘯龍吟會彎兔角弓而射空裏風影或百發百中或十發一中計功行賞夫何不可無名氏懡㦬而退御選歷代禪師語錄前集上初祖菩提達摩大師祖於般若多羅尊者得法演化本國時有二師一名佛大先二名佛大勝多佛大先遇般若多羅尊者捨小趣大與祖並化時號為二甘露門而佛大勝多更分徒而為六宗第一有相宗第二無相宗第三定慧宗第四戒行宗第五無得宗第六寂靜宗各封己解別展化源祖喟然歎曰彼之一師已陷牛跡況復支離而分六宗我若不除永纏邪見言已微現神力至有相宗所問曰一切諸法何名實相彼眾中有一尊長薩婆羅答曰於諸相中不互諸相是名實相祖曰一切諸相而不互者若名實相當何定耶彼曰於諸相中實無有定若定諸相何名為實祖曰諸相不定便名實相汝今不定當何得之彼曰我言不定不說諸相當說諸相其義亦然祖曰汝言不定當為實相定不定故即非實相彼曰定既不定即非實相知我非故不定不變祖曰汝今不變何名實相已變已往其義亦然彼曰不變當在在不在故故變實相以定其義祖曰實相不變變即非實於有無中何名實相薩婆羅心知聖師懸解潛達即以手指虗空曰此是世間有相亦能空故當我此身得似此否祖曰若解實相即見非相若了非相其色亦然當於色中不失色體於非相中不礙有故若能是解此名實相彼眾聞已心意朗然欽禮信受祖瞥然匿跡至無相宗所而問曰汝言無相當何證之彼眾中有波羅提者答曰我明無相心不現故祖曰汝心不現當何明之彼曰我明無相心不取捨當於明時亦無當者祖曰於諸有無心不取捨又無當者諸明無故彼曰入佛三昧尚無所得何況無相而欲知之祖曰相既不知誰云有無尚無所得何名三昧彼曰我說不證證無所證非三昧故我說三昧祖曰非三昧者何當名之汝既不證非證何證波羅提聞祖辨析即悟本心禮謝於祖懺悔往謬祖記曰汝當得果不久證之此國有魔汝可降之言已忽然不現至定慧宗所問曰汝學定慧為一為二彼眾中有婆蘭陀者答曰我此定慧非一非二祖曰既非一二何名定慧彼曰在定非定處慧非慧一即非一二亦不二祖曰當一不一當二不二既非定慧約何定慧彼曰不一不二定慧能知非定非慧亦復然矣祖曰慧非定故然何知哉不一不二誰定誰慧婆蘭陀聞之疑心冰釋至第四戒行宗所問曰何者名戒云何名行當此戒行為一為二彼眾中有一賢者答曰一二二一皆彼所生依教無染此名戒行祖曰汝言依教即是有染一二俱破何言依教此二違背不及於行內外非明何名為戒彼曰我有內外彼已知竟既得通達便是戒行若說違背俱是俱非言及清淨即戒即行祖曰俱是俱非何言清淨既得通故何談內外賢者聞之即自慚服至無得宗所問曰汝云無得無得何得既無所得亦無得得彼眾中有寶靜者答曰我說無得非無得得當說得得無得是得祖曰得既不得得亦非得既云得得得得何得彼曰見得非得非得是得若見不得名為得得祖曰得既非得得得無得既無所得當何得得寶靜聞之頓除疑網至寂靜宗所問曰何名寂靜於此法中誰靜誰寂彼眾中有尊者答曰此心不動是名為寂於法無染名之為靜祖曰本心不寂要假寂靜本來寂故何用寂靜彼曰諸法本空以空空故於彼空空故名寂靜祖曰空空已空諸法亦爾寂靜無相何靜何寂靜尊者聞師指誨豁然開悟於是六眾咸誓歸依化被南天聲馳五印經六十載度無量眾祖念東震旦國佛記後五百歲般若智燈運光於彼遂囑弟子般若密多羅住天竺傳法而躬至震旦乃辭祖塔別學侶泛重溟達南海乃梁普通七年庚子歲也廣州刺史蕭昂具禮迎供表聞武帝帝遣使齎詔迎請十月至金陵帝問曰朕即位以來造寺寫經度僧不可勝紀有何功德祖曰並無功德帝曰何以無功德祖曰此但人天小果有漏之因如影隨形雖有非實帝曰如何是真功德祖曰淨智妙圓體自空寂如是功德不以世求帝又問如何是聖諦第一義祖曰廓然無聖帝曰對朕者誰祖曰不識帝不悟祖渡江北寓止嵩山少林寺面壁而坐終日默然有僧神光詣祖參承祖常端坐面壁莫聞誨勵師立雪過膝斷臂求法祖遂因與易名曰慧可問曰諸佛法印可得聞乎祖曰諸佛法印匪從人得可曰我心未寧乞師與安祖曰將心來與汝安可良久曰覓心了不可得祖曰我與汝安心竟越九年欲返天竺乃顧慧可而告之曰昔如來以正法眼付迦葉大士展轉囑累而至於我我今付汝汝當護持并授汝袈裟以為法信內傳法印以契證心外付袈裟以定宗旨至吾滅後二百年衣止不傳法周沙界明道者多行道者少說理者多通理者少潛符密證千萬有餘汝當闡揚勿輕未悟一念回機便同本得聽吾偈曰吾本來茲土傳法救迷情一花開五葉結果自然成二祖慧可大師有一居士年踰四十不言名氏聿來設禮而問祖曰弟子身纏風恙請和尚懺罪祖曰將罪來與汝懺士良久曰覓罪了不可得祖曰與汝懺罪竟宜依佛法僧住士曰今見和尚已知是僧未審何名佛法祖曰是心是佛是心是法法佛無二僧寶亦然士曰今日始知罪性不在內不在外不在中間如其心然佛法無二也祖深器之即為剃髮曰是吾寶也宜名僧璨祖遂囑累付以衣法偈曰本來緣有地因地種花生本來無有種花亦不曾生向居士幽棲林野木食磵飲北齊天保初聞祖盛化乃致書曰影由形起響逐聲來弄影勞形不識形為影本揚聲止響不知聲是響根除煩惱而趣涅槃喻去形而覓影離眾生而求佛果喻默聲而求響故知迷悟一塗愚智非別無名作名因其名則是非生矣無理作理因其理則爭論起矣幻化非真誰是誰非虗妄無實何空何有將知得無所得失無所失未及造謁聊申此意伏望答之祖回示曰備觀來意皆如實真幽之理竟不殊本迷摩尼謂瓦礫豁然自覺是真珠無明智慧等無異當知萬法即皆如愍此二見之徒輩申辭措筆作斯書觀身與佛不差別何須更覓彼無餘居士捧披祖偈乃申禮覲密承印記三祖僧璨大師信心銘至道無難惟嫌揀擇但莫憎愛洞然明白毫釐有差天地懸隔不識玄旨徒勞念靜圓同太虗無欠無餘良由取舍所以不如不用求真惟須息見纔有是非紛然失心二由一有一亦莫守一心不生萬法無咎無咎無法不生不心能由境滅境逐能沈境由能境能由境能欲知兩段原是一空一空同兩齊含萬象欲取一乘勿惡六塵六塵不惡還同正覺智者無為愚人自縛法無異法妄自愛著將心用心豈非大錯夢幻空花何勞把捉得失是非一時放却眼若不寐諸夢自除心若不異萬法一如狐疑盡淨正信調直一切不留無可記憶虗明自照不勞心力非思量處識情難測真如法界無他無自要急相應惟言不二不二皆同無不包容十方智者皆入此宗宗非促延一念萬年無在不在十方目前極小同大忘絕境界極大同小不見邊表有即是無無即是有一即一切一切即一但能如是何慮不畢四祖道信大師祖謂牛頭融禪師曰夫百千法門同歸方寸河沙妙德總在心源一切戒門定門慧門神通變化悉自具足不離汝心一切煩惱業障本來空寂一切因果皆如夢幻無三界可出無菩提可求人與非人性相平等大道虗曠絕思絕慮如是之法汝今已得更無闕少與佛何殊更無別法汝但任心自在莫作觀行亦莫澄心莫起貪瞋莫懷愁慮蕩蕩無礙任意縱橫不作諸善不作諸惡行住坐臥觸目遇緣總是佛之妙用快樂無憂故名為佛五祖弘忍大師咸亨中有居士姓盧名慧能自新州來參謁祖問曰汝自何來盧曰嶺南祖曰欲須何事盧曰唯求作佛祖曰嶺南人無佛性若為得佛盧曰人即有南北佛性豈然祖令隨眾作務盧曰弟子自心常生智慧不離自性即是福田未審和尚教作何務祖曰這獦獠根性太利著槽廠去盧禮足而退便入碓坊服勞於杵臼晝夜不息一日祖潛詣碓坊問曰米白也未盧曰白也未有篩祖以杖三擊其碓盧即以三鼓入室祖告曰諸佛出世為一大事故隨機大小而引導之遂有十地三乘頓漸等旨以為教門然以無上微妙祕密圓明真實正法眼藏付於上首大迦葉尊者展轉傳授二十八世至達摩屆於此土得可大師承襲以至於我今以法寶及所傳袈裟用付於汝善自保護無令斷絕聽吾偈曰有情來下種因地果還生無情既無種無性亦無生盧跪受訖問法則既受衣付何人祖曰昔達摩初至人未之信故傳衣以明得法今信心已熟衣乃爭端止於汝身不復傳也六祖慧能大師祖抵黃梅參禮五祖當呈偈後三鼓入五祖室五祖復徵其初悟應無所住而生其心語祖於言下大徹遂啟五祖曰一切萬法不離自性何期自性本自清淨何期自性本不生滅何期自性本自具足何期自性本無動搖何期自性能生萬法五祖知悟本性謂祖曰不識本心學法無益若識本心見自本性即名丈夫天人師佛遂傳衣法五祖送祖至九江驛邊令祖上船祖隨即把櫓五祖曰合是吾渡汝祖曰迷時師度悟時自度度名雖一用處不同能蒙師傳法今已得悟只合自性自度五祖云如是如是以後佛法由汝大行祖至廣州法性寺值印宗法師講涅槃經寓止廊廡間暮夜風颺剎旛聞二僧對論一曰旛動一曰風動往復不已祖曰不是風動不是旛動仁者心動一眾竦然印宗延至上席徵詰奧義問曰黃梅付囑如何指授祖曰指授即無惟論見性不論禪定解脫宗曰何不論禪定解脫祖曰為是二法不是佛法佛法是不二之法宗又問如何是佛法不二之法祖曰法師講涅槃經明佛性是佛法不二之法如高貴德王菩薩白佛言犯四重禁作五逆罪及一闡提等當斷善根佛性否佛言善根有二一者常二者無常佛性非常非無常是故不斷名為不二一者善二者不善佛性非善非不善是名不二蘊之與界凡夫見二智者了達其性無二無二之性即是佛性印宗聞說歡喜合掌韋使君請益師陞座告大眾曰總淨心念摩訶般若波羅密多復云善知識菩提般若之智世人本自有之只緣心迷不能自悟須假大善知識示導見性當知愚人智人佛性本無差別只緣迷悟不同所以有愚有智吾今為說摩訶般若波羅密法使汝等各得智慧志心諦聽吾為汝說善知識世人終日口說般若不識自性般若猶如說食不飽口但說空萬劫不得見性終無有益善知識摩訶般若波羅密是梵語此言大智慧到彼岸此須心行不在口念口念心不行如幻如化如露如電口念心行則心口相應本性是佛離性無別佛何名摩訶摩訶是大心量廣大猶如虗空無有邊畔亦無方圓大小亦非青黃赤白亦無上下長短亦無瞋無喜無是無非無善無惡無有頭尾諸佛剎土盡同虗空世人妙性本空無有一法可得自性真空亦復如是善知識莫聞吾說空便即著空第一莫著空若空心靜坐即著無記空善知識世界虗空能含萬物色像日月星宿山河大地泉源溪磵草木叢林惡人善人惡法善法天堂地獄一切大海須彌諸山總在空中世人性空亦復如是善知識自性能含萬法是大萬法在諸人性中若見一切人惡之與善盡皆不取不捨亦不染著心如虗空名之為大故曰摩訶善知識迷人口說智者心行又有迷人空心靜坐百無所思自稱為大此一輩人不可與語為邪見故善知識心量廣大徧周法界用即了了分明應用便知一切一切即一一即一切去來自由心體無滯即是般若善知識一切般若智皆從自性而生不從外入莫錯用意名為真性自用一真一切真心量大事不行小道口雖終日說空心中不修此行恰似凡人自稱國王終不可得非吾弟子善知識何名般若般若者唐言智慧也一切處所一切時中念念不愚常行智慧即是般若行一念愚即般若絕一念智即般若生世人愚迷不見般若口說般若心中常愚常自言我修般若念念說空不識真空般若無形相智慧心即是若作如是解即名般若智何名波羅密此是西竺語唐言到彼岸解義離生滅著境生滅起如水有波浪即名為此岸離境無生滅如水常通流即名為彼岸故號波羅密善知識迷人口念當念之時惟妄惟非念念若行是名真性悟此法者是般若法修此行者是般若行不修即凡一念修行自身等佛善知識凡夫即佛煩惱即菩提前念迷即凡夫後念悟即佛前念著境即煩惱後念離境即菩提善知識摩訶般若波羅密最尊最上最第一無住無往亦無來三世諸佛從中出當用大智慧打破五蘊煩惱塵勞如此修行定成佛道變三毒為戒定慧善知識我此法門從一般若生八萬四千智慧何以故為世人有八萬四千塵勞若無塵勞智慧常現不離自性悟此法者即是無念無憶無著不起誑妄用自真如性以智慧觀照於一切法不取不捨即是見性成佛道若起正真般若觀照一剎那間妄念俱滅識自本性一悟即至佛地善知識智慧觀照內外明徹識自本心若識本心即本解脫若得解脫即是般若三昧般若三昧即是無念何名無念若見一切法心不染著是為無念用即徧一切處亦不著一切處但淨本心使六識出六門於六塵中無染無雜來去自由通用無滯即是般若三昧自在解脫名無念行若百不思常令念絕即是法縛即名邊見善知識悟無念法者萬法盡通悟無念法者見諸佛境界悟無念法者至佛地位善知識後代得吾法者將此頓教法門於同見同行發願受持如事佛故終身而不退者定入聖位示眾云善知識我此法門以定慧為本大眾勿迷言定慧別定慧一體不是二定是慧體慧是定用即慧之時定在慧即定之時慧在定若識此義即是定慧等學諸學道人莫言先定發慧先慧發定定慧各別作此見者法有二相口說善相心中不善空有定慧定慧不等若心口俱善內外一種定慧即等自悟修行不在於諍若諍先後即同迷人不斷勝負却增我法不離四相善知識定慧猶如何等猶如燈光有燈即光無燈即暗燈是光之體光是燈之用名雖有二體本同一此定慧法亦復如是祖云善知識云何立無念為宗只緣口說見性迷人於境上有念念上便起邪見一切塵勞妄想從此而生自性本無一法可得若有所得妄說禍福即是塵勞邪見故此法門立無念為宗善知識無者無何事念者念何物無者無二相無諸塵勞之心念者念真如本性真如即是念之體念即是真如之用真如自性起念非眼耳鼻舌能念真如有性所以起念真如若無眼耳色聲當時即壞善知識真如自性起念六根雖有見聞覺知不染萬境而真性常自在故經云能善分別諸法相於第一義而不動無相頌曰迷人修福不修道只言修福便是道布施供養福無邊心中三惡元來造擬將修福欲滅罪後世得福罪還在但向心中除罪緣名自性中真懺悔忽悟大乘真懺悔除邪行正即無罪學道常於自性觀即與諸佛同一類吾祖惟傳此頓法普願見性同一體若欲當來覓法身離諸法相心中洗努力自見莫悠悠後念總絕一世休若悟大乘得見性虔恭合掌至心求南嶽懷讓禪師禮祖祖曰何處來曰嵩山祖曰甚麼物恁麼來曰說似一物即不中祖曰還可修證否曰修證即不無污染即不得祖曰只此不污染諸佛之所護念汝既如是吾亦如是僧智通看楞伽經約千餘徧不會三身四智禮祖求解其義祖曰三身者清淨法身汝之性也圓滿報身汝之智也千百億化身汝之行也若離本性別說三身即名有身無智若悟三身無有自性即名四智菩提聽吾偈曰自性具三身發明成四智不離見聞緣超然登佛地吾今為汝說諦信永無迷莫學馳求者終日說菩提通曰四智之義可得聞乎祖曰既會三身便明四智何更問耶若離三身別譚四智此名有智無身也即此有智還成無智復說偈曰大圓鏡智性清淨平等性智心無病妙觀察智見非功成所作智同圓鏡五八六七果因轉但用名言無實性若於轉處不留情繁興永處那伽定通禮謝以偈贊曰三身元我體四智本心明身智融無礙應物任隨形起修皆妄動守住匪真精妙旨因師曉終無污染名僧志道覽涅槃經至諸行無常是生滅法生滅滅已寂滅為樂而生疑禮祖求發明祖曰汝作麼生疑對曰一切眾生皆有二身謂色身法身也色身無常有生有滅法身有常無知無覺經云生滅滅已寂滅為樂者未審是何身寂滅何身受樂若色身者色身滅時四大分散全是苦苦不可言樂若法身寂滅即同草木瓦石誰當受樂又法性是生滅之體五蘊是生滅之用一體五用生滅是常生則從體起用滅則攝用歸體若聽更生即有情之類不斷不滅若不聽更生即永歸寂滅同於無情之物如是則一切諸法被涅槃之所禁伏尚不得生何樂之有祖曰汝是釋子何習外道斷常邪見而議最上乘法據汝所解即色身外別有法身離生滅求於寂滅又推涅槃常樂言有身受者斯乃執吝生死耽著世樂汝今當知佛為一切迷人認五蘊和合為自體相分別一切法為外塵相好生惡死念念遷流不知夢幻虗假枉受輪迴以常樂涅槃翻為苦相終日馳求佛愍此故乃示涅槃真樂剎那無有生相剎那無有滅相更無生滅可滅是則寂滅現前當現前之時亦無現前之量乃謂常樂此樂無有受者亦無不受者豈有一體五用之名何況更言涅槃禁伏諸法令永不生斯乃謗佛毀法聽吾偈曰無上大涅槃圓明常寂照凡愚謂之死外道執為斷諸求二乘人目以為無作盡屬情所計六十二見本妄立虗假名何為真實義唯有過量人通達無取捨以知五蘊法及以蘊中我外現眾色象一一音聲相平等如夢幻不起凡聖見不作涅槃解二邊三際斷常應諸根用而不起用想分別一切法不起分別想劫火燒海底風鼓山相擊真常寂滅樂涅槃相如是吾今強言說令汝捨邪見汝勿隨言解許汝知少分道聞已踊躍作禮而退僧志常參祖祖問汝從何來欲求何事曰學人近禮大通和尚蒙示見性成佛之義未決狐疑望賜開示祖曰彼有何言句汝試舉看曰大通云汝見虗空否對曰見通曰汝見虗空有相貌否對曰虗空無形有何相貌通曰汝之本性猶如虗空返觀自性了無一物可見是名正見無一物可知是名真知無有青黃長短但見本源清淨覺體圓明即名見性成佛亦名極樂世界亦名如來知見學人雖聞此說猶未決了乞和尚示誨令無凝滯祖曰彼師所說猶存見知故令汝未了吾今示汝一偈曰不見一法存無見大似浮雲遮日面不知一法守空知還如太虗生閃電此之知見瞥然興錯認何曾解方便汝當一念自知非自己靈光常顯現常聞偈已心意豁然乃述偈曰無端起知見著相求菩提情存一念悟寧越昔時迷自性覺源體隨照枉遷流不入祖師室茫然趣兩頭有一童子名神會年十三自玉泉來參禮祖曰知識遠來艱辛還將得本來否若有本則合識主試說看會曰以無住為本見即是主祖曰這沙彌爭合取次語會曰和尚坐禪還見不見祖以拄杖打三下云吾打汝痛不痛對曰亦痛亦不痛祖曰吾亦見亦不見神會問如何是亦見亦不見祖云吾之所見常見自家過𠍴不見他人是非好惡是以亦見亦不見汝言亦痛亦不痛如何汝若不痛同其木石若痛則同凡夫即起恚恨汝向前見不見是二邊痛不痛是生滅汝自性且不見敢爾弄人神會禮拜悔謝一日祖告眾曰我有一物無頭無尾無名無字無背無面諸人還識否神會出曰是諸佛之本源神會之佛性祖曰向汝道無名無字汝便喚作本源佛性汝向去有把茆葢頭也只成箇知解宗徒唐中宗詔遣使薛簡迎祖祖以疾辭簡問曰京城禪德皆云欲得會道必須坐禪習定未審師所說法如何師曰道由心悟豈在坐也經云若言如來若坐若臥是行邪道何故無所從來亦無所去無生無滅是如來清淨禪諸法空寂是如來清淨坐究竟無證豈況坐耶簡曰弟子回京主上必問願師慈悲指示心要傳奏兩宮及京城學道者譬如一燈燃百千燈冥者皆明明明無盡師曰道無明暗明暗是代謝之義明明無盡亦是有盡相待立名故淨名經云法無有比無相待故明與無明凡夫見二智者了達其性無二無二之性即是實性實性者處凡愚而不減在賢聖而不增住煩惱而不亂居禪定而不寂不斷不常不來不去不在中間及其內外不生不滅性相如如常住不遷名之曰道簡曰師說不生不滅何異外道祖曰外道所說不生不滅者將滅止生以生顯滅滅猶不滅生說不生我說不生不滅者本自無生今亦不滅所以不同外道汝若欲知心要但一切善惡都莫思量自然得入清淨心體湛然常寂妙用恒沙簡蒙指教豁然大悟禮辭歸闕表奏師語詔加褒美僧問黃梅意旨甚麼人得祖曰會佛法人得曰和尚還得否祖曰我不會佛法祖說偈曰一切無有真不以見於真若見於真者是見盡非真若能自有真離假即心真自心不離假無真何處真有情即解動無情即不動若修不動行同無情不動若覓真不動動上有不動不動是不動無情無佛種善能分別相第一義不動但作如此見即是真如用報諸學道人努力須用意莫於大乘門却執生死智若言下相應即共論佛義若是不相應合掌令歡喜此宗本無諍諍即失道意執逆諍法門自性入生死祖曰諸善知識汝等各各淨心聽吾說法汝等諸人自心是佛更莫狐疑外無一物而能建立皆是本心生萬種法故經云心生種種法生心滅種種法滅若欲成就種智須達一相三昧一行三昧若於一切處而不住相於彼相中不生憎愛亦無取捨不念利益成壞等事安閒恬靜虗融澹泊此名一相三昧若於一切處行住坐臥純一直心不動道場真成淨土此名一行三昧若人具二三昧如地有種含藏長養成就其實一相一行亦復如是我今說法猶如時雨溥潤大地汝等佛性譬之種子遇茲霑洽悉得發生承吾旨者決獲菩提依吾行者定證妙果聽吾偈曰心地含諸種普雨悉皆萌頓悟花情已菩提果自成說偈已復曰其法無二其心亦然其道清淨亦無諸相汝等慎勿觀靜及空其心此心本淨無可取捨各自努力隨緣好去秦䟦陀禪師問生法師講何經論生曰大般若經師曰作麼生說色空義曰眾微聚曰色眾微無自性曰空師曰眾微未聚喚作甚麼生罔措師又問別講何經論曰大涅槃經師曰如何說涅槃之義曰涅而不生槃而不滅不生不滅故曰涅槃師曰這箇是如來涅槃那箇是法師涅槃曰涅槃之義豈有二耶某甲祇如此未審禪師如何說涅槃師拈起如意曰還見麼曰見師曰見箇甚麼曰見禪師手中如意師將如意擲於地曰見麼曰見師曰見箇甚麼曰見禪師手中如意墮地師斥曰觀公見解未出常流何得名喧宇宙拂衣而去其徒懷疑不已乃追師扣問我師說色空涅槃不契未審禪師如何說色空義師曰不道汝師說得不是汝師祇說得果上色空不會說得因中色空其徒曰如何是因中色空師曰一微空故眾微空眾微空故一微空一微空中無眾微眾微空中無一微寶誌禪師師問一梵僧承聞尊者喚我作屠兒曾見我殺生麼曰見師曰有見見無見見不有不無見若有見見是凡夫見無見見是聲聞見不有不無見是外道見未審尊者如何見梵僧曰你有此等見耶師垂語曰終日拈香擇火不知身是道場又曰京都鄴都浩浩還是菩提大道又曰如我身空諸法空千品萬類悉皆同迷悟不二頌迷時以空為色悟即以色為空迷悟本無差別色空究竟還同愚人喚南作北智者達無西東欲覓如來妙理常在一念之中陽𦦨本非其水渴鹿狂趁怱怱自身虗假不實將空更欲覓空世人迷倒至甚如犬吠雷叿叿大乘讚七首大道常在目前雖在目前難覩若欲悟道真體莫除聲色煩惱煩惱本來空寂妄情遞相纏遶一切如影如響不知何惡何好有心取相為實定知見性不了若欲作業求佛佛是生死大兆生死業常隨身黑闇獄中未曉悟理本來無異覺後誰晚誰早法界量同太虗眾生智心自小但能不起吾我涅槃法食常飽一妄身臨鏡照影影與妄身不殊但欲去影留形不知身本同虗身本與影不異不得一有一無若欲存一捨一永與直理相疏更若愛聖憎凡生死海裏沈浮煩惱因心有故無心煩惱何居不勞分別取相自然得道須臾夢時夢中造作覺時覺境都無翻思覺時與夢顛倒二見不殊改迷取覺求利何異販賣商徒動靜兩忘常寂自然契合真如若言眾生異佛迢迢與佛常疏佛與眾生不二自然究竟無餘二法性本來常寂蕩蕩無有邊畔安心取捨之間被他二境迴換斂容入定坐禪攝境安心覺觀機關木人修道何時得達彼岸諸法本空無著境似浮雲會散忽悟本性元空恰似熱病得汗無智人前莫說打你色身星散三報你眾生直道非有即是非無非有非無不二何須對有論虗有無妄心立號一破一箇不居兩名由爾情作無情即是真如若欲存情覓佛將網山上羅魚徒費功夫無益幾許枉用功夫不解即心即佛真似騎驢覓驢一切不憎不愛這箇煩惱須除除之則須除身除身無佛無因無佛無因可得自然無法無人四內見外見總惡佛道魔道俱錯被此二大波旬便見厭苦求樂生死悟本體空佛魔何處立脚只由妄情分別前身後身孤薄輪迴六道不停結業不能除却眾生身同太虗煩惱何處安著但無一切希求煩惱自然消落五世間幾許癡人將道復欲求道廣尋諸義紛紛自救己身不了專尋他文亂說自稱至理妙好徒勞一生虗過永劫沈淪生老濁愛纏心不捨清淨智心自惱真如法界叢林反作荊棘荒草但執黃葉為金不悟棄金求寶所以失念狂走強力裝持相好口內誦經誦論心裏尋常枯槁一朝覺本心空具足真如不少六聲聞心心斷惑能斷之心是賊賊賊遞相除遣何時了本語默口內誦經千卷體上問經不識不解佛法圓通徒勞尋行數墨頭陀阿練苦行希望後身功德希望即是隔聖大道何由可得譬如夢裏渡河船師渡過河北忽覺牀上安眠失却渡船軌則船師及彼渡人兩箇本不相識眾生迷倒羈絆往來三界疲極覺悟生死如夢一切求心自息七明州布袋和尚師有偈曰我有一布袋虗空無罣礙展開徧十方入時觀自在吾有三寶堂裏空無色相不高亦不低無遮亦無障學者體不如求者難得樣智慧解安排千中無一匠四門四果生十方盡供養吾有一軀佛世人皆不識不塑亦不裝不雕亦不刻無一滴灰泥無一點彩色人畫畫不成賊偷偷不得體相本自然清淨非拂拭雖然是一軀分身千百億又偈曰彌勒真彌勒分身千百億時時示時人時人自不識師有歌曰只箇心心心是佛十方世界最靈物縱橫妙用可憐生一切不如心真實騰騰自在無所為閒閒究竟出家兒若覩目前真大道不見纖毫也大奇萬法何殊心何異何勞更用尋經義心王本自絕多知智者祇明無學地非聖非凡復若何不強分別聖情孤無價心珠本圓淨凡名異相妄空呼人能弘道道分明無量清高稱道情𢹂錫若登故國路莫愁諸處不聞聲南嶽慧思禪師師示眾曰道源不遠性海非遙但向己求莫從他覓覓即不得得亦不真偈曰頓悟心源開寶藏隱顯靈通現真相獨行獨坐常巍巍百億化身無數量縱令逼塞滿虗空看時不見微塵相可笑物兮無比況口吐明珠光晃晃尋常見說不思議一語標名言下當又偈曰天不能葢地不能載無去無來無障礙無長無短無青黃不在中間及內外超羣出眾太虗玄指物傳心人不會清涼澄觀國師師答皇太子問心要書其詞曰至道本乎一心心法本乎無住無住心體靈知不昧性相寂然包含德用該攝內外能深能廣非有非空不生不滅無終無始求之而不得棄之而不離迷現量則惑苦紛然悟真性則空明廓徹雖即心即佛惟證者方知然有證有知則慧日沈沒於有地若無照無悟則昏雲掩蔽於空門若一念不生則前後際斷照體獨立物我皆如直造心源無智無得不取不捨無對無修然迷悟更依真妄相待若求真棄妄猶棄影勞形若體妄即真猶處陰影滅若無心忘照則萬慮都捐若任運寂知則眾行爰起放曠任其去住靜鑒覺其源流語默不失玄微動靜未離法界言止則雙忘知寂論觀則雙照寂知語證則不可示人說理則非證不了是以悟寂無寂真知無知以知寂不二之一心契空有雙融之中道無住無著莫攝莫收是非兩忘能所雙絕斯絕亦寂則般若現前般若非心外新生智性乃本來具足然本寂不能自現實由般若之功般若之與智性翻覆相成本智之與始修實無兩體雙亡證入則妙覺圓明始末該融則因果交徹心心作佛無一心而非佛心處處成道無一塵而非佛國故真妄物我舉一全收心佛眾生渾然齊致是知迷則人隨於法法法萬差而人不同悟則法隨於人人人一智而融萬境言窮慮絕何果何因體本寂寥孰同孰異惟忘懷虗朗消息沖融其猶透水月華虗而可見無心鑒象照而常空矣青原靜居行思禪師師令遷持書與南嶽讓和尚曰汝達書了速回吾有箇鈯斧子與汝住山遷至彼未呈書便問不慕諸聖不重己靈時如何嶽曰子問太高生何不向下問遷曰寧可永劫受沈淪不從諸聖求解脫嶽便休遷便回師問子返何速書信達否遷曰書亦不通信亦不達去日蒙和尚許箇鈯斧子祇今便請師垂一足遷便禮拜尋辭往南嶽荷澤神會參師問甚處來曰曹溪師曰曹溪意旨如何會振身而立師曰猶帶瓦礫在曰和尚此間莫有真金與人麼師曰設有汝向甚麼處著僧問如何是佛法大意師曰廬陵米作麼價江西馬祖道一禪師師一日謂眾曰汝等諸人各信自心是佛此心即是佛心達摩大師從南天竺國來至中華傳上乘一心之法令汝等開悟楞伽經以佛語心為宗無門為法門夫求法者應無所求心外無別佛佛外無別心不取善不捨惡淨穢兩邊俱不依怙達罪性空念念不可得無自性故故三界惟心森羅萬象一法之所印凡所見色皆是見心心不自心因色故有汝但隨時言說即事即理都無所礙菩提道果亦復如是於心所生即名為色知色空故生即不生若了此意乃可隨時著衣喫飯長養聖胎任運過時更有何事聽吾偈曰心地隨時說菩提亦祗寧事理俱無礙當生即不生一日示眾云道不用修但莫污染何為污染但有生死心造作趣向皆是污染若欲直會其道平常心是道何謂平常心無造作無是非無取捨無斷常無凡聖故經云非凡夫行非聖賢行是菩薩行只如今行住坐臥應機接物盡是道道即是法界乃至河沙妙用不出法界若不然者云何言心地法門云何言無盡燈一切法皆是心法一切名皆是心名萬法皆從心生心為萬法之根本故經云識心達本源故號為沙門名等義等一切諸法皆等純一無雜隨時自在建立法界盡是法界若立真如盡是真如若立理一切法盡是理若立事一切法盡是事舉一千從事理無差盡是妙用更無別理皆由心之迴轉譬如月影有若干真月無若干諸源水有若干水性無若干森羅萬象有若干虗空無若干說道理有若干無礙慧無若干種種成立皆由一心也建立亦得掃蕩亦得盡是妙用妙用盡是自家一切法皆是佛法諸法即是解脫解脫者即是真如諸法不出於真如在纏名如來藏出纏號淨法身體無增減能大能小能方能圓應物現形如水中月滔滔運用不立根苗不盡有為不住無為有為是無為之用無為是有為之依了達無二名平等性性無有異用則不同在迷為識在悟為智順理為悟順事為迷迷則迷自本心悟則悟自本性一悟永悟不復更迷如日出時不合於暗智慧日出不與煩惱暗俱了心境界妄想即除妄想既除即是無生若見此理真正合道隨緣度日坐起相隨戒行增薰積於淨業但能如是何慮不通久立珍重僧問離四句絕百非請師直指西來意師曰我今日勞倦不能為汝說問取智藏去僧去問西堂堂云何不問和尚僧云和尚教來問堂云我今日頭痛不能為汝說問取海兄去僧又去問百丈丈云我到這裏却不會僧却回舉似師師曰藏頭白海頭黑龐居士問不昧本來人請師高著眼師直下覰士曰一種沒弦琴唯師彈得妙師直上覰士禮拜師歸方丈士隨後曰適來弄巧成拙洪州廉使問曰喫酒肉即是不喫即是師曰若喫是中丞祿不喫是中丞福師示疾院主問和尚近日尊候如何師曰日面佛月面佛石頭希遷禪師一日青原問師曰有人道嶺南有消息師曰有人不道嶺南有消息曰若恁麼大藏小藏從何而來師曰盡從這裏去原然之僧問如何是解脫師曰誰縛汝問如何是淨土師曰誰垢汝問如何是涅槃曰誰將生死與汝師問新到從甚麼處來曰江西來師曰見馬大師否曰見師乃指一橛柴曰馬師何似這箇僧無對却回舉似馬祖祖曰汝見橛柴大小曰沒量大祖曰汝甚有力曰何也祖曰汝從南嶽負一橛柴來豈不是有力問如何是西來意師曰問取露柱曰學人不會師曰我更不會大顛問道有道無俱是謗請師除師曰一物亦無除箇甚麼師却問併却咽喉唇吻道將來顛曰無這箇師曰若恁麼汝即得入門道悟問如何是佛法大意師曰不得不知曰向上更有轉處也無師曰長空不礙白雲飛問如何是禪師曰碌甎問如何是道師曰木頭師因看肇論至會萬物為己者其唯聖人乎乃拊几曰聖人無己靡所不己法身無象誰云自他圓鑑靈照於其間萬象體玄而自現境智非二孰云去來至哉斯語也遂掩卷不覺寢夢與六祖同乘一龜游泳深池之內覺而念曰靈龜者智也深池者性海也吾與祖師同乘靈智游性海矣遂著參同契上堂吾之法門先佛傳授不論禪定精進唯達佛之知見即心即佛心佛眾生菩提煩惱名異體一汝等當知自己心靈體離斷常性非垢淨湛然圓滿凡聖齊同應用無方離心意識三界六道惟自心現水月鏡像豈有生滅汝能知之無所不備鳥窠道林禪師有侍者會通一日欲辭去師問曰汝今何往對曰會通為法出家和尚不垂慈誨今往諸方學佛法去師曰若是佛法吾此間亦有少許曰如何是和尚佛法師於衣上拈起布毛吹之通遂領悟玄旨南陽慧忠國師肅宗問如何是十身調御師乃起立曰會麼帝曰不會師曰與老僧過淨瓶來又曰如何是無諍三昧師曰檀越蹋毗盧頂上行帝曰此意如何師曰莫認自己清淨法身肅宗到師指石獅子云陛下這石獅子奇特下取一轉語帝曰朕下語不得請師下語師曰山僧罪過後耽源問皇帝還會麼師曰皇帝會且置你作麼生會師問紫璘供奉佛是甚麼義曰覺義師曰佛曾迷否曰不曾迷師曰用覺作麼供奉註思益經師曰凡註經須會佛義始得曰若不會佛意爭解註經師令侍者盛一椀水中著七粒米椀面安一隻箸問奉是甚麼義奉無語師曰老僧意尚不會何況佛意師問禪客從何方來禪客曰南方來師曰南方知識如何示人曰彼方知識直下示學人即心是佛佛是覺義汝今悉具見聞覺知之性此性善能揚眉瞬目去來運用徧於身中挃頭頭知挃脚脚知故名正徧知離此之外更無別佛此身即有生滅心性無始以來未曾生滅身生滅者如龍換骨蛇蛻皮人出故宅即身是無常其性常也南方所說大約如此師曰若然者與彼先尼外道無有差別若以見聞覺知是佛性者淨名不應云法離見聞覺知若行見聞覺知是則見聞覺知非求法也僧又問法華了義開佛知見此復若為師曰經云開佛知見尚不言菩薩二乘豈以眾生癡倒便同佛之知見耶僧又問阿那箇是佛心師曰牆壁瓦礫是僧曰與經大相違也涅槃云離牆壁無情之物故名佛性今云是佛心未審心之與性為別不別師曰迷即別悟即不別曰經云佛性是常心是無常今云不別何也師曰汝但依語而不依義譬如寒月水結為冰及至暖時冰釋為水眾生迷時結性成心眾生悟時釋心成性若執無情無佛性者經不應言三界唯心宛是汝自違經吾不違也問無情既有佛性還解說法否師曰他熾然常說無有間歇曰某甲為甚麼不聞師曰汝自不聞曰誰人得聞師曰諸聖得聞曰眾生應無分耶師曰我為眾生說不為諸聖說曰某甲聾瞽不聞無情說法師應合聞師曰我亦不聞曰師既不聞爭知無情解說法師曰賴我不聞我若得聞則齊於諸聖汝則不聞我說法曰師但說無情有佛性有情復若為師曰無情尚爾況有情耶曰若然者南方知識云見聞覺知是佛性應不合判同外道師曰不道他無佛性外道豈無佛性耶但緣見錯於一法中而生二見故言非也曰佛身無罣礙今以有為窒礙之物而作佛身豈不乖於聖旨師曰大品經云不可離有為而說無為汝信色是空否曰佛之誠言那敢不信師曰色既是空寧有罣礙曰佛性一種為別師曰不得一種曰何也師曰或有全不生滅或半生半滅半不生滅曰孰為此解師曰我此間佛性全無生滅汝南方佛性半生半滅半不生滅曰如何區別師曰此則身心一如身外無餘所以全不生滅汝南方身是無常神性是常所以半生半滅半不生滅曰和尚色身豈得便同法身不生滅耶師曰汝那得入於邪道曰學人早晚入邪道師曰汝不見金剛經色見聲求皆行邪道今汝所見不其然乎曰師亦言即心是佛南方知識亦爾那有異同師不應自是而非他師曰或名異體同或名同體異因茲濫矣只如菩提涅槃真如佛性名異體同真心妄心佛智世智名同體異緣南方錯將妄心言是真心認賊為子有取世智稱為佛智猶如魚目而亂明珠不可雷同事須甄別常州僧靈覺問曰發心出家本擬求佛未審如何用心即得師曰無心可用即得成佛曰無心可用阿誰成佛師曰無心自成佛成佛亦無心曰無心即成佛和尚即今成佛未師曰心尚自無誰言成佛若有佛可成還是有心有心即有漏何處得無心曰既無佛可成和尚還得佛用否師曰心尚自無用從何有曰茫然都無莫落斷見否師曰本來無見阿誰道斷曰本來無見莫落空否師曰無空可落曰有可墮否師曰空既是無墮從何立曰山中逢見虎狼如何用心師曰見如不見來如不來彼即無心惡獸不能加害曰寂然無事獨脫無心名為何物師曰名金剛大士曰金剛大士有何體段師曰本無形段曰既無形段喚何物作金剛大士師曰喚作無形段金剛大士曰金剛大士有何功德師曰一念與金剛相應能滅殑伽沙劫生死重罪得見殑伽沙諸佛其金剛大士功德無量非口所說非意所陳無人能破壞者更不須問任意游行獨脫無畏常有河沙賢聖之所覆護所在之處常得河沙天龍八部之所恭敬河沙善神來護永無障礙何處不得逍遙僧問古德云青青翠竹盡是法身鬱鬱黃花無非般若有人不許云是邪說亦有信者云不思議不知若為師曰此蓋普賢文殊境界非諸凡小而能信受皆與大乘了義經意合故華嚴經云佛身充滿於法界普現一切羣生前隨緣赴感靡不周而常處此菩提座翠竹既不出於法界豈非法身乎又般若經云色無邊故般若亦無邊黃花既不越於色豈非般若乎深遠之言不省者難為措意於是禪客作禮而去僧問若為得成佛去師曰佛與眾生一時放却當處解脫曰作麼生得相應去師曰善惡不思自見佛性曰若為得證法身師曰越毗盧之境界曰清淨法身作麼生得師曰不著佛求耳曰阿那箇是佛師曰即心是佛曰心有煩惱否師曰煩惱性自離曰豈不斷耶師曰斷煩惱者即名二乘煩惱不生名大涅槃曰坐禪看靜此復若為師曰不垢不淨寧用起心而看淨相曰禪師見十方虗空是法身否師曰以想心取之則是顛倒見曰即心是佛還用修萬行否師曰諸聖尚皆具二嚴豈可撥無因果耶師將涅槃辭代宗代宗曰師滅度後弟子將何所記師曰告檀越造取一所無縫塔帝曰就師請取塔樣師良久曰會麼帝曰不會師曰貧道去後弟子應真却知此事乞詔問之後詔應真問前語真良久曰聖上會麼帝曰不會真述偈曰湘之南潭之北中有黃金充一國無影樹下合同船瑠璃殿上無知識耽源應真禪師麻谷問十二面觀音豈不是聖師曰是麻谷與師一摑師曰想汝未到此境圭峰宗密禪師山南溫造尚書問悟理息妄之人不復結業一期壽終之後靈性何依師曰一切眾生無不具有覺性靈明空寂與佛何殊但以無始劫來未曾了悟妄執身為我相故生愛惡等情隨情造業隨業受報生老病死長劫輪迴然身中覺性未曾生死如夢被驅役而身本安閒如水作冰而濕性不易若能悟此性即是法身本自無生何有依托靈靈不昧了了常知無所從來亦無所去然多生妄執習以性成喜怒哀樂微細流注真理雖然頓達此情難以卒除須常覺察損之又損如風頓止波浪漸停豈可一生所修便同諸佛力用但可以空寂為自體勿認色身以靈知為自心勿認妄念妄念若起都不隨之即臨命終時自然業不能繫雖有中陰所向自由天上人間隨意奇托若愛惡之念已泯即不受分段之身自能易短為長易麤為妙宗密有八句偈顯示此意於尚書處誦之偈曰作有義事是惺悟心作無義事是狂亂心狂亂隨情念臨終被業牽惺悟不由情臨終能轉業情中欲作而察理不應即須便止情中不欲作而照理相應即須便作但由是非之理不由愛惡之情即臨命終時業不能繫隨意自在天上人間也通而言之但朝暮之間所作被情塵所牽即臨終被業所牽而受生若所作所為由於覺智不由情塵即臨終由我自在而受生不由業也當知欲驗臨終受生自在不自在但驗尋常行心於塵境自由不自由無名老宿師曰祖師九年面壁為訪知音若恁麼會喫鐵棒有日在祖師九年面壁何不慚惶若恁麼會更買草鞋行脚三十年百丈懷海禪師馬祖一日問師甚麼處來師曰山後來祖曰逢著一人麼曰不逢著祖曰為甚麼不逢著曰若逢著即舉似和尚祖曰甚麼處得這消息來曰某甲罪過祖曰却是老僧罪過師謂眾曰有一人長不喫飯不道飢有一人終日喫飯不道飽師一日侍馬祖行次見一羣野鴨飛過祖曰是甚麼師曰野鴨子祖曰甚處去也師曰飛過去也祖遂把師鼻扭負痛失聲祖曰又道飛過去也師於言下有省師令僧去章敬處見伊上堂說法你便展開坐具禮拜起將一隻鞋以袖拂却上塵倒頭覆下其僧到章敬一依師旨章敬云老僧罪過有僧問抱璞投師請師一鑑師曰昨夜南山虎齩大蟲曰不謬真詮為甚麼不垂方便師曰掩耳偷鈴漢曰不遇中郎鑑還同野舍薪師便打曰蒼天蒼天師曰得與麼多口曰罕遇知音拂袖便行師曰百丈今日輸却一半南泉普願禪師師玩月次僧問幾時得似這箇去師曰王老師二十年前亦恁麼來曰即今作麼生師便歸方丈師問黃檗定慧等學明見佛性此理如何檗曰十二時中不依倚一物師曰莫是長老見處麼檗曰不敢師曰漿水錢且置草鞋錢教阿誰還師與魯祖歸宗杉山四人離馬祖處各謀住菴於中路相別次師插下拄杖云道得也被這箇礙道不得也被這箇礙宗拽拄杖打師一下云也只是這箇王老師說甚麼礙不礙魯云只此一句語大播天下陸大夫向師道肇法師也甚奇怪解道天地與我同根萬物與我一體師指庭前牡丹花曰大夫時人見此一株花如夢相似陸罔測僧問師歸丈室將何指南師曰昨夜三更失却牛天明起來失却火師示眾云喚作如如早是變了也如今師僧須向異類中行歸宗云雖行畜生行不得畜生報師云孟八郎漢又與麼去也師問僧云夜來好風僧云夜來好風師云吹折門前一株松僧云吹折門前一株松次問一僧云夜來好風僧云是甚麼風師云吹折門前一株松僧云是甚麼松師云一得一失師云三世諸佛不知有貍奴白牯却知有大溈智云三世諸佛既不知有貍奴白牯又何曾夢見灼然須知向上有知有底人始得師問維那今日普請作甚麼對曰拽磨師曰磨從你拽不得動著磨中心樹子那無語師在方丈與杉山向火次師曰不用指東指西直下本分事道來杉山插火箸叉手師曰雖然如是猶較王老師一線道鹽官海昌齊安國師僧問如何是本身盧舍那師曰與老僧過淨瓶來僧將淨瓶至師曰却安舊處著僧送至本處復來詰問師曰古佛過去久矣歸宗智常禪師師嘗與南泉同行後忽一日相別煎茶次南泉問曰從來與師兄商量語句彼此已知此後或有人問畢竟事作麼生師曰這一片地大好卓菴南泉曰卓菴且置畢竟事作麼生師乃打翻茶銚便起南泉曰師兄喫茶了普願未喫茶師曰作這箇語話滴水也難銷幽州寶積禪師上堂夫心月孤懸光吞萬象光非照境境亦非存光境俱亡復是何物上堂禪德可中學道似地擎山不知山之孤峻如石含玉不知玉之無瑕若如此者是名出家故導師云法本不相礙三際亦復然無為無事人猶是金鎖難所以靈源獨耀道絕無生大智非明真空無跡真如凡聖皆是夢言佛及涅槃並為增語禪德直須自看無人替代上堂三界無法何處求心四大本空佛依何住璿璣不動寂爾無言覿面相呈更無餘事珍重石鞏慧藏禪師師問西堂汝還解捉得虗空麼西堂曰捉得師曰作麼生捉西堂以手撮虗空師曰汝不解捉西堂却問師兄作麼生捉師把西堂鼻孔拽西堂作忍痛聲曰太煞拽人鼻孔直欲脫去師曰直須恁麼捉虗空始得鵝湖大義禪師唐憲宗詔入麟德殿論義有法師問欲界無禪禪居色界此土憑何而立禪師曰法師祇知欲界無禪不知禪界無欲曰如何是禪師以手點空法師無對帝曰法師講無窮經論祇這一點尚不奈何師却問諸碩德曰行住坐臥畢竟以何為道有對知者是道師曰不可以智知不可以識識安得知者是乎有對無分別者是師曰善能分別諸法相於第一義而不動安得無分別是乎有對四禪八定是師曰佛身無為不墮諸數安在四禪八定耶眾皆杜口伊闕伏牛自在禪師上堂曰即心即佛是無病求藥句非心非佛是藥病對治句僧問如何是脫灑底句師曰伏牛山下古今傳興善惟寬禪師僧問狗子還有佛性否師曰有曰和尚還有否師曰我無曰一切眾生皆有佛性和尚因何獨無師曰我非一切眾生曰既非眾生莫是佛否師曰不是佛曰究竟是何物師曰亦不是物曰可見可思否師曰思之不及議之不得故曰不可思議問道在何處師曰祇在目前曰我何不見師曰汝有我故所以不見曰我有我故即不見和尚還見否師曰有汝有我展轉不見曰無我無汝還見否師曰無汝無我阿誰求見楊岐甄叔禪師示眾曰羣靈一源假名為佛體竭形消而不滅金流朴散而常存性海無風金波自涌心靈絕兆萬像齊照體斯理者不言而徧歷河沙不用而功益玄化如何背覺反合塵勞於陰界中妄自囚執潭州華林善覺禪師師常持錫杖夜出林麓間七步一振錫一稱觀音名號夾山問遠聞和尚念觀音是否師曰然山曰騎却頭時如何師曰出頭即從汝騎不出頭騎甚麼山無對僧參方展坐具師曰緩緩曰和尚見甚麼師曰可惜許磕破鐘樓其僧從此悟入觀察使裴休訪之問曰還有侍者否師曰有一兩箇祇是不可見客裴曰在甚麼處師乃喚大空小空時二虎自菴後而出裴覩之驚悸師語虎曰有客且去二虎哮吼而去裴問曰師作何行業感得如斯師乃良久曰會麼曰不會師曰山僧常念觀世音襄州龐蘊居士至藥山山命十禪客相送至門首士乃指空中雪曰好雪片片不落別處有全禪客曰落在甚處士遂與一掌全曰也不得草草士曰恁麼稱禪客閻羅老子未放你在全曰居士作麼生士又掌曰眼見如盲口說如瘂偈曰心如境亦如無實亦無虗有亦不管無亦不拘不是聖賢了事凡夫易復易即此五蘊有真智十方世界一乘同無相法身豈有二若捨煩惱入菩提不知何方有佛地藥山惟儼禪師師參禮馬祖於言下契悟便禮拜祖曰你見甚麼道理便禮拜師曰某甲在石頭處如蚊子上鐵牛祖曰汝既如是善自護持侍奉三年一日祖問子近日見處作麼生師曰皮膚脫落盡惟有一真實祖曰子之所得可謂協於心體布於四肢既然如是將三條篾束取肚皮隨處住山去師曰某甲又是何人敢言住山祖曰不然未有常行而不住未有常住而不行欲益無所益欲為無所為宜作舟航無久住此師乃辭祖返石頭一日在石上坐次石頭問曰汝在這裏作麼師曰一物不為頭曰恁麼即閒坐也曰若閒坐即為也頭曰汝道不為不為箇甚麼曰千聖亦不識頭以偈讚曰從來共住不知名任運相將祇麼行自古上賢猶不識造次凡流豈可明石頭垂語曰言語動用沒交涉師曰非言語動用亦沒交涉頭曰我這裏針劄不入師曰我這裏如石上栽花頭然之坐次道吾雲巖侍立師指按山上枯榮二樹問道吾曰枯者是榮者是吾曰榮者是師曰灼然一切處光明燦爛去又問雲巖枯者是榮者是巖曰枯者是師曰灼然一切處放教枯澹去高沙彌忽至師曰枯者是榮者是彌曰枯者從他枯榮者從他榮師顧道吾雲巖曰不是不是僧問平田淺草麈鹿成羣如何射得麈中主師曰看箭僧放身便倒師曰侍者拖出這死漢僧便走師曰弄泥團漢有甚麼限看經次僧問和尚尋常不許人看經為甚麼却自看師曰我祇圖遮眼曰某甲學和尚還得也無師曰你若看牛皮也須穿師坐次僧問兀兀地思量甚麼師曰思量箇不思量底曰不思量底如何思量師曰非思量朗州刺史李翱問師何姓師曰正是時李不委却問院主某甲適來問和尚姓和尚曰正是時未審姓甚麼主曰恁麼則姓韓也師聞乃曰得恁麼不識好惡若是夏時對他便是姓熱李初嚮師玄化屢請不赴乃躬謁師師執經卷不顧侍者曰太守在此李性褊急乃曰見面不如聞名拂袖便去師曰太守何得貴耳賤目李回拱謝問曰如何是道師以手指上下曰會麼曰不會師曰雲在青天水在瓶李欣然作禮述偈曰鍊得身形似鶴形千株松下兩函經我來問道無餘話雲在青天水在瓶李又問如何是戒定慧師曰貧道這裏無此閒家具李罔測玄旨師曰太守欲保任此事須向高高山頂立深深海底行閨閣中物捨不得便為滲漏潭州長髭曠禪師師曹溪禮祖塔回參石頭頭問甚麼處來曰嶺南來頭曰大庾嶺頭一鋪功德成就也未師曰成就久矣祇欠點眼在頭曰莫要點眼麼師曰便請頭乃垂下一足師禮拜頭曰汝見箇甚麼道理便禮拜師曰據某甲所見如紅爐上一點雪天王道悟禪師師謁馬祖祖曰識取自心本來是佛不屬漸次不假修持體自如如萬德圓滿師於言下大悟祖囑曰汝若住持莫離舊處師蒙旨已便返荊門去郭不遠結草為廬節使來訪師不為加禮使怒擒師擲江中及歸見徧衙火發且聞空中天王神瞋責聲遂哀悔設拜煙𦦨頓息宛然如初乃躬往江邊迎師見師在水都不濕衣益自敬重於府西造天王寺供師龍潭信問從上相承底事如何師曰不是明汝來處不得潭曰這箇眼目幾人具得師曰淺草易為長蘆師常云快活快活及臨終時叫苦苦又云閻羅王來取我也院主問曰和尚當時被節使拋向水中神色不動如今何得恁麼地師舉枕子云汝道當時是如今是院主無對黃檗希運禪師百丈一日因普請開田回問師曰運闍黎開田不易師曰隨眾作務丈曰有煩道用師曰爭敢辭勞丈曰開得多少田師將钁築地三下丈便喝師掩耳而去一日捧鉢向南泉位上坐泉入堂見乃問長老甚年行道師曰威音王已前泉曰猶是王老師兒孫下去師便過第二位坐泉休去泉一日曰老僧有牧牛歌請長老和師曰某甲自有師在師辭南泉泉門送提起師笠曰長老身材沒量大笠子太小生師曰雖然如此大千世界總在裏許泉曰王老師呢師戴笠便行裴相國一日托一尊佛於師前跪曰請師安名師召曰裴休公應諾師曰與汝安名竟公禮拜師一日揑拳曰天下老和尚總在這裏我若放一線道從汝七縱八橫若不放過不消一揑僧問放一線道時如何師曰七縱八橫曰不放過不消一揑時如何師曰普示裴公美曰諸佛與一切眾生唯是一心更無別法此心無始已來不曾生不曾滅不青不黃無形無相不屬有無不計新舊非長非短非大非小惟此一心即是佛佛與眾生更無別異若觀佛作清淨光明解脫之相觀眾生作垢濁暗昧生死之相作此解者歷河沙劫終不得菩提為著相故唯此一心更無微塵許法可得即心是佛如今學道人不悟此心體便於心上生心向外求佛著相修行皆是惡法非菩提道維摩者淨名也淨者性也名者相也性相不異故號淨名諸大菩薩所表者人皆有之不離一心悟之即是今學道人不向自心中悟乃於心外著相取境皆與道背恒河沙者佛說是沙諸佛菩薩釋梵諸天步履而過沙亦不喜牛羊蟲蟻踐踏而行沙亦不怒珍寶馨香沙亦不貪糞尿臭穢沙亦不惡此心即無心之心離一切相眾生諸佛更無差別但能無心便是究竟學道人若不直下無心累劫修行終不成道造惡造善皆是著相著相造惡枉受輪迴著相造善枉受勞苦總不如言下便自認取本法此法即心心外無法此心即法法外無心心自無心亦無無心者將心無心心却成有默契而已絕諸思議故曰言語道斷心行處滅此心是本源清淨佛人皆有之蠢動含靈與諸佛菩薩一體不異深自悟入直下便是圓滿具足更無所欠師云若欲得知要訣但莫於心上著一物言佛真法身猶若虗空此是喻法身即虗空虗空即法身常人謂法身徧虗空處虗空中含容法身不知法身即虗空虗空即法身也若定言有虗空虗空不是法身若定言有法身法身不是虗空但莫作虗空解虗空即法身莫作法身解法身即虗空虗空與法身無異相佛與眾生無異相生死與涅槃無異相煩惱與菩提無異相離一切相即是佛凡夫取境道人取心心境雙亡乃是真法忘境猶易忘心至難人不敢忘心恐落空無撈摸處不知空本無空唯一真法界耳夫學道者若以一切時中心有常見即是常見外道若觀一切法空作空見者即是斷見外道所以三界唯心萬法唯識若但不說本祇說末不說迷祇說悟不說體祇說用總無你話論處他一切法且本不有今亦不無緣起不有緣滅不無本亦不有本非本故心亦不心心非心故相亦非相相非相故所以道無法無本心始解心心法法即非法非法即法無法無非法故是心心法既若如此故知一切法性自爾即不用愁他慮他如言前念是凡後念是聖如手翻覆一般此是三乘教之極也據我禪宗中前念且不是凡後念且不是聖前念不是佛後念不是眾生所以一切色是佛色一切聲是佛聲舉著一理一切理皆然見一事見一切事見一心見一切心見一道見一切道一切處無不是道見一塵十方世界山河大地皆然見一滴水即見十方世界一切性水又見一切法即見一切心一切法本空心即不無不無即妙有有亦不有不有即有即真空妙有既若如是十方世界不出我之一心一切微塵國土不出我之一念若然說甚麼內之與外如蜜性甜一切蜜皆然世間出世間乃至六道四生山河大地有性無性元同一體言同者名相亦空有亦空無亦空盡恒沙世界元是一空故達摩大師從西天來至此土經多少國土祇覓得可大師一人密傳心印印你本心以心印法以法印心心既如此法亦如此同真際等法性法性空中誰是授記人誰是成佛人誰是得法人他分明向你道菩提者不可以身得身無相故不可以心得心無相故不可以性得性即便是本源自性天真佛故不可以佛更得佛不可以無相更得無相不可以空更得空不可以道更得道本無所得無得亦不可得所以道無一法可得祇教你了取本心當下了時不得了相無了無不了相亦不可得如此之法得者即得得者不自覺知不得者亦不自覺知如此之法從上已來有幾人得知所以道天下忘己者有幾人師云凡人多為境礙心事礙理常欲逃境以安心屏事以存理却不知乃是心礙境理礙事但令心空境自空但令理寂事自寂勿倒用心也凡人多不肯空心恐落於空不知自心本空愚人除事不除心智者除心不除事示眾自如來付法迦葉已來以心印心心心不異印著空即印不成文印著物即印不成法故以心印心心心不異能印所印俱難契會故得者少然心即無心得即無得一日云學般若人不見有一法可得絕意三乘惟一真實不可云證得謂我能證能得皆增上慢人法華會上拂衣而去者皆斯徒也故佛言我於菩提實無所得默契而已凡人臨欲終時但觀五蘊皆空四大無我真心無恒不去不來生時性亦不來死時性亦不去湛然圓寂心境一如但能如是直下頓了不為三世所拘繫便是出世人也切不得有分毫趣向若見善相諸佛來迎及種種現前亦無心隨去若見惡相種種現前亦無心怖畏但自忘心同於法界便得自在此即是要節也師云我此禪宗從上相承已來不曾教人求知求解只云學道早是接引之辭然道亦不可學情存學解却成迷道道無方所名大乘心此心不在內外中間實無方所第一不得作知解情量若盡心無方所此道天真本無名字僧問妄能障自心未審而今以何遣妄師云起妄遣妄亦成妄妄本無根祇因分別而有你但於凡聖兩處情盡自然無妄不得有纖毫依執云既無依執當何相承師云以心傳心云若心相傳云何言心亦無師云不得一法名為傳心若了此心即是無心無法云若無心無法云何名傳師云汝聞道傳心將謂有可得耶所以祖師云認得心性時可說不思議了了無所得得時不說知此事若教汝會何堪也問和尚現今說法何得言無僧亦無法師云汝若見有法可說即是以音聲求我若見有我即是處所法亦無法法即是心所以祖師云付此心法時法法何曾法無法無本心始解心心法實無一法可得名坐道場道場者祇是不起諸見悟法本空喚作空如來藏本來無一物何處有塵埃若得此中意逍遙何所論問聖人無心即是佛凡夫無心莫沈空寂否師云法無凡聖亦無沈寂法本不有莫作無見法本不無莫作有見有之與無盡是情見猶如幻翳所以云見聞如幻翳知覺乃眾生祖師門中只論息機忘見所以忘機則佛道隆分別則魔軍熾問本既是佛那得更有四生六道種種形貌不同師云諸佛體圓更無增減流入六道處處皆圓萬類之中箇箇是佛譬如一團水銀分散諸處顆顆皆圓若不分時祇是一塊此一即一切一切即一種種形貌喻如屋舍捨驢屋入人屋捨人身至天身乃至聲聞緣覺菩薩佛屋皆是汝取捨處所以有別本源之性何得有異長慶大安禪師雪峰因入山採得一枝木其形似蛇於背上題曰本自天然不假雕琢寄與師師曰本色住山人且無刀斧痕清田和尚師與瑫上座煎茶次師敲繩牀三下瑫亦敲三下師曰老僧敲有箇善巧上座敲有何道理瑫曰某甲敲有箇方便和尚敲作麼生師舉起盞子瑫曰善知識眼應須恁麼茶罷瑫却問和尚適來舉起盞子意作麼生師曰不可更別有也大慈寰中禪師杭州大慈山寰中禪師蒲坂盧氏子參百丈受心印辭往南嶽常樂寺結茅山頂一日南泉至問如何是菴中主師曰蒼天蒼天南泉曰蒼天且置如何是菴中主師曰會即便會莫忉忉南泉拂袖而出僧辭師問甚麼處去曰江西去師曰我勞汝一段事得否曰和尚有甚麼事師曰將取老僧去得麼曰更有過於和尚者亦不能將去師便休僧後舉似洞山洞山曰闍黎爭合恁麼道曰和尚作麼生洞山曰得洞山又問其僧大慈別有甚麼言句曰有時示眾曰說得一丈不如行取一尺說得一尺不如行取一寸洞山曰我不恁麼道曰和尚作麼生洞山曰說取行不得底行取說不得底石霜性空禪師僧問如何是祖師西來意師云如人在千尺井中不假寸繩出得此人即答汝西來意僧曰近日湖南暢和尚出世亦為人東語西話師喚沙彌拽出這死屍著沙彌即仰山山後問耽源如何出得井中人源曰咄癡漢誰在井中山復問溈山溈召慧寂山應諾溈曰出也仰山住後常舉前語謂眾曰我在耽源處得名溈山處得地長沙景岑招賢禪師上堂我若一向舉揚宗教法堂前須草深一丈事不獲已向汝諸人道盡十方世界是沙門眼盡十方世界是沙門全身盡十方世界是自己光明盡十方世界在自己光明裏盡十方世界無一人不是自己我常向汝諸人道三世諸佛法界眾生是摩訶般若光光未發時汝等諸人向甚麼處委悉光未發時尚無佛無眾生消息何處得山河國土來時有僧問如何是沙門眼師曰長長出不得又曰成佛成祖出不得六道輪迴出不得僧曰未審出箇甚麼不得師曰晝見日夜見星曰學人不會師曰妙高山色青又青師游山歸首座問和尚甚處去來師曰游山來座曰到甚麼處師曰始從芳草去又逐落花回座曰大似春意師曰也勝秋露滴芙蕖有秀才看千佛名經問曰百千諸佛但見其名未審居何國土還化物也無曰黃鶴樓崔顥題後秀才還曾題也未曰未曾曰得閒題取一篇好僧問本來人還成佛也無師曰汝見大唐天子還自種田割稻麼曰未審是何人成佛師曰是汝成佛僧無語師曰會麼曰不會師曰如人因地而倒依地而起地道甚麼問向上一路請師道師曰一口針三尺線曰如何領會師曰益州布揚州絹師示偈曰百尺竿頭不動人雖然得入未為真百尺竿頭須進步十方世界是全身僧便問祇如百尺竿頭如何進步師曰朗州山澧州水曰不會師曰四海五湖皇化裏竺尚書問蚯蚓斬為兩段兩頭俱動未審佛性在阿那頭師曰莫妄想曰爭奈動何師曰會即風火未散書無對師喚尚書書應諾師曰不是尚書本命曰不可離却即今祗對別有第二主人師曰喚尚書作至尊得麼曰恁麼總不祗對時莫是弟子主人否師曰非但祗對與不祗對時無始劫來是箇生死根本示偈曰學道之人不識真祇為從來認識神無始劫來生死本癡人喚作本來人僧問如何轉得山河國土歸自己去師曰如何轉得自己成山河國土去曰不會師曰湖南城下好養民米賤柴多足四鄰僧無語師示偈曰誰問山河轉山河轉向誰圓通無兩畔法性本無歸示眾若心是生則夢幻空華亦應是生若身是生則山河大地萬象森羅亦應是生問教中說幻意是有耶師曰大德是何言歟曰恁麼則幻意是無耶師曰大德是何言歟曰恁麼則幻意是不有不無耶師曰大德是何言歟曰如某三明盡不契於幻意未審和尚如何明教中幻意師曰大德信一切法不思議否曰佛之誠言那敢不信師曰大德言信二信之中是何信曰如某所明二信之中是名緣信師曰依何教門得生緣信曰華嚴云菩薩摩訶薩以無障無礙智慧信一切世間境界是如來境界又華嚴云諸佛世尊悉知世法及諸佛法性無差別決定無二又華嚴云佛法世間法若見其真實一切無差別師曰大德所舉緣信教門甚有來處聽老僧與大德明教中幻意若人見幻本來真是則名為見佛人圓通法法無生滅無滅無生是佛身華嚴座主問虗空為是定有為是定無師曰言有亦得言無亦得虗空有時但有假有虗空無時但無假無曰如和尚所說有何教文師曰大德豈不聞首楞嚴云十方虗空生汝心內猶如片雲點太清裏豈不是虗空生時但生假名又云汝等一人發真歸元十方虗空悉皆銷殞豈不是虗空滅時但滅假名老僧所以道有是假有無是假無問如何是文殊師曰牆壁瓦礫是曰如何是觀音師曰音聲語言是曰如何是普賢師曰眾生心是曰如何是佛師曰眾生色身是曰河沙諸佛體皆同何故有種種名字師曰從眼根返源名文殊耳根返源名觀音從心返源名普賢文殊是佛妙觀察智觀音是佛無緣大慈普賢是佛無為妙行三聖是佛之妙用佛是三聖之真體用則有河沙假名體則總名一薄伽梵皓月供奉問天下善知識證三德涅槃也未師曰大德問果上涅槃因中涅槃曰問果上涅槃師曰天下善知識未證曰為甚麼未證師曰功未齊於諸聖曰功未齊於諸聖何為善知識師曰明見佛性亦得名為善知識曰未審功齊何道名證大涅槃師示偈曰摩訶般若照解脫甚深法法身寂滅體三一理圓常欲識功齊處此名常寂光曰果上三德涅槃已蒙開示如何是因中涅槃師曰大德是初師久依南泉有投機偈曰今日還鄉入大門南泉親道徧乾坤法法分明皆祖父回頭慙愧好兒孫泉答曰今日投機事莫論南泉不道徧乾坤還鄉盡是兒孫事祖父從來不出門鄂州茱萸和尚上堂擎起一橛竹曰還有人虗空裏釘得橛麼時有靈虗上座出眾曰虗空是橛師便打虗曰莫錯打師便下座子湖巖利蹤禪師示眾諸法蕩蕩何絆何拘汝等於中自生難易心源一統緜亘十方上上根人自然明白自古及今未曾有一箇凡夫聖人出現汝前亦無有一善語惡語到汝分上為甚麼故為善善無形為惡惡無相既已無我把甚麼為善惡立那箇是凡聖汝信否還保任否有甚麼迴避處恰似日中逃影相似還逃得麼今之既爾古之亦然今古齊時汝還諱得麼佛法玄妙了得者自相䇿發無為小緣妨於大事汝不見道寧可終身立法誰能一旦忘緣仁者要得會禪麼各歸衣鉢下看僧問如何是大圓鏡師云一切物著不得進云為甚麼一切物著不得師云汝是一切物還著得汝否師曰仁者本自具足本自周備直教無纖塵法礙你眼光始得若有微塵底不盡不是一生半劫賺汝皮囊汝性命根境法中造諸妖怪山精鬼魅附汝行持得少為足鼓弄片皮於佛法却為毒害譏禮塔廟毀彼持經則成師子身中蟲自食師子身中肉師曰仁者豈不見目前太虗還有纖毫欠少處麼若也於中體得這箇消息不妨出得凡聖境界了得世間出世間之智一法既爾萬法亦然仁者還樂也無示眾天上人間輪迴六道乃至蠢動含靈未曾於此一分真如中有些子相違處還信麼還領受得麼大凡行脚也須具大信根作箇丈夫始得何處得與麼難信他古人只見道箇即心是佛即心是法便承信去隨處茅茨石室長養聖胎只待道果成熟汝今何不效他行取仁者可煞分明並無參雜治生產業與諸實相不相違背靈鷲閑禪師明水和尚問如何是頓獲法身師曰一透龍門雲外望莫作黃河點額魚仰山問寂寂無言如何視聽師曰無縫塔前多雨水新羅大茅和尚上堂欲識諸佛師向無明心內識取欲識常住不凋性向萬物遷變處識取湖南祗林和尚師每叱文殊普賢皆為精魅手持木劍自謂降魔纔見僧來參便曰魔來也魔來也以劍亂揮歸方丈如是十二年後置劍無言僧問十二年前為甚麼降魔師曰賊不打貧兒家曰十二年後為甚麼不降魔師曰賊不打貧兒家道吾宗智禪師師預藥山法會密契心印一日山問子去何處來師曰遊山來山曰不離此室速道將來師曰山上烏兒頭似雪㵎底遊魚忙不徹師一日提笠出雲巖指笠曰用這箇作甚麼師曰有用處巖曰忽遇黑風猛雨來時如何師曰葢覆著巖曰他還受葢覆麼師曰然雖如是且無滲漏有施主施裩藥山提起示眾曰法身還具四大也無有人道得與他一腰裩師曰性地非空空非性地此是地大三大亦然藥山曰與汝一腰裩雲巖曇晟禪師師問僧甚處來曰添香來師曰還見佛否曰見師曰甚麼處見曰下界見師曰古佛古佛道吾問大悲千手眼那箇是正眼師曰如人夜間背手摸枕子吾曰我會也師曰作麼生會吾曰徧身是手眼師曰道也太煞道祇道得八成吾曰師兄作麼生師曰通身是手眼師掃地次道吾曰太區區生師曰須知有不區區者吾曰恁麼則有第二月也師豎起掃帚曰是第幾月吾便行院主遊石室回師問云汝去入到石室裏許為祇恁麼便回院主無對洞山代曰彼中已有人占了也師曰汝更去作甚麼洞山曰不可人情斷絕去也華亭船子德誠禪師師至秀州華亭泛一小舟隨緣度日以接四方往來之眾時人莫知其高蹈因號船子和尚一日泊船岸邊閒坐有官人問如何是和尚日用事師豎橈子曰會麼官人曰不會師曰棹撥清波金鱗罕遇後夾山散眾束裝直造華亭師纔見便問大德住甚麼寺山曰寺即不住住即不似師曰不似似箇甚麼山曰不是目前法師曰甚處學得來山曰非耳目之所到師曰一句合頭語萬劫繫驢橛師又問垂絲千尺意在深潭離鉤三寸子何不道山擬開口被師一橈打落水中山纔上船師又曰道道山擬開口師又打山豁然大悟乃點頭三下師曰竿頭絲線從君弄不犯清波意自殊山遂問拋綸擲釣師意如何師曰絲懸綠水浮定有無之意山曰語帶玄而無路舌頭談而不談師曰釣盡江波金鱗始遇山乃掩耳師曰如是如是遂囑曰汝向去直須藏身處沒蹤跡沒蹤跡處莫藏身吾三十年在藥山祇明斯事汝今已得他後莫住城隍聚落但向深山裏钁頭邊覓取一箇半箇接續無令斷絕山乃辭行頻頻回顧師遂喚闍黎山乃回首師豎起橈子曰汝將謂別有乃覆船入水而逝澧州高沙彌師住菴後一日歸省藥山值雨山曰你來也師答曰是山曰可煞濕師曰不打這箇鼓笛雲巖曰皮也無打甚麼鼓道吾曰鼓也無打甚麼皮山曰今日大好一場曲調藥山問曰汝從看經得請益得師曰不從看經得亦不從請益得山曰大有人不看經不請益為甚麼不得師曰不道他不得祇是不肯承當山齋時自打鼓師捧鉢作舞入堂山便擲下鼓槌曰是第幾和師曰是第二和山曰如何是第一和師就桶舀一杓飯便出仙天禪師洛瓶和尚參師問甚處來洛瓶曰南溪師曰還將南溪消息來麼曰消即消已息即未息師曰最苦是未息洛瓶曰且道未息箇甚麼師曰一回見面千載忘名洛瓶拂袖便出師曰弄死蛇手有甚麼限三平義忠禪師師初參石鞏鞏常張弓架箭接機師詣法席鞏曰看箭師乃撥開胸曰此是殺人箭活人箭又作麼生鞏彈弓弦三下師乃禮拜鞏曰三十年張弓架箭祇射得半箇聖人遂抝折弓箭後參大顛舉前話顛曰既是活人箭為甚麼向弓弦上辨師無對顛曰三十年後要人舉此話也難得師問大顛不用指東劃西便請直指顛曰幽州江口石人蹲師曰猶是指東劃西顛曰若是鳳凰兒不向那邊討師作禮顛曰若不得後句前話也難圓師有偈曰即此見聞非見聞無餘聲色可呈君箇中若了全無事體用何妨分不分睦州道明尊宿師一日晚參謂眾曰汝等諸人還得箇入頭處也未若未得箇入頭處須覓箇入頭處若得箇入頭處已後不得孤負老僧時有僧出禮拜曰某甲終不敢孤負和尚師曰早是孤負我了也紫衣大德到禮拜師問曰所習何業曰惟識師曰作麼生說曰三界惟心萬法惟識師指門扇曰這箇是甚麼曰是色法師曰簾前賜紫對御談經何得不持五戒德無對僧問如何是觸途無滯底句師曰我不恁麼道曰師作麼生道師曰箭過西天十萬里却向大唐國裏等候秀才訪師稱會二十四家書師以拄杖空中點一點曰會麼秀才罔措師曰又道會二十四家書永字八法也不識新到參方禮拜師叱曰闍黎因何偷常住果子喫曰學人纔到和尚為甚麼道偷果子師曰贓物現在師問講金剛經僧荷擔如來即不問你寺門前金剛為甚麼入你鼻孔裏僧云和尚甚麼說話師云你講得夢裏問僧甚麼處來云靈山來師曰近日打殺一門僧是否僧無語師云這箇蝦蟆僧問寺門前金剛拓即乾坤大地不拓即絲髮不逢時如何師曰吽吽我不曾見此問教意祖意是同是別師曰青山自青山白雲自白雲曰如何是青山師曰還我一滴雨來曰道不得請師道師曰法華鋒前陣涅槃句後收問如何是展演之言師曰量才補職曰如何是不展演之言師曰伏惟尚饗問以一重去一重即不問不以一重去一重時如何師曰昨朝栽茄子今日種冬瓜問一氣還轉得一大藏教也無師曰有甚麼饆饠䭔子快下將來問僧甚處來僧云那邊劄師曰老僧屈僧云和尚即得師曰擔枷過狀擗脊便打問僧幾人新到云五人師云瓦解冰消僧云和尚未曾有問師云賊把贓為驗烏石靈觀禪師師問西院此一片地堪著甚麼物西院曰好著箇無相佛師曰好片地被兄放不淨污了也剗草次問僧汝何處去曰西院禮拜安和尚去時竹上有一青蛇師指蛇曰欲識西院老野狐精祇這便是大隨法真禪師僧問路逢古佛時如何師曰你忽逢驢駝象馬喚作甚麼僧問劫火洞然大千俱壞未審這箇壞不壞師曰壞曰恁麼則隨他去也師曰隨他去僧不肯後到投子舉前話子遂裝香遙禮曰西川古佛出世謂其僧曰汝速回去懺悔問僧甚處去曰西山住菴去師曰我向東山頭喚汝汝便來得麼曰不然師曰汝住菴未得福州壽山師解禪師閩帥問壽山年多少師曰與虗空齊年曰虗空年多少師曰與壽山齊年新興嚴陽尊者僧問如何是佛師曰土塊曰如何是法師曰地動也曰如何是僧師曰喫粥喫飯問如何是新興水師曰面前江裏婺州木陳從朗禪師因金剛到僧問既是金剛不壞身為甚麼却倒地師敲禪牀曰行住坐臥日容遠和尚因豁上座參師
北斗裏藏身意旨如何王云因慈悲故有落草之談云如三脚驢子弄蹄行八角磨盤空裏走是何言也王云因落草故有慈悲之談云佛經為何不見有此說話王笑云因佛不慈悲不落草所以不言及此僧問不與萬法為侶者什麼人王云即內不即外離二不離一云恁麼則是法住法位世間相常住也王云日落西山月昇東海云可作得中心樹子也未王云還見四方八面麼云作麼生行履即得王云泥牛奔入海底羚羊掛角松梢僧問萬里不掛片雲時如何王云萬里不掛片雲云為何又道青天也須喫棒王云萬里自不掛片雲與青天有何交涉云恁麼則恁麼去也王云青天也須喫棒云前言何在王云因有前言乃舉後語云莫非末後句也王云將什麼喚作最初句僧禮謝王云無始有終的衲子三十年後覓一箇半箇也難得一日賞花次王云人欲修佛極易之事不必千經萬卷佛言若能轉物即同如來只此一句即可成佛世尊乃大慈悲父如語真語實語者有一侍從云眾生如何被物轉王云賞花從者云如來如何轉物王云花賞者云眾生隨波逐浪如來如何行履王云鈍置漢浪逐波隨也道不出者云若如此極易也喫飯但言飯喫睡覺但言覺睡即可謂同如來耶王喝一喝云是你聽見我喝是我喝見你聽者云自然是奴才聽見主喝王笑云真正聽喝的奴才是日大風有僧問曰風鼓塵也塵鼓風也王云好好一箇圓球被汝擘作兩半云大有人未肯點首在王云一口吸盡西江堪作什麼僧於言下大省王歎云雖然蒼海不覺闊易清天不覺空難有僧問靜喧語默如何通不犯去王云飲啖珍饈不知百味云恁麼則枯木寒灰去也王云即此用始得云恁麼則鑊湯爐炭去也王云離此用始得云如何行履王云耳觀目聽去云向上還有事也無王云有云乞請指示王云耳亦觀不著目也聽不著中秋月初八上弦夜對月閑坐王云好月不圓不缺好箇時節侍從無語王云從前弘覺忞禪師舉仰山玩月次山指月問者箇月尖時圓相向甚麼處去圓時尖相又向甚麼處去石室云尖時圓相隱圓時尖相在雲門別云尖時圓相在圓時無尖相道吾云尖時亦不尖圓時亦不圓時師會下有一僧云逢尖即尖遇圓即圓師自別云尖時圓相尖圓時尖相圓弘覺大似將張三作李四者僧韓盧逐塊道吾躲跟石室龍頭蛇尾雲門猶較些子雖然如是如是未免有者箇在圓明即不然是尖不見尖是圓不見圓恁麼說話還有檢點者麼智者見之謂之智仁者見之謂之仁不是與人難共處大都緇素要分明一日同僧齋次王舉昔日黃龍心與夏公立譚肇論論會情與無情共一體時有狗子臥香桌下龍拈尺擊狗子又擊香桌云狗子有情則去香桌無情自住情與無情如何成一體公立不能對靈嵓慍云要會情與無情共一體鎚殺有情狗子碎却無情香桌將來與他一團束縛拋向大洋海自然灑灑落落弘覺忞云何如有情狗子仍教他守夜無情香桌且留支用要會情與無情共一體但將擬議思量的與他一刀兩段則十方空蕩蕩地自然常光見前喚甚有情無情與你為礙為緣據圓明看來二老俱涉功勳不免勉強作主非的實之論各為公立代一語看有云恁麼則兩重公案者王云一任雙參有云分疏即不堪者王云不分疏可堪那有云狗子不動香桌走者王云各人且掃門前雪有云還識香桌狗子麼者王云躲跟到那里去有云香桌狗子一狀領過者王云闍黎也少不得在裏許眾云王爺却如何代王云狗子擊則去香桌擊不動此正有情無情共一體處一日同僧坐次王云文殊從無住本立一切法圓明從一切法立無住本問諸仁者同異在什麼處有云翻手雲覆手雨者有云今日瞻仰者有云黃河九曲水出崑崙者有云著珍服掛垢衣須是王爺始得者有云王爺陞堂文殊放參者王云俱未在文殊先天而天弗違圓明後天而奉天時且道圓明與文殊是同是異有云昔日文殊今朝王爺者有云文殊途中家舍王爺家舍途中者有云同則總同異則總異者有云文殊不識王爺王爺不識文殊者有云喚王爺作文殊亦得喚文殊作王爺亦得者王云俱非圓明境界文殊是圓明圓明不是文殊閑坐次眾護衛侍側有一侍從問云如何是奴才的真我王自指云是我從者云小人豈敢當王云實話者云若然王爺將何為我王云是你者云如何是主僕的你我王復指一人云是他眾皆不解王云佛法平等無人我貴賤是非之分者曰若然將子孫喚祖父可乎王云善哉此問一切眾生皆因執幻我故所以孝慈亦皆成幻孝幻慈執有我故所以有孝有不孝有慈有不慈菩薩因無我故上與諸佛同一慈力下與眾生同一悲仰孝敬祖父則同悲仰慈愛子孫則同慈力如此則只有孝慈而覓不孝不慈了不可得是則名為真孝真慈即此孝慈便是真我推而言之萬事萬理皆然華嚴經云以菩提心為家以如理修行為家法古德云佛法不壞世間相如井底之蛙坐井窺天之凡愚謗釋門如楊朱墨翟之邪見外道謂之無父無君者何異仰面唾雲自取辱耳此皆未見顏色之瞽論汝等切莫惑此邪說吾儒聖人切言世間之法而罕言命與仁者非棄出世間法也恐凡愚著空見故也佛釋之切言出世間法而罕言是與非者非棄世間法也恐凡愚著有見故也釋教實有補於聖人之明德新民克己復禮之教聖教實有補於佛言之戒行功德因緣果報之教中外二聖實互為表裏化人度世之慈恩實無同異聖佛合一之微旨非凡夫知識之所能推口筆之所能示惟證乃知難可測者須各努力參究余實達一貫之宗非強立分別之論決不相賺侍從一人問曰如何是無所住心王云明來明住暗來暗住色來色住空來空住從者云此有所住心也王云又道無所住者云下愚實甚生疑王云將你的疑給我來者云小人自己的疑如何與得王主王云既如此我的不疑又何法與汝也者默然王笑云參一從者問牛過窗櫺頭角四蹄都過了為甚尾巴過不得王云你看見牛過窗來那云未曾王云且莫聽人愚弄云過去祖師豈有誑語王云自然祖師豈有誑語云王爺前言何在王云實話且莫聽人愚弄者茫然王笑云莫輕視人圓明也是箇不打誑語的小祖師一從者問玄沙道聾瞽喑啞人作麼生接倘遇此等人王爺便作麼生王云薰香接者云設復塞却鼻孔又如何王云與他服麻木藥喫者云恁麼則更毫無知識也奈何王云已為汝接竟從者不解王云看來你較此病人却更覺難接一從者問香巖道口啣樹枝手脚俱不攀踏有人問西來意答即喪身失命不答又辜負他來意却如何是好王云你設身在樹上問樹下問者云設身樹上王云那來問的你道是好心是不好心者云有什麼好心王云似此不好心的人采他作麼雖然下樹始得安穩熱河有僧問一塵入正受諸塵三昧起意旨如何王云我皇巡狩中外歡迎云還登寶殿也不王云不是不登如同行在云四海五湖王化裏也王云清風明月綠水青山有什麼交涉云恁麼則同中不說異異裏不言同也王云分別即不得云如何操履王云大德道此去京城多少路僧禮謝王云不可將途中作家舍僧云又道家舍不離途中王云將謂上座作如是解一侍從問透網金鱗以何為食王云喫土云學人不解王云逃坑落塹不喫土喫什麼復云透網金鱗以何為命王云以火為命云學人更不解王云避溺投火自然以火為命從者默然王云解得無語不解無語云仍然不解王云好箇消息可惜只多了箇不解僧問如何是有一人盡力入不得王云鳶飛戾天云有一人盡力出不得王云魚躍於淵云二人相去多少王云上下察也僧問天不能葢地不能載恒沙閙市裏請王爺指出一箇來王云問他第二月作麼云如何是月王云到即不點云即恁麼去也王云保任保任一侍從問如何是佛祖的的之法王云你問我答從者云王爺不曾答王云我不答你不問者云若然則問與不問答與不答皆是的的法也王云問與不問答與不答皆不是的的法者云學人不會求王爺開示的的佛祖之法王笑云除此之外將何的的佛祖法與你說者默然王云向上一句又被你占了更沒得說也有僧問一物不將來時如何王云貪官遭籍沒云萬物皆備於我却作麼生王云也是乞兒獲小利云兩途不取不捨如何行履王云清清著云清清與惺惺是同是別王云惺惺有不清清之時清清無不惺惺之理云向上還有事也無王云有云請王指示王云千峰勢到處萬派聲歸時云此時此處可通一消息否王云今日十五不可說俟到初一慢商量有僧問一人門內出不得一人門外入不得事如何王云憑空築堵牆作麼僧云渠却出入得自由王云何苦走出走入僧云恁麼則皇風成一片何處覓封疆王云還我中心樹子來云祖父從來不出門王笑云大好拆却牆僧作掌勢王云者便是牆僧一喝王云者便是門云請王出入看王云我王府內無如是奴僧無語王云伎倆應盡闍黎無過云到此王爺作麼生道王云代汝一語還我王府來僧稽首云果然作家雍親王王云幸不是知音南來二僧參見方入堂王云二大德余一人認得一人不認得二僧云某某皆係初見尊駕王云圓明言的是前生僧云王爺莫非宿命通也王云非是圓明宿命通自是闍黎未會前生話云未生前話如何王云一識一不識二僧欣笑作禮王云亦不可作兩說茶次王云一人喫茶一人茶喫云前三三後三三王云却又不是者箇道理有僧問我是有如何王云須待有現云我是空如何王云須待空現云向來葛藤如何安置王云如同有會云終非究竟王云用無𦦨冰火去云恁麼則洪爐一點雪也王云珍重僧大展禮云將此身心奉塵剎何以仰報我王恩王云知恩即不得僧感泣禮謝云又是一重恩爭能不感激王笑云瞎驢又恁麼去柏林僧至府坐次問如何是庭前柏樹子王云你道柏林寺裏明日放堂明日打齋一道者問太陽溢目萬里不掛片雲意旨如何王云汝但去人看有儒士問三教之同異王云若論以內三教實同一道不可泥於迹象涉於事為而妄生分別也儒以修齊治平設教道以虗無清淨設教究其所以示人者不能外者箇而釋教亦不捨離者箇既不捨離即此內而言則不謂之一貫不可也若以之外周孔黃老之書未言及此能明此者惟有釋典耳下士愚盲小智見淺謂以內尚不明了何暇究以外不知以內者倚以外者而立若不明以外則以內無論不能頓地透脫即使到得盡處猶有者箇在人但知拘滯生死不知窮其無生不死此一大關惟此一路方透即以佛教而論如講演戒律何嘗不與宗為一貫必須宗為之統攝離宗則盡屬幻作宗乃第一義也然一亦不立方是佛旨即此觀彼自明三教分合之定論圓明寧甘汝等迂儒之謗斷不忍令眾生長溺苦海而不拯救指迷也士聞愕然諾諾而退四月八日月下坐次有從者指月問云那一半為何不見王云理合如是有儒士問如何是六般神用王云穴裏工人只須兩箇不兩箇溪邊閒步一書生問如何得似碧潭光皎潔去王云減去目下一點僧問了明此事有捷徑直指之道否王云有總不出佛經祖意但人疏忽而不省耳如三藏十二部無非敷演色即是空空即是色教外別傳歷代祖師提唱無非即心即佛一句汝但會色即是空空即是色色即是心心即是色佛即是心心即是佛佛即是空空即是佛能將此四句合成一句承當一生參學事畢有道者問無邊身菩薩為何不見世尊頂王云如文殊菩薩不能測如來智云文殊為何不能測如來智王云如無邊身菩薩不見世尊頂云佛見無邊身菩薩頂否王云見則非佛不見亦非佛云佛測文殊智否王云若測非佛不測亦非佛道者有醒王云卸下道冠始得侍從粧香次王云香煙如何得無香味去者云却請王爺道王以手掩鼻有僧問慧燈朗耀時如何王曰伸手不見掌云意旨如何王云一里火光王至柏林僧眾迎次王指堦下一犬問大眾云不得目為犬道句看眾無語王云常住的一日月夜延僧茶話次一僧問云如何是靜極光通達王云今日合昨日看僧問無明識性即佛性之說如何理會王云此意有兩說無明譬波佛性譬水不可言波非是水不可言水全是波凡情認波捨水聖見取水棄波皆非真如佛性所以圓覺經云於諸妄心亦不息滅又云住妄想境不加了知金剛經云如如不動如如者如波不動者如水若了徹之人無明識性即佛性未了徹之人無明識性非佛性參學之人不遇明師指引若但認以揚眉瞬目動轉施為將昭昭靈靈謂自真性是則認賊為子不但辜負己靈抑且謗經誣法學者當窮究徹底不可被古今未達向上之盲眼宗師不了義論中止自悞也僧稽首歎服一日王云三冬滴水滴凍且喜春融冰泮諸人看看池內龜生毛也未一侍從問如何是鬼王云糊塗人云如何是神王云明白人云如何是佛王云不明白不糊塗人云如何是人王云一任揀擇有僧問天得一以清地得一以寧君王得一坐致太平衲僧得一如何王云清寧太平僧禮謝王云爭奈你不是衲僧云為何不是王云因闍黎未得一在云誰是衲僧王云圓明是衲僧云恁麼則王爺得一也王云我却不是衲僧云王何前後互異王以左手拍膝云衲僧復以右手拍膝云衲僧有僧問如何是自性本不生滅王云因常生滅所以說不生滅云如何是本不動搖王云因時動搖所以說不動搖云如何是本自具足王云因無一物可得所以說具足云如何是能生萬法王云因無一法可見所以說能生萬法云王言與祖說大相違背王云若不違背即有趣向云如何生無所住心王云入林動草入水興波僧無語王云還須違背始得有僧問如何是十智同真王云浮山九帶八辯見七徵心六波羅密五位君臣四料揀三玄要二賓主一句總答汝了也云葛藤則且置設如有箇纖塵不立底王爺又如何接王云一任門外聽誵訛云塵塵剎剎露全身阿誰分上事王云阿誰無分云恁麼則王爺分半座與貧衲始得王云闍黎要還俗耶云王爺亦不得出家王云可惜棒不在手云何不領話王云向誰討保僧作禮王云雖則如是須知更有在僧拂袖便行王喚云大德記取圓明此語好問一僧云將虗空填實將實地撮空向甚處出氣立脚僧云求生不得求死不得王云恁麼則了生死耶離生死耶云待填實虗空撮空實地還許通箇消息也無王云消息即不無還我填撮伎倆始得云非人撲地倒騎牛王云也是木女石郎唱合歡云若然文不加點也王云幸爾還有一點在云且喜流通王沐浴索茶飲次問從者云身內是水身外是水汝看我身是水也不者云王身豈可言水王云人身原是四大合成汝可信得及否云信得及王云可又來汝細思之火見水自然滅土見水自然沈風見水自然浮其餘現今與水相合底此身非水而何者云雖然如是說理上行不得王笑云你既不知理却如何向汝談道王問一僧云不張弓不鳴絃箭箭中紅心是阿誰伎倆僧云藍田射石虎須待李將軍王云莫謗李廣好云還是大功不宰是無為而治王云圓明生平不辜負人云若然空谷應響也王云者掠虗漢云恁麼則洪鐘在架也王云者敲磕漢云如何即得王云啐同時失云爭奈作家不啐王云還我話頭來云貧衲不是作家王云轉見轉見云與王爺平分始得王云一任效顰有僧問如何是大海無魚王云大地還見有眾生麼云大富無糧又作麼生王云闍黎吃飯還咬著米粒那云大悟無道又如何說王云情知你我未曾大悟云王爺何得以己方人王云却被闍黎帶累云心不負人面無慚色王云吾嘗於此切云恁麼則與王爺一鼻孔出氣也王自指鼻云且道圓明那一鼻孔通那一鼻孔塞云無暇分疏王云若然未許闍黎一鼻孔出氣在一日風有僧問風聲來耳耳聞到風王云白鶴唳空石人側耳云小僧不會王云有聲無聞云有聲無聞意旨如何王云有我故有聲無我故無聞云恁麼則任自聲也王云大似土牛木馬云若然則我聲也王云拾人涕唾漢云會也會也王云會處道來看云有口的的道不出王笑云許汝識得一星星僧問阿難云世尊大開慈悲令我得入請問如何入王云芥納須彌易須彌納芥難云恁麼則倒騎青牛去也王云雖是知恁麼去還應知恁麼來云如何恁麼來王云芥納須彌云還假功勳也不王云若假功勳去來皆幻云如何行履王云但盡今時自然成立云立後如何王云密在汝邊僧禮謝王云切忌將此數句留在胸中云貧衲不肯辜負王云珍重有儒士問曹溪一派則且置五家宗旨請王宣示王云圓明但知曹溪旨不解五家宗士云一旨五宗是同是別王云遇正則同遇邪則別云曹溪一派之旨如何王云不取不捨云不取不捨箇什麼王云不取妙明不捨明妙云如何行履王云惺惺著云如何修證王云修證則不無染污即不得云向上還有事也無王云有云如何趨向王云佛言不可說千聖豈能宣云恁麼則不可得而聞也王云證者自知非可測士禮謝王執扇問一僧云若道心內物缺半邊若道物內心缺半邊若道在心內外缺半邊若道不在心內外缺半邊且道如何得圓成去僧笑而不答王云試一一問圓明看問云物在心內耶王云在心內云心在物內耶王云在物內云物在心內外耶王云在心內外云不在心內外耶王云不在心內外云恁麼則四邊俱缺矣王云圓成已竟還少欠箇什麼僧歎服禮謝王笑云也只道得一半閑言說遍界無藏覆不掛一絲頭隨緣閒飲悠然任自由不識路山自高兮水自清乾坤物我太分明偶然忘却來時路偏向他人行處行夜步月上池魚吞餌風來竹影掃塵此際頓忘物我渾然一派天真懶夫我慢一覺醒來睜眼處滿窗紅日天